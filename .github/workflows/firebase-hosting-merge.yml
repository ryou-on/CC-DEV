name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create beta versions
        run: |
          mkdir -p public/hihaho-admin-beta
          cp public/hihaho-admin/index.html public/hihaho-admin-beta/index.html
          sed -i 's/--accent:#0066ff/--accent:#ea580c/g' public/hihaho-admin-beta/index.html
          sed -i 's/#3b82f6/#ea580c/g' public/hihaho-admin-beta/index.html
          sed -i 's/#2563eb/#c2410c/g' public/hihaho-admin-beta/index.html
          sed -i 's/#1d4ed8/#9a3412/g' public/hihaho-admin-beta/index.html
          sed -i 's/>ADMIN</>BETA</g' public/hihaho-admin-beta/index.html
          sed -i 's/v1\.2\.0/v1.3.0-beta.1/g' public/hihaho-admin-beta/index.html
          sed -i 's|hihaho-view/?id=|hihaho-view-beta/?id=|g' public/hihaho-admin-beta/index.html
          python3 -c "
          content = open('public/hihaho-admin-beta/index.html').read()
          dark = '<style id=\"beta-dark\">:root{--bg:#0f172a;--white:#1e293b;--border:#334155;--accent-light:#431407;--success-light:#064e3b;--text:#f1f5f9;--text-sub:#94a3b8;--text-muted:#64748b}body{color-scheme:dark;background:#0f172a!important}input,textarea,select{background:#1e293b!important;color:#f1f5f9!important;border-color:#334155!important}::placeholder{color:#64748b!important}a{color:#fb923c}.card,.modal-box,.panel{background:#1e293b!important;border-color:#334155!important}table td,table th{border-color:#334155!important}</style>'
          content = content.replace('</head>', dark + '</head>', 1)
          open('public/hihaho-admin-beta/index.html', 'w').write(content)
          "
          mkdir -p public/hihaho-view-beta
          cp public/hihaho-view/index.html public/hihaho-view-beta/index.html
          sed -i 's/#1a73e8/#ea580c/g' public/hihaho-view-beta/index.html
          sed -i 's/#0066ff/#ea580c/g' public/hihaho-view-beta/index.html
          sed -i 's/#3b82f6/#ea580c/g' public/hihaho-view-beta/index.html
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CC_DEV_PS7 }}
          channelId: live
          projectId: cc-dev-ps7
