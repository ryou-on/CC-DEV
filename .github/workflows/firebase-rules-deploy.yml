# Firestore / Storage rules のデプロイ（rulesファイル変更時のみ）
#
# firebase-hosting-merge.yml から分離。hosting用SAにはrules権限が無く
# 毎push赤くなっていたため、rules変更時だけ実行して失敗を「意味のある赤」にする。
#
# ✅ 権限問題は解消済み（2026-07-13）: サービスアカウント
#   FIREBASE_SERVICE_ACCOUNT_CC_DEV_PS7 に Firebase 管理者 (roles/firebase.admin) を付与。
#   run #2（2026-07-16, firebase.json変更）で自動デプロイ成功を確認済み。
#   （権限を再構成する場合の付与場所: https://console.cloud.google.com/iam-admin/iam?project=cc-dev-ps7
#    最小構成は roles/firebaserules.admin + roles/firebasestorage.viewer —
#    storage rules デプロイ時に firebasestorage.defaultBucket.get が必要なため rules.admin 単独では不足）
name: Deploy Firebase Rules
on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - storage.rules
      - firestore.indexes.json
      - firebase.json
  workflow_dispatch:
jobs:
  deploy_rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Firebase Storage & Firestore rules
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CC_DEV_PS7 }}
        run: |
          echo "$FIREBASE_SA" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          npm install -g firebase-tools@15.23.0
          firebase deploy --only storage,firestore --project cc-dev-ps7
