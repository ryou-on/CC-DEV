<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音場シミュレーター</title>
<style>
  :root {
    --bg: #0d1017; --panel: #161b26; --panel2: #1e2534;
    --border: #2a3347; --text: #dde3ee; --dim: #8a94a8; --accent: #4da3ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  #verbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #verbar .title { font-size: 14px; font-weight: 700; }
  #verbar .note { font-size: 11px; color: var(--dim); margin-left: auto; }
  #tabs { display: flex; gap: 6px; }
  #tabs button {
    padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--panel2); color: var(--text); cursor: pointer; font-size: 12px;
  }
  #tabs button.active { background: var(--accent); border-color: var(--accent); color: #06131f; font-weight: 700; }
  #frame { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>
<div id="verbar">
  <span class="title">🔊 音場シミュレーター</span>
  <div id="tabs"></div>
  <span class="note" id="verNote"></span>
</div>
<iframe id="frame" allow="autoplay"></iframe>
<script>
// バージョン追加時はこの配列の先頭に1行足すだけ（過去バージョンのファイルは変更しない）
const VERSIONS = [
  { id: "v2", label: "v2.1.0 3D（最新）", path: "v2/", note: "一人称3D＋家具＋防音パネル" },
  { id: "v1", label: "v1.0.0 2D", path: "v1/", note: "2D俯瞰・スタンドアロン版" }
];
const tabs = document.getElementById("tabs");
const frame = document.getElementById("frame");
const note = document.getElementById("verNote");
function select(id, push) {
  const v = VERSIONS.find(x => x.id === id) || VERSIONS[0];
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("active", b.dataset.id === v.id));
  if (frame.dataset.cur !== v.id) { frame.src = v.path; frame.dataset.cur = v.id; }
  note.textContent = v.note;
  if (push) history.replaceState(null, "", "#" + v.id);
}
VERSIONS.forEach(v => {
  const b = document.createElement("button");
  b.dataset.id = v.id;
  b.textContent = v.label;
  b.onclick = () => select(v.id, true);
  tabs.appendChild(b);
});
window.addEventListener("hashchange", () => select(location.hash.slice(1), false));
select(location.hash.slice(1) || VERSIONS[0].id, false);
</script>
</body>
</html>
