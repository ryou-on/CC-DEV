<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hihaho Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase SDK（サムネイル取得用） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #f4f5f7;
  --white: #ffffff;
  --border: #e5e7eb;
  --border-light: #f0f1f4;
  --accent: #0066ff;
  --accent-light: #e8f0ff;
  --text: #111827;
  --text-sub: #6b7280;
  --text-muted: #9ca3af;
  --header-h: 56px;
  --sidebar-w: 296px;
  --font: 'Noto Sans JP', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
header {
  height: var(--header-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}
.logo {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}
.logo-bar { width: 4px; height: 18px; border-radius: 2px; background: var(--accent); }
.search-wrap { flex: 1; max-width: 380px; position: relative; }
.search-wrap input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px 7px 32px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,102,255,0.08);
  background: var(--white);
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted); font-size: 13px; pointer-events: none;
}
.ch-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-left: auto;
  overflow-x: auto;
  scrollbar-width: none;
  max-width: 600px;
}
.ch-tabs::-webkit-scrollbar { display: none; }
.ch-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 11px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  font-family: var(--font);
  font-size: 12px;
  color: var(--text-sub);
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.ch-tab:hover { background: var(--bg); color: var(--text); }
.ch-tab.active {
  background: var(--accent-light);
  color: var(--accent);
  border-color: rgba(0,102,255,0.18);
  font-weight: 600;
}
.ch-tab-skeleton {
  width: 80px; height: 32px;
  border-radius: 20px;
  background: linear-gradient(90deg, #f0f1f4 25%, #e5e7eb 50%, #f0f1f4 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  flex-shrink: 0;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.debug-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-muted); font-size: 11px; padding: 5px 9px;
  cursor: pointer; font-family: var(--mono); transition: all 0.2s; flex-shrink: 0;
}
.debug-btn:hover { color: var(--accent); border-color: var(--accent); }
.layout { flex: 1; display: flex; overflow: hidden; }
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.player-wrap {
  position: relative;
  width: 100%;
  background: #111;
  aspect-ratio: 16 / 9;
  max-height: 52vh;
  flex-shrink: 0;
}
.player-wrap iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
}
.player-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: #555;
}
.player-placeholder-icon { font-size: 40px; opacity: 0.4; }
.player-placeholder p { font-size: 13px; }
.player-spinner {
  position: absolute; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: #111;
}
.player-spinner.show { display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-ring {
  width: 32px; height: 32px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.info-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 11px 16px 10px;
  flex-shrink: 0;
}
.info-title { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); }
.info-meta {
  display: flex; align-items: center; gap: 8px;
  margin-top: 4px; font-size: 12px; color: var(--text-sub);
}
.info-meta .dot { color: var(--border); }
.badge {
  display: inline-flex; align-items: center;
  background: var(--accent-light); color: var(--accent);
  border-radius: 4px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.4px; padding: 2px 6px;
  font-family: var(--mono);
}
.badge-draft { background: #fef3c7; color: #92400e; }
.badge-published { background: #d1fae5; color: #065f46; }
.video-list {
  flex: 1; overflow-y: auto;
  padding: 14px 16px 20px;
  background: var(--bg);
}
.video-list::-webkit-scrollbar { width: 5px; }
.video-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.list-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--text-muted); text-transform: uppercase;
  margin-bottom: 10px;
}
.vrow {
  display: flex; gap: 12px;
  background: var(--white);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: box-shadow 0.15s, border-color 0.15s;
  align-items: flex-start;
}
.vrow:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); border-color: var(--border); }
.vrow.playing { border-color: var(--accent); background: var(--accent-light); }
.vrow-skeleton {
  display: flex; gap: 12px;
  background: var(--white);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
}
.skel-thumb {
  width: 128px; min-width: 128px;
  aspect-ratio: 16/9;
  border-radius: 6px;
  background: linear-gradient(90deg, #f0f1f4 25%, #e5e7eb 50%, #f0f1f4 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
.skel-info { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
.skel-line {
  height: 13px; border-radius: 4px;
  background: linear-gradient(90deg, #f0f1f4 25%, #e5e7eb 50%, #f0f1f4 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
/* サムネイルラッパー */
.vrow-thumb {
  position: relative; flex-shrink: 0;
  width: 128px;
  aspect-ratio: 16/9;
  border-radius: 6px;
  background: #dde0e6;
  overflow: hidden;
}
.vrow-thumb img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
.vrow-thumb-fb {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #b0b4bc;
}
.vrow-play-ov {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.28); opacity: 0;
  transition: opacity 0.15s; border-radius: 6px;
  z-index: 2;
}
.vrow:hover .vrow-play-ov { opacity: 1; }
.play-circle {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.92);
  display: flex; align-items: center; justify-content: center;
}
.play-circle svg { margin-left: 2px; }
.vrow-info { flex: 1; min-width: 0; }
.vrow-title {
  font-size: 13px; font-weight: 500; line-height: 1.45; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 5px;
}
.vrow.playing .vrow-title { color: var(--accent); }
.vrow-meta { font-size: 11px; color: var(--text-muted); display: flex; flex-direction: column; gap: 3px; }
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.ch-info-panel {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ch-info-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ch-avatar {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-family: var(--mono); font-weight: 700;
  color: var(--accent); flex-shrink: 0;
}
.ch-info-name { font-size: 14px; font-weight: 600; }
.ch-info-id { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.ch-info-count { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
.queue-panel { flex: 1; overflow-y: auto; padding: 12px; }
.queue-panel::-webkit-scrollbar { width: 4px; }
.queue-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.queue-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px;
}
.qcard {
  display: flex; gap: 8px;
  padding: 8px; border-radius: 8px;
  cursor: pointer; transition: background 0.15s;
  align-items: flex-start; margin-bottom: 2px;
}
.qcard:hover { background: var(--bg); }
.qcard.playing { background: var(--accent-light); }
.qcard-thumb {
  position: relative; flex-shrink: 0;
  width: 96px; aspect-ratio: 16/9;
  border-radius: 5px; background: #dde0e6; overflow: hidden;
}
.qcard-thumb img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
.qcard-thumb-fb {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #b0b4bc;
}
.qcard-info { flex: 1; min-width: 0; }
.qcard-title {
  font-size: 12px; font-weight: 500; line-height: 1.45; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 4px;
}
.qcard.playing .qcard-title { color: var(--accent); }
.qcard-meta { font-size: 11px; color: var(--text-muted); }
.now-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent);
  margin-right: 4px; vertical-align: middle;
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
/* ソートバー */
.sort-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.sort-btn {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--text-sub);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.sort-btn:hover { border-color: var(--accent); color: var(--accent); }
.sort-btn.active {
  background: var(--accent-light);
  color: var(--accent);
  border-color: rgba(0,102,255,0.3);
  font-weight: 600;
}
.empty { text-align: center; padding: 40px 12px; color: var(--text-muted); }
.empty-icon { font-size: 30px; opacity: 0.35; margin-bottom: 10px; }
.error-msg {
  background: #fef2f2; border: 1px solid #fecaca;
  border-radius: 8px; padding: 12px 16px;
  color: #dc2626; font-size: 13px; margin-bottom: 12px;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.vrow  { animation: fadeUp 0.22s ease both; }
.qcard { animation: fadeUp 0.22s ease both; }

/* ===== モバイルレイアウト ===== */
.mob-nav { display: none; }
.mob-nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  border: none; background: none; cursor: pointer;
  color: #9ca3af; font-size: 10px; font-weight: 500; padding: 6px 0;
  -webkit-tap-highlight-color: transparent;
}
.mob-nav-btn.active { color: #1565c0; }
.mob-nav-btn svg { width: 22px; height: 22px; }

@media (max-width: 768px) {
  .mob-nav {
    display: flex; position: fixed;
    bottom: 0; left: 0; right: 0; height: 56px;
    background: #fff; border-top: 1px solid #e5e7eb;
    z-index: 999; box-shadow: 0 -2px 8px rgba(0,0,0,.08);
  }
  .layout { flex-direction: column; overflow: hidden; }
  .player-wrap { max-height: 56.25vw; }
  .info-bar { display: none; }
  .video-list { flex: 1; overflow-y: auto; padding-bottom: 60px; }
  .sidebar {
    display: none; position: fixed;
    top: var(--header-h); left: 0; right: 0; bottom: 56px;
    width: 100% !important; z-index: 50;
    border-left: none; box-shadow: none; overflow: hidden;
  }
  .sidebar.mob-open { display: flex; }
  .sidebar .queue-panel { flex: 1; overflow-y: auto; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-bar"></div>hihaho Player</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="動画を検索…" oninput="onSearch(this.value)">
  </div>
  <div class="ch-tabs" id="chTabs">
    <div class="ch-tab-skeleton"></div>
    <div class="ch-tab-skeleton"></div>
    <div class="ch-tab-skeleton"></div>
  </div>
  <button class="debug-btn" onclick="copyConsole()">📋 console</button>
</header>

<div class="layout">
  <div class="main-area">
    <div class="player-wrap" id="playerWrap">
      <div class="player-placeholder" id="placeholder">
        <div class="player-placeholder-icon">▶</div>
        <p>動画を選択して再生</p>
      </div>
      <div class="player-spinner" id="spinner"><div class="spinner-ring"></div></div>
    </div>
    <div class="info-bar">
      <div class="info-title" id="nowTitle">動画を選択してください</div>
      <div class="info-meta" id="nowMeta"><span>—</span></div>
    </div>
    <div class="video-list">
      <div class="list-label" id="listLabel">読み込み中...</div>
      <!-- 並べ替えボタンバー -->
      <div class="sort-bar" id="sortBar"></div>
      <div id="videoGrid">
        <div class="vrow-skeleton"><div class="skel-thumb"></div><div class="skel-info"><div class="skel-line" style="width:80%"></div><div class="skel-line" style="width:55%"></div><div class="skel-line" style="width:35%"></div></div></div>
        <div class="vrow-skeleton"><div class="skel-thumb"></div><div class="skel-info"><div class="skel-line" style="width:70%"></div><div class="skel-line" style="width:45%"></div><div class="skel-line" style="width:30%"></div></div></div>
        <div class="vrow-skeleton"><div class="skel-thumb"></div><div class="skel-info"><div class="skel-line" style="width:85%"></div><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:40%"></div></div></div>
      </div>
    </div>
  </div>
  <aside class="sidebar">
    <div class="ch-info-panel" id="chInfoPanel">
      <div class="ch-info-head">
        <div class="ch-avatar">…</div>
        <div><div class="ch-info-name">読み込み中</div><div class="ch-info-id">—</div></div>
      </div>
    </div>
    <div class="queue-panel" id="queuePanel">
      <div class="queue-label">ラインナップ</div>
    </div>
  </aside>
</div>

<script>
// =========================================================
// ★ 設定
// =========================================================
const WORKER_URL = 'https://hihaho-proxy.jumpei-omote.workers.dev';

// Firebase設定
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDPlsAhtxbJBihy-EAHck9P7XbuMdzV0ds",
  authDomain: "cc-dev-ps7.firebaseapp.com",
  projectId: "cc-dev-ps7",
  storageBucket: "cc-dev-ps7.firebasestorage.app",
  messagingSenderId: "1029579090333",
  appId: "1:1029579090333:web:5a2ea499fec97c497f2774"
};

// 表示するフォルダID（指定順でタブに表示）
const SHOW_FOLDER_IDS = [21078, 12452, 21334];

// ★ サムネイル設定
// Firebase Hostingに画像を置く場合:
//   public/hihaho-player/thumbs/{uuid}.jpg を配置するだけでOK
// 自動でそのURLを参照します。画像がない場合は🎬アイコンにフォールバック。
const THUMB_BASE = 'https://cc-dev-ps7.web.app/hihaho-player/thumbs';

// 拡張子（jpg / png / webp）
const THUMB_EXT = 'jpg';

// statusの意味
const STATUS = {
  0: { label: 'DRAFT',        cls: 'badge badge-draft' },
  1: { label: 'PUBLISHED',    cls: 'badge badge-published' },
  2: { label: 'INTERACTIVE',  cls: 'badge' },
  4: { label: 'ARCHIVED',     cls: 'badge badge-draft' },
};

// =========================================================
// ソート設定
// =========================================================
const SORT_OPTS = [
  { key: 'new',          label: '📅 新しい順' },   // 作成日 降順
  { key: 'old',          label: '📅 古い順' },     // 作成日 昇順
  { key: 'upd_desc',     label: '🔄 更新↓' },      // 更新日 降順
  { key: 'upd_asc',      label: '🔄 更新↑' },      // 更新日 昇順
  { key: 'alpha_asc',    label: 'あ→ん' },         // あいうえお 昇順
  { key: 'alpha_desc',   label: 'ん→あ' },         // あいうえお 降順
  { key: 'random',       label: '🔀 ランダム' },   // ランダム
];
let currentSort = 'new'; // デフォルト: 新しい順

// =========================================================
// 状態管理
// =========================================================
let allFolders  = [];
let allVideos   = [];
let activeChId  = null;
let activeVidId = null;
let searchQ     = '';
let clog        = [];
let videoMeta   = {}; // uuid → { thumbnailUrl } のマップ（Firestore video_meta）

const origLog = console.log.bind(console);
console.log = (...a) => { origLog(...a); clog.push(a.join(' ')); };
const origErr = console.error.bind(console);
console.error = (...a) => { origErr(...a); clog.push('[ERR] ' + a.join(' ')); };
const log = m => console.log(`[hihaho] ${m}`);

// =========================================================
// サムネイルURL生成
// 優先順位: ①Firestore video_meta → ②Firebase Hosting thumbs → ③🎬フォールバック
// =========================================================
function thumbHtml(uuid, cls) {
  // ①video_metaにURLがあればそれを使う
  const metaUrl = videoMeta[uuid]?.thumbnailUrl;
  // ②なければ静的ファイルパス（404時はonerrorでフォールバックへ）
  const src = metaUrl || `${THUMB_BASE}/${uuid}.${THUMB_EXT}`;

  if (cls === 'vrow') {
    return `
      <img src="${src}"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           loading="lazy">
      <div class="vrow-thumb-fb" style="display:none">🎬</div>`;
  } else {
    return `
      <img src="${src}"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           loading="lazy">
      <div class="qcard-thumb-fb" style="display:none">🎬</div>`;
  }
}

// =========================================================
// API呼び出し
// =========================================================
async function apiFetch(path) {
  const res = await fetch(`${WORKER_URL}${path}`, {
    headers: { 'Accept': 'application/json' }
  });
  if (!res.ok) throw new Error(`API error: ${res.status} ${path}`);
  return res.json();
}

// =========================================================
// 初期化：フォルダIDを指定して動画を個別取得
// =========================================================
async function init() {
  log('初期化開始');
  try {
    // Firebase初期化 + video_metaのサムネイルURLを一括取得
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    try {
      const metaSnap = await db.collection('video_meta').get();
      metaSnap.forEach(doc => { videoMeta[doc.id] = doc.data(); });
      log(`video_meta: ${metaSnap.size}件取得`);
    } catch (e) {
      // video_meta取得失敗時は静的ファイルにフォールバック
      console.error('video_meta取得失敗:', e.message);
    }

    // フォルダ一覧取得 → 指定IDで絞り込み
    const foldersRes = await apiFetch('/v2/video-container');
    allFolders = (foldersRes.data || []).filter(f => SHOW_FOLDER_IDS.includes(f.id));

    // フォルダIDの指定順に並べ替え
    allFolders.sort((a, b) => SHOW_FOLDER_IDS.indexOf(a.id) - SHOW_FOLDER_IDS.indexOf(b.id));

    if (allFolders.length === 0) {
      showError('表示できるフォルダがありません');
      return;
    }

    // 各フォルダの動画を個別取得（並列）
    const videoResults = await Promise.all(
      allFolders.map(f => apiFetch(`/v2/video?video_container_id=${f.id}`))
    );
    allVideos = videoResults.flatMap(r => r.data || []);

    log(`フォルダ: ${allFolders.length}件 / 動画: ${allVideos.length}件`);

    activeChId = allFolders[0].id;
    renderTabs();
    renderSortBar(); // ソートバーを初期描画
    renderSidebar();
    renderGrid();
    log('初期化完了');

  } catch (e) {
    console.error(e.message);
    showError(`データ取得エラー: ${e.message}<br>WORKER_URLを確認してください。`);
  }
}

// =========================================================
// エラー表示
// =========================================================
function showError(msg) {
  document.getElementById('videoGrid').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  document.getElementById('listLabel').textContent = 'エラー';
  document.getElementById('chTabs').innerHTML = '';
}

// =========================================================
// チャンネルタブ描画
// =========================================================
function renderTabs() {
  document.getElementById('chTabs').innerHTML = allFolders.map(f => {
    const count = allVideos.filter(v => v.video_container_id === f.id).length;
    return `<button class="ch-tab ${f.id === activeChId ? 'active' : ''}" onclick="selectCh(${f.id})">
      ${esc(f.name)} <span style="opacity:0.6;font-size:10px">${count}</span>
    </button>`;
  }).join('');
}

// =========================================================
// チャンネル選択
// =========================================================
function selectCh(id) {
  activeChId = id;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  renderTabs();
  renderSidebar();
  renderGrid();
  log(`チャンネル: ${id}`);
}

// =========================================================
// 右サイドバー描画
// =========================================================
function renderSidebar() {
  const folder = curFolder();
  if (!folder) return;
  const videos = filteredVideos();
  const initial = (folder.name || '?').charAt(0).toUpperCase();

  document.getElementById('chInfoPanel').innerHTML = `
    <div class="ch-info-head">
      <div class="ch-avatar">${initial}</div>
      <div>
        <div class="ch-info-name">${esc(folder.name)}</div>
        <div class="ch-info-id">ID: ${folder.id}</div>
      </div>
    </div>
    <div class="ch-info-count">${curChVideos().length} 本の動画</div>`;

  const qp = document.getElementById('queuePanel');
  qp.innerHTML = `<div class="queue-label">ラインナップ</div>` +
    (videos.length === 0
      ? `<div class="empty"><div class="empty-icon">🔍</div><p>動画が見つかりません</p></div>`
      : videos.map((v, i) => `
        <div class="qcard ${v.id === activeVidId ? 'playing' : ''}" style="animation-delay:${i*25}ms" onclick="play(${v.id})">
          <div class="qcard-thumb">
            ${thumbHtml(v.uuid, 'qcard')}
          </div>
          <div class="qcard-info">
            <div class="qcard-title">${v.id === activeVidId ? '<span class="now-dot"></span>' : ''}${esc(v.display_name)}</div>
            <div class="qcard-meta">${fmt(v.created_at)}</div>
          </div>
        </div>`).join(''));
}

// =========================================================
// 動画グリッド描画
// =========================================================
function renderGrid() {
  const folder = curFolder();
  if (!folder) return;
  const videos = filteredVideos();

  document.getElementById('listLabel').textContent =
    searchQ ? `「${searchQ}」 ${videos.length} 件` : `${folder.name} の動画一覧（${videos.length}本）`;

  const g = document.getElementById('videoGrid');
  if (!videos.length) {
    g.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>動画が見つかりませんでした</p></div>`;
    return;
  }

  g.innerHTML = videos.map((v, i) => {
    const st = STATUS[v.status] || STATUS[0];
    return `
      <div class="vrow ${v.id === activeVidId ? 'playing' : ''}" style="animation-delay:${i*25}ms" onclick="play(${v.id})">
        <div class="vrow-thumb">
          ${thumbHtml(v.uuid, 'vrow')}
          <div class="vrow-play-ov">
            <div class="play-circle">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="#333"><path d="M4 2.5l6 3.5-6 3.5z"/></svg>
            </div>
          </div>
        </div>
        <div class="vrow-info">
          <div class="vrow-title">${v.id === activeVidId ? '<span class="now-dot"></span>' : ''}${esc(v.display_name)}</div>
          <div class="vrow-meta">
            <span>${fmt(v.created_at)}</span>
            ${st.cls ? `<span class="${st.cls}">${st.label}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

// =========================================================
// 動画再生（iframeを動的生成・hihaho課金対策）
// =========================================================
function play(id) {
  const vid = allVideos.find(v => v.id === id);
  if (!vid) return;
  activeVidId = id;
  log(`再生: ${vid.display_name} (uuid: ${vid.uuid})`);

  const wrap = document.getElementById('playerWrap');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('spinner').classList.add('show');
  wrap.querySelector('iframe')?.remove();

  // uuidからembed URL生成（課金はここで初めて発生）
  const iframe = document.createElement('iframe');
  iframe.src = `https://player.hihaho.com/embed/${vid.uuid}`;
  iframe.allow = 'autoplay; fullscreen';
  iframe.allowFullscreen = true;
  iframe.onload = () => {
    document.getElementById('spinner').classList.remove('show');
    log(`iframe完了: ${vid.uuid}`);
  };
  wrap.appendChild(iframe);

  const st = STATUS[vid.status] || STATUS[0];
  document.getElementById('nowTitle').innerHTML =
    `${esc(vid.display_name)}${st.cls ? ` <span class="${st.cls}">${st.label}</span>` : ''}`;
  document.getElementById('nowMeta').innerHTML =
    `<span>${curFolder()?.name || ''}</span>
     <span class="dot">·</span>
     <span>${fmt(vid.created_at)}</span>
     <span class="dot">·</span>
     <span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${vid.uuid.slice(0,8)}…</span>`;

  renderSidebar();
  renderGrid();
}

// =========================================================
// 検索
// =========================================================
function onSearch(q) {
  searchQ = q.trim();
  renderGrid();
  renderSidebar();
}

// =========================================================
// ユーティリティ
// =========================================================
const curFolder   = () => allFolders.find(f => f.id === activeChId);
// status=1（PUBLISHED）または status=2（INTERACTIVE）のみ表示
// DRAFT(0)・ARCHIVED(4) は非表示
const curChVideos = () => allVideos.filter(v =>
  v.video_container_id === activeChId &&
  (v.status === 1 || v.status === 2)
);

// 検索フィルタ＋ソートを適用して返す
const filteredVideos = () => {
  let vs = curChVideos();
  // 検索フィルタ
  if (searchQ) {
    const q = searchQ.toLowerCase();
    vs = vs.filter(v =>
      v.display_name.toLowerCase().includes(q) ||
      (v.description || '').toLowerCase().includes(q)
    );
  }
  // ソート適用
  return sortVideos(vs);
};

// =========================================================
// ソート関数：元配列を変更しないようコピーしてソート
// =========================================================
function sortVideos(videos) {
  const arr = [...videos];
  switch (currentSort) {
    case 'new':
      // 作成日 新しい順（降順）
      return arr.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    case 'old':
      // 作成日 古い順（昇順）
      return arr.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    case 'upd_desc':
      // 更新日 新しい順（updated_at がなければ created_at で代替）
      return arr.sort((a, b) =>
        new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at));
    case 'upd_asc':
      // 更新日 古い順
      return arr.sort((a, b) =>
        new Date(a.updated_at || a.created_at) - new Date(b.updated_at || b.created_at));
    case 'alpha_asc':
      // あいうえお 昇順（日本語対応）
      return arr.sort((a, b) => a.display_name.localeCompare(b.display_name, 'ja'));
    case 'alpha_desc':
      // あいうえお 降順
      return arr.sort((a, b) => b.display_name.localeCompare(a.display_name, 'ja'));
    case 'random':
      // ランダム（Fisher-Yates）
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    default:
      return arr;
  }
}

// =========================================================
// ソートバー描画
// =========================================================
function renderSortBar() {
  document.getElementById('sortBar').innerHTML = SORT_OPTS.map(o =>
    `<button class="sort-btn ${o.key === currentSort ? 'active' : ''}" onclick="setSort('${o.key}')">${o.label}</button>`
  ).join('');
}

// =========================================================
// ソート変更
// =========================================================
function setSort(key) {
  currentSort = key;
  log(`ソート変更: ${key}`);
  renderSortBar();
  renderGrid();
  renderSidebar();
}
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
const fmt = d => {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
};
function copyConsole() {
  navigator.clipboard.writeText(clog.join('\n') || '（ログなし）')
    .then(() => alert('コピーしました'))
    .catch(() => alert('コピー失敗'));
}

// =========================================================
// 起動
// =========================================================
init();

// ===== モバイルタブ切り替え =====
window.mobSwitch = function(tab) {
  const sidebar = document.querySelector('.sidebar');
  const qPanel  = document.getElementById('queuePanel');
  const chPanel = document.getElementById('chInfoPanel');
  document.querySelectorAll('.mob-nav-btn').forEach(b => b.classList.remove('active'));
  if (tab === 'list') {
    document.getElementById('mnBtnList')?.classList.add('active');
    sidebar?.classList.remove('mob-open');
    if (chPanel) chPanel.style.display = '';
    if (qPanel)  qPanel.style.display  = '';
  } else if (tab === 'queue') {
    document.getElementById('mnBtnQueue')?.classList.add('active');
    sidebar?.classList.add('mob-open');
    if (chPanel) chPanel.style.display = 'none';
    if (qPanel)  qPanel.style.display  = '';
  } else if (tab === 'ch') {
    document.getElementById('mnBtnCh')?.classList.add('active');
    sidebar?.classList.add('mob-open');
    if (chPanel) chPanel.style.display = '';
    if (qPanel)  qPanel.style.display  = 'none';
  }
};
