<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hihaho Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f7; --white: #ffffff; --border: #e5e7eb; --border-light: #f0f1f4;
  --accent: #0066ff; --accent-light: #e8f0ff;
  --text: #111827; --text-sub: #6b7280; --text-muted: #9ca3af;
  --header-h: 56px; --sidebar-w: 296px;
  --font: 'Noto Sans JP', sans-serif; --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ヘッダー */
header { height: var(--header-h); background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; z-index: 100; }
.logo { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 7px; white-space: nowrap; }
.logo-bar { width: 4px; height: 18px; border-radius: 2px; background: var(--accent); }
.search-wrap { flex: 1; max-width: 380px; position: relative; }
.search-wrap input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px 7px 32px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,102,255,0.08); background: var(--white); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }
.ch-tabs { display: flex; align-items: center; gap: 2px; margin-left: auto; overflow-x: auto; max-width: 560px; scrollbar-width: none; }
.ch-tabs::-webkit-scrollbar { display: none; }
.ch-tab { display: flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 20px; border: 1px solid transparent; background: transparent; cursor: pointer; font-family: var(--font); font-size: 12.5px; color: var(--text-sub); transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.ch-tab:hover { background: var(--bg); color: var(--text); }
.ch-tab.active { background: var(--accent-light); color: var(--accent); border-color: rgba(0,102,255,0.18); font-weight: 600; }
.ch-tab-count { font-size: 10px; background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 8px; }
.ch-tab.active .ch-tab-count { background: rgba(0,102,255,0.15); }
.debug-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 11px; padding: 5px 9px; cursor: pointer; font-family: var(--mono); transition: all 0.2s; flex-shrink: 0; }
.debug-btn:hover { color: var(--accent); border-color: var(--accent); }

/* レイアウト */
.layout { flex: 1; display: flex; overflow: hidden; }
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* プレイヤー */
.player-wrap { position: relative; width: 100%; background: #111; aspect-ratio: 16/9; max-height: 52vh; flex-shrink: 0; }
.player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.player-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #555; }
.player-placeholder-icon { font-size: 40px; opacity: 0.4; }
.player-placeholder p { font-size: 13px; }
.player-spinner { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: #111; }
.player-spinner.show { display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-ring { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }

/* 情報バー */
.info-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 11px 16px 10px; flex-shrink: 0; }
.info-title { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
.info-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 12px; color: var(--text-sub); }
.info-meta .dot { color: var(--border); }

/* バッジ */
.badge { display: inline-flex; align-items: center; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.4px; padding: 2px 6px; font-family: var(--mono); white-space: nowrap; flex-shrink: 0; }
.badge-interactive { background: var(--accent-light); color: var(--accent); }
.badge-published { background: #dcfce7; color: #16a34a; }
.badge-draft { background: #f3f4f6; color: var(--text-muted); }

/* 動画リスト */
.video-list { flex: 1; overflow-y: auto; padding: 14px 16px 20px; background: var(--bg); }
.video-list::-webkit-scrollbar { width: 5px; }
.video-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.list-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }

/* 動画カード */
.vrow { display: flex; gap: 12px; background: var(--white); border: 1px solid var(--border-light); border-radius: 10px; padding: 10px; cursor: pointer; margin-bottom: 8px; transition: box-shadow 0.15s, border-color 0.15s; align-items: flex-start; }
.vrow:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); border-color: var(--border); }
.vrow.playing { border-color: var(--accent); background: var(--accent-light); }
.vrow.status-draft { opacity: 0.6; }
.vrow-thumb { position: relative; flex-shrink: 0; width: 128px; aspect-ratio: 16/9; border-radius: 6px; background: #dde0e6; overflow: hidden; }
.vrow-thumb-fb { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #b0b4bc; }
.vrow-play-ov { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.28); opacity: 0; transition: opacity 0.15s; border-radius: 6px; }
.vrow:hover .vrow-play-ov { opacity: 1; }
.play-circle { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; }
.play-circle svg { margin-left: 2px; }
.vrow-info { flex: 1; min-width: 0; }
.vrow-title { font-size: 13px; font-weight: 500; line-height: 1.45; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px; }
.vrow.playing .vrow-title { color: var(--accent); }
.vrow-meta { font-size: 11px; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
.vrow-badges { display: flex; gap: 4px; flex-wrap: wrap; }

/* サイドバー */
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--white); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.ch-info-panel { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ch-info-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ch-avatar { width: 40px; height: 40px; border-radius: 10px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; font-family: var(--mono); overflow: hidden; }
.ch-info-name { font-size: 14px; font-weight: 600; }
.ch-info-count { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
.queue-panel { flex: 1; overflow-y: auto; padding: 12px; }
.queue-panel::-webkit-scrollbar { width: 4px; }
.queue-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.queue-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
.qcard { display: flex; gap: 8px; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s; align-items: flex-start; margin-bottom: 2px; }
.qcard:hover { background: var(--bg); }
.qcard.playing { background: var(--accent-light); }
.qcard.status-draft { opacity: 0.55; }
.qcard-thumb { position: relative; flex-shrink: 0; width: 96px; aspect-ratio: 16/9; border-radius: 5px; background: #dde0e6; overflow: hidden; }
.qcard-thumb-fb { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #b0b4bc; }
.qcard-info { flex: 1; min-width: 0; }
.qcard-title { font-size: 12px; font-weight: 500; line-height: 1.45; color: var(--text); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
.qcard.playing .qcard-title { color: var(--accent); }
.qcard-meta { font-size: 11px; color: var(--text-muted); }
.now-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 4px; vertical-align: middle; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* スケルトン */
.skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.empty { text-align: center; padding: 40px 12px; color: var(--text-muted); }
.empty-icon { font-size: 30px; opacity: 0.35; margin-bottom: 10px; }
.error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; color: #dc2626; font-size: 13px; margin: 12px 0; line-height: 1.6; }
.error-msg code { font-family: var(--mono); font-size: 11px; word-break: break-all; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.vrow { animation: fadeUp 0.22s ease both; }
.qcard { animation: fadeUp 0.22s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-bar"></div>hihaho Player</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="動画を検索…" oninput="onSearch(this.value)">
  </div>
  <div class="ch-tabs" id="chTabs">
    <div class="skeleton" style="width:80px;height:28px;border-radius:20px;margin:0 2px"></div>
    <div class="skeleton" style="width:80px;height:28px;border-radius:20px;margin:0 2px"></div>
    <div class="skeleton" style="width:80px;height:28px;border-radius:20px;margin:0 2px"></div>
  </div>
  <button class="debug-btn" onclick="copyConsole()">📋 console</button>
</header>

<div class="layout">
  <div class="main-area">
    <div class="player-wrap" id="playerWrap">
      <div class="player-placeholder" id="placeholder">
        <div class="player-placeholder-icon">▶</div>
        <p>動画を選択して再生</p>
      </div>
      <div class="player-spinner" id="spinner"><div class="spinner-ring"></div></div>
    </div>
    <div class="info-bar">
      <div class="info-title" id="nowTitle">動画を選択してください</div>
      <div class="info-meta" id="nowMeta"><span>—</span></div>
    </div>
    <div class="video-list">
      <div class="list-label" id="listLabel">読み込み中…</div>
      <div id="videoGrid">
        <div class="skeleton" style="height:72px;border-radius:10px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:72px;border-radius:10px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:72px;border-radius:10px"></div>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="ch-info-panel" id="chInfoPanel">
      <div class="skeleton" style="height:52px;border-radius:8px"></div>
    </div>
    <div class="queue-panel" id="queuePanel">
      <div class="queue-label">ラインナップ</div>
      <div class="skeleton" style="height:60px;border-radius:8px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:60px;border-radius:8px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:60px;border-radius:8px"></div>
    </div>
  </aside>
</div>

<script>
// =========================================================
// ★ Cloudflare Worker の URL に書き換えてください
// =========================================================
const WORKER_URL = 'https://hihaho-proxy.jumpei-omote.workers.dev';
const WORKER_URL = 'https://hihaho-proxy.jumpei-omote.workers.dev';
const SHOW_FOLDER_IDS = [21078, 12452, 21334];

// =========================================================
// ステータス定義（APIレスポンスの status 値に対応）
// =========================================================
const STATUS = {
  0: { label: 'DRAFT',       cls: 'badge-draft' },
  1: { label: 'PUBLISHED',   cls: 'badge-published' },
  2: { label: 'INTERACTIVE', cls: 'badge-interactive' },
  4: { label: 'ARCHIVED',    cls: 'badge-draft' },
};

// =========================================================
// 状態管理
// =========================================================
let allFolders  = [];
let allVideos   = [];
let activeChId  = null;
let activeVidId = null;
let searchQ     = '';
let clog        = [];

const origLog = console.log.bind(console);
console.log = (...a) => { origLog(...a); clog.push(a.join(' ')); };
const origErr = console.error.bind(console);
console.error = (...a) => { origErr(...a); clog.push('[ERR] ' + a.join(' ')); };
const log = m => console.log(`[hihaho] ${m}`);

// =========================================================
// API呼び出し（Worker経由）
// =========================================================
async function apiFetch(path) {
  const res = await fetch(WORKER_URL + path, { headers: { 'Content-Type': 'application/json' } });
  if (!res.ok) throw new Error(`API ${res.status}: ${path}`);
  return res.json();
}

// =========================================================
// 初期化
// =========================================================
async function init() {
  log('初期化開始');
  try {
   const foldersRes = await apiFetch('/v2/video-container');
allFolders = (foldersRes.data || []).filter(f => SHOW_FOLDER_IDS.includes(f.id));
allFolders.sort((a, b) => SHOW_FOLDER_IDS.indexOf(a.id) - SHOW_FOLDER_IDS.indexOf(b.id));

if (allFolders.length === 0) {
  showError('表示できるフォルダがありません');
  return;
}

const videoResults = await Promise.all(
  allFolders.map(f => apiFetch(`/v2/video?video_container_id=${f.id}`))
);
allVideos = videoResults.flatMap(r => r.data || []);
    log(`フォルダ ${allFolders.length}件 / 動画 ${allVideos.length}件`);

    // 動画が存在するフォルダのみ
    const usedIds = new Set(allVideos.map(v => v.video_container_id));
    const validFolders = allFolders.filter(f => usedIds.has(f.id));

    if (!validFolders.length) { showError('表示できる動画がありません'); return; }

    activeChId = validFolders[0].id;
    renderTabs(validFolders);
    renderSidebar();
    renderGrid();
    log('初期化完了');
  } catch(e) {
    console.error(e.message);
    showError(`データ取得に失敗しました。Worker URL を確認してください。<br><code>${WORKER_URL}</code>`);
  }
}

// =========================================================
// タブ描画
// =========================================================
function renderTabs(folders) {
  const list = folders || validFolders();
  document.getElementById('chTabs').innerHTML = list.map(f => `
    <button class="ch-tab ${f.id === activeChId ? 'active' : ''}" onclick="selectCh(${f.id})">
      ${esc(f.name)}<span class="ch-tab-count">${folderVideos(f.id).length}</span>
    </button>`).join('');
}

// =========================================================
// チャンネル選択
// =========================================================
function selectCh(id) {
  activeChId = id;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  renderTabs();
  renderSidebar();
  renderGrid();
  log('チャンネル: ' + id);
}

// =========================================================
// サイドバー描画
// =========================================================
function renderSidebar() {
  const f = allFolders.find(x => x.id === activeChId);
  document.getElementById('chInfoPanel').innerHTML = f ? `
    <div class="ch-info-head">
      <div class="ch-avatar">${esc(f.name.slice(0,4))}</div>
      <div><div class="ch-info-name">${esc(f.name)}</div></div>
    </div>
    <div class="ch-info-count">${folderVideos(f.id).length} 本の動画</div>` : '';

  const videos = filtered();
  document.getElementById('queuePanel').innerHTML =
    '<div class="queue-label">ラインナップ</div>' + (
    !videos.length
      ? '<div class="empty"><div class="empty-icon">🔍</div><p>動画が見つかりません</p></div>'
      : videos.map((v,i) => `
          <div class="qcard ${v.id===activeVidId?'playing':''} ${v.status===0?'status-draft':''}"
               style="animation-delay:${i*20}ms" onclick="playVideo(${v.id})">
            <div class="qcard-thumb"><div class="qcard-thumb-fb">🎬</div></div>
            <div class="qcard-info">
              <div class="qcard-title">${v.id===activeVidId?'<span class="now-dot"></span>':''}${esc(v.display_name)}</div>
              <div class="qcard-meta">${fmt(v.created_at)}</div>
            </div>
          </div>`).join(''));
}

// =========================================================
// グリッド描画
// =========================================================
function renderGrid() {
  const f = allFolders.find(x => x.id === activeChId);
  const videos = filtered();
  document.getElementById('listLabel').textContent =
    searchQ ? `「${searchQ}」 ${videos.length}件` : (f ? `${f.name} の動画一覧` : '');

  const g = document.getElementById('videoGrid');
  if (!videos.length) {
    g.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>動画が見つかりませんでした</p></div>';
    return;
  }
  g.innerHTML = videos.map((v,i) => {
    const st = STATUS[v.status] || STATUS[0];
    return `
      <div class="vrow ${v.id===activeVidId?'playing':''} ${v.status===0?'status-draft':''}"
           style="animation-delay:${i*20}ms" onclick="playVideo(${v.id})">
        <div class="vrow-thumb">
          <div class="vrow-thumb-fb">🎬</div>
          <div class="vrow-play-ov">
            <div class="play-circle">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="#333"><path d="M4 2.5l6 3.5-6 3.5z"/></svg>
            </div>
          </div>
        </div>
        <div class="vrow-info">
          <div class="vrow-title">${v.id===activeVidId?'<span class="now-dot"></span>':''}${esc(v.display_name)}</div>
          <div class="vrow-meta">
            <span>${fmt(v.created_at)}</span>
            <div class="vrow-badges"><span class="badge ${st.cls}">${st.label}</span></div>
          </div>
        </div>
      </div>`;
  }).join('');
}

// =========================================================
// 動画再生（iframeを動的生成・hihaho課金対策）
// =========================================================
function playVideo(id) {
  const vid = allVideos.find(v => v.id === id);
  if (!vid) return;
  activeVidId = id;
  log('再生: ' + vid.display_name);

  const wrap = document.getElementById('playerWrap');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('spinner').classList.add('show');
  wrap.querySelector('iframe')?.remove();

  const iframe = document.createElement('iframe');
  iframe.src = `https://player.hihaho.com/${vid.uuid}`;
  iframe.allow = 'autoplay; fullscreen';
  iframe.allowFullscreen = true;
  iframe.onload = () => {
    document.getElementById('spinner').classList.remove('show');
    log('iframe完了: ' + vid.uuid);
  };
  wrap.appendChild(iframe);

  const st = STATUS[vid.status] || STATUS[0];
  const folderName = allFolders.find(f => f.id === vid.video_container_id)?.name || '';
  document.getElementById('nowTitle').innerHTML =
    `${esc(vid.display_name)} <span class="badge ${st.cls}">${st.label}</span>`;
  document.getElementById('nowMeta').innerHTML =
    `<span>${esc(folderName)}</span><span class="dot">·</span><span>${fmt(vid.created_at)}</span>`;

  renderSidebar();
  renderGrid();
}

// =========================================================
// 検索
// =========================================================
function onSearch(q) { searchQ = q.trim(); renderGrid(); renderSidebar(); }

// =========================================================
// エラー表示
// =========================================================
function showError(msg) {
  document.getElementById('chTabs').innerHTML = '';
  document.getElementById('chInfoPanel').innerHTML = '';
  document.getElementById('listLabel').textContent = 'エラー';
  document.getElementById('videoGrid').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  document.getElementById('queuePanel').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
}

// =========================================================
// ユーティリティ
// =========================================================
const validFolders = () => { const s = new Set(allVideos.map(v=>v.video_container_id)); return allFolders.filter(f=>s.has(f.id)); };
const folderVideos = id => allVideos.filter(v => v.video_container_id === id);
const filtered = () => { const vs = folderVideos(activeChId); return searchQ ? vs.filter(v=>v.display_name.toLowerCase().includes(searchQ.toLowerCase())) : vs; };
const fmt = d => { const dt=new Date(d); return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`; };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
function copyConsole() {
  navigator.clipboard.writeText(clog.join('\n')||'（ログなし）').then(()=>alert('コピーしました')).catch(()=>alert('失敗'));
}

init();
</script>
</body>
</html>
