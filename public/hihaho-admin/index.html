<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hihaho Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--white:#fff;--border:#e5e7eb;--accent:#0066ff;--accent-light:#e8f0ff;--danger:#ef4444;--success:#10b981;--success-light:#d1fae5;--text:#111827;--text-sub:#6b7280;--text-muted:#9ca3af;--font:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;--sw:220px;--hh:56px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
header{height:var(--hh);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:fixed;top:0;left:0;right:0;z-index:100;}
.logo{font-family:var(--mono);font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;}
.logo-bar{width:4px;height:18px;border-radius:2px;background:var(--accent);}
.logo-badge{background:var(--danger);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-weight:700;}
aside{width:var(--sw);background:var(--white);border-right:1px solid var(--border);position:fixed;top:var(--hh);bottom:0;left:0;overflow-y:auto;padding:12px 0;}
.nav-s{padding:0 14px 6px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-top:8px;}
.nav-i{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;color:var(--text-sub);transition:all .15s;position:relative;}
.nav-i:hover{background:var(--bg);color:var(--text);}
.nav-i.active{background:var(--accent-light);color:var(--accent);font-weight:600;}
.nav-i.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
.divider{height:1px;background:var(--border);margin:10px 0;}
main{margin-left:var(--sw);margin-top:var(--hh);padding:24px;}
.page{display:none;}.page.active{display:block;}
.pt{font-size:19px;font-weight:700;margin-bottom:4px;}
.pd{font-size:13px;color:var(--text-sub);margin-bottom:20px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.ct{font-size:14px;font-weight:600;margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:all .15s;}
.bp{background:var(--accent);color:#fff;}.bp:hover{background:#0052cc;}
.bs{background:var(--bg);color:var(--text);border:1px solid var(--border);}.bs:hover{background:var(--border);}
.bd{background:var(--danger);color:#fff;}.bd:hover{background:#dc2626;}
.bsm{padding:5px 10px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.fi{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;background:var(--white);}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,102,255,.08);}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;}
.fc{border:1px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;transition:all .15s;background:var(--white);display:flex;align-items:center;gap:9px;}
.fc:hover{border-color:var(--accent);}
.fc.sel{border-color:var(--accent);background:var(--accent-light);}
.fa{width:32px;height:32px;border-radius:7px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:12px;flex-shrink:0;}
.fn{font-size:12px;font-weight:500;line-height:1.4;}
.fct{font-size:11px;color:var(--text-muted);}
.vi{display:flex;align-items:flex-start;gap:10px;padding:9px;border-radius:8px;transition:background .15s;cursor:pointer;}
.vi:hover{background:var(--bg);}.vi.chk{background:var(--accent-light);}
.vi input[type=checkbox]{width:15px;height:15px;margin-top:2px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
.vt{width:70px;min-width:70px;aspect-ratio:16/9;border-radius:5px;background:#dde0e6;overflow:hidden;position:relative;flex-shrink:0;}
.vt img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.vtf{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;color:#b0b4bc;}
.vn{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:3px;}
.vm{font-size:11px;color:var(--text-muted);}
.bdg{display:inline-flex;align-items:center;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;font-family:var(--mono);}
.bi{background:var(--accent-light);color:var(--accent);}
.bdr{background:#fef3c7;color:#92400e;}
.bp2{background:var(--success-light);color:#065f46;}
.pc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:15px;display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.pi{width:38px;height:38px;border-radius:9px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.pn{font-size:14px;font-weight:600;margin-bottom:3px;}
.pm{font-size:12px;color:var(--text-sub);margin-bottom:7px;}
.pu{font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 9px;color:var(--accent);word-break:break-all;display:flex;align-items:center;gap:7px;}
.pa{display:flex;gap:6px;margin-top:9px;}
.sb{background:var(--accent);color:#fff;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:13px;position:sticky;top:0;z-index:10;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 13px;cursor:pointer;font-size:12px;color:var(--text-sub);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
/* サムネイル行 */
.tr{display:flex;gap:10px;align-items:flex-start;padding:12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;background:var(--white);}
.tp{width:96px;min-width:96px;aspect-ratio:16/9;border-radius:6px;background:#dde0e6;overflow:hidden;position:relative;flex-shrink:0;}
.tp img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.tpf{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:#b0b4bc;}
.ti{flex:1;min-width:0;}
.tit{font-size:12px;font-weight:500;margin-bottom:6px;line-height:1.4;}
.tir{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tir .fi{font-size:12px;padding:5px 8px;}
/* ファイルアップロードボタン */
.upload-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;border:1px dashed var(--border);background:var(--bg);font-size:12px;cursor:pointer;color:var(--text-sub);transition:all .15s;white-space:nowrap;}
.upload-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.upload-btn input{display:none;}
/* アップロード進捗 */
.uprog{font-size:11px;color:var(--accent);margin-top:3px;display:none;}
/* フォルダ選択パネル（サムネイル用） */
.thumb-folder-panel{display:flex;gap:16px;align-items:flex-start;}
.thumb-folder-sidebar{width:220px;min-width:220px;background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.thumb-folder-search{padding:10px;}
.thumb-folder-search input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);outline:none;}
.thumb-folder-search input:focus{border-color:var(--accent);}
.thumb-folder-list{max-height:calc(100vh - 260px);overflow-y:auto;}
.tfl-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:12px;color:var(--text-sub);transition:all .15s;border-top:1px solid var(--border-light);}
.tfl-item:hover{background:var(--bg);color:var(--text);}
.tfl-item.active{background:var(--accent-light);color:var(--accent);font-weight:600;}
.tfl-initial{width:24px;height:24px;border-radius:5px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:10px;flex-shrink:0;}
.tfl-item.active .tfl-initial{background:var(--accent);color:#fff;}
.thumb-content{flex:1;min-width:0;}
/* モーダル */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.mo.open{display:flex;}
.mb{background:var(--white);border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.mt{font-size:16px;font-weight:700;margin-bottom:16px;}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;z-index:1000;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}.toast.suc{background:var(--success);}.toast.err{background:var(--danger);}
.load{text-align:center;padding:40px;color:var(--text-muted);}
@keyframes sp{to{transform:rotate(360deg);}}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px;}
.emp{text-align:center;padding:50px 20px;color:var(--text-muted);}
.ei{font-size:38px;opacity:.35;margin-bottom:10px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-bar"></div>hihaho Admin<span class="logo-badge">ADMIN</span></div>
  <div style="margin-left:auto">
    <button class="btn bs bsm" onclick="copyConsole()">📋 console</button>
  </div>
</header>

<aside>
  <div class="nav-s">管理</div>
  <div class="nav-i active" onclick="showPage('playlists',this)">📋 プレイリスト一覧</div>
  <div class="nav-i" onclick="showPage('create',this)">➕ 新規作成</div>
  <div class="divider"></div>
  <div class="nav-s">設定</div>
  <div class="nav-i" onclick="showPage('thumbnails',this)">🖼 サムネイル設定</div>
  <div class="divider"></div>
  <div class="nav-s">リンク</div>
  <div class="nav-i" onclick="window.open('https://cc-dev-ps7.web.app/hihaho-view/')">▶ プレイヤー</div>
</aside>

<main>
  <!-- プレイリスト一覧 -->
  <div class="page active" id="page-playlists">
    <div class="pt">📋 プレイリスト一覧</div>
    <div class="pd">発行済みの公開URLを管理します。</div>
    <div id="playlistList"><div class="load"><div class="spin"></div>読み込み中...</div></div>
  </div>

  <!-- 新規作成 -->
  <div class="page" id="page-create">
    <div class="pt">➕ 新規プレイリスト</div>
    <div class="pd">フォルダまたは動画を選んで公開URLを発行します。</div>
    <div class="card">
      <div class="ct">① プレイリスト名</div>
      <input class="fi" id="playlistName" placeholder="例：営業向けデモ動画" maxlength="60">
    </div>
    <div class="card">
      <div class="ct">② 選択モード</div>
      <div style="display:flex;gap:10px">
        <button class="btn bs" id="modeFolder" onclick="setMode('folder')" style="flex:1;justify-content:center">📁 フォルダで選ぶ</button>
        <button class="btn bs" id="modeVideo"  onclick="setMode('video')"  style="flex:1;justify-content:center">🎬 動画を個別に選ぶ</button>
      </div>
    </div>
    <div class="card" id="folderSel" style="display:none">
      <div class="ct">③ フォルダを選択（複数可）</div>
      <div id="folderGrid" class="g3"></div>
    </div>
    <div class="card" id="videoSel" style="display:none">
      <div class="ct">③ 動画を選択</div>
      <div id="folderTabs" class="tabs"></div>
      <div id="selectBar" class="sb" style="display:none">
        <span id="selectCount" style="font-weight:700">0件選択中</span>
        <button class="btn bsm" style="background:rgba(255,255,255,.2);color:#fff;border:none;margin-left:auto" onclick="clearSel()">クリア</button>
      </div>
      <div id="videoList"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn bs" onclick="resetCreate()">リセット</button>
      <button class="btn bp" id="publishBtn" onclick="publishPlaylist()" disabled>🚀 公開URLを発行</button>
    </div>
  </div>

  <!-- サムネイル設定 -->
  <div class="page" id="page-thumbnails">
    <div class="pt">🖼 サムネイル設定</div>
    <div class="pd">動画ごとにサムネイルを設定します。URLを入力するか、画像ファイルをアップロードしてください。</div>
    <!-- 左：フォルダ一覧 ／ 右：動画リスト -->
    <div class="thumb-folder-panel">
      <!-- 左サイドバー：フォルダ一覧 -->
      <div class="thumb-folder-sidebar">
        <div class="thumb-folder-search">
          <input type="text" id="thumbFolderSearch" placeholder="🔍 フォルダを検索…" oninput="filterThumbFolders(this.value)">
        </div>
        <div class="thumb-folder-list" id="thumbFolderList"></div>
      </div>
      <!-- 右：動画リスト -->
      <div class="thumb-content">
        <div id="thumbList">
          <div class="emp"><div class="ei">📁</div><p>左のフォルダを選択してください</p></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- 発行完了モーダル -->
<div class="mo" id="pubModal">
  <div class="mb">
    <div class="mt">🎉 公開URLを発行しました！</div>
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:5px">公開URL（クリックでコピー）</div>
      <div class="pu" style="cursor:pointer" onclick="copyPubUrl()">
        <span id="pubUrlText" style="flex:1;word-break:break-all">—</span>
        <span style="flex-shrink:0">📋</span>
      </div>
    </div>
    <div class="ma">
      <button class="btn bs" onclick="closeMo()">閉じる</button>
      <button class="btn bp" onclick="openPubUrl()">▶ 開く</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

const fbApp = initializeApp({
  apiKey:"AIzaSyDPlsAhtxbJBihy-EAHck9P7XbuMdzV0ds",
  authDomain:"cc-dev-ps7.firebaseapp.com",
  projectId:"cc-dev-ps7",
  storageBucket:"cc-dev-ps7.firebasestorage.app",
  messagingSenderId:"1029579090333",
  appId:"1:1029579090333:web:5a2ea499fec97c497f2774"
});
const db      = getFirestore(fbApp);
const storage = getStorage(fbApp);

const WORKER = 'https://hihaho-proxy.jumpei-omote.workers.dev';
const PLAYER = 'https://cc-dev-ps7.web.app/hihaho-view/';
const TBASE  = 'https://cc-dev-ps7.web.app/hihaho-player/thumbs';
const TEXT   = 'jpg';

let folders=[], videos=[], selF=new Set(), selV=new Set();
let mode=null, tabF=null, tabT=null, vmeta={}, clog=[];
let thumbFolderSearch=''; // フォルダ検索クエリ

const ol=console.log.bind(console);
console.log=(...a)=>{ol(...a);clog.push(a.join(' '));};
const log=m=>console.log('[admin] '+m);

Object.assign(window,{
  showPage,setMode,toggleF,toggleV,switchFTab,
  clearSel,publishPlaylist,resetCreate,closeMo,copyPubUrl,openPubUrl,
  deletePlaylist,copyUrl,previewThumb,saveThumbs,clearThumb,
  switchThumbFolder, filterThumbFolders, uploadThumb,
  copyConsole:()=>navigator.clipboard.writeText(clog.join('\n')||'（ログなし）').then(()=>toast('コピーしました','suc'))
});

async function api(p){
  const r=await fetch(WORKER+p,{headers:{Accept:'application/json'}});
  if(!r.ok) throw new Error('API '+r.status+' '+p);
  return r.json();
}

async function init(){
  try{
    const [fr,vr]=await Promise.all([api('/v2/video-container'),api('/v2/video')]);
    folders=fr.data||[]; videos=vr.data||[];
    log('F:'+folders.length+' V:'+videos.length);
    const sn=await getDocs(collection(db,'video_meta'));
    sn.forEach(d=>{vmeta[d.id]=d.data();});
    renderPlaylists();
    renderThumbFolderList(); // サムネイルフォルダリスト初期化
  }catch(e){toast('初期化エラー: '+e.message,'err');}
}

function turl(uuid){ return vmeta[uuid]?.thumbnailUrl||`${TBASE}/${uuid}.${TEXT}`; }

// ページ切替
function showPage(n,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.querySelectorAll('.nav-i').forEach(i=>i.classList.remove('active'));
  el?.classList.add('active');
  if(n==='playlists') renderPlaylists();
  if(n==='create')    renderFGrid();
  if(n==='thumbnails') renderThumbFolderList();
}

// =========================================================
// プレイリスト一覧
// =========================================================
async function renderPlaylists(){
  const el=document.getElementById('playlistList');
  el.innerHTML='<div class="load"><div class="spin"></div>読み込み中...</div>';
  try{
    const sn=await getDocs(collection(db,'playlists'));
    const list=[];sn.forEach(d=>list.push({id:d.id,...d.data()}));
    list.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    if(!list.length){
      el.innerHTML='<div class="emp"><div class="ei">📋</div><p>プレイリストがまだありません</p><p style="margin-top:8px;font-size:13px">「新規作成」から作成してください</p></div>';
      return;
    }
    el.innerHTML=list.map(p=>{
      const url=PLAYER+'?id='+p.id;
      const type=p.type==='folder'?`📁 ${(p.folderIds||[]).length}フォルダ`:`🎬 ${(p.videoIds||[]).length}本`;
      const date=p.createdAt?new Date(p.createdAt.seconds*1000).toLocaleDateString('ja'):'—';
      return `<div class="pc">
        <div class="pi">📋</div>
        <div style="flex:1;min-width:0">
          <div class="pn">${esc(p.name)}</div>
          <div class="pm">${type} ／ 作成日: ${date}</div>
          <div class="pu">
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${url}</span>
            <span style="cursor:pointer;flex-shrink:0" onclick="copyUrl('${url}')">📋</span>
          </div>
          <div class="pa">
            <button class="btn bs bsm" onclick="window.open('${url}')">▶ 開く</button>
            <button class="btn bs bsm" onclick="copyUrl('${url}')">📋 コピー</button>
            <button class="btn bd bsm" onclick="deletePlaylist('${p.id}')">🗑 削除</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }catch(e){el.innerHTML='<div class="emp"><div class="ei">⚠️</div><p>'+e.message+'</p></div>';}
}

// =========================================================
// 新規作成
// =========================================================
function setMode(m){
  mode=m;
  const bf=document.getElementById('modeFolder'), bv=document.getElementById('modeVideo');
  bf.className='btn '+(m==='folder'?'bp':'bs'); bf.style.flex='1'; bf.style.justifyContent='center';
  bv.className='btn '+(m==='video' ?'bp':'bs'); bv.style.flex='1'; bv.style.justifyContent='center';
  document.getElementById('folderSel').style.display=m==='folder'?'block':'none';
  document.getElementById('videoSel').style.display =m==='video' ?'block':'none';
  selF.clear(); selV.clear();
  if(m==='folder') renderFGrid();
  if(m==='video')  renderVTabs();
  updateBtn();
}

function renderFGrid(){
  const el=document.getElementById('folderGrid');
  if(!folders.length){el.innerHTML='<p style="color:var(--text-muted);font-size:13px">フォルダがありません</p>';return;}
  el.innerHTML=folders.map(f=>{
    const cnt=videos.filter(v=>v.video_container_id===f.id).length;
    const sel=selF.has(f.id);
    return `<div class="fc ${sel?'sel':''}" onclick="toggleF(${f.id})">
      <div class="fa">${f.name.charAt(0).toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div class="fn">${esc(f.name)}</div>
        <div class="fct">${cnt}本</div>
      </div>
      ${sel?'<span style="color:var(--accent);flex-shrink:0;font-size:14px">✓</span>':''}
    </div>`;
  }).join('');
}

function toggleF(id){selF.has(id)?selF.delete(id):selF.add(id);renderFGrid();updateBtn();}

function renderVTabs(){
  document.getElementById('folderTabs').innerHTML=folders.map(f=>
    `<div class="tab ${tabF===f.id?'active':''}" onclick="switchFTab(${f.id})">${esc(f.name)}</div>`
  ).join('');
  if(!tabF&&folders.length){tabF=folders[0].id;document.querySelector('#folderTabs .tab')?.classList.add('active');}
  renderVList();
}

function switchFTab(id){
  tabF=id;
  document.querySelectorAll('#folderTabs .tab').forEach(t=>t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderVList();
}

function renderVList(){
  const vs=videos.filter(v=>v.video_container_id===tabF);
  const sb=document.getElementById('selectBar');
  sb.style.display=selV.size>0?'flex':'none';
  document.getElementById('selectCount').textContent=selV.size+'件選択中';
  document.getElementById('videoList').innerHTML=vs.map(v=>{
    const chk=selV.has(v.id);
    const bdg=v.status===2?'<span class="bdg bi">INTERACTIVE</span>':v.status===1?'<span class="bdg bp2">公開</span>':'<span class="bdg bdr">非公開</span>';
    return `<div class="vi ${chk?'chk':''}" onclick="toggleV(${v.id})">
      <input type="checkbox" ${chk?'checked':''} onclick="event.stopPropagation();toggleV(${v.id})">
      <div class="vt">
        <img src="${turl(v.uuid)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
        <div class="vtf" style="display:none">🎬</div>
      </div>
      <div>
        <div class="vn">${esc(v.display_name)}</div>
        <div class="vm">${fmt(v.created_at)} ${bdg}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleV(id){selV.has(id)?selV.delete(id):selV.add(id);renderVList();updateBtn();}
function clearSel(){selV.clear();renderVList();updateBtn();}

function updateBtn(){
  const n=document.getElementById('playlistName').value.trim();
  const h=mode==='folder'?selF.size>0:selV.size>0;
  document.getElementById('publishBtn').disabled=!n||!h;
}
document.getElementById('playlistName').addEventListener('input',updateBtn);

async function publishPlaylist(){
  const name=document.getElementById('playlistName').value.trim();
  if(!name){toast('プレイリスト名を入力してください','err');return;}
  const btn=document.getElementById('publishBtn');
  btn.disabled=true;btn.textContent='発行中...';
  try{
    const id=Math.random().toString(36).slice(2,10)+Date.now().toString(36);
    const data={name,createdAt:serverTimestamp(),type:mode};
    if(mode==='folder'){
      data.folderIds=[...selF];
      data.videoIds=videos.filter(v=>selF.has(v.video_container_id)).map(v=>v.id);
    }else{
      data.videoIds=[...selV];data.folderIds=[];
    }
    await setDoc(doc(db,'playlists',id),data);
    document.getElementById('pubUrlText').textContent=PLAYER+'?id='+id;
    document.getElementById('pubModal').classList.add('open');
    resetCreate();
    log('発行: '+id);
  }catch(e){toast('発行エラー: '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent='🚀 公開URLを発行';updateBtn();}
}

function closeMo(){document.getElementById('pubModal').classList.remove('open');}
function copyPubUrl(){navigator.clipboard.writeText(document.getElementById('pubUrlText').textContent).then(()=>toast('URLをコピーしました','suc'));}
function openPubUrl(){window.open(document.getElementById('pubUrlText').textContent);closeMo();}

function resetCreate(){
  document.getElementById('playlistName').value='';
  mode=null;selF.clear();selV.clear();tabF=null;
  ['modeFolder','modeVideo'].forEach(id=>{
    const b=document.getElementById(id);
    b.className='btn bs';b.style.flex='1';b.style.justifyContent='center';
  });
  document.getElementById('folderSel').style.display='none';
  document.getElementById('videoSel').style.display='none';
  updateBtn();
}

async function deletePlaylist(id){
  if(!confirm('このプレイリストを削除しますか？\n公開URLが無効になります。')) return;
  try{await deleteDoc(doc(db,'playlists',id));toast('削除しました','suc');renderPlaylists();}
  catch(e){toast('削除エラー: '+e.message,'err');}
}

function copyUrl(url){navigator.clipboard.writeText(url).then(()=>toast('URLをコピーしました','suc'));}

// =========================================================
// サムネイル設定：左フォルダリスト
// =========================================================
function renderThumbFolderList(){
  const q=thumbFolderSearch.toLowerCase();
  const filtered=q ? folders.filter(f=>f.name.toLowerCase().includes(q)) : folders;
  const el=document.getElementById('thumbFolderList');
  if(!filtered.length){
    el.innerHTML='<div style="padding:12px;font-size:12px;color:var(--text-muted)">見つかりません</div>';
    return;
  }
  el.innerHTML=filtered.map(f=>`
    <div class="tfl-item ${tabT===f.id?'active':''}" onclick="switchThumbFolder(${f.id})">
      <div class="tfl-initial">${f.name.charAt(0).toUpperCase()}</div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span><span style="font-size:10px;color:var(--text-muted);flex-shrink:0;font-family:var(--mono)">(${videos.filter(v=>v.video_container_id===f.id).length})</span>
    </div>`).join('');
}

function filterThumbFolders(q){
  thumbFolderSearch=q;
  renderThumbFolderList();
}

function switchThumbFolder(id){
  tabT=id;
  renderThumbFolderList();
  loadThumbVideos(id);
}

// =========================================================
// サムネイル設定：フォルダIDで動画を個別取得
// =========================================================
async function loadThumbVideos(folderId){
  const el=document.getElementById('thumbList');
  el.innerHTML='<div class="load"><div class="spin"></div>読み込み中...</div>';
  try{
    const res=await api('/v2/video?video_container_id='+folderId);
    const vs=res.data||[];
    renderThumbListWithVideos(vs);
  }catch(e){
    el.innerHTML='<div class="emp"><div class="ei">⚠️</div><p>'+e.message+'</p></div>';
  }
}

function renderThumbList(){
  if(!tabT) return;
  loadThumbVideos(tabT);
}

function renderThumbListWithVideos(vs){
  const el=document.getElementById('thumbList');
  if(!vs.length){
    el.innerHTML='<div class="emp"><div class="ei">🎬</div><p>このフォルダに動画はありません</p></div>';
    return;
  }
  el.innerHTML=vs.map(v=>{
    const cur=vmeta[v.uuid]?.thumbnailUrl||'';
    const disp=cur||`${TBASE}/${v.uuid}.${TEXT}`;
    return `<div class="tr" id="tr-${v.uuid}">
      <div class="tp">
        <img id="tpi-${v.uuid}" src="${disp}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
             style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">
        <div class="tpf" ${cur?'style="display:none"':''}>🎬</div>
      </div>
      <div class="ti">
        <div class="tit">${esc(v.display_name)}</div>
        <div class="tir">
          <input class="fi" id="tin-${v.uuid}" placeholder="https://example.com/image.jpg"
                 value="${esc(cur)}" oninput="previewThumb('${v.uuid}')">
          <button class="btn bp bsm" onclick="saveThumbs('${v.uuid}')">保存</button>
          <button class="btn bs bsm" onclick="clearThumb('${v.uuid}')">✕</button>
        </div>
        <!-- ファイルアップロード -->
        <div style="margin-top:6px;display:flex;align-items:center;gap:8px">
          <label class="upload-btn">
            📁 画像をアップロード
            <input type="file" accept="image/*" onchange="uploadThumb(event,'${v.uuid}')">
          </label>
          <span id="uprog-${v.uuid}" class="uprog">アップロード中...</span>
        </div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:4px;font-family:var(--mono)">${v.uuid}</div>
      </div>
    </div>`;
  }).join('');
}

function previewThumb(uuid){
  const url=document.getElementById('tin-'+uuid)?.value.trim();
  const img=document.getElementById('tpi-'+uuid);
  if(url&&img){img.src=url;img.style.display='';}
}

async function saveThumbs(uuid){
  const url=document.getElementById('tin-'+uuid)?.value.trim()||'';
  try{
    await setDoc(doc(db,'video_meta',uuid),{thumbnailUrl:url},{merge:true});
    vmeta[uuid]={...(vmeta[uuid]||{}),thumbnailUrl:url};
    toast('保存しました ✓','suc');
    const img=document.getElementById('tpi-'+uuid);
    if(img&&url){img.src=url;img.style.display='';}
  }catch(e){toast('保存エラー: '+e.message,'err');}
}

async function clearThumb(uuid){
  document.getElementById('tin-'+uuid).value='';
  try{
    await setDoc(doc(db,'video_meta',uuid),{thumbnailUrl:''},{merge:true});
    vmeta[uuid]={...(vmeta[uuid]||{}),thumbnailUrl:''};
    const img=document.getElementById('tpi-'+uuid);
    if(img){img.src=`${TBASE}/${uuid}.${TEXT}`;} // Firebase Hostingにフォールバック
    toast('クリアしました','suc');
  }catch(e){toast('エラー: '+e.message,'err');}
}

// =========================================================
// 画像アップロード → Firebase Storage → URLをFirestoreに保存
// =========================================================
async function uploadThumb(event, uuid){
  const file=event.target.files[0];
  if(!file) return;
  const prog=document.getElementById('uprog-'+uuid);
  if(prog){prog.style.display='inline';prog.textContent='アップロード中...';}
  try{
    // Firebase Storageにアップロード
    const ext=file.name.split('.').pop().toLowerCase()||'jpg';
    const storageRef=ref(storage,`hihaho-thumbs/${uuid}.${ext}`);
    await uploadBytes(storageRef, file);
    const downloadUrl=await getDownloadURL(storageRef);

    // Firestoreに保存
    await setDoc(doc(db,'video_meta',uuid),{thumbnailUrl:downloadUrl},{merge:true});
    vmeta[uuid]={...(vmeta[uuid]||{}),thumbnailUrl:downloadUrl};

    // UI更新
    const inp=document.getElementById('tin-'+uuid);
    const img=document.getElementById('tpi-'+uuid);
    if(inp) inp.value=downloadUrl;
    if(img){img.src=downloadUrl;img.style.display='';}
    if(prog){prog.style.display='none';}
    toast('アップロード完了 ✓','suc');
    log('サムネイルアップロード: '+uuid);
  }catch(e){
    if(prog){prog.style.display='none';}
    toast('アップロードエラー: '+e.message,'err');
  }
  event.target.value=''; // リセット
}

// =========================================================
// ユーティリティ
// =========================================================
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
const fmt=d=>{if(!d)return'—';const dt=new Date(d);return`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;};
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>el.classList.remove('show'),2800);
}

init();
</script>

</html>
