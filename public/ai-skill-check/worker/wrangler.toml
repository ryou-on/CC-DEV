# Cloudflare Worker 設定ファイル
# 既存の ai-skill-proxy（Claude APIプロキシ）を上書きデプロイする
# デプロイ先: https://ai-skill-proxy.junpei-omote.workers.dev

name = "ai-skill-proxy"
main = "src/worker.js"
compatibility_date = "2024-09-23"

# シークレットは wrangler secret put で設定（このファイルには書かない）
#   npx wrangler secret put CLAUDE_API_KEY      ... Anthropic APIキー
#   npx wrangler secret put STRIPE_SECRET_KEY   ... Stripeキー（制限付きキー rk_live_... 推奨）

[vars]
EXPECTED_AMOUNT = "500"
EXPECTED_CURRENCY = "jpy"
