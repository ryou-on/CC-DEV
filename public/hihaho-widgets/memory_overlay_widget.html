<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Core transparency settings for video overlay */
        body, html {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* HUD Container */
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            pointer-events: none; /* Let clicks pass through empty areas */
        }

        /* Actual interactive elements need pointer events */
        .interactive-area {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 90%;
            width: 400px;
        }

        /* Card Styling */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .card {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-front {
            border-color: #4ade80;
            box-shadow: 0 0 15px #4ade80;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card-back {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: rgba(255,255,255,0.5);
            font-size: 1.5rem;
        }

        .card-front {
            background: rgba(255, 255, 255, 0.9);
            color: #1e293b;
            transform: rotateY(180deg);
        }

        /* Text and UI */
        .hud-text {
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-restart {
            margin-top: 15px;
            background: rgba(59, 130, 246, 0.8);
            border: 1px solid rgba(147, 197, 253, 0.5);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .btn-restart:hover {
            background: rgba(37, 99, 235, 1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="interactive-area animate-pop">
            <div class="flex justify-between items-center mb-2 hud-text">
                <span>神経衰弱 (Memory)</span>
                <span id="moves">Moves: 0</span>
            </div>
            
            <div class="card-grid" id="grid">
                <!-- Cards generated by JS -->
            </div>

            <div class="flex justify-center w-full">
                <button class="btn-restart" onclick="initGame()">↻ Restart</button>
            </div>
        </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const movesElement = document.getElementById('moves');
        
        // Emoji set for high contrast visibility
        const items = ['🚀', '🌟', '💎', '🔥', '⚡', '🌙', '🍀', '🎵'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let isLocked = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            // Reset state
            gridElement.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            isLocked = false;
            movesElement.innerText = `Moves: 0`;

            // Create pairs and shuffle
            cards = [...items, ...items];
            cards = shuffle(cards);

            // Render grid
            cards.forEach((item, index) => {
                const cardContainer = document.createElement('div');
                cardContainer.classList.add('card');
                cardContainer.dataset.value = item;
                cardContainer.dataset.index = index;
                
                cardContainer.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">?</div>
                        <div class="card-front">${item}</div>
                    </div>
                `;

                cardContainer.addEventListener('click', () => flipCard(cardContainer));
                gridElement.appendChild(cardContainer);
            });
        }

        function flipCard(card) {
            if (isLocked) return;
            if (card.classList.contains('flipped')) return;
            if (flippedCards.length === 2) return;

            // Flip animation
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            moves++;
            movesElement.innerText = `Moves: ${moves}`;

            const [card1, card2] = flippedCards;
            const val1 = card1.dataset.value;
            const val2 = card2.dataset.value;

            if (val1 === val2) {
                // Match found
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                flippedCards = [];
                isLocked = false;

                if (matchedPairs === items.length) {
                    setTimeout(() => {
                        movesElement.innerText = "🎉 COMPLETE! 🎉";
                        movesElement.style.color = "#4ade80";
                    }, 500);
                }
            } else {
                // No match
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 1000);
            }
        }

        // Start game on load
        initGame();
    </script>
</body>
</html>
