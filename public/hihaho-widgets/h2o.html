<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H₂O</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  * { margin: 0; padding: 0; }
  body, html { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { display: block; width: 100% !important; height: 100% !important; cursor: grab; }
  canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<script>
(function() {
  // === Scene ===
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  document.body.appendChild(renderer.domElement);

  // === Lights ===
  scene.add(new THREE.AmbientLight(0x8899bb, 0.6));
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(5, 8, 5);
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0x4ea8ff, 0.3);
  fill.position.set(-3, -2, 4);
  scene.add(fill);
  const rim = new THREE.DirectionalLight(0xff8a4e, 0.2);
  rim.position.set(0, 5, -5);
  scene.add(rim);

  // === Helpers ===
  function atom(r, color) {
    return new THREE.Mesh(
      new THREE.SphereGeometry(r, 32, 32),
      new THREE.MeshPhysicalMaterial({ color, metalness: 0.1, roughness: 0.3, clearcoat: 0.4, clearcoatRoughness: 0.2 })
    );
  }
  function bond(s, e) {
    const d = new THREE.Vector3().subVectors(e, s);
    const mesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.06, d.length(), 8),
      new THREE.MeshPhysicalMaterial({ color: 0x888899, metalness: 0.2, roughness: 0.5 })
    );
    mesh.position.addVectors(s, e).multiplyScalar(0.5);
    mesh.lookAt(e);
    mesh.rotateX(Math.PI / 2);
    return mesh;
  }

  // === Model: H₂O ===
  const group = new THREE.Group();
  const O = atom(0.45, 0xef4444);
  group.add(O);

  const ang = 104.5 * Math.PI / 180;
  const bl = 0.96;
  const h1 = new THREE.Vector3(bl * Math.sin(ang / 2), bl * Math.cos(ang / 2), 0);
  const h2 = new THREE.Vector3(-bl * Math.sin(ang / 2), bl * Math.cos(ang / 2), 0);

  const H1 = atom(0.3, 0xfafafa); H1.position.copy(h1); group.add(H1);
  const H2 = atom(0.3, 0xfafafa); H2.position.copy(h2); group.add(H2);
  group.add(bond(new THREE.Vector3(), h1));
  group.add(bond(new THREE.Vector3(), h2));

  // Lone pair hints
  const lMat = new THREE.MeshBasicMaterial({ color: 0x4ea8ff, transparent: true, opacity: 0.15 });
  [[-0.4, -0.4, 0.4], [0.4, -0.4, 0.4]].forEach(p => {
    const lp = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), lMat);
    lp.position.set(...p); group.add(lp);
  });

  scene.add(group);

  // === Orbit Control (lightweight) ===
  let theta = 0.5, phi = 1.2, radius = 4;
  let tT = theta, tP = phi, tR = radius;
  let drag = false, px = 0, py = 0;

  function updateCam() {
    camera.position.set(
      radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.sin(theta)
    );
    camera.lookAt(0, 0, 0);
  }
  updateCam();

  const el = renderer.domElement;
  el.addEventListener('mousedown', e => { drag = true; px = e.clientX; py = e.clientY; });
  el.addEventListener('mousemove', e => {
    if (!drag) return;
    tT -= (e.clientX - px) * 0.008; tP = Math.max(0.15, Math.min(Math.PI - 0.15, tP + (e.clientY - py) * 0.008));
    px = e.clientX; py = e.clientY;
  });
  el.addEventListener('mouseup', () => drag = false);
  el.addEventListener('mouseleave', () => drag = false);
  el.addEventListener('wheel', e => { e.preventDefault(); tR = Math.max(2, Math.min(10, tR + e.deltaY * 0.005)); }, { passive: false });

  // Touch
  let td = 0;
  el.addEventListener('touchstart', e => { e.preventDefault(); if (e.touches.length === 1) { drag = true; px = e.touches[0].clientX; py = e.touches[0].clientY; } else if (e.touches.length === 2) td = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }, { passive: false });
  el.addEventListener('touchmove', e => { e.preventDefault(); if (e.touches.length === 1 && drag) { tT -= (e.touches[0].clientX - px) * 0.008; tP = Math.max(0.15, Math.min(Math.PI - 0.15, tP + (e.touches[0].clientY - py) * 0.008)); px = e.touches[0].clientX; py = e.touches[0].clientY; } else if (e.touches.length === 2) { const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); tR = Math.max(2, Math.min(10, tR - (d - td) * 0.02)); td = d; } }, { passive: false });
  el.addEventListener('touchend', () => drag = false);

  window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

  // === Animate ===
  (function loop() {
    requestAnimationFrame(loop);
    if (!drag) tT += 0.003;
    theta += (tT - theta) * 0.08;
    phi += (tP - phi) * 0.08;
    radius += (tR - radius) * 0.08;
    updateCam();
    renderer.render(scene, camera);
  })();
})();
</script>
</body>
</html>
