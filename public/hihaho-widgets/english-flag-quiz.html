<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Flag Quiz Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent !important;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Text Shadows for Video Visibility */
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .flag-container {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }
        
        .btn-option {
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-option:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .btn-option:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Animation Classes */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Feedback Colors */
        .correct-bg {
            background: rgba(34, 197, 94, 0.8) !important;
            border-color: #4ade80 !important;
        }

        .wrong-bg {
            background: rgba(239, 68, 68, 0.8) !important;
            border-color: #f87171 !important;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- Main Widget Container -->
    <div id="quiz-widget" class="glass-panel rounded-2xl w-full max-w-md mx-4 p-6 text-white fade-in relative">
        
        <!-- Header: Score & Timer -->
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center space-x-2">
                <span class="text-sm font-light tracking-widest uppercase text-cyan-300">Score</span>
                <span id="score-display" class="text-xl font-bold">0</span>
            </div>
            <div class="flex items-center space-x-2">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span id="timer-display" class="text-xl font-mono font-bold">15</span>
            </div>
        </div>

        <!-- Game Area -->
        <div id="game-area">
            <!-- Question -->
            <h2 class="text-center text-xl font-semibold mb-4 text-shadow">Which country is this?</h2>

            <!-- Flag Image -->
            <div class="flex justify-center mb-6 h-32 relative">
                <div id="flag-loader" class="absolute inset-0 flex items-center justify-center">
                    <div class="w-8 h-8 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <img id="flag-img" src="" alt="Flag" class="flag-container h-full object-contain rounded opacity-0 transition-opacity duration-300" onload="this.classList.remove('opacity-0'); document.getElementById('flag-loader').style.display='none';">
            </div>

            <!-- Options Grid -->
            <div id="options-container" class="grid grid-cols-2 gap-3">
                <!-- Buttons generated by JS -->
            </div>
        </div>

        <!-- Result Area (Hidden by default) -->
        <div id="result-area" class="hidden text-center py-4">
            <h2 class="text-3xl font-bold mb-2 text-shadow">Game Over!</h2>
            <p class="text-gray-200 mb-6">Your final score: <span id="final-score" class="text-cyan-300 font-bold text-2xl">0</span></p>
            <button onclick="restartGame()" class="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105">
                Play Again
            </button>
        </div>

        <!-- Footer Progress -->
        <div class="mt-6 w-full bg-gray-700/50 rounded-full h-1.5 overflow-hidden">
            <div id="progress-bar" class="bg-cyan-400 h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <script>
        // Quiz Data (Top 30 common flags for variety)
        const countries = [
            { code: 'us', name: 'United States' },
            { code: 'gb', name: 'United Kingdom' },
            { code: 'ca', name: 'Canada' },
            { code: 'au', name: 'Australia' },
            { code: 'jp', name: 'Japan' },
            { code: 'fr', name: 'France' },
            { code: 'de', name: 'Germany' },
            { code: 'it', name: 'Italy' },
            { code: 'br', name: 'Brazil' },
            { code: 'in', name: 'India' },
            { code: 'cn', name: 'China' },
            { code: 'kr', name: 'South Korea' },
            { code: 'es', name: 'Spain' },
            { code: 'mx', name: 'Mexico' },
            { code: 'ru', name: 'Russia' },
            { code: 'za', name: 'South Africa' },
            { code: 'ar', name: 'Argentina' },
            { code: 'ch', name: 'Switzerland' },
            { code: 'se', name: 'Sweden' },
            { code: 'nl', name: 'Netherlands' },
            { code: 'tr', name: 'Turkey' },
            { code: 'sa', name: 'Saudi Arabia' },
            { code: 'eg', name: 'Egypt' },
            { code: 'gr', name: 'Greece' },
            { code: 'pt', name: 'Portugal' },
            { code: 'vn', name: 'Vietnam' },
            { code: 'th', name: 'Thailand' },
            { code: 'id', name: 'Indonesia' },
            { code: 'ng', name: 'Nigeria' },
            { code: 'ke', name: 'Kenya' }
        ];

        let currentRound = 0;
        let score = 0;
        let maxRounds = 5;
        let timerInterval;
        let timeLeft = 15;
        let currentQuestion = null;

        const ui = {
            score: document.getElementById('score-display'),
            timer: document.getElementById('timer-display'),
            flag: document.getElementById('flag-img'),
            options: document.getElementById('options-container'),
            gameArea: document.getElementById('game-area'),
            resultArea: document.getElementById('result-area'),
            finalScore: document.getElementById('final-score'),
            progress: document.getElementById('progress-bar'),
            loader: document.getElementById('flag-loader')
        };

        function init() {
            restartGame();
        }

        function restartGame() {
            currentRound = 0;
            score = 0;
            ui.score.innerText = '0';
            ui.gameArea.classList.remove('hidden');
            ui.resultArea.classList.add('hidden');
            nextRound();
        }

        function nextRound() {
            if (currentRound >= maxRounds) {
                endGame();
                return;
            }

            currentRound++;
            ui.progress.style.width = `${(currentRound / maxRounds) * 100}%`;
            
            // Select random country
            const targetIndex = Math.floor(Math.random() * countries.length);
            const target = countries[targetIndex];
            currentQuestion = target;

            // Generate distractors
            let options = [target];
            while (options.length < 4) {
                const distractor = countries[Math.floor(Math.random() * countries.length)];
                if (!options.some(o => o.code === distractor.code)) {
                    options.push(distractor);
                }
            }
            
            // Shuffle options
            options = options.sort(() => Math.random() - 0.5);

            // Update UI
            ui.loader.style.display = 'flex';
            ui.flag.classList.add('opacity-0');
            ui.flag.src = `https://flagcdn.com/h240/${target.code}.png`;
            
            renderOptions(options, target);
            startTimer();
        }

        function renderOptions(options, target) {
            ui.options.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-option w-full py-3 px-2 rounded-lg text-sm font-semibold truncate';
                btn.innerText = opt.name;
                btn.onclick = () => checkAnswer(btn, opt.code === target.code);
                ui.options.appendChild(btn);
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 15;
            ui.timer.innerText = timeLeft;
            ui.timer.classList.remove('text-red-500');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                ui.timer.innerText = timeLeft;
                if (timeLeft <= 5) ui.timer.classList.add('text-red-500');
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function handleTimeout() {
             // Highlight correct answer automatically
            const buttons = ui.options.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === currentQuestion.name) {
                    btn.classList.add('correct-bg');
                }
            });
            setTimeout(nextRound, 1500);
        }

        function checkAnswer(btn, isCorrect) {
            clearInterval(timerInterval);
            
            const buttons = ui.options.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct-bg');
                score += 10 + Math.ceil(timeLeft / 2); // Bonus for speed
                ui.score.innerText = score;
                playAnimation('pop');
            } else {
                btn.classList.add('wrong-bg');
                document.getElementById('quiz-widget').classList.add('shake');
                setTimeout(() => document.getElementById('quiz-widget').classList.remove('shake'), 500);
                
                // Show correct one
                buttons.forEach(b => {
                    if (b.innerText === currentQuestion.name) b.classList.add('correct-bg');
                });
            }

            setTimeout(nextRound, 1500);
        }

        function endGame() {
            ui.gameArea.classList.add('hidden');
            ui.resultArea.classList.remove('hidden');
            ui.resultArea.classList.add('fade-in');
            ui.finalScore.innerText = score;
        }

        function playAnimation(type) {
            // Simple placeholder for visual feedback if needed
        }

        // Start
        init();
    </script>
</body>
</html>
