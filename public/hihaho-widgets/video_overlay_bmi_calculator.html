<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Rule 1: Transparent background */
        body {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Custom Input Styles to remove spinner on number inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(20, 20, 30, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Text Shadow for legibility against video */
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full">

    <!-- Main Widget Container -->
    <div class="glass-panel rounded-2xl p-6 w-[90%] max-w-[320px] transform transition-all hover:scale-[1.02]">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
            <h2 class="text-xl font-bold text-white text-shadow tracking-wide flex items-center gap-2">
                <svg class="w-5 h-5 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"></path>
                </svg>
                BMI CHECKER
            </h2>
            <span class="text-xs font-mono text-teal-300 bg-teal-900/50 px-2 py-0.5 rounded border border-teal-500/30">LIVE</span>
        </div>

        <!-- Inputs -->
        <div class="space-y-4">
            <div class="relative">
                <label class="block text-xs font-semibold text-gray-300 uppercase mb-1 ml-1 tracking-wider">身長 (Height)</label>
                <div class="relative">
                    <input type="number" id="height" placeholder="170" class="w-full bg-black/40 text-white border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-teal-400 focus:ring-1 focus:ring-teal-400 placeholder-gray-500 transition-colors text-lg font-mono">
                    <span class="absolute right-4 top-3.5 text-gray-400 text-sm font-bold">cm</span>
                </div>
            </div>

            <div class="relative">
                <label class="block text-xs font-semibold text-gray-300 uppercase mb-1 ml-1 tracking-wider">体重 (Weight)</label>
                <div class="relative">
                    <input type="number" id="weight" placeholder="65" class="w-full bg-black/40 text-white border border-white/20 rounded-lg px-4 py-3 focus:outline-none focus:border-teal-400 focus:ring-1 focus:ring-teal-400 placeholder-gray-500 transition-colors text-lg font-mono">
                    <span class="absolute right-4 top-3.5 text-gray-400 text-sm font-bold">kg</span>
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <button onclick="calculateBMI()" class="w-full mt-6 bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-400 hover:to-emerald-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition active:scale-95 border border-white/20">
            計算する (Calculate)
        </button>

        <!-- Result Area (Hidden initially) -->
        <div id="result" class="mt-6 hidden animate-fade-in">
            <div class="bg-white/5 rounded-xl p-4 border border-white/10 text-center">
                <p class="text-gray-400 text-xs uppercase tracking-widest mb-1">Your BMI</p>
                <div id="bmiValue" class="text-4xl font-black text-white text-shadow font-mono mb-2">--.-</div>
                <div id="bmiCategory" class="inline-block px-3 py-1 rounded-full text-xs font-bold text-white bg-gray-600 shadow-sm">
                    --
                </div>
            </div>
            <!-- Progress Bar Visualization -->
            <div class="mt-4 h-2 w-full bg-gray-700 rounded-full overflow-hidden relative">
                <div class="absolute w-1/4 h-full bg-blue-400 left-0"></div>
                <div class="absolute w-1/4 h-full bg-green-500 left-1/4"></div>
                <div class="absolute w-1/6 h-full bg-yellow-500 left-1/2"></div>
                <div class="absolute w-1/3 h-full bg-red-500 left-[66.66%]"></div>
                <!-- Indicator Marker -->
                <div id="bmiMarker" class="absolute h-full w-1 bg-white shadow-[0_0_8px_rgba(255,255,255,1)] transition-all duration-700 ease-out left-0 top-0 z-10"></div>
            </div>
            <div class="flex justify-between text-[10px] text-gray-400 mt-1 font-mono">
                <span>18.5</span>
                <span class="pl-2">25.0</span>
                <span>30.0</span>
            </div>
        </div>

    </div>

    <script>
        function calculateBMI() {
            const heightInput = document.getElementById('height');
            const weightInput = document.getElementById('weight');
            const resultDiv = document.getElementById('result');
            const bmiValueDiv = document.getElementById('bmiValue');
            const bmiCategoryDiv = document.getElementById('bmiCategory');
            const bmiMarker = document.getElementById('bmiMarker');

            const h = parseFloat(heightInput.value);
            const w = parseFloat(weightInput.value);

            if (!h || !w || h <= 0 || w <= 0) {
                // Flash inputs to indicate error
                heightInput.classList.add('animate-pulse', 'border-red-500');
                weightInput.classList.add('animate-pulse', 'border-red-500');
                setTimeout(() => {
                    heightInput.classList.remove('animate-pulse', 'border-red-500');
                    weightInput.classList.remove('animate-pulse', 'border-red-500');
                }, 1000);
                return;
            }

            // BMI Formula: kg / (m * m)
            const bmi = w / ((h / 100) * (h / 100));
            const bmiFormatted = bmi.toFixed(1);

            // Determine Category & Color
            let category = '';
            let colorClass = '';
            let positionPercent = 0;

            if (bmi < 18.5) {
                category = '低体重 (Underweight)';
                colorClass = 'bg-blue-500';
                // Scale 0-18.5 maps to 0-25%
                positionPercent = (bmi / 18.5) * 25;
            } else if (bmi < 25) {
                category = '普通体重 (Normal)';
                colorClass = 'bg-green-500';
                // Scale 18.5-25 maps to 25-50%
                positionPercent = 25 + ((bmi - 18.5) / (25 - 18.5)) * 25;
            } else if (bmi < 30) {
                category = '肥満 (1度) (Overweight)';
                colorClass = 'bg-yellow-500';
                // Scale 25-30 maps to 50-66%
                positionPercent = 50 + ((bmi - 25) / (30 - 25)) * 16.6;
            } else {
                category = '肥満 (2度以上) (Obese)';
                colorClass = 'bg-red-500';
                // Scale 30-40 maps to 66-100% (clamped at 100)
                positionPercent = 66.6 + ((bmi - 30) / 10) * 33.3;
            }

            // Clamp percentage
            if (positionPercent > 100) positionPercent = 100;
            if (positionPercent < 0) positionPercent = 0;

            // Update UI
            resultDiv.classList.remove('hidden');
            bmiValueDiv.innerText = bmiFormatted;
            
            bmiCategoryDiv.innerText = category;
            bmiCategoryDiv.className = `inline-block px-3 py-1 rounded-full text-xs font-bold text-white shadow-sm transition-colors duration-300 ${colorClass}`;
            
            // Animate marker
            setTimeout(() => {
                bmiMarker.style.left = `${positionPercent}%`;
            }, 50);
        }

        // Optional: Trigger on Enter key
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                calculateBMI();
            }
        });
    </script>
</body>
</html>
