<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisheye Lens Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }

        /* UI Container: content passes through, controls capture clicks */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 2rem;
            z-index: 50;
        }

        /* The Lens Element */
        #lens {
            position: absolute;
            top: 0;
            left: 0;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
            z-index: 40;
            /* Glass / Lens Effect */
            box-shadow: 
                0 0 0 2px rgba(255, 255, 255, 0.3), /* Outer ring */
                inset 0 0 40px rgba(0, 0, 0, 0.2), /* Inner depth */
                inset 0 0 10px rgba(255, 255, 255, 0.5), /* Highlight */
                0 10px 20px rgba(0,0,0,0.3); /* Drop shadow */
            
            /* 
               NOTE: True geometric fisheye distortion of the background 
               requires WebGL. We simulate the 'focus' effect using 
               backdrop-filter to make the content inside pop out.
            */
            backdrop-filter: brightness(1.2) contrast(1.1) saturate(1.2);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.0) 60%);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Lens Overlay Grid/Crosshair for 'Tech' feel */
        #lens::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            border-radius: 50%;
            opacity: 0.5;
            /* Simulating spherical distortion on the grid itself */
            transform: scale(1.2);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 80%);
        }

        /* Active State */
        #lens.active {
            transform: translate(-50%, -50%) scale(1);
        }

        /* Toggle Button Styles */
        .toggle-btn {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 32px;
            border-radius: 9999px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .toggle-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            border-color: rgba(0, 255, 255, 0.5);
        }

        .toggle-btn.active {
            background: rgba(0, 255, 255, 0.15);
            border-color: #00eaff;
            color: #00eaff;
            text-shadow: 0 0 8px #00eaff;
            box-shadow: 0 0 20px rgba(0, 234, 255, 0.3);
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #555;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .toggle-btn.active .indicator {
            background-color: #00ffaa;
            box-shadow: 0 0 8px #00ffaa;
        }

        /* Distortion SVG Filter (Optional visual enhancement) */
        .svg-filters {
            position: absolute;
            width: 0;
            height: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- The Lens Widget -->
    <div id="lens"></div>

    <!-- UI Controls Layer -->
    <div id="ui-layer">
        <button id="toggleBtn" class="toggle-btn">
            <span class="indicator"></span>
            <span>Fisheye Lens</span>
        </button>
    </div>

    <script>
        const lens = document.getElementById('lens');
        const toggleBtn = document.getElementById('toggleBtn');
        let isActive = false;

        // Toggle Function
        toggleBtn.addEventListener('click', () => {
            isActive = !isActive;
            if (isActive) {
                toggleBtn.classList.add('active');
                lens.classList.add('active');
            } else {
                toggleBtn.classList.remove('active');
                lens.classList.remove('active');
            }
        });

        // Mouse Movement Logic
        document.addEventListener('mousemove', (e) => {
            if (!isActive) return;

            // Smoothly move the lens to cursor position
            // Using requestAnimationFrame for performance is implied by direct style updates here being minimal
            lens.style.left = e.clientX + 'px';
            lens.style.top = e.clientY + 'px';
        });

        // Ensure lens stays within bounds logically or hides if mouse leaves window
        document.addEventListener('mouseleave', () => {
            if (isActive) lens.style.opacity = '0';
        });
        document.addEventListener('mouseenter', () => {
            if (isActive) lens.style.opacity = '1';
        });

    </script>
</body>
</html>
