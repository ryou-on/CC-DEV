<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pop Fidget Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            background: transparent !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        /* Glassmorphism Container */
        .glass-panel {
            background: rgba(16, 16, 32, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Neon Text */
        .neon-text {
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #0ff,
                0 0 40px #0ff;
        }

        /* Bubble Styles */
        .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9), rgba(0, 255, 255, 0.4));
            box-shadow: 
                inset 0 0 10px rgba(0, 255, 255, 0.6),
                0 0 10px rgba(0, 255, 255, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .bubble:hover {
            transform: scale(1.1);
            box-shadow: 
                inset 0 0 15px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.6);
        }

        .bubble:active {
            transform: scale(0.9);
        }

        /* Popped State */
        .bubble.popped {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            transform: scale(0.8);
            pointer-events: none;
        }

        /* Float Animation for particle text */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-30px) scale(1.2); opacity: 0; }
        }

        .float-text {
            position: absolute;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            font-weight: bold;
            color: #ff00de;
            text-shadow: 0 0 5px #ff00de;
            z-index: 50;
        }

        /* Scrollbar hide */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Minimized State */
        .minimized .content-area {
            display: none;
        }
    </style>
</head>
<body class="pointer-events-none flex items-end justify-end p-4">

    <!-- Main Widget Container -->
    <!-- pointer-events-auto is crucial to interact while body is transparent/pass-through -->
    <div id="widget" class="pointer-events-auto glass-panel rounded-xl flex flex-col transition-all duration-300 ease-in-out w-64 sm:w-72">
        
        <!-- Header / Stats -->
        <div class="flex justify-between items-center p-3 border-b border-white/10 bg-black/20 rounded-t-xl cursor-grab active:cursor-grabbing" id="drag-handle">
            <div class="flex flex-col">
                <span class="text-xs text-gray-300 uppercase tracking-wider">Score</span>
                <span id="score" class="text-xl font-bold neon-text">0</span>
            </div>
            <div class="flex gap-2">
                <button id="reset-btn" class="p-1.5 hover:bg-white/10 rounded-full transition text-cyan-400" title="Reset">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/></svg>
                </button>
                <button id="minimize-btn" class="p-1.5 hover:bg-white/10 rounded-full transition text-gray-300">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/></svg>
                </button>
            </div>
        </div>

        <!-- Game Area -->
        <div id="content-area" class="content-area p-4">
            <div class="grid grid-cols-5 gap-3" id="bubble-grid">
                <!-- Bubbles generated by JS -->
            </div>
            <div class="mt-3 text-center">
                <p class="text-[10px] text-gray-400">AUTO-REFILL IN <span id="timer" class="text-cyan-300">3s</span></p>
            </div>
        </div>

    </div>

    <script>
        const grid = document.getElementById('bubble-grid');
        const scoreEl = document.getElementById('score');
        const widget = document.getElementById('widget');
        const minimizeBtn = document.getElementById('minimize-btn');
        const contentArea = document.getElementById('content-area');
        const resetBtn = document.getElementById('reset-btn');
        const timerEl = document.getElementById('timer');

        let score = 0;
        let poppedCount = 0;
        const totalBubbles = 25; // 5x5 grid
        let isRefilling = false;
        let refillTimer = null;

        // Initialize Grid
        function initGrid() {
            grid.innerHTML = '';
            poppedCount = 0;
            isRefilling = false;
            clearTimeout(refillTimer);
            timerEl.innerText = 'READY';
            
            for (let i = 0; i < totalBubbles; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble w-8 h-8 rounded-full';
                bubble.dataset.index = i;
                bubble.onclick = (e) => popBubble(e, bubble);
                grid.appendChild(bubble);
            }
        }

        // Pop Logic
        function popBubble(e, bubble) {
            if (bubble.classList.contains('popped')) return;
            
            // Visual update
            bubble.classList.add('popped');
            score += 10;
            poppedCount++;
            
            // Update UI
            updateScore();
            spawnFloatingText(e.clientX, e.clientY, '+10');

            // Trigger refill logic if all popped
            if (poppedCount === totalBubbles) {
                startRefillCountdown();
            }
        }

        // Refill Countdown
        function startRefillCountdown() {
            if (isRefilling) return;
            isRefilling = true;
            
            let timeLeft = 3;
            timerEl.innerText = `${timeLeft}s`;
            
            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerEl.innerText = 'REFILLING...';
                    // Slight delay for effect
                    setTimeout(initGrid, 200);
                } else {
                    timerEl.innerText = `${timeLeft}s`;
                }
            }, 1000);
        }

        // Floating Text Effect
        function spawnFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'float-text text-sm';
            el.innerText = text;
            // Adjust position relative to widget if needed, but fixed body works for overlay
            // Since body is pointer-events-none, we append to body but position absolutely
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            document.body.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, 800);
        }

        function updateScore() {
            scoreEl.innerText = score.toLocaleString();
        }

        // Controls
        let isMinimized = false;
        minimizeBtn.onclick = () => {
            isMinimized = !isMinimized;
            if (isMinimized) {
                contentArea.style.display = 'none';
                widget.classList.remove('w-64', 'sm:w-72');
                widget.classList.add('w-auto');
                minimizeBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
            } else {
                contentArea.style.display = 'block';
                widget.classList.add('w-64', 'sm:w-72');
                widget.classList.remove('w-auto');
                minimizeBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/></svg>';
            }
        };

        resetBtn.onclick = () => {
            score = 0;
            updateScore();
            initGrid();
        };

        // Initialize
        initGrid();

    </script>
</body>
</html>
