<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Feedback Overlay - Playback Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Glassmorphism Base */
        .glass {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            color: white;
        }

        /* High Contrast Text */
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* Markers on Video */
        .marker {
            position: absolute;
            width: 28px;
            height: 28px;
            background: rgba(0, 255, 204, 0.9);
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }

        /* Visible state managed by JS based on time */
        .marker.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .marker:hover {
            transform: translate(-50%, -50%) scale(1.2);
            background: #fff;
            z-index: 40;
        }

        .marker i {
            color: #000;
            font-size: 12px;
        }

        /* Tooltip for comments - Always visible when marker is visible in this mode? 
           Or just on hover. Let's keep hover for cleanliness, but make it pop immediately. */
        .tooltip {
            visibility: hidden;
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            font-size: 13px;
            z-index: 50;
            border: 1px solid rgba(0, 255, 204, 0.3);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            width: max-content;
            max-width: 200px;
        }

        .marker:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* Animation */
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .animate-pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        /* Input styling reset */
        input[type="text"], input[type="number"] {
            appearance: none;
            -moz-appearance: none;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <!-- Click Capture Layer -->
    <div id="click-layer" class="absolute inset-0 z-10 cursor-crosshair"></div>

    <!-- Container for Markers -->
    <div id="markers-container" class="absolute inset-0 pointer-events-none z-20"></div>

    <!-- Input Modal (Floating) -->
    <div id="input-modal" class="hidden fixed z-50 glass rounded-lg p-4 w-72 animate-pop flex-col gap-3">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="far fa-clock text-cyan-400"></i>
                <!-- Editable timestamp for new comment -->
                <input type="text" id="modal-time-input" class="bg-transparent border-b border-gray-600 text-cyan-300 font-mono text-sm w-16 focus:outline-none focus:border-cyan-400 text-center" value="00:00">
            </div>
            <button id="close-modal" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
        <textarea id="comment-input" class="w-full bg-black/40 border border-gray-600 rounded p-2 text-white text-sm focus:outline-none focus:border-cyan-400 placeholder-gray-500 resize-none" rows="3" placeholder="コメントを入力..."></textarea>
        <button id="save-comment" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-2 rounded text-sm font-bold transition shadow-md">保存</button>
    </div>

    <!-- Main Control Panel -->
    <div class="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-96 glass rounded-xl p-5 z-40 flex flex-col gap-4 transition-all duration-300" id="control-panel">
        
        <!-- Header / Time Control -->
        <div class="flex justify-between items-end">
            <div class="flex items-center gap-4">
                <!-- Play/Pause Button -->
                <button id="toggle-play" class="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 flex items-center justify-center text-white transition shadow-lg border border-white/20">
                    <i class="fas fa-play ml-1" id="play-icon"></i>
                </button>
                
                <!-- Editable Time Display -->
                <div class="flex flex-col">
                    <label class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Current Time</label>
                    <input type="text" id="current-time-input" value="00:00" class="bg-transparent border-b-2 border-gray-600 hover:border-gray-400 focus:border-cyan-400 text-3xl font-mono font-bold text-white text-shadow w-28 focus:outline-none transition-colors placeholder-gray-700">
                </div>
            </div>

            <!-- Display Duration Settings -->
            <div class="flex flex-col items-end gap-1">
                <label class="text-[10px] text-gray-400">表示時間(秒)</label>
                <div class="flex items-center bg-black/30 rounded border border-gray-600 px-2 py-1">
                    <i class="fas fa-stopwatch text-xs text-gray-400 mr-2"></i>
                    <input type="number" id="duration-input" value="10" min="1" class="w-10 bg-transparent text-right text-white text-sm focus:outline-none">
                </div>
            </div>
        </div>

        <!-- Tools Row -->
        <div class="flex items-center gap-2 border-t border-gray-700 pt-3">
             <button id="toggle-list" class="p-2 text-gray-400 hover:text-white transition" title="リスト表示">
                <i class="fas fa-list"></i>
            </button>
            <div class="h-4 w-px bg-gray-700 mx-1"></div>
            
            <!-- JSON Actions -->
            <button id="export-json" class="text-xs bg-gray-800 hover:bg-gray-700 text-white py-1 px-3 rounded flex items-center gap-2 transition border border-gray-600">
                <i class="fas fa-download"></i> 出力
            </button>
            <label class="text-xs bg-gray-800 hover:bg-gray-700 text-white py-1 px-3 rounded flex items-center gap-2 cursor-pointer transition border border-gray-600">
                <i class="fas fa-upload"></i> 読込
                <input type="file" id="import-json" accept=".json" class="hidden">
            </label>
            
            <div class="flex-grow"></div>
            <button id="clear-all" class="text-xs text-red-400 hover:text-red-300 flex items-center gap-1 transition">
                <i class="fas fa-trash"></i> クリア
            </button>
        </div>

        <!-- Comment List (Collapsible) -->
        <div id="comment-list-container" class="hidden flex-col gap-2 max-h-48 overflow-y-auto mt-2 bg-black/20 rounded p-2">
            <p class="text-center text-gray-500 text-xs py-2">コメントはまだありません</p>
        </div>
    </div>

    <script>
        // State
        let isPlaying = false;
        let currentTime = 0;
        let playInterval = null;
        let feedbacks = [];
        let tempClickData = null;
        let displayDuration = 10; // Default 10s

        // DOM Elements
        const clickLayer = document.getElementById('click-layer');
        const markersContainer = document.getElementById('markers-container');
        const inputModal = document.getElementById('input-modal');
        const commentInput = document.getElementById('comment-input');
        const modalTimeInput = document.getElementById('modal-time-input');
        const saveBtn = document.getElementById('save-comment');
        const closeModalBtn = document.getElementById('close-modal');
        
        const currentTimeInput = document.getElementById('current-time-input');
        const togglePlayBtn = document.getElementById('toggle-play');
        const playIcon = document.getElementById('play-icon');
        const durationInput = document.getElementById('duration-input');
        
        const exportBtn = document.getElementById('export-json');
        const importInput = document.getElementById('import-json');
        const listContainer = document.getElementById('comment-list-container');
        const toggleListBtn = document.getElementById('toggle-list');
        const clearBtn = document.getElementById('clear-all');

        // Utility: Format Seconds to MM:SS
        const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        // Utility: Parse MM:SS or S to Seconds
        const parseTime = (timeStr) => {
            if (!timeStr) return 0;
            const parts = timeStr.toString().split(':');
            if (parts.length === 2) {
                return parseInt(parts[0]) * 60 + parseInt(parts[1]);
            }
            return parseInt(timeStr) || 0;
        };

        // Update Duration Setting
        durationInput.addEventListener('change', (e) => {
            const val = parseInt(e.target.value);
            if(val > 0) {
                displayDuration = val;
                updateVisibility();
            }
        });

        // Time Logic: Update State & UI
        const updateTime = (newTime) => {
            currentTime = newTime;
            // Only update input if not focused (to allow typing)
            if (document.activeElement !== currentTimeInput) {
                currentTimeInput.value = formatTime(currentTime);
            }
            updateVisibility();
        };

        // Time Logic: Play/Pause Simulation
        const togglePlay = () => {
            if (isPlaying) {
                // Pause
                clearInterval(playInterval);
                isPlaying = false;
                playIcon.classList.remove('fa-pause');
                playIcon.classList.add('fa-play', 'ml-1');
                togglePlayBtn.classList.remove('shadow-[0_0_15px_rgba(0,255,255,0.5)]');
            } else {
                // Play
                playInterval = setInterval(() => {
                    updateTime(currentTime + 1);
                }, 1000); // 1 real second = 1 video second simulation
                isPlaying = true;
                playIcon.classList.remove('fa-play', 'ml-1');
                playIcon.classList.add('fa-pause');
                togglePlayBtn.classList.add('shadow-[0_0_15px_rgba(0,255,255,0.5)]');
            }
        };

        togglePlayBtn.addEventListener('click', togglePlay);

        // Time Logic: Manual Input Handling
        currentTimeInput.addEventListener('change', () => {
            const seconds = parseTime(currentTimeInput.value);
            currentTime = seconds;
            currentTimeInput.value = formatTime(seconds); // Re-format cleanly
            updateVisibility();
        });

        currentTimeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') currentTimeInput.blur();
        });

        // Click on Screen -> Open Modal
        clickLayer.addEventListener('click', (e) => {
            if (isPlaying) togglePlay(); // Auto pause on interaction

            const rect = clickLayer.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            
            tempClickData = { x, y };
            
            // Position Modal
            const modalX = Math.min(e.clientX + 10, window.innerWidth - 300);
            const modalY = Math.min(e.clientY + 10, window.innerHeight - 250);
            
            inputModal.style.left = modalX + 'px';
            inputModal.style.top = modalY + 'px';
            inputModal.classList.remove('hidden');
            inputModal.classList.add('flex');
            
            // Set modal time to current time, allowing edits
            modalTimeInput.value = formatTime(currentTime);
            
            commentInput.value = '';
            commentInput.focus();
        });

        // Save Comment
        saveBtn.addEventListener('click', () => {
            const text = commentInput.value.trim();
            if (!text) return;

            const commentTime = parseTime(modalTimeInput.value);

            const feedback = {
                id: Date.now().toString(),
                time: commentTime,
                x: tempClickData.x,
                y: tempClickData.y,
                text: text
            };

            feedbacks.push(feedback);
            renderMarkers(); // Re-render all
            renderList();
            closeModal();
        });

        const closeModal = () => {
            inputModal.classList.add('hidden');
            inputModal.classList.remove('flex');
            tempClickData = null;
        };

        closeModalBtn.addEventListener('click', closeModal);

        // Render All Markers (Initially hidden)
        const renderMarkers = () => {
            markersContainer.innerHTML = '';
            feedbacks.forEach(fb => {
                const el = document.createElement('div');
                el.className = 'marker'; // Default hidden via opacity: 0
                el.dataset.id = fb.id;
                el.style.left = `${fb.x}%`;
                el.style.top = `${fb.y}%`;
                el.innerHTML = `
                    <i class="fas fa-comment"></i>
                    <div class="tooltip">
                        <div class="border-b border-gray-600 mb-1 pb-1 flex justify-between items-center text-xs text-cyan-300">
                            <span class="font-mono">${formatTime(fb.time)}</span>
                        </div>
                        ${fb.text}
                    </div>
                `;
                
                // Click marker to jump time slightly or edit (Future enhancement)
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // alert(fb.text);
                });

                markersContainer.appendChild(el);
            });
            updateVisibility();
        };

        // Visibility Logic: The Core Requirement
        const updateVisibility = () => {
            const markers = document.querySelectorAll('.marker');
            markers.forEach(el => {
                const id = el.dataset.id;
                const fb = feedbacks.find(f => f.id === id);
                if (!fb) return;

                // Display if currentTime is within [startTime, startTime + duration]
                if (currentTime >= fb.time && currentTime <= (fb.time + displayDuration)) {
                    el.classList.add('visible');
                } else {
                    el.classList.remove('visible');
                }
            });
        };

        // Render List
        const renderList = () => {
            listContainer.innerHTML = '';
            if (feedbacks.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-500 text-xs py-2">コメントなし</p>';
                return;
            }
            
            // Sort by time
            const sorted = [...feedbacks].sort((a, b) => a.time - b.time);
            
            sorted.forEach(fb => {
                const item = document.createElement('div');
                item.className = 'bg-white/5 border border-white/10 p-2 rounded text-xs flex justify-between items-start hover:bg-white/10 transition cursor-pointer group';
                item.innerHTML = `
                    <div class="flex gap-2">
                        <span class="text-cyan-400 font-mono font-bold whitespace-nowrap">${formatTime(fb.time)}</span>
                        <span class="text-gray-200 line-clamp-2">${fb.text}</span>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                        <button class="text-blue-400 hover:text-blue-300" onclick="jumpTo(${fb.time})">
                            <i class="fas fa-crosshairs"></i>
                        </button>
                        <button class="text-red-400 hover:text-red-300" onclick="deleteFeedback('${fb.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        };

        // Global Actions
        window.jumpTo = (time) => {
            updateTime(time);
            if(!isPlaying) {
                // Flash effect maybe?
            }
        };

        window.deleteFeedback = (id) => {
            if(!confirm('削除しますか？')) return;
            feedbacks = feedbacks.filter(f => f.id !== id);
            renderMarkers();
            renderList();
        };

        toggleListBtn.addEventListener('click', () => {
            listContainer.classList.toggle('hidden');
            listContainer.classList.toggle('flex');
        });

        clearBtn.addEventListener('click', () => {
            if(confirm('全てのデータをクリアしますか？')) {
                feedbacks = [];
                renderMarkers();
                renderList();
                updateTime(0);
                if(isPlaying) togglePlay();
            }
        });

        // JSON Export
        exportBtn.addEventListener('click', () => {
            const data = {
                meta: {
                    created: Date.now(),
                    durationSetting: displayDuration
                },
                comments: feedbacks
            };
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `feedback_timeline_${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // JSON Import
        importInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const json = JSON.parse(event.target.result);
                    
                    // Support both raw array (legacy) and new object format
                    let newFeedbacks = [];
                    if (Array.isArray(json)) {
                        newFeedbacks = json;
                    } else if (json.comments && Array.isArray(json.comments)) {
                        newFeedbacks = json.comments;
                        if(json.meta && json.meta.durationSetting) {
                            displayDuration = json.meta.durationSetting;
                            durationInput.value = displayDuration;
                        }
                    }

                    if (newFeedbacks.length > 0) {
                        feedbacks = newFeedbacks;
                        renderMarkers();
                        renderList();
                        alert(`${feedbacks.length}件のコメントを読み込みました。`);
                    } else {
                        alert('有効なデータが見つかりませんでした。');
                    }
                } catch (err) {
                    console.error(err);
                    alert('JSONの読み込みに失敗しました。');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

    </script>
</body>
</html>
