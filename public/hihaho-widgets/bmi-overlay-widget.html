<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Custom Slider Styling for Visibility */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            border: 2px solid #3b82f6;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* Glassmorphism Container */
        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .text-glow {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Main Widget Container -->
    <div class="glass-panel rounded-2xl p-6 w-full max-w-sm text-white transition-all duration-300">
        <h2 class="text-xl font-bold mb-6 text-center text-glow tracking-wider uppercase border-b border-white/20 pb-2">
            BMI Checker
        </h2>

        <!-- Height Input -->
        <div class="mb-6">
            <div class="flex justify-between items-end mb-2">
                <label class="text-sm font-medium text-gray-300 text-glow">身長 (Height)</label>
                <span class="text-xl font-bold text-blue-400 text-glow"><span id="heightVal">170</span> <span class="text-xs text-white">cm</span></span>
            </div>
            <input type="range" id="heightRange" min="100" max="220" value="170" class="w-full">
        </div>

        <!-- Weight Input -->
        <div class="mb-8">
            <div class="flex justify-between items-end mb-2">
                <label class="text-sm font-medium text-gray-300 text-glow">体重 (Weight)</label>
                <span class="text-xl font-bold text-green-400 text-glow"><span id="weightVal">65</span> <span class="text-xs text-white">kg</span></span>
            </div>
            <input type="range" id="weightRange" min="30" max="150" value="65" class="w-full">
        </div>

        <!-- Result Display -->
        <div class="text-center bg-white/10 rounded-xl p-4 border border-white/5">
            <div class="text-xs text-gray-300 mb-1 uppercase tracking-widest">Result</div>
            <div class="text-5xl font-black mb-2 text-glow transition-colors duration-300" id="bmiResult">22.5</div>
            <div class="text-lg font-bold px-3 py-1 rounded-full inline-block text-glow transition-colors duration-300" id="bmiCategory">
                Normal
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const heightInput = document.getElementById('heightRange');
            const weightInput = document.getElementById('weightRange');
            const heightDisplay = document.getElementById('heightVal');
            const weightDisplay = document.getElementById('weightVal');
            const bmiResultDisplay = document.getElementById('bmiResult');
            const bmiCategoryDisplay = document.getElementById('bmiCategory');

            function calculateBMI() {
                const heightCm = parseInt(heightInput.value);
                const weightKg = parseInt(weightInput.value);

                // Update displays
                heightDisplay.textContent = heightCm;
                weightDisplay.textContent = weightKg;

                // Calculation
                const heightM = heightCm / 100;
                const bmi = (weightKg / (heightM * heightM)).toFixed(1);

                bmiResultDisplay.textContent = bmi;
                updateCategory(parseFloat(bmi));
            }

            function updateCategory(bmi) {
                let category = '';
                let colorClass = '';
                let textClass = '';

                // Reset classes
                bmiCategoryDisplay.className = 'text-lg font-bold px-4 py-1 rounded-full inline-block text-glow transition-colors duration-300';
                bmiResultDisplay.className = 'text-5xl font-black mb-2 text-glow transition-colors duration-300';

                if (bmi < 18.5) {
                    category = '低体重 (Under)';
                    colorClass = 'bg-blue-500/80 text-white';
                    textClass = 'text-blue-300';
                } else if (bmi >= 18.5 && bmi < 25) {
                    category = '普通 (Normal)';
                    colorClass = 'bg-green-500/80 text-white';
                    textClass = 'text-green-400';
                } else if (bmi >= 25 && bmi < 30) {
                    category = '肥満 (Over)';
                    colorClass = 'bg-yellow-500/80 text-white';
                    textClass = 'text-yellow-400';
                } else {
                    category = '高度肥満 (Obese)';
                    colorClass = 'bg-red-600/80 text-white';
                    textClass = 'text-red-500';
                }

                bmiCategoryDisplay.textContent = category;
                bmiCategoryDisplay.classList.add(...colorClass.split(' '));
                bmiResultDisplay.classList.add(textClass);
            }

            // Event Listeners
            heightInput.addEventListener('input', calculateBMI);
            weightInput.addEventListener('input', calculateBMI);

            // Initial Calculation
            calculateBMI();
        });
    </script>
</body>
</html>
