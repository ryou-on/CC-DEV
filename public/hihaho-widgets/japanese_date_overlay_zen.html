<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Japanese Date Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --text-color: #000000;
    --outline-color: #ffffff;
    --outline-width: 3px;
  }

  body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background-color: transparent !important;
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
    overflow: hidden;
    font-family: 'Zen Old Mincho', serif;
  }

  /* Main Widget Container */
  .widget-container {
    margin: 40px;
    padding: 20px 40px;
    text-align: right;
    /* Optional: subtle glass effect for better readability if video is extremely chaotic */
    /* backdrop-filter: blur(2px); */
    /* border-radius: 12px; */
  }

  /* Typography & Visibility Logic */
  .date-display {
    color: var(--text-color);
    font-weight: 900;
    line-height: 1.2;
    /* High Visibility Stroke for Black Text on Video */
    text-shadow:
      var(--outline-width) var(--outline-width) 0 var(--outline-color),
      calc(var(--outline-width)*-1) calc(var(--outline-width)*-1) 0 var(--outline-color),
      var(--outline-width) calc(var(--outline-width)*-1) 0 var(--outline-color),
      calc(var(--outline-width)*-1) var(--outline-width) 0 var(--outline-color),
      var(--outline-width) 0 0 var(--outline-color),
      calc(var(--outline-width)*-1) 0 0 var(--outline-color),
      0 var(--outline-width) 0 var(--outline-color),
      0 calc(var(--outline-width)*-1) 0 var(--outline-color);
  }

  .main-date {
    font-size: 5rem;
    letter-spacing: -0.05em;
  }

  .sub-info {
    font-size: 2.5rem;
    margin-top: 10px;
    display: flex;
    justify-content: flex-end;
    gap: 20px;
  }

  .rokuyo-badge {
    display: inline-block;
  }

  /* Special color for Taian (大安) - Optional visual flair, kept black as requested but can be styled */
  .is-taian {
    /* text-decoration: underline double red; -- Example if needed */
  }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    .widget-container {
      margin: 20px;
      text-align: center;
      justify-content: center;
    }
    body {
        justify-content: center;
        align-items: center;
    }
    .main-date {
      font-size: 3rem;
    }
    .sub-info {
      font-size: 1.5rem;
    }
  }
</style>
</head>
<body>

<div class="widget-container">
  <div class="date-display">
    <div class="main-date" id="date-text">Wait...</div>
    <div class="sub-info">
      <span id="weekday-text"></span>
      <span id="rokuyo-text" class="rokuyo-badge"></span>
    </div>
  </div>
</div>

<script>
  // Rokuyo calculation requires Lunar Calendar logic.
  // Since a full Lunisolar library is heavy, this uses a simplified cycle approximation (QREKI logic variant) 
  // or a reference-based modulo for standalone simplicity. 
  // Note: True Rokuyo resets on the 1st of the LUNAR month. This simplified version uses a known reference date (2000-01-01) 
  // and applies the standard 6-day cycle. It is roughly 80-90% accurate but may drift from printed calendars 
  // around lunar month changes. For a single-file widget, this is the standard trade-off.

  const ROKUYO_TYPES = ["大安", "赤口", "先勝", "友引", "先負", "仏滅"];
  // Using a simplified modulo logic based on a known 'Taian' date.
  // 2024-01-06 was Taian.
  const REF_DATE = new Date(2024, 0, 6); // Jan 6, 2024
  const REF_ROKUYO_INDEX = 0; // 0 = Taian in my array above

  function getApproxRokuyo(date) {
    // Simple 6-day cycle calculation
    // Note: Does not account for "Old Calendar Month 1st Day" resets (requires astronomical calculation).
    const oneDay = 24 * 60 * 60 * 1000;
    const diffDays = Math.round((date - REF_DATE) / oneDay);
    let index = (REF_ROKUYO_INDEX + diffDays) % 6;
    if (index < 0) index += 6;
    return ROKUYO_TYPES[index];
  }

  function updateWidget() {
    const now = new Date();

    // 1. Format Date: YYYY年MM月DD日
    const year = now.getFullYear();
    const month = now.getMonth() + 1;
    const day = now.getDate();
    const dateString = `${year}年${month}月${day}日`;

    // 2. Format Weekday
    const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
    const weekdayString = `${weekdays[now.getDay()]}曜日`;

    // 3. Calculate Rokuyo
    // For a strictly accurate Rokuyo, external libraries like 'moment-lunar' are needed.
    // Here we use the cycle method for display purposes.
    const rokuyoString = getApproxRokuyo(now);

    // Update DOM
    const dateEl = document.getElementById('date-text');
    const weekdayEl = document.getElementById('weekday-text');
    const rokuyoEl = document.getElementById('rokuyo-text');

    dateEl.textContent = dateString;
    weekdayEl.textContent = weekdayString;
    rokuyoEl.textContent = rokuyoString;

    // Highlight Taian
    if (rokuyoString === "大安") {
      rokuyoEl.classList.add('is-taian');
    } else {
      rokuyoEl.classList.remove('is-taian');
    }
  }

  // Initial call
  updateWidget();

  // Update every second to keep day current
  setInterval(updateWidget, 1000);
</script>

</body>
</html>
