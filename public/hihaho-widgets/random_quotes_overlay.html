<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Quotes Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Transparency Rules */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        /* Custom Utilities for Video Visibility */
        .text-shadow-md {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .glass-panel {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* Animation Classes */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        .fade-out {
            animation: fadeOut 0.3s ease-in forwards;
        }

        .pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Button Pulse */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }

        .btn-pulse {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body class="pointer-events-none flex flex-col justify-end items-end p-6">

    <!-- Popup Container (Initially Hidden) -->
    <div id="quotePopup" class="hidden pointer-events-auto fixed inset-0 flex items-center justify-center bg-black/40 z-40 transition-opacity duration-300 opacity-0">
        <div class="glass-panel rounded-2xl p-8 max-w-md w-11/12 text-center relative transform transition-all mx-4">
            
            <!-- Decorative Icon -->
            <div class="text-4xl mb-4 text-yellow-400 drop-shadow-md">❝</div>
            
            <!-- Quote Text -->
            <p id="quoteText" class="text-white text-xl md:text-2xl font-bold mb-4 leading-relaxed text-shadow-md">
                Loading...
            </p>
            
            <!-- Author -->
            <p id="quoteAuthor" class="text-gray-300 text-sm md:text-base font-medium text-right mb-8 text-shadow-md">
                - Author Name
            </p>

            <!-- Close Button -->
            <button onclick="closePopup()" class="px-6 py-2 bg-white/10 hover:bg-white/20 border border-white/30 rounded-full text-white transition-colors duration-200 text-sm font-semibold backdrop-blur-sm">
                閉じる
            </button>
        </div>
    </div>

    <!-- Trigger Button (Floating Action Button) -->
    <div class="pointer-events-auto z-50 fixed bottom-8 right-8">
        <button 
            onclick="showRandomQuote()" 
            class="btn-pulse group flex items-center justify-center w-14 h-14 md:w-16 md:h-16 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full shadow-lg hover:scale-110 active:scale-95 transition-transform duration-200 border-2 border-white/20 text-white"
            aria-label="偉人の言葉を表示"
        >
            <!-- Lightbulb Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
            </svg>
            
            <!-- Tooltip -->
            <span class="absolute right-full mr-3 bg-black/80 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap backdrop-blur-sm">
                偉人の言葉
            </span>
        </button>
    </div>

            { text: "チャンスは準備された心に降り立つ。", author: "ルイ・パスツール" },
            { text: "成功には秘密などない。それは準備、勤勉、そして失敗から学ぶことの結果である。", author: "コリン・パウエル" },

            { text: "笑う門には福来たる。", author: "日本のことわざ" },

            { text: "知識に投資することは、常に最高の利益を生む。", author: "ベンジャミン・フランクリン" },
            { text: "時は金なり。", author: "ベンジャミン・フランクリン" },
            { text: "勤勉は幸運の母である。", author: "ベンジャミン・フランクリン" },
            { text: "初心忘るべからず。", author: "世阿弥" },
            { text: "秘すれば花。", author: "世阿弥" },
            { text: "石の上にも三年。", author: "日本のことわざ" },
            { text: "七転び八起き。", author: "日本のことわざ" },
            { text: "好きこそものの上手なれ。", author: "日本のことわざ" },
            { text: "聞くは一時の恥、聞かぬは一生の恥。", author: "日本のことわざ" },

            { text: "誠実は最良の策である。", author: "セルバンテス" },
            { text: "良い本を読むことは、過去の最も優れた人々と会話することだ。", author: "デカルト" },

            { text: "アイデアに価値はない。それを実行することに価値がある。", author: "作者不詳" },
            { text: "未来は、夢の美しさを信じる人々のものだ。", author: "エレノア・ルーズベルト" },
            { text: "人生で犯した間違いの多くは、考えるべき時に感じ、感じるべき時に考えたことから生じている。", author: "ジョン・チャートン・コリンズ" },

            { text: "あなたができる最善のことは、誰かのために親切にすることだ。", author: "作者不詳" },
            { text: "笑顔は世界共通の言語である。", author: "作者不詳" },
            { text: "感謝の心を持てば、人生は豊かになる。", author: "作者不詳" },
            { text: "終わりよければすべてよし。", author: "シェイクスピア" },
            { text: "意志あるところに道は開ける。", author: "リンカーン" },
            { text: "最善を尽くせ、あとは天命を待て。", author: "作者不詳" }
        ];

        // Elements
        const popup = document.getElementById('quotePopup');
        const quoteText = document.getElementById('quoteText');
        const quoteAuthor = document.getElementById('quoteAuthor');
        const popupContent = popup.querySelector('div');

        function showRandomQuote() {
            // Random Selection
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const selectedQuote = quotes[randomIndex];

            // Update Content
            quoteText.textContent = selectedQuote.text;
            quoteAuthor.textContent = `- ${selectedQuote.author}`;

            // Show Popup
            popup.classList.remove('hidden');
            
            // Animation Frame logic for smooth transitions
            requestAnimationFrame(() => {
                popup.classList.remove('opacity-0');
                popupContent.classList.remove('scale-0');
                popupContent.classList.add('pop-in');
            });
        }

        function closePopup() {
            // Fade out logic
            popup.classList.add('opacity-0');
            
            setTimeout(() => {
                popup.classList.add('hidden');
                popupContent.classList.remove('pop-in');
            }, 300);
        }

        // Close on outside click
        popup.addEventListener('click', (e) => {
            if (e.target === popup) {
                closePopup();
            }
        });
    </script>
</body>
</html>
