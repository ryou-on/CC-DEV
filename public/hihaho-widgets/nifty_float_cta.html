<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>カンタンお申し込み CTA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; font-family: sans-serif; }

    /* ── ラッパー：タブ幅(52px)だけ見せて右端に固定 ── */
    #float-apply {
      position: fixed;
      right: 0;
      bottom: 12%;
      display: flex;
      align-items: stretch;
      transform: translateX(calc(100% - 52px));
      transition: transform .3s ease;
      z-index: 9999;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.3));
    }
    #float-apply.open { transform: translateX(0); }

    /* ── 矢印インジケーター ── */
    .fa-arrow {
      background: #fff;
      width: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: .3em 0 0 .3em;
      cursor: pointer;
    }
    .fa-arrow::before {
      content: "";
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 8px solid #ff740d;
      transition: transform .3s;
    }
    #float-apply.open .fa-arrow::before { transform: scaleX(-1); }

    /* ── オレンジのタブ ── */
    .fa-tab {
      background: #ff740d;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .15em;
      line-height: 1.3;
      writing-mode: vertical-rl;
      padding: .6em .35em;
      cursor: pointer;
      border-radius: 0;
      display: flex;
      align-items: center;
      user-select: none;
      flex-shrink: 0;
    }

    /* ── パネル本体 ── */
    .fa-panel {
      border: 2px solid #ff740d;
      background: #fff;
      width: 240px;
    }

    /* ── 各行 ── */
    .fa-item {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: .8em 2em .8em 1em;
      min-height: 70px;
      text-decoration: none;
      color: #333;
      position: relative;
    }
    .fa-item + .fa-item { border-top: 1px solid #ddd; }
    .fa-item:hover { background: #fff7f0; }

    .fa-item::after {
      content: "";
      position: absolute;
      top: 50%; right: .8em;
      transform: translateY(-50%);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid currentColor;
    }
    .fa-item.is-shinki  { color: #ff740d; }
    .fa-item.is-norikae { color: #005aab; }
    .fa-item.is-tel     { color: #333; }
    .fa-item.is-tel::after { display: none; }

    .fa-sub  { font-size: .72em; color: #555; }
    .fa-main { font-size: 1.1em; font-weight: 700; margin-top: 2px; }

    .fa-tel-num {
      font-size: 1.25em;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .3em;
    }
    .fa-tel-time { font-size: .7em; color: #555; margin-top: 3px; }

    /* ── SP：下から出る ── */
    @media (max-width: 768px) {
      #float-apply {
        bottom: 0; right: 0; width: 100%;
        flex-direction: column-reverse;
        transform: translateY(calc(100% - 44px));
      }
      #float-apply.open { transform: translateY(0); }
      .fa-tab {
        writing-mode: horizontal-tb;
        border-radius: .3em .3em 0 0;
        justify-content: center;
        padding: .45em;
        font-size: 14px;
      }
      .fa-arrow { display: none; }
      .fa-panel { width: 100%; }
      .fa-item  { min-height: 60px; }
    }
  </style>
</head>
<body>

<div id="float-apply">
  <div class="fa-arrow" id="fa-toggle"></div>
  <div class="fa-tab"   id="fa-tab">カンタン<br>お申し込み</div>
  <div class="fa-panel">

    <a class="fa-item is-shinki"  id="fa-shinki"  href="#" target="_blank">
      <span class="fa-sub">光回線を契約していない</span>
      <span class="fa-main">光回線新規</span>
    </a>

    <a class="fa-item is-norikae" id="fa-norikae" href="#" target="_blank">
      <span class="fa-sub">すでに光回線をご利用中</span>
      <span class="fa-main">乗り換え</span>
    </a>

    <a class="fa-item is-tel" id="fa-tel" href="tel:0120-50-2210">
      <div class="fa-tel-num">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             height="1.2em" fill="#3a3" style="flex-shrink:0">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2
                   1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1
                   C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1
                   0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
        </svg>
        <span id="fa-tel-num">0120-50-2210</span>
      </div>
      <div class="fa-tel-time" id="fa-tel-time">毎日9:00〜21:00（携帯電話 着信可）</div>
    </a>

  </div>
</div>

<script>
  // ── URLパラメータで各リンク・テキストをカスタマイズ ──
  const p = k => new URLSearchParams(location.search).get(k);

  const shinki  = document.getElementById('fa-shinki');
  const norikae = document.getElementById('fa-norikae');
  const tel     = document.getElementById('fa-tel');
  const telNum  = document.getElementById('fa-tel-num');
  const telTime = document.getElementById('fa-tel-time');

  if (p('urlShinki'))      shinki.href  = p('urlShinki');
  if (p('urlNorikae'))     norikae.href = p('urlNorikae');
  if (p('tel')) {
    telNum.textContent = p('tel');
    tel.href = 'tel:' + p('tel').replace(/-/g, '');
  }
  if (p('telTime'))        telTime.textContent = p('telTime');
  if (p('labelShinki'))    shinki.querySelector('.fa-main').textContent  = p('labelShinki');
  if (p('labelNorikae'))   norikae.querySelector('.fa-main').textContent = p('labelNorikae');
  if (p('subShinki'))      shinki.querySelector('.fa-sub').textContent   = p('subShinki');
  if (p('subNorikae'))     norikae.querySelector('.fa-sub').textContent  = p('subNorikae');

  // ── 開閉トグル ──
  const root = document.getElementById('float-apply');
  [document.getElementById('fa-toggle'), document.getElementById('fa-tab')]
    .forEach(el => el.addEventListener('click', () => root.classList.toggle('open')));

  // リンククリックで閉じる
  [shinki, norikae, tel]
    .forEach(el => el.addEventListener('click', () => root.classList.remove('open')));
</script>
</body>
</html>
