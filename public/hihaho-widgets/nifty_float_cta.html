<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>カンタンお申し込み CTA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; font-family: sans-serif; font-size: 20px; }

    /*
      構造:
        #wrap（fixed, translateX で開閉）
          #handle（absolute, right:100% → 常にパネルの左に固定表示）
            .strip（白い丸角ストリップ + ◀）
            .label（オレンジ + 縦書きテキスト）
          #panel（オレンジ枠の白いコンテンツボックス）
    */

    #wrap {
      position: fixed;
      right: 0;
      bottom: 10%;
      transform: translateX(98%); /* パネルをほぼ画面外へ、ハンドルだけ露出 */
      transition: transform .3s ease;
      z-index: 9999;
      font-size: 20px;
    }
    #wrap.open { transform: translateX(0); }

    /* ── ハンドル（常に可視、パネルの左に位置） ── */
    #handle {
      position: absolute;
      right: 100%;
      top: 50%;
      translate: 0 -50%;
      display: flex;
      align-items: stretch;
      background: #ff740d;
      border-radius: .2em 0 0 .2em;
      box-shadow: 0 0 .3em rgba(0,0,0,.3);
      cursor: pointer;
      user-select: none;
    }

    /* 白いストリップ（左端、丸角） */
    .strip {
      background: #fff;
      width: 1em;
      flex-shrink: 0;
      border-radius: .2em 0 0 .2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .strip::before {
      content: "";
      border-top: .4em solid transparent;
      border-bottom: .4em solid transparent;
      border-right: .5em solid #ff740d; /* ◀ 左向き固定 */
    }

    /* オレンジ縦書きラベル */
    .label {
      color: #fff;
      font-weight: 700;
      font-size: 1em;
      letter-spacing: .2em;
      line-height: 1.2;
      writing-mode: vertical-rl;
      width: 3.5em;
      padding: .5em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── パネル（コンテンツボックス） ── */
    #panel {
      border: 2px solid #ff740d;
      background: #fff;
      width: 13em; /* 260px at 20px base */
      box-shadow: 0 0 .3em rgba(0,0,0,.15);
    }

    /* ── 各行 ── */
    .item {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: .5em 2em .5em 1em;
      min-height: 3.8em;
      text-decoration: none;
      color: inherit;
      background: #fff;
      position: relative;
      text-align: center;
      cursor: pointer;
    }
    .item + .item { border-top: 1px solid #e0e0e0; }
    .item:hover { background: #fafafa; }

    /* 右向き三角アイコン（色はitem側で指定） */
    .item::after {
      content: "";
      position: absolute;
      top: 50%; right: .4em;
      transform: translateY(-50%);
      border-top: .4em solid transparent;
      border-bottom: .4em solid transparent;
      border-left: .5em solid currentColor;
    }
    .item.is-tel::after { display: none; }

    .item.is-shinki  { color: #ff740d; }
    .item.is-norikae { color: #0164af; }
    .item.is-tel     { color: #333; }

    .sub  { font-size: .6em;  color: #333; }
    .main { font-size: 1em;   font-weight: 700; margin-top: .15em; }

    /* 電話番号 */
    .tel-row {
      display: flex;
      align-items: center;
      gap: .25em;
      white-space: nowrap;
    }
    .tel-row svg { height: 1em; flex-shrink: 0; }
    .tel-num     { font-weight: 700; }
    .tel-time    { font-size: .58em; color: #555; margin-top: .3em; }

    /* ── SP：下から出るパターン ── */
    @media (max-width: 768px) {
      #wrap {
        font-size: 18px;
        right: auto; left: 0;
        bottom: 0;
        width: 100%;
        transform: translateY(calc(100% - 2.4em));
      }
      #wrap.open { transform: translateY(0); }

      #handle {
        position: static;
        translate: none;
        border-radius: .2em .2em 0 0;
        width: 100%;
      }
      .strip { display: none; }
      .label {
        writing-mode: horizontal-tb;
        width: 100%;
        justify-content: center;
        padding: .4em;
      }
      #panel { width: 100%; }
    }
  </style>
</head>
<body>

<div id="wrap">
  <!-- ハンドル：常に画面端に見えるトグルボタン -->
  <div id="handle">
    <div class="strip"></div>
    <div class="label">カンタン<br>お申し込み</div>
  </div>

  <!-- コンテンツパネル -->
  <div id="panel">

    <a class="item is-shinki" id="fa-shinki" href="#" target="_blank">
      <span class="sub">光回線を契約していない</span>
      <span class="main">光回線新規</span>
    </a>

    <a class="item is-norikae" id="fa-norikae" href="#" target="_blank">
      <span class="sub">すでに光回線をご利用中</span>
      <span class="main">乗り換え</span>
    </a>

    <a class="item is-tel" id="fa-tel" href="tel:0120-50-2210">
      <div class="tel-row">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#2a2">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2
                   1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1
                   C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1
                   0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
        </svg>
        <span id="fa-tel-num">0120-50-2210</span>
      </div>
      <div class="tel-time" id="fa-tel-time">毎日9:00〜21:00（携帯電話 着信可）</div>
    </a>

  </div>
</div>

<script>
  const p = k => new URLSearchParams(location.search).get(k);

  const shinki  = document.getElementById('fa-shinki');
  const norikae = document.getElementById('fa-norikae');
  const tel     = document.getElementById('fa-tel');
  const telNum  = document.getElementById('fa-tel-num');
  const telTime = document.getElementById('fa-tel-time');

  if (p('urlShinki'))    shinki.href  = p('urlShinki');
  if (p('urlNorikae'))   norikae.href = p('urlNorikae');
  if (p('tel')) {
    telNum.textContent = p('tel');
    tel.href = 'tel:' + p('tel').replace(/-/g, '');
  }
  if (p('telTime'))      telTime.textContent = p('telTime');
  if (p('labelShinki'))  shinki.querySelector('.main').textContent  = p('labelShinki');
  if (p('labelNorikae')) norikae.querySelector('.main').textContent = p('labelNorikae');
  if (p('subShinki'))    shinki.querySelector('.sub').textContent   = p('subShinki');
  if (p('subNorikae'))   norikae.querySelector('.sub').textContent  = p('subNorikae');

  const wrap = document.getElementById('wrap');
  document.getElementById('handle').addEventListener('click', () => wrap.classList.toggle('open'));
  [shinki, norikae, tel].forEach(el => el.addEventListener('click', () => wrap.classList.remove('open')));
</script>
</body>
</html>
