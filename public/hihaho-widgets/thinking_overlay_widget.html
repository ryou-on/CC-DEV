<!-- Video Overlay Widget: Thinking Process Display -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thinking Process Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Transparency Settings */
        body, html {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        /* Glassmorphism & Animations */
        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .thought-item {
            animation: slideIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
            transform: translateX(20px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; box-shadow: 0 0 5px cyan; }
            50% { opacity: 1; box-shadow: 0 0 15px cyan; }
        }

        .indicator-dot {
            animation: pulse-glow 2s infinite;
        }

        /* Text Shadow for High Contrast */
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* Mobile Specific Adjustments */
        @media (max-width: 768px) {
            .mobile-stack {
                width: 90vw !important;
                right: 5vw !important;
            }
            .thought-text {
                font-size: 1.1rem !important;
            }
        }
    </style>
</head>
<body class="pointer-events-none">

    <!-- Main Widget Container: Top Right Fixed -->
    <div id="widget-container" class="fixed top-4 right-4 z-50 flex flex-col items-end gap-3 w-80 max-w-full pointer-events-auto mobile-stack">
        
        <!-- Header / Status Indicator -->
        <div class="glass-panel rounded-full px-4 py-2 flex items-center gap-2 mb-2">
            <div class="w-3 h-3 rounded-full bg-cyan-400 indicator-dot"></div>
            <span class="text-cyan-400 font-bold uppercase tracking-wider text-xs md:text-sm text-shadow">System Processing</span>
        </div>

        <!-- Thoughts Container (Where dynamic items appear) -->
        <div id="thoughts-list" class="flex flex-col items-end gap-2 w-full">
            <!-- Dynamic Content will be injected here -->
        </div>

    </div>

    <script>
        // Configuration
        const thoughts = [
            "現在の状況をスキャン中...",
            "音声入力を解析しています...",
            "関連データを検索中 (85%)",
            "文脈を理解しました: 'サンプル表示'",
            "最適なUIレイアウトを計算中...",
            "視認性のコントラストを調整",
            "処理完了。待機モードへ移行します。"
        ];

        const container = document.getElementById('thoughts-list');
        let currentIndex = 0;

        // Function to create a thought bubble
        function addThought(text) {
            const div = document.createElement('div');
            div.className = "thought-item glass-panel rounded-lg rounded-tr-none px-4 py-3 text-white border-l-4 border-cyan-500 w-full text-right shadow-lg transition-all duration-300";
            
            // Inner HTML structure
            div.innerHTML = `
                <p class="thought-text font-medium text-sm md:text-base leading-snug text-shadow">${text}</p>
                <span class="text-[10px] text-gray-300 block mt-1">${new Date().toLocaleTimeString()}</span>
            `;

            // Prepend to top (stacking down) or Append (stacking up)? 
            // Design choice: Append to list so latest is at bottom, or top.
            // Let's prepend so the newest is always right under the header.
            container.prepend(div);

            // Maintenance: Remove old items if too many (keep max 4)
            if (container.children.length > 4) {
                const lastChild = container.lastElementChild;
                lastChild.style.opacity = '0';
                setTimeout(() => lastChild.remove(), 300);
            }
        }

        // Start the sequence
        function startThinkingProcess() {
            // Initial thought
            addThought(thoughts[0]);
            currentIndex++;

            const interval = setInterval(() => {
                if (currentIndex < thoughts.length) {
                    addThought(thoughts[currentIndex]);
                    currentIndex++;
                } else {
                    // Loop or Stop? Let's stop at the final message for this sample.
                    clearInterval(interval);
                }
            }, 2500); // 2.5 seconds interval (Adjustable)
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', startThinkingProcess);

    </script>
</body>
</html>
