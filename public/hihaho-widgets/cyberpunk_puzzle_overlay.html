<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Overlay Puzzle Widget</title><script src="https://cdn.tailwindcss.com"></script><style>body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent !important; } .overlay-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; /* Let clicks pass through outside the widget */ } .widget-box { pointer-events: auto; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.5); box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); border-radius: 16px; padding: 1.5rem; max-width: 90vw; width: 340px; transform: scale(1); transition: transform 0.2s; } .tile { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: #e2e8f0; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; cursor: pointer; transition: all 0.2s ease; text-shadow: 0 2px 4px rgba(0,0,0,0.8); user-select: none; } .tile:hover:not(.empty) { background: rgba(56, 189, 248, 0.3); box-shadow: 0 0 10px rgba(56, 189, 248, 0.4); } .tile.correct { border-color: #4ade80; color: #4ade80; } .tile.empty { background: transparent; border: 1px dashed rgba(255,255,255,0.1); cursor: default; } .glow-text { text-shadow: 0 0 10px rgba(56, 189, 248, 0.8); } .win-animation { animation: pulse-green 1.5s infinite; border-color: #4ade80; box-shadow: 0 0 30px rgba(74, 222, 128, 0.4); } @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }</style></head><body><div class="overlay-container"><div class="widget-box" id="widgetBox"><div class="flex justify-between items-center mb-4 border-b border-slate-600 pb-2"><h2 class="text-cyan-400 font-mono text-xl tracking-wider glow-text">SYSTEM LOCK</h2><div class="text-xs text-slate-300 font-mono text-right"><div>MOVES: <span id="moveCount" class="text-white">0</span></div><div>TIME: <span id="timer" class="text-white">00:00</span></div></div></div><div id="gameGrid" class="grid grid-cols-3 gap-2 mb-4"></div><div id="message" class="h-6 text-center text-sm font-mono text-emerald-400 font-bold mb-3 opacity-0 transition-opacity">ACCESS GRANTED</div><button onclick="initGame()" class="w-full py-2 bg-cyan-900/50 hover:bg-cyan-800/80 border border-cyan-500 text-cyan-100 font-mono text-sm rounded transition-colors uppercase tracking-widest">Reset Sequence</button></div></div><script>const grid = document.getElementById('gameGrid'); const moveDisplay = document.getElementById('moveCount'); const timeDisplay = document.getElementById('timer'); const msgDisplay = document.getElementById('message'); const widgetBox = document.getElementById('widgetBox'); let tiles = []; let moves = 0; let timerInterval; let seconds = 0; const correctOrder = [1, 2, 3, 4, 5, 6, 7, 8, null]; function formatTime(sec) { const m = Math.floor(sec / 60).toString().padStart(2, '0'); const s = (sec % 60).toString().padStart(2, '0'); return `${m}:${s}`; } function startTimer() { clearInterval(timerInterval); seconds = 0; timeDisplay.innerText = "00:00"; timerInterval = setInterval(() => { seconds++; timeDisplay.innerText = formatTime(seconds); }, 1000); } function checkWin() { const current = tiles.map(t => t.value); if (JSON.stringify(current) === JSON.stringify(correctOrder)) { clearInterval(timerInterval); msgDisplay.innerText = "ACCESS GRANTED"; msgDisplay.classList.remove('opacity-0'); widgetBox.classList.add('win-animation'); tiles.forEach(t => { if(t.element) t.element.classList.add('correct'); }); } } function render() { grid.innerHTML = ''; tiles.forEach((tile, index) => { const el = document.createElement('div'); el.className = `tile ${tile.value === null ? 'empty' : ''}`; if (tile.value !== null) { el.innerText = tile.value; el.onclick = () => moveTile(index); } grid.appendChild(el); tile.element = el; }); } function moveTile(index) { const emptyIndex = tiles.findIndex(t => t.value === null); const validMoves = [index - 1, index + 1, index - 3, index + 3]; if (validMoves.includes(emptyIndex)) { const row = Math.floor(index / 3); const emptyRow = Math.floor(emptyIndex / 3); if ((Math.abs(index - emptyIndex) === 1 && row !== emptyRow)) return; [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]]; moves++; moveDisplay.innerText = moves; render(); checkWin(); } } function shuffle() { // Work backwards from solved state to ensure solvability tiles = correctOrder.map(v => ({ value: v })); let emptyIdx = 8; for (let i = 0; i < 150; i++) { const possible = []; const row = Math.floor(emptyIdx / 3); const col = emptyIdx % 3; if (row > 0) possible.push(emptyIdx - 3); if (row < 2) possible.push(emptyIdx + 3); if (col > 0) possible.push(emptyIdx - 1); if (col < 2) possible.push(emptyIdx + 1); const moveIdx = possible[Math.floor(Math.random() * possible.length)]; [tiles[emptyIdx], tiles[moveIdx]] = [tiles[moveIdx], tiles[emptyIdx]]; emptyIdx = moveIdx; } } function initGame() { clearInterval(timerInterval); msgDisplay.classList.add('opacity-0'); widgetBox.classList.remove('win-animation'); moves = 0; moveDisplay.innerText = '0'; shuffle(); render(); startTimer(); } // Init initGame(); </script></body></html>
