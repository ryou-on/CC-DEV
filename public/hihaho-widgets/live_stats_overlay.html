<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stats Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基本設定：背景透過とクリック透過 */
        body, html {
            background: transparent !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none; /* 背景部分はクリックを通す */
        }

        /* ウィジェット本体 */
        #overlay-widget {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            pointer-events: auto; /* ウィジェット内は操作可能 */
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            color: white;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), height 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-radius 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        /* 最小化状態 */
        #overlay-widget.minimized {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #overlay-widget.minimized .widget-content,
        #overlay-widget.minimized .widget-header-text,
        #overlay-widget.minimized .minimize-btn-icon {
            display: none;
        }

        #overlay-widget.minimized .maximize-icon {
            display: block;
        }

        /* ヘッダー（ドラッグ可能エリア） */
        .widget-header {
            padding: 12px 16px;
            cursor: grab;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }
        
        .widget-header:active {
            cursor: grabbing;
        }

        .widget-content {
            padding: 16px;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .text-shadow {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .maximize-icon {
            display: none;
            font-size: 24px;
            color: #38bdf8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .no-scroll {
            touch-action: none;
        }
    </style>
</head>
<body>

    <div id="overlay-widget">
        <div class="widget-header no-scroll" id="drag-handle">
            <div class="flex items-center space-x-2 widget-header-text">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                <span class="font-bold text-sm text-shadow tracking-wide uppercase">Live Stats</span>
            </div>
            
            <button id="toggle-btn" class="text-gray-300 hover:text-white transition-colors focus:outline-none p-1">
                <svg class="w-5 h-5 minimize-btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path>
                </svg>
            </button>

            <div class="maximize-icon pointer-events-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 4l-5-5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                </svg>
            </div>
        </div>

        <div class="widget-content">
            <div class="space-y-4">
                <div class="flex justify-between items-center border-b border-white/10 pb-2">
                    <span class="text-gray-300 text-xs font-medium uppercase">Active Viewers</span>
                    <span id="viewer-count" class="text-xl font-bold text-cyan-400 text-shadow">---</span>
                </div>
                
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-gray-300">Goal Progress</span>
                        <span class="text-white font-mono">85%</span>
                    </div>
                    <div class="w-full bg-gray-700/50 rounded-full h-2">
                        <div class="bg-gradient-to-r from-cyan-500 to-blue-500 h-2 rounded-full" style="width: 85%"></div>
                    </div>
                </div>

                <div class="bg-white/5 p-3 rounded-lg border border-white/5">
                    <p class="text-xs text-gray-200 leading-relaxed">
                        <span class="text-yellow-400 font-bold">STATUS:</span> Connected to Sheet
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const widget = document.getElementById('overlay-widget');
        const header = document.getElementById('drag-handle');
        const toggleBtn = document.getElementById('toggle-btn');
        const viewerDisplay = document.getElementById('viewer-count');
        
        // スプレッドシートCSV URL
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHI5EOG9VnLCz8o4LW5SIFCtn_KTK-6_9kRxPe_BNlnqWYuyaRJamI9S90-U5Oj6so7VbtggBFAXJg/pub?output=csv';

        // データ取得関数
        async function fetchSpreadsheetData() {
            try {
                // キャッシュを回避するためにタイムスタンプを付与
                const response = await fetch(`${SHEET_URL}&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Fetch failed');
                
                const csvText = await response.text();
                const rows = csvText.split('\n');
                const firstRow = rows[0].split(',');
                const rawValue = firstRow[0].replace(/"/g, '').trim();

                const numericValue = parseFloat(rawValue.replace(/,/g, ''));
                if (!isNaN(numericValue)) {
                    viewerDisplay.innerText = numericValue.toLocaleString();
                } else {
                    viewerDisplay.innerText = rawValue;
                }
            } catch (error) {
                console.error('Error:', error);
                viewerDisplay.innerText = 'Offline';
            }
        }

        // 定期実行（30秒ごと）
        fetchSpreadsheetData();
        setInterval(fetchSpreadsheetData, 30000);

        // --- ドラッグ操作ロジック ---
        let isDragging = false;
        let currentX, currentY, initialX, initialY;
        let xOffset = 0, yOffset = 0;

        header.addEventListener("mousedown", dragStart);
        header.addEventListener("touchstart", dragStart, { passive: false });
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("touchend", dragEnd);
        document.addEventListener("mousemove", drag);
        document.addEventListener("touchmove", drag, { passive: false });

        function dragStart(e) {
            if (e.target.closest('#toggle-btn')) return;
            const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
            
            initialX = clientX - xOffset;
            initialY = clientY - yOffset;

            if (e.target === header || header.contains(e.target) || widget.classList.contains('minimized')) {
                isDragging = true;
            }
        }

        function dragEnd() {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;

                currentX = clientX - initialX;
                currentY = clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;

                widget.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }

        // 最小化・最大化切り替え
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            widget.classList.toggle('minimized');
        });

        widget.addEventListener('click', () => {
            if (widget.classList.contains('minimized')) {
                widget.classList.remove('minimized');
            }
        });
    </script>
</body>
</html>
