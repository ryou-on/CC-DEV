<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Clean Clock Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            overflow: hidden;
        }

        /* Simplified Glassmorphism Container */
        .widget-container {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* Clean Typography without Neon Glow */
        .clock-text {
            font-family: 'Roboto', sans-serif;
            color: #ffffff;
            /* Sharp shadow for readability instead of diffuse glow */
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        .date-text {
            font-family: 'Roboto', sans-serif;
            color: #d4d4d4;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }

        /* Gentle pulse for colon */
        .blink {
            animation: gentle-pulse 1s ease-in-out infinite;
        }

        @keyframes gentle-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- Main Widget Container -->
    <div class="widget-container rounded-2xl px-10 py-6 flex flex-col items-center justify-center min-w-[300px]">
        
        <!-- Time Display -->
        <div class="text-7xl md:text-9xl font-bold tracking-tight clock-text flex items-baseline">
            <span id="hours">00</span>
            <span class="blink mx-1">:</span>
            <span id="minutes">00</span>
            <span class="text-3xl md:text-5xl ml-3 font-light opacity-90" id="seconds">00</span>
        </div>

        <!-- Date Display -->
        <div class="mt-1 text-lg md:text-2xl font-normal tracking-wide date-text uppercase" id="date">
            LOADING...
        </div>

    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // Format Time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            // Format Date
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const dayName = days[now.getDay()];
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            
            const dateString = `${year}.${month}.${day} [${dayName}]`;

            // Update DOM
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
            document.getElementById('date').textContent = dateString;
        }

        // Initialize and interval
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
