<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Learning Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Transparency & Font */
        body {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            font-family: 'Hiragino Kaku Gothic ProN', 'M-PLUS Rounded 1c', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* High Contrast Text */
        .text-glow {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* Pie Chart Animation */
        .pie-chart {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(var(--fill-color) var(--percentage), rgba(255, 255, 255, 0.1) 0);
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Grid lines for slices */
        .slice-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform-origin: bottom center;
            pointer-events: none;
        }

        /* Button Styles */
        .ctrl-btn {
            transition: all 0.1s;
        }
        .ctrl-btn:active {
            transform: scale(0.95);
        }
        
        /* Input Visibility */
        input[type=range] {
            accent-color: #facc15;
        }
    </style>
</head>
<body>

    <!-- Main Widget Container -->
    <div class="glass-card rounded-3xl p-6 w-[90vw] max-w-2xl flex flex-col md:flex-row items-center gap-8 text-white select-none">
        
        <!-- Left: Visualization -->
        <div class="flex flex-col items-center justify-center">
            <div id="pieContainer" class="pie-chart border-4 border-white/30 flex items-center justify-center mb-4" style="--percentage: 50%; --fill-color: #3b82f6;">
                <!-- Inner circle for donut look (optional, keeping full pie for clarity) -->
                <span id="percentText" class="text-3xl font-bold text-glow drop-shadow-md z-10">1/2</span>
            </div>
            <div class="text-lg font-bold text-yellow-300 text-glow">円グラフ（えんぐらふ）</div>
        </div>

        <!-- Right: Controls -->
        <div class="flex-1 w-full">
            <h2 class="text-2xl font-bold mb-4 text-center md:text-left text-glow border-b border-white/20 pb-2">
                分数（ぶんすう）の仕組み
            </h2>

            <!-- Numerator Control (Bunshi) -->
            <div class="mb-6 bg-white/10 rounded-xl p-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-lg font-bold text-blue-300 text-glow">分子 (ぶんし)</span>
                    <span id="numDisplay" class="text-2xl font-black text-white text-glow">1</span>
                </div>
                <div class="flex gap-2 items-center">
                    <button onclick="updateFraction('num', -1)" class="ctrl-btn w-10 h-10 rounded-full bg-blue-500 hover:bg-blue-400 text-white font-bold text-xl flex items-center justify-center shadow-lg">-</button>
                    <div class="flex-1 h-4 bg-gray-700 rounded-full overflow-hidden relative">
                        <div id="numBar" class="h-full bg-blue-500 transition-all duration-300" style="width: 50%"></div>
                    </div>
                    <button onclick="updateFraction('num', 1)" class="ctrl-btn w-10 h-10 rounded-full bg-blue-500 hover:bg-blue-400 text-white font-bold text-xl flex items-center justify-center shadow-lg">+</button>
                </div>
                <p class="text-xs text-blue-200 mt-1 text-center">いくつ 選（えら）んだかな？</p>
            </div>

            <!-- Horizontal Line (Fraction Bar) -->
            <div class="h-1 bg-white/50 w-full rounded my-2"></div>

            <!-- Denominator Control (Bunbo) -->
            <div class="mb-2 bg-white/10 rounded-xl p-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-lg font-bold text-orange-300 text-glow">分母 (ぶんぼ)</span>
                    <span id="denDisplay" class="text-2xl font-black text-white text-glow">2</span>
                </div>
                <div class="flex gap-2 items-center">
                    <button onclick="updateFraction('den', -1)" class="ctrl-btn w-10 h-10 rounded-full bg-orange-500 hover:bg-orange-400 text-white font-bold text-xl flex items-center justify-center shadow-lg">-</button>
                    <div class="flex-1 h-4 bg-gray-700 rounded-full overflow-hidden relative">
                        <div id="denBar" class="h-full bg-orange-500 transition-all duration-300" style="width: 16.6%"></div>
                    </div>
                    <button onclick="updateFraction('den', 1)" class="ctrl-btn w-10 h-10 rounded-full bg-orange-500 hover:bg-orange-400 text-white font-bold text-xl flex items-center justify-center shadow-lg">+</button>
                </div>
                <p class="text-xs text-orange-200 mt-1 text-center">ぜんぶで いくつ あるかな？</p>
            </div>
        </div>
    </div>

    <script>
        // Initial State
        let numerator = 1;
        let denominator = 2;
        const maxDenominator = 12;

        // DOM Elements
        const pieContainer = document.getElementById('pieContainer');
        const percentText = document.getElementById('percentText');
        const numDisplay = document.getElementById('numDisplay');
        const denDisplay = document.getElementById('denDisplay');
        const numBar = document.getElementById('numBar');
        const denBar = document.getElementById('denBar');

        function updateFraction(type, change) {
            if (type === 'num') {
                numerator += change;
            } else if (type === 'den') {
                denominator += change;
            }

            // Constraints
            if (denominator < 1) denominator = 1;
            if (denominator > maxDenominator) denominator = maxDenominator;
            
            // Clamp numerator to not exceed denominator (for basic learning)
            // or allow improper fractions? Let's cap at denominator for simplicity of UI
            if (numerator < 0) numerator = 0;
            if (numerator > denominator) numerator = denominator;

            render();
        }

        function render() {
            // Update Text
            numDisplay.textContent = numerator;
            denDisplay.textContent = denominator;
            percentText.textContent = `${numerator} / ${denominator}`;

            // Update Bars
            // Num bar is percentage of current denominator
            const numPercent = (numerator / denominator) * 100;
            numBar.style.width = `${numPercent}%`;
            
            // Den bar represents scale relative to max (12)
            const denScale = (denominator / maxDenominator) * 100;
            denBar.style.width = `${denScale}%`;

            // Update Pie Chart CSS Variable
            pieContainer.style.setProperty('--percentage', `${numPercent}%`);

            // Dynamic Color based on completion
            let color = '#3b82f6'; // blue
            if (numPercent === 100) color = '#22c55e'; // green
            else if (numPercent === 0) color = '#ef4444'; // red
            pieContainer.style.setProperty('--fill-color', color);

            drawSliceLines();
        }

        function drawSliceLines() {
            // Clear existing lines (except the main pie element)
            const existingLines = pieContainer.querySelectorAll('.slice-line');
            existingLines.forEach(el => el.remove());

            // Draw lines for denominator
            if (denominator > 1) {
                const angleStep = 360 / denominator;
                for (let i = 0; i < denominator; i++) {
                    const angle = i * angleStep;
                    const line = document.createElement('div');
                    line.className = 'slice-line';
                    line.style.transform = `rotate(${angle}deg)`;
                    pieContainer.appendChild(line);
                }
            }
        }

        // Initial Render
        render();
    </script>
</body>
</html>
