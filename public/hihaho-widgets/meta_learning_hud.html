<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta-Learning Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Custom Glassmorphism */
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Text Shadow for Video Visibility */
        .text-hud {
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* Neon Glow Effects */
        .glow-border-blue {
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .glow-border-purple {
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }
        .glow-border-green {
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        /* Animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s infinite;
        }

        /* Transitions */
        .transition-height {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="pointer-events-none flex items-end justify-end p-4 sm:p-6">

    <!-- Main Widget Container -->
    <div id="learning-widget" class="glass-panel pointer-events-auto rounded-2xl w-full max-w-sm overflow-hidden text-white transition-all duration-300 transform translate-y-0 opacity-100">
        
        <!-- Header / Status Bar -->
        <div class="flex items-center justify-between p-4 bg-white/5 border-b border-white/10">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-blue-400 animate-pulse-ring"></div>
                <span class="font-bold text-sm tracking-wider uppercase text-blue-100 text-hud">脳科学的学習ナビ</span>
            </div>
            <button onclick="toggleMinimize()" class="text-white/70 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
        </div>

        <!-- Main Content Area -->
        <div id="widget-content" class="p-4 space-y-4 max-h-96 opacity-100 transition-height">
            
            <!-- Cycle Indicator -->
            <div class="flex justify-between text-xs text-gray-400 mb-2">
                <span id="label-input" class="text-blue-400 font-bold">Input (認知)</span>
                <span id="label-process">Process (整理)</span>
                <span id="label-output">Output (定着)</span>
            </div>
            <div class="w-full bg-gray-700 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full w-1/3 transition-all duration-500 ease-out"></div>
            </div>

            <!-- Dynamic Prompt -->
            <div class="bg-black/40 rounded-lg p-3 border-l-4 border-blue-500 transition-colors duration-300" id="prompt-box">
                <h3 class="text-xs font-semibold text-gray-300 mb-1 uppercase">現在のミッション</h3>
                <p id="instruction-text" class="text-sm font-medium text-hud leading-relaxed">
                    新しい情報を既存の知識と結びつけながら視聴してください。
                </p>
            </div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setMode('encoding')" class="bg-blue-600/20 hover:bg-blue-600/40 border border-blue-500/50 text-blue-100 py-2 px-3 rounded-lg text-xs font-bold transition-all hover:scale-105 active:scale-95">
                    👀 集中モード
                </button>
                <button onclick="setMode('consolidation')" class="bg-purple-600/20 hover:bg-purple-600/40 border border-purple-500/50 text-purple-100 py-2 px-3 rounded-lg text-xs font-bold transition-all hover:scale-105 active:scale-95">
                    🧠 要約・整理
                </button>
                <button onclick="setMode('retrieval')" class="col-span-2 bg-green-600/20 hover:bg-green-600/40 border border-green-500/50 text-green-100 py-2 px-3 rounded-lg text-xs font-bold transition-all hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
                    🗣 アクティブリコール (自己テスト)
                </button>
            </div>

            <!-- Timer / Widget Footer -->
            <div class="pt-2 flex justify-between items-center text-xs text-gray-400 border-t border-white/10">
                <span>Session: <span id="timer">00:00</span></span>
                <button onclick="triggerFlash()" class="hover:text-white flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
                    </svg>
                    ポイント保存
                </button>
            </div>
        </div>
    </div>

    <!-- Minimized Trigger (Hidden by default) -->
    <button id="maximize-btn" onclick="toggleMinimize()" class="pointer-events-auto hidden fixed bottom-4 right-4 glass-panel p-3 rounded-full text-blue-400 hover:text-white transition-all hover:scale-110 glow-border-blue">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
    </button>

    <script>
        // State Management
        let currentMode = 'encoding'; // encoding, consolidation, retrieval
        let seconds = 0;
        let isMinimized = false;

        // DOM Elements
        const progressBar = document.getElementById('progress-bar');
        const statusDot = document.getElementById('status-dot');
        const instructionText = document.getElementById('instruction-text');
        const promptBox = document.getElementById('prompt-box');
        const timerEl = document.getElementById('timer');
        const widgetContent = document.getElementById('widget-content');
        const maximizeBtn = document.getElementById('maximize-btn');
        const widget = document.getElementById('learning-widget');

        const labels = {
            input: document.getElementById('label-input'),
            process: document.getElementById('label-process'),
            output: document.getElementById('label-output')
        };

        // Timer Logic
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timerEl.textContent = `${mins}:${secs}`;
        }, 1000);

        // Mode Switching Logic
        function setMode(mode) {
            currentMode = mode;
            
            // Reset styles
            Object.values(labels).forEach(el => {
                el.className = 'text-gray-400 transition-colors duration-300';
            });
            promptBox.className = 'bg-black/40 rounded-lg p-3 border-l-4 transition-colors duration-300';
            statusDot.className = 'w-3 h-3 rounded-full animate-pulse-ring';

            switch(mode) {
                case 'encoding':
                    progressBar.style.width = '33%';
                    progressBar.className = 'bg-blue-500 h-full transition-all duration-500 ease-out';
                    labels.input.className = 'text-blue-400 font-bold transition-colors duration-300';
                    instructionText.textContent = "新しい情報を既存の知識と結びつけながら視聴してください。";
                    promptBox.classList.add('border-blue-500');
                    statusDot.classList.add('bg-blue-400');
                    break;
                case 'consolidation':
                    progressBar.style.width = '66%';
                    progressBar.className = 'bg-purple-500 h-full transition-all duration-500 ease-out';
                    labels.process.className = 'text-purple-400 font-bold transition-colors duration-300';
                    instructionText.textContent = "動画を一時停止し、ここまでの内容を3つのキーワードで要約してみましょう。";
                    promptBox.classList.add('border-purple-500');
                    statusDot.classList.add('bg-purple-400');
                    break;
                case 'retrieval':
                    progressBar.style.width = '100%';
                    progressBar.className = 'bg-green-500 h-full transition-all duration-500 ease-out';
                    labels.output.className = 'text-green-400 font-bold transition-colors duration-300';
                    instructionText.textContent = "もし小学生にこの概念を説明するとしたら、どう説明しますか？声に出してみましょう。";
                    promptBox.classList.add('border-green-500');
                    statusDot.classList.add('bg-green-400');
                    break;
            }
        }

        // Minimize/Maximize Toggle
        function toggleMinimize() {
            isMinimized = !isMinimized;
            if (isMinimized) {
                widget.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                setTimeout(() => {
                    widget.classList.add('hidden');
                    maximizeBtn.classList.remove('hidden');
                }, 300);
            } else {
                maximizeBtn.classList.add('hidden');
                widget.classList.remove('hidden');
                // Small delay to allow display:block to apply before opacity transition
                setTimeout(() => {
                    widget.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                }, 10);
            }
        }

        // Visual Feedback for Saving
        function triggerFlash() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="text-green-400">✓ 保存完了</span>`;
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 1500);
        }

        // Initial Setup
        setMode('encoding');
    </script>
</body>
</html>
