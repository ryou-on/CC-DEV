<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{animation:{'ripple':'ripple 2s cubic-bezier(0, 0, 0.2, 1) infinite'},keyframes:{ripple:{'0%':{transform:'scale(.5)',opacity:'1'},'100%':{transform:'scale(3)',opacity:'0'}}}}}}</script><style>body{background:transparent !important;margin:0;padding:0;overflow:hidden;}.text-shadow{text-shadow:0 2px 4px rgba(0,0,0,0.8);}</style></head><body class="w-screen h-screen pointer-events-none"><div id="beacon-container" class="absolute flex flex-col items-center justify-center transition-all duration-700 ease-in-out transform opacity-0 scale-90 -translate-x-1/2 -translate-y-1/2"><div class="absolute bottom-full mb-3 flex flex-col items-center"><div class="bg-slate-900/80 backdrop-blur-sm border border-yellow-400 text-white px-4 py-2 rounded-md shadow-[0_4px_15px_rgba(250,204,21,0.4)] flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse shadow-[0_0_8px_#facc15]"></span><span id="beacon-text" class="font-bold text-sm md:text-base tracking-wide text-shadow whitespace-nowrap">ここに注目</span></div><div class="w-0 h-0 border-l-[6px] border-r-[6px] border-t-[8px] border-l-transparent border-r-transparent border-t-yellow-400"></div></div><div class="relative flex items-center justify-center"><div class="absolute w-12 h-12 bg-yellow-400 rounded-full animate-ripple opacity-80"></div><div class="absolute w-24 h-24 border-2 border-yellow-400 rounded-full animate-ripple opacity-50" style="animation-delay: 0.5s;"></div><div class="relative w-4 h-4 bg-white rounded-full shadow-[0_0_15px_#facc15] border-2 border-yellow-400"></div></div></div><script>const focusPoints=[{x:30,y:35,text:"数式の展開"},{x:70,y:45,text:"ここに注目"},{x:50,y:75,text:"答えの導出"}];let currentIndex=0;const beaconEl=document.getElementById('beacon-container');const textEl=document.getElementById('beacon-text');function showBeacon(){const b=focusPoints[currentIndex];beaconEl.style.left=b.x+'%';beaconEl.style.top=b.y+'%';textEl.innerText=b.text;beaconEl.classList.remove('opacity-0','scale-90');beaconEl.classList.add('opacity-100','scale-100');setTimeout(()=>{beaconEl.classList.remove('opacity-100','scale-100');beaconEl.classList.add('opacity-0','scale-90');currentIndex=(currentIndex+1)%focusPoints.length;setTimeout(showBeacon,1000);},3500);}setTimeout(showBeacon,500);</script></body></html>
