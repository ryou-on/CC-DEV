<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Rotating Giraffe Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    /* UI Overlay Layer */
    .overlay-ui {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      pointer-events: none; /* Let clicks pass through to video unless on buttons */
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 12px 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      background-color: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    h1 {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      font-weight: 700;
      font-size: 1rem;
      margin: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- 3D Canvas Container -->
  <div id="canvas-container"></div>

  <!-- UI Overlay -->
  <div class="overlay-ui">
    <div class="glass-panel">
      <div class="status-dot"></div>
      <h1>ROTATING GIRAFFE</h1>
    </div>
  </div>

  <script>
    // Scene Setup
    const scene = new THREE.Scene();
    // Transparent background handled by renderer alpha: true

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Materials
    const yellowMat = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
    const brownMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
    const darkMat = new THREE.MeshLambertMaterial({ color: 0x333333 });

    // Group to hold the giraffe
    const giraffe = new THREE.Group();

    // Helper function to create box mesh
    function createBox(w, h, d, material, x, y, z) {
      const geometry = new THREE.BoxGeometry(w, h, d);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(x, y, z);
      return mesh;
    }

    // 1. Body
    const body = createBox(1.5, 1.2, 2.2, yellowMat, 0, 1.8, 0);
    giraffe.add(body);

    // Spots on body (simple smaller boxes slightly protruding)
    giraffe.add(createBox(0.4, 0.4, 0.1, brownMat, 0.5, 2.0, 1.15));
    giraffe.add(createBox(0.3, 0.3, 0.1, brownMat, -0.4, 1.6, 1.15));
    giraffe.add(createBox(0.4, 0.4, 0.1, brownMat, 0.2, 1.8, -1.15));

    // 2. Neck
    // Neck base at front-top of body
    const neck = createBox(0.8, 2.5, 0.8, yellowMat, 0, 3.5, 0.8);
    // Angle the neck slightly if we wanted complexity, but vertical is fine for voxel style
    giraffe.add(neck);

    // Spots on neck
    giraffe.add(createBox(0.1, 0.4, 0.3, brownMat, 0.45, 3.2, 0.8));
    giraffe.add(createBox(0.1, 0.3, 0.3, brownMat, -0.45, 3.8, 0.8));

    // 3. Head
    const head = createBox(0.9, 0.9, 1.2, yellowMat, 0, 5.0, 1.1);
    giraffe.add(head);

    // Snout
    const snout = createBox(0.7, 0.5, 0.6, new THREE.MeshLambertMaterial({color: 0xeebb99}), 0, 4.8, 1.8);
    giraffe.add(snout);

    // Ossicones (Horns)
    const hornL = createBox(0.15, 0.6, 0.15, brownMat, -0.25, 5.6, 1.0);
    const hornR = createBox(0.15, 0.6, 0.15, brownMat, 0.25, 5.6, 1.0);
    giraffe.add(hornL);
    giraffe.add(hornR);

    // Ears
    const earL = createBox(0.3, 0.2, 0.1, yellowMat, -0.6, 5.2, 0.9);
    const earR = createBox(0.3, 0.2, 0.1, yellowMat, 0.6, 5.2, 0.9);
    earL.rotation.z = 0.2;
    earR.rotation.z = -0.2;
    giraffe.add(earL);
    giraffe.add(earR);

    // Eyes
    const eyeL = createBox(0.1, 0.1, 0.1, darkMat, -0.46, 5.1, 1.3);
    const eyeR = createBox(0.1, 0.1, 0.1, darkMat, 0.46, 5.1, 1.3);
    giraffe.add(eyeL);
    giraffe.add(eyeR);

    // 4. Legs
    const legW = 0.4;
    const legH = 2.0;
    const legD = 0.4;
    const legY = 0.8; // Position y center based on height

    // Front Left
    const legFL = createBox(legW, legH, legD, yellowMat, -0.5, legY, 0.8);
    // Front Right
    const legFR = createBox(legW, legH, legD, yellowMat, 0.5, legY, 0.8);
    // Back Left
    const legBL = createBox(legW, legH, legD, yellowMat, -0.5, legY, -0.8);
    // Back Right
    const legBR = createBox(legW, legH, legD, yellowMat, 0.5, legY, -0.8);

    giraffe.add(legFL);
    giraffe.add(legFR);
    giraffe.add(legBL);
    giraffe.add(legBR);

    // Hooves
    const hoofH = 0.3;
    const hoofY = -0.15 - (hoofH/2);
    const hoofMat = brownMat;
    giraffe.add(createBox(0.42, hoofH, 0.42, hoofMat, -0.5, -0.35, 0.8));
    giraffe.add(createBox(0.42, hoofH, 0.42, hoofMat, 0.5, -0.35, 0.8));
    giraffe.add(createBox(0.42, hoofH, 0.42, hoofMat, -0.5, -0.35, -0.8));
    giraffe.add(createBox(0.42, hoofH, 0.42, hoofMat, 0.5, -0.35, -0.8));

    // Tail
    const tail = createBox(0.2, 1.2, 0.2, yellowMat, 0, 1.8, -1.2);
    tail.rotation.x = 0.3;
    giraffe.add(tail);
    // Tail tuft
    const tuft = createBox(0.3, 0.4, 0.3, brownMat, 0, 1.2, -1.4);
    giraffe.add(tuft);

    // Center the group visually
    giraffe.position.y = -1.5;

    scene.add(giraffe);

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);

      // Rotate Giraffe
      giraffe.rotation.y += 0.01;

      // Bobbing motion
      giraffe.position.y = -1.5 + Math.sin(Date.now() * 0.002) * 0.1;

      renderer.render(scene, camera);
    }

    animate();

    // Resize Handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
