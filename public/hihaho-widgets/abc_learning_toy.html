<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Learning Toy Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
        }
        
        /* Custom Scrollbar for the grid */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .text-outline {
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        .text-glow {
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4);
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .letter-btn {
            transition: all 0.2s ease;
        }
        .letter-btn:active {
            transform: scale(0.9);
        }
        .letter-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 10;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <!-- Main Container -->
    <div class="relative w-full h-full max-w-4xl mx-auto p-4 flex flex-col justify-end pb-8">
        
        <!-- Pop-up Display Area (Hidden by default) -->
        <div id="display-area" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-80 glass-panel rounded-[2rem] flex flex-col items-center justify-center z-50 animate-pop border-4 border-white">
            <button onclick="closeDisplay()" class="absolute top-4 right-4 bg-red-500 hover:bg-red-600 text-white rounded-full w-8 h-8 font-bold shadow-lg border-2 border-white">✕</button>
            <div id="display-emoji" class="text-8xl mb-2 filter drop-shadow-lg animate-[float_3s_ease-in-out_infinite]">🍎</div>
            <div id="display-letter" class="text-9xl font-bold text-white text-outline mb-[-10px]">A</div>
            <div id="display-word" class="text-3xl font-bold text-white text-outline tracking-wider uppercase">APPLE</div>
        </div>

        <!-- Header / Instructions -->
        <div class="text-center mb-4">
            <h1 class="text-4xl md:text-5xl font-bold text-white text-outline tracking-widest drop-shadow-lg">
                <span class="text-red-400">A</span><span class="text-yellow-400">B</span><span class="text-blue-400">C</span> TIME!
            </h1>
        </div>

        <!-- Alphabet Grid -->
        <div class="glass-panel rounded-3xl p-4">
            <div class="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-9 gap-2 md:gap-3 justify-items-center" id="grid-container">
                <!-- Buttons generated by JS -->
            </div>
        </div>
    </div>

    <script>
        // Data for the toy
        const alphabetData = [
            { letter: 'A', word: 'Apple', emoji: '🍎', color: 'bg-red-400' },
            { letter: 'B', word: 'Bear', emoji: '🐻', color: 'bg-blue-400' },
            { letter: 'C', word: 'Cat', emoji: '🐱', color: 'bg-yellow-400' },
            { letter: 'D', word: 'Dog', emoji: '🐶', color: 'bg-green-400' },
            { letter: 'E', word: 'Elephant', emoji: '🐘', color: 'bg-purple-400' },
            { letter: 'F', word: 'Fish', emoji: '🐟', color: 'bg-pink-400' },
            { letter: 'G', word: 'Grape', emoji: '🍇', color: 'bg-indigo-400' },
            { letter: 'H', word: 'House', emoji: '🏠', color: 'bg-orange-400' },
            { letter: 'I', word: 'Ice Cream', emoji: '🍦', color: 'bg-teal-400' },
            { letter: 'J', word: 'Juice', emoji: '🧃', color: 'bg-cyan-400' },
            { letter: 'K', word: 'Kite', emoji: '🪁', color: 'bg-lime-400' },
            { letter: 'L', word: 'Lion', emoji: '🦁', color: 'bg-amber-400' },
            { letter: 'M', word: 'Monkey', emoji: '🐵', color: 'bg-emerald-400' },
            { letter: 'N', word: 'Nest', emoji: '🪺', color: 'bg-rose-400' },
            { letter: 'O', word: 'Orange', emoji: '🍊', color: 'bg-orange-500' },
            { letter: 'P', word: 'Pig', emoji: '🐷', color: 'bg-pink-500' },
            { letter: 'Q', word: 'Queen', emoji: '👑', color: 'bg-yellow-500' },
            { letter: 'R', word: 'Rainbow', emoji: '🌈', color: 'bg-red-500' },
            { letter: 'S', word: 'Sun', emoji: '☀️', color: 'bg-yellow-300' },
            { letter: 'T', word: 'Tree', emoji: '🌳', color: 'bg-green-600' },
            { letter: 'U', word: 'Umbrella', emoji: '☂️', color: 'bg-purple-500' },
            { letter: 'V', word: 'Violin', emoji: '🎻', color: 'bg-amber-600' },
            { letter: 'W', word: 'Whale', emoji: '🐳', color: 'bg-blue-600' },
            { letter: 'X', word: 'Xylophone', emoji: '🎹', color: 'bg-indigo-500' },
            { letter: 'Y', word: 'Yacht', emoji: '⛵', color: 'bg-sky-500' },
            { letter: 'Z', word: 'Zebra', emoji: '🦓', color: 'bg-gray-500' }
        ];

        const gridContainer = document.getElementById('grid-container');
        const displayArea = document.getElementById('display-area');
        const displayLetter = document.getElementById('display-letter');
        const displayWord = document.getElementById('display-word');
        const displayEmoji = document.getElementById('display-emoji');

        // Initialize Grid
        alphabetData.forEach(item => {
            const btn = document.createElement('button');
            btn.className = `letter-btn w-10 h-10 md:w-14 md:h-14 rounded-xl ${item.color} flex items-center justify-center text-white font-bold text-xl md:text-2xl shadow-md border-2 border-white/50`;
            btn.innerHTML = `<span class="text-outline">${item.letter}</span>`;
            btn.onclick = () => showLetter(item);
            gridContainer.appendChild(btn);
        });

        function showLetter(item) {
            // Update content
            displayLetter.textContent = item.letter;
            displayWord.textContent = item.word;
            displayEmoji.textContent = item.emoji;
            
            // Set background color of popup temporarily to match
            displayArea.style.backgroundColor = getComputedStyle(document.querySelector(`.${item.color}`)).backgroundColor;
            // Add glass effect back slightly
            displayArea.style.background = `linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1))`;
            displayArea.style.borderColor = "white";

            // Show modal
            displayArea.classList.remove('hidden');
            
            // Reset animation
            displayArea.classList.remove('animate-pop');
            void displayArea.offsetWidth; // trigger reflow
            displayArea.classList.add('animate-pop');

            // Speak the word
            speak(item.letter + "! " + item.word);
        }

        function closeDisplay() {
            displayArea.classList.add('hidden');
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1.2; // Slightly higher pitch for kids
                window.speechSynthesis.cancel(); // Cancel previous
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
