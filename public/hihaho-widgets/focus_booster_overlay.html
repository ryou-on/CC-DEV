<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.tailwindcss.com"></script><style>body{background-color:transparent!important;margin:0;padding:0;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}.glass-panel{background:rgba(15,23,42,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);box-shadow:0 8px 32px 0 rgba(0,0,0,0.37)}.text-glow{text-shadow:0 0 10px rgba(255,255,255,0.6)}::-webkit-scrollbar{display:none}@keyframes pulse-glow{0%,100%{box-shadow:0 0 15px rgba(59,130,246,0.3)}50%{box-shadow:0 0 25px rgba(59,130,246,0.6)}}.focus-active{animation:pulse-glow 2s infinite;border-color:rgba(59,130,246,0.6)}#quote-text{transition:opacity 0.2s ease-in-out}</style></head><body class="w-full h-screen flex items-center justify-center pointer-events-none"><!-- Main Widget Container --><div id="widget" class="glass-panel rounded-2xl p-6 w-80 pointer-events-auto transition-all duration-300 transform hover:scale-105"><!-- Header --><div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2"><h2 class="text-white font-bold text-lg tracking-wider flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>FOCUS MODE</h2><span id="status-badge" class="px-2 py-0.5 rounded text-xs font-semibold bg-gray-700 text-gray-300">READY</span></div><!-- Timer Display --><div class="text-center mb-6"><div id="timer" class="text-6xl font-mono font-bold text-white text-glow mb-2 tracking-widest">25:00</div><div class="flex justify-center gap-3"><button id="btn-start" class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-full transition shadow-lg hover:shadow-blue-500/50 active:scale-95"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button><button id="btn-pause" class="bg-yellow-600 hover:bg-yellow-500 text-white p-3 rounded-full transition shadow-lg hidden active:scale-95"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button><button id="btn-reset" class="bg-gray-600 hover:bg-gray-500 text-white p-3 rounded-full transition shadow-lg active:scale-95"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></button></div></div><!-- Motivational Quote --><div class="relative bg-white/10 rounded-lg p-3 text-center cursor-pointer hover:bg-white/20 transition group" id="quote-box"><p id="quote-text" class="text-sm text-white italic font-medium leading-relaxed">"千里の道も一歩から"</p><p class="text-[10px] text-blue-200 mt-2 opacity-50 group-hover:opacity-100 transition">タップして更新</p></div></div><script>const WORK_TIME=25*60;const QUOTES=["千里の道も一歩から","努力は裏切らない","今、この瞬間を大切に","継続は力なり","失敗を恐れるな、挑戦を恐れよ","昨日の自分を超えていけ","集中こそが最強のスキルだ","未来は今の積み重ね","やるかやらないか、それだけだ","休むことも仕事の一部"];let timeLeft=WORK_TIME;let timerId=null;let isRunning=false;const elTimer=document.getElementById('timer');const btnStart=document.getElementById('btn-start');const btnPause=document.getElementById('btn-pause');const btnReset=document.getElementById('btn-reset');const elWidget=document.getElementById('widget');const elBadge=document.getElementById('status-badge');const elQuoteText=document.getElementById('quote-text');const elQuoteBox=document.getElementById('quote-box');function formatTime(seconds){const m=Math.floor(seconds/60).toString().padStart(2,'0');const s=(seconds%60).toString().padStart(2,'0');return`${m}:${s}`}function updateDisplay(){elTimer.textContent=formatTime(timeLeft)}function startTimer(){if(isRunning)return;isRunning=true;btnStart.classList.add('hidden');btnPause.classList.remove('hidden');elWidget.classList.add('focus-active');elBadge.textContent="FOCUSING";elBadge.className="px-2 py-0.5 rounded text-xs font-semibold bg-blue-600 text-white animate-pulse shadow-lg shadow-blue-500/50";timerId=setInterval(()=>{if(timeLeft>0){timeLeft--;updateDisplay()}else{clearInterval(timerId);isRunning=false;elTimer.classList.add('text-red-400');elBadge.textContent="FINISHED";elBadge.className="px-2 py-0.5 rounded text-xs font-semibold bg-green-600 text-white";elWidget.classList.remove('focus-active')}},1000)}function pauseTimer(){if(!isRunning)return;isRunning=false;clearInterval(timerId);btnStart.classList.remove('hidden');btnPause.classList.add('hidden');elWidget.classList.remove('focus-active');elBadge.textContent="PAUSED";elBadge.className="px-2 py-0.5 rounded text-xs font-semibold bg-yellow-600 text-white"}function resetTimer(){pauseTimer();timeLeft=WORK_TIME;updateDisplay();elTimer.classList.remove('text-red-400');elBadge.textContent="READY";elBadge.className="px-2 py-0.5 rounded text-xs font-semibold bg-gray-700 text-gray-300"}function changeQuote(){const randomIndex=Math.floor(Math.random()*QUOTES.length);elQuoteText.style.opacity=0;setTimeout(()=>{elQuoteText.textContent=`"${QUOTES[randomIndex]}"`;elQuoteText.style.opacity=1},200)}btnStart.addEventListener('click',startTimer);btnPause.addEventListener('click',pauseTimer);btnReset.addEventListener('click',resetTimer);elQuoteBox.addEventListener('click',changeQuote);changeQuote();</script></body></html>
