<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Transparent Video Overlay Layer</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}
.overlay{
  position:absolute;
  inset:0;
  pointer-events:none;
}
canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  mix-blend-mode:screen;
}
.panel{
  position:absolute;
  right:2%;
  bottom:6%;
  width:420px;
  padding:14px 18px;
  border-radius:16px;
  backdrop-filter:blur(10px);
  background:rgba(15,35,45,.35);
  border:1px solid rgba(120,240,255,.3);
  color:#e9fcff;
  box-shadow:0 0 30px rgba(64,220,255,.25);
}
.bar{
  height:8px;
  margin-top:8px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
  overflow:hidden;
}
.fill{
  height:100%;
  width:65%;
  background:linear-gradient(90deg,#40dcff,transparent);
}
h3{margin:0 0 6px;font-size:16px;}
p{margin:0 0 10px;font-size:12px;opacity:.85;}
</style>
</head>
<body>

<div class="overlay">
  <canvas id="fx"></canvas>
  <div class="panel">
    <h3>リアルタイム注目ポイント</h3>
    <p>hihahoのイベントと同期して強調表示</p>
    <div class="bar"><div class="fill"></div></div>
  </div>
</div>

<script>
const canvas=document.getElementById("fx");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

let particles=[];

function spawn(){
  return{
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*1.2,
    vy:(Math.random()-.5)*1.2,
    life:Math.random()*200+100
  };
}

for(let i=0;i<120;i++)particles.push(spawn());

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.globalCompositeOperation="lighter";
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
    ctx.fillStyle="rgba(64,220,255,.35)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,1.6,0,Math.PI*2);
    ctx.fill();
    if(p.life<0||p.x<0||p.y<0||p.x>canvas.width||p.y>canvas.height){
      Object.assign(p,spawn());
    }
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
