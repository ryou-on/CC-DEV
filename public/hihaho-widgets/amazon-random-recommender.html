<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Random Recommender Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Glassmorphism Container */
        .glass-panel {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* Text Visibility */
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* Amazon Orange Button */
        .btn-amazon {
            background: linear-gradient(to bottom, #f0c14b, #f7dfa5);
            border-color: #a88734 #9c7e31 #846a29;
            color: #111;
        }
        .btn-amazon:hover {
            background: linear-gradient(to bottom, #f4d078, #f0c14b);
        }

        /* Transition Effects */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Star Rating */
        .star-rating {
            color: #ffa41c;
        }
    </style>
</head>
<body class="flex items-end justify-end p-4 sm:p-8">

    <!-- Widget Container -->
    <div id="widget-container" class="glass-panel rounded-xl w-full max-w-sm overflow-hidden flex flex-col transition-all duration-300 transform hover:scale-[1.02]">
        
        <!-- Header -->
        <div class="flex justify-between items-center px-4 py-2 border-b border-white/10 bg-black/20">
            <div class="flex items-center space-x-2">
                <i class="fab fa-amazon text-white text-lg"></i>
                <span class="text-white font-bold text-sm tracking-wide">おすすめ商品</span>
            </div>
            <button onclick="toggleMinimize()" class="text-white/70 hover:text-white transition">
                <i id="toggle-icon" class="fas fa-chevron-down"></i>
            </button>
        </div>

        <!-- Content Area -->
        <div id="content-area" class="p-4 flex flex-row gap-4 items-center fade-in">
            <!-- Image Placeholder -->
            <div class="relative w-24 h-24 flex-shrink-0 bg-white rounded-md overflow-hidden border border-white/20">
                <img id="product-image" src="" alt="Product" class="w-full h-full object-contain p-1">
                <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
            </div>

            <!-- Details -->
            <div class="flex-1 min-w-0 flex flex-col justify-between h-full">
                <h3 id="product-title" class="text-white font-bold text-sm line-clamp-2 text-shadow mb-1 leading-tight">
                    Loading...
                </h3>
                
                <div class="flex items-center space-x-1 mb-1">
                    <div id="product-stars" class="star-rating text-xs"></div>
                    <span id="product-rating-count" class="text-gray-300 text-xs ml-1">(0)</span>
                </div>

                <div class="flex items-baseline space-x-2">
                    <span class="text-xs text-gray-400">Reference:</span>
                    <span id="product-price" class="text-white font-bold text-lg text-shadow">¥0</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div id="action-area" class="px-4 pb-4 flex gap-2">
            <a id="product-link" href="#" target="_blank" class="btn-amazon flex-1 text-center py-2 rounded text-sm font-bold shadow-lg active:scale-95 transition-transform">
                Amazonで見る
            </a>
            <button onclick="renderRandomProduct()" class="bg-white/10 hover:bg-white/20 text-white border border-white/30 px-3 rounded active:scale-95 transition-colors">
                <i class="fas fa-random"></i>
            </button>
        </div>
    </div>

    <script>
        // 20+ Mock Products Data
        const products = [
            { id: 1, name: "Echo Dot (第5世代) - スマートスピーカー with Alexa", price: "7,480", rating: 4.5, reviews: 15400, type: "Tech" },
            { id: 2, name: "Fire TV Stick 4K Max - 第2世代", price: "9,980", rating: 4.7, reviews: 22000, type: "Tech" },
            { id: 3, name: "Kindle Paperwhite (16GB) 6.8インチディスプレイ", price: "19,980", rating: 4.6, reviews: 8500, type: "Tablet" },
            { id: 4, name: "Apple AirPods Pro (第2世代) MagSafe充電ケース", price: "39,800", rating: 4.8, reviews: 5400, type: "Audio" },
            { id: 5, name: "Anker 737 Power Bank (PowerCore 24000)", price: "19,990", rating: 4.7, reviews: 3200, type: "Accessory" },
            { id: 6, name: "Sony ノイズキャンセリングヘッドホン WH-1000XM5", price: "49,500", rating: 4.6, reviews: 4100, type: "Audio" },
            { id: 7, name: "Logicool G PRO X SUPERLIGHT ゲーミングマウス", price: "18,800", rating: 4.8, reviews: 6700, type: "Gaming" },
            { id: 8, name: "Dell S2421HGF 23.8インチ ゲーミングモニター", price: "23,800", rating: 4.4, reviews: 1200, type: "Monitor" },
            { id: 9, name: "アイリスオーヤマ 電気圧力鍋 4.0L", price: "14,800", rating: 4.3, reviews: 3500, type: "Home" },
            { id: 10, name: "SALONIA サロニア ストレートヘアアイロン 24mm", price: "3,278", rating: 4.5, reviews: 28000, type: "Beauty" },
            { id: 11, name: "ザバス(SAVAS) ホエイプロテイン100 ココア味", price: "4,500", rating: 4.4, reviews: 15000, type: "Health" },
            { id: 12, name: "SwitchBot スマートロック 指紋認証パッド", price: "18,980", rating: 4.2, reviews: 2100, type: "SmartHome" },
            { id: 13, name: "Hanes(ヘインズ) Tシャツ ビーフィー 2枚組", price: "3,000", rating: 4.3, reviews: 9000, type: "Fashion" },
            { id: 14, name: "タオル研究所 [毎日シンプル] #001 フェイスタオル 10枚", price: "3,200", rating: 4.6, reviews: 33000, type: "Home" },
            { id: 15, name: "コカ・コーラ 500mlPET ×24本", price: "2,400", rating: 4.7, reviews: 5600, type: "Food" },
            { id: 16, name: "サーモス 真空断熱タンブラー 420ml", price: "1,800", rating: 4.6, reviews: 11000, type: "Kitchen" },
            { id: 17, name: "ヨギボー マックス (Yogibo Max) ビーズクッション", price: "32,780", rating: 4.5, reviews: 2800, type: "Furniture" },
            { id: 18, name: "ルンバ i3+ ロボット掃除機 クリーンベース付", price: "49,800", rating: 4.4, reviews: 1800, type: "Home" },
            { id: 19, name: "FUJIFILM インスタントカメラ チェキ instax mini 12", price: "11,000", rating: 4.6, reviews: 900, type: "Camera" },
            { id: 20, name: "無印良品 体にフィットするソファ", price: "12,900", rating: 4.3, reviews: 3000, type: "Furniture" },
            { id: 21, name: "エレコム 電源タップ 雷ガード 10個口", price: "2,100", rating: 4.5, reviews: 8800, type: "Accessory" },
            { id: 22, name: "アタックZERO 洗濯洗剤 詰め替え 1200g", price: "1,100", rating: 4.4, reviews: 12000, type: "Daily" }
        ];

        const imgBase = "https://placehold.co/200x200/EEE/31343C?text=";
        let isMinimized = false;

        function renderRandomProduct() {
            // Animation reset
            const content = document.getElementById('content-area');
            content.classList.remove('fade-in');
            void content.offsetWidth; // trigger reflow
            content.classList.add('fade-in');

            // Select Random
            const randomProduct = products[Math.floor(Math.random() * products.length)];
            
            // Update DOM
            document.getElementById('product-title').innerText = randomProduct.name;
            document.getElementById('product-price').innerText = `¥${randomProduct.price}`;
            document.getElementById('product-rating-count').innerText = `(${randomProduct.reviews.toLocaleString()})`;
            document.getElementById('product-image').src = `${imgBase}${encodeURIComponent(randomProduct.type)}`;
            
            // Stars logic
            const starsContainer = document.getElementById('product-stars');
            starsContainer.innerHTML = '';
            const fullStars = Math.floor(randomProduct.rating);
            const hasHalf = randomProduct.rating % 1 !== 0;
            
            for(let i=0; i<fullStars; i++) starsContainer.innerHTML += '<i class="fas fa-star"></i>';
            if(hasHalf) starsContainer.innerHTML += '<i class="fas fa-star-half-alt"></i>';
            for(let i=0; i<(5 - Math.ceil(randomProduct.rating)); i++) starsContainer.innerHTML += '<i class="far fa-star"></i>';

            // Link (Mock)
            document.getElementById('product-link').href = `https://www.amazon.co.jp/s?k=${encodeURIComponent(randomProduct.name)}`;
        }

        function toggleMinimize() {
            isMinimized = !isMinimized;
            const contentArea = document.getElementById('content-area');
            const actionArea = document.getElementById('action-area');
            const icon = document.getElementById('toggle-icon');
            const container = document.getElementById('widget-container');

            if (isMinimized) {
                contentArea.classList.add('hidden');
                actionArea.classList.add('hidden');
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
                container.classList.remove('w-full', 'max-w-sm');
                container.classList.add('w-auto');
            } else {
                contentArea.classList.remove('hidden');
                actionArea.classList.remove('hidden');
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
                container.classList.add('w-full', 'max-w-sm');
                container.classList.remove('w-auto');
            }
        }

        // Init
        window.onload = renderRandomProduct;
    </script>
</body>
</html>
