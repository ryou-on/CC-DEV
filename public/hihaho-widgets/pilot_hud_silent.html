<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Simulation HUD Overlay - Silent Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background: transparent !important;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* Custom Animations */
        @keyframes scanline {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100vh);
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px);
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .animate-scan {
            animation: scanline 4s linear infinite;
        }

        .animate-blink {
            animation: blink 2s infinite;
        }

        .animate-glitch {
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            animation-play-state: paused;
        }
        
        .hover-trigger:hover .animate-glitch {
            animation-play-state: running;
        }

        /* HUD Text Glow */
        .hud-text {
            text-shadow: 0 0 5px rgba(34, 211, 238, 0.8), 0 0 10px rgba(34, 211, 238, 0.5);
        }
        
        .hud-alert {
            text-shadow: 0 0 5px rgba(239, 68, 68, 0.8), 0 0 10px rgba(239, 68, 68, 0.5);
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        /* Decorative Lines */
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(34, 211, 238, 0.5);
        }
        .crosshair::before { width: 2px; height: 20px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .crosshair::after { width: 20px; height: 2px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body class="w-full h-screen flex flex-col justify-between p-4 box-border text-cyan-400 select-none">

    <!-- Scanning Line Effect -->
    <div class="fixed inset-0 pointer-events-none z-0 opacity-10 bg-gradient-to-b from-transparent via-cyan-400 to-transparent w-full h-[10px] animate-scan"></div>

    <!-- Top HUD Bar -->
    <header class="flex justify-between items-start z-10 w-full">
        <div class="glass-panel px-4 py-2 rounded-br-2xl">
            <div class="text-xs text-cyan-200 opacity-70">SYSTEM STATUS</div>
            <div class="text-lg font-bold hud-text tracking-widest">ONLINE</div>
        </div>
        
        <!-- Center Compass / Artificial Horizon Graphic -->
        <div class="flex flex-col items-center opacity-80">
             <div class="w-48 h-1 bg-cyan-900 overflow-hidden relative">
                 <div class="absolute left-1/2 w-2 h-full bg-cyan-400 transform -translate-x-1/2"></div>
                 <div class="absolute left-1/4 w-0.5 h-full bg-cyan-600"></div>
                 <div class="absolute right-1/4 w-0.5 h-full bg-cyan-600"></div>
             </div>
             <div class="text-xs mt-1 tracking-[0.5em]">090 . 180 . 270</div>
        </div>

        <div class="glass-panel px-4 py-2 rounded-bl-2xl text-right">
            <div class="text-xs text-cyan-200 opacity-70">ALTITUDE</div>
            <div class="text-lg font-bold hud-text">35,000 FT</div>
        </div>
    </header>

    <!-- Main Content Center -->
    <main class="flex flex-col items-center justify-center z-10 relative">
        <!-- Decorative Brackets -->
        <div class="absolute inset-0 w-full h-full pointer-events-none">
            <div class="absolute top-0 left-0 w-16 h-16 border-t-2 border-l-2 border-cyan-400 rounded-tl-lg"></div>
            <div class="absolute top-0 right-0 w-16 h-16 border-t-2 border-r-2 border-cyan-400 rounded-tr-lg"></div>
            <div class="absolute bottom-0 left-0 w-16 h-16 border-b-2 border-l-2 border-cyan-400 rounded-bl-lg"></div>
            <div class="absolute bottom-0 right-0 w-16 h-16 border-b-2 border-r-2 border-cyan-400 rounded-br-lg"></div>
        </div>

        <div class="glass-panel p-8 md:p-12 text-center rounded-lg max-w-2xl w-full mx-4 border-l-4 border-r-4 border-cyan-500">
            <div class="mb-2 text-xs text-cyan-200 tracking-[0.3em] uppercase opacity-80 animate-blink">Initializing Simulation Sequence...</div>
            
            <h1 class="text-4xl md:text-6xl font-bold mb-2 hud-text tracking-tighter uppercase">
                PILOT DECISION
            </h1>
            <h2 class="text-2xl md:text-3xl font-bold mb-6 text-white tracking-widest">
                SIMULATION
            </h2>
            
            <div class="w-full h-1 bg-cyan-900 mb-8 overflow-hidden rounded">
                <div class="h-full bg-cyan-400 w-[0%] animate-[width_2s_ease-out_forwards]" style="width: 100%"></div>
            </div>

            <div class="text-sm mb-8 text-left space-y-1 font-sans text-cyan-100 opacity-90">
                <p>> CHECKING SYSTEMS... <span class="text-green-400">OK</span></p>
                <p>> WEATHER RADAR... <span class="text-green-400">ACTIVE</span></p>
                <p>> ENGINE STATUS... <span class="text-green-400">NORMAL</span></p>
                <p>> MISSION OBJECTIVE... <span class="text-yellow-400 animate-pulse">CONFIRM</span></p>
            </div>

            <button class="hover-trigger group relative px-8 py-3 bg-cyan-500/20 hover:bg-cyan-400 text-cyan-400 hover:text-black font-bold text-xl tracking-widest uppercase transition-all duration-300 border border-cyan-400 clip-path-polygon">
                <span class="absolute inset-0 w-full h-full border border-cyan-400 opacity-50 transform scale-105 group-hover:scale-110 transition-transform"></span>
                Start Mission
                <span class="block absolute bottom-0 left-0 w-full h-[2px] bg-cyan-200 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
            </button>
        </div>
    </main>

    <!-- Bottom HUD Footer -->
    <footer class="flex justify-between items-end z-10 w-full">
        <div class="flex space-x-4">
            <div class="glass-panel p-2 rounded-tr-lg">
                <div class="text-[10px] text-cyan-300">RADAR</div>
                <div class="w-16 h-16 rounded-full border border-cyan-500/50 relative overflow-hidden flex items-center justify-center bg-black/40">
                    <div class="w-full h-[1px] bg-cyan-500/50 absolute top-1/2"></div>
                    <div class="h-full w-[1px] bg-cyan-500/50 absolute left-1/2"></div>
                    <div class="w-1/2 h-1/2 absolute top-0 right-0 bg-gradient-to-bl from-cyan-400/30 to-transparent animate-spin origin-bottom-left"></div>
                    <div class="w-1 h-1 bg-red-500 rounded-full absolute top-1/3 right-1/3 animate-pulse"></div>
                </div>
            </div>
        </div>

        <div class="text-center opacity-60 mb-2">
             <div class="crosshair w-8 h-8 relative mx-auto mb-1"></div>
             <div class="text-[10px]">LOCKED ON TARGET</div>
        </div>

        <div class="glass-panel p-2 px-4 rounded-tl-lg text-right">
             <div class="text-[10px] text-red-400 animate-pulse">WARNING LEVEL</div>
             <div class="text-2xl font-bold text-red-500 hud-alert">LOW</div>
        </div>
    </footer>

    <!-- SVG Filters for chromatic aberration effects -->
    <svg class="hidden">
        <defs>
            <filter id="glow">
                <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
    </svg>

    <script>
        // Interactive Hover Sound Simulation
        const btn = document.querySelector('button');
        btn.addEventListener('mouseenter', () => {
            console.log('HUD: Button Hover');
        });
        
        btn.addEventListener('click', () => {
            console.log('HUD: Mission Start');
            document.querySelector('main').style.opacity = '0';
            document.querySelector('main').style.transform = 'scale(1.5)';
            document.querySelector('main').style.transition = 'all 0.5s ease-in';
            setTimeout(() => {
                // Alert removed as requested for silent operation
                console.log('Mission sequence initiated silently.');
            }, 600);
        });
    </script>
</body>
</html>
