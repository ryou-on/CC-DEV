<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histogram Learning Widget (Toggleable)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent !important;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            /* Critical: allows clicking through the transparent background to the video */
            pointer-events: none;
        }
        
        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }

        /* Toggle Button Styles */
        .fab-btn {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            transition: all 0.3s ease;
        }
        .fab-btn:hover {
            background: rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
            transform: scale(1.05);
        }
        .fab-btn:active {
            transform: scale(0.95);
        }

        /* Widget Transitions */
        #widgetContainer {
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .widget-open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .widget-closed {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        /* Custom Range Slider (Inherited) */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.8);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
        
        /* Text Shadow */
        .text-glow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="flex flex-col h-screen w-full relative">

    <!-- Toggle Button (Always visible/clickable) -->
    <div class="fixed bottom-6 right-6 z-50 pointer-events-auto">
        <button id="mainToggleBtn" class="fab-btn text-cyan-400 font-bold py-3 px-5 rounded-full flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            <span id="toggleText">ヒストグラム</span>
        </button>
    </div>

    <!-- Main Widget Container (Centered Overlay) -->
    <!-- 'flex items-center justify-center' centers the modal -->
    <div id="widgetWrapper" class="fixed inset-0 z-40 flex items-center justify-center p-4 pointer-events-none">
        
        <div id="widgetContainer" class="widget-open glass-panel w-full max-w-4xl p-6 flex flex-col gap-6">
            
            <!-- Header with Close Button -->
            <header class="flex justify-between items-start border-b border-gray-700 pb-4">
                <div>
                    <h1 class="text-2xl font-bold text-cyan-400 text-glow flex items-center gap-2">
                        <span class="inline-block w-2 h-6 bg-cyan-500 rounded-sm"></span>
                        ヒストグラム学習ラボ
                    </h1>
                    <p class="text-xs text-gray-300 mt-1 pl-4">データの散らばり具合を視覚化しよう</p>
                </div>
                <div class="flex items-center gap-3">
                     <div class="bg-cyan-900/50 px-3 py-1 rounded text-cyan-200 text-sm font-mono border border-cyan-800">
                        中学生数学：データの活用
                    </div>
                    <!-- Close Icon Button -->
                    <button id="closeBtn" class="text-gray-400 hover:text-white transition p-1 hover:bg-white/10 rounded pointer-events-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Content Grid -->
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 pointer-events-auto overflow-y-auto max-h-[70vh] md:max-h-none pr-1">
                
                <!-- Controls & Data Input (Left Side) -->
                <div class="md:col-span-4 flex flex-col gap-4">
                    <!-- Data Input -->
                    <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-600">
                        <label class="block text-sm font-bold text-gray-200 mb-2">データ入力 (カンマ区切り)</label>
                        <textarea id="dataInput" rows="3" class="w-full bg-slate-900 text-white text-sm p-2 rounded border border-slate-600 focus:border-cyan-500 focus:outline-none resize-none placeholder-gray-500" placeholder="例: 12, 45, 32...">45, 52, 48, 65, 55, 60, 42, 50, 58, 62, 49, 51, 47, 68, 70, 40, 55, 53, 59, 61</textarea>
                        <div class="flex gap-2 mt-2">
                            <button onclick="updateData('random')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-xs py-2 rounded transition text-white border border-slate-600">ランダム</button>
                            <button onclick="updateData('reset')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-xs py-2 rounded transition text-white border border-slate-600">リセット</button>
                        </div>
                    </div>

                    <!-- Bin Width Slider -->
                    <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-600">
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-bold text-cyan-300">階級の幅 (区間)</label>
                            <span id="binWidthVal" class="text-sm font-mono font-bold text-white">5</span>
                        </div>
                        <input type="range" id="binSlider" min="2" max="20" value="5" step="1" class="w-full">
                        <p class="text-[10px] text-gray-400 mt-2">
                            💡 ヒント: 幅を変えると山の形がどう変わるかな？
                        </p>
                    </div>

                    <!-- Statistics Summary -->
                    <div class="grid grid-cols-2 gap-2 text-center">
                        <div class="bg-slate-800/80 p-2 rounded border border-slate-700">
                            <div class="text-[10px] text-gray-400">データ数</div>
                            <div id="statCount" class="text-lg font-bold text-white">0</div>
                        </div>
                        <div class="bg-slate-800/80 p-2 rounded border border-slate-700">
                            <div class="text-[10px] text-gray-400">最大値</div>
                            <div id="statMax" class="text-lg font-bold text-emerald-400">0</div>
                        </div>
                        <div class="bg-slate-800/80 p-2 rounded border border-slate-700">
                            <div class="text-[10px] text-gray-400">最小値</div>
                            <div id="statMin" class="text-lg font-bold text-rose-400">0</div>
                        </div>
                        <div class="bg-slate-800/80 p-2 rounded border border-slate-700">
                            <div class="text-[10px] text-gray-400">平均値</div>
                            <div id="statMean" class="text-lg font-bold text-yellow-400">0</div>
                        </div>
                    </div>
                </div>

                <!-- Chart Area (Right Side) -->
                <div class="md:col-span-8 flex flex-col h-full min-h-[300px]">
                    <div class="relative flex-grow w-full h-full bg-slate-900/30 rounded-lg p-2 border border-slate-700/50">
                        <canvas id="histogramChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // UI Toggle Logic
        const mainToggleBtn = document.getElementById('mainToggleBtn');
        const closeBtn = document.getElementById('closeBtn');
        const widgetContainer = document.getElementById('widgetContainer');
        const toggleText = document.getElementById('toggleText');
        
        let isOpen = true;

        function toggleWidget() {
            isOpen = !isOpen;
            if (isOpen) {
                widgetContainer.classList.remove('widget-closed');
                widgetContainer.classList.add('widget-open');
                toggleText.innerText = "閉じる";
            } else {
                widgetContainer.classList.remove('widget-open');
                widgetContainer.classList.add('widget-closed');
                toggleText.innerText = "ヒストグラム";
            }
        }

        mainToggleBtn.addEventListener('click', toggleWidget);
        closeBtn.addEventListener('click', toggleWidget);

        // --- Existing Histogram Logic Below ---

        // Initial Setup
        const ctx = document.getElementById('histogramChart').getContext('2d');
        let chartInstance = null;

        // DOM Elements
        const dataInput = document.getElementById('dataInput');
        const binSlider = document.getElementById('binSlider');
        const binWidthVal = document.getElementById('binWidthVal');

        // Stats Elements
        const statCount = document.getElementById('statCount');
        const statMax = document.getElementById('statMax');
        const statMin = document.getElementById('statMin');
        const statMean = document.getElementById('statMean');

        // State
        let currentData = [];
        let binWidth = 5;

        function parseData() {
            const raw = dataInput.value;
            // Filter valid numbers
            currentData = raw.split(/[\,\s]+/).map(Number).filter(n => !isNaN(n));
            updateStats();
            drawChart();
        }

        function updateStats() {
            if (currentData.length === 0) {
                statCount.innerText = "0";
                statMax.innerText = "-";
                statMin.innerText = "-";
                statMean.innerText = "-";
                return;
            }

            const max = Math.max(...currentData);
            const min = Math.min(...currentData);
            const sum = currentData.reduce((a, b) => a + b, 0);
            const mean = (sum / currentData.length).toFixed(1);

            statCount.innerText = currentData.length;
            statMax.innerText = max;
            statMin.innerText = min;
            statMean.innerText = mean;
        }

        function calculateHistogram(data, binWidth) {
            if (data.length === 0) return { labels: [], counts: [] };

            const min = Math.min(...data);
            const max = Math.max(...data);
            
            // Start bins at a multiple of binWidth close to min
            const start = Math.floor(min / binWidth) * binWidth;
            const end = Math.ceil(max / binWidth) * binWidth + binWidth;
            
            const bins = [];
            const labels = [];

            // Initialize bins
            for (let i = start; i < end; i += binWidth) {
                bins.push(0);
                labels.push(`${i} ~ ${i + binWidth}`);
            }

            // Count frequencies
            data.forEach(val => {
                const binIndex = Math.floor((val - start) / binWidth);
                if (binIndex >= 0 && binIndex < bins.length) {
                    bins[binIndex]++;
                }
            });

            return { labels, counts: bins };
        }

        function drawChart() {
            const { labels, counts } = calculateHistogram(currentData, binWidth);

            if (chartInstance) {
                chartInstance.destroy();
            }

            // Chart.js Configuration
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '度数 (人/個)',
                        data: counts,
                        backgroundColor: 'rgba(6, 182, 212, 0.6)', // Cyan-500 with opacity
                        borderColor: 'rgba(6, 182, 212, 1)',
                        borderWidth: 1,
                        barPercentage: 1.0, 
                        categoryPercentage: 1.0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 600,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#22d3ee',
                            bodyColor: '#fff',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#94a3b8', stepSize: 1 },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            title: { display: true, text: '度数', color: '#cbd5e1' }
                        },
                        x: {
                            ticks: { color: '#94a3b8', font: { size: 10 } },
                            grid: { display: false },
                            title: { display: true, text: '階級', color: '#cbd5e1' }
                        }
                    }
                }
            });
        }

        // Event Listeners for Histogram Logic
        dataInput.addEventListener('input', parseData);
        binSlider.addEventListener('input', (e) => {
            binWidth = parseInt(e.target.value);
            binWidthVal.innerText = binWidth;
            drawChart();
        });

        function updateData(type) {
            if (type === 'reset') {
                dataInput.value = "";
            } else if (type === 'random') {
                const arr = Array.from({length: 30}, () => Math.floor(Math.random() * 80) + 10);
                dataInput.value = arr.join(', ');
            }
            parseData();
        }

        // Initialization
        parseData();
        // Initial Button Text Set
        toggleText.innerText = "閉じる";

    </script>
</body>
</html>
