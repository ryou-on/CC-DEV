<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/B Video Voting Overlay (No VS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: transparent !important;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* High contrast text shadow for visibility over video */
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* Glassmorphism panel style */
        .glass-panel {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        /* Floating Heart Animation */
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            50% {
                opacity: 0.9;
                transform: translateY(-80px) scale(1.2) rotate(10deg);
            }
            100% {
                transform: translateY(-180px) scale(1.5) rotate(-10deg);
                opacity: 0;
            }
        }
        
        .floating-heart {
            position: absolute;
            pointer-events: none;
            animation: floatUp 1.2s ease-out forwards;
            z-index: 50;
        }

        /* Button interaction */
        .vote-btn {
            transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
        }
        .vote-btn:active {
            transform: scale(0.9);
        }
        .vote-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body class="w-full h-screen pointer-events-none select-none">

    <!-- Main Layout Container -->
    <div class="w-full h-full flex relative">
        
        <!-- VS Badge Removed as requested -->

        <!-- Left Zone (Option A) -->
        <div class="w-1/2 h-full flex flex-col justify-end items-center pb-8 md:pb-12 border-r border-white/10 relative">
            <!-- Interactive Zone -->
            <div class="pointer-events-auto flex flex-col items-center gap-3 relative z-10">
                <!-- Counter -->
                <div id="count-left" class="text-5xl font-black text-white text-shadow tracking-widest transition-transform duration-100">0</div>
                
                <!-- Vote Button -->
                <button onclick="vote('left')" class="vote-btn glass-panel text-white rounded-full p-4 w-20 h-20 flex items-center justify-center relative group">
                    <!-- Heart Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-pink-500 fill-current drop-shadow-md group-hover:scale-110 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
                    </svg>
                </button>
                
                <!-- Label -->
                <div class="px-3 py-1 bg-black/50 rounded-full text-white font-bold text-shadow text-xs uppercase tracking-wider backdrop-blur-sm border border-white/10">
                    Option A
                </div>

                <!-- Container for spawning floating hearts -->
                <div id="float-container-left" class="absolute bottom-24 left-1/2 transform -translate-x-1/2 w-20 h-1 pointer-events-none"></div>
            </div>
        </div>

        <!-- Right Zone (Option B) -->
        <div class="w-1/2 h-full flex flex-col justify-end items-center pb-8 md:pb-12 relative">
            <!-- Interactive Zone -->
            <div class="pointer-events-auto flex flex-col items-center gap-3 relative z-10">
                <!-- Counter -->
                <div id="count-right" class="text-5xl font-black text-white text-shadow tracking-widest transition-transform duration-100">0</div>
                
                <!-- Vote Button -->
                <button onclick="vote('right')" class="vote-btn glass-panel text-white rounded-full p-4 w-20 h-20 flex items-center justify-center relative group">
                    <!-- Heart Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyan-400 fill-current drop-shadow-md group-hover:scale-110 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
                    </svg>
                </button>
                
                <!-- Label -->
                <div class="px-3 py-1 bg-black/50 rounded-full text-white font-bold text-shadow text-xs uppercase tracking-wider backdrop-blur-sm border border-white/10">
                    Option B
                </div>

                <!-- Container for spawning floating hearts -->
                <div id="float-container-right" class="absolute bottom-24 left-1/2 transform -translate-x-1/2 w-20 h-1 pointer-events-none"></div>
            </div>
        </div>
    </div>

    <script>
        // State management
        const state = {
            left: 0,
            right: 0
        };

        const config = {
            colors: {
                left: 'text-pink-500',
                right: 'text-cyan-400'
            }
        };

        /**
         * Handles the voting logic
         * @param {string} side - 'left' or 'right'
         */
        function vote(side) {
            // 1. Increment State
            state[side]++;
            
            // 2. Update DOM Number
            const countEl = document.getElementById(`count-${side}`);
            countEl.innerText = state[side];

            // 3. Bump Animation for Number
            countEl.style.transform = "scale(1.3)";
            setTimeout(() => countEl.style.transform = "scale(1)", 150);

            // 4. Spawn Floating Heart
            spawnHeart(side);
        }

        /**
         * Spawns a floating heart element
         */
        function spawnHeart(side) {
            const container = document.getElementById(`float-container-${side}`);
            const heart = document.createElement('div');
            
            heart.classList.add('floating-heart');
            
            // Random horizontal offset for natural feel
            const randomX = (Math.random() - 0.5) * 50; 
            heart.style.left = `calc(50% + ${randomX}px)`;
            
            // SVG Content
            const colorClass = config.colors[side];
            heart.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 ${colorClass} fill-current filter drop-shadow-lg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" /></svg>`;
            
            container.appendChild(heart);

            // Remove from DOM after animation completes
            setTimeout(() => {
                heart.remove();
            }, 1200);
        }
    </script>
</body>
</html>
