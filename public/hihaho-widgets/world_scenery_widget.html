 <!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Scenery Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: transparent !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Glassmorphism Card */
    .glass-card {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Text Shadows for high visibility */
    .text-shadow {
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.8s ease-in-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Progress Bar Animation */
    .progress-bar {
      width: 0%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }
    
    .animate-progress {
      animation: progress 5s linear infinite;
    }

    @keyframes progress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body class="w-full h-screen flex flex-col justify-end items-start p-6 pointer-events-none">

  <!-- Widget Container -->
  <div id="widget-container" class="glass-card pointer-events-auto rounded-2xl overflow-hidden w-full max-w-xs sm:max-w-sm md:max-w-md transition-all duration-300 transform hover:scale-105">
    
    <!-- Image Area -->
    <div class="relative h-48 w-full overflow-hidden">
      <img id="scene-image" src="" alt="Scenery" class="absolute inset-0 w-full h-full object-cover transition-transform duration-[5000ms] ease-linear scale-100" />
      
      <!-- Gradient Overlay for Text Readability -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent"></div>

      <!-- Text Content -->
      <div class="absolute bottom-0 left-0 p-4 w-full fade-in">
        <div class="flex items-center space-x-2 mb-1">
          <span class="px-2 py-0.5 rounded text-xs font-bold bg-blue-600 text-white uppercase tracking-wider shadow-sm">World Tour</span>
          <span id="scene-country" class="text-xs font-medium text-gray-300 uppercase tracking-widest text-shadow"></span>
        </div>
        <h2 id="scene-name" class="text-2xl font-bold text-white text-shadow leading-tight">Loading...</h2>
      </div>
    </div>

    <!-- Info & Controls Area -->
    <div class="px-4 py-3 flex justify-between items-center bg-white/5">
      <p id="scene-desc" class="text-sm text-gray-200 line-clamp-2 leading-relaxed text-shadow">
        Beautiful places around the world.
      </p>
    </div>

    <!-- Progress Bar Container -->
    <div class="h-1 w-full bg-gray-700/50">
      <div id="progress-indicator" class="progress-bar animate-progress"></div>
    </div>
  </div>

  <script>
    // Data Source
    const locations = [
      {
        name: "Fushimi Inari Taisha",
        country: "Japan",
        image: "https://images.unsplash.com/photo-1478436127897-769e1b3f0f36?auto=format&fit=crop&w=600&q=80",
        desc: "千本鳥居で有名な京都の神社。幻想的な朱色のトンネルが続きます。"
      },
      {
        name: "Santorini",
        country: "Greece",
        image: "https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?auto=format&fit=crop&w=600&q=80",
        desc: "エーゲ海に浮かぶ白と青のコントラストが美しい島。"
      },
      {
        name: "Machu Picchu",
        country: "Peru",
        image: "https://images.unsplash.com/photo-1526392060635-9d6019884377?auto=format&fit=crop&w=600&q=80",
        desc: "アンデス山脈の尾根にあるインカ帝国の遺跡。天空の都市。"
      },
      {
        name: "Aurora Borealis",
        country: "Iceland",
        image: "https://images.unsplash.com/photo-1531366936337-7c912a4589a7?auto=format&fit=crop&w=600&q=80",
        desc: "夜空を彩る神秘的な光のカーテン。一生に一度は見たい絶景。"
      },
      {
        name: "Grand Canyon",
        country: "USA",
        image: "https://images.unsplash.com/photo-1474044159687-1ee9fc3cfd1c?auto=format&fit=crop&w=600&q=80",
        desc: "何億年もの時をかけて刻まれた壮大な渓谷美。"
      }
    ];

    let currentIndex = 0;
    const intervalTime = 5000;

    // DOM Elements
    const imgEl = document.getElementById('scene-image');
    const nameEl = document.getElementById('scene-name');
    const countryEl = document.getElementById('scene-country');
    const descEl = document.getElementById('scene-desc');
    const progressEl = document.getElementById('progress-indicator');
    const container = document.getElementById('widget-container');

    function updateWidget() {
      const location = locations[currentIndex];

      // Reset Animation for Text
      container.classList.remove('fade-in');
      void container.offsetWidth; // Trigger reflow
      container.classList.add('fade-in');

      // Update Content
      imgEl.src = location.image;
      nameEl.textContent = location.name;
      countryEl.textContent = location.country;
      descEl.textContent = location.desc;

      // Simple Image Pan Effect Reset
      imgEl.style.transform = 'scale(1.0)';
      setTimeout(() => {
        imgEl.style.transform = 'scale(1.1)';
      }, 50);

      // Reset Progress Bar
      progressEl.classList.remove('animate-progress');
      void progressEl.offsetWidth; // Trigger reflow
      progressEl.classList.add('animate-progress');

      // Increment Index
      currentIndex = (currentIndex + 1) % locations.length;
    }

    // Initialize
    updateWidget();
    setInterval(updateWidget, intervalTime);

  </script>
</body>
</html>
