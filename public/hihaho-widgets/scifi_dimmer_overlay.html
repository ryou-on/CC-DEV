<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sci-Fi Dimmer Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    body {
      background-color: transparent !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
    }

    /* The full-screen dimmer overlay */
    #global-dimmer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      opacity: 0;
      pointer-events: none; /* Allows clicking through to the video */
      z-index: 40;
      transition: opacity 0.1s ease-out;
    }

    /* Custom Range Slider Styling for Sci-Fi Look */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    
    input[type=range]:focus {
      outline: none;
    }

    /* Slider Track */
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: rgba(0, 243, 255, 0.2);
      border: 1px solid rgba(0, 243, 255, 0.5);
      box-shadow: 0 0 5px rgba(0, 243, 255, 0.2);
      border-radius: 0;
    }

    /* Slider Thumb */
    input[type=range]::-webkit-slider-thumb {
      height: 16px;
      width: 16px;
      border-radius: 0;
      background: #00f3ff;
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -6px;
      box-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
      clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
    }

    /* Firefox styles */
    input[type=range]::-moz-range-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      background: rgba(0, 243, 255, 0.2);
      border: 1px solid rgba(0, 243, 255, 0.5);
    }
    input[type=range]::-moz-range-thumb {
      height: 16px;
      width: 16px;
      border: none;
      border-radius: 0;
      background: #00f3ff;
      cursor: pointer;
      box-shadow: 0 0 10px #00f3ff;
    }

    /* HUD Container Styles */
    .hud-panel {
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 243, 255, 0.4);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.05);
      clip-path: polygon(
        0 0, 
        100% 0, 
        100% 80%, 
        90% 100%, 
        0 100%
      );
    }

    .text-neon {
      color: #00f3ff;
      text-shadow: 0 0 5px rgba(0, 243, 255, 0.8);
    }

    .border-neon-b {
      border-bottom: 1px solid rgba(0, 243, 255, 0.3);
    }

    /* Decorative lines */
    .scanline {
      background: linear-gradient(to bottom, transparent 50%, rgba(0, 243, 255, 0.05) 51%);
      background-size: 100% 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Full Screen Dimmer Layer (Initially transparent, pointer-events: none allows clicks on video) -->
  <div id="global-dimmer"></div>

  <!-- Control Widget (Positioned Bottom Right) -->
  <div class="fixed bottom-8 right-8 z-50 w-64">
    <!-- Decorative Label -->
    <div class="flex justify-end mb-1">
      <span class="text-[10px] text-neon opacity-70 tracking-widest">SYS.OPACITY.CTRL_V1</span>
    </div>

    <!-- Main Panel -->
    <div class="hud-panel p-4 relative overflow-hidden group transition-all duration-300 hover:border-cyan-400">
      <!-- Scanline effect overlay inside the panel -->
      <div class="absolute inset-0 scanline z-0"></div>

      <div class="relative z-10 flex flex-col gap-3">
        <!-- Header Row -->
        <div class="flex justify-between items-center border-neon-b pb-2">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-cyan-400 animate-pulse"></div>
            <span class="text-xs font-bold text-white tracking-wider">DIMMER</span>
          </div>
          <span id="value-display" class="text-neon text-sm font-bold">0%</span>
        </div>

        <!-- Slider Control -->
        <div class="py-2">
          <input 
            type="range" 
            id="opacity-slider" 
            min="0" 
            max="100" 
            value="0" 
            step="1"
            aria-label="Opacity Control"
          >
        </div>

        <!-- Status Indicators (Decoration) -->
        <div class="flex justify-between text-[10px] text-gray-400 font-mono">
          <span>MIN</span>
          <span class="tracking-widest text-cyan-700">///</span>
          <span>MAX</span>
        </div>
      </div>

      <!-- Corner decoration -->
      <div class="absolute bottom-0 right-0 w-4 h-4 border-r-2 border-b-2 border-cyan-500 opacity-50"></div>
    </div>
  </div>

  <script>
    const slider = document.getElementById('opacity-slider');
    const dimmer = document.getElementById('global-dimmer');
    const valueDisplay = document.getElementById('value-display');

    // Initial state
    updateDimmer(slider.value);

    slider.addEventListener('input', (e) => {
      updateDimmer(e.target.value);
    });

    function updateDimmer(val) {
      // Convert 0-100 range to 0.0-1.0 opacity
      const opacity = val / 100;
      
      // Update the full screen overlay
      dimmer.style.opacity = opacity;
      
      // Update the text display
      valueDisplay.textContent = `${val}%`;
      
      // Optional: Visual feedback on the text color based on intensity
      if (val > 80) {
        valueDisplay.style.color = '#ff0055'; // Warning color at high opacity
        valueDisplay.style.textShadow = '0 0 8px #ff0055';
      } else {
        valueDisplay.style.color = '#00f3ff';
        valueDisplay.style.textShadow = '0 0 5px rgba(0, 243, 255, 0.8)';
      }
    }
  </script>
</body>
</html>
