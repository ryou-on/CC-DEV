<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Creator Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Transparent Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 3D Scene Container */
        #scene-container {
            width: 100%;
            height: 100%;
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }

        #scene-container:active {
            cursor: grabbing;
        }

        /* The Character Root */
        #character {
            position: relative;
            width: 100px;
            height: 200px;
            transform-style: preserve-3d;
            transform: rotateX(-10deg) rotateY(30deg);
            transition: transform 0.1s ease-out;
        }

        /* Generic Cube CSS */
        .cube {
            position: absolute;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: rgba(255,255,255,0.8);
            backface-visibility: visible;
            transition: background-color 0.3s, border-radius 0.3s;
        }

        /* Cube Geometry Helpers */
        .front  { transform: rotateY(0deg) translateZ(var(--depth)); }
        .back   { transform: rotateY(180deg) translateZ(var(--depth)); }
        .right  { transform: rotateY(90deg) translateZ(var(--width)); }
        .left   { transform: rotateY(-90deg) translateZ(var(--width)); }
        .top    { transform: rotateX(90deg) translateZ(var(--depth)); }
        .bottom { transform: rotateX(-90deg) translateZ(var(--depth)); }

        /* Body Parts Positioning */
        /* HEAD: 60x60x60 */
        .head-group {
            width: 60px;
            height: 60px;
            position: absolute;
            top: 0;
            left: 20px;
            transform-style: preserve-3d;
            --depth: 30px;
            --width: 30px;
        }
        .head-group .face {
            width: 60px;
            height: 60px;
        }
        .head-group .right, .head-group .left { width: 60px; }
        .head-group .top, .head-group .bottom { height: 60px; }

        /* EYES */
        .eye {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ffcc;
            transform: translateZ(32px);
        }
        .eye.left-eye { top: 20px; left: 12px; }
        .eye.right-eye { top: 20px; right: 12px; }

        /* BODY: 80x100x40 */
        .body-group {
            width: 80px;
            height: 100px;
            position: absolute;
            top: 70px;
            left: 10px;
            transform-style: preserve-3d;
            --depth: 20px;
            --width: 40px;
        }
        .body-group .face.front, .body-group .face.back { width: 80px; height: 100px; }
        .body-group .face.right, .body-group .face.left { width: 40px; height: 100px; left: 20px; /* offset for width diff */ }
        .body-group .face.top, .body-group .face.bottom { width: 80px; height: 40px; top: 30px; /* offset for height diff */ }

        /* UI Overlay */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        label {
            color: #fff;
            font-size: 0.8rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        select, button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        select:focus, button:hover {
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }

        .slider-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type=range] {
            flex-grow: 1;
            accent-color: #00ffcc;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        /* Style Presets */
        .bg-neon-blue { background-color: rgba(0, 200, 255, 0.6); }
        .bg-neon-pink { background-color: rgba(255, 0, 150, 0.6); }
        .bg-neon-green { background-color: rgba(0, 255, 100, 0.6); }
        .bg-dark-metal { background-color: rgba(50, 50, 60, 0.9); }
        
        .shape-round { border-radius: 50% !important; }
        .shape-box { border-radius: 4px !important; }

        /* Tip text */
        .tip {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            pointer-events: none;
            text-shadow: 0 1px 3px #000;
            text-align: right;
        }

    </style>
</head>
<body>

    <!-- Scene -->
    <div id="scene-container">
        <div id="character">
            <!-- Head -->
            <div class="head-group cube">
                <div class="face front bg-neon-blue shape-box"></div>
                <div class="face back bg-neon-blue shape-box"></div>
                <div class="face right bg-neon-blue shape-box"></div>
                <div class="face left bg-neon-blue shape-box"></div>
                <div class="face top bg-neon-blue shape-box"></div>
                <div class="face bottom bg-neon-blue shape-box"></div>
                <!-- Eyes attached to head group -->
                <div class="eye left-eye"></div>
                <div class="eye right-eye"></div>
            </div>

            <!-- Body -->
            <div class="body-group cube">
                <div class="face front bg-dark-metal shape-box">CORE</div>
                <div class="face back bg-dark-metal shape-box"></div>
                <div class="face right bg-dark-metal shape-box"></div>
                <div class="face left bg-dark-metal shape-box"></div>
                <div class="face top bg-dark-metal shape-box"></div>
                <div class="face bottom bg-dark-metal shape-box"></div>
            </div>
        </div>
    </div>

    <div class="tip">
        <p>👆 DRAG TO ROTATE</p>
    </div>

    <!-- Controls -->
    <div id="controls">
        <div class="control-row">
            <label>
                HEAD STYLE
                <select id="headColor">
                    <option value="bg-neon-blue">Blue</option>
                    <option value="bg-neon-pink">Pink</option>
                    <option value="bg-neon-green">Green</option>
                    <option value="bg-dark-metal">Metal</option>
                </select>
            </label>
            <label>
                SHAPE
                <select id="headShape">
                    <option value="shape-box">Box</option>
                    <option value="shape-round">Round</option>
                </select>
            </label>
        </div>

        <div class="control-row">
            <label>
                BODY STYLE
                <select id="bodyColor">
                    <option value="bg-dark-metal">Metal</option>
                    <option value="bg-neon-blue">Blue</option>
                    <option value="bg-neon-pink">Pink</option>
                    <option value="bg-neon-green">Green</option>
                </select>
            </label>
            <label>
                SHAPE
                <select id="bodyShape">
                    <option value="shape-box">Box</option>
                    <option value="shape-round">Round</option>
                </select>
            </label>
        </div>

        <div class="slider-group">
            <label style="white-space:nowrap;">ROT X</label>
            <input type="range" id="rotX" min="-180" max="180" value="-10">
        </div>
        <div class="slider-group">
            <label style="white-space:nowrap;">ROT Y</label>
            <input type="range" id="rotY" min="-180" max="180" value="30">
        </div>
        
        <button onclick="resetCharacter()" class="w-full mt-2 font-bold text-xs uppercase tracking-wider hover:bg-white hover:text-black transition">Reset Position</button>
    </div>

    <script>
        const scene = document.getElementById('scene-container');
        const character = document.getElementById('character');
        const inputs = {
            rotX: document.getElementById('rotX'),
            rotY: document.getElementById('rotY'),
            headColor: document.getElementById('headColor'),
            headShape: document.getElementById('headShape'),
            bodyColor: document.getElementById('bodyColor'),
            bodyShape: document.getElementById('bodyShape')
        };

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotation = { x: -10, y: 30 };

        // Update Transform
        function updateRotation() {
            character.style.transform = `rotateX(${rotation.x}deg) rotateY(${rotation.y}deg)`;
            inputs.rotX.value = rotation.x;
            inputs.rotY.value = rotation.y;
        }

        // Mouse / Touch Drag Logic
        scene.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            
            rotation.y += deltaX * 0.5;
            rotation.x -= deltaY * 0.5;

            previousMousePosition = { x: e.clientX, y: e.clientY };
            updateRotation();
        });

        // Touch Support
        scene.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        window.addEventListener('touchend', () => isDragging = false);

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - previousMousePosition.x;
            const deltaY = e.touches[0].clientY - previousMousePosition.y;
            
            rotation.y += deltaX * 0.5;
            rotation.x -= deltaY * 0.5;

            previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            updateRotation();
        });

        // UI Controls Events
        inputs.rotX.addEventListener('input', (e) => {
            rotation.x = parseInt(e.target.value);
            updateRotation();
        });

        inputs.rotY.addEventListener('input', (e) => {
            rotation.y = parseInt(e.target.value);
            updateRotation();
        });

        // Part Changer Logic
        function updatePartStyle(partSelector, type, value) {
            const faces = document.querySelectorAll(`${partSelector} .face`);
            faces.forEach(face => {
                // Remove all potential classes in that category
                if (type === 'color') {
                    face.classList.remove('bg-neon-blue', 'bg-neon-pink', 'bg-neon-green', 'bg-dark-metal');
                } else {
                    face.classList.remove('shape-box', 'shape-round');
                }
                // Add new class
                face.classList.add(value);
            });
        }

        inputs.headColor.addEventListener('change', (e) => updatePartStyle('.head-group', 'color', e.target.value));
        inputs.headShape.addEventListener('change', (e) => updatePartStyle('.head-group', 'shape', e.target.value));
        inputs.bodyColor.addEventListener('change', (e) => updatePartStyle('.body-group', 'color', e.target.value));
        inputs.bodyShape.addEventListener('change', (e) => updatePartStyle('.body-group', 'shape', e.target.value));

        function resetCharacter() {
            rotation = { x: -10, y: 30 };
            updateRotation();
        }
    </script>
</body>
</html>
