<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live News Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* CRITICAL: Transparent Background */
        body, html {
            background: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* Ticker Animation */
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
        }

        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 30s linear infinite;
        }

        /* Enhanced Visibility */
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }

        /* Blinking Live Dot */
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .live-dot {
            animation: blink 1.5s infinite ease-in-out;
        }
    </style>
</head>
<body class="flex flex-col justify-end pb-8 px-4 sm:px-10">

    <!-- Main Lower Third Container -->
    <div class="w-full max-w-7xl mx-auto">
        
        <!-- Category Tag (Floating above main bar) -->
        <div class="inline-flex items-center bg-red-600 text-white px-3 py-1 text-xs font-bold tracking-wider uppercase rounded-t-md shadow-lg transform translate-y-1 ml-4">
            <span class="w-2 h-2 bg-white rounded-full mr-2 live-dot"></span>
            LIVE COVERAGE
        </div>

        <!-- Main Bar -->
        <div class="glass-panel flex items-center rounded-lg overflow-hidden h-16 relative">
            
            <!-- Left: Logo / Branding Area -->
            <div class="bg-blue-800 h-full flex items-center px-4 sm:px-6 shrink-0 relative z-10">
                <i class="fas fa-globe-asia text-white text-2xl mr-3"></i>
                <div class="flex flex-col justify-center">
                    <span class="text-white font-black text-lg leading-tight tracking-tighter">NEWS 24</span>
                    <span class="text-blue-200 text-xs font-semibold tracking-widest">GLOBAL</span>
                </div>
                <!-- Slanted Separator -->
                <div class="absolute right-0 top-0 bottom-0 w-4 bg-blue-800 transform skew-x-12 translate-x-2"></div>
            </div>

            <!-- Middle: Scrolling Ticker -->
            <div class="flex-1 flex items-center h-full relative z-0 pl-6 overflow-hidden">
                <div class="ticker-wrap">
                    <div class="ticker-content text-white text-lg font-medium tracking-wide text-shadow">
                        <span class="text-yellow-400 font-bold mr-2">[速報]</span> 台風接近に伴い、各地で公共交通機関に影響が出る見込みです &nbsp;&nbsp;&nbsp;///&nbsp;&nbsp;&nbsp; 
                        <span class="text-blue-300 font-bold mr-2">[経済]</span> 日経平均株価、午前終値で300円高の反発 &nbsp;&nbsp;&nbsp;///&nbsp;&nbsp;&nbsp; 
                        <span class="text-green-400 font-bold mr-2">[スポーツ]</span> 日本代表、国際親善試合で劇的勝利 &nbsp;&nbsp;&nbsp;///&nbsp;&nbsp;&nbsp;
                        <span class="text-red-400 font-bold mr-2">[注意]</span> ライブ配信中のコメントに関するガイドラインをご確認ください
                    </div>
                </div>
            </div>

            <!-- Right: Clock & Date -->
            <div class="bg-black/50 h-full flex flex-col justify-center px-5 shrink-0 border-l border-white/10 text-right min-w-[100px]">
                <div id="clock-time" class="text-white font-mono text-xl font-bold leading-none">12:00</div>
                <div id="clock-date" class="text-gray-400 text-xs font-medium uppercase mt-1">OCT 25</div>
            </div>

        </div>
    </div>

    <script>
        // Real-time Clock Function
        function updateClock() {
            const now = new Date();
            
            // Time Format HH:MM
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            // Optional: Seconds
            // const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock-time').textContent = `${hours}:${minutes}`;

            // Date Format MMM DD
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const month = months[now.getMonth()];
            const date = now.getDate();
            document.getElementById('clock-date').textContent = `${month} ${date}`;
        }

        // Update every second
        setInterval(updateClock, 1000);
        updateClock(); // Initial call
    </script>
</body>
</html>
