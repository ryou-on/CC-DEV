<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画オーバーレイ・アンケートフォーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Base Reset for Overlay */
    body {
      margin: 0;
      padding: 0;
      /* 1. BACKGROUND: Transparent */
      background: transparent !important;
      display: flex;
      justify-content: center;
      /* 14:9の枠を配置し、上部を少し開けるための設定 */
      align-items: flex-start;
      padding-top: 8vh;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      overflow: hidden;
    }

    /* Main Widget Container */
    .widget-container {
      width: 95%;
      max-width: 840px;
      /* 14:9 Aspect Ratio */
      aspect-ratio: 14 / 9;
      /* 2. VISIBILITY: White base, semi-transparent glassmorphism */
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    /* Scrollable Area Customization */
    .scroll-area {
      overflow-y: auto;
      flex: 1;
    }
    .scroll-area::-webkit-scrollbar {
      width: 8px;
    }
    .scroll-area::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 4px;
    }
    .scroll-area::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }

    /* 4. RESPONSIVENESS: Mobile Adaptations */
    @media (max-width: 768px) {
      body {
        padding-top: 10vh;
      }
      .widget-container {
        aspect-ratio: auto;
        height: 90vh;
        border-radius: 20px 20px 0 0;
        width: 100%;
      }
      /* Larger text sizes and touch targets for mobile */
      .form-label {
        font-size: 1.125rem !important;
      }
      .form-input {
        font-size: 16px !important; /* Prevents iOS auto-zoom */
        min-height: 48px !important;
      }
      .radio-label {
        font-size: 1.125rem !important;
        min-height: 48px;
        padding: 0.5rem 0;
      }
      .radio-input {
        width: 1.5rem !important;
        height: 1.5rem !important;
      }
      .submit-btn {
        font-size: 1.25rem !important;
        min-height: 56px;
      }
    }
  </style>
</head>
<body>

  <div class="widget-container">
    <!-- Header -->
    <div class="bg-gray-50 border-b border-gray-200 p-4 md:p-5 shrink-0 relative">
      <h2 class="text-xl md:text-2xl font-bold text-gray-800 text-center mb-2 tracking-wide">応募アンケート</h2>
      <div class="text-sm md:text-base text-gray-700 text-center font-medium leading-relaxed">
        毎月月末締め切り <span class="text-gray-500 text-xs md:text-sm">※当日印有効</span><br>
        <span class="inline-block mt-1 px-3 py-1 bg-red-100 text-red-700 rounded-full font-bold text-xs md:text-sm shadow-sm">
          最終締切日：2024年6月14日まで
        </span>
      </div>
      <div class="absolute bottom-3 right-4 text-xs md:text-sm text-red-600 font-bold">
        * の項目は、必ずご記入ください
      </div>
    </div>

    <!-- Form Content -->
    <div class="scroll-area p-5 md:p-8 space-y-8">
      
      <!-- ご希望賞品 -->
      <div class="space-y-3">
        <label class="form-label block font-bold text-gray-800 text-lg">
          ご希望賞品 <span class="text-red-500">*</span>
        </label>
        <div class="flex flex-wrap gap-8">
          <label class="radio-label flex items-center cursor-pointer text-gray-700 font-medium hover:text-blue-600 transition">
            <input type="radio" name="prize" value="A" class="radio-input w-5 h-5 accent-blue-600 mr-3">
            A賞
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700 font-medium hover:text-blue-600 transition">
            <input type="radio" name="prize" value="B" class="radio-input w-5 h-5 accent-blue-600 mr-3">
            B賞
          </label>
        </div>
      </div>

      <hr class="border-gray-200">

      <!-- ご利用医院名 / 医院TEL -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="form-label block font-bold text-gray-800">
            ご利用医院名 <span class="text-red-500">*</span>
          </label>
          <input type="text" class="form-input w-full bg-white border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm" placeholder="〇〇歯科医院">
        </div>
        <div class="space-y-2">
          <label class="form-label block font-bold text-gray-800">
            医院TEL
          </label>
          <input type="tel" class="form-input w-full bg-white border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm" placeholder="000-000-0000">
        </div>
      </div>

      <!-- お名前 / ふりがな -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="form-label block font-bold text-gray-800">
            お名前 <span class="text-red-500">*</span>
          </label>
          <input type="text" class="form-input w-full bg-white border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm" placeholder="山田 太郎">
        </div>
        <div class="space-y-2">
          <label class="form-label block font-bold text-gray-800">
            ふりがな
          </label>
          <input type="text" class="form-input w-full bg-white border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm" placeholder="やまだ たろう">
        </div>
      </div>

      <!-- 性別 / お電話番号 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-3">
          <label class="form-label block font-bold text-gray-800">
            性別
          </label>
          <div class="flex flex-wrap gap-6 pt-1">
            <label class="radio-label flex items-center cursor-pointer text-gray-700">
              <input type="radio" name="gender" value="male" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 男性
            </label>
            <label class="radio-label flex items-center cursor-pointer text-gray-700">
              <input type="radio" name="gender" value="female" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 女性
            </label>
          </div>
        </div>
        <div class="space-y-2">
          <label class="form-label block font-bold text-gray-800">
            お電話番号 <span class="text-red-500">*</span>
          </label>
          <input type="tel" class="form-input w-full bg-white border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm" placeholder="090-0000-0000">
        </div>
      </div>

      <!-- ご住所 -->
      <div class="space-y-3">
        <label class="form-label block font-bold text-gray-800">
          ご住所
        </label>
        <div class="flex flex-col md:flex-row gap-3">
          <input type="text" class="form-input md:w-1/3 bg-white border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm" placeholder="都道府県">
          <input type="text" class="form-input md:w-2/3 bg-white border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm" placeholder="市区町村">
        </div>
        <input type="text" class="form-input w-full bg-white border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm" placeholder="番地・マンション名など">
      </div>

      <!-- ご年齢 -->
      <div class="space-y-3">
        <label class="form-label block font-bold text-gray-800">
          ご年齢
        </label>
        <div class="flex flex-wrap gap-x-8 gap-y-3">
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="age" value="50under" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 50代以下
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="age" value="60s" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 60代
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="age" value="70s" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 70代
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="age" value="80over" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 80代以上
          </label>
        </div>
      </div>

      <!-- ご職業 -->
      <div class="space-y-3">
        <label class="form-label block font-bold text-gray-800">
          ご職業
        </label>
        <div class="flex flex-wrap gap-x-6 gap-y-3">
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="job" value="company" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 会社員
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="job" value="housewife" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 主婦
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="job" value="public" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 公務員
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="job" value="self" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 自営業
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="job" value="student" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 学生
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="job" value="parttime" class="radio-input w-5 h-5 accent-blue-600 mr-2"> パート・アルバイト
          </label>
          <label class="radio-label flex items-center cursor-pointer text-gray-700">
            <input type="radio" name="job" value="none" class="radio-input w-5 h-5 accent-blue-600 mr-2"> 無職
          </label>
          <div class="flex items-center gap-2 w-full md:w-auto">
            <label class="radio-label flex items-center cursor-pointer text-gray-700 shrink-0">
              <input type="radio" name="job" value="other" class="radio-input w-5 h-5 accent-blue-600 mr-2"> その他
            </label>
            <input type="text" class="form-input flex-1 bg-transparent border-0 border-b-2 border-gray-300 rounded-none px-2 py-1 text-gray-800 focus:ring-0 focus:border-blue-500 outline-none transition min-h-[40px]" placeholder="(具体的に)">
          </div>
        </div>
      </div>

    </div>

    <!-- Footer / Submit Action -->
    <div class="p-4 md:p-5 border-t border-gray-200 bg-white shrink-0">
      <button onclick="handleSubmit()" class="submit-btn w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 md:py-4 px-6 rounded-xl shadow-lg transition-all duration-200 transform hover:-translate-y-1 hover:shadow-xl active:scale-[0.98] active:translate-y-0">
        アンケートを送信する
      </button>
    </div>
  </div>

  <script>
    function handleSubmit() {
      // In a real application, form validation and submission logic would go here.
      const btn = document.querySelector('.submit-btn');
      const originalText = btn.innerText;
      
      btn.innerText = '送信中...';
      btn.classList.add('opacity-80', 'cursor-not-allowed');
      
      setTimeout(() => {
        alert('アンケートを送信しました。ご協力ありがとうございます。');
        btn.innerText = originalText;
        btn.classList.remove('opacity-80', 'cursor-not-allowed');
      }, 800);
    }
  </script>
</body>
</html>
