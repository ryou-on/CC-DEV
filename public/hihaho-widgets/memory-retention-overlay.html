<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Memory HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Custom Scrollbar for the list */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .text-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="pointer-events-none flex justify-end items-start p-4 h-full">

    <!-- Main Widget Container -->
    <div id="memoryWidget" class="pointer-events-auto w-80 sm:w-96 max-h-[90vh] flex flex-col rounded-xl glass-panel transition-all duration-300 transform translate-x-0">
        
        <!-- Header -->
        <div class="flex justify-between items-center p-4 border-b border-white/10">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.8)]"></div>
                <h2 class="text-white font-bold tracking-wider text-glow">MEMORY HUD</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadNotes()" title="保存してダウンロード" class="text-white/70 hover:text-cyan-400 transition-colors p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                    </svg>
                </button>
                <button onclick="toggleMinimize()" class="text-white/70 hover:text-yellow-400 transition-colors p-1">
                    <svg id="toggleIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Content List -->
        <div id="notesContainer" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-3 min-h-[150px]">
            <!-- Empty State -->
            <div id="emptyState" class="text-center text-white/40 text-sm py-4">
                動画を見ながらメモを残そう
            </div>
            <!-- Notes will be injected here -->
        </div>

        <!-- Input Area -->
        <div class="p-4 border-t border-white/10 bg-black/20">
            <form id="noteForm" onsubmit="addNote(event)" class="flex gap-2">
                <input 
                    type="text" 
                    id="noteInput" 
                    placeholder="記憶したい内容を入力..." 
                    class="flex-1 bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="bg-cyan-600 hover:bg-cyan-500 text-white p-2 rounded-lg shadow-lg transition-all active:scale-95"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Minimized Toggle (Hidden by default) -->
    <button id="restoreBtn" onclick="toggleMinimize()" class="hidden pointer-events-auto fixed right-4 bottom-4 bg-cyan-600 hover:bg-cyan-500 p-3 rounded-full shadow-[0_0_15px_rgba(8,145,178,0.6)] text-white transition-all transform hover:scale-110">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
        </svg>
    </button>

    <script>
        // State Management
        let notes = JSON.parse(localStorage.getItem('videoMemoryNotes')) || [];
        const widget = document.getElementById('memoryWidget');
        const restoreBtn = document.getElementById('restoreBtn');
        const listContainer = document.getElementById('notesContainer');
        const emptyState = document.getElementById('emptyState');

        // Initialization
        renderNotes();

        // Functions
        function addNote(e) {
            e.preventDefault();
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            
            if (!text) return;

            const newNote = {
                id: Date.now(),
                text: text,
                timestamp: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
            };

            notes.push(newNote);
            saveToLocal();
            renderNotes();
            input.value = '';
            
            // Auto scroll to bottom
            listContainer.scrollTop = listContainer.scrollHeight;
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            saveToLocal();
            renderNotes();
        }

        function saveToLocal() {
            localStorage.setItem('videoMemoryNotes', JSON.stringify(notes));
        }

        function renderNotes() {
            // Clear current list except empty state
            listContainer.innerHTML = '';
            
            if (notes.length === 0) {
                listContainer.appendChild(emptyState);
                emptyState.style.display = 'block';
            } else {
                // Temporarily hide empty state in memory (it's re-appended if empty)
                emptyState.style.display = 'none';
                
                notes.forEach(note => {
                    const noteEl = document.createElement('div');
                    noteEl.className = 'group flex justify-between items-start bg-white/5 hover:bg-white/10 rounded-lg p-3 transition-colors border border-white/5';
                    noteEl.innerHTML = `
                        <div class="flex flex-col gap-1">
                            <span class="text-xs text-cyan-300 font-mono">${note.timestamp}</span>
                            <span class="text-sm text-white/90 break-all">${escapeHtml(note.text)}</span>
                        </div>
                        <button onclick="deleteNote(${note.id})" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 transition-opacity ml-2">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    `;
                    listContainer.appendChild(noteEl);
                });
            }
        }

        function downloadNotes() {
            if (notes.length === 0) {
                alert('保存するメモがありません。');
                return;
            }
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "video_memory_notes_" + new Date().toISOString().slice(0,10) + ".json");
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function toggleMinimize() {
            if (widget.classList.contains('hidden')) {
                widget.classList.remove('hidden');
                restoreBtn.classList.add('hidden');
            } else {
                widget.classList.add('hidden');
                restoreBtn.classList.remove('hidden');
            }
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
