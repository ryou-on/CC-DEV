<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>USD/JPY ウィジェット（縦型）</title>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body{
      background: transparent !important;
      font-family: "M PLUS Rounded 1c", sans-serif;
      margin:0;
      overflow:hidden;
    }
    button:focus-visible { outline: 2px solid rgba(255,255,255,.85); outline-offset: 2px; }
  </style>
</head>

<body class="h-screen w-screen flex items-center justify-center pointer-events-none">
  <!-- Single vertical widget -->
  <div class="pointer-events-auto w-[92%] max-w-md bg-slate-900/60 backdrop-blur-md border border-white/15 rounded-3xl shadow-2xl px-5 py-5 sm:px-6 sm:py-6">
    <!-- Header -->
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <div class="flex items-baseline gap-3">
          <div class="text-white font-black tracking-widest text-2xl drop-shadow">USD/JPY</div>
          <div class="text-white/70 font-bold text-sm">（ドル円）</div>
        </div>
        <div class="text-white/60 text-xs mt-2">更新：<span id="updatedAt">--:--:--</span></div>
      </div>

      <div class="text-right shrink-0">
        <div class="text-white/70 text-xs font-bold">現在値</div>
        <div class="text-white font-black text-4xl sm:text-5xl leading-none drop-shadow">
          <span id="price">--.--</span>
        </div>
        <div class="text-white/70 text-sm font-bold mt-1">JPY</div>
      </div>
    </div>

    <!-- Range Switch -->
    <div class="mt-5">
      <div class="inline-flex bg-white/10 rounded-2xl p-1 border border-white/10">
        <button id="btnDay"   class="px-5 py-2 rounded-xl text-sm font-black text-white/90 transition">日</button>
        <button id="btnMonth" class="px-5 py-2 rounded-xl text-sm font-black text-white/90 transition">月</button>
        <button id="btnYear"  class="px-5 py-2 rounded-xl text-sm font-black text-white/90 transition">年</button>
      </div>
    </div>

    <!-- Chart panel -->
    <div class="mt-5 bg-black/25 rounded-3xl border border-white/10 p-4">
      <div class="flex items-center justify-between mb-3">
        <div class="text-white/75 text-sm font-black">推移</div>
        <div class="text-white/60 text-xs font-bold">
          <span id="rangeLabel">日</span> / <span id="pointsLabel">--</span>
        </div>
      </div>

      <canvas id="chart" height="210" class="w-full"></canvas>

      <div class="mt-4 grid grid-cols-3 gap-3 text-xs text-white/70">
        <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
          <div class="text-white/55 font-bold">最小</div>
          <div class="text-white font-black text-lg"><span id="minVal">--</span></div>
        </div>
        <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
          <div class="text-white/55 font-bold">最大</div>
          <div class="text-white font-black text-lg"><span id="maxVal">--</span></div>
        </div>
        <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
          <div class="text-white/55 font-bold">変動</div>
          <div class="text-white font-black text-lg leading-tight"><span id="chgVal">--</span></div>
        </div>
      </div>

      <div class="mt-3 text-[11px] text-white/45">
        ヒント：グラフ上にマウスを合わせると、その時点の価格を表示します。
      </div>
    </div>
  </div>

<script>
/**
 * ==========================
 * 設定
 * ==========================
 * Twelve Data を使う場合：
 *  - APIキーが必要（空欄なら Frankfurter にフォールバック）
 * Frankfurter（キー不要）：
 *  - 日次の参照レート
 */
const TWELVE_API_KEY = "";      // ← Twelve Data のAPIキー（任意）
const POLL_MS = 10_000;         // 現在値の更新間隔（ミリ秒）
const DAY_INTRADAY_INTERVAL = "1min";
const DAY_INTRADAY_OUTPUTSIZE = 180;
const MONTH_DAYS = 31;
const YEAR_DAYS  = 365;

/** UI elements */
const elPrice = document.getElementById("price");
const elUpdatedAt = document.getElementById("updatedAt");
const elRangeLabel = document.getElementById("rangeLabel");
const elPointsLabel = document.getElementById("pointsLabel");
const elMinVal = document.getElementById("minVal");
const elMaxVal = document.getElementById("maxVal");
const elChgVal = document.getElementById("chgVal");
const btnDay = document.getElementById("btnDay");
const btnMonth = document.getElementById("btnMonth");
const btnYear = document.getElementById("btnYear");
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

/** state */
let currentRange = "day"; // day | month | year
let pollingTimer = null;
let series = []; // { t: number, label: string, v: number }
let hoverIndex = null;

/** helpers */
function fmtNum(n, digits=3){
  if (n === null || n === undefined || Number.isNaN(n)) return "--";
  return Number(n).toFixed(digits);
}
function nowTimeStr(){
  const d = new Date();
  return d.toLocaleTimeString("ja-JP", { hour12:false });
}
function ymd(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function daysAgo(n){
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d;
}

/**
 * ==========================
 * API: Frankfurter（日次・キー不要）
 * ==========================
 */
async function frankfurterLatestUSDJPY(){
  const url = "https://api.frankfurter.dev/v1/latest?base=USD&symbols=JPY";
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error("Frankfurter latest failed");
  const j = await r.json();
  const rate = j?.rates?.JPY;
  if (!rate) throw new Error("Frankfurter latest missing JPY");
  return Number(rate);
}
async function frankfurterSeriesUSDJPY(startYMD, endYMD){
  const url = `https://api.frankfurter.dev/v1/${startYMD}..${endYMD}?base=USD&symbols=JPY`;
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error("Frankfurter series failed");
  const j = await r.json();
  const rates = j?.rates;
  if (!rates) throw new Error("Frankfurter series missing rates");

  const out = [];
  const keys = Object.keys(rates).sort();
  for (const k of keys){
    const v = rates[k]?.JPY;
    if (typeof v === "number"){
      out.push({ t: Date.parse(k), label: k, v });
    }
  }
  return out;
}

/**
 * ==========================
 * API: Twelve Data（キーあり時）
 * ==========================
 */
async function twelveQuoteUSDJPY(){
  const url = `https://api.twelvedata.com/quote?symbol=USD/JPY&apikey=${encodeURIComponent(TWELVE_API_KEY)}`;
  const r = await fetch(url, { cache:"no-store" });
  if (!r.ok) throw new Error("Twelve quote failed");
  const j = await r.json();
  if (j?.status === "error") throw new Error(j?.message || "Twelve quote error");

  const price = Number(j?.price);
  if (!Number.isFinite(price)) throw new Error("Twelve quote missing price");
  return price;
}
async function twelveTimeSeriesUSDJPY(interval, outputsize){
  const url = `https://api.twelvedata.com/time_series?symbol=USD/JPY&interval=${encodeURIComponent(interval)}&outputsize=${encodeURIComponent(outputsize)}&apikey=${encodeURIComponent(TWELVE_API_KEY)}`;
  const r = await fetch(url, { cache:"no-store" });
  if (!r.ok) throw new Error("Twelve time_series failed");
  const j = await r.json();
  if (j?.status === "error") throw new Error(j?.message || "Twelve time_series error");

  const values = Array.isArray(j?.values) ? j.values : [];
  const out = [];
  for (let i = values.length - 1; i >= 0; i--){
    const row = values[i];
    const dt = row?.datetime;
    const close = Number(row?.close);
    if (!dt || !Number.isFinite(close)) continue;

    const t = Date.parse(dt.replace(" ", "T") + "Z");
    const label = dt; // tooltipでそのまま表示
    out.push({ t, label, v: close });
  }
  return out;
}

/**
 * ==========================
 * Chart drawing (Canvas)
 * ==========================
 */
function resizeCanvasToCSS(){
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = Math.round(rect.width * dpr);
  const h = Math.round(rect.height * dpr);
  if (canvas.width !== w || canvas.height !== h){
    canvas.width = w;
    canvas.height = h;
  }
}
function roundRect(ctx, x, y, w, h, r){
  const rr = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr, y);
  ctx.arcTo(x+w, y, x+w, y+h, rr);
  ctx.arcTo(x+w, y+h, x, y+h, rr);
  ctx.arcTo(x, y+h, x, y, rr);
  ctx.arcTo(x, y, x+w, y, rr);
  ctx.closePath();
}

function drawChart(points){
  resizeCanvasToCSS();
  ctx.clearRect(0,0,canvas.width, canvas.height);

  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const padTop = 12 * dpr;
  const padBottom = 18 * dpr;
  const padRight = 10 * dpr;
  const padLeft = 52 * dpr; // 左に値表示

  const W = canvas.width, H = canvas.height;
  const innerW = W - padLeft - padRight;
  const innerH = H - padTop - padBottom;

  if (!points || points.length < 2){
    ctx.fillStyle = "rgba(255,255,255,0.65)";
    ctx.font = `${14*dpr}px "M PLUS Rounded 1c"`;
    ctx.fillText("データ取得中…", padLeft, padTop + 18*dpr);
    return;
  }

  let min = Infinity, max = -Infinity;
  for (const p of points){
    min = Math.min(min, p.v);
    max = Math.max(max, p.v);
  }
  const range = (max - min) || (max || 1) * 0.001;
  const yMin = min - range*0.08;
  const yMax = max + range*0.08;

  const xStep = innerW / (points.length - 1);
  const xAt = (i) => padLeft + xStep*i;
  const yAt = (v) => padTop + innerH*(1 - (v - yMin)/(yMax - yMin));

  // Grid
  const TICKS = 4;
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 1 * dpr;
  for (let i=0;i<=TICKS;i++){
    const y = padTop + (innerH*(i/TICKS));
    ctx.beginPath();
    ctx.moveTo(padLeft, y);
    ctx.lineTo(padLeft + innerW, y);
    ctx.stroke();
  }

  // Y-axis labels
  ctx.fillStyle = "rgba(255,255,255,0.65)";
  ctx.font = `${11*dpr}px "M PLUS Rounded 1c"`;
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  for (let i=0;i<=TICKS;i++){
    const y = padTop + (innerH*(i/TICKS));
    const v = yMax - (yMax - yMin)*(i/TICKS);
    ctx.fillText(v.toFixed(2), padLeft - 8*dpr, y);
  }

  // Axis line
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 1 * dpr;
  ctx.beginPath();
  ctx.moveTo(padLeft, padTop);
  ctx.lineTo(padLeft, padTop + innerH);
  ctx.stroke();

  // Line
  ctx.strokeStyle = "rgba(250,204,21,0.95)";
  ctx.lineWidth = 2 * dpr;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";

  ctx.beginPath();
  for (let i=0;i<points.length;i++){
    const x = xAt(i);
    const y = yAt(points[i].v);
    if (i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Last dot
  const last = points[points.length-1];
  const lx = xAt(points.length-1);
  const ly = yAt(last.v);
  ctx.fillStyle = "rgba(250,204,21,1)";
  ctx.beginPath();
  ctx.arc(lx, ly, 3.2*dpr, 0, Math.PI*2);
  ctx.fill();

  // Hover crosshair + tooltip
  if (hoverIndex !== null && hoverIndex >= 0 && hoverIndex < points.length){
    const p = points[hoverIndex];
    const hx = xAt(hoverIndex);
    const hy = yAt(p.v);

    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 1*dpr;
    ctx.beginPath();
    ctx.moveTo(hx, padTop);
    ctx.lineTo(hx, padTop + innerH);
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.beginPath();
    ctx.arc(hx, hy, 3.4*dpr, 0, Math.PI*2);
    ctx.fill();

    const valueStr = `${p.v.toFixed(3)} JPY`;
    const labelStr = p.label ? String(p.label) : "";
    const text = labelStr ? `${labelStr}  ${valueStr}` : valueStr;

    ctx.font = `${12*dpr}px "M PLUS Rounded 1c"`;
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    const metrics = ctx.measureText(text);
    const boxW = metrics.width + 14*dpr;
    const boxH = 26*dpr;

    let bx = hx + 10*dpr;
    let by = hy - boxH - 10*dpr;
    const minX = padLeft;
    const maxX = padLeft + innerW - boxW;
    const minY = padTop;
    const maxY = padTop + innerH - boxH;
    bx = Math.min(Math.max(bx, minX), maxX);
    by = Math.min(Math.max(by, minY), maxY);

    ctx.fillStyle = "rgba(15,23,42,0.88)";
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 1*dpr;
    roundRect(ctx, bx, by, boxW, boxH, 10*dpr);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,0.92)";
    ctx.fillText(text, bx + 7*dpr, by + 6*dpr);
  }

  // Stats (DOM)
  elMinVal.textContent = fmtNum(min, 3);
  elMaxVal.textContent = fmtNum(max, 3);
  const chg = points[points.length-1].v - points[0].v;
  const chgPct = (points[0].v ? (chg / points[0].v) * 100 : 0);
  elChgVal.textContent = `${chg>=0?"+":""}${fmtNum(chg,3)}（${chg>=0?"+":""}${fmtNum(chgPct,2)}%）`;
  elPointsLabel.textContent = `${points.length}点`;
}

/**
 * ==========================
 * Data fetch & UI updates
 * ==========================
 */
function setActiveButton(){
  const base = "px-5 py-2 rounded-xl text-sm font-black transition";
  const active = " bg-white/20 text-white shadow";
  const idle = " text-white/85 hover:text-white";

  btnDay.className   = base + (currentRange==="day"  ? active : idle);
  btnMonth.className = base + (currentRange==="month"? active : idle);
  btnYear.className  = base + (currentRange==="year" ? active : idle);

  elRangeLabel.textContent = currentRange==="day" ? "日" : (currentRange==="month" ? "月" : "年");
}

function setPriceUI(p){
  elPrice.textContent = fmtNum(p, 3);
  elUpdatedAt.textContent = nowTimeStr();
}

function pushPointNow(price){
  const t = Date.now();
  const d = new Date();
  const label = d.toLocaleTimeString("ja-JP", {hour12:false});
  series.push({ t, label, v: price });
  if (currentRange === "day" && series.length > 360){
    series = series.slice(series.length - 360);
  }
}

function startPollingQuote(){
  pollingTimer = setInterval(async () => {
    try{
      const p = await twelveQuoteUSDJPY();
      setPriceUI(p);
      pushPointNow(p);
      drawChart(series);
    }catch(e){
      // keep silent in UI (requested)
      console.warn("poll quote failed", e);
    }
  }, POLL_MS);
}
function startPollingFrankfurterLatest(){
  pollingTimer = setInterval(async () => {
    try{
      const p = await frankfurterLatestUSDJPY();
      setPriceUI(p);
    }catch(e){
      console.warn("poll frankfurter failed", e);
    }
  }, 60_000);
}

async function loadSeriesForRange(range){
  currentRange = range;
  setActiveButton();

  if (pollingTimer){
    clearInterval(pollingTimer);
    pollingTimer = null;
  }

  // reset
  elMinVal.textContent = "--";
  elMaxVal.textContent = "--";
  elChgVal.textContent = "--";
  elPointsLabel.textContent = "--";

  try{
    if (TWELVE_API_KEY){
      if (range === "day"){
        series = await twelveTimeSeriesUSDJPY(DAY_INTRADAY_INTERVAL, DAY_INTRADAY_OUTPUTSIZE);
        const p = await twelveQuoteUSDJPY();
        setPriceUI(p);
        pushPointNow(p);
        startPollingQuote();
      } else if (range === "month"){
        series = await twelveTimeSeriesUSDJPY("1day", MONTH_DAYS);
        const p = await twelveQuoteUSDJPY();
        setPriceUI(p);
      } else {
        const weeks = Math.ceil(YEAR_DAYS/7);
        series = await twelveTimeSeriesUSDJPY("1week", weeks);
        const p = await twelveQuoteUSDJPY();
        setPriceUI(p);
      }
    } else {
      const end = ymd(new Date());
      let start;
      if (range === "day"){
        start = ymd(daysAgo(14)); // 日次しかないので短め
      } else if (range === "month"){
        start = ymd(daysAgo(MONTH_DAYS));
      } else {
        start = ymd(daysAgo(YEAR_DAYS));
      }
      series = await frankfurterSeriesUSDJPY(start, end);
      const p = await frankfurterLatestUSDJPY();
      setPriceUI(p);
      startPollingFrankfurterLatest();
    }
    drawChart(series);
  }catch(e){
    console.error(e);
    series = [];
    drawChart(series);
  }
}

/**
 * ==========================
 * Hover interactions
 * ==========================
 */
canvas.addEventListener("mousemove", (ev) => {
  if (!series || series.length < 2) return;

  const rect = canvas.getBoundingClientRect();
  // Must match drawChart padding (CSS px)
  const padLeft = 52;
  const padRight = 10;

  const x = (ev.clientX - rect.left);
  const innerW = rect.width - padLeft - padRight;
  const relX = x - padLeft;

  if (relX < 0 || relX > innerW){
    hoverIndex = null;
    drawChart(series);
    return;
  }

  const idx = Math.round((relX / innerW) * (series.length - 1));
  hoverIndex = Math.max(0, Math.min(series.length - 1, idx));
  drawChart(series);
});
canvas.addEventListener("mouseleave", () => {
  hoverIndex = null;
  drawChart(series);
});
window.addEventListener("resize", () => drawChart(series));

/**
 * Events
 */
btnDay.addEventListener("click", () => loadSeriesForRange("day"));
btnMonth.addEventListener("click", () => loadSeriesForRange("month"));
btnYear.addEventListener("click", () => loadSeriesForRange("year"));

/**
 * Initial
 */
setActiveButton();
loadSeriesForRange("day");
</script>
</body>
</html>
