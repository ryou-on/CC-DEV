<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Harmony Learning Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100vh;
            /* Fallback for visibility testing */
            /* background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; */
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* Custom Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(0,0,0,0.1);
        }

        input[type=range]::-moz-range-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Slider Tracks */
        #r-slider::-webkit-slider-runnable-track { background: linear-gradient(to right, #000, #ff4444); height: 6px; border-radius: 3px; }
        #g-slider::-webkit-slider-runnable-track { background: linear-gradient(to right, #000, #44ff44); height: 6px; border-radius: 3px; }
        #b-slider::-webkit-slider-runnable-track { background: linear-gradient(to right, #000, #4444ff); height: 6px; border-radius: 3px; }

        .color-preview-box {
            transition: background-color 0.1s ease;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="p-4">

    <!-- Main Widget Container -->
    <div class="glass-panel rounded-2xl p-5 w-full max-w-md mb-8 flex flex-col gap-4 animate-fade-in-up">
        
        <!-- Header -->
        <div class="flex justify-between items-center border-b border-white/20 pb-2">
            <h2 class="text-lg font-bold tracking-wider text-cyan-300">COLOR LAB <span class="text-xs text-white/60 font-normal">Video Overlay</span></h2>
            <div class="flex gap-1">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
        </div>

        <!-- Preview & Info Section -->
        <div class="flex gap-4">
            <!-- Color Box -->
            <div id="color-box" class="color-preview-box w-24 h-24 rounded-xl border-2 border-white/30 shrink-0"></div>
            
            <!-- Details -->
            <div class="flex flex-col justify-center flex-grow space-y-1">
                <div class="flex items-baseline gap-2">
                    <span class="text-xs text-gray-300 uppercase">Name</span>
                    <span id="color-name" class="text-xl font-bold text-white">Loading...</span>
                </div>
                <div class="flex items-baseline gap-2">
                    <span class="text-xs text-gray-300 uppercase">HEX</span>
                    <span id="hex-code" class="font-mono text-cyan-200 text-lg">#000000</span>
                </div>
                <div class="flex items-baseline gap-2">
                    <span class="text-xs text-gray-300 uppercase">RGB</span>
                    <span id="rgb-code" class="font-mono text-yellow-200 text-sm">rgb(0, 0, 0)</span>
                </div>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="space-y-3 pt-2">
            <!-- Red Slider -->
            <div class="flex items-center gap-3">
                <span class="text-xs font-bold w-4 text-red-400">R</span>
                <input type="range" id="r-slider" min="0" max="255" value="100" class="flex-grow">
                <span id="r-val" class="text-xs font-mono w-8 text-right">100</span>
            </div>

            <!-- Green Slider -->
            <div class="flex items-center gap-3">
                <span class="text-xs font-bold w-4 text-green-400">G</span>
                <input type="range" id="g-slider" min="0" max="255" value="149" class="flex-grow">
                <span id="g-val" class="text-xs font-mono w-8 text-right">149</span>
            </div>

            <!-- Blue Slider -->
            <div class="flex items-center gap-3">
                <span class="text-xs font-bold w-4 text-blue-400">B</span>
                <input type="range" id="b-slider" min="0" max="255" value="237" class="flex-grow">
                <span id="b-val" class="text-xs font-mono w-8 text-right">237</span>
            </div>
        </div>
    </div>

    <script>
        // Color Data for Name Approximation
        const colorNames = [
            { name: "Black", r: 0, g: 0, b: 0 },
            { name: "White", r: 255, g: 255, b: 255 },
            { name: "Red", r: 255, g: 0, b: 0 },
            { name: "Lime", r: 0, g: 255, b: 0 },
            { name: "Blue", r: 0, g: 0, b: 255 },
            { name: "Yellow", r: 255, g: 255, b: 0 },
            { name: "Cyan", r: 0, g: 255, b: 255 },
            { name: "Magenta", r: 255, g: 0, b: 255 },
            { name: "Silver", r: 192, g: 192, b: 192 },
            { name: "Gray", r: 128, g: 128, b: 128 },
            { name: "Maroon", r: 128, g: 0, b: 0 },
            { name: "Olive", r: 128, g: 128, b: 0 },
            { name: "Green", r: 0, g: 128, b: 0 },
            { name: "Purple", r: 128, g: 0, b: 128 },
            { name: "Teal", r: 0, g: 128, b: 128 },
            { name: "Navy", r: 0, g: 0, b: 128 },
            { name: "Orange", r: 255, g: 165, b: 0 },
            { name: "Gold", r: 255, g: 215, b: 0 },
            { name: "Crimson", r: 220, g: 20, b: 60 },
            { name: "Indigo", r: 75, g: 0, b: 130 },
            { name: "Violet", r: 238, g: 130, b: 238 },
            { name: "Turquoise", r: 64, g: 224, b: 208 },
            { name: "Pink", r: 255, g: 192, b: 203 },
            { name: "Cornflower Blue", r: 100, g: 149, b: 237 }
        ];

        // Helper: Convert Number to 2-digit Hex
        const componentToHex = (c) => {
            const hex = parseInt(c).toString(16);
            return hex.length == 1 ? "0" + hex : hex;
        }

        const rgbToHex = (r, g, b) => {
            return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
        }

        // Helper: Find Closest Color Name (Euclidean Distance)
        const getClosestColorName = (r, g, b) => {
            let minDistance = Infinity;
            let closestName = "Unknown";
            
            colorNames.forEach(color => {
                const distance = Math.sqrt(
                    Math.pow(r - color.r, 2) +
                    Math.pow(g - color.g, 2) +
                    Math.pow(b - color.b, 2)
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    closestName = color.name;
                }
            });
            return closestName;
        }

        // Elements
        const rSlider = document.getElementById('r-slider');
        const gSlider = document.getElementById('g-slider');
        const bSlider = document.getElementById('b-slider');
        
        const rVal = document.getElementById('r-val');
        const gVal = document.getElementById('g-val');
        const bVal = document.getElementById('b-val');
        
        const colorBox = document.getElementById('color-box');
        const colorNameDisplay = document.getElementById('color-name');
        const hexDisplay = document.getElementById('hex-code');
        const rgbDisplay = document.getElementById('rgb-code');

        // Update Function
        const updateColor = () => {
            const r = rSlider.value;
            const g = gSlider.value;
            const b = bSlider.value;

            // Update numbers
            rVal.textContent = r;
            gVal.textContent = g;
            bVal.textContent = b;

            // Update visuals
            const hex = rgbToHex(r, g, b).toUpperCase();
            const rgbString = `rgb(${r}, ${g}, ${b})`;
            
            colorBox.style.backgroundColor = rgbString;
            hexDisplay.textContent = hex;
            rgbDisplay.textContent = rgbString;
            
            // Find closest name
            const closest = getClosestColorName(r, g, b);
            colorNameDisplay.textContent = closest;
        }

        // Listeners
        rSlider.addEventListener('input', updateColor);
        gSlider.addEventListener('input', updateColor);
        bSlider.addEventListener('input', updateColor);

        // Initial Call
        updateColor();
    </script>
</body>
</html>
