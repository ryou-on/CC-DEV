<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Window Bear Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 1. BACKGROUND & LAYOUT CONFIGURATION */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      pointer-events: none; /* Allow clicks to pass through empty areas */
    }

    /* Enable pointer events only on the widget elements */
    .widget-interactive {
      pointer-events: auto;
    }

    /* 2. ANIMATIONS */
    /* Slide in the whole container */
    @keyframes slideInUp {
      0% {
        transform: translateY(120%);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* The Bear popping out of the window */
    @keyframes popOut {
      0% { transform: translateY(100%); }
      60% { transform: translateY(-10%); }
      80% { transform: translateY(5%); }
      100% { transform: translateY(0); }
    }

    /* Gentle hover float for the bear */
    @keyframes bearFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .animate-slide-in {
      animation: slideInUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .animate-pop-out {
      animation: popOut 1s ease-out 0.5s forwards; /* Delay to start after container appears */
      transform: translateY(100%); /* Start hidden inside the window */
    }

    /* 3. VISUAL STYLES */
    /* Glassmorphism Window Frame */
    .window-frame {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
      border: 3px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      overflow: hidden; /* This creates the masking effect */
    }

    /* Green Bubble Styles (Inherited) */
    .bubble-arrow::after {
      content: '';
      position: absolute;
      right: -8px;
      bottom: 25px;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 10px solid #06C755;
    }

    /* Text Shadows for Visibility */
    .text-shadow-sm {
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <!-- Widget Wrapper: Fixed Bottom Right -->
  <div id="widgetRoot" class="fixed bottom-4 right-4 flex items-end gap-3 z-50 max-w-sm w-full justify-end pr-2 pb-2 widget-interactive animate-slide-in">
    
    <!-- Message Bubble (Green) -->
    <div id="messageBubble" class="relative bg-[#06C755] text-white p-4 rounded-2xl rounded-tr-sm shadow-xl bubble-arrow mb-6 transform transition-all duration-300 origin-bottom-right hover:scale-105 flex-1 max-w-[240px]">
      
      <!-- Transparent Close Button (Top Right of Bubble) -->
      <button onclick="closeWidget()" class="absolute -top-2 -left-2 w-6 h-6 flex items-center justify-center bg-transparent text-white/80 hover:text-white hover:bg-black/10 rounded-full transition-colors cursor-pointer focus:outline-none" aria-label="閉じる">
        <svg class="w-4 h-4 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>

      <div class="font-bold text-sm mb-1 text-shadow-sm leading-snug">
        トークタブが新しくなりました！
      </div>
      <div class="flex items-center justify-between mt-2 gap-2 text-xs font-medium">
        <a href="#" class="flex items-center gap-1 hover:underline text-white transition-colors text-shadow-sm">
          変更点を見る 
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </a>
        <!-- Transparent Text Button -->
        <button onclick="closeWidget()" class="bg-transparent text-white/80 hover:text-white transition-colors text-[10px]">
          後で見る
        </button>
      </div>
    </div>

    <!-- Window Frame with Bear Animation -->
    <div class="relative group">
      <!-- The 'Window' Container -->
      <div class="window-frame w-24 h-24 rounded-full flex justify-center items-end relative shrink-0">
        
        <!-- Bear SVG Wrapper (Animated) -->
        <div class="animate-pop-out w-20 h-20 absolute bottom-0">
          <div class="w-full h-full relative bear-bounce">
             <!-- Bear SVG (Inherited Design) -->
             <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg filter">
                <!-- Body/Shoulders needed for 'popping out' effect -->
                <path d="M20,100 C20,70 80,70 80,100" fill="#6F4E37" />
                
                <!-- Ears -->
                <circle cx="25" cy="35" r="12" fill="#6F4E37" />
                <circle cx="75" cy="35" r="12" fill="#6F4E37" />
                <circle cx="25" cy="35" r="6" fill="#543b29" />
                <circle cx="75" cy="35" r="6" fill="#543b29" />
                
                <!-- Head -->
                <circle cx="50" cy="55" r="35" fill="#6F4E37" />
                
                <!-- Muzzle -->
                <ellipse cx="50" cy="60" rx="14" ry="11" fill="#FFFFFF" opacity="0.9" />
                <circle cx="50" cy="56" r="3.5" fill="#3E2723" />
                <path d="M50,60 L50,66 M45,66 Q50,70 55,66" stroke="#3E2723" stroke-width="2" fill="none" stroke-linecap="round" />

                <!-- Eyes -->
                <circle cx="38" cy="50" r="3" fill="#000" />
                <circle cx="62" cy="50" r="3" fill="#000" />

                <!-- Cap -->
                <path d="M20,30 L50,15 L80,30 L50,45 Z" fill="#212121" />
                <rect x="48" y="15" width="4" height="4" fill="#FDD835" />
                <path d="M50,17 L75,35" stroke="#FDD835" stroke-width="2" />
                <circle cx="75" cy="35" r="2" fill="#FDD835" />
            </svg>
          </div>
        </div>
      </div>
      
      <!-- Optional: Transparent overlay button for the whole bear area -->
      <button onclick="alert('Bear clicked!')" class="absolute inset-0 w-full h-full cursor-pointer bg-transparent rounded-full z-10" aria-label="キャラクター"></button>
    </div>

  </div>

  <script>
    function closeWidget() {
      const widget = document.getElementById('widgetRoot');
      // Animate out
      widget.style.transition = 'all 0.5s ease-in';
      widget.style.opacity = '0';
      widget.style.transform = 'translateY(20px)';
      
      // Remove from DOM after animation
      setTimeout(() => {
        widget.remove();
      }, 500);
    }

    // Add hover effect to restart Bear Bounce via JS if needed (optional)
    const bearContainer = document.querySelector('.window-frame');
    const bearSvg = document.querySelector('.bear-bounce');
    
    bearContainer.addEventListener('mouseenter', () => {
      bearSvg.style.animation = 'bearFloat 1s ease-in-out infinite';
    });
    bearContainer.addEventListener('mouseleave', () => {
      bearSvg.style.animation = 'none';
    });
  </script>
</body>
</html>
