<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景：ネイビー角丸 -->
  <rect width="100" height="100" rx="22" fill="#0d1f3c"/>

  <!-- レーダーアーク -->
  <g fill="none" stroke="#1ee8c8" stroke-width="0.7" opacity="0.35">
    <path d="M50,50 m-38,0 a38,38 0 0,1 38,-38"/>
    <path d="M50,50 m-26,0 a26,26 0 0,1 26,-26"/>
    <path d="M50,50 m-14,0 a14,14 0 0,1 14,-14"/>
  </g>

  <!-- レーダーグリッド線 -->
  <g stroke="#1ee8c8" stroke-width="0.5" opacity="0.25">
    <line x1="50" y1="12" x2="50" y2="62"/>
    <line x1="12" y1="50" x2="62" y2="50"/>
    <line x1="23" y1="23" x2="62" y2="62"/>
    <line x1="23" y1="62" x2="58" y2="27"/>
  </g>

  <!-- レーダードット -->
  <circle cx="28" cy="30" r="2.2" fill="#1ee8c8" opacity="0.9"/>
  <circle cx="52" cy="22" r="1.6" fill="#1ee8c8" opacity="0.8"/>
  <circle cx="60" cy="42" r="1.4" fill="#1ee8c8" opacity="0.7"/>

  <!-- 飛行機（左向き） -->
  <g transform="translate(8,36) scale(0.72) rotate(-8,18,18)">
    <!-- 胴体 -->
    <ellipse cx="18" cy="18" rx="16" ry="5.5" fill="#55ccee"/>
    <!-- 主翼 -->
    <polygon points="14,18 22,8 24,11 18,20" fill="#55ccee"/>
    <polygon points="14,18 22,28 24,25 18,16" fill="#55ccee" opacity="0.8"/>
    <!-- 尾翼 -->
    <polygon points="2,18 6,12 8,14 6,18" fill="#55ccee"/>
    <!-- ノーズ -->
    <ellipse cx="33" cy="18" rx="4" ry="3.5" fill="#77ddff"/>
  </g>

  <!-- フライトストリップ本体 -->
  <rect x="36" y="46" width="57" height="36" rx="3" fill="#f0e6c8"/>
  <!-- 左アンバーバー -->
  <rect x="36" y="46" width="12" height="36" rx="3" fill="#d4860a"/>
  <rect x="42" y="46" width="6"  height="36" fill="#d4860a"/>
  <!-- バー上の数字 "◈" -->
  <text x="42" y="68" text-anchor="middle" font-size="9" font-weight="900" fill="#fff" font-family="monospace" opacity="0.9">◈</text>

  <!-- ストリップ テキスト行 -->
  <rect x="51" y="51" width="14" height="2.2" rx="1" fill="#1a2a4a" opacity="0.55"/>
  <rect x="67" y="51" width="10" height="2.2" rx="1" fill="#1a2a4a" opacity="0.45"/>
  <rect x="51" y="56" width="22" height="2.2" rx="1" fill="#1a2a4a" opacity="0.65"/>
  <!-- チェックボックス行 -->
  <rect x="51" y="62" width="3" height="3" rx="0.5" fill="none" stroke="#1a2a4a" stroke-width="0.8" opacity="0.6"/>
  <line x1="51.8" y1="63.5" x2="52.8" y2="64.5" stroke="#1a2a4a" stroke-width="0.9"/>
  <line x1="52.8" y1="64.5" x2="54.2" y2="62.5" stroke="#1a2a4a" stroke-width="0.9"/>
  <rect x="56" y="62.5" width="12" height="2" rx="1" fill="#1a2a4a" opacity="0.5"/>
  <rect x="51" y="68" width="3" height="3" rx="0.5" fill="none" stroke="#1a2a4a" stroke-width="0.8" opacity="0.5"/>
  <rect x="56" y="68.5" width="16" height="2" rx="1" fill="#1a2a4a" opacity="0.4"/>
  <rect x="51" y="74" width="3" height="3" rx="0.5" fill="none" stroke="#1a2a4a" stroke-width="0.8" opacity="0.4"/>
  <rect x="56" y="74.5" width="10" height="2" rx="1" fill="#1a2a4a" opacity="0.35"/>

  <!-- 右側縦区切り線 -->
  <line x1="78" y1="48" x2="78" y2="80" stroke="#1a2a4a" stroke-width="0.6" opacity="0.3"/>
  <rect x="80" y="55" width="8" height="2" rx="1" fill="#1a2a4a" opacity="0.35"/>
  <rect x="80" y="65" width="6" height="2" rx="1" fill="#1a2a4a" opacity="0.3"/>
</svg>
