    // ======================================================
    function FlightStripTodo({ user, themeId, setTheme }) {
      const T = useT();
      const isMobile = useIsMobile();
      const [tasks,          setTasks]          = useState([]);
      const [loading,        setLoading]        = useState(true);
      const [draggedId,      setDraggedId]      = useState(null);
      const [dropState,      setDropState]      = useState(null); // { id, pos }
      const dropStateRef = useRef(null);
      const [showForm,       setShowForm]       = useState(false);
      const [showHelp,       setShowHelp]       = useState(false);
      const [showRelease,    setShowRelease]    = useState(false);
      const [showFeedback,   setShowFeedback]   = useState(false);
      const [viewMode,       setViewMode]       = useState("hybrid");
      const [filterPriority, setFilterPriority] = useState("all");
      const [filterCategory, setFilterCategory] = useState("all");
      const [selectedId,     setSelectedId]     = useState(null);
      const [editTaskId,     setEditTaskId]     = useState(null);
      const [syncStatus,     setSyncStatus]     = useState("connecting");
      const [flashMsg,  setFlashMsg]  = useState('');
      const flashNext = (msg) => { setFlashMsg(msg); setTimeout(() => setFlashMsg(''), 3000); };
      const NEXT_LIMIT = 5;
      const safeNext = (excludeId = null) => {
        const cnt = tasks.filter(t => t.status === 'next' && t.id !== excludeId).length;
        if (cnt >= NEXT_LIMIT) { flashNext(`⚠ NEXT ACTION は最大 ${NEXT_LIMIT} スロットです。HOLDINGに追加しました。`); return 'pending'; }
        return 'next';
      };
      // activeTimer はタスクの timerRunning / timerStartedAt から導出（Firestore同期）
      const [mobileTab,      setMobileTab]      = useState("active");
      const [stripFontSize,  setStripFontSize]  = useState(() => localStorage.getItem("fst-fontsize") || "md");
      const FONT_SIZES = { sm: { label:"小", px:11 }, md: { label:"中", px:13 }, lg: { label:"大", px:16 } };
      const cycleFontSize = () => {
        const keys = ["sm","md","lg"];
        const next = keys[(keys.indexOf(stripFontSize) + 1) % keys.length];
        setStripFontSize(next);
        localStorage.setItem("fst-fontsize", next);
      };
      // タッチDnD
      const touchDragRef = useRef(null);
      const [touchGhostPos, setTouchGhostPos]  = useState(null);
      const currentTime = useCurrentTime();
      // カテゴリ（Firestore同期）
      const [categories,    setCategories]    = useState(DEFAULT_CATEGORIES);
      const [showCatEditor, setShowCatEditor] = useState(false);
      const [showRoutines,  setShowRoutines]  = useState(false);
      // 毎日1回目起動時サマリー通知
      const [dailySummary, setDailySummary] = useState(null);

      const tasksRef    = useMemo(() => db.collection(`users/${user.uid}/tasks`),    [user.uid]);
      const metaRef     = useMemo(() => db.collection(`users/${user.uid}/meta`),     [user.uid]);
      const projectsRef = useMemo(() => db.collection(`users/${user.uid}/projects`), [user.uid]);
      const ts = () => firebase.firestore.FieldValue.serverTimestamp();

      // セッション記録（Analytics用）
      useEffect(() => {
        try {
          const now = new Date();
          const uidHash = btoa(user.uid).replace(/[^a-zA-Z0-9]/g,'').slice(0,12);
          const sessionId = `${now.toISOString().slice(0,10)}_${uidHash}_${now.getTime()}`;
          db.collection('fst_analytics').doc(sessionId).set({
            uidHash,
            date:  now.toISOString().slice(0,10),
            month: now.toISOString().slice(0,7),
            hour:  now.getHours(),
            dow:   now.getDay(),
            version: 'v0.5.7',
            build:   'stable',
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          }).catch(() => {});
        } catch(e) {}
      }, []);

      // 毎日1回目起動時: 昨日のサマリーを表示
      const dailySummaryShownRef = useRef(false);
      useEffect(() => {
        if (tasks.length === 0) return;  // タスク未ロード
        if (dailySummaryShownRef.current) return;  // このセッションで既に確認済み
        dailySummaryShownRef.current = true;
        const today = new Date().toISOString().slice(0, 10);
        const storageKey = 'fst_daily_summary_' + (user?.uid || 'anon');
        const lastShown = localStorage.getItem(storageKey);
        if (lastShown === today) return;  // 今日すでに表示済み
        localStorage.setItem(storageKey, today);
        // 昨日の日付
        const yd = new Date();
        yd.setDate(yd.getDate() - 1);
        const yesterday = yd.toISOString().slice(0, 10);
        // 昨日のタスク集計
        const created = tasks.filter(t => {
          if (!t.createdAt) return false;
          const d = t.createdAt.toDate ? t.createdAt.toDate() : new Date(t.createdAt);
          return d.toISOString().slice(0, 10) === yesterday;
        }).length;
        const completed = tasks.filter(t => {
          if (!t.completedAt) return false;
          const d = t.completedAt.toDate ? t.completedAt.toDate() : new Date(t.completedAt);
          return d.toISOString().slice(0, 10) === yesterday;
        }).length;
        setDailySummary({ created, completed, yesterday });
      }, [tasks, user]);

      // カテゴリ Firestore 同期
      useEffect(() => {
        const unsub = metaRef.doc('categories').onSnapshot(snap => {
          if (snap.exists && snap.data()?.items?.length) {
            setCategories(snap.data().items);
          }
        });
        return unsub;
      }, [metaRef]);

      // グローバル CATEGORIES を動的更新
      useEffect(() => {
        CATEGORIES = Object.fromEntries(categories.map(c => [c.id, c]));
      }, [categories]);

      const handleSaveCats = async (cats) => {
        await metaRef.doc('categories').set({ items: cats });
        setShowCatEditor(false);
      };

      // リアルタイム同期
      useEffect(() => {
        setSyncStatus("connecting");
        const unsubscribe = tasksRef.onSnapshot(
          snapshot => {
            const loaded = snapshot.docs.map(doc => {
              const d = doc.data();
              return {
                id: doc.id, ...d,
                // sortOrder未設定の既存タスクはcreatedAtのミリ秒で代替
                sortOrder: d.sortOrder ?? (d.createdAt?.seconds ? d.createdAt.seconds * 1000 : Date.now()),
              };
            });
            setTasks(loaded);
            setLoading(false);
            setSyncStatus("online");
          },
          err => { console.error("Firestore:", err); setLoading(false); setSyncStatus("error"); }
        );
        return unsubscribe;
      }, [tasksRef]);

      const filteredTasks = useMemo(() => tasks.filter(t => {
        // ルーティンテンプレートはメインボードに表示しない
        if (t.isRoutineTemplate) return false;
        if (filterPriority !== "all" && t.priority !== filterPriority) return false;
        // ルーティンインスタンスはcategory:''のためカテゴリフィルターを無視
        if (!t.isRoutine && filterCategory !== "all" && t.category !== filterCategory) return false;
        return true;
      }), [tasks, filterPriority, filterCategory]);

      // カラム別タスク取得（sortOrder降順: 大きいほど上）
      const getColTasks = useCallback((status) =>
        filteredTasks.filter(t => t.status === status).sort((a,b) => (b.sortOrder??0) - (a.sortOrder??0)),
      [filteredTasks]);

      // J/Kナビゲーション用フラットリスト
      const orderedTasks = useMemo(() => {
        const all = [];
        for (const col of COLUMNS) all.push(...getColTasks(col.id));
        return all;
      }, [getColTasks]);

      // --- CRUD ハンドラー ---
      const handleAdd          = useCallback(t  => tasksRef.add({ ...t, createdAt:ts(), updatedAt:ts() }), [tasksRef]);
      const handleDelete       = useCallback(id => {
        if (!window.confirm("このストリップを削除しますか？")) return;
        tasksRef.doc(id).delete();
        setSelectedId(p => p===id ? null : p);
      }, [tasksRef]);
      const handleStatusChange = useCallback(async (id, s) => {
        // NEXTスロット上限チェック（上限超過はHOLDINGへ振り替え）
        if (s === 'next') s = safeNext(id);
        // ACTIVEが1件制限を超える場合（既存ACTIVEをNEXTへ）
        if (s === 'active') {
          const currentActives = tasks.filter(t => t.status === 'active' && t.id !== id);
          for (const t of currentActives) {
            await tasksRef.doc(t.id).update({ status: safeNext(t.id), updatedAt: ts() });
          }
        }
        tasksRef.doc(id).update({ status: s, updatedAt: ts() });
      }, [tasks, tasksRef]);
      const handleEditSave     = useCallback((id, fields) => tasksRef.doc(id).update({ ...fields, updatedAt:ts() }), [tasksRef]);

      // --- タイマーハンドラー（Firestore同期） ---
      // timerRunning / timerStartedAt をFirestoreに保存 → 全端末でリアルタイム同期
      const handleTimerStart = useCallback(async (id) => {
        await tasksRef.doc(id).update({
          timerRunning:   true,
          timerStartedAt: firebase.firestore.Timestamp.now(),
          updatedAt:      ts(),
        });
      }, [tasksRef]);

      const handleTimerStop = useCallback(async (id) => {
        const task = tasks.find(t => t.id === id);
        if (!task?.timerRunning) return;
        // Firestore の timerStartedAt を使って正確な経過時間を算出
        const startMs = task.timerStartedAt?.toMillis?.()
          ?? (task.timerStartedAt?.seconds * 1000)
          ?? Date.now();
        const durationMs = Date.now() - startMs;
        const newLog = {
          startedAt:  new Date(startMs).toISOString(),
          stoppedAt:  new Date().toISOString(),
          durationMs,
        };
        const timeLogs = [...(task.timeLogs || []), newLog];
        await tasksRef.doc(id).update({
          timerRunning:   false,
          timerStartedAt: null,
          timeLogs,
          updatedAt:      ts(),
        });
      }, [tasks, tasksRef]);

      // タスクがACTIVE以外に移ったらタイマー自動停止
      useEffect(() => {
        const runningTask = tasks.find(t => t.timerRunning);
        if (runningTask && runningTask.status !== "active") {
          handleTimerStop(runningTask.id);
        }
      }, [tasks, handleTimerStop]);

      // チェックリストアイテムのトグル
      const handleCheckItem = useCallback(async (taskId, itemId, checked) => {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        const updated = (task.checkItems || []).map(ci =>
          ci.id === itemId ? { ...ci, checked } : ci
        );
        await tasksRef.doc(taskId).update({ checkItems: updated, updatedAt: ts() });
      }, [tasks, tasksRef]);

      // ルーティンステップのトグル
      const handleCheckRoutineStep = useCallback(async (taskId, stepId, checked) => {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        const updatedSteps = (task.routineSteps || []).map(s =>
          s.id === stepId ? { ...s, checked } : s
        );
        await tasksRef.doc(taskId).update({ routineSteps: updatedSteps, updatedAt: ts() });
        // 全ステップ完了時にタスクをcompletedへ
        const allDone = updatedSteps.length > 0 && updatedSteps.every(s => s.checked);
        if (allDone) {
          await handleStatusChange(taskId, 'completed');
        }
      }, [tasks, tasksRef, handleStatusChange]);

      // --- 並べ替え（↑↓キー）: sortOrder値を入れ替え ---
      const handleMoveInColumn = useCallback(async (taskId, direction) => {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        const col = tasks.filter(t => t.status === task.status).sort((a,b) => (b.sortOrder??0) - (a.sortOrder??0));
        const idx = col.findIndex(t => t.id === taskId);
        const targetIdx = direction === "up" ? idx - 1 : idx + 1;
        if (targetIdx < 0 || targetIdx >= col.length) return;
        const target = col[targetIdx];
        const mySO = task.sortOrder ?? 0;
        const thSO = target.sortOrder ?? 0;
        await tasksRef.doc(taskId).update({ sortOrder: thSO });
        await tasksRef.doc(target.id).update({ sortOrder: mySO });
      }, [tasks, tasksRef]);

      // --- ドラッグ ---
      const handleDragStart = (e, id) => {
        setDraggedId(id);
        e.dataTransfer.effectAllowed = "move";
      };

      const handleDragOverStrip = (e, targetId) => {
        if (!draggedId || draggedId === targetId) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pos = e.clientY < rect.top + rect.height / 2 ? "before" : "after";
        dropStateRef.current = { id: targetId, pos };
        setDropState({ id: targetId, pos });
      };

      const handleDragEnd = () => {
        setDraggedId(null);
        setDropState(null);
        dropStateRef.current = null;
      };

      const handleDropOnStrip = async (e, targetId) => {
        const dId = draggedId;
        const ds = dropStateRef.current;
        setDraggedId(null); setDropState(null); dropStateRef.current = null;
        if (!dId || dId === targetId || !ds) return;

        const draggedTask = tasks.find(t => t.id === dId);
        const targetTask  = tasks.find(t => t.id === targetId);
        if (!draggedTask || !targetTask) return;

        if (draggedTask.status !== targetTask.status) {
          // 異なるカラム: handleStatusChange経由でactive制御も適用
          await handleStatusChange(dId, targetTask.status);
          return;
        }

        // 同じカラム内並べ替え
        const col = tasks.filter(t => t.status === draggedTask.status).sort((a,b) => (b.sortOrder??0) - (a.sortOrder??0));
        const withoutDragged = col.filter(t => t.id !== dId);
        const targetIdx = withoutDragged.findIndex(t => t.id === targetId);
        const insertIdx = ds.pos === "before" ? targetIdx : targetIdx + 1;
        const newOrder = [...withoutDragged];
        newOrder.splice(insertIdx, 0, draggedTask);

        // sortOrderを再割り当て（降順: 先頭が最大値）
        const base = Date.now();
        await Promise.all(newOrder.map((t, i) => tasksRef.doc(t.id).update({ sortOrder: base - i * 10000, updatedAt: ts() })));
      };

      const handleDropOnColumn = async (e, colId) => {
        const dId = draggedId;
        setDraggedId(null); setDropState(null); dropStateRef.current = null;
        if (!dId) return;
        const draggedTask = tasks.find(t => t.id === dId);
        if (draggedTask && draggedTask.status !== colId) {
          // handleStatusChange経由でactive制御も適用
          await handleStatusChange(dId, colId);
        }
      };

      // --- タッチ DnD ハンドラー ---
      const handleTouchStart = useCallback((e, taskId) => {
        if (e.touches.length !== 1) return;
        const touch = e.touches[0];
        const rect = e.currentTarget.getBoundingClientRect();
        touchDragRef.current = {
          taskId,
          offsetX: touch.clientX - rect.left,
          offsetY: touch.clientY - rect.top,
          width: rect.width,
          height: rect.height,
        };
        setDraggedId(taskId);
      }, []);

      const handleTouchMove = useCallback((e, taskId) => {
        const drag = touchDragRef.current;
        if (!drag || drag.taskId !== taskId) return;
        e.preventDefault(); // スクロール防止
        const touch = e.touches[0];
        setTouchGhostPos({
          x: touch.clientX - drag.offsetX,
          y: touch.clientY - drag.offsetY,
          width: drag.width,
          height: drag.height,
          taskId,
        });
        // ゴーストを一時的に隠してhitTestに影響しないようにする
        const ghostEl = document.getElementById('touch-ghost');
        if (ghostEl) ghostEl.style.pointerEvents = 'none';
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const stripEl = el?.closest('[data-task-id]');
        const colEl   = el?.closest('[data-col-id]');
        if (stripEl && stripEl.getAttribute('data-task-id') !== taskId) {
          const targetId = stripEl.getAttribute('data-task-id');
          const rect2 = stripEl.getBoundingClientRect();
          const pos = touch.clientY < rect2.top + rect2.height / 2 ? 'before' : 'after';
          dropStateRef.current = { id: targetId, pos };
          setDropState({ id: targetId, pos });
        } else if (colEl) {
          const colId = colEl.getAttribute('data-col-id');
          dropStateRef.current = { colId };
          setDropState(null);
        } else {
          dropStateRef.current = null;
          setDropState(null);
        }
      }, []);

      const handleTouchEnd = useCallback(async (e, taskId) => {
        const drag = touchDragRef.current;
        if (!drag || drag.taskId !== taskId) return;
        const touch = e.changedTouches[0];
        const ds = dropStateRef.current;
        touchDragRef.current = null;
        setTouchGhostPos(null);
        setDraggedId(null);
        setDropState(null);
        dropStateRef.current = null;
        if (!ds) return;
        if (ds.id) {
          // strip へのドロップ
          const draggedTask = tasks.find(t => t.id === taskId);
          const targetTask  = tasks.find(t => t.id === ds.id);
          if (!draggedTask || !targetTask) return;
          if (draggedTask.status !== targetTask.status) {
            await tasksRef.doc(taskId).update({ status: targetTask.status, updatedAt: ts() });
            return;
          }
          const col = tasks.filter(t => t.status === draggedTask.status).sort((a,b) => (b.sortOrder??0)-(a.sortOrder??0));
          const withoutDragged = col.filter(t => t.id !== taskId);
          const targetIdx = withoutDragged.findIndex(t => t.id === ds.id);
          const insertIdx = ds.pos === 'before' ? targetIdx : targetIdx + 1;
          const newOrder = [...withoutDragged];
          newOrder.splice(insertIdx, 0, draggedTask);
          const base = Date.now();
          await Promise.all(newOrder.map((t, i) => tasksRef.doc(t.id).update({ sortOrder: base - i * 10000, updatedAt: ts() })));
        } else if (ds.colId) {
          // column へのドロップ
          const draggedTask = tasks.find(t => t.id === taskId);
          if (draggedTask && draggedTask.status !== ds.colId) {
            const col = COLUMNS.find(c => c.id === ds.colId);
            if (col?.limit) {
              const existing = tasks.filter(t => t.status === ds.colId && t.id !== taskId).length;
              if (existing >= col.limit) {
                alert(`⚠ ${col.label} は最大 ${col.limit} スロットです`);
                return;
              }
            }
            await tasksRef.doc(taskId).update({ status: ds.colId, updatedAt: ts() });
          }
        }
      }, [tasks, tasksRef]);

      // --- キーボードショートカット ---
      useEffect(() => {
        const handler = e => {
          const isInput = ["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName) || e.target.isContentEditable;
          if (e.key === "Escape") {
            e.preventDefault();
            if (editTaskId) { setEditTaskId(null); return; }
            if (showHelp)   { setShowHelp(false); return; }
            if (showForm)   { setShowForm(false); return; }
            setSelectedId(null); return;
          }
          if (isInput || editTaskId) return;
          const key = e.key.toLowerCase();
          if (e.key === "?" || (e.shiftKey && key === "/")) { e.preventDefault(); setShowHelp(p=>!p); return; }
          if (key === "n") { e.preventDefault(); setShowForm(p=>!p); return; }
          if (key === "f") { e.preventDefault(); setFilterPriority(p => PRIORITY_CYCLE[(PRIORITY_CYCLE.indexOf(p)+1)%PRIORITY_CYCLE.length]); return; }
          // J/K: 選択移動
          if (key === "j" || key === "k") {
            e.preventDefault();
            if (!orderedTasks.length) return;
            const idx = orderedTasks.findIndex(t => t.id === selectedId);
            setSelectedId(orderedTasks[
              key === "j" ? (idx<0 ? 0 : Math.min(idx+1, orderedTasks.length-1))
                          : (idx<0 ? orderedTasks.length-1 : Math.max(idx-1, 0))
            ].id);
            return;
          }
          // ↑↓: 並べ替え
          if (e.key === "ArrowUp" || e.key === "ArrowDown") {
            if (!selectedId) return;
            e.preventDefault();
            handleMoveInColumn(selectedId, e.key === "ArrowUp" ? "up" : "down");
            return;
          }
          if (!selectedId) return;
          if (key === "1") { e.preventDefault(); handleStatusChange(selectedId, "active");    return; }
          if (key === "2") { e.preventDefault(); handleStatusChange(selectedId, "next");      return; }
          if (key === "3") { e.preventDefault(); handleStatusChange(selectedId, "delegated"); return; }
          if (key === "4") { e.preventDefault(); handleStatusChange(selectedId, "pending");   return; }
          if (key === "5") { e.preventDefault(); handleStatusChange(selectedId, "completed"); return; }
          if (key === "t") {
            e.preventDefault();
            const selTask = tasks.find(t => t.id === selectedId);
            if (selTask?.status === "active") {
              if (selTask.timerRunning) handleTimerStop(selectedId);
              else handleTimerStart(selectedId);
            }
            return;
          }
          if (key === "d") { e.preventDefault(); handleDelete(selectedId); return; }
          if (key === "e") {
            e.preventDefault();
            const t = tasks.find(t => t.id === selectedId);
            if (t) setEditTaskId(t.id);
            return;
          }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [selectedId, orderedTasks, showForm, showHelp, editTaskId, tasks, handleStatusChange, handleDelete, handleMoveInColumn, handleTimerStart, handleTimerStop]);

      const stats = {
        active:    tasks.filter(t => t.status === "active").length,
        next:      tasks.filter(t => t.status === "next").length,
        delegated: tasks.filter(t => t.status === "delegated").length,
        pending:   tasks.filter(t => t.status === "pending").length,
        completed: tasks.filter(t => t.status === "completed").length,
        urgent:    tasks.filter(t => t.priority === "high" && t.status !== "completed").length,
        handoff:   tasks.filter(t => t.assignee && t.status !== "completed").length,
      };

      const editTask = editTaskId ? tasks.find(t => t.id === editTaskId) : null;
      const syncColor = syncStatus === "online" ? T.accent : syncStatus === "error" ? "#ff3333" : "#ffaa00";
      const syncLabel = syncStatus === "online" ? "SYNC ●" : syncStatus === "error" ? "SYNC ✕" : "SYNC ◌";

      const accentForCol = (colId) => {
        if (colId === "active")    return T.accent;
        if (colId === "next")      return "#00ccff";
        if (colId === "delegated") return "#ffaa00";
        if (colId === "pending")   return T.textDim;
        if (colId === "completed") return T.textMuted;
        return T.accent;
      };

      const handleConsoleCopy = () => {
        const log = JSON.stringify({ exportedAt:new Date().toISOString(), user:user.email, tasks }, null, 2);
        navigator.clipboard.writeText(log).then(()=>alert("✓ コピーしました")).catch(()=>console.log(log));
      };

      if (loading) return <LoadingScreen />;

      return (
        <div style={{ minHeight:"100vh", background:T.bgGrad, color:T.text, fontFamily:"'JetBrains Mono',monospace", position:"relative" }}>
          {/* NEXTスロット超過フラッシュ通知 */}
          {flashMsg && (
            <div style={{ position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)', zIndex:9999, background:'rgba(255,170,0,0.95)', color:'#000', padding:'10px 20px', borderRadius:'4px', fontSize:'11px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace", boxShadow:'0 4px 16px rgba(0,0,0,0.4)', whiteSpace:'nowrap', letterSpacing:'0.03em' }}>
              {flashMsg}
            </div>
          )}
          {/* タッチDnDゴースト */}
          {touchGhostPos && (() => {
            const task = tasks.find(t => t.id === touchGhostPos.taskId);
            const pri = task ? (PRIORITIES[task.priority] || PRIORITIES.normal) : PRIORITIES.normal;
            return (
              <div id="touch-ghost" style={{
                position: 'fixed',
                left: touchGhostPos.x,
                top: touchGhostPos.y,
                width: touchGhostPos.width,
                zIndex: 9999,
                opacity: 0.85,
                pointerEvents: 'none',
                background: pri.bg,
                border: `2px solid ${pri.color}`,
                borderRadius: '4px',
                padding: '8px 10px',
                fontFamily: "'JetBrains Mono',monospace",
                fontSize: '12px',
                color: T.text,
                boxShadow: '0 8px 32px rgba(0,0,0,0.5)',
                transform: 'rotate(2deg)',
              }}>
                <div style={{ fontSize: '9px', color: pri.color, fontWeight: 700 }}>{task?.stripId}</div>
                <div style={{ fontWeight: 600, marginTop: '2px' }}>{task?.title}</div>
              </div>
            );
          })()}

          {/* グリッド背景 */}
          <div style={{ position:"fixed", inset:0, backgroundImage:`linear-gradient(${T.grid} 1px,transparent 1px),linear-gradient(90deg,${T.grid} 1px,transparent 1px)`, backgroundSize:"40px 40px", pointerEvents:"none", zIndex:0 }} />
          {T.scanAlpha > 0 && (
            <div style={{ position:"fixed", inset:0, background:`repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,${T.scanAlpha}) 3px,rgba(0,0,0,${T.scanAlpha}) 6px)`, pointerEvents:"none", zIndex:1 }} />
          )}

          {/* ポップアップ類はportalでbody直下に描画（position:fixedのズレを防止） */}
          {showHelp     && ReactDOM.createPortal(<ShortcutHelp  onClose={() => setShowHelp(false)} />, document.body)}
          {showRelease  && ReactDOM.createPortal(<ReleaseNotes  onClose={() => setShowRelease(false)} />, document.body)}
          {showFeedback && ReactDOM.createPortal(<FeedbackModal user={user} build="stable" onClose={() => setShowFeedback(false)} />, document.body)}
          {showCatEditor && ReactDOM.createPortal(<CategoryEditor categories={categories} onSave={handleSaveCats} onClose={() => setShowCatEditor(false)} />, document.body)}
          {editTaskId && editTask && ReactDOM.createPortal(<EditStripModal task={editTask} onSave={handleEditSave} onClose={() => setEditTaskId(null)} />, document.body)}
          {showRoutines && ReactDOM.createPortal(<RoutineModal tasks={tasks} tasksRef={tasksRef} projectsRef={projectsRef} onClose={() => setShowRoutines(false)} />, document.body)}
          {/* 毎日1回目起動時サマリー */}
          {dailySummary && (
            <div style={{ position:'fixed', inset:0, zIndex:9000, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.5)' }}
              onClick={() => setDailySummary(null)}>
              <div style={{ background:T.bgCard, border:`1px solid ${T.accent}44`, borderRadius:'6px', padding:'28px 32px', maxWidth:'340px', width:'90%', textAlign:'center', boxShadow:`0 8px 40px rgba(0,0,0,0.6)` }}
                onClick={e => e.stopPropagation()}>
                <div style={{ fontSize:'28px', marginBottom:'12px' }}>📋</div>
                <div style={{ color:T.text, fontSize:'14px', fontWeight:600, marginBottom:'8px', lineHeight:1.6 }}>
                  昨日登録されたタスク <span style={{ color:T.accent, fontWeight:800, fontSize:'18px' }}>{dailySummary.created}</span> 件、<br/>
                  昨日完了したタスク <span style={{ color:'#00ff88', fontWeight:800, fontSize:'18px' }}>{dailySummary.completed}</span> 件
                </div>
                <div style={{ color:T.textDim, fontSize:'12px', marginBottom:'20px', letterSpacing:'0.05em' }}>
                  今日もタスクをこなしていきましょう。
                </div>
                <button onClick={() => setDailySummary(null)}
                  style={{ background:`${T.accent}22`, border:`1px solid ${T.accent}44`, color:T.accent, padding:'8px 24px', borderRadius:'4px', cursor:'pointer', fontSize:'12px', fontWeight:700, letterSpacing:'0.1em' }}>
                  OK
                </button>
              </div>
            </div>
          )}

          <div style={{ position:"relative", zIndex:2, maxWidth:"1200px", margin:"0 auto", padding:"16px" }}>

            {/* ヘッダー */}
            <header style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 0", marginBottom:"12px", borderBottom:`1px solid ${T.border}`, flexWrap:"wrap", gap:"8px" }}>
              <div>
                <div style={{ fontSize:"18px", fontWeight:800, color:T.accent, letterSpacing:"0.2em", textShadow:`0 0 20px ${T.accent}44`, lineHeight:1, display:"flex", alignItems:"center", gap:"10px" }}>
                  <span onClick={() => window.open("manual.html","_blank")} style={{ cursor:"pointer" }} title="取扱説明書を開く">◈ FLIGHT STRIP TODO</span>
                  <span onClick={() => setShowFeedback(true)} title="フィードバックを送る" style={{ cursor:"pointer", fontSize:"10px", fontWeight:700, color:"#00aaff", background:"rgba(0,170,255,0.1)", border:"1px solid rgba(0,170,255,0.35)", borderRadius:"3px", padding:"2px 6px", letterSpacing:"0.05em", userSelect:"none", transition:"background 0.15s" }}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(0,170,255,0.22)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(0,170,255,0.1)"}>
                    [フィードバック]
                  </span>
                </div>
                <div style={{ fontSize:"9px", color:T.textMuted, letterSpacing:"0.3em", marginTop:"4px" }}>
                  <span onClick={() => setShowRelease(true)} style={{ cursor:"pointer", color:T.textDim, borderBottom:`1px solid ${T.border2}`, paddingBottom:"1px", transition:"color 0.15s" }}
                    onMouseEnter={e=>e.target.style.color=T.accent} onMouseLeave={e=>e.target.style.color=T.textDim}>
                    ATC-SYS v0.5.8
                  </span>
                  &nbsp;· <span style={{ color:syncColor, animation:syncStatus==="connecting"?"blink 1s infinite":"none" }}>{syncLabel}</span>
                  &nbsp;· <span style={{ color:T.textMuted }}>? でショートカット</span>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:"12px", flexWrap:"wrap" }}>
                {selectedId && (
                  <div style={{ fontSize:"10px", color:T.accent2, padding:"3px 10px", border:`1px solid ${T.accent2}44`, borderRadius:"2px", background:`${T.accent2}10` }}>
                    ◉ {tasks.find(t=>t.id===selectedId)?.stripId||"---"} &nbsp;<span style={{ color:T.textMuted, fontSize:"8px" }}>↑↓で移動 · E編集</span>
                  </div>
                )}
                <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  {user.photoURL && <img src={user.photoURL} alt="" style={{ width:"26px", height:"26px", borderRadius:"50%", border:`1px solid ${T.accent}33` }} />}
                  <div>
                    <div style={{ fontSize:"9px", color:T.textDim, lineHeight:1.3 }}>{user.displayName||user.email}</div>
                    <button onClick={() => auth.signOut()} style={{ background:"transparent", border:"none", color:T.textMuted, fontSize:"8px", cursor:"pointer", fontFamily:"'JetBrains Mono',monospace", padding:0 }}>SIGN OUT ↩</button>
                  </div>
                </div>
                <div style={{ fontSize:"10px", color:T.textDim, letterSpacing:"0.08em" }}>
                  ACT:<span style={{ color:T.accent }}>{stats.active}</span>&nbsp;·&nbsp;
                  NXT:<span style={{ color:"#00ccff" }}>{stats.next}</span>&nbsp;·&nbsp;
                  DLG:<span style={{ color:"#ffaa00" }}>{stats.delegated}</span>&nbsp;·&nbsp;
                  HLD:<span style={{ color:T.textDim }}>{stats.pending}</span>&nbsp;·&nbsp;
                  CLR:<span style={{ color:T.textMuted }}>{stats.completed}</span>
                  {stats.urgent >0 && <span style={{ color:"#ff3333" }}>&nbsp;·&nbsp;URG:{stats.urgent}</span>}
                </div>
                <div style={{ color:T.accent, fontSize:"22px", fontWeight:700, letterSpacing:"0.1em", textShadow:`0 0 15px ${T.accent}44` }}>
                  {currentTime.toLocaleTimeString("ja-JP",{hour12:false})}
                </div>
              </div>
            </header>

            {/* ツールバー */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px", gap:"8px", flexWrap:"wrap" }}>
              {!isMobile && (
                <div style={{ display:"flex", gap:"2px" }}>
                  {[{id:"hybrid",label:"HYBRID"},{id:"kanban",label:"KANBAN"},{id:"timeline",label:"TIMELINE"}].map(mode => (
                    <button key={mode.id} onClick={() => setViewMode(mode.id)} style={{ background:viewMode===mode.id?`${T.accent}18`:"transparent", border:`1px solid ${viewMode===mode.id?T.accent+"66":T.border2}`, color:viewMode===mode.id?T.accent:T.textDim, padding:"4px 12px", borderRadius:"2px", cursor:"pointer", fontSize:"10px", fontWeight:700, letterSpacing:"0.1em", fontFamily:"'JetBrains Mono',monospace" }}>{mode.label}</button>
                  ))}
                </div>
              )}
              <div style={{ display:"flex", gap:"6px", alignItems:"center", flexWrap:"wrap" }}>
                <select value={filterPriority} onChange={e=>setFilterPriority(e.target.value)} style={{ background:T.bgInput, border:`1px solid ${T.border2}`, color:T.textDim, padding:"4px 8px", borderRadius:"2px", fontSize:"10px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer" }}>
                  <option value="all">ALL PRI</option>
                  <option value="high">🔴 URG</option>
                  <option value="normal">🟢 NRM</option>
                  <option value="low">⚫ LOW</option>
                </select>
                <select value={filterCategory} onChange={e=>setFilterCategory(e.target.value)} style={{ background:T.bgInput, border:`1px solid ${T.border2}`, color:T.textDim, padding:"4px 8px", borderRadius:"2px", fontSize:"10px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer" }}>
                  <option value="all">ALL CAT</option>
                  {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                </select>
                <button onClick={() => setShowCatEditor(true)} style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.textDim, padding:"4px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"10px", fontWeight:700, fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.05em" }}>CAT ✎</button>
                <button onClick={() => setShowRoutines(true)} style={{ background:"transparent", border:`1px solid rgba(255,170,0,0.4)`, color:"#ffaa00", padding:"4px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"10px", fontWeight:700, fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.05em" }}>🔄 ROUTINE</button>
                <ThemePicker currentId={themeId} onChange={setTheme} />
                <DataMenu tasks={tasks} tasksRef={tasksRef} />
                <button onClick={cycleFontSize} title="文字サイズ切替（小→中→大）" style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.accent, padding:"4px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"13px", fontWeight:700, fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.05em", minWidth:"52px" }}>
                  A{FONT_SIZES[stripFontSize].label}
                </button>
                <button onClick={() => setShowForm(!showForm)} style={{ background:showForm?"rgba(255,50,50,0.15)":`${T.accent}18`, border:`1px solid ${showForm?"#ff333366":T.accent+"66"}`, color:showForm?"#ff6666":T.accent, padding:"4px 14px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontWeight:700, letterSpacing:"0.1em", fontFamily:"'JetBrains Mono',monospace" }}>{showForm?"✕ CLOSE":"+ FILE STRIP"}</button>
                <button onClick={() => setShowHelp(!showHelp)} style={{ background:showHelp?`${T.accent2}18`:"transparent", border:`1px solid ${showHelp?T.accent2+"66":T.border2}`, color:showHelp?T.accent2:T.textDim, padding:"4px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"12px", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>?</button>
              </div>
            </div>

            {showForm && <NewStripForm onAdd={handleAdd} onClose={() => setShowForm(false)} />}

            {!isMobile && (viewMode === "hybrid" || viewMode === "timeline") && (
              <div style={{ marginBottom:"16px" }}>
                <TimelineView tasks={filteredTasks} currentTime={currentTime} />
              </div>
            )}

            {(viewMode === "hybrid" || viewMode === "kanban") && (() => {
              // タイマー計算（Firestoreから導出 → 全端末で同期）
              const runningTask     = tasks.find(t => t.timerRunning && t.timerStartedAt);
              const timerStartMs    = runningTask?.timerStartedAt?.toMillis?.()
                ?? (runningTask?.timerStartedAt?.seconds * 1000) ?? 0;
              const elapsedMs       = runningTask ? Math.max(0, currentTime.getTime() - timerStartMs) : 0;
              const totalLoggedMs = (id) => {
                const task = tasks.find(t => t.id === id);
                return (task?.timeLogs || []).reduce((sum, l) => sum + (l.durationMs || 0), 0);
              };

              // モバイルレイアウト
              if (isMobile) {
                const renderStripMobile = (task) => (
                  <div key={task.id} onClick={() => setSelectedId(task.id)}>
                    <FlightStrip
                      task={task}
                      isSelected={selectedId === task.id}
                      dropState={dropState}
                      onDragStart={handleDragStart}
                      onDragOver={handleDragOverStrip}
                      onDragEnd={handleDragEnd}
                      onDrop={handleDropOnStrip}
                      onStatusChange={handleStatusChange}
                      onDelete={handleDelete}
                      onEdit={id => setEditTaskId(id)}
                      isTimerRunning={task.timerRunning === true}
                      elapsedMs={task.timerRunning ? elapsedMs : 0}
                      totalLoggedMs={totalLoggedMs(task.id)}
                      onTimerStart={handleTimerStart}
                      onTimerStop={handleTimerStop}
                      onTouchStart={handleTouchStart}
                      onTouchMove={handleTouchMove}
                      onTouchEnd={handleTouchEnd}
                      titleFontSize={FONT_SIZES[stripFontSize].px}
                      onCheckItem={handleCheckItem}
                      onCheckRoutineStep={handleCheckRoutineStep}
                    />
                  </div>
                );

                const activeTasks2    = getColTasks("active");
                const pendingTasks2   = getColTasks("pending");
                // タブ対象列（NEXT / DELEGATED / CLEARED）
                const SUB_TABS = [
                  { col: COLUMNS[1], id: "next"      },
                  { col: COLUMNS[2], id: "delegated" },
                  { col: COLUMNS[4], id: "completed" },
                ];
                const tabCol = COLUMNS.find(c => c.id === mobileTab);

                return (
                  <div style={{ paddingBottom: '80px' }}>

                    {/* ① ACTIVE — sticky */}
                    <div style={{ position:'sticky', top:0, zIndex:10, background:T.bg, paddingBottom:'8px' }}>
                      <div data-col-id="active"
                        onDrop={e => handleDropOnColumn(e, "active")} onDragOver={e => e.preventDefault()}
                        style={{ background:T.bgCard, border:`1px solid ${T.accent}44`, borderRadius:'4px', padding:'10px', boxShadow:`0 4px 20px ${T.accent}10` }}>
                        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'6px', paddingBottom:'6px', borderBottom:`1px solid ${T.border}` }}>
                          <span style={{ color:T.accent, fontSize:'12px', fontWeight:700, letterSpacing:'0.15em' }}>▶ ACTIVE</span>
                          <span style={{ fontSize:'9px', color:T.textMuted }}>max 1</span>
                        </div>
                        {activeTasks2.map(renderStripMobile)}
                        {activeTasks2.length === 0 && (
                          <div style={{ textAlign:'center', padding:'14px', color:T.border, fontSize:'10px', letterSpacing:'0.1em', border:`1px dashed ${T.border}`, borderRadius:'2px' }}>
                            — 待機中 —
                          </div>
                        )}
                      </div>
                    </div>

                    {/* ② タブ行: NEXT / DELEGATED / CLEARED */}
                    <div style={{ display:'flex', borderBottom:`1px solid ${T.border}`, marginBottom:'8px' }}>
                      {SUB_TABS.map(({ col, id }) => {
                        const cnt = getColTasks(id).length;
                        const active = mobileTab === id;
                        const acc = accentForCol(id);
                        return (
                          <button key={id}
                            onClick={() => setMobileTab(active ? null : id)}
                            style={{ flex:1, padding:'10px 4px', background:'transparent', border:'none',
                              borderBottom: active ? `2px solid ${acc}` : '2px solid transparent',
                              color: active ? acc : T.textDim,
                              fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace",
                              cursor:'pointer', minHeight:'44px', lineHeight:1.3 }}>
                            {col.icon} {col.label.replace(" ACTION","")}<br/>
                            <span style={{ fontSize:'9px', opacity:0.7 }}>{cnt}{col.limit?`/${col.limit}`:''}</span>
                          </button>
                        );
                      })}
                    </div>

                    {/* ③ 選択タブのコンテンツ（展開） */}
                    {mobileTab && tabCol && (
                      <div data-col-id={mobileTab}
                        onDrop={e => handleDropOnColumn(e, mobileTab)} onDragOver={e => e.preventDefault()}
                        style={{ background:T.bgCard, border:`1px solid ${T.border}`, borderRadius:'4px', padding:'10px', marginBottom:'10px' }}>
                        {getColTasks(mobileTab).map(renderStripMobile)}
                        {mobileTab === 'next' && Array.from({ length: Math.max(0, 5 - getColTasks('next').length) }).map((_, i) => (
                          <div key={`slot-${i}`} style={{ height:'36px', border:`1px dashed ${T.border}22`, borderRadius:'2px', marginBottom:'6px', display:'flex', alignItems:'center', justifyContent:'center' }}>
                            <span style={{ color:T.border, fontSize:'8px' }}>SLOT {getColTasks('next').length + i + 1}</span>
                          </div>
                        ))}
                        {getColTasks(mobileTab).length === 0 && mobileTab !== 'next' && (
                          <div style={{ textAlign:'center', padding:'16px', color:T.border, fontSize:'10px' }}>NO STRIPS</div>
                        )}
                      </div>
                    )}

                    {/* ④ HOLDING — スクロール */}
                    <div data-col-id="pending"
                      onDrop={e => handleDropOnColumn(e, "pending")} onDragOver={e => e.preventDefault()}
                      style={{ background:T.bgCard, border:`1px solid ${T.border}`, borderRadius:'4px', padding:'10px' }}>
                      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'8px', paddingBottom:'6px', borderBottom:`1px solid ${T.border}` }}>
                        <span style={{ color:T.textDim, fontSize:'12px', fontWeight:700, letterSpacing:'0.15em' }}>⏸ HOLDING</span>
                        <span style={{ background:"rgba(100,120,140,0.2)", color:T.textDim, fontSize:'9px', padding:'1px 6px', borderRadius:'10px' }}>{pendingTasks2.length}</span>
                      </div>
                      {pendingTasks2.map(renderStripMobile)}
                      {pendingTasks2.length === 0 && (
                        <div style={{ textAlign:'center', padding:'20px', color:T.border, fontSize:'10px' }}>NO STRIPS</div>
                      )}
                    </div>

                  </div>
                );
              }

              // デスクトップレイアウト（共通ストリップレンダラー）
              // 共通ストリップレンダラー
              const renderStrip = (task) => (
                <div key={task.id} onClick={() => setSelectedId(task.id)}>
                  <FlightStrip
                    task={task}
                    isSelected={selectedId === task.id}
                    dropState={dropState}
                    onDragStart={handleDragStart}
                    onDragOver={handleDragOverStrip}
                    onDragEnd={handleDragEnd}
                    onDrop={handleDropOnStrip}
                    onStatusChange={handleStatusChange}
                    onDelete={handleDelete}
                    onEdit={id => setEditTaskId(id)}
                    isTimerRunning={task.timerRunning === true}
                    elapsedMs={task.timerRunning ? elapsedMs : 0}
                    totalLoggedMs={totalLoggedMs(task.id)}
                    onTimerStart={handleTimerStart}
                    onTimerStop={handleTimerStop}
                    onTouchStart={handleTouchStart}
                    onTouchMove={handleTouchMove}
                    onTouchEnd={handleTouchEnd}
                    titleFontSize={FONT_SIZES[stripFontSize].px}
                    onCheckItem={handleCheckItem}
                    onCheckRoutineStep={handleCheckRoutineStep}
                  />
                </div>
              );

              // カラムヘッダー
              const colHeader = (col, tasksCount) => {
                const colColor = col.id==="active" ? T.accent : col.id==="next" ? "#00ccff" : col.id==="delegated" ? "#ffaa00" : col.id==="completed" ? T.textDim : T.textDim;
                return (
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"8px", paddingBottom:"6px", borderBottom:`1px solid ${T.border}` }}>
                    <div>
                      <span style={{ color:colColor, fontSize:"11px", fontWeight:700, letterSpacing:"0.15em" }}>{col.icon} {col.label}</span>
                      <span style={{ color:T.textMuted, fontSize:"9px", marginLeft:"6px" }}>{col.sublabel}</span>
                      {col.limit && <span style={{ color:T.textMuted, fontSize:"8px", marginLeft:"4px" }}>max {col.limit}</span>}
                    </div>
                    <span style={{ background:"rgba(100,120,140,0.2)", color:T.textDim, fontSize:"9px", padding:"1px 6px", borderRadius:"10px" }}>{tasksCount}{col.limit?`/${col.limit}`:""}</span>
                  </div>
                );
              };

              const dropCol = (colId) => ({ onDrop: e => handleDropOnColumn(e, colId), onDragOver: e => e.preventDefault() });
              const colBox  = (extra) => ({ background:T.bgCard, border:`1px solid ${T.border}`, borderRadius:"4px", padding:"10px", ...extra });
              const emptyMsg = <div style={{ textAlign:"center", padding:"20px 10px", color:T.border, fontSize:"10px", letterSpacing:"0.1em" }}>NO STRIPS</div>;

              const activeTasks    = getColTasks("active");
              const nextTasks      = getColTasks("next");
              const delegatedTasks = getColTasks("delegated");
              const pendingTasks   = getColTasks("pending");
              const completedTasks = getColTasks("completed");

              return (
                <div style={{ display:"flex", gap:"12px", alignItems:"flex-start" }}>

                  {/* 左パネル: ACTIVE + NEXT ACTION */}
                  <div style={{ flex:"0 0 300px", display:"flex", flexDirection:"column", gap:"12px" }}>

                    {/* ACTIVE（1スロット） */}
                    <div data-col-id="active" style={colBox({ border:`1px solid ${T.accent}44`, boxShadow:`0 0 20px ${T.accent}10` })} {...dropCol("active")}>
                      {colHeader(COLUMNS[0], activeTasks.length)}
                      {activeTasks.map(renderStrip)}
                      {activeTasks.length === 0 && (
                        <div style={{ textAlign:"center", padding:"20px 10px", color:T.border, fontSize:"10px", letterSpacing:"0.1em", border:`1px dashed ${T.border}`, borderRadius:"2px" }}>
                          — 待機中 —
                        </div>
                      )}
                    </div>

                    {/* NEXT ACTION（5スロット ①〜⑤番号バー） */}
                    <div data-col-id="next" style={colBox({ border:`1px solid #00ccff33` })} {...dropCol("next")}>
                      {colHeader(COLUMNS[1], nextTasks.length)}
                      {/* 各スロット: 番号セル + ストリップを1行ずつ横並び */}
                      {Array.from({ length: 5 }).map((_, i) => {
                        const task = nextTasks[i];
                        return (
                          <div key={i} style={{ display:'flex', alignItems:'stretch', gap:'4px', marginBottom:'6px' }}>
                            {/* 番号セル */}
                            <div style={{
                              flexShrink:0, width:'20px',
                              display:'flex', alignItems:'center', justifyContent:'center',
                              background: task ? 'rgba(0,204,255,0.12)' : 'rgba(0,204,255,0.04)',
                              border:`1px solid ${task ? 'rgba(0,204,255,0.35)' : 'rgba(0,204,255,0.1)'}`,
                              borderRadius:'2px',
                              color: task ? '#00ccff' : T.border,
                              fontSize:'12px', fontWeight:700,
                            }}>
                              {['①','②','③','④','⑤'][i]}
                            </div>
                            {/* ストリップ */}
                            <div style={{ flex:1, minWidth:0, marginBottom:'-6px' }}>
                              {task ? renderStrip(task) : (
                                <div style={{ height:'34px', border:`1px dashed ${T.border}22`, borderRadius:'2px' }} />
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    {/* DELEGATED（委任中） */}
                    <div data-col-id="delegated" style={colBox({ border:`1px solid #ffaa0033` })} {...dropCol("delegated")}>
                      {colHeader(COLUMNS[2], delegatedTasks.length)}
                      {delegatedTasks.map(renderStrip)}
                      {delegatedTasks.length === 0 && emptyMsg}
                    </div>
                  </div>

                  {/* 右パネル: HOLDING + CLEARED（HOLDINGは左パネルと同幅に固定） */}
                  <div style={{ display:"grid", gridTemplateColumns:"minmax(0,clamp(280px,22vw,360px)) minmax(0,clamp(230px,19vw,285px))", gap:"12px", alignItems:"start" }}>
                    <div data-col-id="pending" style={colBox({})} {...dropCol("pending")}>
                      {colHeader(COLUMNS[3], pendingTasks.length)}
                      {pendingTasks.map(renderStrip)}
                      {pendingTasks.length === 0 && emptyMsg}
                    </div>
                    <div data-col-id="completed" style={colBox({})} {...dropCol("completed")}>
                      {colHeader(COLUMNS[4], completedTasks.length)}
                      {completedTasks.map(renderStrip)}
                      {completedTasks.length === 0 && emptyMsg}
                    </div>
                  </div>

                </div>
              );
            })()}

            {/* フッター */}
            <footer style={{ marginTop:"20px", paddingTop:"10px", borderTop:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", color:T.textMuted, fontSize:"9px", letterSpacing:"0.1em" }}>
              <span>FLIGHT STRIP TODO · ATC-SYS v0.5.7</span>
              <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                <span>{currentTime.toLocaleDateString("ja-JP")} · STRIPS: {tasks.length}</span>
                <button onClick={handleConsoleCopy} style={{ background:`${T.accent}10`, border:`1px solid ${T.accent}22`, color:T.textDim, padding:"2px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"8px", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.05em" }}>📋 CONSOLE COPY</button>
              </div>
            </footer>
          </div>
        </div>
      );
    }

    // ======================================================
    // App ルート（認証 + テーマ管理）
    // ======================================================
    function App() {
      const [user,        setUser]        = useState(null);
      const [authChecked, setAuthChecked] = useState(false);
      const [denied,      setDenied]      = useState({ active:false, email:"" });
      const [themeId,     setThemeId]     = useState(() => localStorage.getItem("fst-theme") || "DARK");

      const setTheme = id => { setThemeId(id); localStorage.setItem("fst-theme", id); };
      const theme = THEMES[themeId] || THEMES.DARK;

      // body 背景色 + CSS変数をテーマに同期
      useEffect(() => {
        document.body.style.background = theme.bg;
        document.documentElement.style.setProperty("--bg-main",  theme.bg);
        document.documentElement.style.setProperty("--bg-input", theme.bgInput);
        document.documentElement.style.setProperty("--bg-scroll",theme.bg);
        document.documentElement.style.setProperty("--border",   theme.border);
        document.documentElement.style.setProperty("--text-main",theme.text);
      }, [theme]);

      useEffect(() => {
        return auth.onAuthStateChanged(u => {
          if (u) {
            const ok = ALLOWED_EMAILS.length === 0 || ALLOWED_EMAILS.includes(u.email);
            if (ok) { setUser(u); setDenied({active:false,email:""}); }
            else    { auth.signOut(); setDenied({active:true,email:u.email}); setUser(null); }
          } else { setUser(null); }
          setAuthChecked(true);
        });
      }, []);

      return (
        <ThemeCtx.Provider value={theme}>
          {!authChecked
            ? <LoadingScreen />
            : denied.active
              ? <AccessDenied email={denied.email} onDismiss={() => setDenied({active:false,email:""})} />
              : !user
                ? <LoginScreen />
                : <FlightStripTodo user={user} themeId={themeId} setTheme={setTheme} />
          }
        </ThemeCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- JSX手動トランスフォーム＆実行 -->
  <script>
    (function() {
      var src = document.getElementById('jsx-source').textContent;
      var result = Babel.transform(src, { presets: ['react', 'env'] });
      // グローバルスコープで実行（React等のグローバル変数にアクセスするため）
      var fn = new Function(result.code);
      fn();
    })();
  </script>
</body>
</html>
