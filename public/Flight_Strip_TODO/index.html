    // ======================================================

    const FeedbackModal = ({ user, onClose, build }) => {
      const T = useT();
      const [subject, setSubject] = useState('');
      const [email,   setEmail]   = useState(user?.email || '');
      const [message, setMessage] = useState('');
      const [sending, setSending] = useState(false);
      const [sent,    setSent]    = useState(false);
      const [error,   setError]   = useState('');

      const handleSubmit = async () => {
        if (!subject.trim()) { setError('件名を入力してください'); return; }
        if (!message.trim()) { setError('メッセージを入力してください'); return; }
        if (message.length > 200) { setError('メッセージは200文字以内です'); return; }
        setSending(true); setError('');
        try {
          const counterRef = db.collection('fst_feedback_meta').doc('counter');
          let fbId;
          await db.runTransaction(async tx => {
            const doc = await tx.get(counterRef);
            const n = (doc.exists ? (doc.data().count || 0) : 0) + 1;
            tx.set(counterRef, { count: n }, { merge: true });
            fbId = `FB_${String(n).padStart(4, '0')}`;
          });
          await db.collection('fst_feedback').doc(fbId).set({
            fbId, subject: subject.trim(), email: email.trim(),
            message: message.trim(), build,
            uid: user?.uid || null, status: 'new', replySent: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          if (EMAILJS_CONFIG.publicKey && EMAILJS_CONFIG.serviceId && email.trim()) {
            try {
              await window.emailjs.send(
                EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId,
                { to_email: email.trim(), fb_id: fbId,
                  subject: subject.trim(), message: message.trim() },
                EMAILJS_CONFIG.publicKey
              );
              await db.collection('fst_feedback').doc(fbId).update({ replySent: true });
            } catch(e) { console.warn('Auto-reply failed:', e); }
          }
          setSent(true);
        } catch(e) { setError('送信に失敗しました: ' + e.message); }
        finally { setSending(false); }
      };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"16px" }}>
          <div style={{ background:T.bgModal, border:`1px solid ${T.border}`, borderRadius:"6px", padding:"24px", width:"100%", maxWidth:"480px", boxShadow:"0 8px 40px rgba(0,0,0,0.5)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px", paddingBottom:"12px", borderBottom:`1px solid ${T.border}` }}>
              <div>
                <div style={{ fontSize:"14px", fontWeight:800, color:T.accent, letterSpacing:"0.15em" }}>💬 フィードバック</div>
                <div style={{ fontSize:"8px", color:T.textMuted, letterSpacing:"0.2em", marginTop:"2px" }}>FLIGHT STRIP TODO</div>
              </div>
              <button onClick={onClose} style={{ background:"transparent", border:"none", color:T.textDim, cursor:"pointer", fontSize:"18px", lineHeight:1 }}>✕</button>
            </div>
            {sent ? (
              <div style={{ textAlign:"center", padding:"24px 0" }}>
                <div style={{ fontSize:"36px", marginBottom:"12px" }}>✅</div>
                <div style={{ fontSize:"13px", color:T.accent, fontWeight:700, marginBottom:"8px" }}>送信完了</div>
                <div style={{ fontSize:"11px", color:T.textDim }}>フィードバックありがとうございました</div>
                <button onClick={onClose} style={{ marginTop:"20px", background:`${T.accent}18`, border:`1px solid ${T.accent}44`, color:T.accent, padding:"8px 24px", borderRadius:"4px", cursor:"pointer", fontSize:"11px", fontFamily:"inherit" }}>閉じる</button>
              </div>
            ) : (<>
              <div style={{ marginBottom:"14px" }}>
                <label style={{ fontSize:"9px", color:T.textDim, letterSpacing:"0.15em", display:"block", marginBottom:"5px" }}>件名 *</label>
                <input value={subject} onChange={e=>setSubject(e.target.value)} maxLength={100}
                  style={{ width:"100%", background:T.bgCard, border:`1px solid ${T.border2}`, borderRadius:"3px", padding:"8px 10px", color:T.text, fontSize:"12px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }}
                  placeholder="例：タスク追加時の不具合について" />
              </div>
              <div style={{ marginBottom:"14px" }}>
                <label style={{ fontSize:"9px", color:T.textDim, letterSpacing:"0.15em", display:"block", marginBottom:"5px" }}>メールアドレス（返信先）</label>
                <input value={email} onChange={e=>setEmail(e.target.value)} type="email"
                  style={{ width:"100%", background:T.bgCard, border:`1px solid ${T.border2}`, borderRadius:"3px", padding:"8px 10px", color:T.text, fontSize:"12px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }}
                  placeholder="reply@example.com" />
              </div>
              <div style={{ marginBottom:"16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"5px" }}>
                  <label style={{ fontSize:"9px", color:T.textDim, letterSpacing:"0.15em" }}>メッセージ *</label>
                  <span style={{ fontSize:"9px", color: message.length > 180 ? "#ff6666" : T.textMuted }}>{message.length} / 200</span>
                </div>
                <textarea value={message} onChange={e=>setMessage(e.target.value)} maxLength={200} rows={5}
                  style={{ width:"100%", background:T.bgCard, border:`1px solid ${T.border2}`, borderRadius:"3px", padding:"8px 10px", color:T.text, fontSize:"12px", fontFamily:"inherit", resize:"vertical", outline:"none", boxSizing:"border-box" }}
                  placeholder="ご意見・ご要望・不具合報告など" />
              </div>
              {error && <div style={{ fontSize:"10px", color:"#ff6666", marginBottom:"12px" }}>{error}</div>}
              <div style={{ display:"flex", justifyContent:"flex-end", gap:"8px" }}>
                <button onClick={onClose} style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.textDim, padding:"8px 16px", borderRadius:"3px", cursor:"pointer", fontSize:"11px", fontFamily:"inherit" }}>キャンセル</button>
                <button onClick={handleSubmit} disabled={sending}

              </div>

        </div>

    };

            <div style={{ color:T.accent, fontSize:"11px", fontWeight:700, letterSpacing:"0.15em", marginBottom:"16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>

    // ======================================================
    // ルーティンモーダル
    // ======================================================
    const RoutineModal = ({ tasks, tasksRef, projectsRef, onClose }) => {
      const T = useT();
      const ts = () => firebase.firestore.FieldValue.serverTimestamp();
      const _now = new Date();
      const todayStr = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;

      const [routines, setRoutines] = useState([]);
      const [selectedRoutineId, setSelectedRoutineId] = useState(null);
      const [showNewForm, setShowNewForm] = useState(false);
      const [newName, setNewName] = useState('');
      const [newColor, setNewColor] = useState('#ffaa00');
      const [newStepTitle, setNewStepTitle] = useState('');
      const [newStepPri, setNewStepPri] = useState('normal');
      const [addingStep, setAddingStep] = useState(false);
      const [generatingMsg, setGeneratingMsg] = useState('');

      useEffect(() => {
        const unsub = projectsRef.where('type','==','routine').onSnapshot(snap => {
          const list = snap.docs.map(d => ({ id:d.id, ...d.data() }));
          setRoutines(list);
          if (list.length > 0 && !selectedRoutineId) setSelectedRoutineId(list[0].id);
        });
        return unsub;
      }, [projectsRef]); // eslint-disable-line

      const selectedRoutine = routines.find(r => r.id === selectedRoutineId);
      const routineSteps = tasks
        .filter(t => t.routineId === selectedRoutineId && t.isRoutineTemplate)
        .sort((a,b) => (a.routineOrder??0)-(b.routineOrder??0));

      const createRoutine = async () => {
        if (!newName.trim()) return;
        const ref = await projectsRef.add({ name:newName.trim(), color:newColor, type:'routine', createdAt:ts(), updatedAt:ts() });
        setSelectedRoutineId(ref.id);
        setNewName(''); setShowNewForm(false);
      };

      const deleteRoutine = async (id) => {
        if (!window.confirm('ルーティンを削除しますか？')) return;
        await projectsRef.doc(id).delete();
        const tmpl = tasks.filter(t => t.routineId === id && t.isRoutineTemplate);
        for (const t of tmpl) await tasksRef.doc(t.id).delete();
        setSelectedRoutineId(routines.find(r => r.id !== id)?.id || null);
      };

      const addStep = async () => {
        if (!newStepTitle.trim() || !selectedRoutineId) return;
        const maxOrder = routineSteps.reduce((m,t) => Math.max(m, t.routineOrder??0), -1);
        await tasksRef.add({
          title: newStepTitle.trim(), priority: newStepPri,
          status: 'pending', category: 'work', tags: [], time: '',
          stripId: `RT${String(Date.now()).slice(-4)}`,
          routineId: selectedRoutineId, routineOrder: maxOrder + 1,
          isRoutineTemplate: true,
          sortOrder: Date.now(), createdAt: ts(), updatedAt: ts(),
        });
        setNewStepTitle(''); setAddingStep(false);
      };

      const removeStep = async (taskId) =>
        tasksRef.doc(taskId).update({ routineId: null, isRoutineTemplate: false, updatedAt: ts() });

      const moveStep = async (taskId, dir) => {
        const idx = routineSteps.findIndex(t => t.id === taskId);
        const tIdx = dir === 'up' ? idx - 1 : idx + 1;
        if (tIdx < 0 || tIdx >= routineSteps.length) return;
        const target = routineSteps[tIdx];
        const myO = routineSteps[idx].routineOrder ?? idx;
        const thO = target.routineOrder ?? tIdx;
        await tasksRef.doc(taskId).update({ routineOrder: thO, updatedAt: ts() });
        await tasksRef.doc(target.id).update({ routineOrder: myO, updatedAt: ts() });
      };

      const startToday = async () => {
        if (!selectedRoutineId || routineSteps.length === 0) return;
        const key = `fst_routine_ran_${selectedRoutineId}_${todayStr}`;
        if (localStorage.getItem(key)) {
          setGeneratingMsg('今日はすでに作成済みです');
          setTimeout(() => setGeneratingMsg(''), 2500);
          return;
        }
        const steps = routineSteps.map((step, i) => ({
          id: `step_${i}_${Date.now()}`,
          text: step.title || step.text || String(step),
          checked: false,
        }));
        await tasksRef.add({
          title: selectedRoutine.name,
          status: 'next',
          priority: 'normal',
          category: '',
          tags: [],
          time: '',
          stripId: `RT${String(Date.now()).slice(-4)}`,
          isRoutine: true,
          routineId: selectedRoutineId,
          routineSteps: steps,
          sortOrder: Date.now(),
          createdAt: ts(), updatedAt: ts(),
        });
        localStorage.setItem(key, '1');
        setGeneratingMsg(`✓「${selectedRoutine.name}」のルーティンを開始しました`);
        setTimeout(() => setGeneratingMsg(''), 3000);
      };

      const inp = { background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'6px 10px', borderRadius:'2px', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace" };
      const alreadyRan = selectedRoutineId && !!localStorage.getItem(`fst_routine_ran_${selectedRoutineId}_${todayStr}`);

      return (
        <div style={{ position:'fixed', inset:0, zIndex:100, background:'rgba(0,0,0,0.82)', display:'flex', alignItems:'center', justifyContent:'center' }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background:T.bgModal, border:`1px solid ${T.accent}44`, borderRadius:'6px', padding:'24px', maxWidth:'680px', width:'95%', maxHeight:'85vh', display:'flex', flexDirection:'column', gap:'12px', boxShadow:`0 0 40px ${T.accent}18`, fontFamily:"'JetBrains Mono',monospace" }}>

            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <span style={{ color:'#ffaa00', fontSize:'13px', fontWeight:700, letterSpacing:'0.15em' }}>🔄 ROUTINES</span>
              <div style={{ display:'flex', gap:'8px' }}>
                <button onClick={() => setShowNewForm(p=>!p)} style={{ background:'rgba(255,170,0,0.18)', border:'1px solid rgba(255,170,0,0.5)', color:'#ffaa00', padding:'4px 12px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>+ NEW ROUTINE</button>
                <button onClick={onClose} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, padding:'4px 10px', borderRadius:'2px', cursor:'pointer', fontSize:'12px' }}>✕</button>
              </div>
            </div>

            {showNewForm && (
              <div style={{ background:'rgba(255,170,0,0.06)', border:'1px solid rgba(255,170,0,0.3)', borderRadius:'3px', padding:'10px', display:'flex', gap:'8px', flexWrap:'wrap', alignItems:'center' }}>
                <input value={newName} onChange={e => setNewName(e.target.value)}
                  onKeyDown={e => { if(e.key==='Enter' && !e.nativeEvent.isComposing) createRoutine(); if(e.key==='Escape') setShowNewForm(false); }}
                  placeholder="ルーティン名（例: 朝のルーティン）..." autoFocus
                  style={{ ...inp, flex:'1 1 160px' }} />
                <div style={{ display:'flex', gap:'4px' }}>
                  {['#ffaa00','#ff6600','#00ff88','#ff2299','#00aaff','#cc44ff','#ff3333','#00ccaa'].map(c => (
                    <button key={c} onClick={() => setNewColor(c)}
                      style={{ width:'18px', height:'18px', borderRadius:'50%', background:c, border:`2px solid ${newColor===c?'#fff':'transparent'}`, cursor:'pointer', padding:0, flexShrink:0 }} />
                  ))}
                </div>
                <button onClick={createRoutine} style={{ background:'rgba(255,170,0,0.22)', border:'1px solid rgba(255,170,0,0.6)', color:'#ffaa00', padding:'6px 14px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>作成</button>
              </div>
            )}

            <div style={{ display:'flex', gap:'16px', flex:1, minHeight:0, overflow:'hidden' }}>

              <div style={{ width:'170px', flexShrink:0, display:'flex', flexDirection:'column', gap:'4px', overflowY:'auto' }}>
                <div style={{ fontSize:'8px', color:T.textMuted, letterSpacing:'0.12em', padding:'2px 4px', marginBottom:'2px' }}>ROUTINES ({routines.length})</div>
                {routines.length === 0 && <div style={{ fontSize:'10px', color:T.textMuted, padding:'12px 4px', textAlign:'center' }}>なし</div>}
                {routines.map(r => {
                  const isSel = r.id === selectedRoutineId;
                  const ranToday = !!localStorage.getItem(`fst_routine_ran_${r.id}_${todayStr}`);
                  return (
                    <div key={r.id} onClick={() => setSelectedRoutineId(r.id)}
                      style={{ padding:'8px 10px', borderRadius:'3px', border:`1px solid ${isSel?r.color+'66':T.border2}`, background:isSel?`${r.color}12`:'transparent', cursor:'pointer', transition:'all 0.1s' }}>
                      <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                        <span style={{ width:'8px', height:'8px', borderRadius:'50%', background:r.color||'#ffaa00', flexShrink:0 }} />
                        <span style={{ fontSize:'11px', color:isSel?T.text:T.textDim, fontWeight:isSel?700:400, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.name}</span>
                      </div>
                      {ranToday && <div style={{ fontSize:'8px', color:'#00ff88', marginTop:'3px', paddingLeft:'14px' }}>✓ 今日実施済み</div>}
                    </div>
                  );
                })}
              </div>

              <div style={{ flex:1, display:'flex', flexDirection:'column', gap:'8px', overflowY:'auto', minWidth:0 }}>
                {!selectedRoutine ? (
                  <div style={{ fontSize:'11px', color:T.textMuted, textAlign:'center', marginTop:'32px' }}>ルーティンを選択または作成してください</div>
                ) : (
                  <>
                    <div style={{ display:'flex', alignItems:'center', gap:'8px', paddingBottom:'8px', borderBottom:`1px solid ${T.border2}`, flexShrink:0 }}>
                      <span style={{ width:'10px', height:'10px', borderRadius:'50%', background:selectedRoutine.color||'#ffaa00', flexShrink:0 }} />
                      <span style={{ fontSize:'13px', color:T.text, fontWeight:700 }}>{selectedRoutine.name}</span>
                      <span style={{ fontSize:'9px', color:T.textDim }}>— {routineSteps.length}ステップ</span>
                      <div style={{ flex:1 }} />
                      <button onClick={() => deleteRoutine(selectedRoutineId)} style={{ background:'rgba(255,50,50,0.1)', border:'1px solid rgba(255,50,50,0.3)', color:'#ff8888', padding:'2px 8px', borderRadius:'2px', cursor:'pointer', fontSize:'9px', fontFamily:"'JetBrains Mono',monospace" }}>削除</button>
                    </div>

                    <div style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px', background:alreadyRan?'rgba(0,255,136,0.06)':'rgba(255,170,0,0.08)', border:`1px solid ${alreadyRan?'rgba(0,255,136,0.3)':'rgba(255,170,0,0.3)'}`, borderRadius:'3px', flexShrink:0 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:'11px', color:alreadyRan?'#00ff88':'#ffaa00', fontWeight:700 }}>
                          {alreadyRan ? '✓ 今日はすでに実施済みです' : `🔄 今日のルーティンを開始（${routineSteps.length}ステップ）`}
                        </div>
                        <div style={{ fontSize:'9px', color:T.textMuted, marginTop:'2px' }}>1枚のストリップを NEXT に追加します</div>
                      </div>
                      {!alreadyRan && (
                        <button onClick={startToday} style={{ background:'rgba(255,170,0,0.22)', border:'1px solid rgba(255,170,0,0.6)', color:'#ffaa00', padding:'6px 14px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace", whiteSpace:'nowrap' }}>今日を開始 ▶</button>
                      )}
                    </div>
                    {generatingMsg && (
                      <div style={{ fontSize:'11px', color:'#00ff88', textAlign:'center', padding:'4px', background:'rgba(0,255,136,0.08)', borderRadius:'3px' }}>{generatingMsg}</div>
                    )}

                    <div style={{ display:'flex', flexDirection:'column', gap:'4px' }}>
                      <div style={{ fontSize:'9px', color:T.textMuted, padding:'2px 0' }}>ステップ</div>
                      {routineSteps.map((step, idx) => {
                        const pri = PRIORITIES[step.priority] || PRIORITIES.normal;
                        return (
                          <div key={step.id} style={{ display:'flex', alignItems:'center', gap:'8px', padding:'6px 8px', borderRadius:'3px', border:`1px solid ${T.border2}`, background:'transparent' }}>
                            <span style={{ fontSize:'10px', color:T.textMuted, minWidth:'18px', textAlign:'right', fontWeight:700 }}>{idx+1}</span>
                            <span style={{ flex:1, fontSize:'11px', color:T.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{step.title}</span>
                            <span style={{ fontSize:'8px', color:pri.color, padding:'1px 4px', border:`1px solid ${pri.color}44`, borderRadius:'2px', flexShrink:0 }}>{pri.label}</span>
                            <div style={{ display:'flex', gap:'2px', flexShrink:0 }}>
                              <button onClick={() => moveStep(step.id,'up')} disabled={idx===0} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:idx===0?T.textMuted:T.textDim, padding:'1px 5px', borderRadius:'2px', cursor:idx===0?'default':'pointer', fontSize:'9px' }}>↑</button>
                              <button onClick={() => moveStep(step.id,'down')} disabled={idx===routineSteps.length-1} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:idx===routineSteps.length-1?T.textMuted:T.textDim, padding:'1px 5px', borderRadius:'2px', cursor:idx===routineSteps.length-1?'default':'pointer', fontSize:'9px' }}>↓</button>
                              <button onClick={() => removeStep(step.id)} style={{ background:'rgba(255,50,50,0.1)', border:'1px solid rgba(255,50,50,0.25)', color:'#ff8888', padding:'1px 5px', borderRadius:'2px', cursor:'pointer', fontSize:'9px' }}>✕</button>
                            </div>
                          </div>
                        );
                      })}
                      {routineSteps.length === 0 && (
                        <div style={{ textAlign:'center', padding:'20px', fontSize:'10px', color:T.textMuted, border:`1px dashed ${T.border}`, borderRadius:'3px' }}>ステップを追加してください</div>
                      )}
                    </div>

                    {addingStep ? (
                      <div style={{ display:'flex', gap:'6px', alignItems:'center', flexWrap:'wrap', padding:'8px', border:`1px solid rgba(255,170,0,0.3)`, borderRadius:'3px', background:'rgba(255,170,0,0.06)', flexShrink:0 }}>
                        <input value={newStepTitle} onChange={e => setNewStepTitle(e.target.value)}
                          onKeyDown={e => { if(e.key==='Enter' && !e.nativeEvent.isComposing) addStep(); if(e.key==='Escape') setAddingStep(false); }}
                          placeholder="ステップ名..." autoFocus
                          style={{ ...inp, flex:'1 1 140px' }} />
                        <select value={newStepPri} onChange={e => setNewStepPri(e.target.value)} style={{ ...inp, cursor:'pointer' }}>
                          <option value="high">🔴 URG</option>
                          <option value="normal">🟢 NRM</option>
                          <option value="low">⚫ LOW</option>
                        </select>
                        <button onClick={addStep} style={{ background:'rgba(255,170,0,0.22)', border:'1px solid rgba(255,170,0,0.6)', color:'#ffaa00', padding:'6px 12px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>追加 ↵</button>
                        <button onClick={() => setAddingStep(false)} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, padding:'6px 8px', borderRadius:'2px', cursor:'pointer', fontSize:'10px' }}>✕</button>
                      </div>
                    ) : (
                      <button onClick={() => setAddingStep(true)}
                        style={{ background:'rgba(255,170,0,0.08)', border:'1px dashed rgba(255,170,0,0.5)', color:'#ffaa00', padding:'10px', borderRadius:'3px', cursor:'pointer', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace", width:'100%', flexShrink:0, fontWeight:700, letterSpacing:'0.05em' }}>
                        ＋ ステップを追加
                      </button>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ======================================================
    // テーマピッカー
    // ======================================================
    const THEME_DOTS = { DARK:"#00ff88", LIGHT:"#0055cc", MEDIUM:"#55aaff", COLOR:"#ff6600", COLORFUL:"#ff2299" };

    const ThemePicker = ({ currentId, onChange }) => {
      const T = useT();
      const [open, setOpen] = useState(false);

      return (
        <div style={{ position:"relative" }}>
          <button onClick={() => setOpen(p => !p)} style={{ background:open?`${T.accent}18`:"transparent", border:`1px solid ${open?T.accent+"66":T.border2}`, color:T.accent, padding:"4px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"10px", fontWeight:700, letterSpacing:"0.1em", fontFamily:"'JetBrains Mono',monospace", display:"flex", alignItems:"center", gap:"6px" }}>
            <span style={{ width:"8px", height:"8px", borderRadius:"50%", background:THEME_DOTS[currentId], display:"inline-block", flexShrink:0 }} />
            {currentId}
          </button>
          {open && (
            <>
              <div style={{ position:"fixed", inset:0, zIndex:48 }} onClick={() => setOpen(false)} />
              <div style={{ position:"absolute", top:"calc(100% + 4px)", right:0, background:T.bgModal, border:`1px solid ${T.border}`, borderRadius:"4px", padding:"6px", zIndex:49, minWidth:"130px", boxShadow:"0 4px 20px rgba(0,0,0,0.4)" }}>
                {Object.values(THEMES).map(th => (
                  <button key={th.id} onClick={() => { onChange(th.id); setOpen(false); }} style={{ display:"flex", alignItems:"center", gap:"8px", width:"100%", background:currentId===th.id?`${T.accent}18`:"transparent", border:"none", color:currentId===th.id?T.accent:T.textDim, padding:"5px 8px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontWeight:currentId===th.id?700:400, fontFamily:"'JetBrains Mono',monospace", textAlign:"left" }}>
                    <span style={{ width:"8px", height:"8px", borderRadius:"50%", background:THEME_DOTS[th.id], display:"inline-block", flexShrink:0 }} />
                    {th.name}
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      );
    };

    // ======================================================
    // エクスポート / インポートメニュー
    // ======================================================
    const DataMenu = ({ tasks, tasksRef }) => {
      const T = useT();
      const [open, setOpen] = useState(false);
      const fileRef = useRef(null);

      const exportJSON = () => {
        const data = JSON.stringify({ exportedAt: new Date().toISOString(), tasks }, null, 2);
        const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(new Blob([data],{type:"application/json"})), download: `flight-strips-${new Date().toISOString().slice(0,10)}.json` });
        a.click(); setOpen(false);
      };

      const exportMD = () => {
        const lines = ["# Flight Strip TODO - Export", `> ${new Date().toLocaleString("ja-JP")}`, ""];
        for (const col of COLUMNS) {
          const colTasks = tasks.filter(t => t.status === col.id).sort((a,b)=>(b.sortOrder??0)-(a.sortOrder??0));
          if (!colTasks.length) continue;
          lines.push(`## ${col.label}（${col.sublabel}）`, "");
          for (const t of colTasks) {
            const pri = PRIORITIES[t.priority]?.label || t.priority;
            lines.push(`- [${t.status==="completed"?"x":" "}] **${t.title}** \`${pri}\` \`${t.time || "--:--"}\` \`${t.stripId}\``);
            if (t.assignee) lines.push(`  - ✈ HANDOFF: ${t.assignee}`);
            if (t.category) lines.push(`  - CAT: ${CATEGORIES[t.category]?.label || t.category}`);
            if (t.tags?.length) lines.push(`  - Tags: ${t.tags.join(", ")}`);
          }
          lines.push("");
        }
        const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/markdown"})), download: `flight-strips-${new Date().toISOString().slice(0,10)}.md` });
        a.click(); setOpen(false);
      };

      const handleImport = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const data = JSON.parse(await file.text());
          const imported = Array.isArray(data) ? data : (data.tasks || []);
          if (!imported.length) { alert("インポートするタスクが見つかりません"); return; }
          if (!window.confirm(`${imported.length}件のストリップをインポートしますか？`)) return;
          const tsVal = firebase.firestore.FieldValue.serverTimestamp();
          for (const t of imported) {
            const { id, ...taskData } = t;
            await tasksRef.add({ ...taskData, createdAt: tsVal, updatedAt: tsVal, sortOrder: Date.now() + Math.random()*1000 });
          }
          alert(`✓ ${imported.length}件をインポートしました`);
        } catch (err) {
          alert("インポートに失敗しました: " + err.message);
        }
        e.target.value = ""; setOpen(false);
      };

      const menuBtn = (label, action) => (
        <button onClick={action} style={{ display:"block", width:"100%", background:"transparent", border:"none", color:T.textDim, padding:"6px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontFamily:"'JetBrains Mono',monospace", textAlign:"left" }}
          onMouseEnter={e=>e.target.style.color=T.text} onMouseLeave={e=>e.target.style.color=T.textDim}>
          {label}
        </button>
      );

      return (
        <div style={{ position:"relative" }}>
          <button onClick={() => setOpen(p => !p)} style={{ background:open?`${T.accent}18`:"transparent", border:`1px solid ${open?T.accent+"66":T.border2}`, color:open?T.accent:T.textDim, padding:"4px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"10px", letterSpacing:"0.08em", fontFamily:"'JetBrains Mono',monospace" }}>⇅ DATA</button>
          {open && (
            <>
              <div style={{ position:"fixed", inset:0, zIndex:48 }} onClick={() => setOpen(false)} />
              <div style={{ position:"absolute", top:"calc(100% + 4px)", right:0, background:T.bgModal, border:`1px solid ${T.border}`, borderRadius:"4px", padding:"6px", zIndex:49, minWidth:"160px", boxShadow:"0 4px 20px rgba(0,0,0,0.4)" }}>
                {menuBtn("📥 Export JSON", exportJSON)}
                {menuBtn("📝 Export Markdown", exportMD)}
                <div style={{ borderTop:`1px solid ${T.border}`, margin:"4px 0" }} />
                {menuBtn("📤 Import JSON", () => fileRef.current?.click())}
                <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{ display:"none" }} />
              </div>
            </>
          )}
        </div>
      );
    };

    // ======================================================
    // フライトストリップ（個別タスクカード）
    // ======================================================
    // 経過時間フォーマット
    const formatDuration = (ms) => {
      if (!ms || ms < 0) return "00:00";
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
      return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
    };

    const FlightStrip = ({ task, isSelected, dropState, onDragStart, onDragOver, onDragEnd, onDrop, onStatusChange, onDelete, onEdit, isTimerRunning, elapsedMs, totalLoggedMs, onTimerStart, onTimerStop, onTouchStart, onTouchMove, onTouchEnd, titleFontSize=13, onCheckItem, onCheckRoutineStep }) => {
      const T = useT();
      const pri = PRIORITIES[task.priority] || PRIORITIES.normal;
      const cat = CATEGORIES[task.category] || { label: task.category || "OTHER", color: "#888888" };
      const isCompleted = task.status === "completed";
      const isActive = task.status === "active";
      const isDragOver = dropState?.id === task.id;
      const stripRef = useRef(null);
      // チェックリスト・ルーティン展開
      const [checkExpanded, setCheckExpanded] = useState(false);
      const [routineExpanded, setRoutineExpanded] = useState(false);

      const dropStyle = isDragOver
        ? dropState.pos === "before"
          ? { borderTop: `3px solid ${T.accent}`, paddingTop: "3px" }
          : { borderBottom: `3px solid ${T.accent}`, paddingBottom: "3px" }
        : {};

      // touchmove は passive:false が必要なので useEffect で登録
      useEffect(() => {
        const el = stripRef.current;
        if (!el || !onTouchMove) return;
        const handler = (e) => onTouchMove(e, task.id);
        el.addEventListener('touchmove', handler, { passive: false });
        return () => el.removeEventListener('touchmove', handler);
      }, [task.id, onTouchMove]);

      return (
        <div
          ref={stripRef}
          data-task-id={task.id}
          draggable
          onDragStart={e => onDragStart(e, task.id)}
          onDragOver={e => { e.preventDefault(); e.stopPropagation(); onDragOver(e, task.id); }}
          onDragEnd={onDragEnd}
          onDrop={e => { e.preventDefault(); e.stopPropagation(); onDrop(e, task.id); }}
          onTouchStart={onTouchStart ? e => onTouchStart(e, task.id) : undefined}
          onTouchEnd={onTouchEnd ? e => onTouchEnd(e, task.id) : undefined}
          onClick={(task.isRoutine || (task.checkItems && task.checkItems.length > 0)) ? e => { e.stopPropagation(); if (task.isRoutine) setRoutineExpanded(p => !p); else setCheckExpanded(p => !p); } : undefined}
          className="group relative cursor-grab active:cursor-grabbing"
          style={{
            background:   isCompleted ? `${T.border}44` : pri.bg,
            border:       isSelected ? `1px solid ${T.accent2}` : `1px solid ${isCompleted ? T.border : pri.border}`,
            borderLeft:   isSelected ? `4px solid ${T.accent2}` : `4px solid ${isCompleted ? T.textDim : pri.color}`,
            boxShadow:    isSelected ? `0 0 12px ${T.accent2}44, inset 0 0 20px ${T.accent2}08` : "none",
            opacity:      isCompleted ? 0.6 : 1,
            borderRadius: "2px", marginBottom: "6px",
            fontFamily: "'JetBrains Mono',monospace",
            transition: "border 0.1s ease", position: "relative", overflow: "hidden",
            display: "flex",
            ...dropStyle,
          }}>
          <div style={{ position:"absolute", inset:0, background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.015) 2px,rgba(0,255,136,0.015) 4px)", pointerEvents:"none" }} />

          {/* 左：コンテンツ */}
          <div style={{ flex:1, minWidth:0, padding:0 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 8px 2px", gap:"6px" }}>
              <span style={{ color:isSelected?T.accent2:cat.color, fontSize:"10px", fontWeight:700, letterSpacing:"0.1em" }}>{isSelected?"◉ ":""}{task.stripId}</span>
              <span style={{ color:T.textDim, fontSize:"10px" }}>{task.time}</span>
              <span style={{ color:pri.color, fontSize:"9px", fontWeight:700, padding:"1px 6px", border:`1px solid ${pri.color}`, borderRadius:"2px", letterSpacing:"0.15em" }}>{pri.label}</span>
            </div>
            <div style={{ padding:"4px 8px 2px", display:"flex", alignItems:"center", gap:"6px" }}>
              {task.isRoutine && <span style={{ fontSize:"14px", flexShrink:0 }}>🔄</span>}
              <span style={{ color:isCompleted?T.textDim:T.text, fontSize:`${titleFontSize}px`, fontWeight:600, textDecoration:isCompleted?"line-through":"none", lineHeight:1.3, flex:1 }}>{task.title}</span>
              {task.isRoutine && (() => {
                const steps = task.routineSteps || [];
                const done = steps.filter(s => s.checked).length;
                const total = steps.length;
                return total > 0 ? (
                  <div style={{ display:"flex", alignItems:"center", gap:"4px", flexShrink:0 }}>
                    <span style={{ fontSize:"9px", color: done===total ? "#00ff88" : "#ffaa00", fontWeight:700, padding:"1px 5px", background: done===total ? "rgba(0,255,136,0.12)" : "rgba(255,170,0,0.12)", border:`1px solid ${done===total ? "rgba(0,255,136,0.4)" : "rgba(255,170,0,0.4)"}`, borderRadius:"2px" }}>{done}/{total}</span>
                    <span style={{ fontSize:"10px", color:T.textDim }}>{routineExpanded ? "▲" : "▼"}</span>
                  </div>
                ) : null;
              })()}
              {!task.isRoutine && task.checkItems && task.checkItems.length > 0 && (() => {
                const done = task.checkItems.filter(ci => ci.checked).length;
                const total = task.checkItems.length;
                return (
                  <div style={{ display:"flex", alignItems:"center", gap:"4px", flexShrink:0 }}>

    // ======================================================
