<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>企画7課 | 配信相談室</title>
  <meta name="description" content="企画7課は、動画配信・インタラクティブ動画制作・映像制作・Webアプリ制作を行う企画制作チーム。奇想天外な悪巧みを、ちゃんと形に。" />
  <meta property="og:title" content="企画7課 | 配信相談室" />
  <meta property="og:description" content="動画配信・インタラクティブ動画・映像制作・アプリ制作の企画制作チーム。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ps7.co.jp/" />
  <link rel="canonical" href="https://ps7.co.jp/" />
  <style>
    :root {
      --bg: #060608;
      --panel-1: #1c1f24;
      --panel-2: #0a0b0d;
      --text: #f1f2f4;
      --muted: #9aa0a8;
      --purple: #b362ff;     /* 見出し */
      --red: #ff3b3b;        /* サブラベル・ON AIR・アクティブ */
      --green: #2fe06a;      /* LED */
      --yellow: #ffd84d;     /* CTA */
      --gold: #d8a64a;       /* バージョン等メタ */
      --line: rgba(255,255,255,.12);
      --shadow-red: 0 0 22px rgba(255,59,59,.6);
      --shadow-green: 0 0 12px rgba(47,224,106,.7);
      --topbar-h: 64px;
      --dock-h: 138px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --detail: 0;           /* 0=基本情報 / 1=詳細情報（Tバー） */
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; min-height: 100vh; color: var(--text); background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      overflow: hidden; -webkit-text-size-adjust: 100%;
    }
    button { font: inherit; -webkit-tap-highlight-color: transparent; }

    .bg-noise {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .5;
      background:
        radial-gradient(circle at 18% 12%, rgba(179,98,255,.10), transparent 40%),
        radial-gradient(circle at 82% 88%, rgba(255,59,59,.08), transparent 42%);
    }

    .app { position: relative; z-index: 1; height: 100vh; height: 100svh; display: flex; flex-direction: column; }

    /* ===== トップバー（右肩ロゴ） ===== */
    .topbar {
      height: var(--topbar-h); flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(16px, 3.5vw, 48px);
    }
    .status { display: flex; align-items: center; gap: 9px; color: var(--muted); font-size: 12px; letter-spacing: .14em; }
    .tally { width: 10px; height: 10px; border-radius: 50%; background: var(--red); box-shadow: var(--shadow-red); animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    .logo { display: flex; align-items: center; cursor: pointer; user-select: none; }
    .logo-img { height: clamp(28px, 3.6vw, 44px); width: auto; display: block; filter: drop-shadow(0 2px 5px rgba(0,0,0,.6)); transition: filter .2s; }
    .logo:hover .logo-img { filter: drop-shadow(0 0 12px rgba(179,98,255,.55)); }
    .ver { font-size: 11px; color: var(--gold); font-weight: 700; cursor: pointer; margin-left: 8px; align-self: center; }
    .ver:hover { text-decoration: underline; }

    /* ===== ステージ（左イメージ / 右テキスト） ===== */
    .stage {
      flex: 1 1 auto; min-height: 0; display: grid;
      grid-template-columns: minmax(0, 46%) minmax(0, 54%);
      gap: clamp(18px, 3vw, 44px);
      padding: 4px clamp(16px, 3.5vw, 48px) clamp(12px, 2vw, 22px);
    }

    /* 左：イメージ */
    .media-col { min-width: 0; display: flex; }
    .media {
      position: relative; margin: 0; flex: 1; border-radius: 18px; overflow: hidden;
      border: 1px solid var(--line); background: #111; box-shadow: 0 30px 80px rgba(0,0,0,.5);
    }
    .media-img {
      position: absolute; inset: 0; background-size: cover; background-position: center;
      animation: kenburns 12s ease-out both;
    }
    .media-img.swap { animation: imgIn .6s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes kenburns { from { transform: scale(1.06); } to { transform: scale(1.12); } }
    @keyframes imgIn { from { opacity: 0; transform: scale(1.1); filter: blur(8px); } to { opacity: 1; transform: scale(1.06); filter: blur(0); } }
    .media-scrim { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.45) 0%, transparent 26%, transparent 60%, rgba(0,0,0,.62) 100%); }
    .bracket { position: absolute; width: 26px; height: 26px; border: 2px solid rgba(255,255,255,.7); }
    .bracket.tl { top: 12px; left: 12px; border-right: 0; border-bottom: 0; }
    .bracket.tr { top: 12px; right: 12px; border-left: 0; border-bottom: 0; }
    .bracket.bl { bottom: 12px; left: 12px; border-right: 0; border-top: 0; }
    .bracket.br { bottom: 12px; right: 12px; border-left: 0; border-top: 0; }
    .media-hud-top { position: absolute; top: 16px; left: 46px; right: 46px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; letter-spacing: .12em; color: rgba(255,255,255,.85); text-shadow: 0 1px 3px #000; }
    .rec { display: inline-flex; align-items: center; gap: 6px; color: #fff; font-weight: 800; }
    .rec::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: var(--shadow-red); animation: pulse 1.2s ease-in-out infinite; }
    .media-hud-bottom { position: absolute; left: 18px; bottom: 16px; }
    .cap { display: inline-block; padding: 6px 12px; border-radius: 8px; background: rgba(0,0,0,.5); border: 1px solid var(--line); font-size: 12px; letter-spacing: .14em; font-weight: 700; color: #fff; }

    /* 右：テキスト */
    .text-col { min-width: 0; display: flex; align-items: center; overflow-y: auto; scrollbar-width: none; }
    .text-col::-webkit-scrollbar { display: none; }
    .text-inner { width: 100%; animation: textIn .5s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes textIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .ch-code { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; letter-spacing: .18em; font-weight: 700; margin-bottom: 12px; }
    .ch-code::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: var(--shadow-red); }
    .heading { margin: 0; font-size: clamp(34px, 5vw, 68px); line-height: 1.04; letter-spacing: .02em; color: var(--purple); text-shadow: 0 0 30px rgba(179,98,255,.35); }
    .lead { margin: 16px 0 0; color: #d8dbe0; font-size: clamp(14px, 1.5vw, 18px); line-height: 1.95; max-width: 640px; }
    .cta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; align-items: center; }
    .btn-y {
      background: var(--yellow); color: #1a1400; border: none; border-radius: 999px; padding: 13px 26px;
      font-weight: 800; letter-spacing: .04em; cursor: pointer; text-decoration: none; box-shadow: 0 8px 22px rgba(255,216,77,.3);
      transition: transform .15s, filter .15s;
    }
    .btn-y:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .detail-toggle {
      background: rgba(255,255,255,.06); color: var(--text); border: 1px solid var(--line); border-radius: 999px;
      padding: 12px 18px; cursor: pointer; font-weight: 700; letter-spacing: .03em; transition: border-color .15s, background .15s;
    }
    .detail-toggle:hover { border-color: rgba(255,255,255,.32); }
    .detail-toggle .ar { display: inline-block; transition: transform .3s; }
    .detail-toggle.open .ar { transform: rotate(180deg); }

    /* 詳細（Tバーで開閉） */
    .detail-wrap {
      overflow: hidden; max-height: calc(var(--detail) * 46vh);
      opacity: clamp(0, calc(var(--detail) * 1.5 - 0.12), 1);
      transform: translateY(calc((1 - var(--detail)) * 10px));
      margin-top: calc(var(--detail) * 22px);
    }
    .detail-inner { padding-bottom: 6px; }

    .mini-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .mini-card { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; background: rgba(255,255,255,.035); }
    .mini-card h4 { margin: 0 0 6px; font-size: 14px; color: #fff; }
    .mini-card h4 .rl { color: var(--red); font-size: 11px; display: block; margin-bottom: 2px; letter-spacing: .06em; }
    .mini-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.7; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { border: 1px solid var(--line); border-radius: 999px; padding: 7px 13px; font-size: 12px; color: var(--text); background: rgba(255,255,255,.05); font-weight: 600; }
    .flow { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-top: 12px; }
    .flow-step { border: 1px solid var(--line); border-radius: 10px; padding: 10px; text-align: center; background: rgba(255,255,255,.04); }
    .flow-step span { display: block; color: var(--purple); font-weight: 900; font-size: 12px; margin-bottom: 3px; }
    .flow-step b { font-size: 13px; }
    .spec-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .spec-table th, .spec-table td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    .spec-table th { color: var(--muted); font-weight: 600; white-space: nowrap; width: 96px; }
    .ask-list { margin: 0 0 14px; padding: 0; list-style: none; display: grid; gap: 7px; }
    .ask-list li { color: #d8dbe0; font-size: 14px; padding-left: 20px; position: relative; line-height: 1.6; }
    .ask-list li::before { content: "▶"; position: absolute; left: 0; color: var(--red); font-size: 10px; top: 4px; }
    .mail-line { color: #d8dbe0; font-size: 14px; margin: 0 0 12px; }
    .mail-line a { color: var(--gold); text-decoration: none; font-weight: 700; }

    /* ===== 下部ドック（スイッチャー1列 ＋ Tバー） ===== */
    .dock {
      flex: 0 0 auto; height: calc(var(--dock-h) + var(--safe-bottom));
      padding: 12px clamp(14px, 3vw, 40px) calc(12px + var(--safe-bottom));
      background:
        linear-gradient(180deg, var(--panel-1), var(--panel-2) 86%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.022) 0 1px, transparent 1px 10px);
      border-top: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 -22px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.12);
    }
    .dock-inner { height: 100%; max-width: 1480px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto; gap: clamp(14px, 2vw, 30px); align-items: center; }

    .switch-scroller { overflow-x: auto; overflow-y: hidden; scrollbar-width: thin; padding: 2px 2px 4px; }
    .switch-row { display: grid; grid-template-columns: repeat(8, minmax(0, 1fr)); gap: clamp(7px, 1vw, 13px); min-width: 0; }

    .swcell { display: grid; justify-items: center; gap: 5px; min-width: 0; }
    .swnum { font-size: 12px; color: var(--muted); font-weight: 700; }
    .swkey {
      width: 100%; height: clamp(46px, 6vh, 60px); border-radius: 11px; border: 1px solid rgba(255,255,255,.22);
      color: #1c1c1c; cursor: pointer; font-weight: 800; font-size: clamp(10px, 0.95vw, 13px); line-height: 1.2; padding: 4px 6px;
      background: linear-gradient(180deg, #fbfbfb, #cdcdcd 55%, #eee);
      box-shadow: inset 0 3px 6px rgba(255,255,255,.8), inset 0 -6px 9px rgba(0,0,0,.2), 0 6px 0 rgba(0,0,0,.4), 0 11px 18px rgba(0,0,0,.4);
      transition: transform .1s, box-shadow .1s, filter .1s; overflow: hidden; text-overflow: ellipsis;
      display: grid; place-items: center; text-align: center;
    }
    .swkey:active { transform: translateY(5px); box-shadow: inset 0 3px 6px rgba(255,255,255,.5), 0 2px 0 rgba(0,0,0,.4), 0 5px 10px rgba(0,0,0,.35); }
    .swkey.on {
      color: #fff; border-color: rgba(255,59,59,.8);
      background: radial-gradient(circle at 50% 25%, rgba(255,255,255,.5), transparent 32%), linear-gradient(180deg, #ff6b6b, #d91f1f 55%, #8c0d0d);
      box-shadow: inset 0 4px 7px rgba(255,255,255,.26), inset 0 -8px 11px rgba(0,0,0,.32), 0 6px 0 rgba(54,0,0,.8), var(--shadow-red);
    }
    .swled { width: 70%; height: 5px; border-radius: 3px; background: linear-gradient(180deg, #3bff7d, #119a3f); box-shadow: var(--shadow-green); opacity: .85; }
    .swcell.on .swnum { color: var(--red); }

    /* Tバー（基本⇔詳細） */
    .tbar-area { display: grid; grid-template-rows: auto 1fr auto; justify-items: center; gap: 4px; height: 100%; padding: 2px 0; min-width: 92px; }
    .tbar-lab { font-size: 10px; letter-spacing: .12em; color: var(--muted); font-weight: 700; }
    .tbar-lab.cur { color: var(--purple); }
    .tbar-wrap { display: grid; grid-template-columns: auto auto; align-items: center; gap: 9px; }
    .tbar-track {
      position: relative; width: 30px; height: 100%; min-height: 70px; border-radius: 16px;
      background: #090a0c; border: 1px solid rgba(255,255,255,.12); box-shadow: inset 0 0 14px rgba(0,0,0,.8); cursor: pointer; touch-action: none;
    }
    .tbar-fill { position: absolute; left: 3px; right: 3px; bottom: 3px; border-radius: 12px; background: linear-gradient(180deg, var(--purple), #5a2da0); opacity: .3; height: calc(var(--detail) * (100% - 6px)); }
    .tbar-handle {
      position: absolute; left: 50%; width: 46px; height: 26px; transform: translate(-50%, 50%);
      bottom: calc(var(--detail) * (100% - 6px) + 3px); border-radius: 7px; cursor: grab;
      background: linear-gradient(180deg, #e9ecf0, #9aa0a8 52%, #c7ccd2); border: 1px solid rgba(0,0,0,.5);
      box-shadow: 0 4px 9px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.9), inset 0 -3px 5px rgba(0,0,0,.3);
    }
    .tbar-handle::before { content: ""; position: absolute; inset: 10px 8px; border-top: 1px solid rgba(0,0,0,.4); border-bottom: 1px solid rgba(255,255,255,.5); }
    .tbar-handle:active { cursor: grabbing; }
    .tbar-tag { writing-mode: vertical-rl; font-size: 9px; letter-spacing: .2em; color: var(--muted); }

    /* ===== モーダル ===== */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 9999; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #14161a; border: 1px solid rgba(216,166,74,.45); border-radius: 12px; width: 540px; max-width: 92vw; max-height: 82vh; display: flex; flex-direction: column; box-shadow: 0 10px 50px rgba(0,0,0,.7); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .modal-header h2 { font-size: 15px; font-weight: 700; color: var(--gold); margin: 0; }
    .modal-close { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; }
    .modal-close:hover { color: #fff; }
    #modal-body { overflow-y: auto; padding: 16px 20px 22px; font-size: 13px; line-height: 1.75; color: #ccc; }
    #modal-body h3 { font-size: 12px; color: var(--gold); margin: 16px 0 6px; font-weight: 700; }
    #modal-body p { margin: 0 0 4px; }
    #modal-body kbd { background: #2a2e34; border: 1px solid var(--line); border-radius: 4px; padding: 1px 6px; font-size: 11px; }
    .release-ver { display: flex; align-items: baseline; gap: 10px; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.07); }
    .release-ver:first-child { margin-top: 0; border-top: none; padding-top: 0; }
    .release-ver-tag { font-size: 13px; font-weight: 700; color: var(--gold); }
    .release-ver-date { font-size: 11px; color: #666; }
    #modal-body ul { margin: 4px 0 0; padding-left: 18px; }

    /* デバッグ／トースト */
    .debug-btn { position: fixed; right: 12px; bottom: calc(var(--dock-h) + var(--safe-bottom) + 10px); z-index: 60; border: 1px solid var(--line); border-radius: 999px; color: var(--text); background: rgba(0,0,0,.55); backdrop-filter: blur(8px); padding: 6px 11px; cursor: pointer; font-size: 10px; opacity: .5; transition: opacity .15s, border-color .15s; }
    .debug-btn:hover { border-color: var(--gold); opacity: 1; }
    .toast { position: fixed; right: 12px; bottom: calc(var(--dock-h) + var(--safe-bottom) + 56px); z-index: 61; background: rgba(47,224,106,.14); color: var(--green); border: 1px solid rgba(47,224,106,.35); padding: 9px 14px; border-radius: 999px; font-size: 12px; opacity: 0; transform: translateY(8px); transition: .18s; pointer-events: none; }
    .toast.show { opacity: 1; transform: none; }

    /* ===== 入室ゲート（テストサイト用・簡易ロック） ===== */
    .gate { position: fixed; inset: 0; z-index: 100000; background: radial-gradient(circle at 50% 30%, #101216, #060608 70%); display: flex; align-items: center; justify-content: center; padding: 22px; }
    .gate.hidden { display: none; }
    .gate-card { width: 360px; max-width: 92vw; text-align: center; }
    .gate-logo { height: 40px; width: auto; margin: 0 auto 24px; display: block; filter: drop-shadow(0 2px 6px rgba(0,0,0,.6)); }
    .gate-note { color: var(--red); font-size: 11px; letter-spacing: .2em; font-weight: 800; margin-bottom: 8px; }
    .gate-title { color: var(--muted); font-size: 13px; margin: 0 0 22px; line-height: 1.6; }
    .gate-field { display: grid; gap: 6px; text-align: left; margin-bottom: 12px; }
    .gate-field label { font-size: 11px; color: var(--muted); letter-spacing: .12em; }
    .gate-field input { width: 100%; padding: 13px 14px; border-radius: 10px; border: 1px solid var(--line); background: rgba(255,255,255,.05); color: var(--text); font-size: 16px; letter-spacing: .12em; }
    .gate-field input:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(179,98,255,.18); }
    .gate-btn { width: 100%; margin-top: 8px; padding: 14px; border: none; border-radius: 999px; background: var(--yellow); color: #1a1400; font-weight: 800; font-size: 15px; letter-spacing: .1em; cursor: pointer; box-shadow: 0 8px 22px rgba(255,216,77,.3); }
    .gate-btn:hover { filter: brightness(1.06); }
    .gate-err { color: var(--red); font-size: 12px; margin-top: 12px; min-height: 16px; }
    .gate.shake .gate-card { animation: gateShake .4s; }
    @keyframes gateShake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

    /* ===== レスポンシブ ===== */
    /* タブレット */
    @media (max-width: 980px) {
      :root { --dock-h: 132px; }
      .stage { grid-template-columns: 1fr; grid-template-rows: minmax(0, 42%) minmax(0, 58%); }
      .media { min-height: 0; }
    }
    /* スマホ縦 */
    @media (max-width: 680px) {
      :root { --topbar-h: 56px; --dock-h: 120px; }
      body { overflow: auto; }
      .app { height: auto; min-height: 100svh; }
      .stage { grid-template-rows: none; grid-template-columns: 1fr; padding-bottom: 64px; }
      .media { height: 40svh; }
      .text-col { overflow: visible; }
      .heading { font-size: clamp(30px, 9vw, 46px); }
      .mini-cards { grid-template-columns: 1fr; }
      .detail-wrap { max-height: calc(var(--detail) * 1000px); }
      .dock { position: sticky; bottom: 0; }
      .switch-row { grid-template-columns: repeat(8, 64px); }
      .tbar-area { display: none; }            /* スマホは本文の「詳細を見る」トグルで代替 */
      .dock-inner { grid-template-columns: 1fr; }
    }
    /* スマホ横 */
    @media (orientation: landscape) and (max-height: 540px) {
      :root { --topbar-h: 44px; --dock-h: 98px; }
      .stage { grid-template-columns: minmax(0,42%) minmax(0,58%); grid-template-rows: none; }
      .heading { font-size: clamp(24px, 5vw, 38px); }
      .lead { font-size: 13px; line-height: 1.6; margin-top: 8px; }
      .detail-wrap { max-height: calc(var(--detail) * 30vh); }
      .swkey { height: 40px; }
      .media-hud-top, .bracket { display: none; }
    }
    @media (prefers-reduced-motion: reduce) { * { animation-duration: .01ms !important; } }
  </style>
</head>
<body>
  <!-- 入室ゲート（テストサイト用・簡易ロック） -->
  <div class="gate" id="gate">
    <div class="gate-card">
      <img class="gate-logo" src="images/logo.png" alt="配信相談室 企画7課" />
      <div class="gate-note">● TEST SITE</div>
      <p class="gate-title">テストサイトです。<br>ID／パスワードを入力してください。</p>
      <div class="gate-field"><label for="gateId">ID</label><input id="gateId" type="text" inputmode="numeric" autocomplete="off" autocapitalize="off" /></div>
      <div class="gate-field"><label for="gatePw">パスワード</label><input id="gatePw" type="password" autocomplete="off" /></div>
      <button class="gate-btn" id="gateBtn" type="button">入室する</button>
      <div class="gate-err" id="gateErr"></div>
    </div>
  </div>
  <script>
    (function () {
      var GATE_HASH = 2088511905;
      function h(s) { var x = 5381; for (var i = 0; i < s.length; i++) { x = ((x << 5) + x + s.charCodeAt(i)) >>> 0; } return x; }
      var gate = document.getElementById('gate');
      try { if (sessionStorage.getItem('k7auth') === '1') { gate.classList.add('hidden'); return; } } catch (e) {}
      var idEl = document.getElementById('gateId'), pwEl = document.getElementById('gatePw'), err = document.getElementById('gateErr');
      function submit() {
        if (h(idEl.value.trim()) === GATE_HASH && h(pwEl.value) === GATE_HASH) {
          try { sessionStorage.setItem('k7auth', '1'); } catch (e) {}
          gate.classList.add('hidden');
        } else {
          err.textContent = 'ID または パスワードが違います';
          gate.classList.remove('shake'); void gate.offsetWidth; gate.classList.add('shake');
          pwEl.value = ''; (idEl.value ? pwEl : idEl).focus();
        }
      }
      document.getElementById('gateBtn').addEventListener('click', submit);
      [idEl, pwEl].forEach(function (el) { el.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); submit(); } }); });
      setTimeout(function () { idEl.focus(); }, 60);
    })();
  </script>

        detail: '<div class="chips" style="margin-bottom:12px"><span class="chip">教育</span><span class="chip">企業研修</span><span class="chip">展示会</span><span class="chip">セミナー</span><span class="chip">地域・文化</span><span class="chip">医療・福祉</span></div>' + cards([
          { t: '法人セミナー配信', d: 'Zoomウェビナー × YouTube Live × vMix。' },
          { t: '展示会タッチDEMO', d: '大型端末で触れるインタラクティブ動画。' },
          { t: '教育向け動画教材', d: '確認問題・分岐・フィードバック付き。' },
          { t: 'イベント用Webアプリ', d: '受付・QR・参加者別表示を短期構築。' }
        ]) },
      { id: 7, label: '会社概要', code: 'PROFILE', heading: '会社概要',
        lead: '映像とWebとアイデアを横断しながら、企業・教育・地域・イベントの情報発信を支援します。まだ形になっていない企画の相談からでも大丈夫です。',
        detail: '<table class="spec-table">' +
          '<tr><th>会社名</th><td>株式会社企画7課</td></tr>' +
          '<tr><th>事業内容</th><td>動画配信 / インタラクティブ動画制作 / 映像制作 / Webアプリ制作</td></tr>' +
          '<tr><th>拠点</th><td>東京</td></tr>' +
          '<tr><th>代表</th><td>表 純平</td></tr>' +

          '<div class="flow-step"><span>03</span><b>企画</b></div>' +
          '<div class="flow-step"><span>04</span><b>制作・開発</b></div>' +

          '<div class="flow-step"><span>06</span><b>改善・運用</b></div></div>' },
      { id: 8, label: 'お問い合わせ', code: 'CONTACT', heading: '一緒に、面白いことを。',
        lead: 'まだ企画が固まっていなくても大丈夫です。動画にするべきか、Webにするべきか、インタラクティブにするべきか。最初の設計から一緒に考えます。',
        detail: '<ul class="ask-list">' +
          '<li>セミナー・イベントを配信したい</li>' +
          '<li>展示会で触れるコンテンツを作りたい</li>' +
          '<li>研修動画にクイズを入れたい</li>' +
          '<li>PowerPoint資料を動画教材にしたい</li>' +

          '<li>何を作ればいいか一緒に考えてほしい</li>' +
          '</ul><p class="mail-line">お問い合わせ：<a href="mailto:info@ps7.co.jp?subject=企画7課への相談">info@ps7.co.jp</a></p>' }
    ];

    var currentId = 1;
    var detail = 0;            // 0..1
    var dragging = false;
    var snapRAF = null;
    var tcSec = 0;

    var $ = function (id) { return document.getElementById(id); };
    var byId = function (n) { return channels[n - 1]; };

    /* ===== 描画 ===== */
    function render(animate) {
      var ch = byId(currentId);
      var img = $('mediaImg');
      img.style.backgroundImage = "url('images/ch" + ch.id + ".jpg')";
      if (animate) { img.classList.remove('swap'); void img.offsetWidth; img.classList.add('swap'); }
      $('mediaCap').textContent = 'CH' + ch.id + ' / ' + ch.code;
      $('chCode').textContent = 'CH ' + ch.id + ' / ' + ch.code;
      $('heading').textContent = ch.heading;
      $('lead').textContent = ch.lead;
      $('detailInner').innerHTML = ch.detail;

      var cta = $('ctaMain');
      if (ch.id === 8) { cta.textContent = '相談してみる（メール）'; cta.setAttribute('href', 'mailto:info@ps7.co.jp?subject=企画7課への相談'); cta.onclick = null; }
      else { cta.textContent = '相談してみる'; cta.setAttribute('href', '#'); cta.onclick = function (e) { e.preventDefault(); selectChannel(8); }; }

      if (animate) { var t = $('textInner'); t.style.animation = 'none'; void t.offsetWidth; t.style.animation = ''; }
      renderButtons();
      tcSec = 0;
    }

    function renderButtons() {
      var row = $('switchRow'); row.innerHTML = '';
      channels.forEach(function (ch) {
        var cell = document.createElement('div');
        cell.className = 'swcell' + (ch.id === currentId ? ' on' : '');
        var num = document.createElement('span'); num.className = 'swnum'; num.textContent = ch.id;
        var btn = document.createElement('button'); btn.type = 'button'; btn.className = 'swkey' + (ch.id === currentId ? ' on' : '');
        btn.textContent = ch.label;
        btn.addEventListener('click', function () { selectChannel(ch.id); });
        var led = document.createElement('span'); led.className = 'swled';
        cell.appendChild(num); cell.appendChild(btn); cell.appendChild(led);
        row.appendChild(cell);
      });
    }

    function selectChannel(id) {
      if (id === currentId) { snapDetail(detail < 0.5 ? 1 : 0); return; }
      currentId = id;
      render(true);
      snapDetail(0);           // 切替時は基本情報に戻す
      logState('SELECT');
    }

    /* ===== Tバー（基本⇔詳細） ===== */
    function setDetail(v) {
      detail = Math.max(0, Math.min(1, v));
      document.documentElement.style.setProperty('--detail', detail.toFixed(3));
      var open = detail > 0.5;
      $('detailToggle').classList.toggle('open', open);
      $('detailToggle').firstChild.nodeValue = open ? '基本に戻す ' : '詳細を見る ';
      $('detailWrap').style.pointerEvents = detail > 0.05 ? 'auto' : 'none';
      $('tbarLabTop').classList.toggle('cur', open);
      $('tbarLabBot').classList.toggle('cur', !open);
    }
    function snapDetail(target) {
      if (snapRAF) cancelAnimationFrame(snapRAF);
      var from = detail, start = performance.now(), dur = 280;
      function step(now) {
        var t = Math.min(1, (now - start) / dur);
        var e = t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        setDetail(from + (target - from) * e);
        if (t < 1) { snapRAF = requestAnimationFrame(step); } else { snapRAF = null; }
      }
      snapRAF = requestAnimationFrame(step);
    }
    function ratioFromEvent(e) {
      var r = $('tbarTrack').getBoundingClientRect();
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return 1 - Math.max(0, Math.min(1, y / r.height));   // 上=1(詳細) / 下=0(基本)
    }

    /* ===== キーボード ===== */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { closeModal(); return; }
      if ($('info-modal').classList.contains('open')) return;
      if (e.key >= '1' && e.key <= '8') { selectChannel(parseInt(e.key, 10)); }
      else if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'd') { e.preventDefault(); snapDetail(1); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); snapDetail(0); }
      else if (e.key === 'ArrowRight') { selectChannel(currentId % 8 + 1); }
      else if (e.key === 'ArrowLeft') { selectChannel((currentId + 6) % 8 + 1); }
    });

    /* ===== モーダル ===== */
    function openHowTo() {
      $('modal-title').textContent = '▶ 企画7課サイトの使い方';
      $('modal-body').innerHTML = HOW_TO_USE.map(function (i) { return '<h3>' + i.heading + '</h3><p>' + i.text + '</p>'; }).join('');
      $('info-modal').classList.add('open');
    }
    function openReleaseNotes() {
      $('modal-title').textContent = 'リリースノート';
      $('modal-body').innerHTML = RELEASE_NOTES.map(function (r) {
        var items = r.changes.map(function (c) { return '<li>' + c + '</li>'; }).join('');
        return '<div class="release-ver"><span class="release-ver-tag">' + r.ver + '</span><span class="release-ver-date">' + r.date + '</span></div><ul>' + items + '</ul>';
      }).join('');
      $('info-modal').classList.add('open');
    }
    function closeModal() { $('info-modal').classList.remove('open'); }
    function closeModalOnOverlay(e) { if (e.target === $('info-modal')) closeModal(); }
    window.closeModal = closeModal; window.closeModalOnOverlay = closeModalOnOverlay;

    /* ===== デバッグ ===== */
    function logState(mode) { console.log('[企画7課]', { mode: mode, ch: currentId, label: byId(currentId).label, detail: detail, ts: new Date().toISOString() }); }
    function copyDebug() {
      var info = { app: '企画7課 配信相談室', version: APP_VERSION, channel: { id: currentId, label: byId(currentId).label }, detail: detail,
        viewport: { w: window.innerWidth, h: window.innerHeight, orientation: window.matchMedia('(orientation: landscape)').matches ? 'landscape' : 'portrait' },
        ua: navigator.userAgent, ts: new Date().toISOString() };
      var txt = JSON.stringify(info, null, 2);
      function ok() { var t = $('toast'); t.classList.add('show'); setTimeout(function () { t.classList.remove('show'); }, 1400); }
      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(txt).then(ok, ok); }
      else { var ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); } catch (e) {} document.body.removeChild(ta); ok(); }
    }

    /* ===== タイムコード（演出） ===== */
    function tickTc() {
      tcSec += 1;
      var h = Math.floor(tcSec / 3600), m = Math.floor((tcSec % 3600) / 60), s = tcSec % 60;
      function p(n) { return (n < 10 ? '0' : '') + n; }
      $('mediaTc').textContent = p(h) + ':' + p(m) + ':' + p(s);
    }

    /* ===== 初期化 ===== */
    function init() {
      render(false);
      setDetail(0);

      $('logo').addEventListener('click', openHowTo);
      $('detailToggle').addEventListener('click', function () { snapDetail(detail < 0.5 ? 1 : 0); });
      $('debugBtn').addEventListener('click', copyDebug);

      var handle = $('tbarHandle'), track = $('tbarTrack');
      function start(e) { dragging = true; if (snapRAF) { cancelAnimationFrame(snapRAF); snapRAF = null; } if (e.pointerId != null && handle.setPointerCapture) handle.setPointerCapture(e.pointerId); e.preventDefault(); }
      function move(e) { if (!dragging) return; setDetail(ratioFromEvent(e)); e.preventDefault(); }
      function end() { if (!dragging) return; dragging = false; snapDetail(detail >= 0.5 ? 1 : 0); }
      handle.addEventListener('pointerdown', start);
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', end);
      track.addEventListener('pointerdown', function (e) { if (e.target === handle) return; setDetail(ratioFromEvent(e)); start(e); });

      setInterval(tickTc, 1000);
    }
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
  </script>
