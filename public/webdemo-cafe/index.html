<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta property="og:title" content="喫茶こもれび｜西荻窪の自家焙煎珈琲と手づくり洋食">
<meta property="og:description" content="西荻窪駅徒歩4分。自家焙煎の珈琲と毎朝仕込む手づくり洋食の喫茶店。">
<meta property="og:type" content="website">
<meta property="og:image" content="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=1200&q=80">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f0;
  --ink:#322a24;
  --main:#5f4633;
  --accent:#b98a4e;
  --line:#e3dccf;
  --white:#fffdf8;
  --serif:"Zen Old Mincho",serif;
  --sans:"Zen Kaku Gothic New",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:72px}
body{
  font-family:var(--sans);color:var(--ink);background:var(--bg);
  line-height:1.9;letter-spacing:.04em;
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
ul{list-style:none}

/* ===== ヘッダー ===== */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  transition:background .35s,box-shadow .35s;
}
header.scrolled{
  background:rgba(250,247,240,.92);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 1px 12px rgba(50,42,36,.08);
}
.header-inner{
  max-width:1120px;margin:0 auto;padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.logo{
  font-family:var(--serif);font-size:1.25rem;font-weight:700;
  color:#fff;transition:color .35s;white-space:nowrap;
}
header.scrolled .logo{color:var(--ink)}
.gnav{display:flex;gap:26px;align-items:center}
.gnav a{
  font-size:.86rem;font-weight:500;color:#fff;transition:color .35s;
  position:relative;padding:4px 0;
}
header.scrolled .gnav a{color:var(--ink)}
.gnav a::after{
  content:"";position:absolute;left:0;bottom:0;width:0;height:1px;
  background:var(--accent);transition:width .3s;
}
.gnav a:hover::after{width:100%}
.header-tel{
  background:var(--accent);color:#fff !important;border-radius:999px;
  padding:8px 18px;font-weight:700;font-size:.86rem;white-space:nowrap;
}
.header-tel::after{display:none}
@media(max-width:860px){.gnav{display:none}}

/* ===== ヒーロー ===== */
.hero{
  position:relative;min-height:92vh;min-height:92svh;
  display:flex;align-items:flex-end;
  background-size:cover;background-position:center;
  color:#fff;
}
.hero::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to top,rgba(30,22,16,.72) 0%,rgba(30,22,16,.15) 55%,rgba(30,22,16,.35) 100%);
}
.hero-inner{
  position:relative;max-width:1120px;width:100%;
  margin:0 auto;padding:0 24px 96px;
}
.hero-en{
  font-size:.74rem;letter-spacing:.34em;text-transform:uppercase;
  color:#e8d9bf;margin-bottom:18px;
}
.hero h1{
  font-family:var(--serif);font-weight:600;
  font-size:clamp(1.7rem,4.6vw,3rem);
  line-height:1.65;letter-spacing:.1em;
  text-shadow:0 2px 18px rgba(0,0,0,.35);
}
.hero-sub{
  margin-top:20px;font-size:clamp(.86rem,1.6vw,1rem);
  color:#f3ece0;max-width:34em;text-shadow:0 1px 10px rgba(0,0,0,.4);
}
.hero-vertical{
  position:absolute;right:34px;top:50%;transform:translateY(-50%);
  writing-mode:vertical-rl;font-family:var(--serif);
  font-size:1rem;letter-spacing:.5em;color:#efe5d2;
  border-right:1px solid rgba(239,229,210,.5);padding-right:14px;
}
@media(max-width:860px){.hero-vertical{display:none}}
.scroll-hint{
  position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
  font-size:.62rem;letter-spacing:.3em;color:#e8d9bf;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.scroll-hint::after{
  content:"";width:1px;height:34px;background:#e8d9bf;
  animation:drip 1.8s ease-in-out infinite;transform-origin:top;
}
@keyframes drip{0%{transform:scaleY(0)}55%{transform:scaleY(1)}100%{transform:scaleY(1);opacity:0}}

/* ===== セクション共通 ===== */
section{padding:88px 20px}
.sec-inner{max-width:1120px;margin:0 auto}
.sec-title{text-align:center;margin-bottom:54px}
.sec-title .en{
  display:block;font-size:.72rem;letter-spacing:.34em;
  color:var(--accent);text-transform:uppercase;margin-bottom:10px;
  font-family:var(--sans);font-weight:700;
}
.sec-title .jp{
  font-family:var(--serif);font-size:clamp(1.5rem,3vw,2rem);
  font-weight:600;letter-spacing:.14em;
}
.sec-title::after{
  content:"";display:block;width:42px;height:1px;
  background:var(--accent);margin:20px auto 0;
}

/* ===== こだわり ===== */
.features{background:var(--white)}
.feature-list{
  display:grid;grid-template-columns:repeat(3,1fr);gap:34px;
}
@media(max-width:860px){.feature-list{grid-template-columns:1fr;gap:44px;max-width:480px;margin:0 auto}}
.feature{display:flex;flex-direction:column}
.feature img{
  aspect-ratio:4/3;object-fit:cover;border-radius:8px;
  box-shadow:0 10px 28px rgba(50,42,36,.12);
}
.feature h3{
  font-family:var(--serif);font-size:1.16rem;font-weight:600;
  letter-spacing:.1em;margin:22px 0 10px;
  display:flex;align-items:center;gap:10px;
}
.feature h3 .num{
  font-family:var(--sans);font-size:.72rem;color:var(--accent);
  letter-spacing:.2em;font-weight:700;
}
.feature p{font-size:.9rem;color:#5d5247}

/* ===== メニュー ===== */
.popular-list{
  display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-bottom:64px;
}
@media(max-width:860px){.popular-list{grid-template-columns:1fr;max-width:440px;margin:0 auto 56px}}
.popular{
  position:relative;border-radius:8px;overflow:hidden;
  box-shadow:0 10px 28px rgba(50,42,36,.14);
}
.popular img{aspect-ratio:4/3;object-fit:cover;width:100%;transition:transform .6s}
.popular:hover img{transform:scale(1.05)}
.popular .cap{
  position:absolute;left:0;right:0;bottom:0;
  background:linear-gradient(to top,rgba(30,22,16,.85),transparent);
  color:#fff;padding:34px 16px 12px;
  display:flex;justify-content:space-between;align-items:baseline;gap:8px;
}
.popular .cap .name{font-family:var(--serif);font-size:.98rem;letter-spacing:.06em}
.popular .cap .price{font-size:.84rem;color:#e8d9bf;white-space:nowrap}
.popular .badge{
  position:absolute;top:12px;left:12px;background:var(--accent);color:#fff;
  font-size:.66rem;letter-spacing:.16em;padding:4px 10px;border-radius:3px;font-weight:700;
}
.menu-groups{
  display:grid;grid-template-columns:repeat(3,1fr);gap:48px;
}
@media(max-width:860px){.menu-groups{grid-template-columns:1fr;gap:40px;max-width:520px;margin:0 auto}}
.menu-group h3{
  font-family:var(--serif);font-size:1.05rem;font-weight:600;
  letter-spacing:.16em;color:var(--main);
  border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:18px;
  display:flex;align-items:baseline;gap:10px;
}
.menu-group h3 .en{font-size:.66rem;letter-spacing:.22em;color:var(--accent);font-family:var(--sans)}
.menu-item{display:flex;align-items:baseline;gap:8px;padding:7px 0;font-size:.92rem}
.menu-item .dots{flex:1;border-bottom:1px dotted #c9bfae;transform:translateY(-4px)}
.menu-item .price{white-space:nowrap;color:#6d6155;font-size:.88rem}
.menu-note{text-align:center;margin-top:44px;font-size:.8rem;color:#8a7d6e}

/* ===== ギャラリー ===== */
.gallery{background:var(--white);padding-left:0;padding-right:0}
.gallery-strip{
  display:flex;gap:14px;overflow-x:auto;padding:4px 20px 18px;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
}
.gallery-strip::-webkit-scrollbar{height:6px}
.gallery-strip::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.gallery-strip img{
  height:240px;aspect-ratio:4/3;object-fit:cover;border-radius:6px;
  scroll-snap-align:center;flex-shrink:0;
}
@media(max-width:640px){.gallery-strip img{height:190px}}

/* ===== お知らせ ===== */
.news-list{max-width:760px;margin:0 auto}
.news-item{
  display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;
  padding:18px 6px;border-bottom:1px solid var(--line);font-size:.92rem;
}
.news-item:first-child{border-top:1px solid var(--line)}
.news-item .date{font-size:.8rem;color:#8a7d6e;letter-spacing:.08em;white-space:nowrap}
.news-item .tag{
  font-size:.66rem;letter-spacing:.14em;color:var(--accent);
  border:1px solid var(--accent);border-radius:3px;padding:2px 9px;white-space:nowrap;
}

/* ===== 店舗情報 ===== */
.info{background:var(--white)}
.info-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:46px;align-items:start;
}
@media(max-width:860px){.info-grid{grid-template-columns:1fr}}
.info-table{width:100%;border-collapse:collapse;font-size:.92rem}
.info-table th,.info-table td{
  text-align:left;padding:13px 8px;border-bottom:1px solid var(--line);
  vertical-align:top;font-weight:400;
}
.info-table th{width:7.5em;color:var(--main);font-weight:700;letter-spacing:.08em;white-space:nowrap}
.map-wrap{
  border-radius:8px;overflow:hidden;box-shadow:0 10px 28px rgba(50,42,36,.12);
  aspect-ratio:4/3;background:#eee;
}
.map-wrap iframe{width:100%;height:100%;border:0}
.map-link{text-align:right;margin-top:12px;font-size:.84rem}
.map-link a{color:var(--accent);border-bottom:1px solid var(--accent);padding-bottom:2px}

/* ===== CTA ===== */
.cta{background:var(--main);color:#f5efe5;text-align:center}
.cta .lead{font-family:var(--serif);font-size:1.1rem;letter-spacing:.14em;margin-bottom:26px}
.cta .tel{
  font-family:var(--serif);font-size:clamp(1.9rem,5vw,2.8rem);
  letter-spacing:.08em;color:#fff;display:inline-block;line-height:1.3;
}
.cta .hours{font-size:.82rem;color:#d9cbb4;margin-top:14px}
.cta .sns{margin-top:30px}
.cta .sns a{
  display:inline-block;border:1px solid #d9cbb4;border-radius:999px;
  padding:10px 30px;font-size:.84rem;letter-spacing:.12em;transition:background .3s,color .3s;
}
.cta .sns a:hover{background:#f5efe5;color:var(--main)}

/* ===== フッター ===== */
footer{
  background:#241c15;color:#a99a87;text-align:center;
  padding:40px 20px 30px;font-size:.78rem;letter-spacing:.06em;
}
footer .shop{font-family:var(--serif);font-size:1rem;color:#e5dccd;margin-bottom:8px}
footer .credit{margin-top:18px;font-size:.7rem;color:#6e6254}
footer .credit a{text-decoration:underline}

/* ===== モバイル固定バー ===== */
.mobile-bar{
  position:fixed;left:0;right:0;bottom:0;z-index:100;
  display:grid;grid-template-columns:1fr 1fr 1fr;
  background:rgba(36,28,21,.96);backdrop-filter:blur(6px);
  padding-bottom:env(safe-area-inset-bottom);
}
.mobile-bar a{
  color:#f3ece0;text-align:center;padding:9px 4px 7px;
  font-size:.62rem;letter-spacing:.1em;line-height:1.4;
}
.mobile-bar a .ico{display:block;font-size:1.05rem;line-height:1.3}
.mobile-bar a + a{border-left:1px solid rgba(243,236,224,.16)}
@media(min-width:861px){
  .mobile-bar{display:none}
  body{padding-bottom:0}
}

/* ===== スクロール出現 ===== */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .8s ease,transform .8s ease}
.reveal.on{opacity:1;transform:none}

/* ===== デバッグ（?debug=1 のときだけ表示） ===== */
#debugBtn{
  position:fixed;left:12px;bottom:84px;z-index:200;display:none;
  background:#222;color:#0f0;border:1px solid #0f0;border-radius:6px;
  padding:8px 12px;font-size:12px;font-family:monospace;cursor:pointer;
}
</style>
</head>

<main>

  <!-- メニュー -->

      <div class="popular-list" id="popularList"></div>

  <!-- ギャラリー -->

      <ul class="news-list" id="newsList"></ul>

  <!-- 店舗情報 -->
  <section id="info" class="info">

  </section>

  <!-- CTA -->
  <section class="cta">
    <div class="sec-inner reveal">
      <p class="lead">ご予約・お問い合わせ</p>
      <a class="tel" id="ctaTel" href="#"></a>
      <p class="hours" id="ctaHours"></p>
      <p class="sns"><a id="ctaInsta" href="#" target="_blank" rel="noopener">Instagram を見る</a></p>
    </div>
  </section>
</main>

<footer>
  <p class="shop" id="footShop"></p>
  <p id="footAddress"></p>
  <p style="margin-top:14px">&copy; <span id="footYear"></span> <span id="footShop2"></span></p>
  <p class="credit" id="footCredit"></p>
</footer>

<!-- モバイル固定バー（ローカルビジネス必須導線：電話・地図・SNS） -->
<div class="mobile-bar">
  <a id="barTel" href="#"><span class="ico">&#9742;</span>電話する</a>

</div>

/* ★★★ CONFIG ここまで ★★★ */

(function render(){
  const $ = id => document.getElementById(id);
  const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const br = s => esc(s).replace(/\n/g,"<br>");

  // 色をCONFIGから反映
  const r = document.documentElement.style;
  r.setProperty("--bg",CONFIG.colors.bg);
  r.setProperty("--ink",CONFIG.colors.ink);
  r.setProperty("--main",CONFIG.colors.main);
  r.setProperty("--accent",CONFIG.colors.accent);

  // ヒーロー
  document.title = CONFIG.shopName + "｜" + CONFIG.subCopy.slice(0,30);
  $("bindLogo").textContent = CONFIG.shopName;
  $("bindHeroEn").textContent = CONFIG.heroEn;
  $("bindCatch").innerHTML = br(CONFIG.catchCopy);
  $("bindSub").textContent = CONFIG.subCopy;
  $("bindVertical").textContent = CONFIG.verticalText;
  document.querySelector(".hero").style.backgroundImage = `url('${CONFIG.heroImage}')`;

  // 電話・地図・SNSリンク
  const telHref = "tel:" + CONFIG.tel.replace(/-/g,"");
  const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(CONFIG.shopName + " " + CONFIG.address);
  $("headerTel").href = telHref;
  $("headerTel").textContent = "☎ " + CONFIG.tel;
  $("ctaTel").href = telHref;
  $("ctaTel").textContent = CONFIG.tel;
  $("ctaHours").textContent = CONFIG.hoursShort;
  $("ctaInsta").href = CONFIG.instagram.url;
  $("barTel").href = telHref;
  $("barMap").href = mapUrl;
  $("barInsta").href = CONFIG.instagram.url;
  $("mapLink").href = mapUrl;

  // こだわり
  $("featureList").innerHTML = CONFIG.features.map(f => `
    <div class="feature reveal">
      <img src="${f.img}" alt="${esc(f.title)}" loading="lazy">
      <h3><span class="num">${esc(f.num)}</span>${esc(f.title)}</h3>
      <p>${esc(f.text)}</p>
    </div>`).join("");

  // 人気メニュー
  $("popularList").innerHTML = CONFIG.popular.map(p => `
    <div class="popular reveal">
      <span class="badge">${esc(p.badge)}</span>
      <img src="${p.img}" alt="${esc(p.name)}" loading="lazy">
      <div class="cap"><span class="name">${esc(p.name)}</span><span class="price">${esc(p.price)}</span></div>
    </div>`).join("");

  // メニュー表
  $("menuGroups").innerHTML = CONFIG.menu.map(g => `
    <div class="menu-group reveal">
      <h3>${esc(g.group)}<span class="en">${esc(g.en)}</span></h3>
      ${g.items.map(([n,p]) => `<div class="menu-item"><span>${esc(n)}</span><span class="dots"></span><span class="price">${esc(p)}</span></div>`).join("")}
    </div>`).join("");

  // ギャラリー
  $("galleryList").innerHTML = CONFIG.gallery.map((src,i) =>
    `<img src="${src}" alt="店内写真${i+1}" loading="lazy">`).join("");

  // お知らせ
  $("newsList").innerHTML = CONFIG.news.map(n => `
    <li class="news-item reveal">
      <span class="date">${esc(n.date)}</span>
      <span class="tag">${esc(n.tag)}</span>
      <span>${esc(n.text)}</span>
    </li>`).join("");

  // 店舗情報・地図
  $("infoTable").innerHTML = CONFIG.info.map(([k,v]) =>
    `<tr><th>${esc(k)}</th><td>${br(v)}</td></tr>`).join("");
  $("mapFrame").src = "https://maps.google.com/maps?q=" + encodeURIComponent(CONFIG.address) + "&z=16&output=embed";

  // フッター
  $("footShop").textContent = CONFIG.shopName;
  $("footShop2").textContent = CONFIG.shopName;
  $("footAddress").textContent = CONFIG.address;
  $("footYear").textContent = new Date().getFullYear();
  const c = $("footCredit");
  c.innerHTML = `<a href="${CONFIG.credit.url}" target="_blank" rel="noopener">${esc(CONFIG.credit.text)}</a>`;

  // 構造化データ（ローカルSEO対応：Google検索のリッチリザルト用）
  const ld = {
    "@context":"https://schema.org",
    "@type":"CafeOrCoffeeShop",
    "name": CONFIG.shopName,
    "address": CONFIG.address,
    "telephone": CONFIG.tel,
    "servesCuisine":"喫茶・洋食",
    "image": CONFIG.heroImage
  };
  const s = document.createElement("script");
  s.type = "application/ld+json";
  s.textContent = JSON.stringify(ld);
  document.head.appendChild(s);
})();

/* ヘッダー：スクロールで白背景に */
const header = document.getElementById("siteHeader");
const onScroll = () => header.classList.toggle("scrolled", window.scrollY > 60);
window.addEventListener("scroll", onScroll, { passive:true });
onScroll();

/* スクロール出現アニメーション */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting){ e.target.classList.add("on"); io.unobserve(e.target); } });
}, { threshold:.12 });
document.querySelectorAll(".reveal").forEach(el => io.observe(el));

/* デバッグ用コンソールコピー（URLに ?debug を付けたときだけ表示） */
(function(){
  const logs = [];
  ["log","warn","error"].forEach(k => {
    const org = console[k].bind(console);
    console[k] = (...a) => { logs.push(`[${k}] ` + a.map(x => { try{ return typeof x==="object" ? JSON.stringify(x) : String(x); }catch(_){ return String(x); } }).join(" ")); org(...a); };
  });
  window.addEventListener("error", e => logs.push(`[uncaught] ${e.message} (${e.filename}:${e.lineno})`));
  if (new URLSearchParams(location.search).has("debug")) {
    const btn = document.getElementById("debugBtn");
    btn.style.display = "block";
    btn.onclick = () => { navigator.clipboard.writeText(logs.join("\n") || "(ログなし)"); btn.textContent = "コピーしました"; setTimeout(()=>btn.textContent="ログをコピー",1500); };
  }
})();
</script>
