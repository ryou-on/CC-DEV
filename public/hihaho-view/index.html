<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hihaho Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase SDK（プレイリスト・サムネイル取得用） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #f4f5f7;
  --white: #ffffff;
  --border: #e5e7eb;
  --border-light: #f0f1f4;
  --accent: #0066ff;
  --accent-light: #e8f0ff;
  --text: #111827;
  --text-sub: #6b7280;
  --text-muted: #9ca3af;
  --header-h: 56px;
  --sidebar-w: 296px;
  --font: 'Noto Sans JP', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
header {
  height: var(--header-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}
.logo {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
}
.logo-bar { width: 4px; height: 18px; border-radius: 2px; background: var(--accent); }
.hihaho-logo-img { height:20px; margin-right:5px; vertical-align:middle; border-radius:2px; }
.search-wrap { flex: 1; max-width: 380px; position: relative; }
.search-wrap input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px 7px 32px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,102,255,0.08);
  background: var(--white);
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted); font-size: 13px; pointer-events: none;
}
.ch-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-left: auto;
  overflow-x: auto;
  scrollbar-width: none;
  max-width: 600px;
}
.ch-tabs::-webkit-scrollbar { display: none; }
.ch-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 11px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  font-family: var(--font);
  font-size: 12px;
  color: var(--text-sub);
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.ch-tab:hover { background: var(--bg); color: var(--text); }
.ch-tab.active {
  background: var(--accent-light);
  color: var(--accent);
  border-color: rgba(0,102,255,0.18);
  font-weight: 600;
}
.ch-tab-skeleton {
  width: 80px; height: 32px;
  border-radius: 20px;
  background: linear-gradient(90deg, #f0f1f4 25%, #e5e7eb 50%, #f0f1f4 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  flex-shrink: 0;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.debug-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-muted); font-size: 11px; padding: 5px 9px;
  cursor: pointer; font-family: var(--mono); transition: all 0.2s; flex-shrink: 0;
}
.debug-btn:hover { color: var(--accent); border-color: var(--accent); }
.layout { flex: 1; display: flex; overflow: hidden; }
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.player-wrap {
  position: relative;
  width: 100%;
  background: #111;
  aspect-ratio: 16 / 9;
  max-height: 52vh;
  flex-shrink: 0;
}
.player-wrap iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
}
.player-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: #555;
}
.player-placeholder-icon { font-size: 40px; opacity: 0.4; }
.player-placeholder p { font-size: 13px; }
.player-spinner {
  position: absolute; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: #111;
}
.player-spinner.show { display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-ring {
  width: 32px; height: 32px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.info-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 11px 16px 10px;
  flex-shrink: 0;
}
.info-title { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); }
.info-meta {
  display: flex; align-items: center; gap: 8px;
  margin-top: 4px; font-size: 12px; color: var(--text-sub);
}
.info-meta .dot { color: var(--border); }
.badge {
  display: inline-flex; align-items: center;
  background: var(--accent-light); color: var(--accent);
  border-radius: 4px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.4px; padding: 2px 6px;
  font-family: var(--mono);
}
.badge-draft { background: #fef3c7; color: #92400e; }
.badge-published { background: #d1fae5; color: #065f46; }
/* 再生回数バッジ（サムネイル左下オーバーレイ・YouTube風） */
.vrow-count-ov {
  position: absolute;
  bottom: 4px;
  left: 4px;
  background: rgba(185, 28, 28, 0.88); /* 赤 */
  color: #fff;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
  padding: 3px 6px;
  border-radius: 3px;
  z-index: 3;
  pointer-events: none;
  white-space: nowrap;
  display: block; /* 常に表示（取得前はローディング） */
  min-width: 24px;
  text-align: center;
}
/* 取得完了済みバッジ */
.vrow-count-ov.loaded { background: rgba(185, 28, 28, 0.88); }
/* 取得中バッジ（薄いグレー） */
.vrow-count-ov:not(.loaded) {
  background: rgba(0,0,0,0.35);
  letter-spacing: 0.1em;
  animation: pulse 1.2s infinite;
}
.video-list {
  flex: 1; overflow-y: auto;
  padding: 14px 16px 20px;
  background: var(--bg);
}
.video-list::-webkit-scrollbar { width: 5px; }
.video-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.list-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--text-muted); text-transform: uppercase;
  margin-bottom: 10px;
}
/* ソートバー */
.sort-bar {
  display: flex; align-items: center;
  gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
}
.sort-btn {
  display: inline-flex; align-items: center;
  padding: 4px 10px; border-radius: 16px;
  border: 1px solid var(--border); background: var(--white);
  color: var(--text-sub); font-family: var(--font); font-size: 11px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.sort-btn:hover { border-color: var(--accent); color: var(--accent); }
.sort-btn.active {
  background: var(--accent-light); color: var(--accent);
  border-color: rgba(0,102,255,0.3); font-weight: 600;
}
/* サムネイルフィルタバー */
.filter-bar {
  display: flex; align-items: center;
  gap: 5px; margin-bottom: 10px;
}
.filter-label {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  letter-spacing: 0.05em; white-space: nowrap; margin-right: 2px;
}
.filter-btn {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--white);
  color: var(--text-sub); font-family: var(--font); font-size: 11px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: #f0fdf4; color: #166534;
  border-color: #86efac; font-weight: 600;
}
.filter-btn.active-none {
  background: #fef2f2; color: #991b1b;
  border-color: #fca5a5; font-weight: 600;
}
.vrow {
  display: flex; gap: 12px;
  background: var(--white);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: box-shadow 0.15s, border-color 0.15s;
  align-items: flex-start;
}
.vrow:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); border-color: var(--border); }
.vrow.playing { border-color: var(--accent); background: var(--accent-light); }
.vrow-skeleton {
  display: flex; gap: 12px;
  background: var(--white);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
}
.skel-thumb {
  width: 128px; min-width: 128px;
  aspect-ratio: 16/9;
  border-radius: 6px;
  background: linear-gradient(90deg, #f0f1f4 25%, #e5e7eb 50%, #f0f1f4 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
.skel-info { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
.skel-line {
  height: 13px; border-radius: 4px;
  background: linear-gradient(90deg, #f0f1f4 25%, #e5e7eb 50%, #f0f1f4 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
.vrow-thumb {
  position: relative; flex-shrink: 0;
  width: 128px; aspect-ratio: 16/9;
  border-radius: 6px; background: #dde0e6; overflow: hidden;
}
.vrow-thumb img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}
.vrow-thumb-fb {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #b0b4bc;
}
.vrow-play-ov {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.28); opacity: 0;
  transition: opacity 0.15s; border-radius: 6px; z-index: 2;
}
.vrow:hover .vrow-play-ov { opacity: 1; }
.play-circle {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.92);
  display: flex; align-items: center; justify-content: center;
}
.play-circle svg { margin-left: 2px; }
.vrow-info { flex: 1; min-width: 0; }
.vrow-title {
  font-size: 13px; font-weight: 500; line-height: 1.45; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 5px;
}
.vrow.playing .vrow-title { color: var(--accent); }
.vrow-meta { font-size: 11px; color: var(--text-muted); display: flex; flex-direction: column; gap: 3px; }
.vrow-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--white); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.ch-info-panel { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ch-info-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ch-avatar {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-family: var(--mono); font-weight: 700;
  color: var(--accent); flex-shrink: 0;
}
.ch-info-name { font-size: 14px; font-weight: 600; }
.ch-info-id { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.ch-info-count { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
.queue-panel { flex: 1; overflow-y: auto; padding: 12px; }
.queue-panel::-webkit-scrollbar { width: 4px; }
.queue-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.queue-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px;
}
.qcard {
  display: flex; gap: 8px; padding: 8px; border-radius: 8px;
  cursor: pointer; transition: background 0.15s;
  align-items: flex-start; margin-bottom: 2px;
}
.qcard:hover { background: var(--bg); }
.qcard.playing { background: var(--accent-light); }
.qcard-thumb {
  position: relative; flex-shrink: 0;
  width: 96px; aspect-ratio: 16/9;
  border-radius: 5px; background: #dde0e6; overflow: hidden;
}
.qcard-thumb img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}
.qcard-thumb-fb {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #b0b4bc;
}
.qcard-info { flex: 1; min-width: 0; }
.qcard-title {
  font-size: 12px; font-weight: 500; line-height: 1.45; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 4px;
}
.qcard.playing .qcard-title { color: var(--accent); }
.qcard-meta { font-size: 11px; color: var(--text-muted); }
.now-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent);
  margin-right: 4px; vertical-align: middle;
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
.empty { text-align: center; padding: 40px 12px; color: var(--text-muted); }
.empty-icon { font-size: 30px; opacity: 0.35; margin-bottom: 10px; }
.error-msg {
  background: #fef2f2; border: 1px solid #fecaca;
  border-radius: 8px; padding: 12px 16px;
  color: #dc2626; font-size: 13px; margin-bottom: 12px;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.vrow  { animation: fadeUp 0.22s ease both; }
.qcard { animation: fadeUp 0.22s ease both; }

/* 言語切替 */
[lang="en"] .ja { display: none !important; }
[lang="ja"] .en { display: none !important; }

/* バージョンバッジ */
.ver-badge {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 5px; margin-left: 6px;
  vertical-align: middle; letter-spacing: 0.03em;
  cursor: pointer; text-decoration: underline dotted;
  text-underline-offset: 2px; transition: color 0.15s;
}
.ver-badge:hover { color: var(--accent) !important; }

/* JP/ENトグル */
.lang-toggle {
  display: flex; align-items: center; margin-right: 6px;
  border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
}
.lang-btn {
  font-size: 11px; font-weight: 700; padding: 3px 8px;
  border: none; background: var(--bg); color: var(--text-muted);
  cursor: pointer; letter-spacing: 0.05em; transition: background 0.15s, color 0.15s;
}
.lang-btn + .lang-btn { border-left: 1px solid var(--border); }
.lang-btn.active-jp { background: #e53935; color: #fff; }
.lang-btn.active-en { background: #1565c0; color: #fff; }
.lang-btn:not(.active-jp):not(.active-en):hover { background: var(--accent); color: #fff; }

/* リリースノートモーダル */
.rn-modal { position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center; }
.rn-card { background:#fff;border-radius:12px;width:90%;max-width:480px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2); }
.rn-header { display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border); }
.rn-title  { font-size:13px;font-weight:700;color:var(--text); }
.rn-close  { background:none;border:none;cursor:pointer;font-size:15px;color:var(--text-muted);padding:3px 7px;border-radius:4px; }
.rn-close:hover { background:var(--bg); }
.rn-filter-bar { display:flex;gap:4px;padding:10px 18px 0; }
.rn-filter-btn { font-size:11px;padding:3px 9px;border-radius:10px;border:1px solid var(--border);background:var(--white);color:var(--text-sub);cursor:pointer;transition:all 0.12s; }
.rn-filter-btn.active { background:var(--accent-light);color:var(--accent);border-color:rgba(0,102,255,0.3);font-weight:600; }
.rn-body   { overflow-y:auto;padding:14px 18px; }
.rn-entry  { margin-bottom:14px; }
.rn-entry:last-child { margin-bottom:0; }
.rn-ver    { display:flex;align-items:center;gap:7px;margin-bottom:5px; }
.rn-ver-num { font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text); }
.rn-ver-date { font-size:11px;color:var(--text-muted); }
.rn-type-badge { font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:0.4px; }
.rn-type-player { background:#e0f2fe;color:#0369a1; }
.rn-type-admin  { background:#f0fdf4;color:#166534; }
.rn-type-both   { background:#fef3c7;color:#92400e; }
.rn-changes { list-style:none;padding:0;margin:0; }
.rn-changes li { font-size:12px;color:var(--text-sub);padding:2px 0 2px 12px;position:relative; }
.rn-changes li::before { content:"·";position:absolute;left:0;color:var(--accent); }

/* =========================================================
   モバイルレイアウト（768px以下）
   ========================================================= */
@media (max-width: 768px) {
  /* ヘッダー: コンパグトに */
  :root { --header-h: 48px; }
  header { padding: 0 10px; gap: 6px; flex-wrap: nowrap; }
  .logo { font-size: 12px; gap: 5px; }
  .hihaho-logo-img { height: 16px; }
  .logo-bar { height: 14px; }

  /* 検索欄: 伸縮 */
  .search-wrap { max-width: 100%; min-width: 0; }
  .search-wrap input { font-size: 13px; padding: 6px 10px 6px 28px; }

  /* チャンネルタブ: ヘッダーでは非表示 → ボトムシートで表示 */
  .ch-tabs { display: none; }

  /* デバッグボタン: 非表示（コンソールがモバイルでは使えない） */
  .debug-btn { display: none; }

  /* 言語トグル: 小型化 */
  .lang-toggle { margin-right: 0; }
  .lang-btn { padding: 3px 7px; font-size: 10px; }

  /* レイアウト: 縦積み */
  .layout { flex-direction: column; overflow: visible; }

  /* サイドバー: ボトムシートに移行 */
  .sidebar { display: none; }

  /* プレイヤー: フル幅 */
  .player-wrap { max-height: none; border-radius: 0; }

  /* info-bar */
  .info-bar { padding: 8px 12px; }
  .info-title { font-size: 13px; }
  .info-meta { font-size: 11px; }

  /* 動画リスト */
  .video-list {
    flex: 1;
    padding: 10px 10px 72px; /* ボトムナビ分の余白 */
    overflow-y: auto;
  }

  /* ソートバー: 横スクロール */
  .sort-bar {
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .sort-bar::-webkit-scrollbar { display: none; }
  .sort-btn { flex-shrink: 0; padding: 5px 11px; font-size: 11px; }

  /* フィルタバー: 横スクロール */
  .filter-bar {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; }

  /* リストカード: タッチターゲット拡大 */
  .vrow { padding: 8px 8px; margin-bottom: 6px; }
  .vrow-thumb { width: 112px; }

  /* body: ボトムナビ分を確保 */
  body { overflow: auto; height: auto; min-height: 100vh; }
}

/* =========================================================
   モバイル専用UI部品
   ========================================================= */

/* ボトムナビゲーションバー */
.mobile-nav {
  display: none; /* デスクトップでは非表示 */
}
@media (max-width: 768px) {
  .mobile-nav {
    display: flex;
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 56px;
    background: var(--white);
    border-top: 1px solid var(--border);
    z-index: 200;
    justify-content: space-around;
    align-items: stretch;
  }
}
.mobile-nav-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; flex: 1;
  background: none; border: none;
  cursor: pointer; font-family: var(--font);
  color: var(--text-muted); transition: color 0.15s;
  padding: 4px 0; font-size: 10px; font-weight: 500;
  -webkit-tap-highlight-color: transparent;
}
.mobile-nav-btn:hover, .mobile-nav-btn.active { color: var(--accent); }
.mobile-nav-btn .nav-icon { font-size: 20px; line-height: 1; }

/* ボトムシート共通 */
.bottom-sheet-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  opacity: 0;
  transition: opacity 0.25s;
}
.bottom-sheet-overlay.show { opacity: 1; }
.bottom-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 16px 16px 0 0;
  max-height: 80vh;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
}
.bottom-sheet-overlay.show .bottom-sheet { transform: translateY(0); }
.bottom-sheet-handle {
  width: 36px; height: 4px;
  background: var(--border); border-radius: 2px;
  margin: 10px auto 4px;
  flex-shrink: 0;
}
.bottom-sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.bottom-sheet-title { font-size: 13px; font-weight: 700; color: var(--text); }
.bottom-sheet-close {
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--text-muted);
  padding: 4px 8px; border-radius: 4px;
  -webkit-tap-highlight-color: transparent;
}
.bottom-sheet-body { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

/* チャンネルシート内のタブ */
.ch-sheet-tabs {
  display: flex; flex-direction: column;
  padding: 8px 0;
}
.ch-sheet-tab {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  cursor: pointer; transition: background 0.12s;
  font-size: 14px; color: var(--text);
  border: none; background: none; text-align: left;
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
}
.ch-sheet-tab:hover, .ch-sheet-tab:active { background: var(--bg); }
.ch-sheet-tab.active { color: var(--accent); background: var(--accent-light); font-weight: 600; }
.ch-sheet-tab .ch-sheet-icon { font-size: 18px; width: 24px; text-align: center; }
.ch-sheet-tab .ch-sheet-cnt {
  margin-left: auto; font-size: 11px;
  color: var(--text-muted); font-family: var(--mono);
}
</style>
</head>

<script>
// =========================================================
// ★ 設定
// =========================================================
const WORKER_URL = 'https://hihaho-proxy.jumpei-omote.workers.dev';

// Firebase設定
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDPlsAhtxbJBihy-EAHck9P7XbuMdzV0ds",
  authDomain: "cc-dev-ps7.firebaseapp.com",
  projectId: "cc-dev-ps7",
  storageBucket: "cc-dev-ps7.firebasestorage.app",
  messagingSenderId: "1029579090333",
  appId: "1:1029579090333:web:5a2ea499fec97c497f2774"
};

// フォルダID（?id= URLパラメータからFirestore経由で取得。なければフォールバッグ）
const FALLBACK_FOLDER_IDS = [21078, 12452, 21334];
let SHOW_FOLDER_IDS = [];

// ★ サムネイル設定
const THUMB_BASE = 'https://cc-dev-ps7.web.app/hihaho-player/thumbs';
const THUMB_EXT = 'jpg';

// statusラベル
const STATUS = {
  0: { label: 'DRAFT',       cls: 'badge badge-draft' },
  1: { label: 'PUBLISHED',   cls: 'badge badge-published' },
  2: { label: 'INTERACTIVE', cls: 'badge' },
  4: { label: 'ARCHIVED',    cls: 'badge badge-draft' },
};

// =========================================================
// ソート設定
// =========================================================
const SORT_OPTS = [
  { key: 'new',        labelJa: '📅 新しい順',      labelEn: '📅 Newest' },
  { key: 'old',        labelJa: '📅 古い順',        labelEn: '📅 Oldest' },
  { key: 'upd_desc',   labelJa: '🔄 更新↓',        labelEn: '🔄 Updated↓' },
  { key: 'upd_asc',    labelJa: '🔄 更新↑',        labelEn: '🔄 Updated↑' },
  { key: 'alpha_asc',  labelJa: 'あ→ん',            labelEn: 'A→Z' },
  { key: 'alpha_desc', labelJa: 'ん→あ',            labelEn: 'Z→A' },
  { key: 'random',     labelJa: '🔀 ランダム',       labelEn: '🔀 Random' },
  { key: 'thumb_first',labelJa: '🖼 サムネあり先',   labelEn: '🖼 Thumb First' },
  { key: 'plays',      labelJa: '👁 再生多い順',     labelEn: '👁 Most Played' },
];
let currentSort = 'new';
let thumbFilter  = 'all'; // 'all' | 'thumb' | 'no-thumb'

// =========================================================
// 状態管理
// =========================================================
let allFolders  = [];
let allVideos   = [];
let activeChId  = null;
let activeVidId = null;
let searchQ     = '';
let clog        = [];
let videoMeta   = {}; // uuid → { thumbnailUrl, display_name_en }

// 再生回数マップ: videoId → 数値（Hihaho API実データ、-1=取得失敗）
let playCountMap = new Map();

// =========================================================
// 翻訳キャッシュ（MyMemory API）
// =========================================================
const _translCache = {};

function getTitle(vid) {
  if (_currentLang === 'ja') return vid.display_name;
  if (videoMeta[vid.uuid]?.display_name_en) return videoMeta[vid.uuid].display_name_en;
  if (_translCache[vid.id]) return _translCache[vid.id];
  if (!_translCache['_pending_' + vid.id]) {
    _translCache['_pending_' + vid.id] = true;
    translateTitle(vid);
  }
  return vid.display_name;
}

async function translateTitle(vid) {
  try {
    const res = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(vid.display_name)}&langpair=ja|en`
    );
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData?.translatedText) {
      _translCache[vid.id] = data.responseData.translatedText;
      if (_currentLang === 'en') { renderGrid(); renderSidebar(); }
    }
  } catch(e) { console.error('翻訳エラー:', e.message); }
}

// =========================================================
// ログ
// =========================================================
const origLog = console.log.bind(console);
console.log = (...a) => { origLog(...a); clog.push(a.join(' ')); };
const origErr = console.error.bind(console);
console.error = (...a) => { origErr(...a); clog.push('[ERR] ' + a.join(' ')); };
const log = m => console.log(`[hihaho] ${m}`);

// =========================================================
// サムネイルHTML生成
// 優先: ①Firestore video_meta → ②Firebase Hosting → ③🎬フォールバック
// =========================================================
function thumbHtml(uuid, cls) {
  const metaUrl = videoMeta[uuid]?.thumbnailUrl;
  const src = metaUrl || `${THUMB_BASE}/${uuid}.${THUMB_EXT}`;
  if (cls === 'vrow') {
    return `
      <img src="${src}"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           loading="lazy">
      <div class="vrow-thumb-fb" style="display:none">🎬</div>`;
  } else {
    return `
      <img src="${src}"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           loading="lazy">
      <div class="qcard-thumb-fb" style="display:none">🎬</div>`;
  }
}

// =========================================================
// API呼び出し（Cloudflare Worker経由）
// =========================================================
async function apiFetch(path) {
  const res = await fetch(`${WORKER_URL}${path}`, {
    headers: { 'Accept': 'application/json' }
  });
  if (!res.ok) throw new Error(`API error: ${res.status} ${path}`);
  return res.json();
}

// =========================================================
// 再生回数取得（Hihaho aggregated-statistics API）
// 5並列バッチ処理・バッチ間200ms待機でレート制限対策
// 取得完了ごとにDOM直接更新（グリッド全再描画なし）
// =========================================================

// 1件の再生回数を取得してバッジDOMを即時更新
async function _fetchOnePlayCount(v) {
  try {
    const data = await apiFetch(`/v2/video/${v.id}/aggregated-statistics`);
    const stats = data?.data?.aggregated_statistics;
    const num = Number(stats?.views ?? stats?.play_count ?? stats?.plays ?? 0) || 0;
    playCountMap.set(v.id, num);
    log(`再生回数 [${v.id}] views=${num}`);
    document.querySelectorAll(`.vrow-count-ov[data-vid="${v.id}"]`).forEach(el => {
      el.textContent = num.toLocaleString();
      el.classList.add('loaded');
    });
  } catch (e) {
    console.error(`再生回数取得失敗 [${v.id}]: ${e.message}`);
    playCountMap.set(v.id, 0);
    document.querySelectorAll(`.vrow-count-ov[data-vid="${v.id}"]`).forEach(el => {
      el.textContent = '0';
      el.classList.add('loaded');
    });
  }
}

async function loadPlayCounts() {
  if (allVideos.length === 0) return;
  const BATCH = 5; // 1バッチあたりの同時リクエスト数
  const delay = ms => new Promise(r => setTimeout(r, ms));
  log(`再生回数取得開始: ${allVideos.length}本（${BATCH}並列バッチ）`);

  for (let i = 0; i < allVideos.length; i += BATCH) {
    const batch = allVideos.slice(i, i + BATCH);
    await Promise.all(batch.map(v => _fetchOnePlayCount(v)));
    // バッチ間に200ms待機（レート制限対策）
    if (i + BATCH < allVideos.length) await delay(200);
  }
  log('再生回数取得完了');
}

// 再生回数オーバーレイHTML（サムネイル内に埋め込　）
// 取得前: グレー「…」、取得後: 赤バッジに数値
function playCountOverlay(videoId) {
  const count = playCountMap.get(videoId);
  const loaded = playCountMap.has(videoId);
  const text   = loaded ? (Number(count) || 0).toLocaleString() : '…';
  return `<div class="vrow-count-ov${loaded?' loaded':''}" data-vid="${videoId}">${text}</div>`;
}

// =========================================================
// 初期化
// =========================================================
async function init() {
  log('初期化開始');
  try {
    // Firebase初期化
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();

    // URLパラメータ ?id= からFirestoreのプレイリストを取得
    const playlistId = new URLSearchParams(location.search).get('id');
    if (playlistId) {
      const playlistDoc = await db.collection('playlists').doc(playlistId).get();
      if (!playlistDoc.exists) {
        showError(_currentLang==='ja'
          ? `プレイリストが見つかりません (id: ${playlistId})`
          : `Playlist not found (id: ${playlistId})`);
        return;
      }
      const pd = playlistDoc.data();
      SHOW_FOLDER_IDS = pd.folderIds || [];
      document.title = `hihaho Player – ${pd.name}`;
      log(`プレイリスト: ${pd.name} / フォルダ${SHOW_FOLDER_IDS.length}件`);
    } else {
      // ?id= なし → フォールバック
      SHOW_FOLDER_IDS = FALLBACK_FOLDER_IDS;
      log(`フォールバックフォルダ: ${SHOW_FOLDER_IDS.join(',')}`);
    }

    if (SHOW_FOLDER_IDS.length === 0) {
      showError(_currentLang==='ja' ? 'フォルダが設定されていません' : 'No folders configured');
      return;
    }

    // Firestore video_meta（カスタムサムネイル・英語名）
    try {
      const metaSnap = await db.collection('video_meta').get();
      metaSnap.forEach(doc => { videoMeta[doc.id] = doc.data(); });
      log(`video_meta: ${metaSnap.size}件`);
    } catch(e) { console.error('video_meta取得失敗:', e.message); }

    // フォルダ一覧取得
    const foldersRes = await apiFetch('/v2/video-container');
    allFolders = (foldersRes.data || []).filter(f => SHOW_FOLDER_IDS.includes(f.id));
    allFolders.sort((a, b) => SHOW_FOLDER_IDS.indexOf(a.id) - SHOW_FOLDER_IDS.indexOf(b.id));

    if (allFolders.length === 0) {
      showError(_currentLang==='ja' ? '表示できるフォルダがありません' : 'No folders available');
      return;
    }

    // 各フォルダの動画を並列取得
    const videoResults = await Promise.all(
      allFolders.map(f => apiFetch(`/v2/video?video_container_id=${f.id}`))
    );
    allVideos = videoResults.flatMap(r => r.data || []);
    log(`フォルダ: ${allFolders.length}件 / 動画: ${allVideos.length}件`);

    activeChId = allFolders[0].id;
    renderTabs();
    renderSortBar();
    renderSidebar();
    renderGrid();
    log('初期化完了');

    // バックグラウンドで再生回数を取得
    loadPlayCounts();

  } catch(e) {
    console.error(e.message);
    showError(`データ取得エラー: ${e.message}`);
  }
}

// =========================================================
// エラー表示
// =========================================================
function showError(msg) {
  document.getElementById('videoGrid').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  document.getElementById('listLabel').textContent = 'エラー';
  document.getElementById('chTabs').innerHTML = '';
}

// =========================================================
// タブ描画
// =========================================================
function renderTabs() {
  document.getElementById('chTabs').innerHTML = allFolders.map(f => {
    const count = curChVideos(f.id).length;
    return `<button class="ch-tab ${f.id === activeChId ? 'active' : ''}" onclick="selectCh(${f.id})">
      ${esc(f.name)} <span style="opacity:0.6;font-size:10px">${count}</span>
    </button>`;
  }).join('');
}

function selectCh(id) {
  activeChId = id;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  renderTabs();
  renderSidebar();
  renderGrid();
}

// =========================================================
// サイドバー描画
// =========================================================
function renderSidebar() {
  const folder = curFolder();
  if (!folder) return;
  const videos = filteredVideos();
  const initial = (folder.name || '?').charAt(0).toUpperCase();
  document.getElementById('chInfoPanel').innerHTML = `
    <div class="ch-info-head">
      <div class="ch-avatar">${initial}</div>
      <div>
        <div class="ch-info-name">${esc(folder.name)}</div>
        <div class="ch-info-id">ID: ${folder.id}</div>
      </div>
    </div>
    <div class="ch-info-count">${curChVideos().length} ${_currentLang==='ja'?'本の動画':'videos'}</div>`;

  const qp = document.getElementById('queuePanel');
  qp.innerHTML = `<div class="queue-label">${_currentLang==='ja'?'ラインナップ':'Lineup'}</div>` +
    (videos.length === 0
      ? `<div class="empty"><div class="empty-icon">🔍</div><p>${_currentLang==='ja'?'動画が見つかりません':'No videos found'}</p></div>`
      : videos.map((v, i) => `
        <div class="qcard ${v.id===activeVidId?'playing':''}" style="animation-delay:${i*25}ms" onclick="play(${v.id})">
          <div class="qcard-thumb">${thumbHtml(v.uuid,'qcard')}</div>
          <div class="qcard-info">
            <div class="qcard-title">${v.id===activeVidId?'<span class="now-dot"></span>':''}${esc(getTitle(v))}</div>
            <div class="qcard-meta">${fmt(v.created_at)}</div>
          </div>
        </div>`).join(''));
}

// =========================================================
// グリッド描画
// =========================================================
function renderGrid() {
  const folder = curFolder();
  if (!folder) return;
  const videos = filteredVideos();
  document.getElementById('listLabel').textContent =
    searchQ
      ? `「${searchQ}」 ${videos.length} ${_currentLang==='ja'?'件':'results'}`
      : `${folder.name} ${_currentLang==='ja'?'の動画一覧':'— Videos'} (${videos.length})`;

  const g = document.getElementById('videoGrid');
  if (!videos.length) {
    g.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>${_currentLang==='ja'?'動画が見つかりませんでした':'No videos found'}</p></div>`;
    return;
  }
  g.innerHTML = videos.map((v, i) => {
    const st = STATUS[v.status] || STATUS[0];
    return `
      <div class="vrow ${v.id===activeVidId?'playing':''}" style="animation-delay:${i*25}ms" onclick="play(${v.id})">
        <div class="vrow-thumb">
          ${thumbHtml(v.uuid,'vrow')}
          <div class="vrow-play-ov">
            <div class="play-circle">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="#333"><path d="M4 2.5l6 3.5-6 3.5z"/></svg>
            </div>
          </div>
          ${playCountOverlay(v.id)}
        </div>
        <div class="vrow-info">
          <div class="vrow-title">${v.id===activeVidId?'<span class="now-dot"></span>':''}${esc(getTitle(v))}</div>
          <div class="vrow-meta">
            <span>${fmt(v.created_at)}</span>
            <div class="vrow-badges">
              ${st.cls?`<span class="${st.cls}">${st.label}</span>`:''}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

// =========================================================
// 再生
// =========================================================
function play(id) {
  const vid = allVideos.find(v => v.id === id);
  if (!vid) return;
  activeVidId = id;
  log(`再生: ${vid.display_name} (uuid: ${vid.uuid})`);

  const wrap = document.getElementById('playerWrap');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('spinner').classList.add('show');
  wrap.querySelector('iframe')?.remove();

  const iframe = document.createElement('iframe');
  iframe.src = `https://player.hihaho.com/embed/${vid.uuid}`;
  iframe.allow = 'autoplay; fullscreen';
  iframe.allowFullscreen = true;
  iframe.onload = () => {
    document.getElementById('spinner').classList.remove('show');
    log(`iframe完了: ${vid.uuid}`);
  };
  wrap.appendChild(iframe);

  const st = STATUS[vid.status] || STATUS[0];
  document.getElementById('nowTitle').innerHTML =
    `${esc(getTitle(vid))}${st.cls?` <span class="${st.cls}">${st.label}</span>`:''}`;
  document.getElementById('nowMeta').innerHTML =
    `<span>${curFolder()?.name||''}</span>
     <span class="dot">·</span>
     <span>${fmt(vid.created_at)}</span>
     <span class="dot">·</span>
     <span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${vid.uuid.slice(0,8)}…</span>`;

  renderSidebar();
  renderGrid();
}

// =========================================================
// ユーティリティ
// =========================================================
const curFolder   = () => allFolders.find(f => f.id === activeChId);

// status=1(PUBLISHED) または status=2(INTERACTIVE) のみ表示
const curChVideos = (fid) => {
  const id = fid ?? activeChId;
  return allVideos.filter(v => v.video_container_id === id && (v.status === 1 || v.status === 2));
};

const hasThumbnail = v => !!(videoMeta[v.uuid]?.thumbnailUrl);

const filteredVideos = () => {
  let vs = curChVideos();
  if (searchQ) {
    const q = searchQ.toLowerCase();
    vs = vs.filter(v =>
      v.display_name.toLowerCase().includes(q) ||
      (v.description || '').toLowerCase().includes(q)
    );
  }
  if (thumbFilter === 'thumb')    vs = vs.filter(v =>  hasThumbnail(v));
  if (thumbFilter === 'no-thumb') vs = vs.filter(v => !hasThumbnail(v));
  return sortVideos(vs);
};

function sortVideos(videos) {
  const arr = [...videos];
  switch (currentSort) {
    case 'new':       return arr.sort((a,b) => new Date(b.created_at)-new Date(a.created_at));
    case 'old':       return arr.sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
    case 'upd_desc':  return arr.sort((a,b) => new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at));
    case 'upd_asc':   return arr.sort((a,b) => new Date(a.updated_at||a.created_at)-new Date(b.updated_at||b.created_at));
    case 'alpha_asc': return arr.sort((a,b) => a.display_name.localeCompare(b.display_name,'ja'));
    case 'alpha_desc':return arr.sort((a,b) => b.display_name.localeCompare(a.display_name,'ja'));
    case 'random':
      for (let i=arr.length-1;i>0;i--) {
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
      }
      return arr;
    case 'thumb_first':
      return arr.sort((a,b) => {
        const aH=hasThumbnail(a), bH=hasThumbnail(b);
        if (aH!==bH) return aH?-1:1;
        return new Date(b.created_at)-new Date(a.created_at);
      });
    case 'plays':
      return arr.sort((a,b) => (playCountMap.get(b.id)||0)-(playCountMap.get(a.id)||0));
    default: return arr;
  }
}

// ソートバー・フィルタバー描画

function renderSortBar() {
  document.getElementById('sortBar').innerHTML = SORT_OPTS.map(o =>
    `<button class="sort-btn ${o.key===currentSort?'active':''}" onclick="setSort('${o.key}')">
      ${_currentLang==='ja'?o.labelJa:o.labelEn}
    </button>`
  ).join('');
  renderFilterBar();
}

const FILTER_OPTS = [
  { key:'all',      labelJa:'両方',    labelEn:'All',         cls:'' },
  { key:'thumb',    labelJa:'🖼 あり',  labelEn:'🖼 With',    cls:'active' },
  { key:'no-thumb', labelJa:'🚫 なし',  labelEn:'🚫 Without', cls:'active-none' },
];
function renderFilterBar() {
  const el = document.getElementById('filterBar');
  if (!el) return;
  el.innerHTML = `<span class="filter-label">${_currentLang==='ja'?'サムネ:':'Thumb:'}</span>` +
    FILTER_OPTS.map(o => {
      const isActive = o.key === thumbFilter;
      const cls = isActive ? `filter-btn ${o.cls||'active'}` : 'filter-btn';
      return `<button class="${cls}" onclick="setThumbFilter('${o.key}')">
        ${_currentLang==='ja'?o.labelJa:o.labelEn}
      </button>`;
    }).join('');
}

function setSort(key) {
  currentSort = key;
  renderSortBar();
  renderGrid();
  renderSidebar();
}
function setThumbFilter(key) {
  thumbFilter = key;
  renderFilterBar();
  renderGrid();
  renderSidebar();
}

let _currentLang = 'ja';
function setLang(lang) {
  if (_currentLang === lang) return;
  _currentLang = lang;
  document.documentElement.lang = lang;
  document.getElementById('langBtnJp')?.classList.toggle('active-jp', lang==='ja');
  document.getElementById('langBtnEn')?.classList.toggle('active-en', lang==='en');
  const inp = document.getElementById('searchInput');
  if (inp) inp.placeholder = lang==='ja' ? inp.dataset.phJa : inp.dataset.phEn;
  // EN切替時に全タイトルを先読み翻訳
  if (lang === 'en') {
    allVideos.forEach(v => {
      if (!_translCache[v.id] && !videoMeta[v.uuid]?.display_name_en && !_translCache['_pending_'+v.id]) {
        _translCache['_pending_'+v.id] = true;
        translateTitle(v);
      }
    });
  }
  if (typeof renderSortBar === 'function') renderSortBar();
  if (typeof renderGrid === 'function') renderGrid();
  if (typeof renderSidebar === 'function') renderSidebar();
}
function toggleLang() { setLang(_currentLang==='ja'?'en':'ja'); }

const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
const fmt = d => {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
};

/** チャンネルシート: 開く */
function openChannelSheet() {
  _renderChannelSheet();
  const overlay = document.getElementById('channelSheetOverlay');
  overlay.style.display = 'block';
  requestAnimationFrame(() => overlay.classList.add('show'));
  document.getElementById('mnavChannel')?.classList.add('active');
}
/** チャンネルシート: 閉じる */
function closeChannelSheet() {
  const overlay = document.getElementById('channelSheetOverlay');
  overlay.classList.remove('show');
  overlay.addEventListener('transitionend', () => { overlay.style.display = 'none'; }, { once: true });
  document.getElementById('mnavChannel')?.classList.remove('active');
}
/** チャンネルシート: 内容描画 */
function _renderChannelSheet() {
  const el = document.getElementById('chSheetTabs');
  if (!el || allFolders.length === 0) return;
  el.innerHTML = allFolders.map(f => {
    const cnt = curChVideos(f.id).length;
    const isActive = f.id === activeChId;
    return `<button class="ch-sheet-tab ${isActive?'active':''}" onclick="selectChMobile(${f.id})">
      <span class="ch-sheet-icon">📺</span>
      ${esc(f.name)}
      <span class="ch-sheet-cnt">${cnt}本</span>
    </button>`;
  }).join('');
}
/** チャンネルシートからチャンネル選択 */
function selectChMobile(id) {
  selectCh(id);
  closeChannelSheet();
}
