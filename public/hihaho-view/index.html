<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hihaho Player</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--white:#fff;--border:#e5e7eb;--border-light:#f0f1f4;--accent:#0066ff;--accent-light:#e8f0ff;--text:#111827;--text-sub:#6b7280;--text-muted:#9ca3af;--header-h:56px;--sidebar-w:296px;--font:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
.logo{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px;white-space:nowrap;}
.logo-bar{width:4px;height:18px;border-radius:2px;background:var(--accent);}
.playlist-title{font-size:13px;font-weight:600;color:var(--text-sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-tabs{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none;max-width:500px;}
.ch-tabs::-webkit-scrollbar{display:none;}
.ch-tab{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text-sub);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.ch-tab:hover{background:var(--bg);color:var(--text);}
.ch-tab.active{background:var(--accent-light);color:var(--accent);border-color:rgba(0,102,255,.18);font-weight:600;}
.search-wrap{flex:1;max-width:340px;position:relative;margin-left:auto;}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,102,255,.08);background:var(--white);}
.search-wrap input::placeholder{color:var(--text-muted);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;}
.debug-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:11px;padding:5px 9px;cursor:pointer;font-family:var(--mono);}
.layout{flex:1;display:flex;overflow:hidden;}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.player-wrap{position:relative;width:100%;background:#111;aspect-ratio:16/9;max-height:52vh;flex-shrink:0;}
.player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.player-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#555;}
.player-placeholder-icon{font-size:40px;opacity:.4;}
.player-placeholder p{font-size:13px;}
.player-spinner{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#111;}
.player-spinner.show{display:flex;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-ring{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
.info-bar{background:var(--white);border-bottom:1px solid var(--border);padding:11px 16px 10px;flex-shrink:0;}
.info-title{font-size:14px;font-weight:600;line-height:1.4;color:var(--text);}
.info-meta{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:12px;color:var(--text-sub);}
.info-meta .dot{color:var(--border);}
.badge{display:inline-flex;align-items:center;background:var(--accent-light);color:var(--accent);border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.4px;padding:2px 6px;font-family:var(--mono);}
.badge-pub{background:#d1fae5;color:#065f46;}
.video-list{flex:1;overflow-y:auto;padding:14px 16px 20px;background:var(--bg);}
.video-list::-webkit-scrollbar{width:5px;}
.video-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.list-label{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;}
.vrow{display:flex;gap:12px;background:var(--white);border:1px solid var(--border-light);border-radius:10px;padding:10px;cursor:pointer;margin-bottom:8px;transition:box-shadow .15s,border-color .15s;align-items:flex-start;}
.vrow:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);border-color:var(--border);}
.vrow.playing{border-color:var(--accent);background:var(--accent-light);}
.vrow-thumb{position:relative;flex-shrink:0;width:128px;aspect-ratio:16/9;border-radius:6px;background:#dde0e6;overflow:hidden;}
.vrow-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.vrow-thumb-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#b0b4bc;}
.vrow-play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28);opacity:0;transition:opacity .15s;border-radius:6px;z-index:2;}
.vrow:hover .vrow-play-ov{opacity:1;}
.play-circle{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;}
.play-circle svg{margin-left:2px;}
.vrow-info{flex:1;min-width:0;}
.vrow-title{font-size:13px;font-weight:500;line-height:1.45;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px;}
.vrow.playing .vrow-title{color:var(--accent);}
.vrow-meta{font-size:11px;color:var(--text-muted);display:flex;flex-direction:column;gap:3px;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.ch-info-panel{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ch-info-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ch-avatar{width:40px;height:40px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:18px;font-family:var(--mono);font-weight:700;color:var(--accent);flex-shrink:0;}
.ch-info-name{font-size:14px;font-weight:600;}
.ch-info-id{font-size:11px;color:var(--text-muted);font-family:var(--mono);}
.ch-info-count{font-size:11px;color:var(--text-muted);margin-top:8px;}
.queue-panel{flex:1;overflow-y:auto;padding:12px;}
.queue-panel::-webkit-scrollbar{width:4px;}
.queue-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.queue-label{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;}
.qcard{display:flex;gap:8px;padding:8px;border-radius:8px;cursor:pointer;transition:background .15s;align-items:flex-start;margin-bottom:2px;}
.qcard:hover{background:var(--bg);}
.qcard.playing{background:var(--accent-light);}
.qcard-thumb{position:relative;flex-shrink:0;width:96px;aspect-ratio:16/9;border-radius:5px;background:#dde0e6;overflow:hidden;}
.qcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.qcard-thumb-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:#b0b4bc;}
.qcard-info{flex:1;min-width:0;}
.qcard-title{font-size:12px;font-weight:500;line-height:1.45;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
.qcard.playing .qcard-title{color:var(--accent);}
.qcard-meta{font-size:11px;color:var(--text-muted);}
.now-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:4px;vertical-align:middle;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.empty{text-align:center;padding:40px 12px;color:var(--text-muted);}
.empty-icon{font-size:30px;opacity:.35;margin-bottom:10px;}
.error-msg{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;color:#dc2626;font-size:13px;margin-bottom:12px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{border-radius:4px;background:linear-gradient(90deg,#f0f1f4 25%,#e5e7eb 50%,#f0f1f4 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.vrow{animation:fadeUp .22s ease both;}
.qcard{animation:fadeUp .22s ease both;}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-bar"></div>hihaho Player</div>
  <div class="playlist-title" id="playlistTitleHeader">読み込み中...</div>
  <div class="ch-tabs" id="chTabs"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="動画を検索…" oninput="onSearch(this.value)">
  </div>
  <button class="debug-btn" onclick="copyConsole()">📋 console</button>
</header>

<div class="layout">
  <div class="main-area">
    <div class="player-wrap" id="playerWrap">
      <div class="player-placeholder" id="placeholder">
        <div class="player-placeholder-icon">▶</div>
        <p>動画を選択して再生</p>
      </div>
      <div class="player-spinner" id="spinner"><div class="spinner-ring"></div></div>
    </div>
    <div class="info-bar">
      <div class="info-title" id="nowTitle">動画を選択してください</div>
      <div class="info-meta" id="nowMeta"><span>—</span></div>
    </div>
    <div class="video-list">
      <div class="list-label" id="listLabel">読み込み中...</div>
      <div id="videoGrid">
        <div style="display:flex;gap:12px;background:#fff;border:1px solid #f0f1f4;border-radius:10px;padding:10px;margin-bottom:8px">
          <div class="skel" style="width:128px;aspect-ratio:16/9;border-radius:6px"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px">
            <div class="skel" style="height:13px;width:80%"></div>
            <div class="skel" style="height:13px;width:55%"></div>
            <div class="skel" style="height:13px;width:35%"></div>
          </div>
        </div>
        <div style="display:flex;gap:12px;background:#fff;border:1px solid #f0f1f4;border-radius:10px;padding:10px;margin-bottom:8px">
          <div class="skel" style="width:128px;aspect-ratio:16/9;border-radius:6px"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px">
            <div class="skel" style="height:13px;width:70%"></div>
            <div class="skel" style="height:13px;width:45%"></div>
            <div class="skel" style="height:13px;width:30%"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <aside class="sidebar">
    <div class="ch-info-panel" id="chInfoPanel">
      <div class="ch-info-head">
        <div class="ch-avatar">…</div>
        <div><div class="ch-info-name">読み込み中</div><div class="ch-info-id">—</div></div>
      </div>
    </div>
    <div class="queue-panel" id="queuePanel">
      <div class="queue-label">ラインナップ</div>
    </div>
  </aside>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc, getDocs, collection }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const fbApp = initializeApp({
  apiKey:"AIzaSyDPlsAhtxbJBihy-EAHck9P7XbuMdzV0ds",
  authDomain:"cc-dev-ps7.firebaseapp.com",
  projectId:"cc-dev-ps7",
  storageBucket:"cc-dev-ps7.firebasestorage.app",
  messagingSenderId:"1029579090333",
  appId:"1:1029579090333:web:5a2ea499fec97c497f2774"
});
const db = getFirestore(fbApp);

const WORKER = 'https://hihaho-proxy.jumpei-omote.workers.dev';
const TBASE  = 'https://cc-dev-ps7.web.app/hihaho-player/thumbs';
const TEXT   = 'jpg';

// ★ 公開する動画のstatusフィルタ
// 1 = 公開（リンクを知っている人のみ / 全て）
// 2 = インタラクティブ（公開済み）
const ALLOWED_STATUS = [1, 2];

const STATUS = {
  1: {label:'PUBLISHED',   cls:'badge badge-pub'},
  2: {label:'INTERACTIVE', cls:'badge'},
};

let allGroups=[], allVideos=[], metaMap={}, activeGrpId=null, activeVidId=null, searchQ='', clog=[];

const ol=console.log.bind(console);
console.log=(...a)=>{ol(...a);clog.push(a.join(' '));};
const log=m=>console.log('[player] '+m);

async function apiFetch(p){
  const r=await fetch(WORKER+p,{headers:{Accept:'application/json'}});
  if(!r.ok) throw new Error('API '+r.status);
  return r.json();
}

async function init(){
  const playlistId=new URLSearchParams(location.search).get('id');
  if(!playlistId){showError('プレイリストIDが指定されていません。<br>管理画面で公開URLを発行してください。');return;}
  log('プレイリスト: '+playlistId);
  try{
    const pSnap=await getDoc(doc(db,'playlists',playlistId));
    if(!pSnap.exists()){showError('プレイリストが見つかりません。URLを確認してください。');return;}
    const playlist=pSnap.data();
    document.title=playlist.name+' | hihaho Player';
    document.getElementById('playlistTitleHeader').textContent=playlist.name;

    // video_meta取得
    const metaSnap=await getDocs(collection(db,'video_meta'));
    metaSnap.forEach(d=>{metaMap[d.id]=d.data();});

    if(playlist.type==='folder') await loadFolderPlaylist(playlist);
    else await loadCustomPlaylist(playlist);
  }catch(e){
    console.error(e.message);
    showError('読み込みエラー: '+e.message);
  }
}

// フォルダ単位プレイリスト
async function loadFolderPlaylist(playlist){
  const folderIds=playlist.folderIds||[];
  const fRes=await apiFetch('/v2/video-container');
  const folderMap={};
  (fRes.data||[]).forEach(f=>{folderMap[f.id]=f;});

  const videoResults=await Promise.all(
    folderIds.map(id=>apiFetch('/v2/video?video_container_id='+id))
  );

  allGroups=folderIds.map((id,i)=>({
    id:'f'+id,
    name:folderMap[id]?.name||'フォルダ '+id,
    // ★ statusフィルタ適用
    videos:(videoResults[i]?.data||[]).filter(v=>ALLOWED_STATUS.includes(v.status)),
  })).filter(g=>g.videos.length>0);

  allVideos=allGroups.flatMap(g=>g.videos);
  log('フォルダ: '+allGroups.length+'件 / 動画: '+allVideos.length+'件（公開のみ）');
  finishLoad();
}

// カスタムプレイリスト
async function loadCustomPlaylist(playlist){
  const videoIds=playlist.videoIds||[];
  const res=await apiFetch('/v2/video');
  const all=res.data||[];
  // ★ IDフィルタ + statusフィルタ両方適用
  const selected=all.filter(v=>videoIds.includes(v.id)&&ALLOWED_STATUS.includes(v.status));
  allGroups=[{id:'custom',name:playlist.name,videos:selected}];
  allVideos=selected;
  log('カスタム動画: '+allVideos.length+'件（公開のみ）');
  finishLoad();
}

function finishLoad(){
  if(!allGroups.length){showError('表示できる公開動画がありません。');return;}
  activeGrpId=allGroups[0].id;
  renderTabs();renderSidebar();renderGrid();
  log('読み込み完了');
}

function renderTabs(){
  if(allGroups.length<=1){document.getElementById('chTabs').innerHTML='';return;}
  document.getElementById('chTabs').innerHTML=allGroups.map(g=>
    `<button class="ch-tab ${g.id===activeGrpId?'active':''}" onclick="selectGrp('${g.id}')">
      ${esc(g.name)} <span style="opacity:.6;font-size:10px">${g.videos.length}</span>
    </button>`).join('');
}

window.selectGrp=function(id){
  activeGrpId=id;searchQ='';
  document.getElementById('searchInput').value='';
  renderTabs();renderSidebar();renderGrid();
};

function renderSidebar(){
  const grp=curGrp();if(!grp)return;
  const videos=filteredVideos();
  const initial=(grp.name||'?').charAt(0).toUpperCase();
  document.getElementById('chInfoPanel').innerHTML=`
    <div class="ch-info-head">
      <div class="ch-avatar">${initial}</div>
      <div>
        <div class="ch-info-name">${esc(grp.name)}</div>
        <div class="ch-info-id">${grp.videos.length} 本</div>
      </div>
    </div>`;
  document.getElementById('queuePanel').innerHTML='<div class="queue-label">ラインナップ</div>'+
    (videos.length===0
      ?'<div class="empty"><div class="empty-icon">🔍</div><p>見つかりません</p></div>'
      :videos.map((v,i)=>`
        <div class="qcard ${v.id===activeVidId?'playing':''}" style="animation-delay:${i*25}ms" onclick="play(${v.id})">
          <div class="qcard-thumb">${thumbHtml(v.uuid,'q')}</div>
          <div class="qcard-info">
            <div class="qcard-title">${v.id===activeVidId?'<span class="now-dot"></span>':''}${esc(v.display_name)}</div>
            <div class="qcard-meta">${fmt(v.created_at)}</div>
          </div>
        </div>`).join(''));
}

function renderGrid(){
  const grp=curGrp();if(!grp)return;
  const videos=filteredVideos();
  document.getElementById('listLabel').textContent=
    searchQ?`「${searchQ}」 ${videos.length}件`:`${grp.name}（${videos.length}本）`;
  const g=document.getElementById('videoGrid');
  if(!videos.length){g.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>動画が見つかりませんでした</p></div>';return;}
  g.innerHTML=videos.map((v,i)=>{
    const st=STATUS[v.status]||{};
    return `
      <div class="vrow ${v.id===activeVidId?'playing':''}" style="animation-delay:${i*25}ms" onclick="play(${v.id})">
        <div class="vrow-thumb">
          ${thumbHtml(v.uuid,'v')}
          <div class="vrow-play-ov">
            <div class="play-circle">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="#333"><path d="M4 2.5l6 3.5-6 3.5z"/></svg>
            </div>
          </div>
        </div>
        <div class="vrow-info">
          <div class="vrow-title">${v.id===activeVidId?'<span class="now-dot"></span>':''}${esc(v.display_name)}</div>
          <div class="vrow-meta">
            <span>${fmt(v.created_at)}</span>
            ${st.cls?`<span class="${st.cls}">${st.label}</span>`:''}
          </div>
        </div>
      </div>`;
  }).join('');
}

window.play=function(id){
  const vid=allVideos.find(v=>v.id===id);if(!vid)return;
  activeVidId=id;
  log('再生: '+vid.display_name);
  const wrap=document.getElementById('playerWrap');
  document.getElementById('placeholder').style.display='none';
  document.getElementById('spinner').classList.add('show');
  wrap.querySelector('iframe')?.remove();
  const iframe=document.createElement('iframe');
  iframe.src='https://player.hihaho.com/embed/'+vid.uuid;
  iframe.allow='autoplay; fullscreen';
  iframe.allowFullscreen=true;
  iframe.onload=()=>{document.getElementById('spinner').classList.remove('show');log('完了: '+vid.uuid);};
  wrap.appendChild(iframe);
  const st=STATUS[vid.status]||{};
  document.getElementById('nowTitle').innerHTML=
    esc(vid.display_name)+(st.cls?` <span class="${st.cls}">${st.label}</span>`:'');
  document.getElementById('nowMeta').innerHTML=
    `<span>${curGrp()?.name||''}</span><span class="dot">·</span><span>${fmt(vid.created_at)}</span>
     <span class="dot">·</span><span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${vid.uuid.slice(0,8)}…</span>`;
  renderSidebar();renderGrid();
};

function thumbHtml(uuid,type){
  const meta=metaMap[uuid]||{};
  const url=meta.thumbnailUrl||`${TBASE}/${uuid}.${TEXT}`;
  const fb=type==='v'?'vrow-thumb-fb':'qcard-thumb-fb';
  return `<img src="${url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
    <div class="${fb}" style="display:none">🎬</div>`;
}

window.onSearch=q=>{searchQ=q.trim();renderGrid();renderSidebar();};
const curGrp=()=>allGroups.find(g=>g.id===activeGrpId);
const filteredVideos=()=>{
  const vs=curGrp()?.videos||[];
  if(!searchQ)return vs;
  const q=searchQ.toLowerCase();
  return vs.filter(v=>v.display_name.toLowerCase().includes(q)||(v.description||'').toLowerCase().includes(q));
};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=d=>d?new Date(d).toLocaleDateString('ja-JP'):'—';

function showError(msg){
  document.getElementById('videoGrid').innerHTML=`<div class="error-msg">⚠️ ${msg}</div>`;
  document.getElementById('listLabel').textContent='エラー';
  document.getElementById('playlistTitleHeader').textContent='エラー';
}

window.copyConsole=()=>navigator.clipboard.writeText(clog.join('\n')||'（ログなし）').then(()=>alert('コピーしました'));

init();
</script>
</body>
</html>
