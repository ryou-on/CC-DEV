<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>note画像生成ツール v0.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
    select option { background: #111827; }
    textarea { font-family: ui-monospace, monospace; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<!-- Settings Modal -->
<div id="modalSettings" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-lg shadow-2xl">
    <h2 class="text-lg font-bold mb-5">⚙️ API設定</h2>
    <div class="space-y-4">
      <div>
        <label class="text-sm text-gray-400 block mb-1.5">Anthropic APIキー <span class="text-purple-400 text-xs">(プロンプト生成)</span></label>
        <input id="inp_anthropicKey" type="password" placeholder="sk-ant-api03-..."
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"/>
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1.5">OpenAI APIキー <span class="text-blue-400 text-xs">(GPT Image 1.5)</span></label>
        <input id="inp_openaiKey" type="password" placeholder="sk-..."
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1.5">Google AI APIキー <span class="text-green-400 text-xs">(Gemini Imagen)</span></label>
        <input id="inp_geminiKey" type="password" placeholder="AIza..."
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"/>
      </div>
      <p class="text-xs text-gray-600">キーはlocalStorageに保存されます。外部サーバーには送信されません。</p>
    </div>
    <div class="flex gap-3 mt-6">
      <button onclick="saveSettings()" class="flex-1 bg-blue-600 hover:bg-blue-500 rounded-xl py-2.5 font-semibold text-sm transition">保存</button>
      <button onclick="closeModal('modalSettings')" class="flex-1 bg-gray-700 hover:bg-gray-600 rounded-xl py-2.5 font-semibold text-sm transition">閉じる</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div class="max-w-5xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">📝 note画像生成ツール</h1>
      <p class="text-gray-600 text-sm mt-1">Claude → プロンプト最適化 → ヘッダー3案 + 記事内画像 + タグ提案</p>
    </div>
    <button onclick="openModal('modalSettings')"
      class="bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl px-4 py-2 text-sm transition flex items-center gap-2">
      ⚙️ 設定
      <span id="keyStatus" class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>
    </button>
  </div>

  <!-- Input Card -->
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-4 space-y-4">

    <!-- Engine Selector -->
    <div class="flex gap-2 p-1 bg-gray-800 rounded-xl w-fit">
      <button id="eng_dalle" onclick="setEngine('dalle')"
        class="px-4 py-1.5 rounded-lg text-sm font-medium transition bg-blue-700 text-white">
        GPT Image 1.5
      </button>
      <button id="eng_gemini" onclick="setEngine('gemini')"
        class="px-4 py-1.5 rounded-lg text-sm font-medium transition text-gray-400 hover:text-gray-200">
        Imagen 4
      </button>
      <button onclick="listGeminiModels()"
        class="px-3 py-1.5 rounded-lg text-xs font-medium transition text-gray-600 hover:text-gray-300" title="利用可能なGeminiモデルを確認">
        🔍
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1.5 font-medium">記事タイトル / テーマ</label>
        <input id="inp_title" type="text" placeholder="例: AIと人間の役割分担"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-gray-700"/>
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1.5 font-medium">テンプレートから選ぶ</label>
        <select id="inp_template" onchange="applyTemplate(this.value)"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-300">
          <option value="">── テンプレートを選択 ──</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm text-gray-400 mb-1.5 font-medium">
        シーン説明 <span class="text-gray-600 font-normal text-xs">(日本語で自由記述 — テンプレート選択で自動入力)</span>
      </label>
      <textarea id="inp_scene" rows="6"
        placeholder="例: ロビーがノートパソコンの前で目を丸くしている場面。画面には動画プレーヤーが表示されていて、動画の中からインタラクティブなメニューが飛び出してきている演出..."
        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder-gray-700 resize-none leading-relaxed"></textarea>
    </div>

    <div class="flex gap-3 pt-1">
      <button onclick="runGeneratePrompts()" id="btn_genPrompt"
        class="flex-1 bg-purple-700 hover:bg-purple-600 rounded-xl py-3 font-semibold text-sm transition flex items-center justify-center gap-2">
        🤖 AIプロンプト生成 + タグ提案
      </button>
      <button onclick="runGenerateAll()" id="btn_genImages"
        class="flex-1 bg-blue-700 hover:bg-blue-600 rounded-xl py-3 font-semibold text-sm transition flex items-center justify-center gap-2">
        🎨 全案を一括生成
      </button>
    </div>
  </div>

  <!-- Prompt Preview -->
  <div id="sec_prompts" class="hidden bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-4">

    <!-- Tags -->
    <div id="sec_tags_preview" class="mb-5 hidden">
      <div class="flex items-center justify-between mb-2">
        <h3 class="font-semibold text-yellow-400 text-sm">🏷️ 推奨タグ</h3>
        <button onclick="copyTags()" class="text-xs bg-gray-700 hover:bg-gray-600 rounded-lg px-3 py-1 transition">📋 全タグコピー</button>
      </div>
      <div id="list_tags" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Header prompts -->
    <div class="mb-5">
      <h3 class="font-semibold text-blue-400 text-sm mb-3">🖼️ メインヘッダー画像 (3案)</h3>
      <div id="list_header_prompts" class="space-y-3"></div>
    </div>

    <!-- Article image prompts -->
    <div id="sec_article_prompts_wrapper" class="hidden">
      <h3 class="font-semibold text-green-400 text-sm mb-3">📸 記事内画像</h3>
      <div id="list_article_prompts" class="space-y-4"></div>
    </div>

    <!-- Generate button -->
    <div class="mt-5 pt-4 border-t border-gray-800">
      <button onclick="runGenerateImagesFromPrompts()"
        class="w-full bg-blue-700 hover:bg-blue-600 rounded-xl py-2.5 text-sm font-semibold transition">
        🎨 この内容で全画像を生成
      </button>
    </div>
  </div>

  <!-- Image Results -->
  <div id="sec_images" class="hidden mb-4">
    <h2 class="font-semibold text-gray-300 text-sm mb-4">生成結果</h2>

    <!-- Header images -->
    <div class="mb-6">
      <h3 class="text-xs text-blue-400 font-medium mb-2 flex items-center gap-1">
        🖼️ メインヘッダー画像
        <span id="lbl_headerCount" class="text-gray-600 font-normal"></span>
      </h3>
      <div id="grid_header_images" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <!-- Article image groups -->
    <div id="sec_article_image_groups"></div>
  </div>

  <!-- Log -->
  <div class="mt-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs text-gray-700 font-medium">実行ログ</span>
      <button onclick="copyLogs()" class="text-xs text-gray-600 hover:text-gray-400 bg-gray-900 border border-gray-800 px-2.5 py-1 rounded-lg transition">
        📋 コピー
      </button>
    </div>
    <div id="area_log" class="bg-gray-900 border border-gray-800 rounded-xl p-3 text-xs text-gray-600 font-mono h-28 overflow-y-auto space-y-0.5"></div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// CHARACTER & STYLE DEFINITIONS
// ─────────────────────────────────────────────
const CLAUDE_SYSTEM = `You are "note Banner Maker", an expert image prompt writer for Japanese anime SD (chibi) style blog illustrations.

Generate English image prompts to create note.com article images at aspect ratio 1.91:1 (landscape).

## MANDATORY STYLE (append verbatim to every prompt):
"Japanese anime SD chibi illustration style, bold clean black outlines, flat cel-shading with subtle 3D depth, expressive cute chibi eyes, 2.5-head-ratio chibi body proportions, bright clean background matching the article theme, no watermarks, no logos, no complex Japanese text, professional commercial illustration quality, landscape 1.91:1 aspect ratio"

## CHARACTER DEFINITIONS (reproduce faithfully):

**Yoshio (よしお)** — Use for: business, lifehack, IT, education, daily life, cooking
- Middle-aged Japanese chibi male, neat short straight black hair, black rectangular glasses
- Warm friendly smile, approachable expression
- Outfit A (business): navy blue suit with light green striped tie, brown oxford shoes
- Outfit B (casual/craft): dark olive green craftsman apron over white shirt, hihaho badge lanyard

**Robby (ロビー)** — Use for: technology, music, gadgets, creative, tea ceremony
- Cool Japanese chibi male, very voluminous wavy-messy dark black hair with natural lift
- Short stubble beard with small chin goatee, brown eyes
- Outfit A (cool): black mock-neck turtleneck sweater, black slim pants, black New Balance 574 sneakers
- Outfit B (casual): gray pullover hoodie, black slim pants, black New Balance 574 sneakers
- Outfit C (tech): black outfit with gaming headset

**Masami (まさみ)** — Use for: career, mental health, education, lifestyle, women's content
- Soft approachable Japanese chibi female, dark brown semi-long hair (slightly past shoulders, naturally straight)
- Gentle warm expression, calm professional demeanor
- Outfit: black button-up cardigan over dark crimson/wine-red ribbed turtleneck sweater, dark navy jeans, white canvas sneakers

## BACKGROUND GUIDELINES (match article genre):
- Education / training → bright classroom, teacher's room, or lecture hall
- Business / office → clean meeting room, modern office, glass-walled office
- Technology / gadgets → dark tech lab, glowing screen environment
- Lifestyle / cooking → warm kitchen, cozy café
- Creative / music → studio, creative workspace
- Default → bright minimal gradient background (white to light blue or light warm)

## STRICT RULES:
- Never show shoes or footwear as a standalone object
- No complex Japanese text in images (short English labels OK only if requested)
- Character outfits must match the definitions above exactly
- Choose the most appropriate character based on article genre
- Props and poses must reflect the article theme (PC, book, coffee, gadgets, etc.)

## TASK:
Read the Japanese article title and scene description.
1. Decide which character(s) best fit the genre.
2. Generate 3 header image prompts (landscape 1.91:1) — subtle variations of the same scene (angle, expression, or composition).
3. Generate 2–3 in-article image scenes, each with 2 prompt variations. These should be DIFFERENT scenes from the header — supporting illustrations that work mid-article (e.g., close-up, action shot, result/outcome scene).
4. Generate 6–8 relevant Japanese hashtags for note.com (starting with #, mix of broad and niche tags).

Always append the MANDATORY STYLE to every image prompt.

Return ONLY valid JSON with no markdown fences:
{"header_prompts":["prompt1","prompt2","prompt3"],"article_images":[{"title":"シーン名1","prompts":["prompt1","prompt2"]},{"title":"シーン名2","prompts":["prompt1","prompt2"]},{"title":"シーン名3","prompts":["prompt1","prompt2"]}],"tags":["#タグ1","#タグ2","#タグ3","#タグ4","#タグ5","#タグ6","#タグ7","#タグ8"]}`;

// ─────────────────────────────────────────────
// TEMPLATES
// ─────────────────────────────────────────────
const TEMPLATES = [
  { id:'01', title:'01 ビフォーアフター：LP動画エンゲージメント', scene:`ビフォーアフターの左右分割イラスト（16:9）。左側（BEFORE）：ロビーがノートパソコンでLPを見ている場面。画面には普通の紹介動画が再生されているが、再生バーが途中で止まっている。ロビーは頬杖をついて困り顔。背景にグラフが右肩下がりのモニター。全体的にグレーっぽいトーン。右側（AFTER）：まさみがノートパソコンの前に座っている場面。画面にはインタラクティブ動画が表示されていて、CTAボタンが光っている。まさみは陶器カップを片手に余裕の表情。背景にグラフが右肩上がり（134%↑）のモニター。キラキラエフェクト。よしおが後ろで「おお！」と驚いた表情でモニターを指差している。真ん中に点線の縦ラインで区切り。` },
  { id:'02', title:'02 AIと人間の役割分担', scene:`まさみの隣に、頭脳を象徴するAIロボット（人型ではなく、光る球体に顔がある親しみやすいデザイン）が浮かんでいる。AIロボットの周りには数式、データ、検索結果のアイコンが回転している。一方、まさみの頭上には天秤のアイコンと「A↔B」の選択矢印が浮かんでいる。まさみはAIロボットと横に並んで前を見つめ、パートナーシップを感じさせる堂々とした表情。背景は近未来的なオフィス、青と白のクリーンなトーン。16:9。` },
  { id:'03', title:'03 消防士の訓練：座学 vs インタラクティブ動画', scene:`画面を左右に分割した対比イラスト。左側：よしおが机に向かって紙のテストを解いている場面。ゆったりした雰囲気。よしおはアゴに手を当てて「うーん、Bかな」と余裕で考え込んでいる。頭の上に時計が「30分経過」を示している。右側：よしおがモニターの前で目を見開いている場面。画面には火災現場の映像とカウントダウンタイマー「00:03」。よしおは汗をかきながら必死に選択肢を選ぼうとしている。左側はのんびりした暖色、右側は赤みがかった緊迫トーン。16:9。` },
  { id:'04', title:'04 360度パイロット体験ヘッダー', scene:`ロビーがパイロットのヘッドセットを付けて、大きなモニターの前に座っている場面。モニターにはコックピットからの360度パノラマ映像が映っていて、雲の上の壮大な景色が広がっている。画面の上にクイズのポップアップ「WHAT NOW?」と選択肢ボタンが2つ表示されている。ロビーは目を輝かせてモニターに見入っている興奮した表情。ロビーの周りに矢印アイコン（←→）がぐるっと回る演出。暗めの背景に画面の光が映える映画的な雰囲気。16:9。` },
  { id:'05', title:'05 採点の山に埋もれるよしお', scene:`よしおが大量の答案用紙の山に囲まれて机に座っている場面。答案用紙は机の上だけでなく床にも積み上がっていて、よしおの顔が紙の山から半分だけ見えている状態。よしおは赤ペンを持って採点しているが、疲弊しきった表情で目の下にクマがある。机の上の時計は深夜を示している。答案用紙の山の向こう側に、パソコン画面が光っていて「AI自動採点：完了」のメッセージが表示されているが、よしおはそれに気づいていない。暗めの照明。16:9。` },
  { id:'06', title:'06 迷いの波形が宝になるグラフ', scene:`まさみが大きなモニターの前に立っている場面。モニターには受講者ごとの「回答時間」の波形グラフが表示されている。グラフは心電図のように上下しているが、波形の山の部分（迷った部分）がキラキラと光っていて、宝石のようにハイライトされている。波形の谷の部分（即答）は暗くくすんでいる。まさみはグラフの光る山を指差しながら、発見の表情。背景はダークトーンのオフィス。16:9。` },
  { id:'07', title:'07 iFrameで動画からWebが飛び出す', scene:`ロビーが大きなモニターの前で腕組みをして満足げに立っている場面。モニターには動画が再生されていて、動画の中からWebページの要素が飛び出してきている演出。カレンダー、地図、フォーム、3Dモデル、電卓のアイコンが動画の画面枠を突き破るように浮かび上がっている。ロビーは両手を広げて驚きと興奮の表情。背景はダークトーン、画面から溢れる光がカラフルに照らしている。16:9。` },
  { id:'08', title:'08 採用動画の職種選択', scene:`ロビーがスマホを持って採用動画を見ている場面。スマホの画面には企業紹介動画が再生されていて、画面上に「研究・開発」「設計・施工」「営業」「管理部門」の4つの選択肢ボタンが並んでいる。ロビーの背後に、スーツ姿の若い社員、白衣の研究者、ヘルメットをかぶった施工管理者のシルエットがうっすら見えて、「どの道を選ぶ？」という雰囲気。ロビーは真剣に画面を見つめている表情。明るく爽やかなトーン。16:9。` },
  { id:'09', title:'09 コンテンツ制作ノウハウの転用', scene:`画面左側に「教育コンテンツ制作ノウハウ」と書かれた大きなツールボックスが描かれている。ツールボックスから矢印が2本伸びていて、上の矢印の先に「大学・専門学校」のアイコン、下の矢印の先に「企業研修・資格スクール」のアイコン。2つのアイコンの上にインタラクティブ動画プレーヤーのアイコンが重なっていて「新技術との組み合わせで差別化」のラベルが付いている。ロビーがツールボックスの横に立って、気づきの表情でガッツポーズ。白背景、フラットデザイン。16:9。` },
  { id:'10', title:'10 動画の中から問題が飛び出す', scene:`大きな動画プレーヤーが画面中央に表示されていて、動画が再生されている途中で一時停止した場面。動画の画面から「？」マークが3D的に飛び出してきていて、画面の枠を突き破るような迫力のある演出。飛び出した「？」の周りに選択肢A・B・Cのボタンが光りながら浮かんでいる。動画プレーヤーの前にロビーが座っていて、「？」マークが飛び出してきたことに驚きながらも前のめりになっている表情。背景はダークトーンの教室。16:9。` },
  { id:'11', title:'11 アダプティブラーニングの分岐フロー', scene:`画面上部に動画プレーヤーのアイコンと「確認問題」のボックスが描かれている。ボックスから2本の矢印が下に伸びている。左の矢印「✓ 正解」→ 緑色の道、道の先に「次のトピックへ進む」の動画アイコン。右の矢印「✗ 誤答」→ オレンジ色の道、道の先に「補足説明動画を視聴」の動画アイコン。補足動画の後、再び「確認問題」に戻る矢印。2本の道の終点が合流して同じゴールに到達。ロビーとまさみが2本の道のそれぞれを歩いていて最後に同じゴールで合流している。白背景、緑とオレンジの配色。16:9。` },
  { id:'12', title:'12 Googleスライドが動画に変わる発見', scene:`ロビーがノートパソコンの前に座っている場面。パソコンの画面にはGoogleスライドのプレゼン資料が表示されていて、メニューから「動画にする」ボタンが光ってハイライトされている。画面から矢印が伸びて、その先に完成した動画プレーヤーがぽんと出現している演出。ロビーは「え、これだけで動画になるの？」と目を丸くして驚いている表情。明るいオフィス背景、発見の瞬間を捉えた雰囲気。16:9。` },
  { id:'13', title:'13 AI停滞層に光を届ける', scene:`オフィスのフロアに社員のシルエットが10人ほど並んでいる場面。そのうち2〜3人だけがカラフルに光っていて（積極層）、残りの7〜8人はグレーアウトして立ち止まっている（停滞層）。グレーの社員たちの頭上に「？」マークが浮かんでいる。フロアの中央にロビーが立っていて、手にタブレットを持ち上げている。タブレットの画面から光の線が放射状にグレーの社員たちに伸びていて、光が当たった社員が少しずつカラフルになり始めている演出。青とオレンジのコントラスト。16:9。` },
  { id:'14', title:'14 暗黙知継承：工房の1枚シーン', scene:`工房の作業台を中心にした1枚のシーンイラスト。画面中央によしおが作業台で手作業をしている。よしおの手元にズームサークルが3つ浮かんでいて、それぞれ「指の角度」「手首の返し」「目線」をクローズアップしている。作業台の部品から音声波形が立ち上っていて、緑の波形（正常）と赤の波形（異常）が並んでいる。よしおの横にビデオカメラが置いてあり、録画中の赤いランプが点灯している。温かい工房の照明、職人的な雰囲気。16:9。` },
  { id:'15', title:'15「聞くだけ」vs「考えながら聞く」の脳内対比', scene:`画面を左右に分割した対比イラスト。左側（見るだけ授業）：ロビーがソファに横たわって動画を見ている。目は半開きで、頭の中（頭のシルエット内部）は真っ白でがらんどう。情報が頭の上をすり抜けて消えていく演出。上部ラベル「見るだけ授業」、足元に「記憶定着：低」。右側（考える授業）：同じロビーが前のめりで画面を見ている。頭の中にニューロンが光りながら繋がっていく演出。画面には動画の途中に「？」のクイズが表示されていてロビーが選択肢を指差している。上部ラベル「考える授業」、足元に「記憶定着：3倍」。左はグレーで眠そうなトーン、右は青白く活気のある雰囲気。16:9。` },

let generatedHeaderPrompts = ['', '', ''];
let generatedArticleScenes = []; // [{title, prompts:[p1,p2]}, ...]

let settings = { anthropicKey: '', openaiKey: '', geminiKey: '' };

function init() {
  settings.anthropicKey = localStorage.getItem('nig_anthropic') || '';
  settings.openaiKey    = localStorage.getItem('nig_openai')    || '';
  settings.geminiKey    = localStorage.getItem('nig_gemini')    || '';

  updateKeyStatus();

function updateKeyStatus() {
  const hasPrompt = !!settings.anthropicKey;
  const hasImage  = engine === 'dalle' ? !!settings.openaiKey : !!settings.geminiKey;
  document.getElementById('keyStatus').className =
    `w-2 h-2 rounded-full inline-block ${hasPrompt && hasImage ? 'bg-green-500' : 'bg-red-500'}`;

function setEngine(e, save = true) {
  engine = e;
  if (save) localStorage.setItem('nig_engine', e);

  const geminiBtn = document.getElementById('eng_gemini');

    geminiBtn.className = 'px-4 py-1.5 rounded-lg text-sm font-medium transition text-gray-400 hover:text-gray-200';
  } else {
    geminiBtn.className = 'px-4 py-1.5 rounded-lg text-sm font-medium transition bg-green-700 text-white';

}

function openModal(id) {
  if (id === 'modalSettings') {
    document.getElementById('inp_anthropicKey').value = settings.anthropicKey;
    document.getElementById('inp_openaiKey').value    = settings.openaiKey;
    document.getElementById('inp_geminiKey').value    = settings.geminiKey;
  }
  document.getElementById(id).classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function saveSettings() {
  settings.anthropicKey = document.getElementById('inp_anthropicKey').value.trim();
  settings.openaiKey    = document.getElementById('inp_openaiKey').value.trim();
  settings.geminiKey    = document.getElementById('inp_geminiKey').value.trim();

function populateTemplates() {
  const sel = document.getElementById('inp_template');
  TEMPLATES.forEach(t => {

function applyTemplate(id) {

  const t = TEMPLATES.find(x => x.id === id);

  document.getElementById('inp_title').value = t.title.replace(/^\d+ /, '');

}

// ─────────────────────────────────────────────
// PROMPT GENERATION (Claude → Gemini fallback)
// ─────────────────────────────────────────────
async function generatePromptText(userMsg) {
  // 1st: Claude
  if (settings.anthropicKey) {
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': settings.anthropicKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4000,
          system: CLAUDE_SYSTEM,
          messages: [{ role: 'user', content: userMsg }]
        })
      });
      if (res.ok) {
        const data = await res.json();
        log('✅ Claude で生成しました');
        return data.content[0].text;
      }
      const err = await res.json().catch(() => ({}));
      log(`⚠️ Claude 失敗 → Gemini にフォールバック: ${err.error?.message || res.status}`);
    } catch(e) {
      log(`⚠️ Claude エラー → Gemini にフォールバック: ${e.message}`);
    }
  }
  // 2nd: Gemini (複数モデルでフォールバック)
  if (!settings.geminiKey) throw new Error('AnthropicもGeminiもAPIキーが設定されていません');
  const textModels = ['gemini-2.0-flash-lite', 'gemini-2.5-flash-lite', 'gemini-2.0-flash', 'gemini-2.5-flash', 'gemini-2.5-pro'];
  for (const model of textModels) {
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${settings.geminiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: CLAUDE_SYSTEM }] },
            contents: [{ parts: [{ text: userMsg }] }],
            generationConfig: { responseMimeType: 'application/json' }
          })
        }
      );
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        log(`⚠️ ${model} 失敗 → 次を試します: ${(err.error?.message || res.status).toString().slice(0, 60)}`);
        continue;
      }
      const data = await res.json();
      log(`✅ ${model} で生成しました`);
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    } catch(e) {
      log(`⚠️ ${model} エラー → 次を試します`);
    }
  }
  throw new Error('Gemini: 全モデルが失敗しました。しばらく待ってから再試行してください');
}

// ─────────────────────────────────────────────
// IMAGE API (router + 自動フォールバック)
// ─────────────────────────────────────────────
async function callImageAPI(prompt) {
  // 選択エンジンを先に試す
  try {
    if (engine === 'gemini' && settings.geminiKey) return await callGeminiImagen(prompt);
    if (engine === 'dalle'  && settings.openaiKey)  return await callDallE(prompt);
  } catch(e) {
    log(`⚠️ ${engine === 'gemini' ? 'Gemini' : 'GPT Image'} 失敗 → 反対エンジンで再試行: ${e.message.slice(0,60)}`);
  }
  // 反対エンジンにフォールバック
  if (engine === 'gemini' && settings.openaiKey) {
    log('🔄 GPT Image 1.5 にフォールバック');
    return await callDallE(prompt);
  }
  if (engine === 'dalle' && settings.geminiKey) {
    log('🔄 Gemini Imagen にフォールバック');
    return await callGeminiImagen(prompt);
  }
  throw new Error('全エンジンが失敗しました。APIキーと残高を確認してください');
}

// ─────────────────────────────────────────────
// GPT Image 1.5 API
// ─────────────────────────────────────────────
async function callDallE(prompt) {
  const res = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${settings.openaiKey}`
    },
    body: JSON.stringify({
      model: 'gpt-image-1.5',
      prompt,
      n: 1,
      size: '1536x1024',
      quality: 'high',
      output_format: 'png'
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`GPT Image 1.5: ${err.error?.message || res.status}`);
  }
  const data = await res.json();
  const b64 = data.data[0].b64_json;
  return { url: `data:image/png;base64,${b64}`, revised: null };
}

// ─────────────────────────────────────────────
// GEMINI LIST MODELS (diagnostic)
// ─────────────────────────────────────────────
async function listGeminiModels() {
  if (!settings.geminiKey) { alert('Google AI APIキーを設定してください'); openModal('modalSettings'); return; }
  log('🔍 利用可能なGeminiモデルを取得中...');
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models?key=${settings.geminiKey}`
    );
    const data = await res.json();
    const imageModels = (data.models || []).filter(m =>
      m.name.includes('image') || m.supportedGenerationMethods?.includes('generateContent')
    );
    log(`📋 画像関連モデル: ${imageModels.map(m => m.name.replace('models/','')).join(', ') || 'なし'}`);
    log(`📋 全モデル数: ${data.models?.length || 0} (ログをコピーして確認)`);
    console.table(data.models?.map(m => ({ name: m.name, methods: m.supportedGenerationMethods?.join(',') })));
  } catch(e) {
    log(`❌ ListModels失敗: ${e.message}`);
  }
}

// ─────────────────────────────────────────────
// GEMINI IMAGE GENERATION (generateContent + responseModalities)
// ─────────────────────────────────────────────
const GEMINI_IMAGE_MODELS = [
  'gemini-2.5-flash-image',
  'gemini-3.1-flash-image-preview',
  'gemini-3-pro-image-preview',
];

async function callGeminiImagen(prompt) {
  let lastError = null;
  for (const model of GEMINI_IMAGE_MODELS) {
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${settings.geminiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt + ' Output a landscape 16:9 image only, no text.' }] }],
            generationConfig: { responseModalities: ['IMAGE'] }
          })
        }
      );
      const data = await res.json();
      if (!res.ok) {
        const msg = data.error?.message || res.status;
        log(`⚠️ ${model} 失敗: ${msg.toString().slice(0, 80)}`);
        lastError = msg;
        continue;
      }
      const part = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
      if (!part) { lastError = `${model}: 画像データなし`; continue; }
      log(`✅ モデル ${model} で生成成功`);
      const { mimeType, data: b64 } = part.inlineData;
      return { url: `data:${mimeType};base64,${b64}`, revised: null };
    } catch(e) {
      lastError = e.message;
    }
  }
  throw new Error(lastError || 'Gemini: 全モデル失敗');
}

// ─────────────────────────────────────────────
// GENERATE PROMPTS
// ─────────────────────────────────────────────
async function runGeneratePrompts() {
  if (!settings.anthropicKey && !settings.geminiKey) {
    alert('AnthropicまたはGoogle AI APIキーを設定してください');
    openModal('modalSettings');
    return false;
  }
  const scene = document.getElementById('inp_scene').value.trim();
  if (!scene) { alert('シーン説明を入力してください'); return false; }

  const btn = document.getElementById('btn_genPrompt');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⏳</span> 生成中...';

  try {
    log('🤖 プロンプト + タグ生成中...');
    const title = document.getElementById('inp_title').value.trim();
    const raw = await generatePromptText(
      `記事タイトル: ${title || '（未入力）'}\n\nシーン説明:\n${scene}`
    );

    let parsed;
    try {
      const match = raw.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(match ? match[0] : raw);
    } catch(e) {
      throw new Error('JSONパース失敗: ' + raw.slice(0, 120));
    }

    // 新フォーマット対応（後方互換: prompts キーもサポート）
    generatedHeaderPrompts = (parsed.header_prompts || parsed.prompts || []).slice(0, 3);
    while (generatedHeaderPrompts.length < 3) generatedHeaderPrompts.push('');

    generatedArticleScenes = (parsed.article_images || []).map(s => ({
      title: s.title || 'シーン',
      prompts: (s.prompts || []).slice(0, 2)
    }));

    generatedTags = parsed.tags || [];

    showPromptSection();

    const articleCount = generatedArticleScenes.reduce((sum, s) => sum + s.prompts.length, 0);
    log(`✅ ヘッダー${generatedHeaderPrompts.filter(Boolean).length}案 + 記事内画像${articleCount}枚 + タグ${generatedTags.length}件を生成しました`);
    return true;
  } catch(e) {
    log(`❌ ${e.message}`);
    alert('プロンプト生成に失敗しました: ' + e.message);
    return false;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🤖 AIプロンプト生成 + タグ提案';
  }
}

function showPromptSection() {
  // Tags
  const tagsSection = document.getElementById('sec_tags_preview');
  const tagsList = document.getElementById('list_tags');
  tagsList.innerHTML = '';
  if (generatedTags.length > 0) {
    generatedTags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'bg-gray-800 text-yellow-300 text-xs rounded-lg px-3 py-1.5 cursor-pointer hover:bg-yellow-400/20 transition select-all';
      span.textContent = tag;
      span.title = 'クリックでコピー';
      span.onclick = () => {
        navigator.clipboard.writeText(tag);
        log(`📋 ${tag} をコピー`);
      };
      tagsList.appendChild(span);
    });
    tagsSection.classList.remove('hidden');
  } else {
    tagsSection.classList.add('hidden');
  }

  // Header prompts
  const headerList = document.getElementById('list_header_prompts');
  headerList.innerHTML = '';
  generatedHeaderPrompts.forEach((p, i) => {
    const div = document.createElement('div');
    div.innerHTML = `
      <label class="block text-xs text-gray-500 mb-1 font-medium">案 ${i + 1}</label>
      <textarea id="header_prompt_${i}" rows="3"
        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-xs leading-relaxed focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none text-gray-300"
      >${p}</textarea>`;
    headerList.appendChild(div);
  });

  // Article image prompts
  const articleWrapper = document.getElementById('sec_article_prompts_wrapper');
  const articleList = document.getElementById('list_article_prompts');
  articleList.innerHTML = '';
  if (generatedArticleScenes.length > 0) {
    generatedArticleScenes.forEach((scene, si) => {
      const div = document.createElement('div');
      div.className = 'bg-gray-800/50 border border-gray-700/50 rounded-xl p-4';
      const promptsHtml = scene.prompts.map((p, pi) => `
        <div>
          <label class="block text-xs text-gray-600 mb-1">案 ${pi + 1}</label>
          <textarea id="article_prompt_${si}_${pi}" rows="3"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-xs leading-relaxed focus:outline-none focus:ring-2 focus:ring-green-500 resize-none text-gray-300"
          >${p}</textarea>
        </div>`).join('');
      div.innerHTML = `
        <h4 class="text-xs font-semibold text-green-400 mb-3">シーン ${si + 1}: ${scene.title}</h4>
        <div class="space-y-2">${promptsHtml}</div>`;
      articleList.appendChild(div);
    });
    articleWrapper.classList.remove('hidden');
  } else {
    articleWrapper.classList.add('hidden');
  }

  const sec = document.getElementById('sec_prompts');
  sec.classList.remove('hidden');
  sec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ─────────────────────────────────────────────
// GENERATE IMAGES
// ─────────────────────────────────────────────
async function runGenerateAll() {
  const imgKey = engine === 'dalle' ? settings.openaiKey : settings.geminiKey;
  if (!imgKey) {
    alert(`${engine === 'dalle' ? 'OpenAI' : 'Google AI'} APIキーを設定してください`);
    openModal('modalSettings');
    return;
  }
  const ok = await runGeneratePrompts();
  if (!ok) return;
  await runGenerateImagesFromPrompts();
}

async function runGenerateImagesFromPrompts() {
  const imgKey = engine === 'dalle' ? settings.openaiKey : settings.geminiKey;
  if (!imgKey) {
    alert(`${engine === 'dalle' ? 'OpenAI' : 'Google AI'} APIキーを設定してください`);
    openModal('modalSettings');
    return;
  }

  // ヘッダープロンプト収集
  const headerPrompts = generatedHeaderPrompts.map((_, i) => {
    const ta = document.getElementById(`header_prompt_${i}`);
    return ta ? ta.value.trim() : generatedHeaderPrompts[i];
  }).filter(Boolean);

  // 記事内プロンプト収集
  const articlePromptMap = generatedArticleScenes.map((scene, si) => ({
    title: scene.title,
    prompts: scene.prompts.map((_, pi) => {
      const ta = document.getElementById(`article_prompt_${si}_${pi}`);
      return ta ? ta.value.trim() : scene.prompts[pi];
    }).filter(Boolean)
  })).filter(s => s.prompts.length > 0);

  const totalCount = headerPrompts.length + articlePromptMap.reduce((sum, s) => sum + s.prompts.length, 0);
  if (!totalCount) { alert('プロンプトがありません'); return; }

  const btn = document.getElementById('btn_genImages');
  btn.disabled = true;
  btn.innerHTML = `<span class="spin">⏳</span> 生成中... 0/${totalCount}`;

  // 画像セクション初期化
  showImageSections(headerPrompts.length, articlePromptMap);

  try {
    const engineLabel = engine === 'dalle' ? 'GPT Image 1.5' : 'Gemini Imagen';
    log(`🎨 ${engineLabel} で合計${totalCount}枚を並列生成中...`);

    let completed = 0;
    const updateProgress = () => {
      completed++;
      btn.innerHTML = `<span class="spin">⏳</span> 生成中... ${completed}/${totalCount}`;
    };

    // ヘッダー画像タスク
    const headerTasks = headerPrompts.map((p, i) =>
      callImageAPI(p)
        .then(r => { updateProgress(); return { type: 'header', i, ...r }; })
        .catch(e => { updateProgress(); return { type: 'header', i, error: e.message }; })
    );

    // 記事内画像タスク
    const articleTasks = [];
    articlePromptMap.forEach((scene, si) => {
      scene.prompts.forEach((p, pi) => {
        articleTasks.push(
          callImageAPI(p)
            .then(r => { updateProgress(); return { type: 'article', si, pi, title: scene.title, ...r }; })
            .catch(e => { updateProgress(); return { type: 'article', si, pi, title: scene.title, error: e.message }; })
        );
      });
    });

    const results = await Promise.all([...headerTasks, ...articleTasks]);

    results.forEach(r => {
      if (r.type === 'header') {
        const label = `ヘッダー案${r.i + 1}`;
        if (r.error) {
          log(`❌ ${label} エラー: ${r.error}`);
          updateImageCard(`header_${r.i}`, null, r.error, label);
        } else {
          log(`✅ ${label} 完了`);
          updateImageCard(`header_${r.i}`, r.url, null, label, r.revised);
        }
      } else {
        const label = `${r.title} 案${r.pi + 1}`;
        if (r.error) {
          log(`❌ ${label} エラー: ${r.error}`);
          updateImageCard(`article_${r.si}_${r.pi}`, null, r.error, label);
        } else {
          log(`✅ ${label} 完了`);
          updateImageCard(`article_${r.si}_${r.pi}`, r.url, null, label, r.revised);
        }
      }
    });

    const success = results.filter(r => !r.error).length;
    log(`🎉 ${success}/${totalCount}枚の生成完了`);
  } catch(e) {
    log(`❌ ${e.message}`);
    alert('画像生成に失敗しました: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🎨 全案を一括生成';
  }
}

function showImageSections(headerCount, articlePromptMap) {
  // ヘッダー画像グリッド
  const headerGrid = document.getElementById('grid_header_images');
  headerGrid.innerHTML = '';
  for (let i = 0; i < headerCount; i++) {
    headerGrid.appendChild(createPlaceholderCard(`header_${i}`, `ヘッダー案 ${i + 1}`));
  }
  document.getElementById('lbl_headerCount').textContent = `(${headerCount}案)`;

  // 記事内画像グループ
  const articleGroups = document.getElementById('sec_article_image_groups');
  articleGroups.innerHTML = '';
  articlePromptMap.forEach((scene, si) => {
    if (!scene.prompts.length) return;
    const section = document.createElement('div');
    section.className = 'mb-5';
    const cols = Math.min(scene.prompts.length, 2);
    section.innerHTML = `<h3 class="text-xs text-green-400 font-medium mb-2">📸 ${scene.title}</h3>`;
    const grid = document.createElement('div');
    grid.className = `grid grid-cols-${cols} md:grid-cols-${cols} gap-4`;
    scene.prompts.forEach((_, pi) => {
      grid.appendChild(createPlaceholderCard(`article_${si}_${pi}`, `${scene.title} 案${pi + 1}`));
    });
    section.appendChild(grid);
    articleGroups.appendChild(section);
  });

  const sec = document.getElementById('sec_images');
  sec.classList.remove('hidden');
  sec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function createPlaceholderCard(cardId, label) {
  const card = document.createElement('div');
  card.id = `imgCard_${cardId}`;
  card.className = 'bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden';
  card.innerHTML = `
    <div class="aspect-video bg-gray-800 flex items-center justify-center">
      <div class="text-center text-gray-600">
        <div class="spin text-2xl mb-2 block">⏳</div>
        <div class="text-xs">${label}</div>
        <div class="text-xs mt-1 text-gray-700">生成中...</div>
      </div>
    </div>
    <div class="p-3">
      <span class="text-xs text-gray-600">${label}</span>
    </div>`;
  return card;
}

function updateImageCard(cardId, url, error, label, revised) {
  const card = document.getElementById(`imgCard_${cardId}`);
  if (!card) return;
  const ts = Date.now();
  const filename = `note_${cardId}_${ts}.png`;
  if (error) {
    card.innerHTML = `
      <div class="aspect-video bg-gray-800 flex items-center justify-center p-4">
        <div class="text-center text-red-400">
          <div class="text-2xl mb-2">❌</div>
          <div class="text-xs leading-relaxed">${error}</div>
        </div>
      </div>
      <div class="p-3">
        <span class="text-xs text-gray-600">${label} — エラー</span>
      </div>`;
  } else {
    card.className = 'bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden fade-in';
    card.innerHTML = `
      <div class="aspect-video bg-gray-800 overflow-hidden relative group">
        <img src="${url}" alt="${label}" class="w-full h-full object-cover cursor-pointer"
          onclick="window.open('${url}', '_blank')" title="クリックで拡大"/>
        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-3">
          <button onclick="downloadImage('${url}', '${filename}')"
            class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold rounded-lg px-4 py-2 transition">⬇ DL</button>
          <button onclick="window.open('${url}', '_blank')"
            class="bg-gray-700 hover:bg-gray-600 text-white text-xs font-semibold rounded-lg px-4 py-2 transition">↗ 開く</button>
        </div>
      </div>
      <div class="p-3 flex items-center justify-between gap-2">
        <span class="text-xs text-gray-600 truncate flex-1">${label}</span>
        <button onclick="downloadImage('${url}', '${filename}')"
          class="text-xs bg-blue-700 hover:bg-blue-600 rounded-lg px-3 py-1.5 transition whitespace-nowrap flex-shrink-0">⬇ DL</button>
        <button onclick="window.open('${url}', '_blank')"
          class="text-xs bg-gray-700 hover:bg-gray-600 rounded-lg px-3 py-1.5 transition whitespace-nowrap flex-shrink-0">↗ 開く</button>
      </div>
      ${revised ? `<div class="px-3 pb-3"><p class="text-xs text-gray-700 leading-relaxed line-clamp-2" title="${revised.replace(/"/g,'&quot;')}">revised: ${revised.slice(0,80)}...</p></div>` : ''}`;
  }
}

async function downloadImage(url, filename) {
  try {
    log(`⬇ ダウンロード中: ${filename}`);
    let blobUrl;
    if (url.startsWith('data:')) {
      blobUrl = url;
    } else {
      const res = await fetch(url);
      const blob = await res.blob();
      blobUrl = URL.createObjectURL(blob);
    }
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    if (!url.startsWith('data:')) URL.revokeObjectURL(blobUrl);
    log(`✅ ダウンロード完了: ${filename}`);
  } catch(e) {
    log(`⚠️ DL失敗 → 新しいタブで開きます`);
    window.open(url, '_blank');
  }
}

function copyTags() {
  const text = generatedTags.join(' ');
  navigator.clipboard.writeText(text).then(() => log(`📋 タグ全件コピー: ${text}`));
}

// ─────────────────────────────────────────────
// LOG
// ─────────────────────────────────────────────
function log(msg) {
  const area = document.getElementById('area_log');
  const ts = new Date().toLocaleTimeString('ja-JP', { hour12: false });
  const line = document.createElement('div');
  line.textContent = `[${ts}] ${msg}`;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
  console.log(`[NoteImageGen] ${msg}`);
}

function copyLogs() {
  const text = document.getElementById('area_log').innerText;
  navigator.clipboard.writeText(text).then(() => log('📋 ログをコピーしました'));
}

init();
