<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Interpreter</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#f4f7fb;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    .meter{
      transition:width .08s linear;
    }
  </style>
</head>

<body>

<main class="min-h-screen p-6">

<div class="max-w-7xl mx-auto">

<div class="flex justify-between items-center mb-6">

<div>

<p class="text-blue-600 text-sm font-semibold">
Google Meet × BlackHole
</p>

<h1 class="text-4xl font-bold">
Meeting Interpreter
</h1>

<p class="text-gray-500">
英語 → 日本語 リアルタイム通訳
</p>

</div>

<div class="bg-white rounded-full px-4 py-2 shadow">

<span
id="statusDot"
class="inline-block w-3 h-3 rounded-full bg-gray-300"
></span>

<span
id="statusText"
class="ml-2"
>
未接続
</span>

</div>

</div>

<div class="grid lg:grid-cols-[380px_1fr] gap-6">

<div>

<div class="bg-white rounded-2xl p-5 shadow">

<h2 class="font-bold mb-4">
音声設定
</h2>

<label class="text-sm font-semibold">
入力
</label>

<select
id="inputDevice"
class="w-full border rounded-xl p-3 mt-1"
>
<option>
既定の入力
</option>
</select>

<p class="text-xs text-gray-500 mt-2">
BlackHole 2ch を選択してください
</p>

<label class="text-sm font-semibold mt-5 block">
出力
</label>

<select
id="outputDevice"
class="w-full border rounded-xl p-3 mt-1"
>
<option>
システム既定
</option>
</select>

<div class="mt-5">

<div class="flex justify-between text-xs mb-1">

<span>
入力レベル
</span>

<span id="inputLevelText">
0%
</span>

</div>

<div class="bg-gray-200 h-2 rounded">

<div
id="inputLevelBar"
class="meter bg-blue-500 h-2 rounded"
style="width:0%"
></div>

</div>

</div>

<label class="text-sm font-semibold mt-5 block">
音声
</label>

<select
id="voice"
class="w-full border rounded-xl p-3 mt-1"
>

<option value="marin">
Marin
</option>

<option value="cedar">
Cedar
</option>

</select>

<button
id="refreshButton"
class="w-full bg-gray-100 rounded-xl p-3 mt-6"
>

再読み込み

</button>

<button
id="startButton"
class="w-full bg-blue-600 text-white rounded-xl p-3 mt-3 font-bold"
>

通訳を開始

</button>

</div>

<div class="bg-white rounded-2xl p-5 shadow mt-6">

<h2 class="font-bold mb-3">

通訳指示

</h2>

<textarea
id="instructions"
rows="10"
class="w-full border rounded-xl p-3"
>あなたは英語から日本語への会議通訳者です。
英語のみを自然な日本語へ即時通訳してください。
解説・要約・質問は不要です。</textarea>

</div>

</div>

<div>

<div class="bg-white rounded-2xl p-5 shadow">

<div class="flex justify-between">

<h2 class="font-bold">
リアルタイム通訳
</h2>

<div>

<button
id="copyTranscriptButton"
class="border rounded-lg px-3 py-2 text-sm"
>

コピー

</button>

<button
id="clearTranscriptButton"
class="border rounded-lg px-3 py-2 text-sm"
>

消去

</button>

</div>

</div>

<div
id="transcript"
class="bg-gray-100 rounded-xl h-[650px] overflow-auto mt-5 p-5"
>

<div
id="emptyMessage"
class="text-center text-gray-500 mt-20"
>

通訳を開始するとここへ表示されます

</div>

</div>

</div>

</div>

</div>

<footer
class="bg-slate-900 text-white rounded-2xl mt-6 p-4 flex justify-between items-center"
>

<div class="text-sm">

Google Meet +
BlackHole +
OpenAI Realtime API

</div>

<button
id="copyDebugButton"
class="bg-white/10 rounded-lg px-4 py-2"
>

デバッグ用コンソールをコピー

</button>

</footer>

</div>

</main>

<audio
id="remoteAudio"
autoplay
playsinline
></audio>

<script src="./app.js"></script>

</body>
</html>
