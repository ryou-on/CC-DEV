<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <!-- PWA対応（iPadホーム画面追加用） -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>おうち巴寿司</title>
  <style>
    /* ===== リセット・基本 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f5f0e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ===== ヘッダー（はま寿司風 赤いロゴバー） ===== */
    .header {
      background: linear-gradient(135deg, #c8102e 0%, #e8192c 50%, #c8102e 100%);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 8px rgba(200,16,46,0.4);
      flex-shrink: 0;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      color: white;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .logo span { font-size: 13px; display: block; font-weight: 500; letter-spacing: 1px; opacity: 0.9; }
    .header-fish { font-size: 28px; animation: swim 3s ease-in-out infinite; }
    @keyframes swim { 0%,100%{transform:translateX(0) rotate(-5deg)} 50%{transform:translateX(6px) rotate(5deg)} }

    /* ===== カテゴリタブ（はま寿司風） ===== */
    .category-tabs {
      background: #fff;
      display: flex;
      overflow-x: auto;
      border-bottom: 3px solid #c8102e;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 700;
      color: #555;
      background: #fff;
      border: none;
      border-bottom: 4px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #c8102e;
      border-bottom-color: #c8102e;
      background: #fff5f5;
    }
    .tab-btn:active { transform: scale(0.95); }

    /* ===== メインコンテンツエリア ===== */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ===== メニューグリッド ===== */
    .menu-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scrollbar-width: none;
    }
    .menu-area::-webkit-scrollbar { display: none; }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    /* ===== メニューカード ===== */
    .menu-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 3px solid transparent;
      position: relative;
    }
    .menu-card:active, .menu-card.playing {
      transform: scale(0.93);
      border-color: #c8102e;
      box-shadow: 0 0 0 3px rgba(200,16,46,0.3);
    }
    /* タップ時のリップルエフェクト */
    .menu-card.playing .menu-emoji { animation: bounce 0.4s ease; }
    @keyframes bounce { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 70%{transform:scale(0.9)} 100%{transform:scale(1)} }

    .menu-emoji-wrap {
      background: linear-gradient(135deg, #fff9f0 0%, #fff0f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 8px 8px;
      position: relative;
      min-height: 80px;
    }
    /* 画像がある場合はこちらを使用 */
    .menu-emoji-wrap img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
    }
    .menu-emoji { font-size: 44px; line-height: 1; }

    /* 値札風バッジ */
    .price-badge {
      position: absolute;
      bottom: 4px;
      right: 6px;
      background: #c8102e;
      color: white;
      font-size: 10px;
      font-weight: 900;
      padding: 2px 5px;
      border-radius: 4px;
    }

    /* カード下部ラベル */
    .menu-label {
      padding: 6px 6px 8px;
      text-align: center;
    }
    .menu-name {
      font-size: 12px;
      font-weight: 800;
      color: #222;
      line-height: 1.3;
    }
    .menu-yomi {
      font-size: 10px;
      color: #888;
      margin-top: 2px;
    }

    /* ===== 右サイドパネル（注文状況風） ===== */
    .side-panel {
      width: 130px;
      background: #fff;
      border-left: 2px solid #eee;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .side-title {
      background: #c8102e;
      color: white;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      padding: 8px 4px;
    }
    .order-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
      scrollbar-width: none;
    }
    .order-list::-webkit-scrollbar { display: none; }
    .order-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 4px;
      border-bottom: 1px solid #f0f0f0;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    .order-emoji { font-size: 22px; }
    .order-info { flex: 1; }
    .order-name { font-size: 10px; font-weight: 700; color: #333; }
    .order-count { font-size: 10px; color: #c8102e; font-weight: 700; }

    /* クリア・合計ボタン */
    .side-footer { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .clear-btn {
      background: #666;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .total-btn {
      background: linear-gradient(135deg, #c8102e, #e8192c);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }

    /* ===== 読み上げ中バナー ===== */
    .speaking-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(200,16,46,0.95);
      color: white;
      padding: 20px 40px;
      border-radius: 20px;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .speaking-banner.show { transform: translate(-50%, -50%) scale(1); }
    .speaking-banner .banner-emoji { font-size: 48px; display: block; margin-bottom: 8px; }

    /* ===== お会計モーダル ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 24px;
      width: 80%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal h2 { font-size: 20px; color: #c8102e; margin-bottom: 12px; }
    .modal-list { font-size: 16px; line-height: 2; margin-bottom: 16px; }
    .modal-close {
      background: #c8102e;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    /* ===== フッターバー（左下固定） ===== */
    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      z-index: 50;
    }
    /* 声優切り替えボタン（はま寿司の「音声を変更する」風） */
    .voice-btn {
      background: #1a1a3a;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      transition: transform 0.15s, opacity 0.15s;
    }
    .voice-btn:active { transform: scale(0.93); opacity: 0.85; }
    .voice-btn .voice-icon { font-size: 16px; }
    .voice-btn .voice-arrow { font-size: 10px; opacity: 0.7; }

    /* ===== 声優選択モーダル ===== */
    .voice-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .voice-modal-overlay.open { display: flex; }
    .voice-modal {
      background: white;
      border-radius: 20px;
      padding: 24px 20px 20px;
      width: 88%;
      max-width: 400px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .voice-modal-title {
      font-size: 17px;
      font-weight: 900;
      color: #222;
      margin-bottom: 16px;
      text-align: center;
    }
    /* 声優カード2枚横並び */
    .voice-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .voice-card {
      border: 3px solid #ddd;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      background: #f8f8f8;
    }
    .voice-card:active { transform: scale(0.96); }
    /* 選択中はま寿司風：赤枠 + チェック */
    .voice-card.selected {
      border-color: #c8102e;
      box-shadow: 0 0 0 2px rgba(200,16,46,0.2);
    }
    .voice-card.selected .voice-check {
      display: flex;
    }
    /* チェックマーク（右上） */
    .voice-check {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      background: #c8102e;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      font-weight: 900;
      z-index: 2;
    }
    /* 声優写真エリア（カラー背景＋絵文字で代替、写真差し替え可） */
    .voice-photo {
      width: 100%;
      aspect-ratio: 3/2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      position: relative;
      overflow: hidden;
    }
    /* 写真がある場合 */
    .voice-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }
    /* カード1（緑背景） */
    .voice-card:nth-child(1) .voice-photo { background: linear-gradient(135deg, #1a7a3a 0%, #2ecc71 100%); }
    /* カード2（オレンジ背景） */
    .voice-card:nth-child(2) .voice-photo { background: linear-gradient(135deg, #1a3a7a 0%, #e87c1a 100%); }
    .voice-name {
      padding: 8px 6px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      color: #222;
      background: white;
    }
    /* モーダル下部ボタン */
    .voice-modal-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .voice-back-btn {
      background: #1a1a3a;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .voice-back-btn:active { opacity: 0.7; }
    .voice-set-btn {
      background: #c8102e;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .voice-set-btn:active { opacity: 0.7; }

    /* ===== デバッグコンソール ===== */
    .debug-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-size: 10px;
      padding: 4px 8px;
      font-family: monospace;
      z-index: 300;
      display: none; /* 通常は非表示 */
    }
    .debug-bar.show { display: flex; align-items: center; justify-content: space-between; }
    #debugMsg { flex: 1; }
    .copy-btn {
      background: #333; color: #0f0; border: 1px solid #0f0;
      padding: 2px 6px; font-size: 9px; cursor: pointer; border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- ===== ヘッダー ===== -->
<div class="header">
  <div class="logo">
    おうち巴寿司
    <span>ともえのおきにいり🌸</span>
  </div>
  <div class="header-fish">🐟</div>
</div>

<!-- ===== カテゴリタブ ===== -->
<div class="category-tabs" id="categoryTabs"></div>

<!-- ===== メインエリア ===== -->
<div class="main">
  <!-- メニューグリッド -->
  <div class="menu-area">
    <div class="menu-grid" id="menuGrid"></div>
  </div>

  <!-- 右サイドパネル（注文リスト） -->
  <div class="side-panel">
    <div class="side-title">🛎 ちゅうもん</div>
    <div class="order-list" id="orderList"></div>
    <div class="side-footer">
      <button class="clear-btn" onclick="clearOrder()">クリア</button>
      <button class="total-btn" onclick="showModal()">おかいけい</button>
    </div>
  </div>
</div>

<!-- ===== 読み上げバナー ===== -->
<div class="speaking-banner" id="speakingBanner">
  <span class="banner-emoji" id="bannerEmoji"></span>
  <span id="bannerText"></span>
</div>

<!-- ===== お会計モーダル ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>🍣 きょうのちゅうもん</h2>
    <div class="modal-list" id="modalList"></div>
    <button class="modal-close" onclick="closeModal()">とじる</button>
  </div>
</div>

<!-- ===== フッターバー（左下） ===== -->
<div class="footer-bar">
  <!-- 声優切り替えボタン：機能は後で実装 -->
  <button class="voice-btn" onclick="openVoiceModal()">
    <span class="voice-icon">🎙️</span>
    こえをかえる
    <span class="voice-arrow">›</span>
  </button>
</div>

<!-- ===== 声優選択モーダル ===== -->
<div class="voice-modal-overlay" id="voiceModal">
  <div class="voice-modal">
    <div class="voice-modal-title">🎙️ こえをかえる</div>
    <div class="voice-cards">

      <!-- 声優1（写真は /voice/voice1.jpg に差し替え可） -->
      <div class="voice-card selected" id="voiceCard1" onclick="selectVoice(1)">
        <div class="voice-check">✓</div>
        <div class="voice-photo">
          <!-- <img src="/voice/voice1.jpg" alt="ママ"> -->
          👩
        </div>
        <div class="voice-name">おかあさん</div>
      </div>

      <!-- 声優2（写真は /voice/voice2.jpg に差し替え可） -->
      <div class="voice-card" id="voiceCard2" onclick="selectVoice(2)">
        <div class="voice-check">✓</div>
        <div class="voice-photo">
          <!-- <img src="/voice/voice2.jpg" alt="パパ"> -->
          👨
        </div>
        <div class="voice-name">おとうさん</div>
      </div>

    </div>
    <div class="voice-modal-footer">
      <button class="voice-back-btn" onclick="closeVoiceModal()">もどる</button>
      <button class="voice-set-btn" onclick="applyVoice()">せっていする</button>
    </div>
  </div>
</div>

<!-- ===== デバッグバー ===== -->
<div class="debug-bar" id="debugBar">
  <span id="debugMsg">デバッグ: 準備完了</span>
  <button class="copy-btn" onclick="copyDebug()">コピー</button>
  <button class="copy-btn" style="margin-left:4px" onclick="toggleDebug()">閉じる</button>
</div>

let currentCategory = Object.keys(menuData)[0]; // 現在のカテゴリ

// ===== デバッグログ関数 =====
function log(msg) {
  const time = new Date().toLocaleTimeString();
  const entry = `[${time}] ${msg}`;
  debugLog.push(entry);
  document.getElementById('debugMsg').textContent = entry;
  console.log(entry);
}

// ===== カテゴリタブ生成 =====
function renderTabs() {
  const container = document.getElementById('categoryTabs');
  container.innerHTML = '';
  Object.keys(menuData).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (cat === currentCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      currentCategory = cat;
      renderTabs();
      renderMenu();
      log(`カテゴリ切替: ${cat}`);
    };
    container.appendChild(btn);
  });
}

// ===== メニューグリッド生成 =====
function renderMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  const items = menuData[currentCategory];
  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'menu-card';
    card.innerHTML = `
      <div class="menu-emoji-wrap">
        <span class="menu-emoji">${item.emoji}</span>
        <span class="price-badge">${item.price}</span>
      </div>
      <div class="menu-label">
        <div class="menu-name">${item.name}</div>
        <div class="menu-yomi">${item.yomi}</div>
      </div>
    `;
    // タップ時: 音声再生 + 注文追加
    card.onclick = () => onMenuTap(item, card);
    grid.appendChild(card);
  });
}

// ===== メニュータップ処理 =====
function onMenuTap(item, card) {
  // ビジュアルフィードバック
  card.classList.add('playing');
  setTimeout(() => card.classList.remove('playing'), 400);

  // バナー表示
  showBanner(item.emoji, item.name);

  // 音声再生（mp3 優先 → Web Speech API フォールバック）
  playAudio(item);

  // 注文リストに追加
  addToOrder(item);

  log(`タップ: ${item.name} | audio: /audio/${item.audioFile}.mp3`);
}

// ===== バナー表示 =====
function showBanner(emoji, name) {
  const banner = document.getElementById('speakingBanner');
  document.getElementById('bannerEmoji').textContent = emoji;
  document.getElementById('bannerText').textContent = name;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 1200);
}

// ===== 音声再生 =====
// voice=2(おとうさん): OTOUSAN_VOICES base64を使用
// voice=1(おかあさん): OKASAN_VOICES base64を使用（未設定ならTTS）
function playAudio(item) {
  let b64 = null;
  if (appliedVoice === 2) {
    b64 = OTOUSAN_VOICES[item.name] || null;
    log(`おとうさん音声試行: ${item.name} → ${b64 ? 'あり' : 'なし'}`);
  } else if (appliedVoice === 1) {
    b64 = (typeof OKASAN_VOICES !== 'undefined' && OKASAN_VOICES[item.name]) || null;
    log(`おかあさん音声試行: ${item.name} → ${b64 ? 'あり' : 'なし(TTS)'}`);
  }

  if (b64) {
    const audio = new Audio(b64);
    audio.play().then(() => {
      log(`音声再生: ${item.name}`);
    }).catch(err => {
      log(`音声失敗、TTS: ${err.message}`);
      speakTTS(item.yomi);
    });
  } else {
    log(`TTS使用: ${item.yomi}`);
    speakTTS(item.yomi);
  }
}

// ===== Web Speech API（フォールバック） =====
function speakTTS(text) {
  if (!window.speechSynthesis) {
    log('Web Speech API非対応');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;  // ゆっくり（子供向け）
  utter.pitch = 1.2;  // 少し高め
  window.speechSynthesis.speak(utter);
  log(`TTS読み上げ: ${text}`);
}

// ===== 注文リストに追加 =====
function addToOrder(item) {
  // 既存アイテムなら個数を増やす
  const existing = orderItems.find(o => o.name === item.name);
  if (existing) {
    existing.count++;
  } else {
    orderItems.push({ ...item, count: 1 });
  }
  renderOrderList();
}

// ===== 注文リスト表示更新 =====
function renderOrderList() {
  const list = document.getElementById('orderList');
  list.innerHTML = '';
  orderItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'order-item';
    div.innerHTML = `
      <span class="order-emoji">${item.emoji}</span>
      <div class="order-info">
        <div class="order-name">${item.name}</div>
        <div class="order-count">×${item.count}</div>
      </div>
    `;
    list.appendChild(div);
  });
  // 一番下にスクロール
  list.scrollTop = list.scrollHeight;
}

// ===== クリア =====
function clearOrder() {
  orderItems = [];
  renderOrderList();
  log('注文クリア');
}

// ===== お会計モーダル =====
function showModal() {
  const modal = document.getElementById('modal');
  const list = document.getElementById('modalList');
  if (orderItems.length === 0) {
    list.innerHTML = '<div style="color:#999">まだちゅうもんがありません</div>';
  } else {
    list.innerHTML = orderItems.map(o => `${o.emoji} ${o.name} ×${o.count}`).join('<br>');
  }
  modal.classList.add('open');
  speakTTS('いっぱいたべたね！おいしかった？');
  log('お会計表示');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ===== 声優選択モーダル =====
let selectedVoice = 1;      // 現在選択中の声優番号（1 or 2）
let appliedVoice  = 1;      // 実際に適用済みの声優番号

// モーダルを開く（開いた時点で「適用済み」を選択状態にリセット）
function openVoiceModal() {
  selectedVoice = appliedVoice;
  updateVoiceCards();
  document.getElementById('voiceModal').classList.add('open');
  log(`声優モーダル表示: 現在=${appliedVoice}`);
}

// モーダルを閉じる
function closeVoiceModal() {
  document.getElementById('voiceModal').classList.remove('open');
  log('声優モーダル: キャンセル');
}

// カードをタップして選択
function selectVoice(num) {
  selectedVoice = num;
  updateVoiceCards();
  log(`声優選択: ${num}番`);
}

// カードのselectedクラスを更新
function updateVoiceCards() {
  document.getElementById('voiceCard1').classList.toggle('selected', selectedVoice === 1);
  document.getElementById('voiceCard2').classList.toggle('selected', selectedVoice === 2);
}

// 「せっていする」→ 適用・確認音声を再生して閉じる
function applyVoice() {
  appliedVoice = selectedVoice;

  // ⚠️ iOS対策: closeVoiceModal()より先にplay()を呼ぶ
  // モーダルを閉じてからだとユーザー操作と切り離されて再生ブロックされる
  if (appliedVoice === 1) {
    // おかあさん確認音声（base64埋め込み）
    const audio = new Audio(OKASAN_AUDIO_B64);
    audio.play()
      .then(() => log('おかあさん確認音声: 再生開始'))
      .catch(err => log('おかあさん再生失敗: ' + err.message));
  } else if (appliedVoice === 2) {
    // おとうさん確認音声（base64埋め込み）
    const audio = new Audio(OTOUSAN_AUDIO_B64);
    audio.play()
      .then(() => log('おとうさん確認音声: 再生開始'))
      .catch(err => log('おとうさん再生失敗: ' + err.message));
  }

  // 再生開始後にモーダルを閉じる
  closeVoiceModal();
  log(`声優確定: ${appliedVoice}番`);
}

function applyVoice_DEAD() {
  if (false) {
    const audio = new Audio();
    audio.oncanplaythrough = () => {
      audio.play()
        .then(() => log('おとうさん確認音声: 再生開始'))

// ===== デバッグ =====
function toggleDebug() {
  const bar = document.getElementById('debugBar');
  bar.classList.toggle('show');
}
function copyDebug() {
  navigator.clipboard.writeText(debugLog.join('\n'))
    .then(() => alert('ログをコピーしました'))
    .catch(() => log('コピー失敗'));
}
// 5回タップで開発者モード（デバッグバー表示）
let tapCount = 0;
document.querySelector('.logo').addEventListener('click', () => {
  tapCount++;
  if (tapCount >= 5) {
    tapCount = 0;
    document.getElementById('debugBar').classList.toggle('show');
  }
});

// ===== 初期化 =====
function init() {
  renderTabs();
  renderMenu();
  log('アプリ初期化完了');
}
init();
