<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- PWA・全画面対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="おうち巴寿司">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#c8102e">
  <title>おうち巴寿司</title>
  <style>
    /* ===== リセット・基本 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f5f0e8;
      height: 100dvh;
      height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ===== ヘッダー（はま寿司風 赤いロゴバー） ===== */
    .header {
      background: linear-gradient(135deg, #c8102e 0%, #e8192c 50%, #c8102e 100%);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 8px rgba(200,16,46,0.4);
      flex-shrink: 0;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      color: white;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .logo span { font-size: 13px; display: block; font-weight: 500; letter-spacing: 1px; opacity: 0.9; }
    .version-badge {
      display: inline-block !important;
      font-size: 9px !important;
      font-weight: 700 !important;
      letter-spacing: 0 !important;
      opacity: 0.7 !important;
      background: rgba(0,0,0,0.2);
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3);
      transition: opacity 0.2s;
    }
    .version-badge:active { opacity: 1 !important; }
    .header-fish { font-size: 28px; animation: swim 3s ease-in-out infinite; }
    @keyframes swim { 0%,100%{transform:translateX(0) rotate(-5deg)} 50%{transform:translateX(6px) rotate(5deg)} }

    /* ===== クラウド接続状況インジケーター ===== */
    .cloud-status {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 8px);
      left: 8px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 12px;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .cloud-status.show { opacity: 1; }
    .cloud-status.connecting { background: rgba(243,156,18,0.9); }
    .cloud-status.success { background: rgba(46,204,113,0.9); }
    .cloud-status.error { background: rgba(231,76,60,0.9); }

    /* ========================================================
       📱 モバイル縦向き（iPhone 等）のレイアウト刷新
       横幅 768px 以下 かつ 縦長のときに適用
       ======================================================== */
    @media (max-width: 768px) and (orientation: portrait) {
      /* ヘッダーをコンパクトに */
      .header { padding: 6px 12px; padding-top: calc(6px + env(safe-area-inset-top)); }
      .logo { font-size: 17px; letter-spacing: 1px; }
      .logo span { font-size: 10px; }
      .header-fish { font-size: 22px; }
      .version-badge { font-size: 9px; padding: 1px 5px; }

      /* カテゴリタブも縦では少し詰める */
      .tab-btn { padding: 12px 20px; font-size: 17px; }

      /* main を縦積みに変更（メニューが上、注文リストは下に固定） */
      .main { flex-direction: column; }

      /* メニューグリッドは 2 列にして大きな絵文字で表示 */
      .menu-area { padding: 10px; padding-bottom: 16px; }
      .menu-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .menu-card { border-radius: 16px; }
      .menu-emoji-wrap { min-height: 180px; padding: 18px 12px 12px; }
      .menu-emoji-wrap img { height: 160px; }
      .menu-emoji { font-size: clamp(80px, 28vw, 150px); }
      .price-badge { font-size: 14px; padding: 3px 8px; bottom: 6px; right: 8px; }
      .menu-name { font-size: 19px; }
      .menu-yomi { font-size: 12px; }
      .menu-label { padding: 10px 8px 12px; }

      /* 右サイドパネルを「下部ドロワー風」の横レイアウトへ */
      .side-panel {
        width: 100%;
        max-height: 170px;
        border-left: 0;
        border-top: 3px solid #c8102e;
        flex-direction: row;
        align-items: stretch;
        /* footer-bar と重ならないよう下に余白 */
        padding-bottom: calc(env(safe-area-inset-bottom));
      }
      .side-title {
        writing-mode: vertical-rl;
        text-orientation: mixed;
        min-width: 36px;
        padding: 8px 4px;
        font-size: 14px;
        letter-spacing: 2px;
      }
      /* 注文リストを横スクロール */
      .order-list {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 10px;
        padding: 10px 8px;
      }
      .order-item {
        flex-direction: column;
        flex-shrink: 0;
        min-width: 64px;
        padding: 6px 4px;
        border-bottom: 0;
        border-right: 1px solid #f0f0f0;
        gap: 2px;
      }
      .order-emoji { font-size: 30px; }
      .order-name, .order-count { font-size: 11px; text-align: center; }

      /* 会計ボタンは右側の縦並び */
      .side-footer {
        width: 140px;
        padding: 8px 10px 8px 8px;
        gap: 6px;
        justify-content: center;
      }
      .clear-btn { padding: 10px 6px; font-size: 14px; }
      .total-btn { padding: 14px 6px; font-size: 15px; }

      /* フッターバー（こえをかえる）は side-panel と被らないよう左寄せで小さく */
      .footer-bar {
        /* 下部にオーバーレイ配置。side-panel の上に浮かぶ */
        bottom: 170px;
        padding: 6px 8px;
      }
      .voice-btn {
        padding: 10px 16px;
        font-size: 14px;
        gap: 6px;
        border-radius: 22px;
      }
      .voice-btn .voice-icon { font-size: 18px; }
      .voice-btn .voice-arrow { font-size: 11px; }

      /* バナー（読み上げ中）もモバイルでは控えめに */
      .speaking-banner { padding: 14px 24px; font-size: 22px; border-radius: 16px; }
      .speaking-banner .banner-emoji { font-size: 40px; }
    }

    /* 超小型端末（iPhone SE 等、横幅 380px以下）では 1 列に */
    @media (max-width: 380px) and (orientation: portrait) {
      .menu-grid { grid-template-columns: 1fr; }
      .menu-emoji { font-size: clamp(120px, 40vw, 180px); }
      .menu-emoji-wrap { min-height: 200px; }
      .menu-emoji-wrap img { height: 180px; }
    }

    /* ===== カテゴリタブ（はま寿司風） ===== */
    .category-tabs {
      background: #fff;
      display: flex;
      overflow-x: auto;
      border-bottom: 3px solid #c8102e;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 16px 28px;
      font-size: 20px;
      font-weight: 800;
      color: #555;
      background: #fff;
      border: none;
      border-bottom: 5px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #c8102e;
      border-bottom-color: #c8102e;
      background: #fff5f5;
    }
    .tab-btn:active { transform: scale(0.95); }

    /* ===== メインコンテンツエリア ===== */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ===== メニューグリッド ===== */
    .menu-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      scrollbar-width: none;
    }
    .menu-area::-webkit-scrollbar { display: none; }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* ===== メニューカード（子供がタップしやすいよう大型化） ===== */
    .menu-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 4px solid transparent;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .menu-card:active, .menu-card.playing {
      transform: scale(0.95);
      border-color: #c8102e;
      box-shadow: 0 0 0 4px rgba(200,16,46,0.3);
    }
    /* タップ時のリップルエフェクト */
    .menu-card.playing .menu-emoji { animation: bounce 0.4s ease; }
    @keyframes bounce { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 70%{transform:scale(0.9)} 100%{transform:scale(1)} }

    .menu-emoji-wrap {
      background: linear-gradient(135deg, #fff9f0 0%, #fff0f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 16px;
      position: relative;
      min-height: 240px;
      flex: 1;
    }
    /* 画像がある場合はこちらを使用 */
    .menu-emoji-wrap img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
    }
    /* 絵文字は画面幅に応じて自動サイズ調整 */
    .menu-emoji { font-size: clamp(96px, 14vw, 160px); line-height: 1; }

    /* 値札風バッジ */
    .price-badge {
      position: absolute;
      bottom: 8px;
      right: 10px;
      background: #c8102e;
      color: white;
      font-size: 16px;
      font-weight: 900;
      padding: 4px 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(200,16,46,0.4);
    }

    /* カード下部ラベル */
    .menu-label {
      padding: 12px 10px 14px;
      text-align: center;
    }
    .menu-name {
      font-size: 22px;
      font-weight: 900;
      color: #222;
      line-height: 1.3;
    }
    .menu-yomi {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    /* ===== 右サイドパネル（注文状況風） ===== */
    .side-panel {
      width: 170px;
      background: #fff;
      border-left: 2px solid #eee;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .side-title {
      background: #c8102e;
      color: white;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      padding: 12px 6px;
    }
    .order-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      scrollbar-width: none;
    }
    .order-list::-webkit-scrollbar { display: none; }
    .order-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 6px;
      border-bottom: 1px solid #f0f0f0;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    .order-emoji { font-size: 28px; }
    .order-info { flex: 1; }
    .order-name { font-size: 13px; font-weight: 700; color: #333; }
    .order-count { font-size: 13px; color: #c8102e; font-weight: 800; }

    /* クリア・合計ボタン（タップしやすいよう大型化） */
    .side-footer { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .clear-btn {
      background: #666;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 8px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .total-btn {
      background: linear-gradient(135deg, #c8102e, #e8192c);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 8px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 3px 8px rgba(200,16,46,0.35);
    }
    .clear-btn:active, .total-btn:active { transform: scale(0.95); }

    /* ===== 読み上げ中バナー ===== */
    .speaking-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(200,16,46,0.95);
      color: white;
      padding: 20px 40px;
      border-radius: 20px;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .speaking-banner.show { transform: translate(-50%, -50%) scale(1); }
    .speaking-banner .banner-emoji { font-size: 48px; display: block; margin-bottom: 8px; }

    /* ===== お会計モーダル ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 24px;
      width: 80%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal h2 { font-size: 20px; color: #c8102e; margin-bottom: 12px; }
    .modal-list { font-size: 16px; line-height: 2; margin-bottom: 16px; }
    .modal-close {
      background: #c8102e;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    /* ===== フッターバー（左下固定） ===== */
    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      padding-left: calc(10px + env(safe-area-inset-left));
      z-index: 50;
    }
    /* 声優切り替えボタン（はま寿司の「音声を変更する」風・大型化） */
    .voice-btn {
      background: #1a1a3a;
      color: white;
      border: none;
      border-radius: 26px;
      padding: 14px 22px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      transition: transform 0.15s, opacity 0.15s;
    }
    .voice-btn:active { transform: scale(0.93); opacity: 0.85; }
    .voice-btn .voice-icon { font-size: 24px; }
    .voice-btn .voice-arrow { font-size: 14px; opacity: 0.7; }

    /* ===== 声優選択モーダル ===== */
    .voice-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .voice-modal-overlay.open { display: flex; }
    .voice-modal {
      background: white;
      border-radius: 20px;
      padding: 24px 20px 20px;
      width: 88%;
      max-width: 400px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .voice-modal-title {
      font-size: 17px;
      font-weight: 900;
      color: #222;
      margin-bottom: 16px;
      text-align: center;
    }
    /* 声優カード2枚横並び */
    .voice-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .voice-card {
      border: 3px solid #ddd;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      background: #f8f8f8;
    }
    .voice-card:active { transform: scale(0.96); }
    /* 選択中はま寿司風：赤枠 + チェック */
    .voice-card.selected {
      border-color: #c8102e;
      box-shadow: 0 0 0 2px rgba(200,16,46,0.2);
    }
    .voice-card.selected .voice-check {
      display: flex;
    }
    /* チェックマーク（右上） */
    .voice-check {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      background: #c8102e;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      font-weight: 900;
      z-index: 2;
    }
    /* 声優写真エリア（カラー背景＋絵文字で代替、写真差し替え可） */
    .voice-photo {
      width: 100%;
      aspect-ratio: 3/2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      position: relative;
      overflow: hidden;
    }
    /* 写真がある場合 */
    .voice-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }
    /* カード1（緑背景） */
    .voice-card:nth-child(1) .voice-photo { background: linear-gradient(135deg, #1a7a3a 0%, #2ecc71 100%); }
    /* カード2（オレンジ背景） */
    .voice-card:nth-child(2) .voice-photo { background: linear-gradient(135deg, #1a3a7a 0%, #e87c1a 100%); }
    .voice-name {
      padding: 8px 6px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      color: #222;
      background: white;
    }
    /* モーダル下部ボタン */
    .voice-modal-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .voice-back-btn {
      background: #1a1a3a;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .voice-back-btn:active { opacity: 0.7; }
    .voice-set-btn {
      background: #c8102e;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .voice-set-btn:active { opacity: 0.7; }

    /* ===== デバッグコンソール ===== */
    .debug-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-size: 10px;
      padding: 4px 8px;
      font-family: monospace;
      z-index: 300;
      display: none; /* 通常は非表示 */
    }
    .debug-bar.show { display: flex; align-items: center; justify-content: space-between; }
    #debugMsg { flex: 1; }
    .copy-btn {
      background: #333; color: #0f0; border: 1px solid #0f0;
      padding: 2px 6px; font-size: 9px; cursor: pointer; border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- ===== Firestore クラウドストレージ（ES module） ===== -->
<script type="module" src="cloud-store.js"></script>

<!-- ===== クラウド接続状況（デバッグ兼確認用、自動フェード） ===== -->
<div class="cloud-status connecting show" id="cloudStatus">☁️ 同期中...</div>

<!-- ===== ヘッダー ===== -->
<div class="header">
  <div class="logo" onclick="window.open('help.html','_blank')" style="cursor:pointer">
    おうち巴寿司<span class="version-badge" id="versionBadge" onclick="event.stopPropagation(); showReleaseModal()">v1.4.0</span>
    <span>ともえのおきにいり🌸</span>
  </div>
  <div class="header-fish">🐟</div>
</div>

<!-- ===== カテゴリタブ ===== -->
<div class="category-tabs" id="categoryTabs"></div>

<!-- ===== メインエリア ===== -->
<div class="main">
  <!-- メニューグリッド -->
  <div class="menu-area">
    <div class="menu-grid" id="menuGrid"></div>
  </div>

  <!-- 右サイドパネル（注文リスト） -->
  <div class="side-panel">
    <div class="side-title">🛎 ちゅうもん</div>
    <div class="order-list" id="orderList"></div>
    <div class="side-footer">
      <button class="clear-btn" onclick="clearOrder()">クリア</button>
      <button class="total-btn" onclick="showModal()">ちゅうもんする</button>
    </div>
  </div>
</div>

<!-- ===== 読み上げバナー ===== -->
<div class="speaking-banner" id="speakingBanner">
  <span class="banner-emoji" id="bannerEmoji"></span>
  <span id="bannerText"></span>
</div>

<!-- ===== お会計モーダル ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>🍣 ごちゅうもんありがとう</h2>
    <div class="modal-list" id="modalList"></div>
    <button class="modal-close" onclick="closeModal()">かいけい</button>
  </div>
</div>


<!-- ===== リリースノートモーダル ===== -->

// ===== 状態管理 =====
let currentCategory = Object.keys(menuData)[0]; // 現在のカテゴリ
let orderItems = [];   // 注文リスト
let debugLog = [];     // デバッグログ
let isSpeaking = false; // 音声再生中フラグ

// ===== デバッグログ関数 =====
function log(msg) {
  const time = new Date().toLocaleTimeString();
  const entry = `[${time}] ${msg}`;
  debugLog.push(entry);
  document.getElementById('debugMsg').textContent = entry;
  console.log(entry);
}

// ===== カテゴリタブ生成 =====
function renderTabs() {
  const container = document.getElementById('categoryTabs');
  container.innerHTML = '';
  Object.keys(menuData).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (cat === currentCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      currentCategory = cat;
      renderTabs();
      renderMenu();
      log(`カテゴリ切替: ${cat}`);
    };
    container.appendChild(btn);
  });
}

// ===== アセット読み取り共通ヘルパー =====
// localStorage → メモリキャッシュ（クラウド由来）の順で値を取得
// シークレットモード等で localStorage が動かないケースでもクラウドデータを表示できる
function readAsset(key) {
  try {
    const ls = localStorage.getItem(key);
    if (ls) return ls;
  } catch (e) { /* ignore */ }
  if (window.cloudStore && typeof window.cloudStore.getAsset === 'function') {
    return window.cloudStore.getAsset(key);
  }
  return null;
}

// ===== カスタム画像の読み込み =====
function getCustomImage(name) {
  return readAsset('image_' + name);
}

// ===== メニューグリッド生成 =====
function renderMenu() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  const items = menuData[currentCategory];
  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'menu-card';
    // カスタム画像があれば優先、なければ絵文字
    const customImg = getCustomImage(item.name);
    const visual = customImg
      ? `<img src="${customImg}" alt="${item.name}">`
      : `<span class="menu-emoji">${item.emoji}</span>`;
    card.innerHTML = `
      <div class="menu-emoji-wrap">
        ${visual}
        <span class="price-badge">${item.price}</span>
      </div>
      <div class="menu-label">
        <div class="menu-name">${item.name}</div>
        <div class="menu-yomi">${item.yomi}</div>
      </div>
    `;
    // タップ時: 音声再生 + 注文追加
    card.onclick = () => onMenuTap(item, card);
    grid.appendChild(card);
  });
}

// ===== メニュータップ処理 =====
function onMenuTap(item, card) {
  // ビジュアルフィードバック
  card.classList.add('playing');
  setTimeout(() => card.classList.remove('playing'), 400);

  // バナー表示
  showBanner(item.emoji, item.name);

  // 音声再生（カスタム → 組み込み → TTS）
  playAudioWithCustom(item);

  // 注文リストに追加
  addToOrder(item);

  // アクセスログ記録
  logAccess(item);

  log(`タップ: ${item.name} | audio: /audio/${item.audioFile}.mp3`);
}

// ===== バナー表示 =====
function showBanner(emoji, name) {
  const banner = document.getElementById('speakingBanner');
  document.getElementById('bannerEmoji').textContent = emoji;
  document.getElementById('bannerText').textContent = name;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 1200);
}

// ===== 音声再生 =====
// voice=2(おとうさん): OTOUSAN_VOICES base64を使用
// voice=1(おかあさん): OKASAN_VOICES base64を使用（未設定ならTTS）
function playAudio(item) {
  let b64 = null;
  if (appliedVoice === 2) {
    b64 = OTOUSAN_VOICES[item.name] || null;
    log(`おとうさん音声試行: ${item.name} → ${b64 ? 'あり' : 'なし'}`);
  } else if (appliedVoice === 1) {
    b64 = (typeof OKASAN_VOICES !== 'undefined' && OKASAN_VOICES[item.name]) || null;
    log(`おかあさん音声試行: ${item.name} → ${b64 ? 'あり' : 'なし(TTS)'}`);
  }

  if (b64) {
    const audio = new Audio(b64);
    audio.play().then(() => {
      log(`音声再生: ${item.name}`);
    }).catch(err => {
      log(`音声失敗、TTS: ${err.message}`);
      speakTTS(item.yomi);
    });
  } else {
    log(`TTS使用: ${item.yomi}`);
    speakTTS(item.yomi);
  }
}

// ===== Web Speech API（フォールバック） =====
function speakTTS(text) {
  if (!window.speechSynthesis) {
    log('Web Speech API非対応');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;  // ゆっくり（子供向け）
  utter.pitch = 1.2;  // 少し高め
  window.speechSynthesis.speak(utter);
  log(`TTS読み上げ: ${text}`);
}

// ===== 注文リストに追加 =====
function addToOrder(item) {
  // 既存アイテムなら個数を増やす
  const existing = orderItems.find(o => o.name === item.name);
  if (existing) {
    existing.count++;
  } else {
    orderItems.push({ ...item, count: 1 });
  }
  renderOrderList();
}

// ===== 注文リスト表示更新 =====
function renderOrderList() {
  const list = document.getElementById('orderList');
  list.innerHTML = '';
  orderItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'order-item';
    div.innerHTML = `
      <span class="order-emoji">${item.emoji}</span>
      <div class="order-info">
        <div class="order-name">${item.name}</div>
        <div class="order-count">×${item.count}</div>
      </div>
    `;
    list.appendChild(div);
  });
  // 一番下にスクロール
  list.scrollTop = list.scrollHeight;
}

// ===== クリア =====
function clearOrder() {
  orderItems = [];
  renderOrderList();
  log('注文クリア');
}

// ===== システム音声（注文・会計）ヘルパー =====
// localStorage キー: voice_order_okasan / voice_order_otousan / voice_checkout_okasan / voice_checkout_otousan
// 管理画面で録音済みなら再生、なければ TTS フォールバック
function playSystemVoice(type /* 'order' | 'checkout' */) {
  const voiceSuffix = appliedVoice === 2 ? 'otousan' : 'okasan';
  const key = `voice_${type}_${voiceSuffix}`;
  const custom = readAsset(key);
  if (custom) {
    log(`システム音声再生: ${type} (${voiceSuffix})`);
    const audio = new Audio(custom);
    audio.play().catch(err => {
      log(`システム音声失敗、TTS: ${err.message}`);
      speakSystemFallback(type);
    });
  } else {
    log(`カスタムなし → TTS: ${type}`);
    speakSystemFallback(type);
  }
}
function speakSystemFallback(type) {
  const defaults = {
    order: 'ごちゅうもんありがとうございました',
    checkout: 'まいどありがとうございました',
  };
  speakTTS(defaults[type] || '');
}

// ===== ちゅうもんモーダル =====
// 「ちゅうもんする」ボタン: 注文音声を再生してモーダルを開く
function showModal() {
  const modal = document.getElementById('modal');
  const list = document.getElementById('modalList');
  if (orderItems.length === 0) {
    list.innerHTML = '<div style="color:#999">まだちゅうもんがありません</div>';
  } else {
    list.innerHTML = orderItems.map(o => `${o.emoji} ${o.name} ×${o.count}`).join('<br>');
  }
  modal.classList.add('open');
  // 注文ボイス（「ご注文ありがとうございました」）
  playSystemVoice('order');
  log('ちゅうもんモーダル表示');
}
// 「かいけい」ボタン: 会計音声を再生してモーダルを閉じる＋カートをクリア
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  playSystemVoice('checkout');
  // 会計後はカートをクリアして次回の注文を受け付けられるように
  setTimeout(() => {
    orderItems = [];
    renderOrderList();
    log('カートクリア（会計完了）');
  }, 300);
}

// ===== 声優選択モーダル =====
let selectedVoice = 1;      // 現在選択中の声優番号（1 or 2）
let appliedVoice  = 1;      // 実際に適用済みの声優番号

// 親アバター画像を voice-photo に反映（管理画面で設定されていれば）
function refreshVoiceAvatars() {
  const mapping = [
    { id: 'voicePhoto1', key: 'image_avatar_okasan', fallback: '👩' },
    { id: 'voicePhoto2', key: 'image_avatar_otousan', fallback: '👨' },
  ];
  mapping.forEach(m => {
    const el = document.getElementById(m.id);
    if (!el) return;
    const custom = readAsset(m.key);
    if (custom) {
      el.innerHTML = `<img src="${custom}" alt="">`;
    } else {
      el.innerHTML = m.fallback;
    }
  });
}

// モーダルを開く（開いた時点で「適用済み」を選択状態にリセット）
function openVoiceModal() {
  selectedVoice = appliedVoice;
  updateVoiceCards();
  refreshVoiceAvatars();
  document.getElementById('voiceModal').classList.add('open');
  log(`声優モーダル表示: 現在=${appliedVoice}`);
}

// モーダルを閉じる
function closeVoiceModal() {
  document.getElementById('voiceModal').classList.remove('open');
  log('声優モーダル: キャンセル');
}

// カードをタップして選択
function selectVoice(num) {
  selectedVoice = num;
  updateVoiceCards();
  log(`声優選択: ${num}番`);
}

// カードのselectedクラスを更新
function updateVoiceCards() {
  document.getElementById('voiceCard1').classList.toggle('selected', selectedVoice === 1);
  document.getElementById('voiceCard2').classList.toggle('selected', selectedVoice === 2);
}

// 「せっていする」→ 適用・確認音声を再生して閉じる
// ===== 確認音声Audioオブジェクトを事前生成（iOS対策） =====
// localStorage に voice_okasan_confirm / voice_otousan_confirm があれば優先
let _okasanAudio = null;
let _otousanAudio = null;

function getConfirmSrc(voiceKey, fallbackB64) {
  // voiceKey: 'okasan_confirm' or 'otousan_confirm'
  const custom = readAsset('voice_' + voiceKey);
  return custom || fallbackB64;
}
function getOkasanAudio() {
  if (!_okasanAudio) { _okasanAudio = new Audio(getConfirmSrc('okasan_confirm', OKASAN_AUDIO_B64)); }
  return _okasanAudio;
}
function getOtousanAudio() {
  if (!_otousanAudio) { _otousanAudio = new Audio(getConfirmSrc('otousan_confirm', OTOUSAN_AUDIO_B64)); }
  return _otousanAudio;
}
// 管理画面でカスタム確認音声を更新した時にキャッシュをクリアさせるため
function invalidateConfirmAudioCache() {
  _okasanAudio = null;
  _otousanAudio = null;
}

// 旧キー（v1.2.x で誤保存された confirm_日本語）→ 新キーへ移行
function migrateConfirmKeys() {
  const map = {
    'voice_confirm_おかあさん確認': 'voice_okasan_confirm',
    'voice_confirm_おとうさん確認': 'voice_otousan_confirm',
  };
  let migrated = 0;
  for (const [oldKey, newKey] of Object.entries(map)) {
    const val = localStorage.getItem(oldKey);
    if (val && !localStorage.getItem(newKey)) {
      try {
        localStorage.setItem(newKey, val);
        localStorage.removeItem(oldKey);
        migrated++;
      } catch(e) {}
    } else if (val && localStorage.getItem(newKey)) {
      localStorage.removeItem(oldKey);
    }
  }
  if (migrated > 0) log(`確認音声キー移行: ${migrated}件`);
}

function applyVoice() {
  appliedVoice = selectedVoice;

  // ⚠️ iOS対策: closeVoiceModal()より先にplay()を呼ぶ
  if (appliedVoice === 1) {
    const audio = getOkasanAudio();
    audio.currentTime = 0;
    audio.play()
      .then(() => log('おかあさん確認音声: 再生開始'))
      .catch(err => {
        log('おかあさん再生失敗、再生成: ' + err.message);
        _okasanAudio = null;
        // カスタムが壊れている場合は組み込みに明示フォールバック
        const a2 = new Audio(OKASAN_AUDIO_B64);
        a2.play().catch(e => log('再試行失敗: ' + e.message));
      });
  } else if (appliedVoice === 2) {
    const audio = getOtousanAudio();
    audio.currentTime = 0;
    audio.play()
      .then(() => log('おとうさん確認音声: 再生開始'))
      .catch(err => {
        log('おとうさん再生失敗、再生成: ' + err.message);
        _otousanAudio = null;
        const a2 = new Audio(OTOUSAN_AUDIO_B64);
        a2.play().catch(e => log('再試行失敗: ' + e.message));
      });
  }

  // 再生開始後にモーダルを閉じる
  closeVoiceModal();
  log(`声優確定: ${appliedVoice}番`);
}

// ===== デバッグ =====
function toggleDebug() {
  const bar = document.getElementById('debugBar');
  bar.classList.toggle('show');
}
function copyDebug() {
  navigator.clipboard.writeText(debugLog.join('\n'))
    .then(() => alert('ログをコピーしました'))
    .catch(() => log('コピー失敗'));
}
// 右上のお魚アイコンを5連打で開発者モード（デバッグバー表示）
// ロゴは help.html へのリンクになっているため、別要素をトリガーに
let tapCount = 0;
let lastTapTime = 0;
const fishEl = document.querySelector('.header-fish');
if (fishEl) {
  fishEl.style.cursor = 'pointer';
  fishEl.addEventListener('click', () => {
    const now = Date.now();
    // 2秒以上間が空いたらカウントリセット（誤操作防止）
    if (now - lastTapTime > 2000) tapCount = 0;
    lastTapTime = now;
    tapCount++;
    if (tapCount >= 5) {
      tapCount = 0;
      document.getElementById('debugBar').classList.toggle('show');
    }
  });
}

// ===== アクセスログ記録 =====
function logAccess(item) {
  try {
    const logs = JSON.parse(localStorage.getItem('access_log') || '[]');
    logs.push({
      ts: Date.now(),
      name: item.name,
      emoji: item.emoji,
      voice: appliedVoice,
    });
    // 最大1000件保持
    if (logs.length > 1000) logs.splice(0, logs.length - 1000);
    localStorage.setItem('access_log', JSON.stringify(logs));
  } catch(e) {}
}

// ===== カスタム音声の読み込み =====
function getCustomVoice(key) {
  return readAsset('voice_' + key);
}

function playAudioWithCustom(item) {
  const voicePrefix = appliedVoice === 2 ? 'otousan' : 'okasan';
  const customKey = voicePrefix + '_' + item.name;
  const customVoice = getCustomVoice(customKey);

  if (customVoice) {
    log(`カスタム音声再生: ${item.name}`);
    const audio = new Audio(customVoice);
    audio.play().catch(err => {
      log(`カスタム音声失敗、フォールバック: ${err.message}`);
      playAudio(item);
    });
  } else {
    playAudio(item);
  }
}

// ===== クラウド準備待ち =====
function ensureCloudStore(cb) {
  if (window.cloudStore) cb();
  else window.addEventListener('cloud-store-ready', cb, { once: true });
}

// ===== クラウド接続状況インジケーター =====
function updateCloudStatus(kind /* 'connecting' | 'success' | 'error' */, text) {
  const el = document.getElementById('cloudStatus');
  if (!el) return;
  el.classList.remove('connecting', 'success', 'error');
  el.classList.add(kind, 'show');
  el.textContent = text;
}
function hideCloudStatus() {
  const el = document.getElementById('cloudStatus');
  if (el) el.classList.remove('show');
}

// ===== 初期化 =====
function init() {
  // v1.2.x で誤保存された確認音声キーを新形式へ移行
  migrateConfirmKeys();
  renderTabs();
  renderMenu();
  // 確認音声を事前ロード（iOS対策）
  setTimeout(() => {
    getOkasanAudio();
    getOtousanAudio();
    log('確認音声プリロード完了');
  }, 500);
  // 管理画面からの音声・画像更新を監視（同一オリジンの別タブ）
  window.addEventListener('storage', (e) => {
    if (e.key === 'voices_updated') {
      log('音声データ更新を検知 → 確認音声キャッシュクリア');
      invalidateConfirmAudioCache();
      setTimeout(() => { getOkasanAudio(); getOtousanAudio(); }, 100);
    }
    if (e.key === 'images_updated') {
      log('画像データ更新を検知 → 再描画');
      renderMenu();
      refreshVoiceAvatars();
    }
  });
  // bfcache から復元された場合も確認音声キャッシュを更新
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      log('bfcache復元 → 確認音声キャッシュクリア');
      invalidateConfirmAudioCache();
    }
  });
  // クラウド（Firestore）購読：他端末からの変更をリアルタイム反映
  ensureCloudStore(() => {
    const code = window.cloudStore.getFamilyCode();
    log(`☁️ クラウド接続: ${code}`);
    updateCloudStatus('connecting', `☁️ 接続中 (${code})`);
    window.cloudStore.subscribe(code, (info) => {
      log(`☁️ クラウド応答 (firstLoad=${info.firstLoad}, changes=${info.changes}, total=${info.totalDocs}件)`);
      renderMenu();
      refreshVoiceAvatars();
      invalidateConfirmAudioCache();
      updateCloudStatus('success', `☁️ 同期完了 (${info.totalDocs}件)`);
      // 成功時は 3 秒後にフェードアウト
      setTimeout(() => hideCloudStatus(), 3000);
    }, (err) => {
      const c = err && err.code ? err.code : 'error';
      log(`☁️ クラウドエラー: ${c} ${err && err.message}`);
      updateCloudStatus('error', `⚠️ ${c}`);
    });
  });
  // クラウド接続が 15 秒来なかったら警告（SDK ロード失敗等）
  setTimeout(() => {
    const el = document.getElementById('cloudStatus');
    if (el && el.classList.contains('connecting')) {
      updateCloudStatus('error', '⚠️ クラウド接続タイムアウト');
    }
  }, 15000);
  log('アプリ初期化完了');
}
init();
</script>
