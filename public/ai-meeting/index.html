<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI架空キャラ会議</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <style>
    .meeting-output h1 { font-size:1.5em; font-weight:bold; margin:1em 0 .5em }
    .meeting-output h2 { font-size:1.3em; font-weight:bold; margin:1em 0 .5em }
    .meeting-output h3 { font-size:1.15em; font-weight:bold; margin:.8em 0 .4em }
    .meeting-output p  { margin:.5em 0; line-height:1.8 }
    .meeting-output ul,.meeting-output ol { margin:.5em 0; padding-left:1.5em }
    .meeting-output li { margin:.3em 0; line-height:1.7 }
    .meeting-output blockquote { border-left:3px solid #a855f7; padding-left:1em; margin:.8em 0; color:#6b7280 }
    .meeting-output strong { font-weight:bold }
    .meeting-output hr { margin:1.5em 0; border-color:#e5e7eb }
    .meeting-output code { background:#f3f4f6; padding:.15em .4em; border-radius:3px; font-size:.9em }
    .cs::-webkit-scrollbar { width:6px }
    .cs::-webkit-scrollbar-track { background:#f1f5f9; border-radius:3px }
    .cs::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px }
    @keyframes pd { 0%,100%{opacity:.4} 50%{opacity:1} }
    .pd { animation:pd 1.5s infinite }
    .pd:nth-child(2){animation-delay:.3s}.pd:nth-child(3){animation-delay:.6s}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .sc::after{content:'▊';animation:blink 1s infinite;color:#a855f7}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const CHARS = [
      { id:'genius',   emoji:'🧠', name:'天才',       bg:'#f3e8ff', border:'#a855f7', color:'#7c3aed', desc:'常識を無視した大胆なアイデアを出す' },
      { id:'beginner', emoji:'🔰', name:'初心者',     bg:'#ecfdf5', border:'#34d399', color:'#059669', desc:'素朴な疑問で前提を問い直す' },
      { id:'positive', emoji:'☀️', name:'ポジティブ', bg:'#fefce8', border:'#facc15', color:'#ca8a04', desc:'可能性を広げてアイデアを育てる' },
      { id:'worrier',  emoji:'😰', name:'心配性',     bg:'#fef2f2', border:'#f87171', color:'#dc2626', desc:'リスクを洗い出し現実チェックする' },
    ];
    const DEF_P = ['🛠️ 開発者目線','📣 マーケティング目線','🤖 AIコンサル目線'];

    const buildPrompt = (theme, perspectives) =>
`### タスク
テーマについて関連する天才・初心者・ポジティブ・心配性なキャラ4人を作成し、
批判的思考で非常に価値の高い架空の会議を進めてください（最低10000字以上）。
会議の最後に天才ブロガーの目線で議事録を作成してください。

### 会議ルール
- キャラ設定を詳細に記述してください
- 議論は深掘りか横展開のみ。同意のみの発言は不要
- 批判的思考で反論・アイデア出しを活発に行う
- 否定する場合は必ず代替案を出す

### 専門視点
${perspectives.join('\n')}

### テーマ：
・${theme}`;

    // OpenAI ストリーミング
    async function* streamOpenAI(apiKey, model, prompt) {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
        body:JSON.stringify({model,messages:[{role:'user',content:prompt}],stream:true,max_tokens:16000,temperature:0.9}),
      });
      if (!res.ok) throw new Error(`OpenAI Error: ${res.status} ${await res.text()}`);
      const reader=res.body.getReader(), dec=new TextDecoder(); let buf='';
      while(true){
        const {done,value}=await reader.read(); if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n'); buf=lines.pop()||'';
        for(const l of lines){
          const t=l.trim(); if(!t||t==='data: [DONE]')continue;
          if(t.startsWith('data: ')){try{const j=JSON.parse(t.slice(6));const c=j.choices?.[0]?.delta?.content;if(c)yield c;}catch{}}
        }
      }
    }

    // Claude ストリーミング
    async function* streamClaude(apiKey, model, prompt) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': apiKey,   // trim済みのキーを渡す
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({model,max_tokens:16000,messages:[{role:'user',content:prompt}],stream:true,temperature:0.9}),
      });
      if (!res.ok) throw new Error(`Claude Error: ${res.status} ${await res.text()}`);
      const reader=res.body.getReader(), dec=new TextDecoder(); let buf='';
      while(true){
        const {done,value}=await reader.read(); if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n'); buf=lines.pop()||'';
        for(const l of lines){
          const t=l.trim(); if(!t)continue;
          if(t.startsWith('data: ')){try{const j=JSON.parse(t.slice(6));if(j.type==='content_block_delta'&&j.delta?.text)yield j.delta.text;}catch{}}
        }
      }
    }

    // 設定パネル
    function SettingsPanel({settings,setSettings,open,setOpen}){
      const [showKey,setShowKey]=useState(false);
      const providers=[
        {id:'openai',  name:'OpenAI',            models:['gpt-4o','gpt-4o-mini','gpt-4-turbo','o3-mini']},
        {id:'claude',  name:'Claude (Anthropic)', models:['claude-sonnet-4-6','claude-opus-4-6','claude-haiku-4-5-20251001']},
      ];
      const cur=providers.find(p=>p.id===settings.provider);
      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
          <button onClick={()=>setOpen(!open)} className="w-full px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition">
            <div className="flex items-center gap-3">
              <span className="text-xl">⚙️</span>
              <span className="font-semibold text-gray-800">API設定</span>
              {settings.apiKey
                ? <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">設定済み</span>
                : <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">未設定</span>}
            </div>
            <svg className={`w-5 h-5 text-gray-400 transition-transform ${open?'rotate-180':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          {open && (
            <div className="px-6 pb-6 space-y-4 border-t border-gray-100 pt-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">AIプロバイダ</label>
                <div className="flex gap-3">
                  {providers.map(p=>(
                    <button key={p.id} onClick={()=>setSettings(s=>({...s,provider:p.id,model:p.models[0]}))}
                      className={`flex-1 py-2.5 px-4 rounded-xl border-2 text-sm font-medium transition ${settings.provider===p.id?'border-purple-500 bg-purple-50 text-purple-700':'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
                      {p.name}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">モデル</label>
                <select value={settings.model} onChange={e=>setSettings(s=>({...s,model:e.target.value}))}
                  className="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-purple-500 outline-none">
                  {cur?.models.map(m=><option key={m} value={m}>{m}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">APIキー</label>
                <div className="relative">
                  <input type={showKey?'text':'password'} value={settings.apiKey}
                    onChange={e=>setSettings(s=>({...s,apiKey:e.target.value}))}
                    onBlur={e=>setSettings(s=>({...s,apiKey:e.target.value.trim()}))}  /* フォーカスアウト時にtrim */
                    placeholder={settings.provider==='openai'?'sk-...':'sk-ant-api03-...'}
                    className="w-full px-4 py-2.5 pr-20 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-purple-500 outline-none font-mono"/>
                  <button onClick={()=>setShowKey(!showKey)}
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600">
                    {showKey?'🙈 隠す':'👁 表示'}
                  </button>
                </div>
                {settings.apiKey && (
                  <p className="text-xs text-gray-400 mt-1">
                    {settings.apiKey.length}文字 ／ 先頭: <code className="bg-gray-100 px-1 rounded">{settings.apiKey.slice(0,12)}...</code>
                  </p>
                )}
                <p className="text-xs text-gray-400 mt-1">
                  取得先: {settings.provider==='claude'?'console.anthropic.com':'platform.openai.com'} ／ localStorageに保存
                </p>
              </div>
            </div>
          )}
        </div>
      );
    }

    // キャラカード
    function CharCards(){
      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {CHARS.map(c=>(
            <div key={c.id} style={{background:c.bg,borderColor:c.border}} className="border rounded-xl p-4 text-center">
              <div className="text-3xl mb-2">{c.emoji}</div>
              <div className="font-bold" style={{color:c.color}}>{c.name}</div>
              <div className="text-xs text-gray-500 mt-1">{c.desc}</div>
            </div>
          ))}
        </div>
      );
    }

    // 専門視点
    function PerspTags({list,setList}){
      const [v,setV]=useState('');
      const add=()=>{if(v.trim()&&!list.includes(v.trim())){setList([...list,v.trim()]);setV('');}};
      return (
        <div className="space-y-2">
          <label className="block text-sm font-medium text-gray-700">専門視点（カスタマイズ可）</label>
          <div className="flex flex-wrap gap-2">
            {list.map((p,i)=>(
              <span key={i} className="inline-flex items-center gap-1 bg-purple-100 text-purple-700 text-sm px-3 py-1 rounded-full">
                {p}<button onClick={()=>setList(list.filter((_,j)=>j!==i))} className="ml-1 hover:text-purple-900">&times;</button>
              </span>
            ))}
          </div>
          <div className="flex gap-2">
            <input value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
              placeholder="追加の視点を入力..." className="flex-1 px-3 py-2 rounded-lg border border-gray-200 text-sm focus:ring-2 focus:ring-purple-500 outline-none"/>
            <button onClick={add} className="px-4 py-2 bg-purple-100 text-purple-700 rounded-lg text-sm font-medium hover:bg-purple-200 transition">追加</button>
          </div>
        </div>
      );
    }

    // 会議出力
    function Output({content,streaming}){
      const ref=useRef(null);
      const [auto,setAuto]=useState(true);
      useEffect(()=>{if(auto&&ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[content,auto]);
      if(!content)return null;
      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
          <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <span className="text-xl">💬</span>
              <span className="font-semibold text-gray-800">{streaming?'会議進行中...':'会議完了 ✅'}</span>
              {streaming&&<span className="flex gap-1"><span className="w-2 h-2 bg-purple-500 rounded-full pd"/><span className="w-2 h-2 bg-purple-500 rounded-full pd"/><span className="w-2 h-2 bg-purple-500 rounded-full pd"/></span>}
            </div>
            <span className="text-sm text-gray-400">{content.length.toLocaleString()}文字</span>
          </div>
          <div ref={ref} onScroll={()=>{if(!ref.current)return;const{scrollTop,scrollHeight,clientHeight}=ref.current;setAuto(scrollHeight-scrollTop-clientHeight<100);}}
            className={`p-6 max-h-[70vh] overflow-y-auto cs meeting-output text-gray-800 leading-relaxed ${streaming?'sc':''}`}
            dangerouslySetInnerHTML={{__html:marked.parse(content,{breaks:true})}}/>
        </div>
      );
    }

    // デバッグ
    function Debug({logs}){
      const [open,setOpen]=useState(false);
      return (
        <div className="fixed bottom-4 right-4 z-50">
          {open&&<div className="bg-gray-900 text-green-400 rounded-xl shadow-2xl w-96 max-h-64 overflow-y-auto mb-2 p-4 text-xs font-mono cs">{logs.map((l,i)=><div key={i}>{l}</div>)}</div>}
          <div className="flex gap-2 justify-end">
            <button onClick={()=>navigator.clipboard.writeText(logs.join('\n'))} className="bg-gray-800 text-white px-3 py-2 rounded-lg text-xs hover:bg-gray-700 shadow-lg">📋 ログコピー</button>
            <button onClick={()=>setOpen(!open)} className="bg-gray-800 text-white px-3 py-2 rounded-lg text-xs hover:bg-gray-700 shadow-lg">{open?'🔽 閉じる':'🐛 デバッグ'}</button>
          </div>
        </div>
      );
    }

    // メイン
    function App(){
      const [settings,setSettings]=useState(()=>{
        try{const s=localStorage.getItem('ai-meeting-v2');return s?JSON.parse(s):{provider:'claude',model:'claude-sonnet-4-6',apiKey:''};}
        catch{return{provider:'claude',model:'claude-sonnet-4-6',apiKey:''};}
      });
      const [sOpen,setSOpen]=useState(!settings.apiKey);
      const [theme,setTheme]=useState('');
      const [persp,setPersp]=useState([...DEF_P]);
      const [content,setContent]=useState('');
      const [streaming,setStreaming]=useState(false);
      const [error,setError]=useState('');
      const [logs,setLogs]=useState([]);
      const log=useCallback(m=>setLogs(p=>[...p,`[${new Date().toLocaleTimeString()}] ${m}`]),[]);

      useEffect(()=>{try{localStorage.setItem('ai-meeting-v2',JSON.stringify(settings));}catch{}},[settings]);

      const start=async()=>{
        const apiKey=settings.apiKey.trim();   // ← 必ずtrim
        if(!apiKey){setError('APIキーを設定してください');setSOpen(true);return;}
        if(!theme.trim()){setError('テーマを入力してください');return;}
        setError('');setContent('');setStreaming(true);setSOpen(false);
        log(`開始: ${settings.provider} / ${settings.model}`);
        log(`APIキー: ${apiKey.length}文字 / 先頭12: "${apiKey.slice(0,12)}"`);
        try{
          const gen=settings.provider==='openai'
            ?streamOpenAI(apiKey,settings.model,buildPrompt(theme.trim(),persp))
            :streamClaude(apiKey,settings.model,buildPrompt(theme.trim(),persp));
          let full='';
          for await(const c of gen){full+=c;setContent(full);}
          log(`完了: ${full.length}文字`);
        }catch(e){const m=e.message||'Unknown';setError(m);log(`エラー: ${m}`);}
        finally{setStreaming(false);}
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-purple-50 via-white to-indigo-50">
          <header className="bg-white/80 backdrop-blur-sm border-b border-gray-200 sticky top-0 z-40">
            <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="text-2xl">🎭</span>
                <div>
                  <h1 className="text-lg font-bold text-gray-900">AI架空キャラ会議</h1>
                  <p className="text-xs text-gray-500">4人のAIキャラが多角的に議論</p>
                </div>
              </div>
              {content&&!streaming&&(
                <div className="flex gap-2">
                  <button onClick={()=>navigator.clipboard.writeText(content)} className="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition">📋 コピー</button>
                  <button onClick={()=>{const b=new Blob([content],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`meeting-${Date.now()}.md`;a.click();}}
                    className="px-3 py-1.5 bg-purple-100 text-purple-700 rounded-lg text-sm hover:bg-purple-200 transition">💾 保存</button>
                </div>
              )}
            </div>
          </header>
          <main className="max-w-4xl mx-auto px-4 py-6 space-y-5">
            <SettingsPanel settings={settings} setSettings={setSettings} open={sOpen} setOpen={setSOpen}/>
            {!content&&<CharCards/>}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">会議テーマ</label>
                <textarea value={theme} onChange={e=>setTheme(e.target.value)} rows={3} disabled={streaming}
                  placeholder="例: 個人開発のSaaSで月10万円の収益を得るための戦略"
                  className="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-purple-500 outline-none resize-none"/>
              </div>
              <PerspTags list={persp} setList={setPersp}/>
              {error&&<div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">⚠️ {error}</div>}
              {!streaming
                ?<button onClick={start} disabled={!theme.trim()} className="w-full py-3 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-xl font-semibold text-sm hover:from-purple-700 hover:to-indigo-700 transition disabled:opacity-40 disabled:cursor-not-allowed shadow-lg shadow-purple-200">🎭 会議を開始する</button>
                :<button onClick={()=>setStreaming(false)} className="w-full py-3 bg-red-500 text-white rounded-xl font-semibold text-sm hover:bg-red-600 transition">⏹ 会議を中断する</button>
              }
            </div>
            <Output content={content} streaming={streaming}/>
          </main>
          <Debug logs={logs}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
