# Cloudflare Worker 設定ファイル
# デプロイ先: https://ai-meeting-proxy.<あなたのサブドメイン>.workers.dev

name = "ai-meeting-proxy"
main = "src/worker.js"
compatibility_date = "2024-09-23"

# 無料プランのリクエスト数上限: 100,000回/日
# シークレット変数は wrangler secret put で設定（このファイルには書かない）
# wrangler secret put CLAUDE_API_KEY
# wrangler secret put SHARED_TOKEN
