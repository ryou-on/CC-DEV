<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 World ABC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Righteous&family=Baloo+2:wght@800&family=Nunito:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ===== 16:9 ステージ ===== */
#stage {
  position: relative;
  width: 100vw;
  height: 56.25vw;
  max-height: 100vh;
  max-width: 177.78vh;
  overflow: hidden;
}

/* ===== 背景（言語ごとに変わる） ===== */
#bg-layer {
  position: absolute;
  inset: 0;
  transition: background 0.7s ease;
}

/* ===== タブバー ===== */
#tab-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 8%;
  display: flex;
  z-index: 50;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(8px);
  border-bottom: 2px solid rgba(255,255,255,0.1);
}

.tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4vw;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 1.5vw;
  color: rgba(255,255,255,0.45);
  border-bottom: 3px solid transparent;
  transition: all 0.25s ease;
  user-select: none;
  letter-spacing: 0.03em;
  padding-bottom: 2px;
  position: relative;
}
.tab:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }
.tab.active {
  color: #fff;
  border-bottom-color: var(--accent);
  background: rgba(255,255,255,0.08);
}
.tab .flag { font-size: 2vw; line-height: 1; }
.tab .lang-name { font-size: 1.4vw; }

/* ===== メインコンテンツエリア ===== */
#content {
  position: absolute;
  top: 8%; left: 0; right: 0; bottom: 0;
}

/* ===== 待機画面 ===== */
#idle {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5vh;
  z-index: 10;
  transition: opacity 0.4s;
  pointer-events: none;
}
#idle.hidden { opacity: 0; }

#idle-title {
  font-size: 5.5vw;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 4vw var(--accent), 0 3px 0 rgba(0,0,0,0.5);
  animation: idleFloat 3s ease-in-out infinite;
  letter-spacing: 0.05em;
}
#idle-sub {
  font-size: 2.2vw;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.08em;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}
#idle-hint {
  font-size: 1.6vw;
  color: rgba(255,255,255,0.35);
  font-style: italic;
}
@keyframes idleFloat {
  0%,100% { transform: translateY(0) rotate(-0.8deg); }
  50%      { transform: translateY(-1.2vh) rotate(0.8deg); }
}

/* ===== 表示エリア ===== */
#display {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
#display.show { display: flex; }

#letter {
  font-size: 20vw;
  line-height: 0.9;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 5vw var(--accent), 0 0.6vw 0 rgba(0,0,0,0.4);
  animation: letterPop 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
  z-index: 2;
}
@keyframes letterPop {
  from { transform: scale(0.3) rotate(-12deg); opacity: 0; }
  to   { transform: scale(1)   rotate(0deg);   opacity: 1; }
}

#illust {
  font-size: 14vw;
  line-height: 1;
  margin-top: -1.5vw;
  animation: illustBounce 0.5s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
  filter: drop-shadow(0 2vw 3vw rgba(0,0,0,0.5));
  z-index: 2;
}
@keyframes illustBounce {
  from { transform: scale(0.2) translateY(6vh); opacity: 0; }
  to   { transform: scale(1)   translateY(0);   opacity: 1; }
}

#word-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3vw;
  margin-top: 0.3vw;
  animation: wordSlide 0.4s 0.2s ease-out both;
  z-index: 2;
}
@keyframes wordSlide {
  from { transform: translateY(3vh); opacity: 0; }
  to   { transform: translateY(0);   opacity: 1; }
}

#main-word {
  font-size: 4.5vw;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 15px rgba(0,0,0,0.7), 0 0 3vw var(--accent);
  letter-spacing: 0.04em;
  text-align: center;
  max-width: 80vw;
  line-height: 1.15;
}
#sub-word {
  font-size: 1.8vw;
  color: rgba(255,255,255,0.6);
  font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  letter-spacing: 0.06em;
}

/* ===== フラッシュ ===== */
#bg-flash {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  z-index: 5;
}
#bg-flash.flash { animation: flashAnim 0.5s ease-out forwards; }
@keyframes flashAnim { 0% { opacity: 0.35; } 100% { opacity: 0; } }

/* ===== パーティクル ===== */
.particle {
  position: absolute;
  pointer-events: none;
  animation: pFly var(--dur) ease-out forwards;
  z-index: 6;
}
@keyframes pFly {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(0); opacity: 0; }
}


/* ===== 単語リストパネル ===== */
#wordlist-btn {
  position: absolute;
  bottom: 2vh; left: 1.5vw;
  z-index: 30;
  padding: 0.5vh 1vw;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.3);
  border-radius: 0.5vw;
  font-size: 1.1vw;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  transition: all 0.2s;
}
#wordlist-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

#wordlist-panel {
  position: absolute;
  inset: 8% 0 0 0;
  z-index: 60;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(16px);
  display: none;
  flex-direction: column;
  padding: 2vh 2vw;
  overflow-y: auto;
}
#wordlist-panel.open { display: flex; }
#wordlist-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5vh;
}
#wordlist-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.5vw;
  color: #fff;
}
#wordlist-close {
  font-size: 2vw;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  padding: 0.3vh 0.8vw;
  border-radius: 0.5vw;
  transition: background 0.2s;
  border: none; background: rgba(255,255,255,0.1);
}
#wordlist-close:hover { background: rgba(255,255,255,0.2); color: #fff; }
#wordlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(14vw, 1fr));
  gap: 1vh 1vw;
}
.wl-key-group { background: rgba(255,255,255,0.06); border-radius: 0.8vw; padding: 1vh 1vw; }
.wl-key-label {
  font-family: 'Fredoka One', cursive;
  font-size: 1.8vw;
  color: var(--accent);
  margin-bottom: 0.5vh;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 0.3vh;
}
.wl-word {
  display: flex;
  align-items: center;
  gap: 0.4vw;
  font-size: 1.1vw;
  color: rgba(255,255,255,0.8);
  padding: 0.2vh 0;
  line-height: 1.4;
}
.wl-word .wl-emoji { font-size: 1.4vw; }
.wl-word .wl-text { flex: 1; }
.wl-word .wl-sub  { font-size: 0.85vw; color: rgba(255,255,255,0.4); }

/* ===== ヒント・コンソール ===== */
#hint {
  position: absolute;
  bottom: 2.5vh; left: 50%;
  transform: translateX(-50%);
  font-size: 1.4vw;
  color: rgba(255,255,255,0.28);
  white-space: nowrap;
  z-index: 20;
  letter-spacing: 0.05em;
}
#console-btn {
  position: absolute;
  bottom: 2vh; right: 1.5vw;
  z-index: 30;
  padding: 0.5vh 1vw;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.3);
  border-radius: 0.5vw;
  font-size: 1.1vw;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  transition: all 0.2s;
}
#console-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

/* ===== モバイル：横向きアラート ===== */
#landscape-alert {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.95);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3vh;
}
#landscape-alert .la-icon  { font-size: 15vw; animation: laRotate 1.5s ease-in-out infinite alternate; }
#landscape-alert .la-text  { font-family:'Fredoka One',cursive; font-size:6vw; color:#fff; text-align:center; line-height:1.4; }
#landscape-alert .la-sub   { font-size:3vw; color:rgba(255,255,255,0.5); }
@keyframes laRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(-90deg); }
}
@media (orientation: landscape) and (max-width: 1024px) {
  /* タブレット以下の横向きで発動 */
  #landscape-alert { display: flex; }
}

/* ===== ブラウザ内専用ソフトキーボード ===== */
#soft-keyboard {
  display: none; /* JSで制御 */
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 70;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(16px);
  padding: 1.5vw 1vw 2vw;
  border-top: 1px solid rgba(255,255,255,0.12);
}
/* モバイル縦向きのみ有効 */
@media (max-width: 768px) and (orientation: portrait) {
  #soft-keyboard { display: flex; flex-direction: column; gap: 1.2vw; }
  #hint { display: none; }
  /* ステージをキーボード分だけ縮小 */
  #stage { height: calc(56.25vw - 36vw); }
}
.sk-row {
  display: flex;
  justify-content: center;
  gap: 1.2vw;
}
.sk-key {
  flex: 1;
  max-width: 9.5vw;
  height: 8.5vw;
  border-radius: 1.2vw;
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-family: 'Fredoka One', cursive;
  font-size: 4.5vw;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, transform 0.08s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.sk-key:active, .sk-key.pressed {
  background: var(--accent, rgba(255,255,255,0.5));
  transform: scale(0.92);
}
/* スペースキー・特殊キー */
.sk-key.sk-wide { max-width: 20vw; font-size: 3vw; }


/* ===== 言語別スタイル ===== */

/* EN：宇宙 */
body.lang-en #bg-layer {
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
}
body.lang-en { --accent: #7C3AED; }
body.lang-en #letter { font-family: 'Fredoka One', cursive; }
body.lang-en #main-word { font-family: 'Fredoka One', cursive; }

/* ZU：サバンナ */
body.lang-zu #bg-layer {
  background: linear-gradient(160deg, #0d1b3e 0%, #1a3a6e 35%, #c2612a 70%, #6b2700 100%);
}
body.lang-zu { --accent: #E67E22; }
body.lang-zu #letter { font-family: 'Baloo 2', cursive; }
body.lang-zu #main-word { font-family: 'Baloo 2', cursive; }

/* ES：フィエスタ */
body.lang-es #bg-layer {
  background: radial-gradient(ellipse at 50% 40%, #3d0c00 0%, #1a0800 60%, #0a0400 100%);
}
body.lang-es { --accent: #E74C3C; }
body.lang-es #letter { font-family: 'Righteous', cursive; }
body.lang-es #main-word { font-family: 'Righteous', cursive; }

/* JA：和 */
body.lang-ja #bg-layer {
  background: linear-gradient(160deg, #1a0010 0%, #3d0030 40%, #1a0018 70%, #0a000a 100%);
}
body.lang-ja { --accent: #FF4081; }
body.lang-ja #letter { font-family: 'Nunito', sans-serif; font-weight: 900; }
body.lang-ja #main-word { font-family: 'Nunito', sans-serif; font-weight: 900; }

/* VI：南国 */
body.lang-vi #bg-layer {
  background: linear-gradient(160deg, #001a0e 0%, #003d1a 35%, #004d20 65%, #001a0a 100%);
}
body.lang-vi { --accent: #00C853; }
body.lang-vi #letter { font-family: 'Nunito', sans-serif; font-weight: 900; }
body.lang-vi #main-word { font-family: 'Nunito', sans-serif; font-weight: 900; }

/* ===== 言語別タブ装飾背景 ===== */
body.lang-en  #tab-bar { border-bottom-color: rgba(124,58,237,0.4); }
body.lang-zu  #tab-bar { border-bottom-color: rgba(230,126,34,0.4); }
body.lang-es  #tab-bar { border-bottom-color: rgba(231,76,60,0.4); }
body.lang-ja  #tab-bar { border-bottom-color: rgba(255,64,129,0.4); }
body.lang-vi  #tab-bar { border-bottom-color: rgba(0,200,83,0.4); }

/* 日本語専用：和柄パターン背景 */
body.lang-ja #bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,64,129,0.06) 1px, transparent 1px);
  background-size: 3vw 3vw;
}

/* オランダ語専用：ダイヤ格子 */
body.lang-nl #bg-layer {
  background: linear-gradient(160deg, #001a33 0%, #003366 35%, #004080 65%, #001020 100%);
}
body.lang-nl { --accent: #FF6600; }
body.lang-nl #letter { font-family: 'Fredoka One', cursive; }
body.lang-nl #main-word { font-family: 'Fredoka One', cursive; }
body.lang-nl #tab-bar { border-bottom-color: rgba(255,102,0,0.4); }
body.lang-nl #bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(45deg, rgba(255,102,0,0.05) 0px, rgba(255,102,0,0.05) 2px, transparent 2px, transparent 28px);
  background-size: 28px 28px;
}

/* バングラデシュ語専用 */
body.lang-bn #bg-layer {
  background: linear-gradient(160deg, #003300 0%, #005500 35%, #007700 65%, #002200 100%);
}
body.lang-bn { --accent: #FF3333; }
body.lang-bn #letter { font-family: 'Nunito', sans-serif; font-weight: 900; }
body.lang-bn #main-word { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 3.5vw; }
body.lang-bn #tab-bar { border-bottom-color: rgba(255,51,51,0.4); }
body.lang-bn #bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 45% 50%, rgba(255,51,51,0.12) 0%, transparent 50%);
}

/* タイ語専用：寺院・金・赤 */
body.lang-th #bg-layer {
  background: linear-gradient(160deg, #1a0d00 0%, #3d1f00 30%, #6b3800 60%, #1a0800 100%);
}
body.lang-th { --accent: #FFD700; }
body.lang-th #letter { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 16vw; }
body.lang-th #main-word { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 3.8vw; }
body.lang-th #tab-bar { border-bottom-color: rgba(255,215,0,0.4); }
body.lang-th #bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    60deg, rgba(255,215,0,0.04) 0px, rgba(255,215,0,0.04) 1px, transparent 1px, transparent 30px),
    repeating-linear-gradient(
    -60deg, rgba(255,100,0,0.03) 0px, rgba(255,100,0,0.03) 1px, transparent 1px, transparent 30px);
}
/* ベトナム語専用：格子パターン */
body.lang-vi #bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,200,83,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,83,0.05) 1px, transparent 1px);
  background-size: 4vw 4vw;
}
</style>
</head>

<div id="landscape-alert">
  <div class="la-icon">📱</div>
  <div class="la-text">画面を<br>縦にしてください</div>
  <div class="la-sub">Please rotate your device</div>

// ===== JIS/USキーボード自動判定＆ひらがなマッピング =====
// JIS配列: e.code → ひらがな（キートップ刻印）
const JIS_KANA = {
  'KeyQ':'た', 'KeyW':'て', 'KeyE':'い', 'KeyR':'す', 'KeyT':'か',
  'KeyY':'ん', 'KeyU':'な', 'KeyI':'に', 'KeyO':'ら', 'KeyP':'せ',
  'BracketLeft':'゛', 'BracketRight':'゜',
  'KeyA':'ち', 'KeyS':'と', 'KeyD':'し', 'KeyF':'は', 'KeyG':'き',
  'KeyH':'く', 'KeyJ':'ま', 'KeyK':'の', 'KeyL':'り', 'Semicolon':'れ',
  'Quote':'け',
  'KeyZ':'つ', 'KeyX':'さ', 'KeyC':'そ', 'KeyV':'ひ', 'KeyB':'こ',
  'KeyN':'み', 'KeyM':'も', 'Comma':'ね', 'Period':'る', 'Slash':'め',
  'Digit1':'ぬ', 'Digit2':'ふ', 'Digit3':'あ', 'Digit4':'う', 'Digit5':'え',
  'Digit6':'お', 'Digit7':'や', 'Digit8':'ゆ', 'Digit9':'よ', 'Digit0':'わ',
  'Minus':'ほ', 'Equal':'へ', 'IntlYen':'ー', 'IntlRo':'ろ',
};

// ひらがな → 日本語データのキー（五十音グループ）
// JIS配列のひらがなをデータキー（あ行=A, か行=K...）に変換
const KANA_TO_DATAKEY = {
  // あ行 → A
  'あ':'A','い':'A','う':'A','え':'A','お':'A',
  // か行 → K (Kana)
  'か':'K','き':'K','く':'K','け':'K','こ':'K',
  // さ行 → S
  'さ':'S','し':'S','す':'S','せ':'S','そ':'S',
  // た行 → T
  'た':'T','ち':'T','つ':'T','て':'T','と':'T',
  // な行 → N
  'な':'N','に':'N','ぬ':'N','ね':'N','の':'N',
  // は行 → H
  'は':'H','ひ':'H','ふ':'H','へ':'H','ほ':'H',
  // ま行 → M
  'ま':'M','み':'M','む':'M','め':'M','も':'M',
  // や行 → Y
  'や':'Y','ゆ':'Y','よ':'Y',
  // ら行 → R
  'ら':'R','り':'R','る':'R','れ':'R','ろ':'R',
  // わ行 → W
  'わ':'W','を':'W','ん':'W',
};

// JIS自動検出フラグ（IntlYen/IntlRo/IntlBackslashが押されたらJIS確定）
let isJIS = null; // null=未判定, true=JIS, false=US

function detectAndGetKey(e) {
  // JIS固有キーが押されたら確定
  if (['IntlYen','IntlRo','IntlBackslash'].includes(e.code)) {
    isJIS = true;
  }
  // 日本語モード以外はそのまま
  if (currentLang !== 'ja') return e.key.toUpperCase();

  // 日本語モード：JIS判定
  if (isJIS === null) {
    // 未判定の場合：e.codeに IntlYen等があればJIS、なければUS判定は保留
    // キートップのひらがなが存在するcodeならJISとして動作させる
    // （物理キー位置でUSとJISは同じなので、まずJISとして試みる）
    // → ユーザーが最初にJIS固有キーを押すか、設定で切り替え
    // 暫定：JIS_KANAにコードがあればJISとして扱う
    if (JIS_KANA[e.code]) {
      // JIS固有キー(IntlYen等)が来るまではJIS推定で動かす
      // （大多数の日本語環境はJISのため）
      isJIS = true;
    }
  }

  if (isJIS) {
    const kana = JIS_KANA[e.code];
    if (kana) return { kana, dataKey: KANA_TO_DATAKEY[kana] || null };
  }
  // USキーボード：従来通りe.keyのローマ字
  return e.key.toUpperCase();
}

const synth = window.speechSynthesis;

synth.onvoiceschanged = () => { voices = synth.getVoices(); };

// ===== 読み上げ中ロック =====
let isSpeaking = false; // true の間はキー入力を受け付けない

function speak(langCode, word) {
  const langDef = LANGS[langCode];
  const voice = voices.find(v => v.lang.startsWith(langDef.voice.split('-')[0]))
             || voices.find(v => v.lang.startsWith('en'));

  const u = new SpeechSynthesisUtterance(word);
  if (voice) u.voice = voice;
  u.lang  = langDef.voice;
  u.rate  = 0.8;
  u.pitch = 1.1;

  isSpeaking = true;
  u.onend   = () => { isSpeaking = false; };
  u.onerror = () => { isSpeaking = false; };

  synth.cancel();
  synth.speak(u);
}

// ===== タブ切り替え =====
function switchLang(lang) {
  currentLang = lang;
  document.body.className = 'lang-' + lang;

  // タブ見た目
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.lang === lang);
    const acc = LANGS[lang] ? getAccent(lang) : '#fff';
    if (t.dataset.lang === lang) t.style.setProperty('--accent', acc);
  });

  // 待機画面テキスト更新
  const ld = LANGS[lang];
  idleTitleEl.textContent = ld.idle[0];
  idleSubEl.textContent   = ld.idle[1];
  idleHintEl.textContent  = ld.idle[2];

  // 表示をリセット → 待機画面へ
  displayEl.classList.remove('show');
  idleEl.classList.remove('hidden');

  synth.cancel();
  isSpeaking = false;
  if (lang !== 'ja') isJIS = null; // 言語切替時にJIS判定リセット
  const wlPanel = document.getElementById('wordlist-panel');
  if (wlPanel && wlPanel.classList.contains('open')) buildWordlist();
}

function getAccent(lang) {
  const map = { en:'#7C3AED', zu:'#E67E22', es:'#E74C3C', ja:'#FF4081', vi:'#00C853', nl:'#FF6600', bn:'#FF3333', th:'#FFD700' };
  return map[lang] || '#fff';
}

// ===== パーティクル =====
const PARTICLES = ['✨','🌟','💫','⭐','🎊','🎉','🔥','💥'];
function spawnParticles(color) {
  const stage = document.getElementById('stage');
  const cx = stage.clientWidth / 2;
  const cy = stage.clientHeight * 0.6; // タブ分下にずらす
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist  = Math.random() * 32 + 12;
    const tx = Math.cos(angle) * dist * (stage.clientWidth / 100);
    const ty = Math.sin(angle) * dist * (stage.clientHeight / 100);
    const sz  = (Math.random() * 2 + 1.2).toFixed(1);
    const rot = (Math.random() * 720 - 360).toFixed(0);
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      font-size:${sz}vw;
      --tx:${tx}px; --ty:${ty}px;
      --rot:${rot}deg;
      --dur:${(Math.random()*0.5+0.5).toFixed(2)}s;
    `;
    p.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];
    stage.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ===== イースターエッグ：キー固有アサイン =====
// 記号・数字キーそれぞれに固有の演出を割り当て
// sound関数の戻り値：再生時間(秒)
function makeNoise(ac, type, freqs, dur, vol=0.4) {
  freqs.forEach(([f,t,d]) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = f;
    g.gain.setValueAtTime(vol, ac.currentTime+t);
    g.gain.linearRampToValueAtTime(0, ac.currentTime+t+(d||0.3));
    o.start(ac.currentTime+t); o.stop(ac.currentTime+t+(d||0.3)+0.05);
  });
}
function makeDrum(ac, dur=0.5, vol=0.8) {
  const buf = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const s=ac.createBufferSource(), g=ac.createGain(), f=ac.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=300;
  s.buffer=buf; s.connect(f); f.connect(g); g.connect(ac.destination);
  g.gain.value=vol; s.start();
}
function makeMeow(ac) {
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination); o.type='sine';
  o.frequency.setValueAtTime(600,ac.currentTime);
  o.frequency.linearRampToValueAtTime(900,ac.currentTime+0.15);
  o.frequency.linearRampToValueAtTime(500,ac.currentTime+0.45);
  g.gain.setValueAtTime(0.35,ac.currentTime);
  g.gain.linearRampToValueAtTime(0,ac.currentTime+0.5);
  o.start(); o.stop(ac.currentTime+0.55);
}

// Shift付き記号も同じキーにマップ（e.keyで来るShift文字 → 対応）
const SHIFT_MAP = {
  '!':'1','@':'2','#':'3','$':'4','%':'5','^':'6','&':'7','*':'8','(':'9',')':'0',
  '_':'-','+':'=','{':'[','}':']',':':';','"':"'",'<':',','>':'.','?':'/','~':'`','|':'\\'
}; 

// AudioContext（初回ユーザー操作後に生成）
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// ===== イースターエッグ発動 =====
const eggOverlay = document.createElement('div');
eggOverlay.style.cssText = `
  position:absolute; inset:0; z-index:80;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:2vh;
  pointer-events:none;
`;
document.getElementById('stage').appendChild(eggOverlay);

let eggTimer = null;
function triggerEasterEgg(key) {
  // キー固有のエッグを取得（なければデフォルト：ランダムな音）
  const mappedKey = SHIFT_MAP[key] || key;
  const egg = EASTER_MAP[mappedKey] || {
    emoji:'🎉', message:'わーい！', bg:'#FF6B6B', dur:600,
    sound:(ac)=>{ const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.type='triangle';o.frequency.value=880;
      g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+0.4);
      o.start();o.stop(ac.currentTime+0.45); }
  };

  // 音
  try { egg.sound(getAC()); } catch(e) {}

  // オーバーレイ表示
  eggOverlay.innerHTML = `
    <div style="font-size:18vw;animation:letterPop .4s cubic-bezier(.34,1.56,.64,1) both;filter:drop-shadow(0 0 4vw white)">${egg.emoji}</div>
    <div style="font-family:'Fredoka One',cursive;font-size:5vw;color:#fff;
      text-shadow:0 0 3vw rgba(255,255,255,.8),0 3px 0 rgba(0,0,0,.4);
      animation:wordSlide .4s .15s ease-out both">${egg.message}</div>
  `;
  eggOverlay.style.background = egg.bg.includes('gradient') ? egg.bg : egg.bg + 'cc';
  eggOverlay.style.display = 'flex';

  // フラッシュ
  flashEl.style.background = typeof egg.bg === 'string' && !egg.bg.includes('gradient') ? egg.bg : '#fff';
  flashEl.classList.remove('flash');
  void flashEl.offsetWidth;
  flashEl.classList.add('flash');

  // スパーク
  spawnParticles(typeof egg.bg === 'string' && !egg.bg.includes('gradient') ? egg.bg : '#fff');

  // egg.dur後に消す & ロック解除
  isSpeaking = true;
  clearTimeout(eggTimer);
  eggTimer = setTimeout(() => {
    eggOverlay.style.display = 'none';
    isSpeaking = false;
  }, egg.dur || 1000);
}

// ===== キー処理（keydown & モバイル共通） =====
function handleKey(e) {
  if (e.repeat) return;
  if (isSpeaking) return;
  if (e.key === 'Escape') return;
  if (e.key === 'Tab') {
    e.preventDefault();
    const langs = Object.keys(LANGS);
    const idx = langs.indexOf(currentLang);
    switchLang(langs[(idx + 1) % langs.length]);
    return;
  }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'r' || e.key === 'R')) return;
  if (e.key === 'F5' || (e.ctrlKey && ['w','W','t','T','n','N'].includes(e.key))) {
    e.preventDefault(); return;
  }

  // 初回キー押下時に全画面へ
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});

  const data = LANGS[currentLang]?.data;

  // ===== 日本語モード：JIS/US自動判定 =====
  let displayKey = null; // 画面表示するキー文字
  let dataKey    = null; // データ引き当てキー
  let kanaChar   = null; // JIS時のひらがな

  const resolved = detectAndGetKey(e);
  if (typeof resolved === 'object') {
    // JISモード：{kana, dataKey}
    kanaChar = resolved.kana;
    dataKey  = resolved.dataKey;
    displayKey = kanaChar; // 画面にはひらがなを大きく表示
  } else {
    // USモード or 日本語以外
    dataKey    = resolved;
    displayKey = resolved;
  }

  // A-Zで対応単語がある → 通常表示
  if (data && dataKey && data[dataKey]) {
    // JIS時：同じかな行の単語からひらがな1文字に絞り込む
    let list = data[dataKey];
    if (kanaChar) {
      // キートップのひらがなで始まる単語を優先
      let filtered = list.filter(it => it.w.startsWith(kanaChar));
      // 「ん」は語頭に来ないので「にほんご」等のん含む単語にフォールバック
      if (filtered.length === 0 && kanaChar === 'ん') {
        filtered = list.filter(it => it.w.includes('ん'));
      }
      if (filtered.length > 0) list = filtered;
    }
    const item  = list[Math.floor(Math.random() * list.length)];
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];

    idleEl.classList.add('hidden');
    eggOverlay.style.display = 'none';

    // 表示キー：JISはひらがな、USはアルファベット
    resetAnim(letterEl); letterEl.textContent = displayKey;
    resetAnim(illustEl); illustEl.textContent = item.emoji;
    resetAnim(mainWordEl); mainWordEl.textContent = item.w;
    subWordEl.textContent = item.s || '';
    displayEl.classList.add('show');

    flashEl.style.background = color;
    flashEl.classList.remove('flash');
    void flashEl.offsetWidth;
    flashEl.classList.add('flash');

    spawnParticles(color);
    speak(currentLang, item.w);

  } else if (e.key.length === 1 && !kanaChar) {
    // 対応単語がない文字キー（記号・数字など） → イースターエッグ
    triggerEasterEgg(e.key);
  }
  // それ以外（矢印・Shift・Alt・Metaなど）は何もしない
}

// ===== キー押下イベント =====
document.addEventListener('keydown', handleKey);

// ===== マウス軌跡 =====
(function() {
  const canvas = document.getElementById('trail-canvas');
  const ctx    = canvas.getContext('2d');
  const stage  = document.getElementById('stage');

  // ===== リサイズ =====
  function resize() {
    canvas.width  = stage.clientWidth;
    canvas.height = stage.clientHeight;
  }
  resize();
  new ResizeObserver(resize).observe(stage);

  // ===== ポイント管理 =====
  // 各ポイント: {x, y, life}  life: 1.0(新) → 0.0(消滅)
  const MAX_POINTS = 120;
  const points = [];

  function toStagePos(e) {
    const r = stage.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) * (canvas.width  / r.width),
      y: (e.clientY - r.top)  * (canvas.height / r.height),
    };
  }

  // ===== マウス軌跡音（MP3埋め込み） =====
  const trailAudio = document.getElementById('trail-audio');
  let trailStopTimer = null;
  let trailPlaying = false;

  function playTrailSound() {
    if (!trailAudio) return;
    try {
      trailAudio.loop = false;        // ループしない（1回のみ）
      trailAudio.volume = 0.5;
      trailAudio.currentTime = 0;    // 先頭から再生
      trailAudio.play().catch(() => {});
      trailPlaying = true;
      // 再生が終わったらフラグをリセット（次の動作で再生可能に）
      trailAudio.onended = () => { trailPlaying = false; };
    } catch(e) {}
  }

  stage.addEventListener('mousemove', (e) => {
    const pos = toStagePos(e);
    points.push({ x: pos.x, y: pos.y, life: 1.0 });
    if (points.length > MAX_POINTS) points.shift();

    // マウスが動き始めたとき（再生中でなければ）先頭から1回再生
    if (!trailPlaying) {
      playTrailSound();
    }

    // マウスが止まったら「再生中」フラグをリセット
    // → 音は最後まで流れ続けるが、次に動かしたとき先頭から再スタート
    clearTimeout(trailStopTimer);
    trailStopTimer = setTimeout(() => { trailPlaying = false; }, 150);
  });

  // ===== 言語別カラー（複数色で虹彗星に） =====
  const COMET_COLORS = {
    en: [[ 220,180,255],[160,100,255],[100, 60,220],[255,255,255]], // 紫〜白
    zu: [[ 255,200, 60],[255,140, 20],[255, 80,  0],[255,240,180]], // 炎オレンジ
    es: [[ 255,100, 60],[255, 50, 30],[220,  0,  0],[255,220,180]], // 赤〜金
    ja: [[ 255,140,200],[255, 80,160],[200, 40,120],[255,240,240]], // ピンク
    vi: [[  60,255,140],[ 20,200, 80],[  0,140, 60],[200,255,220]], // エメラルド
    nl: [[ 255,120, 20],[255, 80,  0],[200, 50,  0],[255,220,180]], // オランダオレンジ
    bn: [[ 255, 80, 80],[200,  0,  0],[100,200,  0],[255,200,200]], // バングラデシュ赤緑
    th: [[ 255,215,  0],[255,140,  0],[200, 80,  0],[255,240,180]], // タイ黄金
  };

  function getColors() {
    return COMET_COLORS[currentLang] || [[255,255,255],[200,200,255],[150,150,255],[255,255,255]];
  }

  // ===== 輝きパーティクル（スパーク） =====
  const sparks = [];
  stage.addEventListener('mousemove', (e) => {
    if (Math.random() < 0.3) { // 30%の確率でスパーク生成
      const pos = toStagePos(e);
      sparks.push({
        x: pos.x, y: pos.y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        life: 1.0,
        size: Math.random() * 3 + 1,
      });
    }
  });

  // ===== 描画ループ =====
  function draw() {
    // 前フレームを完全クリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const colors = getColors();

    // ----- 彗星の尾（太さが尻尾から頭へ細くなる）-----
    if (points.length >= 2) {
      for (let i = 1; i < points.length; i++) {
        const p0 = points[i - 1];
        const p1 = points[i];

        // t: 0=尾の先端(古い), 1=頭(新しい)
        const t  = i / (points.length - 1);
        const t2 = t * t; // 二乗で加速感

        // 太さ：尾→細、頭→太（最大35px）
        const width = t2 * 35 + 0.5;

        // カラーミックス（尾→頭で色変化）
        const ci   = Math.floor(t * (colors.length - 1));
        const ci2  = Math.min(ci + 1, colors.length - 1);
        const cf   = t * (colors.length - 1) - ci;
        const r = colors[ci][0] * (1-cf) + colors[ci2][0] * cf;
        const g = colors[ci][1] * (1-cf) + colors[ci2][1] * cf;
        const b = colors[ci][2] * (1-cf) + colors[ci2][2] * cf;

        // life減衰（尾の先端ほど早く消える）
        const alpha = p1.life * t2;

        // ---- 外側グロー（大）----
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${alpha * 0.15})`;
        ctx.lineWidth   = width * 3.5;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.stroke();

        // ---- 中グロー ----
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${alpha * 0.35})`;
        ctx.lineWidth   = width * 1.5;
        ctx.stroke();

        // ---- 芯（鮮明な白〜本色）----
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        const coreR = r * 0.6 + 255 * 0.4;
        const coreG = g * 0.6 + 255 * 0.4;
        const coreB = b * 0.6 + 255 * 0.4;
        ctx.strokeStyle = `rgba(${coreR|0},${coreG|0},${coreB|0},${alpha * 0.9})`;
        ctx.lineWidth   = Math.max(width * 0.25, 1);
        ctx.stroke();
      }

      // ---- 頭の輝点（彗星核） ----
      const head = points[points.length - 1];
      const hc   = colors[colors.length - 1];
      const grad = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 28);
      grad.addColorStop(0,   `rgba(255,255,255,${head.life * 0.95})`);
      grad.addColorStop(0.2, `rgba(${hc[0]},${hc[1]},${hc[2]},${head.life * 0.8})`);
      grad.addColorStop(0.6, `rgba(${hc[0]},${hc[1]},${hc[2]},${head.life * 0.2})`);
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(head.x, head.y, 28, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // ----- スパーク（飛び散る火花） -----
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x   += s.vx;
      s.y   += s.vy;
      s.vy  += 0.08; // 重力
      s.life -= 0.045;

      if (s.life <= 0) { sparks.splice(i, 1); continue; }

      const sc = colors[Math.floor(Math.random() * colors.length)];
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 3);
      grad.addColorStop(0, `rgba(255,255,255,${s.life})`);
      grad.addColorStop(0.4, `rgba(${sc[0]},${sc[1]},${sc[2]},${s.life * 0.8})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // ポイントのlife減衰（尾がゆっくり消える）
    for (let i = 0; i < points.length; i++) {
      points[i].life -= 0.012 * (1 - i / points.length);
      if (points[i].life < 0) points[i].life = 0;
    }
    // 完全消滅したものを削除
    while (points.length && points[0].life <= 0) points.shift();

    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== 右クリック無効 =====
document.addEventListener('contextmenu', (e) => e.preventDefault());


// ===== 単語リスト =====
function buildWordlist() {
  const grid = document.getElementById('wordlist-grid');
  grid.innerHTML = '';
  const data = LANGS[currentLang]?.data;
  if (!data) return;

  // JISモード時はJIS配列のキー順で表示
  let keys;
  if (currentLang === 'ja' && isJIS) {
    // JIS配列の物理キー順（行ごと）
    keys = ['A','K','S','T','N','H','M','Y','R','W'];
  } else {
    keys = Object.keys(data).sort();
  }

  keys.forEach(key => {
    if (!data[key] || data[key].length === 0) return;
    const group = document.createElement('div');
    group.className = 'wl-key-group';

    // ラベル：JIS時は「行」で表示
    const jaRowLabel = {A:'あ行',K:'か行',S:'さ行',T:'た行',N:'な行',H:'は行',M:'ま行',Y:'や行',R:'ら行',W:'わ行'};
    const label = (currentLang === 'ja' && isJIS && jaRowLabel[key]) ? jaRowLabel[key] : key;
    group.innerHTML = `<div class="wl-key-label">${label}</div>`;

    data[key].forEach(item => {
      const row = document.createElement('div');
      row.className = 'wl-word';
      row.innerHTML = `<span class="wl-emoji">${item.emoji}</span><span class="wl-text">${item.w}</span><span class="wl-sub">${item.s||''}</span>`;
      group.appendChild(row);
    });
    grid.appendChild(group);
  });
}

function toggleWordlist() {
  const panel = document.getElementById('wordlist-panel');
  const isOpen = panel.classList.toggle('open');
  if (isOpen) buildWordlist();
  // パネル開閉中はキー入力停止
  isSpeaking = isOpen;
}

// ===== PrintScreen無効化 =====
document.addEventListener('keyup', (e) => {
  if (e.key === 'PrintScreen') {
    // クリップボードを空テキストで上書き（ClipboardItem非対応環境でも安全）
    try { navigator.clipboard.writeText('').catch(() => {}); } catch(e) {}
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'PrintScreen') { try { e.preventDefault(); } catch(e) {} }
});
// ===== モバイル対応 =====
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
              || (navigator.maxTouchPoints > 1 && /MacIntel/.test(navigator.platform));

// ===== ブラウザ内専用ソフトキーボード =====
const softKeyboard = document.getElementById('soft-keyboard');

// ソフトキーボードの各キーにタッチイベントを設定
softKeyboard.querySelectorAll('.sk-key').forEach(btn => {
  // touchstart: 即反応（タッチ遅延なし）
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault(); // スクロール・ズーム防止
    const key = btn.dataset.key;
    btn.classList.add('pressed');
    // handleKeyに流す
    handleKey({
      key: key,
      code: 'Key' + key,
      repeat: false,
      ctrlKey: false, metaKey: false,
      preventDefault: () => {}
    });
    // 全画面移行（初回タップ時）
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
  }, { passive: false });

  btn.addEventListener('touchend', (e) => {
    e.preventDefault();
    btn.classList.remove('pressed');
  }, { passive: false });
});

// 向き監視
function checkOrientation() {
  const alertEl = document.getElementById('landscape-alert');
  if (!alertEl) return;
  if (isMobile) {
    const isLandscape = window.innerWidth > window.innerHeight;
    alertEl.style.display = isLandscape ? 'flex' : 'none';
  }
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 300));
checkOrientation();

// ===== コンソールログ =====
const consoleLogs = [];
const _log = console.log.bind(console);
const _err = console.error.bind(console);
console.log   = (...a) => { consoleLogs.push('[LOG] '+a.join(' ')); _log(...a); };
console.error = (...a) => { consoleLogs.push('[ERR] '+a.join(' ')); _err(...a); };
function copyConsole() {
  navigator.clipboard.writeText(consoleLogs.join('\n') || '（ログなし）')
    .then(() => alert('コピーしました'))
    .catch(() => alert('コピー失敗'));
}
