<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Exhibition Scouter - hihaho親和性スカウター</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  video { transform: scaleX(1); } /* 背面カメラはそのまま */
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ========================================
// 設定：hihaho親和性の判定基準（プロンプトに埋め込み）
// ========================================
const HIHAHO_JUDGMENT_PROMPT = `あなたは展示会の出展ブース看板を見て「hihaho（インタラクティブ動画プラットフォーム）との親和性」を瞬時に判定するスカウトです。

【画像から抽出すべき情報】
- 会社名 / サービス名 / キャッチコピー / 事業領域

【hihaho親和性の判定基準】
■ 高親和性（80-100点）: eラーニング、研修、マニュアル動画、スタッフ教育、医療教育、観光ガイド、不動産内覧、採用動画、インタラクティブコンテンツ、動画DX、LMS連携
■ 中親和性（50-79点）: 動画制作、映像配信、Web制作、DX支援、マーケティング動画、社内コミュニケーション
■ 低親和性（0-49点）: 原材料、B2B部品、金融商品（toC除く）、hihahoと接点が薄い業界

【出力形式】
必ず以下のJSON形式のみで回答。前後の文章・マークダウン・コードブロック記法は一切禁止。
{
  "companyName": "会社名（読み取れた場合）",
  "catchCopy": "看板の主要コピー（30字以内に要約）",
  "score": 数値（0-100）,
  "reason": "判定理由（40字以内）"
}

画像が看板・ブースでない、または文字が読み取れない場合は score: -1, reason: "読み取り不可" を返す。`;

// ========================================
// メインアプリ
// ========================================
function App() {
  const [mode, setMode] = useState('camera'); // camera | preview | result
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('exhibition_scouter_api_key') || '');
  const [showSettings, setShowSettings] = useState(false);
  const [capturedImage, setCapturedImage] = useState(null); // base64
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [debugLog, setDebugLog] = useState([]);

  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);

  // デバッグログ追記
  const log = (msg) => {
    const time = new Date().toLocaleTimeString('ja-JP');
    setDebugLog(prev => [...prev, `[${time}] ${msg}`]);
  };

  // APIキー保存
  useEffect(() => {
    if (apiKey) localStorage.setItem('exhibition_scouter_api_key', apiKey);
  }, [apiKey]);

  // カメラ起動
  useEffect(() => {
    if (mode !== 'camera') return;
    let cancelled = false;

    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
        if (cancelled) {
          stream.getTracks().forEach(t => t.stop());
          return;
        }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
        }
        log('カメラ起動成功');
      } catch (e) {
        log(`カメラ起動失敗: ${e.message}`);
        setError(`カメラを起動できません: ${e.message}`);
      }
    })();

    return () => {
      cancelled = true;
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, [mode]);

  // シャッター
  const capture = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;

    // 長辺を1280pxに抑えて転送量削減
    const maxSize = 1280;
    const ratio = Math.min(maxSize / video.videoWidth, maxSize / video.videoHeight, 1);
    canvas.width = Math.floor(video.videoWidth * ratio);
    canvas.height = Math.floor(video.videoHeight * ratio);
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // JPEG圧縮（品質0.85）
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    setCapturedImage(dataUrl);
    setMode('preview');
    log(`撮影完了 (${canvas.width}x${canvas.height}, ${Math.round(dataUrl.length / 1024)}KB)`);
  };

  // 判定実行
  const analyze = async () => {
    if (!apiKey) {
      setError('APIキーが未設定です。右上の⚙️から設定してください。');
      setShowSettings(true);
      return;
    }
    if (!capturedImage) return;

    setLoading(true);
    setError(null);
    setResult(null);
    setMode('result');
    log('Claude API 呼び出し開始');

    try {
      // base64部分だけ取り出し
      const base64Data = capturedImage.split(',')[1];

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001', // 高速・低コスト
          max_tokens: 500,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: { type: 'base64', media_type: 'image/jpeg', data: base64Data }
              },
              { type: 'text', text: HIHAHO_JUDGMENT_PROMPT }
            ]
          }]
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API ${response.status}: ${errText}`);
      }

      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      log(`API応答受信: ${text.slice(0, 80)}...`);

      // JSON抽出（念のためコードフェンスを除去）
      const cleaned = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      setResult(parsed);
      log(`判定完了: ${parsed.score}点`);
    } catch (e) {
      log(`エラー: ${e.message}`);
      setError(`判定失敗: ${e.message}`);
    } finally {
      setLoading(false);
    }
  };

  // やり直し
  const reset = () => {
    setCapturedImage(null);
    setResult(null);
    setError(null);
    setMode('camera');
  };

  // スコアの色
  const scoreColor = (s) => {
    if (s < 0) return 'text-gray-400';
    if (s >= 80) return 'text-green-400';
    if (s >= 50) return 'text-yellow-400';
    return 'text-red-400';
  };

  // デバッグログコピー
  const copyDebug = () => {
    navigator.clipboard.writeText(debugLog.join('\n'));
    alert('ログをコピーしました');
  };

  return (
    <div className="h-full flex flex-col relative">
      {/* ヘッダー */}
      <div className="flex items-center justify-between p-4 bg-black/70 backdrop-blur z-10">
        <div>
          <div className="text-xs text-gray-400">Exhibition Scouter</div>
          <div className="text-sm font-bold">🎯 hihaho親和性スカウター</div>
        </div>
        <button
          onClick={() => setShowSettings(!showSettings)}
          className="w-10 h-10 flex items-center justify-center text-2xl hover:bg-white/10 rounded-full"
        >⚙️</button>
      </div>

      {/* 設定モーダル */}
      {showSettings && (
        <div className="absolute inset-0 bg-black/90 z-20 p-6 overflow-auto">
          <div className="max-w-md mx-auto mt-8 space-y-4">
            <h2 className="text-xl font-bold">設定</h2>
            <div>
              <label className="block text-sm text-gray-400 mb-2">Claude API Key (sk-ant-...)</label>
              <input
                type="password"
                value={apiKey}
                onChange={e => setApiKey(e.target.value)}
                placeholder="sk-ant-api03-..."
                className="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm"
              />
              <p className="text-xs text-gray-500 mt-1">※ MVPフェーズ用。ブラウザのlocalStorageに保存されます。本番ではCloudflare Worker経由に切替予定。</p>
            </div>
            <button
              onClick={() => setShowSettings(false)}
              className="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded font-bold"
            >閉じる</button>
          </div>
        </div>
      )}

      {/* メインエリア */}
      <div className="flex-1 relative overflow-hidden">

        {/* カメラビュー */}
        {mode === 'camera' && (
          <div className="relative w-full h-full bg-black">
            <video
              ref={videoRef}
              autoPlay
              playsInline
              muted
              className="w-full h-full object-cover"
            />
            {/* 中央のフレームガイド */}
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="w-[85%] h-[50%] border-2 border-white/60 rounded-lg shadow-lg"></div>
            </div>
            <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black/60 px-3 py-1 rounded-full text-xs">
              📸 看板・ブースをフレームに収めて撮影
            </div>
          </div>
        )}

        {/* プレビュー */}
        {mode === 'preview' && capturedImage && (
          <div className="relative w-full h-full bg-black flex items-center justify-center">
            <img src={capturedImage} alt="preview" className="max-w-full max-h-full object-contain" />
          </div>
        )}

        {/* 結果 */}
        {mode === 'result' && (
          <div className="w-full h-full overflow-auto p-6">
            {loading && (
              <div className="flex flex-col items-center justify-center h-full space-y-4">
                <div className="animate-spin w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full"></div>
                <div className="text-gray-400">判定中...</div>
              </div>
            )}

            {error && (
              <div className="bg-red-900/50 border border-red-500 p-4 rounded-lg">
                <div className="font-bold mb-2">⚠️ エラー</div>
                <div className="text-sm">{error}</div>
              </div>
            )}

            {result && result.score >= 0 && (
              <div className="max-w-md mx-auto space-y-6 mt-4">
                {/* スコア大表示 */}
                <div className="text-center py-8 bg-gradient-to-b from-gray-900 to-black rounded-2xl border border-gray-800">
                  <div className="text-xs text-gray-500 mb-2">hihaho 親和性スコア</div>
                  <div className={`text-8xl font-bold ${scoreColor(result.score)}`}>
                    {result.score}
                  </div>
                  <div className="text-sm text-gray-400 mt-2">
                    {result.score >= 80 ? '⭐ 高親和性（要アプローチ）' :
                     result.score >= 50 ? '🔵 中親和性' :
                     '⚪ 低親和性'}
                  </div>
                </div>

                {/* 詳細 */}
                <div className="space-y-3">
                  {result.companyName && (
                    <div className="bg-gray-900 p-3 rounded">
                      <div className="text-xs text-gray-500">会社/サービス</div>
                      <div className="font-bold">{result.companyName}</div>
                    </div>
                  )}
                  {result.catchCopy && (
                    <div className="bg-gray-900 p-3 rounded">
                      <div className="text-xs text-gray-500">コピー</div>
                      <div>{result.catchCopy}</div>
                    </div>
                  )}
                  {result.reason && (
                    <div className="bg-gray-900 p-3 rounded">
                      <div className="text-xs text-gray-500">判定理由</div>
                      <div>{result.reason}</div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {result && result.score < 0 && (
              <div className="max-w-md mx-auto mt-8 text-center">
                <div className="text-6xl mb-4">🤔</div>
                <div className="text-lg font-bold mb-2">読み取り不可</div>
                <div className="text-sm text-gray-400">看板の文字が鮮明に写るよう、近づいて再撮影してください</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* 下部コントロール */}
      <div className="bg-black/80 backdrop-blur p-4 pb-safe">
        {mode === 'camera' && (
          <div className="flex justify-center">
            <button
              onClick={capture}
              className="w-20 h-20 bg-white rounded-full border-4 border-gray-600 active:scale-95 transition"
            />
          </div>
        )}

        {mode === 'preview' && (
          <div className="flex gap-3">
            <button
              onClick={reset}
              className="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold"
            >撮り直す</button>
            <button
              onClick={analyze}
              className="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold"
            >判定する →</button>
          </div>
        )}

        {mode === 'result' && (
          <button
            onClick={reset}
            className="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold"
          >次のブースを撮る 📸</button>
        )}
      </div>

      {/* デバッグコンソール（折りたたみ） */}
      <details className="bg-gray-950 border-t border-gray-800 text-xs">
        <summary className="px-4 py-2 cursor-pointer text-gray-500">🔧 Debug Console ({debugLog.length})</summary>
        <div className="px-4 pb-2">
          <button onClick={copyDebug} className="text-blue-400 mb-2">📋 ログをコピー</button>
          <pre className="whitespace-pre-wrap text-gray-400 max-h-40 overflow-auto">{debugLog.join('\n')}</pre>
        </div>
      </details>

      <canvas ref={canvasRef} className="hidden" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
