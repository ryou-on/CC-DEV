<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="version" content="v1.1.0">
<title>MATLABによるプログラミング入門 — 要約・用語集</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --fs: 15px;
  --bg: rgba(12,20,36,.95);
  --surface: rgba(22,33,54,.97);
  --border: rgba(80,120,200,.28);
  --text: #e2ecff;
  --text-sub: #8ba0c0;
  --accent: #4f9cf9;
  --panel-max-h: 480px;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: 'Hiragino Sans','Yu Gothic UI','Noto Sans JP','Segoe UI',sans-serif;
}
#tab-btn {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex; align-items: center; gap: 8px;
  padding: 0 22px;
  height: 44px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
  color: var(--text);
  font-size: 14px; font-weight: 700;
  cursor: pointer; user-select: none;
  backdrop-filter: blur(12px);
  white-space: nowrap;
  transition: background .15s;
}
#tab-btn:hover { background: rgba(30,45,72,.99); }
.arrow { font-size: 10px; color: var(--text-sub); transition: transform .3s; }
#tab-btn.open .arrow { transform: rotate(180deg); }

#panel {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  background: var(--bg);
  border-bottom: 2px solid var(--accent);
  backdrop-filter: blur(16px);
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
  z-index: 199;
}
#panel.open { max-height: var(--panel-max-h); }

.p-hdr {
  display: flex; align-items: center;
  flex-wrap: wrap; gap: 8px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  min-height: 52px;
}
.p-title-wrap { display: flex; flex-direction: column; }
.p-title { font-size: 14px; font-weight: 800; color: var(--text); white-space: nowrap; }
.p-sub { font-size: 11px; color: var(--text-sub); }

.tabs {
  display: flex; gap: 3px;
  background: rgba(0,0,0,.35);
  border-radius: 7px; padding: 3px;
}
.t-btn {
  padding: 5px 14px;
  border: none; border-radius: 5px;
  background: transparent;
  color: var(--text-sub);
  font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: all .15s; white-space: nowrap;
}
.t-btn.active { background: var(--accent); color: #fff; }

.lang-select {
  padding: 5px 8px;
  background: rgba(255,255,255,.07);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text); font-size: 12px;
  font-family: inherit; cursor: pointer; outline: none;
}
.lang-select option { background: #1e293b; color: #e2ecff; }

.fs-ctrl {
  display: flex; align-items: center; gap: 5px;
  color: var(--text-sub); font-size: 11px;
}
.fs-btn {
  width: 26px; height: 26px;
  border: 1px solid var(--border); border-radius: 5px;
  background: rgba(255,255,255,.06);
  color: var(--text); font-size: 15px; font-weight: 800;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: inherit; line-height: 1; transition: background .12s;
}
.fs-btn:hover { background: rgba(255,255,255,.14); }
.fs-val { min-width: 24px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text); }

.cls-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px;
  border: 1px solid rgba(239,68,68,.4); border-radius: 7px;
  background: rgba(239,68,68,.1);
  color: #f87171;
  font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  white-space: nowrap; transition: background .12s;
  margin-left: auto;
}
.cls-btn:hover { background: rgba(239,68,68,.25); }

#content-area {
  overflow-y: auto;
  padding: 14px 16px 16px;
  max-height: calc(var(--panel-max-h) - 52px);
  scrollbar-width: thin;
  scrollbar-color: rgba(80,120,200,.3) transparent;
}
.tab-pane { display: none; }
.tab-pane.active { display: block; }

.summary {
  font-size: var(--fs);
  line-height: 1.85;
  color: var(--text);
  columns: 2 360px;
  column-gap: 36px;
}
.summary p { margin-bottom: 10px; break-inside: avoid; }

.glossary {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 9px;
}
.g-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.g-term {
  font-size: calc(var(--fs) - 1px);
  font-weight: 700; color: var(--accent);
  margin-bottom: 4px; line-height: 1.4;
}
.g-reading { font-size: calc(var(--fs) - 3px); color: var(--text-sub); font-weight: 400; }
.g-def { font-size: calc(var(--fs) - 2px); color: var(--text-sub); line-height: 1.65; }
</style>
</head>
<body>

<button id="tab-btn" onclick="toggle()">
  <span id="btn-label">≡ 要約・用語集</span>
  <span class="arrow">▼</span>
</button>

<div id="panel">
  <div class="p-hdr">
    <div class="p-title-wrap">
      <span class="p-title" id="p-title">MATLABによるプログラミング入門</span>
      <span class="p-sub" id="p-sub">長崎大学「応用情報処理」</span>
    </div>
    <div class="tabs">
      <button class="t-btn active" onclick="switchTab('summary',this)">📄 <span id="lbl-summary">要約</span></button>
      <button class="t-btn" onclick="switchTab('glossary',this)">📖 <span id="lbl-glossary">用語集</span></button>
    </div>
    <select class="lang-select" id="langSel" onchange="changeLang(this.value)">
      <option value="ja">🇯🇵 日本語</option>
      <option value="en">🇺🇸 English</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="zh-cn">🇨🇳 简体中文</option>
      <option value="zh-tw">🇹🇼 繁體中文</option>
      <option value="vi">🇻🇳 Tiếng Việt</option>
      <option value="id">🇮🇩 Indonesia</option>
      <option value="nl">🇳🇱 Nederlands</option>
      <option value="th">🇹🇭 ภาษาไทย</option>
      <option value="ms">🇲🇾 Melayu</option>
    </select>
    <div class="fs-ctrl">
      <button class="fs-btn" onclick="changeFs(-1)">－</button>
      <span class="fs-val" id="fsVal">15</span>
      <button class="fs-btn" onclick="changeFs(1)">＋</button>
    </div>
    <button class="cls-btn" onclick="toggle()">✕ <span id="lbl-close">閉じる</span></button>
  </div>
  <div id="content-area">
    <div id="pane-summary" class="tab-pane active">
      <div class="summary" id="summary-content"></div>
    </div>
    <div id="pane-glossary" class="tab-pane">
      <div class="glossary" id="glossary-content"></div>
    </div>
  </div>
</div>

let fsVal = 15;
let currentLang = 'ja';
let currentTab = 'summary';

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(lang) {
  const d = D[lang];
  document.getElementById('btn-label').textContent = d.btn;
  document.getElementById('p-title').textContent = d.title;
  document.getElementById('p-sub').textContent = d.sub;
  document.getElementById('lbl-summary').textContent = d.ls;
  document.getElementById('lbl-glossary').textContent = d.lg;
  document.getElementById('lbl-close').textContent = d.lc;

  document.getElementById('summary-content').innerHTML =
    d.s.map(p => `<p>${esc(p)}</p>`).join('');

  document.getElementById('glossary-content').innerHTML =
    d.g.map(item => `<div class="g-item">
      <div class="g-term">${esc(item.t)}${item.r ? ` <span class="g-reading">（${esc(item.r)}）</span>` : ''}</div>
      <div class="g-def">${esc(item.d)}</div>
    </div>`).join('');
}

function toggle() {
  const panel = document.getElementById('panel');
  const btn   = document.getElementById('tab-btn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function switchTab(name, clickedBtn) {
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.t-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  clickedBtn.classList.add('active');
  document.getElementById('content-area').scrollTop = 0;
  currentTab = name;
}

function changeLang(lang) {
  currentLang = lang;
  render(lang);
}

function changeFs(delta) {
  fsVal = Math.min(22, Math.max(11, fsVal + delta));
  document.documentElement.style.setProperty('--fs', fsVal + 'px');
  document.getElementById('fsVal').textContent = fsVal;
}

render('ja');
</script>
