<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COCO-ITTA 🗺️</title>

  <!-- Firebase SDK (compat版: シングルHTMLで使いやすい) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts: Zen Maru Gothic + Crimson Pro -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ===== CSS変数: 温かみのある地図帳カラー ===== */
    :root {
      --bg:        #f5f0e8;
      --paper:     #fdf8f0;
      --ink:       #2c2416;
      --ink-light: #6b5c45;
      --amber:     #c8821a;
      --amber-lt:  #f0d090;
      --green:     #4a7c59;
      --green-lt:  #c8e6c9;
      --red:       #b94040;
      --red-lt:    #ffd5d5;
      --blue:      #3a6fa8;
      --border:    #d4c4a0;
      --shadow:    rgba(44,36,22,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== ヘッダー ===== */
    header {
      background: var(--ink);
      color: var(--amber-lt);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px var(--shadow);
      z-index: 1000;
    }

    .logo {
      font-family: 'Crimson Pro', serif;
      font-size: 1.5rem;
      font-style: italic;
      letter-spacing: 0.05em;
      color: var(--amber-lt);
      white-space: nowrap;
    }
    .logo span { font-size: 0.75rem; font-style: normal; opacity: 0.7; display: block; }

    /* フィルターボタン群 */
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: transparent;
      border: 1.5px solid rgba(240,208,144,0.4);
      color: var(--amber-lt);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--amber);
      border-color: var(--amber);
      color: var(--ink);
    }

    /* +ピン追加ボタン */
    .btn-add {
      background: var(--amber);
      border: none;
      color: var(--ink);
      padding: 7px 14px;
      border-radius: 20px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: transform .15s;
      flex-shrink: 0;
    }
    .btn-add:hover { transform: scale(1.05); }

    /* ===== メインレイアウト ===== */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ===== 地図エリア ===== */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* ===== サイドパネル ===== */
    .side-panel {
      width: 280px;
      background: var(--paper);
      border-left: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--ink-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .count-badge {
      background: var(--amber);
      color: var(--ink);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    /* ピン一覧 */
    .pin-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .pin-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .pin-item:hover { background: var(--bg); }
    .pin-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .pin-info { flex: 1; min-width: 0; }
    .pin-name {
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pin-meta {
      font-size: 0.68rem;
      color: var(--ink-light);
      margin-top: 2px;
    }
    .pin-status-tag {
      font-size: 0.62rem;
      padding: 2px 6px;
      border-radius: 8px;
      font-weight: 700;
      flex-shrink: 0;
      align-self: center;
    }
    .tag-visited  { background: var(--green-lt);  color: var(--green); }
    .tag-wishlist { background: var(--amber-lt);  color: #8a5c00; }

    /* ===== モーダル（ピン追加・編集） ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,36,22,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--paper);
      border-radius: 12px;
      padding: 24px;
      width: 360px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px var(--shadow);
      border: 1.5px solid var(--border);
    }
    .modal h2 {
      font-family: 'Crimson Pro', serif;
      font-size: 1.3rem;
      margin-bottom: 16px;
      color: var(--ink);
    }

    /* フォーム共通 */
    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--ink-light);
      margin-bottom: 4px;
    }
    input[type="text"], input[type="date"], textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.8rem;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--amber); }
    textarea { resize: vertical; min-height: 70px; }

    /* ステータス選択 */
    .status-selector {
      display: flex;
      gap: 8px;
    }
    .status-opt {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all .2s;
    }
    .status-opt.selected.visited  { border-color: var(--green); background: var(--green-lt); }
    .status-opt.selected.wishlist { border-color: var(--amber); background: var(--amber-lt); }
    .status-opt .s-icon { font-size: 1.4rem; display: block; margin-bottom: 2px; }

    /* レイヤー選択 */
    .layer-selector {
      display: flex;
      gap: 6px;
    }
    .layer-opt {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 6px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 0.7rem;
      transition: all .2s;
    }
    .layer-opt.selected { border-color: var(--blue); background: #d0e4f8; color: var(--blue); font-weight: 700; }
    .layer-opt .l-icon { font-size: 1.1rem; display: block; }

    /* 日付エリア */
    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .date-row input { flex: 1; }
    .date-unknown-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Zen Maru Gothic', sans-serif;
      transition: all .2s;
    }
    .date-unknown-btn.active {
      background: var(--amber-lt);
      border-color: var(--amber);
      color: #8a5c00;
    }

    /* モーダルボタン */
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .btn-save {
      flex: 1;
      background: var(--amber);
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--ink);
      transition: transform .15s;
    }
    .btn-save:hover { transform: scale(1.02); }
    .btn-cancel {
      background: transparent;
      border: 1.5px solid var(--border);
      padding: 10px 16px;
      border-radius: 8px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--ink-light);
    }
    .btn-delete {
      background: var(--red-lt);
      border: 1.5px solid var(--red);
      color: var(--red);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
    }

    /* 空状態 */
    .empty-state {
      padding: 32px 14px;
      text-align: center;
      color: var(--ink-light);
      font-size: 0.78rem;
      line-height: 1.8;
    }
    .empty-state .e-icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    /* 統計バー */
    .stats-bar {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      font-size: 0.68rem;
      color: var(--ink-light);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-item strong { color: var(--ink); font-size: 0.82rem; }

    /* デバッグコンソール */
    .debug-panel {
      background: #1a1a1a;
      color: #90ee90;
      font-family: monospace;
      font-size: 0.65rem;
      padding: 6px 10px;
      max-height: 80px;
      overflow-y: auto;
      flex-shrink: 0;
      display: none;
    }
    .debug-panel.open { display: block; }
    .debug-toggle {
      background: #1a1a1a;
      color: #666;
      border: none;
      font-size: 0.6rem;
      padding: 2px 8px;
      cursor: pointer;
      width: 100%;
      text-align: right;
    }

    /* ===== ログイン画面 ===== */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 背景: 薄い地図グリッド風パターン */
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .login-card {
      background: var(--paper);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 360px;
      max-width: 95vw;
      text-align: center;
      box-shadow: 0 12px 40px var(--shadow);
    }
    .login-logo {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 2.4rem;
      color: var(--ink);
      letter-spacing: 0.04em;
    }
    .login-sub {
      font-size: 0.75rem;
      color: var(--ink-light);
      margin-bottom: 20px;
    }
    .login-desc {
      font-size: 0.8rem;
      color: var(--ink-light);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .btn-google-login {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: white;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--ink);
      transition: all .2s;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .btn-google-login:hover {
      border-color: var(--amber);
      box-shadow: 0 4px 16px var(--shadow);
      transform: translateY(-1px);
    }
    .login-note {
      font-size: 0.62rem;
      color: var(--ink-light);
      margin-top: 16px;
      opacity: 0.7;
      line-height: 1.5;
    }

    /* ===== ヘッダー内ユーザーエリア ===== */
    .user-area {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--amber);
      object-fit: cover;
    }
    .btn-logout {
      background: transparent;
      border: 1.5px solid rgba(240,208,144,0.4);
      color: var(--amber-lt);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { background: rgba(240,208,144,0.15); }

    /* ===== 住所検索バー（地図上フローティング） ===== */
    .search-wrapper {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      width: min(420px, calc(100vw - 320px - 40px)); /* サイドパネル分を除く */
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--paper);
      border: 2px solid var(--border);
      border-radius: 24px;
      padding: 6px 14px;
      box-shadow: 0 4px 16px var(--shadow);
      gap: 8px;
      transition: border-color .2s;
    }
    .search-box:focus-within { border-color: var(--amber); }
    .search-box .search-icon { font-size: 1rem; flex-shrink: 0; opacity: 0.6; }
    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.82rem;
      color: var(--ink);
      outline: none;
      padding: 2px 0;
    }
    .search-box input::placeholder { color: var(--ink-light); opacity: 0.7; }
    .search-clear {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      opacity: 0.5;
      padding: 0 2px;
      display: none;
    }
    .search-clear.visible { display: block; }

    /* 検索候補ドロップダウン */
    .search-dropdown {
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      margin-top: 6px;
      box-shadow: 0 4px 16px var(--shadow);
      overflow: hidden;
      display: none;
    }
    .search-dropdown.open { display: block; }
    .search-result-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg); }
    .sri-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .sri-name {
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .sri-addr {
      font-size: 0.68rem;
      color: var(--ink-light);
      margin-top: 2px;
    }
    .search-loading, .search-empty {
      padding: 12px 14px;
      font-size: 0.78rem;
      color: var(--ink-light);
      text-align: center;
    }

    /* 検索エンジン切り替えバッジ */
    .search-engine-badge {
      position: absolute;
      right: 12px;
      bottom: -22px;
      font-size: 0.6rem;
      color: rgba(44,36,22,0.4);
      white-space: nowrap;
    }

    /* ===== Leafletカスタムマーカー ===== */
    .custom-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 2px 6px var(--shadow);
      border: 2px solid white;
      font-size: 14px;
    }
    .custom-marker span { transform: rotate(45deg); display: block; }
    .marker-visited  { background: var(--green); }
    .marker-wishlist { background: var(--amber); }

    /* レスポンシブ: 小画面でサイドパネルを下に */
    @media (max-width: 600px) {
      main { flex-direction: column; }
      .side-panel { width: 100%; height: 200px; border-left: none; border-top: 1.5px solid var(--border); }
      .pin-list { display: flex; overflow-x: auto; overflow-y: hidden; flex-direction: row; }
      .pin-item { min-width: 180px; border-bottom: none; border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<!-- ===== ヘッダー ===== -->
<header>
  <div class="logo">
    COCO-ITTA
    <span>ここいった — 家族の地図帳</span>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="visited">✅ 行った</button>
    <button class="filter-btn" data-filter="wishlist">⭐ 行きたい</button>
    <button class="filter-btn" data-filter="spot">🏪 スポット</button>
    <button class="filter-btn" data-filter="area">🏙 エリア</button>
    <button class="filter-btn" data-filter="country">🌍 国・地域</button>
  </div>
  <button class="btn-add" id="btnOpenAdd">＋ ピン追加</button>

  <!-- ユーザーアバター（ログイン後に表示） -->
  <div class="user-area" id="userArea" style="display:none;">
    <img class="user-avatar" id="userAvatar" src="" alt="" />
    <button class="btn-logout" id="btnLogout">ログアウト</button>
  </div>
</header>

<!-- ===== ログイン画面オーバーレイ ===== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-logo">COCO-ITTA</div>
    <div class="login-sub">ここいった — 家族の地図帳</div>
    <p class="login-desc">家族みんなで「行った場所」「行きたい場所」を地図上で共有できるアプリです。</p>
    <button class="btn-google-login" id="btnGoogleLogin">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Googleでログイン
    </button>
    <p class="login-note">ログインすることで利用規約・プライバシーポリシーに同意したものとみなします。</p>
  </div>
</div>

<!-- ===== メイン ===== -->
<main style="position:relative;">
  <!-- 地図 -->
  <div id="map"></div>

  <!-- 住所検索バー（地図上フローティング） -->
  <div class="search-wrapper" id="searchWrapper">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="場所・住所を検索…" autocomplete="off" />
      <button class="search-clear" id="searchClear">✕</button>
    </div>
    <div class="search-dropdown" id="searchDropdown"></div>
    <span class="search-engine-badge" id="engineBadge">Nominatim (OSM) · キー不要</span>
  </div>

  <!-- サイドパネル -->
  <aside class="side-panel">
    <div class="panel-header">
      📌 ピン一覧
      <span class="count-badge" id="pinCount">0</span>
    </div>
    <div class="pin-list" id="pinList">
      <div class="empty-state">
        <span class="e-icon">🗺️</span>
        地図をクリックするか<br>「＋ ピン追加」で<br>はじめての場所を記録しよう
      </div>
    </div>
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">行った <strong id="stVisited">0</strong></div>
      <div class="stat-item">行きたい <strong id="stWishlist">0</strong></div>
    </div>
    <!-- デバッグ用コンソール -->
    <button class="debug-toggle" id="debugToggle">🐛 debug</button>

<script>

// ============================================================
// 住所検索モジュール（Nominatim / 将来: Google Geocoding API）
// ============================================================

const GEOCODE_ENGINE = 'nominatim'; // 'nominatim' | 'google'
const GOOGLE_API_KEY = '';          // Google APIキーを設定したらここに入れる

const searchInput    = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
const searchClear    = document.getElementById('searchClear');
let searchTimer = null;

/** 検索候補を取得（Nominatim） */
async function geocodeNominatim(query) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=ja`;
  const res  = await fetch(url, { headers: { 'Accept-Language': 'ja' } });
  const data = await res.json();
  return data.map(d => ({
    name:    d.display_name.split(',')[0],
    address: d.display_name,
    lat:     parseFloat(d.lat),
    lng:     parseFloat(d.lon),
    type:    d.type,
  }));
}

/** 検索候補を取得（Google Geocoding API） */
async function geocodeGoogle(query) {
  const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&language=ja&key=${GOOGLE_API_KEY}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.status !== 'OK') return [];
  return data.results.map(r => ({
    name:    r.address_components[0]?.long_name || r.formatted_address,
    address: r.formatted_address,
    lat:     r.geometry.location.lat,
    lng:     r.geometry.location.lng,
    type:    r.types[0] || '',
  }));
}

/** エンジン振り分け */
async function geocode(query) {
  if (GEOCODE_ENGINE === 'google' && GOOGLE_API_KEY) {
    return geocodeGoogle(query);
  }
  return geocodeNominatim(query);
}

/** タイプ → 絵文字変換 */
function typeToEmoji(type) {
  const map = {
    restaurant: '🍽️', cafe: '☕', shop: '🛍️', hotel: '🏨',
    park: '🌳', museum: '🏛️', station: '🚉', airport: '✈️',
    temple: '⛩️', shrine: '⛩️', hospital: '🏥', school: '🏫',
    city: '🏙️', town: '🏘️', village: '🏡', country: '🌍',
  };
  return map[type] || '📍';
}

/** ドロップダウン表示 */
function showDropdown(html) {
  searchDropdown.innerHTML = html;
  searchDropdown.classList.add('open');
}
function hideDropdown() {
  searchDropdown.classList.remove('open');
  searchDropdown.innerHTML = '';
}

/** 検索実行 */
async function doSearch(query) {
  if (query.length < 2) { hideDropdown(); return; }
  showDropdown('<div class="search-loading">🔍 検索中…</div>');
  try {
    const results = await geocode(query);
    if (results.length === 0) {
      showDropdown('<div class="search-empty">見つかりませんでした</div>');
      return;
    }
    showDropdown(results.map((r, i) => `
      <div class="search-result-item" data-idx="${i}">
        <span class="sri-icon">${typeToEmoji(r.type)}</span>
        <div>
          <div class="sri-name">${r.name}</div>
          <div class="sri-addr">${r.address}</div>
        </div>
      </div>
    `).join(''));
    // 候補クリックで地図移動 & ピン追加モーダル
    searchDropdown.querySelectorAll('.search-result-item').forEach((el, i) => {
      el.addEventListener('click', () => {
        const r = results[i];
        map.setView([r.lat, r.lng], 16);
        searchInput.value = r.name;
        searchClear.classList.add('visible');
        hideDropdown();
        // モーダルを開いて場所名を自動入力
        openAdd({ lat: r.lat, lng: r.lng });
        document.getElementById('fName').value = r.name;
        log('検索で選択:', r.name, r.lat, r.lng);
      });
    });
  } catch (e) {
    showDropdown('<div class="search-empty">⚠️ 検索エラー: ' + e.message + '</div>');
    log('検索エラー:', e);
  }
}

// 入力イベント（300msデバウンス）
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.classList.toggle('visible', q.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(q), 300);
});

// Enterキーで即検索
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { clearTimeout(searchTimer); doSearch(searchInput.value.trim()); }
  if (e.key === 'Escape') { hideDropdown(); searchInput.blur(); }
});

// クリアボタン
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  hideDropdown();
  searchInput.focus();
});

// 地図クリックでドロップダウンを閉じる
document.getElementById('map').addEventListener('click', hideDropdown);

// ===== デバッグログ =====
const debugPanel = document.getElementById('debugPanel');
const debugToggle = document.getElementById('debugToggle');
debugToggle.addEventListener('click', () => debugPanel.classList.toggle('open'));

function log(...args) {
  const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
  const line = document.createElement('div');
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  debugPanel.prepend(line);
  console.log('[COCO-ITTA]', ...args);
}

// コンソールログコピーボタン
debugToggle.addEventListener('dblclick', () => {
  const text = Array.from(debugPanel.querySelectorAll('div')).map(d => d.textContent).join('\n');
  navigator.clipboard.writeText(text).then(() => alert('ログをコピーしました'));
});

// ===== データ管理 =====
const STORAGE_KEY = 'coco-itta-pins';

/** localStorageからピン読み込み */
function loadPins() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch (e) {
    log('ERROR loadPins:', e);
    return [];
  }
}

/** localStorageにピン保存 */
function savePins(pins) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
  log('保存:', pins.length, '件');
}

let pins = loadPins(); // メモリ上のピン配列

// ===== 地図初期化 =====
const map = L.map('map').setView([35.6762, 139.6503], 12); // 東京中心

// OpenStreetMap タイル
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

log('地図初期化完了');

// ===== カスタムマーカーアイコン生成 =====
function createIcon(status, layer) {
  // ステータス・レイヤーに応じたアイコン絵文字
  const emoji = {
    visited:  { spot: '✅', area: '✅', country: '✅' },
    wishlist: { spot: '⭐', area: '⭐', country: '⭐' },
  };
  const bgClass = status === 'visited' ? 'marker-visited' : 'marker-wishlist';
  const e = emoji[status]?.[layer] || '📍';

  return L.divIcon({
    className: '',
    html: `<div class="custom-marker ${bgClass}"><span>${e}</span></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32],
  });
}

// ===== Leafletマーカー管理 =====
const markerMap = {}; // id → Leaflet marker

/** ピンからLeafletマーカーを生成してマップに追加 */
function addMarkerToMap(pin) {
  const marker = L.marker([pin.lat, pin.lng], { icon: createIcon(pin.status, pin.layer) });

  // ポップアップ内容
  marker.bindPopup(`
    <b style="font-family:'Zen Maru Gothic',sans-serif">${pin.name}</b><br>
    <span style="font-size:0.75rem;color:#6b5c45">
      ${pin.status === 'visited' ? '✅ 行った' : '⭐ 行きたい'}
      ${pin.date ? ' · ' + pin.date : pin.dateUnknown ? ' · 日時不明' : ''}
    </span>
    ${pin.memo ? `<br><span style="font-size:0.72rem">${pin.memo}</span>` : ''}
    <br><button onclick="openEdit('${pin.id}')" style="margin-top:6px;font-family:'Zen Maru Gothic',sans-serif;font-size:0.72rem;padding:3px 8px;border-radius:6px;background:#c8821a;border:none;cursor:pointer;">編集</button>
  `);

  marker.addTo(map);
  markerMap[pin.id] = marker;
}

/** 全マーカーを描画（フィルター適用） */
function renderMarkers() {
  // 既存マーカーをすべて削除
  Object.values(markerMap).forEach(m => m.remove());
  Object.keys(markerMap).forEach(k => delete markerMap[k]);

  // フィルター条件で絞り込み
  const filtered = getFilteredPins();
  filtered.forEach(addMarkerToMap);
  log('マーカー描画:', filtered.length, '件');
}

// ===== フィルター =====
let currentFilter = 'all';

document.getElementById('filters').querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderMarkers();
    renderPinList();
    log('フィルター変更:', currentFilter);
  });
});

/** フィルター条件に合うピンを返す */
function getFilteredPins() {
  if (currentFilter === 'all') return pins;
  if (currentFilter === 'visited')  return pins.filter(p => p.status === 'visited');
  if (currentFilter === 'wishlist') return pins.filter(p => p.status === 'wishlist');
  if (currentFilter === 'spot')     return pins.filter(p => p.layer === 'spot');
  if (currentFilter === 'area')     return pins.filter(p => p.layer === 'area');
  if (currentFilter === 'country')  return pins.filter(p => p.layer === 'country');
  return pins;
}

// ===== サイドパネル: ピン一覧 =====
function renderPinList() {
  const list = document.getElementById('pinList');
  const filtered = getFilteredPins();

  // 統計更新
  document.getElementById('pinCount').textContent   = filtered.length;
  document.getElementById('stVisited').textContent  = pins.filter(p => p.status === 'visited').length;
  document.getElementById('stWishlist').textContent = pins.filter(p => p.status === 'wishlist').length;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="e-icon">🗺️</span>まだピンがありません</div>`;
    return;
  }

  list.innerHTML = filtered.map(pin => {
    const layerEmoji = { spot: '🏪', area: '🏙', country: '🌍' }[pin.layer] || '📍';
    const dateStr = pin.dateUnknown ? '日時不明' : pin.date ? pin.date : '';
    return `
      <div class="pin-item" onclick="focusPin('${pin.id}')">
        <div class="pin-icon">${layerEmoji}</div>
        <div class="pin-info">
          <div class="pin-name">${pin.name}</div>
          <div class="pin-meta">${dateStr}${pin.memo ? ' · ' + pin.memo.slice(0,20) : ''}</div>
        </div>
        <span class="pin-status-tag ${pin.status === 'visited' ? 'tag-visited' : 'tag-wishlist'}">
          ${pin.status === 'visited' ? '行った' : '行きたい'}
        </span>
      </div>
    `;
  }).join('');
}

/** ピン一覧クリックでマップフォーカス */
window.focusPin = (id) => {
  const pin = pins.find(p => p.id === id);
  if (!pin) return;
  map.setView([pin.lat, pin.lng], 16);
  markerMap[id]?.openPopup();
};

// ===== モーダル管理 =====
const overlay = document.getElementById('modalOverlay');
let editingId = null;      // 編集中のピンID（nullなら新規追加）
let pendingLatLng = null;  // 地図クリックで取得した座標

// フォーム内の要素
const fName   = document.getElementById('fName');
const fDate   = document.getElementById('fDate');
const fMemo   = document.getElementById('fMemo');
const fCoords = document.getElementById('fCoords');
const btnUnknown = document.getElementById('btnUnknown');

let selectedStatus = 'visited';
let selectedLayer  = 'spot';
let isDateUnknown  = false;

/** ステータス選択切り替え */
document.querySelectorAll('.status-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    selectedStatus = opt.dataset.status;
    document.querySelectorAll('.status-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});

/** レイヤー選択切り替え */
document.querySelectorAll('.layer-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    selectedLayer = opt.dataset.layer;
    document.querySelectorAll('.layer-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});

/** 「不明」ボタン */
btnUnknown.addEventListener('click', () => {
  isDateUnknown = !isDateUnknown;
  btnUnknown.classList.toggle('active', isDateUnknown);
  fDate.disabled = isDateUnknown;
  if (isDateUnknown) fDate.value = '';
});

/** モーダルを開く（新規追加） */
function openAdd(latlng) {
  editingId = null;
  pendingLatLng = latlng;
  document.getElementById('modalTitle').textContent = '📍 場所を記録する';
  fName.value  = '';
  fDate.value  = '';
  fMemo.value  = '';
  fCoords.value = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
  isDateUnknown  = false;
  selectedStatus = 'visited';
  selectedLayer  = 'spot';
  btnUnknown.classList.remove('active');
  fDate.disabled = false;
  resetSelectors();
  document.getElementById('btnDelete').style.display = 'none';
  overlay.classList.add('open');
  fName.focus();
  log('モーダル開く（新規）', latlng);
}

/** モーダルを開く（編集） */
window.openEdit = (id) => {
  const pin = pins.find(p => p.id === id);
  if (!pin) return;
  editingId = id;
  pendingLatLng = { lat: pin.lat, lng: pin.lng };
  document.getElementById('modalTitle').textContent = '✏️ 場所を編集する';
  fName.value   = pin.name;
  fDate.value   = pin.date || '';
  fMemo.value   = pin.memo || '';
  fCoords.value = `${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}`;
  isDateUnknown  = pin.dateUnknown || false;
  selectedStatus = pin.status;
  selectedLayer  = pin.layer;
  btnUnknown.classList.toggle('active', isDateUnknown);
  fDate.disabled = isDateUnknown;
  resetSelectors();
  document.getElementById('btnDelete').style.display = 'inline-block';
  overlay.classList.add('open');
  // ポップアップを閉じる
  markerMap[id]?.closePopup();
  log('モーダル開く（編集）', id);
};

/** セレクターの見た目をリセット */
function resetSelectors() {
  document.querySelectorAll('.status-opt').forEach(o => {
    o.classList.remove('selected');
    if (o.dataset.status === selectedStatus) o.classList.add('selected');
  });
  document.querySelectorAll('.layer-opt').forEach(o => {
    o.classList.remove('selected');
    if (o.dataset.layer === selectedLayer) o.classList.add('selected');
  });
}

/** 保存 */
document.getElementById('btnSave').addEventListener('click', () => {
  const name = fName.value.trim();
  if (!name) { alert('場所名を入力してください'); fName.focus(); return; }

  if (editingId) {
    // 既存ピンの更新
    const idx = pins.findIndex(p => p.id === editingId);
    if (idx >= 0) {
      pins[idx] = {
        ...pins[idx],
        name,
        status: selectedStatus,
        layer: selectedLayer,
        date: isDateUnknown ? '' : fDate.value,
        dateUnknown: isDateUnknown,
        memo: fMemo.value.trim(),
      };
      // マーカーアイコンを更新
      markerMap[editingId]?.setIcon(createIcon(selectedStatus, selectedLayer));
      log('更新:', pins[idx]);
    }
  } else {
    // 新規ピン追加
    const pin = {
      id: `pin_${Date.now()}`,
      name,
      status: selectedStatus,
      layer: selectedLayer,
      lat: pendingLatLng.lat,
      lng: pendingLatLng.lng,
      date: isDateUnknown ? '' : fDate.value,
      dateUnknown: isDateUnknown,
      memo: fMemo.value.trim(),
      createdAt: new Date().toISOString(),
    };
    pins.push(pin);
    addMarkerToMap(pin);
    log('追加:', pin);
  }

  savePins(pins);
  renderMarkers();
  renderPinList();
  overlay.classList.remove('open');
});

/** 削除 */
document.getElementById('btnDelete').addEventListener('click', () => {
  if (!editingId) return;
  if (!confirm('このピンを削除しますか？')) return;
  pins = pins.filter(p => p.id !== editingId);
  markerMap[editingId]?.remove();
  delete markerMap[editingId];
  savePins(pins);
  renderPinList();
  overlay.classList.remove('open');
  log('削除:', editingId);
});

/** キャンセル */
document.getElementById('btnCancel').addEventListener('click', () => {
  overlay.classList.remove('open');
});

/** オーバーレイ背景クリックで閉じる */
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.remove('open');
});

// ===== ヘッダーの「＋ピン追加」ボタン：地図の中心座標で開く =====
document.getElementById('btnOpenAdd').addEventListener('click', () => {
  openAdd(map.getCenter());
});

// ===== 地図クリックでピン追加モーダルを開く =====
map.on('click', (e) => {
  openAdd(e.latlng);
});

// ===== 初期描画 =====
