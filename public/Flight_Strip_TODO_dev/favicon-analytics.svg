<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="rounded">
      <rect width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="100" height="100" rx="22" ry="22" fill="#0d1e38"/>

  <g clip-path="url(#rounded)">
    <!-- レーダースイープ扇形（右上） -->
    <path d="M50 50 L50 8 A42 42 0 0 1 92 50 Z" fill="#00e5cc" opacity="0.08"/>

    <!-- レーダーグリッド線 -->
    <line x1="50" y1="8" x2="50" y2="92" stroke="#1e4060" stroke-width="0.6" opacity="0.7"/>
    <line x1="8" y1="50" x2="92" y2="50" stroke="#1e4060" stroke-width="0.6" opacity="0.7"/>
    <line x1="20" y1="20" x2="80" y2="80" stroke="#1e4060" stroke-width="0.5" opacity="0.5"/>
    <line x1="80" y1="20" x2="20" y2="80" stroke="#1e4060" stroke-width="0.5" opacity="0.5"/>

    <!-- レーダー同心円 -->
    <circle cx="50" cy="50" r="14" fill="none" stroke="#1e6080" stroke-width="0.7" opacity="0.8"/>
    <circle cx="50" cy="50" r="27" fill="none" stroke="#1e6080" stroke-width="0.7" opacity="0.7"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#1e6080" stroke-width="0.7" opacity="0.6"/>

    <!-- レーダーブリップ -->
    <circle cx="30" cy="34" r="1.8" fill="#00e5cc" opacity="0.9"/>
    <circle cx="62" cy="22" r="1.4" fill="#00e5cc" opacity="0.8"/>
    <circle cx="78" cy="42" r="1.2" fill="#00e5cc" opacity="0.7"/>

    <!-- 飛行機（左向き・ティール） -->
    <g transform="translate(10,32) scale(1.05) rotate(-5,20,15)">
      <ellipse cx="20" cy="15" rx="13" ry="4.2" fill="#00c8b8"/>
      <path d="M17 14 L8 7 L12 14 Z" fill="#00c8b8" opacity="0.95"/>
      <path d="M17 16 L8 23 L12 16 Z" fill="#00c8b8" opacity="0.85"/>
      <path d="M5 13 L1 9 L3 14 Z" fill="#00c8b8" opacity="0.9"/>
      <path d="M5 17 L1 21 L3 16 Z" fill="#00c8b8" opacity="0.75"/>
      <ellipse cx="14" cy="10" rx="4.5" ry="1.8" fill="#008878"/>
      <ellipse cx="14" cy="20" rx="4" ry="1.6" fill="#008878" opacity="0.85"/>
    </g>

    <!-- フライトストリップ本体（クリーム） -->
    <rect x="42" y="30" width="54" height="28" rx="2.5" fill="#f0e8d0"/>
    <!-- 左アンバーバー -->
    <rect x="42" y="30" width="10" height="28" rx="2.5" fill="#d4821a"/>
    <rect x="47" y="30" width="5" height="28" fill="#d4821a"/>

    <!-- ナンバー "14" -->
    <text x="47" y="48" font-family="Arial Black, sans-serif" font-size="7.5" font-weight="900" fill="#ffffff" text-anchor="middle">14</text>

    <!-- CALLSIGN情報 -->
    <text x="54" y="37.5" font-family="'Courier New', monospace" font-size="2.8" fill="#0d2040" font-weight="700" letter-spacing="0.05">CALLSIGN</text>
    <text x="54" y="42" font-family="'Courier New', monospace" font-size="3.5" fill="#0d2040" font-weight="900" letter-spacing="0.1">AA123 A321 JFK</text>

    <!-- 区切り線 -->
    <line x1="53" y1="44" x2="94" y2="44" stroke="#b8a880" stroke-width="0.5"/>

    <!-- TODO行 1: チェック済み -->
    <rect x="54" y="46" width="3.5" height="3.5" rx="0.5" fill="none" stroke="#0d2040" stroke-width="0.7"/>
    <path d="M54.5 47.8 L55.6 49 L57.2 46.6" stroke="#0d2040" stroke-width="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="59.5" y="49.2" font-family="'Courier New', monospace" font-size="3" fill="#0d2040" font-weight="700">CREATE TASK</text>

    <!-- 統計バッジ（大型・下半分）黄色地に赤文字 -->
    <rect x="0" y="62" width="100" height="38" fill="#f5c800"/>
    <text x="50" y="90" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" font-weight="900" fill="#e01010" text-anchor="middle">統計</text>
  </g>
</svg>
