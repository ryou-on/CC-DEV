    const calcNextOccurrence = (recurrence, fromDate) => {
      const base = fromDate ? new Date(fromDate) : new Date();
      base.setDate(base.getDate() + 1); // 今日の翌日から探す
      const { type, weekdays = [], monthDay = 1 } = recurrence;
      if (type === 'daily') return base;
      if (type === 'weekdays') {
        for (let i = 0; i < 7; i++) {
          if (base.getDay() !== 0 && base.getDay() !== 6) return base;
          base.setDate(base.getDate() + 1);
        }
        return base;
      }
      if (type === 'weekly') {
        const days = weekdays.length ? weekdays : [1];

          if (days.includes(base.getDay())) return base;
          base.setDate(base.getDate() + 1);
        }
        return base;

      if (type === 'monthly') {
        let d = new Date(base.getFullYear(), base.getMonth(), monthDay);

      }
      return base;

            </div>

            {/* ER-041: タブ（全て / 開発版実装済み / 安定版未反映） */}
            <div style={{ display:'flex', gap:'2px', marginBottom:'8px', borderBottom:`1px solid ${T.border2}`, paddingBottom:'8px' }}>
              {[['all','全て'],['dev','開発版実装済み'],['stable_pending','安定版未反映']].map(([k,l]) => (
                <button key={k} onClick={() => setErTab(k)} style={{ ...btnBase, border:`1px solid ${erTab===k ? T.accent+'88' : T.border2}`, background:erTab===k ? `${T.accent}18` : 'transparent', color:erTab===k ? T.accent : T.textDim, fontSize:'9px' }}>
                  {l}
                </button>
              ))}
            </div>
            {/* ソートタブ */}
            <div style={{ display:'flex', gap:'4px', marginBottom:'12px' }}>
              {[['priority','優先度'],['difficulty','難易度'],['date','登録日']].map(([k,l]) => (
                <button key={k} onClick={() => setSortBy(k)} style={{ ...btnBase, border:`1px solid ${sortBy===k ? T.accent+'88' : T.border2}`, background:sortBy===k ? `${T.accent}18` : 'transparent', color:sortBy===k ? T.accent : T.textDim }}>
                  {l}順
                </button>
              ))}
              <div style={{ flex:1 }} />
              {canEdit && (
                <button onClick={() => setShowForm(p => !p)} style={{ ...btnBase, background:showForm ? `${T.accent}33` : `${T.accent}18`, border:`1px solid ${T.accent}55`, color:T.accent, fontWeight:700 }}>
                  {showForm ? '✕ キャンセル' : '＋ 追加'}
                </button>
              )}
            </div>

            {/* 新規追加フォーム */}
            {showForm && (
              <div style={{ background:`${T.accent}0a`, border:`1px solid ${T.accent}33`, borderRadius:'4px', padding:'12px', marginBottom:'12px' }}>
                <div style={{ display:'flex', gap:'8px', marginBottom:'8px', flexWrap:'wrap' }}>
                  <input
                    value={newTitle} onChange={e => setNewTitle(e.target.value)}
                    placeholder="タイトル（必須）"
                    style={{ flex:'1 1 200px', background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'5px 8px', borderRadius:'2px', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace", minWidth:'0' }}
                  />
                  <select value={newPri} onChange={e => setNewPri(e.target.value)} style={{ background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'5px 6px', borderRadius:'2px', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace" }}>
                    <option value="high">HIGH</option>
                    <option value="medium">MED</option>
                    <option value="low">LOW</option>
                  </select>
                </div>
                <textarea
                  value={newDesc} onChange={e => setNewDesc(e.target.value)}
                  placeholder="詳細説明（難易度自動判定に使用）"
                  rows={2}
                  style={{ width:'100%', background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'5px 8px', borderRadius:'2px', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace", resize:'vertical', boxSizing:'border-box' }}
                />
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'8px' }}>
                  <span style={{ fontSize:'10px', color:T.textDim }}>難易度: 自動判定 → {(() => { const d = autoJudgeDifficulty(newTitle, newDesc); return <span style={{ color:ER_DIFFICULTY[d].color }}>{ER_DIFFICULTY[d].label}</span>; })()}</span>
                  <button onClick={addER} style={{ ...btnBase, background:`${T.accent}22`, border:`1px solid ${T.accent}66`, color:T.accent, fontWeight:700 }}>登録</button>
                </div>
              </div>
            )}

            {/* ERリスト */}
            <div style={{ display:'flex', flexDirection:'column', gap:'4px' }}>
              {displayed.map(er => {
                const impl = er.status === 'implemented';
                const pri = ER_PRIORITY[er.priority] || ER_PRIORITY.medium;
                const diff = ER_DIFFICULTY[er.difficulty] || ER_DIFFICULTY.medium;
                const isEditing = editingId === er.id;
                return (
                  <div key={er.id} style={{ background: checkedIds.has(er.id) ? `${T.accent}08` : impl ? 'transparent' : `${T.bg}cc`, border:`1px solid ${checkedIds.has(er.id) ? T.accent+'44' : impl ? T.border2 : T.accent+'22'}`, borderRadius:'3px', padding:'8px 10px', opacity: impl ? 0.55 : 1 }}>
                    {isEditing ? (
                      /* インライン編集フォーム */
                      <div style={{ display:'flex', flexDirection:'column', gap:'6px' }}>
                        <input value={editTitle} onChange={e=>setEditTitle(e.target.value)} style={{ background:T.bgInput, border:`1px solid ${T.accent}55`, color:T.text, padding:'4px 8px', borderRadius:'2px', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace" }} />
                        <textarea value={editDesc} onChange={e=>setEditDesc(e.target.value)} rows={2} style={{ background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'4px 8px', borderRadius:'2px', fontSize:'10px', fontFamily:"'JetBrains Mono',monospace", resize:'vertical' }} />
                        <div style={{ display:'flex', gap:'6px', alignItems:'center' }}>
                          <select value={editPri} onChange={e=>setEditPri(e.target.value)} style={{ background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'3px 6px', borderRadius:'2px', fontSize:'10px', fontFamily:"'JetBrains Mono',monospace" }}>
                            <option value="high">HIGH</option><option value="medium">MED</option><option value="low">LOW</option>
                          </select>
                          <div style={{ flex:1 }} />
                          <button onClick={() => setEditingId(null)} style={{ ...btnBase, border:`1px solid ${T.border2}`, color:T.textDim, background:'transparent' }}>キャンセル</button>
                          <button onClick={saveEdit} style={{ ...btnBase, background:`${T.accent}22`, border:`1px solid ${T.accent}66`, color:T.accent, fontWeight:700 }}>保存</button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ display:'flex', alignItems:'flex-start', gap:'8px' }}>
                        {/* チェックボックス */}
                        <input type="checkbox" checked={checkedIds.has(er.id)} onChange={() => toggleCheck(er.id)}
                          style={{ marginTop:'3px', flexShrink:0, accentColor:T.accent, cursor:'pointer' }} />
                        <div style={{ display:'flex', gap:'4px', flexShrink:0, paddingTop:'1px' }}>
                          <span style={{ fontSize:'9px', fontWeight:700, padding:'1px 5px', borderRadius:'2px', background:pri.bg, color:pri.color, border:`1px solid ${pri.color}44` }}>{pri.label}</span>
                          <span style={{ fontSize:'9px', fontWeight:700, padding:'1px 5px', borderRadius:'2px', background:'transparent', color:diff.color, border:`1px solid ${diff.color}44` }}>{diff.label}</span>
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:'6px', flexWrap:'wrap', marginBottom:'2px' }}>
                            {/* ER ID バッジ */}
                            <span style={{ fontSize:'9px', fontWeight:900, color:'#aabbcc', background:'rgba(100,150,200,0.12)', border:'1px solid rgba(100,150,200,0.3)', borderRadius:'2px', padding:'1px 6px', letterSpacing:'0.05em', fontFamily:"'JetBrains Mono',monospace", flexShrink:0 }}>{er.id}</span>
                            {/* 実装済み / 依頼中 / 未実装 バッジ */}
                            {impl
                              ? <span style={{ fontSize:'9px', fontWeight:700, color:'#00ff88', background:'rgba(0,255,136,0.1)', border:'1px solid rgba(0,255,136,0.35)', borderRadius:'2px', padding:'1px 6px', letterSpacing:'0.05em', flexShrink:0 }}>✅ 実装済み</span>
                              : er.status === 'requested'
                                ? <span style={{ fontSize:'9px', fontWeight:700, color:'#ff9922', background:'rgba(255,153,34,0.12)', border:'1px solid rgba(255,153,34,0.45)', borderRadius:'2px', padding:'1px 6px', letterSpacing:'0.05em', flexShrink:0 }}>📤 依頼中</span>
                                : <span style={{ fontSize:'9px', fontWeight:700, color:'#ffaa44', background:'rgba(255,170,68,0.08)', border:'1px solid rgba(255,170,68,0.3)', borderRadius:'2px', padding:'1px 6px', letterSpacing:'0.05em', flexShrink:0 }}>🔲 未実装</span>
                            }
                          </div>
                          <div style={{ fontSize:'12px', color:T.text, textDecoration:impl?'line-through':'none', lineHeight:'1.4', wordBreak:'break-all' }}>{er.title}</div>
                          {(er.description || er.desc) && <div style={{ fontSize:'10px', color:T.textDim, marginTop:'2px', textDecoration:impl?'line-through':'none' }}>{er.description || er.desc}</div>}
                          <div style={{ fontSize:'9px', color:T.textDim, marginTop:'3px', display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap' }}>
                            <span>登録: {er.registeredAt}</span>
                            {impl && er.implementedAt ? <span style={{ color:'#00ff88' }}>実装: {er.implementedAt}</span> : null}
                            {er.source === 'auto' && <span style={{ color:'#6688cc', border:'1px solid #6688cc44', padding:'0 4px', borderRadius:'2px', fontSize:'8px' }}>🤖 AUTO</span>}
                            {er.source === 'manual' && <span style={{ color:'#aa8844', border:'1px solid #aa884444', padding:'0 4px', borderRadius:'2px', fontSize:'8px' }}>✋ MANUAL</span>}
                          </div>
                        </div>
                        <div style={{ display:'flex', gap:'3px', flexShrink:0 }}>
                          {/* ER-041: 安定版反映ボタン（実装済みのみ） */}
                          {impl && (
                            <button onClick={() => copyForStable(er)} title="安定版に反映するプロンプトをコピー" style={{ ...btnBase, background:'transparent', border:`1px solid #8899dd44`, color:'#8899dd', fontSize:'9px' }}>📋</button>
                          )}
                          {/* ER-0059: 依頼中マークボタン（未実装のみ） */}
                          {!impl && (
                            <button onClick={() => toggleRequested(er.id)} title={er.status==='requested' ? '依頼中を解除' : 'Claude Codeへ依頼中にマーク'} style={{ ...btnBase, background: er.status==='requested' ? 'rgba(255,153,34,0.18)' : 'transparent', border:`1px solid ${er.status==='requested' ? 'rgba(255,153,34,0.6)' : 'rgba(255,153,34,0.3)'}`, color: er.status==='requested' ? '#ff9922' : '#cc8833', fontSize:'10px' }}>
                              📤
                            </button>
                          )}
                          {/* ER-030: 編集ボタン（権限ユーザーのみ） */}
                          {canEdit && (
                            <button onClick={() => startEdit(er)} title="編集" style={{ ...btnBase, background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, fontSize:'10px' }}>✎</button>
                          )}
                          {canEdit && (
                            <button onClick={() => toggleImpl(er.id)} style={{ ...btnBase, flexShrink:0, background:impl ? 'transparent' : `${T.accent}11`, border:`1px solid ${impl ? T.border2 : T.accent+'44'}`, color:impl ? T.textDim : T.accent }}>
                              {impl ? '取消' : '実装する'}
                            </button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
              {displayed.length === 0 && <div style={{ textAlign:'center', color:T.textDim, fontSize:'11px', padding:'20px' }}>表示する項目がありません</div>}
            </div>

            {/* フッター */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'14px', paddingTop:'12px', borderTop:`1px solid ${T.border2}`, flexWrap:'wrap', gap:'8px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap' }}>
                <span style={{ fontSize:'10px', color:T.textDim }}>合計 {items.length} / 実装済 {items.filter(e=>e.status==='implemented').length} / 依頼中 {items.filter(e=>e.status==='requested').length} / 未実装 {items.filter(e=>e.status!=='implemented'&&e.status!=='requested').length}</span>
                {saveStatus === 'saving' && <span style={{ fontSize:'9px', color:'#ffaa00' }}>💾 保存中...</span>}
                {saveStatus === 'saved'  && <span style={{ fontSize:'9px', color:'#00ff88' }}>✓ 保存済み</span>}
                {checkedIds.size > 0 && (
                  <button onClick={handleCopy} style={{ ...btnBase, background: copyDone ? 'rgba(0,255,136,0.2)' : 'rgba(100,120,200,0.15)', border:`1px solid ${copyDone ? '#00ff88' : '#6688cc'}`, color: copyDone ? '#00ff88' : '#8899dd', fontWeight:700 }}>
                    {copyDone ? '✓ COPIED!' : `📋 COPY (${checkedIds.size}件)`}
                  </button>
                )}
              </div>
              <button onClick={onClose} style={{ ...btnBase, background:`${T.accent}18`, border:`1px solid ${T.accent}55`, color:T.accent, fontWeight:700 }}>✕ CLOSE</button>
            </div>
          </div>
        </div>
      );
    };

    // ======================================================
    // ER-0063: 管理画面コンポーネント群
    // ======================================================

    // ブロードキャストポップアップ（全ユーザー告知）
    const BroadcastPopup = ({ title, message, onClose }) => {
      const T = useT();
      return (
        <div style={{ position:'fixed', inset:0, zIndex:500, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ background:T.bgModal, border:`2px solid #ffaa00`, borderRadius:'4px', padding:'28px 32px', maxWidth:'460px', width:'90%', fontFamily:"'JetBrains Mono',monospace", boxShadow:'0 8px 40px rgba(0,0,0,0.7)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'16px' }}>
              <span style={{ fontSize:'20px' }}>⚠</span>
              <div style={{ fontSize:'13px', fontWeight:700, color:'#ffaa00', letterSpacing:'0.1em' }}>{title || 'お知らせ'}</div>
            </div>
            <div style={{ fontSize:'12px', color:T.text, lineHeight:1.7, whiteSpace:'pre-wrap', marginBottom:'20px' }}>{message}</div>
            <button onClick={onClose} style={{ background:'rgba(255,170,0,0.15)', border:'1px solid #ffaa0066', color:'#ffaa00', padding:'6px 20px', borderRadius:'2px', cursor:'pointer', fontSize:'11px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>CLOSE</button>
          </div>
        </div>
      );
    };

    // アンケートポップアップ
    const SurveyPopup = ({ survey, uidHash, onClose }) => {
      const T = useT();
      const db2 = firebase.firestore();
      const [selected, setSelected] = useState('');
      const [text, setText] = useState('');
      const [submitted, setSubmitted] = useState(false);
      const isText = survey.type === 'text';

      const handleSubmit = async () => {
        const answer = isText ? text : selected;
        if (!answer) return;
        const docId = `${survey.id}_${uidHash}`;
        await db2.collection('fst_survey_answers').doc(docId).set({
          surveyId: survey.id,
          uidHash,
          answer,
          answeredAt: firebase.firestore.FieldValue.serverTimestamp(),
        }).catch(() => {});
        localStorage.setItem('fst_survey_answered_' + survey.id, '1');
        setSubmitted(true);
      };

      return (
        <div style={{ position:'fixed', inset:0, zIndex:500, background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ background:T.bgModal, border:`1px solid ${T.accent}66`, borderRadius:'4px', padding:'28px 32px', maxWidth:'480px', width:'90%', fontFamily:"'JetBrains Mono',monospace", boxShadow:'0 8px 40px rgba(0,0,0,0.7)' }}>
            <div style={{ fontSize:'10px', color:T.textDim, letterSpacing:'0.15em', marginBottom:'8px' }}>SURVEY</div>
            <div style={{ fontSize:'13px', fontWeight:700, color:T.text, marginBottom:'6px' }}>{survey.title}</div>
            {!submitted ? (
              <>
                <div style={{ fontSize:'12px', color:T.textDim, marginBottom:'14px' }}>{survey.question}</div>
                {isText ? (
                  <textarea value={text} onChange={e=>setText(e.target.value)}
                    style={{ width:'100%', background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'8px', borderRadius:'2px', fontSize:'12px', fontFamily:"'JetBrains Mono',monospace", resize:'vertical', minHeight:'80px', boxSizing:'border-box' }}
                    placeholder="回答を入力..." />
                ) : (
                  <div style={{ display:'flex', flexDirection:'column', gap:'6px', marginBottom:'14px' }}>
                    {(survey.options || []).map((opt, i) => (
                      <label key={i} style={{ display:'flex', alignItems:'center', gap:'8px', cursor:'pointer', fontSize:'12px', color: selected===opt ? T.accent : T.text }}>
                        <input type="radio" name="survey_opt" value={opt} checked={selected===opt} onChange={()=>setSelected(opt)} />
                        {opt}
                      </label>
                    ))}
                  </div>
                )}
                <div style={{ display:'flex', gap:'8px', marginTop:'16px' }}>
                  <button onClick={handleSubmit} style={{ background:`${T.accent}22`, border:`1px solid ${T.accent}66`, color:T.accent, padding:'6px 20px', borderRadius:'2px', cursor:'pointer', fontSize:'11px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>送信</button>
                  <button onClick={onClose} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, padding:'6px 14px', borderRadius:'2px', cursor:'pointer', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace" }}>スキップ</button>
                </div>
              </>
            ) : (
              <>
                <div style={{ fontSize:'12px', color:'#00cc88', marginBottom:'16px' }}>✓ 回答を送信しました。ありがとうございます。</div>
                <button onClick={onClose} style={{ background:`${T.accent}22`, border:`1px solid ${T.accent}66`, color:T.accent, padding:'6px 20px', borderRadius:'2px', cursor:'pointer', fontSize:'11px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>CLOSE</button>
              </>
            )}
          </div>
        </div>
      );
    };

    // 管理パネル（タブ型）
    const AdminPanel = ({ onClose, user, ers, onSaveERs }) => {
      const T = useT();
      const db2 = firebase.firestore();
      const [tab, setTab] = useState('broadcast');

      // BROADCASTタブ state
      const [bcTitle, setBcTitle] = useState('');
      const [bcMsg, setBcMsg]     = useState('');
      const [bcStatus, setBcStatus] = useState(null); // {active, title, message}
      const [bcLoading, setBcLoading] = useState(false);

      // SURVEYタブ state
      const [surveys, setSurveys] = useState([]);
      const [svTitle, setSvTitle] = useState('');
      const [svQuestion, setSvQuestion] = useState('');
      const [svType, setSvType] = useState('options'); // options | text
      const [svOptions, setSvOptions] = useState('');
      const [svAnswers, setSvAnswers] = useState({}); // surveyId -> answers[]
      const [svExpanded, setSvExpanded] = useState(null);

      // USERSタブ state
      const [analytics, setAnalytics] = useState([]);
      const [usersLoading, setUsersLoading] = useState(false);

      // FORCE_UPDATEタブ state
      const [fuEnabled, setFuEnabled] = useState(false);
      const [fuMinVer, setFuMinVer] = useState('');
      const [fuMsg, setFuMsg] = useState('');
      const [fuTarget, setFuTarget] = useState('all');
      const [fuSaved, setFuSaved] = useState(false);

      // ER_BULKタブ state
      const [erItems, setErItems] = useState(() => ers ? [...ers] : []);
      const [erChecked, setErChecked] = useState(new Set());
      const [erBulkStatus, setErBulkStatus] = useState('implemented');
      const [erSaved, setErSaved] = useState(false);

      // INBOXタブ state
      const [inboxItems, setInboxItems] = useState([]);
      const [inboxLoading, setInboxLoading] = useState(false);

      // Broadcast読み込み
      useEffect(() => {
        if (tab !== 'broadcast') return;
        db2.collection('fst_admin').doc('broadcast').get().then(snap => {
          if (snap.exists) setBcStatus(snap.data());
        }).catch(()=>{});
      }, [tab]);

      // Survey読み込み
      useEffect(() => {
        if (tab !== 'survey') return;
        db2.collection('fst_surveys').orderBy('createdAt','desc').limit(20).get().then(snap => {
          setSurveys(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }).catch(()=>{});
      }, [tab]);

      // Users読み込み
      useEffect(() => {
        if (tab !== 'users') return;
        setUsersLoading(true);
        db2.collection('fst_analytics').orderBy('createdAt','desc').limit(500).get().then(snap => {
          setAnalytics(snap.docs.map(d => d.data()));
          setUsersLoading(false);
        }).catch(()=>{ setUsersLoading(false); });
      }, [tab]);

      // ForceUpdate読み込み
      useEffect(() => {
        if (tab !== 'force_update') return;
        db2.collection('fst_admin').doc('forceUpdate').get().then(snap => {
          if (snap.exists) {
            const d = snap.data();
            setFuEnabled(d.enabled || false);
            setFuMinVer(d.minVersion || '');
            setFuMsg(d.message || '');
            setFuTarget(d.targetBuild || 'all');
          }
        }).catch(()=>{});
      }, [tab]);

      // Broadcast配信開始
      const handleBcStart = async () => {
        setBcLoading(true);
        await db2.collection('fst_admin').doc('broadcast').set({
          active: true, title: bcTitle, message: bcMsg,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }).catch(()=>{});
        setBcStatus({ active: true, title: bcTitle, message: bcMsg });
        setBcLoading(false);
      };
      const handleBcStop = async () => {
        await db2.collection('fst_admin').doc('broadcast').set({
          active: false, title: bcTitle, message: bcMsg,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }).catch(()=>{});
        setBcStatus(s => s ? { ...s, active: false } : null);
      };

      // Survey作成
      const handleSvCreate = async () => {
        if (!svTitle || !svQuestion) return;
        const opts = svType === 'options' ? svOptions.split('\n').map(s=>s.trim()).filter(Boolean) : [];
        await db2.collection('fst_surveys').add({
          title: svTitle, question: svQuestion, type: svType,
          options: opts, active: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        }).catch(()=>{});
        setSvTitle(''); setSvQuestion(''); setSvOptions('');
        // リロード
        const snap = await db2.collection('fst_surveys').orderBy('createdAt','desc').limit(20).get().catch(()=>null);
        if (snap) setSurveys(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      };
      const handleSvToggle = async (sv) => {
        await db2.collection('fst_surveys').doc(sv.id).update({ active: !sv.active }).catch(()=>{});
        setSurveys(list => list.map(s => s.id===sv.id ? { ...s, active: !s.active } : s));
      };
      const handleSvAnswers = async (svId) => {
        if (svExpanded === svId) { setSvExpanded(null); return; }
        const snap = await db2.collection('fst_survey_answers').where('surveyId','==',svId).get().catch(()=>null);
        if (snap) setSvAnswers(a => ({ ...a, [svId]: snap.docs.map(d=>d.data()) }));
        setSvExpanded(svId);
      };

      // ForceUpdate保存
      const handleFuSave = async () => {
        await db2.collection('fst_admin').doc('forceUpdate').set({
          enabled: fuEnabled, minVersion: fuMinVer, message: fuMsg,
          targetBuild: fuTarget,

      // フィードバックをERに登録
      const handleRegisterAsER = (item) => {
        const currentERs = erItems.length ? erItems : (ers || []);
        const maxId = currentERs.reduce((m, e) => {
          if (!/^ER-\d{4}$/.test(e.id || '')) return m;
          return Math.max(m, parseInt(e.id.replace('ER-', ''), 10));
        }, 59);
        const newId = 'ER-' + String(maxId + 1).padStart(4, '0');
        const newER = {
          id: newId,
          title: (item.message || '').slice(0, 40),
          desc: item.message || '',
          priority: 'medium',
          difficulty: 'easy',
          status: 'pending',
          registeredAt: new Date().toISOString().slice(0, 10),

        const updatedERs = [...currentERs, newER];

        onSaveERs(updatedERs);

        if (a.date > userMap[a.uidHash].lastDate) { userMap[a.uidHash].lastDate = a.date; userMap[a.uidHash].version = a.version; }

      const userList = Object.values(userMap).sort((a,b) => b.lastDate.localeCompare(a.lastDate));
      const today = new Date().toISOString().slice(0,10);

                      <select value={fuTarget} onChange={e=>setFuTarget(e.target.value)} style={{ ...inputStyle, width:'auto' }}>

                    <div>
                      <div style={{ fontSize:'10px', color:T.textDim, marginBottom:'4px' }}>メッセージ</div>

              {/* ER_BULKタブ */}
              {tab === 'er_bulk' && (

                  </div>

                    <button onClick={()=>setErChecked(new Set(erItems.map(e=>e.id)))} style={{ ...btnPrimary, fontSize:'10px', padding:'4px 10px' }}>全選択</button>
                    <button onClick={()=>setErChecked(new Set())} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, padding:'4px 10px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontFamily:"'JetBrains Mono',monospace" }}>全解除</button>

    // ======================================================
    // ミニカレンダーコンポーネント
    // ======================================================
    const MiniCalendar = ({ value, onChange, onClose }) => {
      const T = useT();
      const today = new Date();
      // valueは "YYYY-MM-DD" or "" → 表示用
      const parseDate = (s) => { if (!s || s.length < 8) return null; const v = s.replace(/-/g,''); return v.length === 8 ? new Date(parseInt(v.slice(0,4)), parseInt(v.slice(4,6))-1, parseInt(v.slice(6,8))) : null; };
      const selDate = parseDate(value);
      const [viewYear,  setViewYear]  = useState(selDate ? selDate.getFullYear()  : today.getFullYear());
      const [viewMonth, setViewMonth] = useState(selDate ? selDate.getMonth()     : today.getMonth());
      const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=日
      const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
      const cells = Array.from({ length: Math.ceil((firstDay + daysInMonth) / 7) * 7 }, (_, i) => {
        const d = i - firstDay + 1;
        return (d >= 1 && d <= daysInMonth) ? d : null;
      });
      const toISO = (y, m, d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isSelected = (d) => selDate && selDate.getFullYear()===viewYear && selDate.getMonth()===viewMonth && selDate.getDate()===d;
      const isToday    = (d) => today.getFullYear()===viewYear && today.getMonth()===viewMonth && today.getDate()===d;
      const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      const DAY_NAMES = ['日','月','火','水','木','金','土'];
      return (
        <div style={{ position:"absolute", zIndex:200, background:T.bgModal, border:`1px solid ${T.accent}55`, borderRadius:"6px", padding:"10px", boxShadow:"0 6px 24px rgba(0,0,0,0.5)", minWidth:"220px", fontFamily:"'JetBrains Mono',monospace" }}>
          {/* ヘッダー */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"8px" }}>
            <button onClick={() => { let m=viewMonth-1, y=viewYear; if(m<0){m=11;y--;} setViewMonth(m); setViewYear(y); }} style={{ background:"transparent", border:"none", color:T.textDim, cursor:"pointer", fontSize:"14px", padding:"2px 6px" }}>‹</button>
            <span style={{ color:T.text, fontSize:"11px", fontWeight:700 }}>{viewYear}年 {MONTH_NAMES[viewMonth]}</span>
            <button onClick={() => { let m=viewMonth+1, y=viewYear; if(m>11){m=0;y++;} setViewMonth(m); setViewYear(y); }} style={{ background:"transparent", border:"none", color:T.textDim, cursor:"pointer", fontSize:"14px", padding:"2px 6px" }}>›</button>
          </div>
          {/* 曜日 */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"1px", marginBottom:"4px" }}>
            {DAY_NAMES.map((d,i) => <div key={d} style={{ textAlign:"center", fontSize:"9px", color:i===0?"#ff6666":i===6?"#6699ff":T.textMuted, padding:"2px 0" }}>{d}</div>)}
          </div>
          {/* 日付グリッド */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"2px" }}>
            {cells.map((d, i) => (
              <div key={i} onClick={() => d && (onChange(toISO(viewYear, viewMonth, d)), onClose())}
                style={{ textAlign:"center", fontSize:"11px", padding:"3px 0", borderRadius:"3px", cursor:d?"pointer":"default",
                  background: d && isSelected(d) ? T.accent : "transparent",
                  color: !d ? "transparent" : isSelected(d) ? "#000" : isToday(d) ? T.accent : i%7===0 ? "#ff8888" : i%7===6 ? "#88aaff" : T.text,
                  fontWeight: d && (isSelected(d)||isToday(d)) ? 700 : 400,
                  border: d && isToday(d) && !isSelected(d) ? `1px solid ${T.accent}66` : "1px solid transparent",
                }}
                onMouseEnter={e => { if(d && !isSelected(d)) e.currentTarget.style.background="rgba(100,120,140,0.2)"; }}
                onMouseLeave={e => { if(d && !isSelected(d)) e.currentTarget.style.background="transparent"; }}
              >{d || ''}</div>
            ))}
          </div>
          {/* 今日・明日・クリア */}
          <div style={{ marginTop:"8px", display:"flex", gap:"4px" }}>
            {[
              { label:"今日", offset:0 },
              { label:"明日", offset:1 },
            ].map(({ label, offset }) => {
              const d = new Date(); d.setDate(d.getDate() + offset);
              const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
              return (
                <button key={label} onClick={() => { onChange(iso); onClose(); }}
                  style={{ flex:1, background:value===iso?`${T.accent}22`:`${T.accent}0a`, border:`1px solid ${value===iso?T.accent+'66':T.accent+'33'}`, color:value===iso?T.accent:T.textDim, fontSize:"10px", fontWeight:700, padding:"4px 0", borderRadius:"3px", cursor:"pointer", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.05em" }}>
                  {label}
                </button>
              );
            })}
            <button onClick={() => { onChange(''); onClose(); }}
              style={{ flex:1, background:"transparent", border:`1px solid ${T.border}`, color:T.textMuted, fontSize:"10px", padding:"4px 0", borderRadius:"3px", cursor:"pointer", fontFamily:"'JetBrains Mono',monospace" }}>
              クリア
            </button>
          </div>
        </div>
      );
    };

    // 時間プルダウン（15分刻み）
    const TIME_OPTIONS = (() => {
      const opts = [];
      for (let h = 0; h < 24; h++) for (let m = 0; m < 60; m += 15)
        opts.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
      return opts;
    })();

    // ======================================================
    const ShortcutHelp = ({ onClose }) => {
      const T = useT();
      return (
        <div style={{ position:"fixed", inset:0, zIndex:100, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background:T.bgModal, border:`1px solid ${T.accent}44`, borderRadius:"6px", padding:"24px 32px", maxWidth:"440px", width:"90%", boxShadow:`0 0 40px ${T.accent}18`, fontFamily:"'JetBrains Mono',monospace" }}>
            <div style={{ color:T.accent, fontSize:"13px", fontWeight:700, letterSpacing:"0.2em", marginBottom:"16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span>◈ KEYBOARD SHORTCUTS</span>
              <button onClick={onClose} style={{ background:"transparent", border:"none", color:T.textDim, fontSize:"16px", cursor:"pointer" }}>✕</button>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
              {SHORTCUTS.map(s => (
                <div key={s.key} style={{ display:"flex", alignItems:"center", gap:"12px", padding:"4px 0", borderBottom:`1px solid ${T.border}` }}>
                  <kbd style={{ background:`${T.accent}18`, border:`1px solid ${T.accent}44`, borderRadius:"3px", padding:"2px 10px", color:T.accent, fontSize:"11px", fontWeight:700, minWidth:"70px", textAlign:"center", fontFamily:"'JetBrains Mono',monospace" }}>{s.key}</kbd>
                  <span style={{ color:T.textDim, fontSize:"12px" }}>{s.desc}</span>
                </div>
              ))}
            </div>
            <div style={{ marginTop:"16px", color:T.textMuted, fontSize:"9px", letterSpacing:"0.1em", textAlign:"center" }}>※ フォーム入力中はショートカット無効</div>
          </div>
        </div>
      );
    };

    // ======================================================
    // ストリップ編集モーダル（全フィールド）
    // ======================================================
    const EditStripModal = ({ task, onSave, onClose }) => {
      const T = useT();
      const [title,    setTitle]    = useState(task.title || "");
      const [priority, setPriority] = useState(task.priority || "normal");
      const [category, setCategory] = useState(task.category || "work");
      const [time,     setTime]     = useState(task.time || "09:00");
      const [tagInput, setTagInput] = useState((task.tags || []).join(", "));
      const [assignee, setAssignee] = useState(task.assignee || "");
      const [link,     setLink]     = useState(task.link || "");
      const [estimatedMinutes, setEstimatedMinutes] = useState(task.estimatedMinutes || "");
      // 日付（YYYYMMDD ↔ YYYY-MM-DD）
      const fromYMD = (s) => s.replace(/-/g,'').length===8 ? `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}` : s;
      const [dateInput, setDateInput] = useState(task.scheduledDate || ''); // YYYY-MM-DD
      const [showCal,   setShowCal]   = useState(false);
      const calRef = useRef(null);
      // カレンダー外クリックで閉じる
      useEffect(() => {
        if (!showCal) return;
        const handler = (e) => { if (calRef.current && !calRef.current.contains(e.target)) setShowCal(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [showCal]);
      // 繰り返し
      const [recurOn,  setRecurOn]  = useState(!!(task.recurrence?.type));
      const [recurType,setRecurType]= useState(task.recurrence?.type || 'daily');
      const [recurDays,setRecurDays]= useState(task.recurrence?.weekdays || [1,2,3,4,5]);
      const [recurMDay,setRecurMDay]= useState(task.recurrence?.monthDay || 1);
      const titleRef = useRef(null);

      useEffect(() => { titleRef.current?.focus(); }, []);

      const toggleDay = (d) => setRecurDays(p => p.includes(d) ? p.filter(x=>x!==d) : [...p,d].sort());

      const handleSave = () => {
        if (!title.trim()) return;
        const recurrence = recurOn ? {
          type: recurType,
          ...(recurType === 'weekly'  ? { weekdays: recurDays } : {}),
          ...(recurType === 'monthly' ? { monthDay: recurMDay } : {}),
        } : null;
        const scheduledDate = dateInput || null;
        onSave(task.id, {
          title: title.trim(), priority, category, time,
          tags: tagInput ? tagInput.split(",").map(s => s.trim()).filter(Boolean) : [],
          assignee: assignee.trim(),
          link: link.trim(),
          recurrence,
          scheduledDate: scheduledDate || null,
          estimatedMinutes: estimatedMinutes ? parseInt(estimatedMinutes) : null,
        });
        onClose();
      };

      const inp = {
        background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text,
        padding:"7px 10px", borderRadius:"2px", fontSize:"12px",
        fontFamily:"'JetBrains Mono',monospace", outline:"none",
        width:"100%", boxSizing:"border-box",
      };
      const lbl = { fontSize:"9px", color:T.textMuted, letterSpacing:"0.1em", marginBottom:"4px" };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:100, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background:T.bgModal, border:`1px solid ${T.accent}44`, borderRadius:"6px", padding:"24px 28px", maxWidth:"460px", width:"90%", boxShadow:`0 0 40px ${T.accent}18`, fontFamily:"'JetBrains Mono',monospace" }}>
            <div style={{ color:T.accent, fontSize:"11px", fontWeight:700, letterSpacing:"0.15em", marginBottom:"16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span>◈ EDIT STRIP</span>
              <span style={{ color:T.textDim, fontWeight:400, fontSize:"10px" }}>[{task.stripId}]</span>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
              <div>
                <div style={lbl}>TITLE</div>
                <input ref={titleRef} value={title} onChange={e => setTitle(e.target.value)}
                  onKeyDown={e => { if (e.key==="Enter"&&!e.nativeEvent.isComposing) handleSave(); if (e.key==="Escape") onClose(); }}
                  placeholder="タスク名..." style={inp} />
              </div>
              <div style={{ display:"flex", gap:"8px" }}>
                <div style={{ flex:1 }}>
                  <div style={lbl}>PRIORITY</div>
                  <select value={priority} onChange={e => setPriority(e.target.value)} style={{ ...inp, cursor:"pointer" }}>
                    <option value="high">🔴 URG（緊急）</option>
                    <option value="normal">🟢 NRM（通常）</option>
                    <option value="low">⚫ LOW（低）</option>
                  </select>
                </div>
                <div style={{ flex:1 }}>
                  <div style={lbl}>CATEGORY</div>
                  <select value={category} onChange={e => setCategory(e.target.value)} style={{ ...inp, cursor:"pointer" }}>
                    {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ display:"flex", gap:"8px" }}>
                <div style={{ flex:"0 0 110px" }}>
                  <div style={lbl}>TIME</div>
                  <select value={time} onChange={e => setTime(e.target.value)} style={{ ...inp, cursor:"pointer" }}>
                    {TIME_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div ref={calRef} style={{ flex:"0 0 130px", position:"relative" }}>
                  <div style={lbl}>📅 DATE</div>
                  <div onClick={() => setShowCal(p=>!p)}
                    style={{ ...inp, cursor:"pointer", color: dateInput ? "#00ccff" : T.textMuted, borderColor: dateInput ? "#00ccff66" : T.border2, display:"flex", alignItems:"center", justifyContent:"space-between", userSelect:"none" }}>
                    <span>{dateInput ? dateInput.replace(/-/g,'') : '未設定'}</span>
                    <span style={{ fontSize:"10px", opacity:0.6 }}>📅</span>
                  </div>
                  {showCal && <MiniCalendar value={dateInput} onChange={setDateInput} onClose={() => setShowCal(false)} />}
                </div>
                <div style={{ flex:1 }}>
                  <div style={lbl}>TAGS（カンマ区切り）</div>
                  <input value={tagInput} onChange={e => setTagInput(e.target.value)} placeholder="tag1, tag2..." style={inp} />
                </div>
              </div>
              <div>
                <div style={lbl}>✈ HANDOFF</div>
                <input value={assignee} onChange={e => setAssignee(e.target.value)} placeholder="委任先（空欄＝自分）"
                  style={{ ...inp, borderColor: assignee?"#ffaa0066":T.border2 }} />
              </div>
              <div>
                <div style={lbl}>🔗 LINK</div>
                <input value={link} onChange={e => setLink(e.target.value)} placeholder="https://..."
                  style={{ ...inp, borderColor: link?"#6699ff66":T.border2 }} />
              </div>
              <div>
                <div style={lbl}>⏱ 予定時間</div>
                <select value={estimatedMinutes} onChange={e => setEstimatedMinutes(e.target.value)} style={{ ...inp, cursor:"pointer" }}>
                  <option value="">未設定</option>
                  {[15,30,45,60,90,120].map(m => <option key={m} value={m}>{m}分</option>)}
                </select>
              </div>
              {/* ♻ 繰り返し */}
              <div style={{ background:recurOn?`${T.accent}08`:'transparent', border:`1px solid ${recurOn?T.accent+'33':T.border2}`, borderRadius:"4px", padding:"10px 12px" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: recurOn?"10px":"0" }}>
                  <span style={{ fontSize:"10px", color:recurOn?T.accent:T.textDim, fontWeight:700, letterSpacing:"0.1em" }}>♻ 繰り返し</span>
                  <label style={{ display:"flex", alignItems:"center", gap:"6px", cursor:"pointer" }}>
                    <input type="checkbox" checked={recurOn} onChange={e=>setRecurOn(e.target.checked)} style={{ accentColor:T.accent }} />
                    <span style={{ fontSize:"10px", color:T.textDim }}>{recurOn?'ON':'OFF'}</span>
                  </label>
                </div>
                {recurOn && (
                  <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                    <select value={recurType} onChange={e=>setRecurType(e.target.value)} style={{ ...inp, fontSize:"11px" }}>
                      {RECUR_TYPES.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
                    </select>
                    {recurType === 'weekly' && (
                      <div style={{ display:"flex", gap:"4px", flexWrap:"wrap" }}>
                        {WEEKDAY_LABELS.map((label,i) => (
                          <button key={i} type="button" onClick={()=>toggleDay(i)}
                            style={{ padding:"3px 8px", borderRadius:"2px", fontSize:"10px", cursor:"pointer", border:`1px solid ${recurDays.includes(i)?T.accent+'88':T.border2}`, background:recurDays.includes(i)?`${T.accent}22`:'transparent', color:recurDays.includes(i)?T.accent:T.textDim, fontFamily:"'JetBrains Mono',monospace" }}>
                            {label}
                          </button>
                        ))}
                      </div>
                    )}
                    {recurType === 'monthly' && (
                      <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                        <span style={{ fontSize:"10px", color:T.textDim }}>毎月</span>
                        <input type="number" min="1" max="31" value={recurMDay} onChange={e=>setRecurMDay(parseInt(e.target.value)||1)}
                          style={{ ...inp, width:"70px" }} />
                        <span style={{ fontSize:"10px", color:T.textDim }}>日</span>
                      </div>
                    )}
                    <div style={{ fontSize:"9px", color:T.textDim }}>
                      次回: {(() => { try { return calcNextOccurrence({type:recurType,weekdays:recurDays,monthDay:recurMDay})?.toLocaleDateString('ja-JP'); } catch(e) { return '—'; } })()}
                    </div>
                  </div>
                )}
              </div>
              <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end", marginTop:"4px" }}>
                <button onClick={onClose} style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.textDim, padding:"6px 16px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontFamily:"'JetBrains Mono',monospace" }}>CANCEL</button>
                <button onClick={handleSave} style={{ background:`${T.accent}22`, border:`1px solid ${T.accent}66`, color:T.accent, padding:"6px 16px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>SAVE ↵</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ======================================================
    // テーマピッカー
    // ======================================================
    const THEME_DOTS = { DARK:"#00ff88", LIGHT:"#0055cc", MEDIUM:"#55aaff", COLOR:"#ff6600", COLORFUL:"#ff2299" };

    const ThemePicker = ({ currentId, onChange }) => {
      const T = useT();
      const [open, setOpen] = useState(false);

      return (
        <div style={{ position:"relative" }}>
          <button onClick={() => setOpen(p => !p)} style={{ background:open?`${T.accent}18`:"transparent", border:`1px solid ${open?T.accent+"66":T.border2}`, color:T.accent, padding:"4px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"10px", fontWeight:700, letterSpacing:"0.1em", fontFamily:"'JetBrains Mono',monospace", display:"flex", alignItems:"center", gap:"6px" }}>
            <span style={{ width:"8px", height:"8px", borderRadius:"50%", background:THEME_DOTS[currentId], display:"inline-block", flexShrink:0 }} />
            {currentId}
          </button>
          {open && (
            <>
              <div style={{ position:"fixed", inset:0, zIndex:48 }} onClick={() => setOpen(false)} />
              <div style={{ position:"absolute", top:"calc(100% + 4px)", right:0, background:T.bgModal, border:`1px solid ${T.border}`, borderRadius:"4px", padding:"6px", zIndex:49, minWidth:"130px", boxShadow:"0 4px 20px rgba(0,0,0,0.4)" }}>
                {Object.values(THEMES).map(th => (
                  <button key={th.id} onClick={() => { onChange(th.id); setOpen(false); }} style={{ display:"flex", alignItems:"center", gap:"8px", width:"100%", background:currentId===th.id?`${T.accent}18`:"transparent", border:"none", color:currentId===th.id?T.accent:T.textDim, padding:"5px 8px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontWeight:currentId===th.id?700:400, fontFamily:"'JetBrains Mono',monospace", textAlign:"left" }}>
                    <span style={{ width:"8px", height:"8px", borderRadius:"50%", background:THEME_DOTS[th.id], display:"inline-block", flexShrink:0 }} />
                    {th.name}
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      );
    };

    // ======================================================
    // エクスポート / インポートメニュー
    // ======================================================
    const DataMenu = ({ tasks, tasksRef, onShowOtsukare }) => {
      const T = useT();
      const [open, setOpen] = useState(false);
      const fileRef = useRef(null);
      // ER-0066: おつかれさまモード設定
      const [otsukareEnabled, setOtsukareEnabled] = useState(() => localStorage.getItem('fst_otsukare_enabled') === '1');
      const [otsukareTime,    setOtsukareTime]    = useState(() => localStorage.getItem('fst_otsukare_time') || '21:00');
      const handleOtsukareToggle = (v) => { setOtsukareEnabled(v); localStorage.setItem('fst_otsukare_enabled', v ? '1' : '0'); };
      const handleOtsukareTime   = (v) => { setOtsukareTime(v);    localStorage.setItem('fst_otsukare_time', v); };

      const exportJSON = () => {
        const data = JSON.stringify({ exportedAt: new Date().toISOString(), tasks }, null, 2);
        const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(new Blob([data],{type:"application/json"})), download: `flight-strips-${new Date().toISOString().slice(0,10)}.json` });
        a.click(); setOpen(false);
      };

      const exportMD = () => {
        const lines = ["# Flight Strip TODO - Export", `> ${new Date().toLocaleString("ja-JP")}`, ""];
        for (const col of COLUMNS) {
          const colTasks = tasks.filter(t => t.status === col.id).sort((a,b)=>(b.sortOrder??0)-(a.sortOrder??0));
          if (!colTasks.length) continue;
          lines.push(`## ${col.label}（${col.sublabel}）`, "");
          for (const t of colTasks) {
            const pri = PRIORITIES[t.priority]?.label || t.priority;
            lines.push(`- [${t.status==="completed"?"x":" "}] **${t.title}** \`${pri}\` \`${t.time || "--:--"}\` \`${t.stripId}\``);
            if (t.assignee) lines.push(`  - ✈ HANDOFF: ${t.assignee}`);
            if (t.category) lines.push(`  - CAT: ${CATEGORIES[t.category]?.label || t.category}`);
            if (t.tags?.length) lines.push(`  - Tags: ${t.tags.join(", ")}`);
          }
          lines.push("");
        }
        const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/markdown"})), download: `flight-strips-${new Date().toISOString().slice(0,10)}.md` });
        a.click(); setOpen(false);
      };

      const handleImport = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const data = JSON.parse(await file.text());
          const imported = Array.isArray(data) ? data : (data.tasks || []);
          if (!imported.length) { alert("インポートするタスクが見つかりません"); return; }
          if (!window.confirm(`${imported.length}件のストリップをインポートしますか？`)) return;
          const tsVal = firebase.firestore.FieldValue.serverTimestamp();
          for (const t of imported) {
            const { id, ...taskData } = t;
            await tasksRef.add({ ...taskData, createdAt: tsVal, updatedAt: tsVal, sortOrder: Date.now() + Math.random()*1000 });
          }
          alert(`✓ ${imported.length}件をインポートしました`);
        } catch (err) {
          alert("インポートに失敗しました: " + err.message);
        }
        e.target.value = ""; setOpen(false);
      };

      const menuBtn = (label, action) => (
        <button onClick={action} style={{ display:"block", width:"100%", background:"transparent", border:"none", color:T.textDim, padding:"6px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontFamily:"'JetBrains Mono',monospace", textAlign:"left" }}
          onMouseEnter={e=>e.target.style.color=T.text} onMouseLeave={e=>e.target.style.color=T.textDim}>
          {label}
        </button>
      );

      return (
        <div style={{ position:"relative" }}>
          <button onClick={() => setOpen(p => !p)} style={{ background:open?`${T.accent}18`:"transparent", border:`1px solid ${open?T.accent+"66":T.border2}`, color:open?T.accent:T.textDim, padding:"4px 10px", borderRadius:"2px", cursor:"pointer", fontSize:"10px", letterSpacing:"0.08em", fontFamily:"'JetBrains Mono',monospace" }}>⇅ DATA</button>
          {open && (
            <>

    // ======================================================
    // フライトストリップ（個別タスクカード）
    // ======================================================
    // 経過時間フォーマット
    const formatDuration = (ms) => {
      if (!ms || ms < 0) return "00:00";
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
      return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
    };

    const FlightStrip = ({ task, isSelected, isMultiSelected, dropState, onDragStart, onDragOver, onDragEnd, onDrop, onStatusChange, onDelete, onEdit, isTimerRunning, elapsedMs, totalLoggedMs, onTimerStart, onTimerStop, onTouchStart, onTouchMove, onTouchEnd, titleFontSize=13, projects=[], onSkipProject, projectTasks=[], onEditSeqTask, onAddNextTask, onCheckRoutineStep }) => {
      const T = useT();
      const pri = PRIORITIES[task.priority] || PRIORITIES.normal;
      const cat = CATEGORIES[task.category] || { label: task.category || "OTHER", color: "#888888" };
      const isCompleted = task.status === "completed";
      const isLost      = task.status === "lost";
      const isTerminal  = isCompleted || isLost;
      const isActive    = task.status === "active";
      const isDragOver = dropState?.id === task.id;
      // プロジェクトシーケンス表示
      const [showSeq, setShowSeq] = useState(false);
      // ルーティンストリップ展開
      const [routineExpanded, setRoutineExpanded] = useState(false);
      // ER-0061: 次タスク追加フォーム
      const [showNextForm, setShowNextForm] = useState(false);
      const [nextTitle, setNextTitle] = useState('');
      const nextFormRef = useRef(null);
      useEffect(() => {
        if (!showNextForm) return;
        const handler = (e) => { if (nextFormRef.current && !nextFormRef.current.contains(e.target)) setShowNextForm(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [showNextForm]);
      const handleAddNext = () => {
        if (!nextTitle.trim()) return;
        onAddNextTask && onAddNextTask({ title: nextTitle.trim(), priority: task.priority, category: task.category });
        setNextTitle('');
        setShowNextForm(false);
      };
      const proj     = task.projectId ? projects.find(p => p.id === task.projectId) : null;
      const projSeq  = projectTasks; // 親でソート済み
      const projPos  = projSeq.findIndex(t => t.id === task.id); // 0-indexed
      const projDone = projSeq.filter(t => ['completed','cleared','lost'].includes(t.status)).length;
      const stripRef = useRef(null);

      const dropStyle = isDragOver
        ? dropState.pos === "before"
          ? { borderTop: `3px solid ${T.accent}`, paddingTop: "3px" }
          : { borderBottom: `3px solid ${T.accent}`, paddingBottom: "3px" }
        : {};

      // touchmove は passive:false が必要なので useEffect で登録
      useEffect(() => {
        const el = stripRef.current;
        if (!el || !onTouchMove) return;
        const handler = (e) => onTouchMove(e, task.id);
        el.addEventListener('touchmove', handler, { passive: false });
        return () => el.removeEventListener('touchmove', handler);
      }, [task.id, onTouchMove]);

      return (
        <div
          ref={stripRef}
          data-task-id={task.id}
          draggable
          onDragStart={e => onDragStart(e, task.id)}
          onDragOver={e => { e.preventDefault(); e.stopPropagation(); onDragOver(e, task.id); }}
          onDragEnd={onDragEnd}
          onDrop={e => { e.preventDefault(); e.stopPropagation(); onDrop(e, task.id); }}

          onTouchEnd={onTouchEnd ? e => onTouchEnd(e, task.id) : undefined}
          onDoubleClick={e => { e.stopPropagation(); if (!task.isRoutine) onEdit(task.id); }}
          onClick={task.isRoutine ? e => { e.stopPropagation(); setRoutineExpanded(p => !p); } : undefined}
          className="group relative cursor-grab active:cursor-grabbing"
          style={{
            background:   isMultiSelected ? "rgba(100,160,255,0.1)" : isLost ? "rgba(255,80,0,0.08)" : isCompleted ? `${T.border}44` : pri.bg,
            border:       isMultiSelected ? `1px solid rgba(100,160,255,0.6)` : isSelected ? `1px solid ${T.accent2}` : `1px solid ${isLost ? "#ff550044" : isCompleted ? T.border : pri.border}`,
            borderLeft:   isMultiSelected ? `4px solid rgba(100,160,255,0.9)` : isSelected ? `4px solid ${T.accent2}` : `4px solid ${isLost ? "#ff5500" : isCompleted ? T.textDim : pri.color}`,
            boxShadow:    isMultiSelected ? `0 0 10px rgba(100,160,255,0.25)` : isSelected ? `0 0 12px ${T.accent2}44, inset 0 0 20px ${T.accent2}08` : "none",
            opacity:      isTerminal ? 0.65 : 1,
            borderRadius: "2px", marginBottom: "6px",
            fontFamily: "'JetBrains Mono',monospace",
            transition: "border 0.1s ease", position: "relative", overflow: "hidden",
            display: "flex",
            ...dropStyle,
          }}>
          <div style={{ position:"absolute", inset:0, background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.015) 2px,rgba(0,255,136,0.015) 4px)", pointerEvents:"none" }} />

          <div style={{ flex:1, minWidth:0, padding:0 }}>
            <div style={{ display:"flex", alignItems:"center", padding:"6px 8px 2px", gap:"6px" }}>
              <span style={{ color:isSelected?T.accent2:cat.color, fontSize:"10px", fontWeight:700, letterSpacing:"0.1em" }}>{isSelected?"◉ ":""}{task.stripId}</span>
              <span style={{ color:T.textDim, fontSize:"10px" }}>{task.time}</span>
              <span style={{ color:pri.color, fontSize:"9px", fontWeight:700, padding:"1px 6px", border:`1px solid ${pri.color}`, borderRadius:"2px", letterSpacing:"0.15em" }}>{pri.label}</span>
              {task.scheduledDate && (
                <span style={{ fontSize:"9px", color:"#00ccff", padding:"1px 5px", background:"rgba(0,204,255,0.08)", border:"1px solid rgba(0,204,255,0.3)", borderRadius:"2px", letterSpacing:"0.05em", flexShrink:0 }}>

                <span onClick={e => { e.stopPropagation(); setShowSeq(p => !p); }}

                  <span style={{ fontSize:"12px", color:"rgba(255,255,255,0.6)", fontWeight:400 }}>/{projSeq.length}</span>
                </span>

            </div>
            {proj && (

                <span style={{ fontSize:"13px", fontWeight:800, color:proj.color||'#00aaff', letterSpacing:"0.05em", lineHeight:1.2, textShadow:`0 0 10px ${proj.color||'#00aaff'}55`, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"calc(100% - 28px)" }}>📁 {proj.name}</span>
                {projSeq.length > 0 && <span style={{ fontSize:"9px", color:proj.color||'#00aaff', opacity:0.6, flexShrink:0 }}>{showSeq ? '▲' : '▼'}</span>}

            <div style={{ padding:"4px 8px 2px", display:"flex", alignItems:"center", gap:"6px" }}>
              {task.isRoutine && <span style={{ fontSize:"14px", flexShrink:0 }}>🔄</span>}
              <span style={{ color:isTerminal?T.textDim:T.text, fontSize:`${titleFontSize}px`, fontWeight:600, textDecoration:isTerminal?"line-through":"none", lineHeight:1.3, flex:1 }}>{task.title}</span>

            {/* プロジェクトシーケンスパネル（展開時） */}

                  <span style={{ color:T.textMuted, fontWeight:400 }}>{projDone}/{projSeq.length} 完了</span>

                <div style={{ display:"flex", flexDirection:"column", gap:"2px" }}>

                        <span style={{ flex:1, fontSize:"10px", color:isThis?T.text:isDone2?T.textMuted:T.textDim, fontWeight:isThis?700:400, textDecoration:isDone2?"line-through":"none", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>

                        </span>
                        <span style={{ fontSize:"8px", color:pri2.color, flexShrink:0 }}>{pri2.label}</span>
                        {/* ER-029: 編集ボタン */}
                        {onEditSeqTask && !isDone2 && (
                          <button onClick={e => { e.stopPropagation(); onEditSeqTask(t.id); }}
                            style={{ background:"transparent", border:`1px solid ${T.accent}44`, color:T.accent, fontSize:"7px", padding:"1px 3px", borderRadius:"2px", cursor:"pointer", flexShrink:0 }}>✎</button>

                      </div>

                </div>
              </div>

            {/* タイマー表示（ACTIVEのみ） */}
            {isActive && (
              <div style={{ display:"flex", alignItems:"center", gap:"8px", padding:"4px 8px 6px", borderTop:`1px solid ${T.border}`, marginTop:"2px" }}>
                <button
                  onClick={e => { e.stopPropagation(); isTimerRunning ? onTimerStop(task.id) : onTimerStart(task.id); }}
                  style={{ background: isTimerRunning ? "rgba(255,51,51,0.2)" : "rgba(0,255,136,0.15)", border:`1px solid ${isTimerRunning?"#ff333366":"rgba(0,255,136,0.4)"}`, color: isTimerRunning ? "#ff6666" : T.accent, padding:"2px 8px", borderRadius:"2px", cursor:"pointer", fontSize:"9px", fontWeight:700, fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.1em", flexShrink:0 }}>
                  {isTimerRunning ? "⏹ STOP" : "▶ START"}
                </button>
                <span style={{ fontSize:"14px", fontWeight:700, color: isTimerRunning ? T.accent : T.textDim, letterSpacing:"0.1em", fontVariantNumeric:"tabular-nums", minWidth:"52px" }}>
                  {formatDuration(isTimerRunning ? elapsedMs : 0)}
                </span>
                {totalLoggedMs > 0 && (
                  <span style={{ fontSize:"9px", color:T.textMuted, letterSpacing:"0.05em" }}>
                    合計 {formatDuration(totalLoggedMs)}
                  </span>
                )}
              </div>
            )}

            {/* ER-0061: ＋次タスクボタン（active / next のみ） */}
            {(task.status === 'active' || task.status === 'next') && onAddNextTask && (
              <div ref={nextFormRef} style={{ borderTop:`1px solid ${T.border}`, padding:"4px 8px 5px" }} onClick={e => e.stopPropagation()}>
                {!showNextForm
                  ? <button onClick={e => { e.stopPropagation(); setShowNextForm(true); }} style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.textDim, fontSize:"9px", padding:"2px 8px", borderRadius:"2px", cursor:"pointer", fontFamily:"'JetBrains Mono',monospace", letterSpacing:"0.05em" }}>＋次タスク</button>
                  : <div style={{ display:"flex", gap:"4px", alignItems:"center" }}>
                      <input
                        autoFocus
                        value={nextTitle}
                        onChange={e => setNextTitle(e.target.value)}
                        onKeyDown={e => { if (e.key === 'Enter' && !e.nativeEvent.isComposing) handleAddNext(); if (e.key === 'Escape') setShowNextForm(false); }}

                        style={{ flex:1, background:T.bgInput, border:`1px solid ${T.accent}55`, color:T.text, fontSize:"10px", padding:"3px 7px", borderRadius:"2px", fontFamily:"'JetBrains Mono',monospace", outline:"none" }}
                      />
                      <button onClick={handleAddNext} style={{ background:`${T.accent}20`, border:`1px solid ${T.accent}55`, color:T.accent, fontSize:"9px", padding:"2px 6px", borderRadius:"2px", cursor:"pointer", fontFamily:"'JetBrains Mono',monospace", flexShrink:0 }}>追加</button>
                      <button onClick={e => { e.stopPropagation(); setShowNextForm(false); setNextTitle(''); }} style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.textMuted, fontSize:"9px", padding:"2px 5px", borderRadius:"2px", cursor:"pointer", fontFamily:"'JetBrains Mono',monospace", flexShrink:0 }}>✕</button>

            {/* ルーティンチェックリスト（展開時） */}
            {task.isRoutine && routineExpanded && (
              <div style={{ borderTop:`1px solid ${T.border2}`, padding:'8px 12px', display:'flex', flexDirection:'column', gap:'6px' }} onClick={e => e.stopPropagation()}>
                {(task.routineSteps || []).map(step => (
                  <div key={step.id}
                    onClick={e => { e.stopPropagation(); onCheckRoutineStep && onCheckRoutineStep(task.id, step.id, !step.checked); }}
                    style={{ display:'flex', alignItems:'center', gap:'8px', cursor:'pointer', padding:'4px 6px', borderRadius:'3px',
                      background: step.checked ? `${T.accent}15` : 'transparent',
                      opacity: step.checked ? 0.6 : 1 }}>
                    <div style={{ width:'14px', height:'14px', border:`1.5px solid ${step.checked ? T.accent : T.border2}`,
                      borderRadius:'3px', background: step.checked ? T.accent : 'transparent', flexShrink:0,
                      display:'flex', alignItems:'center', justifyContent:'center' }}>
                      {step.checked && <span style={{ color:'#000', fontSize:'9px', fontWeight:700 }}>✓</span>}
                    </div>
                    <span style={{ fontSize:'10px', color: step.checked ? T.textDim : T.text,
                      textDecoration: step.checked ? 'line-through' : 'none' }}>{step.text}</span>
                  </div>
                ))}
                <div style={{ fontSize:'9px', color:T.textDim, marginTop:'2px' }}>
                  {(task.routineSteps||[]).filter(s=>s.checked).length} / {(task.routineSteps||[]).length} 完了
                </div>
              </div>

          </div>

          {/* 右：プロジェクトSKIPボタン（プロジェクトタスクのみ） */}
          {task.projectId && onSkipProject && (
            <button
              onClick={e => { e.stopPropagation(); onSkipProject(task.id); }}
              title="このタスクをスキップして次へ"
              style={{
                flexShrink: 0, width: "22px",
                background: "rgba(100,150,255,0.06)", borderLeft: "1px solid rgba(100,150,255,0.2)",
                border: "none", color: "#6699ff", cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "1px",
                transition: "background 0.15s, color 0.15s", position: "relative", zIndex: 1,
              }}
              onMouseEnter={e => { e.currentTarget.style.background="rgba(100,150,255,0.2)"; e.currentTarget.style.color="#88bbff"; }}
              onMouseLeave={e => { e.currentTarget.style.background="rgba(100,150,255,0.06)"; e.currentTarget.style.color="#6699ff"; }}

              <span style={{ fontSize: "10px", lineHeight: 1, fontWeight: 700 }}>⏭</span>
              <span style={{ fontSize: "5px", letterSpacing: "0em", opacity: 0.55, fontFamily:"'JetBrains Mono',monospace" }}>SKIP</span>

          <button

            style={{
              flexShrink: 0,
              width: "22px",
              background: isLost ? "rgba(100,120,140,0.15)" : "rgba(255,85,0,0.06)",
              borderLeft: `1px solid ${isLost ? T.border : "rgba(255,85,0,0.2)"}`,
              border: "none",
              color: isLost ? T.textDim : "#ff6600",
              cursor: "pointer",
              display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center", gap: "1px",
              transition: "background 0.15s, color 0.15s",
              position: "relative", zIndex: 1,
            }}
            onMouseEnter={e => {
              e.currentTarget.style.background = isLost ? "rgba(100,120,140,0.3)" : "rgba(255,85,0,0.18)";
              e.currentTarget.style.color = isLost ? T.text : "#ff8833";
            }}
            onMouseLeave={e => {
              e.currentTarget.style.background = isLost ? "rgba(100,120,140,0.15)" : "rgba(255,85,0,0.06)";
              e.currentTarget.style.color = isLost ? T.textDim : "#ff6600";
            }}
          >
            <span style={{ fontSize: "10px", lineHeight: 1, fontWeight: 700 }}>
              {isLost ? "↩" : "✗"}
            </span>
            <span style={{ fontSize: "5px", letterSpacing: "0em", opacity: 0.55, fontFamily:"'JetBrains Mono',monospace" }}>
              {isLost ? "UND" : "LST"}
            </span>
          </button>

          {/* 右：常時表示の完了ボタン */}
          <button
            onClick={e => { e.stopPropagation(); onStatusChange(task.id, isCompleted ? "active" : "completed"); }}
            title={isCompleted ? "元に戻す (active)" : "完了にする (3)"}
            style={{
              flexShrink: 0,
              width: "44px",
              background: isCompleted ? "rgba(100,120,140,0.15)" : "rgba(0,255,136,0.1)",
              borderLeft: `1px solid ${isCompleted ? T.border : "rgba(0,255,136,0.25)"}`,
              border: "none",
              color: isCompleted ? T.textDim : "#00ff88",
              cursor: "pointer",
              display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center", gap: "2px",
              transition: "background 0.15s, color 0.15s",

            onMouseLeave={e => {
              e.currentTarget.style.background = isCompleted ? "rgba(100,120,140,0.15)" : "rgba(0,255,136,0.1)";
              e.currentTarget.style.color = isCompleted ? T.textDim : "#00ff88";
            }}
          >
            <span style={{ fontSize: "18px", lineHeight: 1, fontWeight: 700 }}>
              {isCompleted ? "↩" : "✓"}

              {isCompleted ? "UNDO" : "DONE"}

          {/* ホバーアクションボタン（編集・削除・ステータス変更） */}
          <div className="opacity-0 group-hover:opacity-100" style={{ position:"absolute", top:"4px", right:"48px", display:"flex", gap:"2px", transition:"opacity 0.15s ease" }}>
            <button onClick={e=>{e.stopPropagation();onEdit(task.id);}} title="編集 (E)" style={{ background:`${T.accent}20`, border:`1px solid ${T.accent}44`, color:T.accent, fontSize:"10px", padding:"2px 6px", borderRadius:"2px", cursor:"pointer", lineHeight:1 }}>✎</button>
            {COLUMNS.filter(c=>c.id!==task.status && c.id!=="completed" && c.id!=="lost").map(col => (
              <button key={col.id} onClick={e=>{e.stopPropagation();onStatusChange(task.id,col.id);}} title={`→ ${col.label}`} style={{ background:`rgba(0,0,0,0.7)`, border:`1px solid ${T.border}`, color:T.textDim, fontSize:"10px", padding:"2px 5px", borderRadius:"2px", cursor:"pointer", lineHeight:1 }}>{col.icon}</button>
            ))}
            <button onClick={e=>{e.stopPropagation();onDelete(task.id);}} title="削除 (D)" style={{ background:"rgba(255,0,0,0.2)", border:"1px solid #ff333366", color:"#ff6666", fontSize:"10px", padding:"2px 5px", borderRadius:"2px", cursor:"pointer", lineHeight:1 }}>✕</button>
