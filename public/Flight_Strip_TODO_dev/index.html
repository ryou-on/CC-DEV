    // ======================================================
    // タイムライン
    // ======================================================
    const TimelineView = ({ tasks, currentTime, onTimeChange, onStatusChange }) => {
      const T = useT();
      // ER-0062: タイムライン表示時間をlocalStorageから読み込む（デフォルト 6〜22）
      const [tlStart, setTlStart] = useState(() => parseInt(localStorage.getItem('fst_tl_start') || '6'));
      const [tlEnd,   setTlEnd]   = useState(() => parseInt(localStorage.getItem('fst_tl_end')   || '22'));
      const TL_START = tlStart;
      const TL_END   = tlEnd;
      const HOURS = Array.from({ length: Math.max(1, TL_END - TL_START) }, (_, i) => i + TL_START);
      const handleTlStartChange = (v) => { const n = parseInt(v); setTlStart(n); localStorage.setItem('fst_tl_start', n); };
      const handleTlEndChange   = (v) => { const n = parseInt(v); setTlEnd(n);   localStorage.setItem('fst_tl_end',   n); };
      const currentHour = currentTime.getHours();
      const currentMin  = currentTime.getMinutes();
      const [dragOverHour,    setDragOverHour]    = useState(null);
      const [dragOverOutside, setDragOverOutside] = useState(false);
      // ER-031: タスククリックポップアップ
      const [tlPopup, setTlPopup] = useState(null); // { task, x, y }

      // タッチドラッグ用
      const touchDragRef  = useRef(null); // { taskId, title, priority }
      const [touchGhost,  setTouchGhost]  = useState(null); // { x, y, title, priority }
      const mainTlRef     = useRef(null); // メインタイムラインdivのref
      const outsideRef    = useRef(null); // 時間外フィードdivのref

      // タッチ移動ハンドラ（non-passive）
      useEffect(() => {
        const onTouchMove = (e) => {
          if (!touchDragRef.current) return;
          e.preventDefault();
          const touch = e.touches[0];
          setTouchGhost(g => g ? { ...g, x: touch.clientX, y: touch.clientY } : g);

          // ホバー判定：メインタイムライン各列
          let matched = false;
          if (mainTlRef.current) {
            const cols = mainTlRef.current.querySelectorAll('[data-tl-hour]');
            cols.forEach(col => {
              const r = col.getBoundingClientRect();
              if (touch.clientX >= r.left && touch.clientX <= r.right &&
                  touch.clientY >= r.top  && touch.clientY <= r.bottom) {
                const h = parseInt(col.getAttribute('data-tl-hour'));
                setDragOverHour(h);
                setDragOverOutside(false);
                matched = true;
              }
            });
          }
          // ホバー判定：時間外フィード
          if (!matched && outsideRef.current) {
            const r = outsideRef.current.getBoundingClientRect();
            if (touch.clientX >= r.left && touch.clientX <= r.right &&
                touch.clientY >= r.top  && touch.clientY <= r.bottom) {
              setDragOverOutside(true);
              setDragOverHour(null);
              matched = true;
            }
          }
          if (!matched) { setDragOverHour(null); setDragOverOutside(false); }
        };
        window.addEventListener('touchmove', onTouchMove, { passive: false });
        return () => window.removeEventListener('touchmove', onTouchMove);
      }, []);

      // タッチ終了ハンドラ
      useEffect(() => {
        const onTouchEnd = (e) => {
          if (!touchDragRef.current) return;
          const { taskId } = touchDragRef.current;
          const touch = e.changedTouches[0];

          // ドロップ先判定
          let dropped = false;
          if (mainTlRef.current) {
            const cols = mainTlRef.current.querySelectorAll('[data-tl-hour]');
            cols.forEach(col => {
              const r = col.getBoundingClientRect();
              if (touch.clientX >= r.left && touch.clientX <= r.right &&
                  touch.clientY >= r.top  && touch.clientY <= r.bottom) {
                const h = parseInt(col.getAttribute('data-tl-hour'));
                onTimeChange && onTimeChange(taskId, `${String(h).padStart(2,'0')}:00`);
                dropped = true;
              }
            });
          }
          if (!dropped && outsideRef.current) {
            const r = outsideRef.current.getBoundingClientRect();
            if (touch.clientX >= r.left && touch.clientX <= r.right &&
                touch.clientY >= r.top  && touch.clientY <= r.bottom) {
              onTimeChange && onTimeChange(taskId, '');
              dropped = true;
            }
          }

          // クリーンアップ
          touchDragRef.current = null;
          setTouchGhost(null);
          setDragOverHour(null);
          setDragOverOutside(false);
        };
        window.addEventListener('touchend', onTouchEnd);
        return () => window.removeEventListener('touchend', onTouchEnd);
      }, [onTimeChange]);

      // タスクの時刻を数値で返す（未設定はnull）
      const getHour = (t) => {
        if (!t.time || t.time === '00:00' || t.time === '0:00') return null;
        const h = parseInt(t.time.split(':')[0]);
        return isNaN(h) ? null : h;
      };

      const active = tasks.filter(t => t.status !== 'completed' && t.status !== 'cleared');

      // タイムライン内（07:00〜TL_END未満）
      const inRange = (t) => { const h = getHour(t); return h !== null && h >= TL_START && h < TL_END; };
      // 時間外フィード（時刻未設定 or 範囲外）
      const outsideTasks = active.filter(t => !inRange(t))
        .sort((a, b) => (getHour(a) ?? 99) - (getHour(b) ?? 99));

      const TL_H = 108; // タイムライン高さ px

      const stripChip = (t, opts = {}) => (
        <div key={t.id}
          draggable={!!onTimeChange}
          onDragStart={onTimeChange ? e => { e.dataTransfer.setData('text/plain', t.id); e.dataTransfer.effectAllowed = 'move'; } : undefined}
          onTouchStart={onTimeChange ? e => {
            touchDragRef.current = { taskId: t.id };
            const touch = e.touches[0];
            setTouchGhost({ x: touch.clientX, y: touch.clientY, title: t.title, priority: t.priority });
          } : undefined}
          onClick={e => { e.stopPropagation(); setTlPopup({ task:t, x:e.clientX, y:e.clientY }); }}
          title={t.title}
          style={{ background:PRIORITIES[t.priority]?.bg, border:`1px solid ${PRIORITIES[t.priority]?.color}44`, borderLeft:`3px solid ${PRIORITIES[t.priority]?.color}`, borderRadius:"2px", padding:"2px 5px", fontSize:"9px", color:T.textDim, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer", touchAction:"none", ...opts.style }}>
          {opts.showTime && t.time && <span style={{ color:T.textMuted, marginRight:"3px", fontSize:"8px" }}>{t.time}</span>}
          <span style={{ color:PRIORITIES[t.priority]?.color, marginRight:"3px" }}>●</span>
          {t.title}
        </div>
      );

      return (
        <div style={{ background:T.bgCard, border:`1px solid ${T.border}`, borderRadius:"4px", padding:"12px" }}>
          {/* ヘッダー */}
          <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px", fontFamily:"'JetBrains Mono',monospace", flexWrap:"wrap" }}>
            <span style={{ color:T.accent, fontSize:"11px", fontWeight:700, letterSpacing:"0.15em" }}>◈ TIMELINE</span>
            {onTimeChange && <span style={{ color:T.textMuted, fontSize:"9px" }}>ドラッグ / タッチで時間変更</span>}
            {/* ER-0062: 表示時間設定 */}
            <div style={{ display:"flex", alignItems:"center", gap:"4px", fontSize:"9px", color:T.textDim, fontFamily:"'JetBrains Mono',monospace" }}>
              <span>表示時間:</span>
              <select value={tlStart} onChange={e => handleTlStartChange(e.target.value)}
                style={{ background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, fontSize:"9px", padding:"1px 3px", borderRadius:"2px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer" }}>
                {Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,'0')}時</option>)}
              </select>
              <span>〜</span>
              <select value={tlEnd} onChange={e => handleTlEndChange(e.target.value)}
                style={{ background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, fontSize:"9px", padding:"1px 3px", borderRadius:"2px", fontFamily:"'JetBrains Mono',monospace", cursor:"pointer" }}>
                {Array.from({length:24},(_,i)=>i+1).map(h=><option key={h} value={h}>{String(h).padStart(2,'0')}時</option>)}
              </select>
            </div>
            <div style={{ flex:1 }} />
            {outsideTasks.length > 0 && (
              <span style={{ fontSize:"9px", color:"#ffaa00", background:"rgba(255,170,0,0.1)", border:"1px solid rgba(255,170,0,0.25)", padding:"1px 7px", borderRadius:"2px" }}>
                時間外 {outsideTasks.length}件
              </span>
            )}
          </div>

          {/* タイムライン本体 + 時間外フィード */}
          <div style={{ display:"flex", gap:"8px", alignItems:"flex-start" }}>

            {/* ── メインタイムライン ── */}
            <div ref={mainTlRef} style={{ flex:1, position:"relative", height:`${TL_H}px`, minWidth:0, overflowX:"auto" }}>
              <div style={{ display:"flex", height:"100%", minWidth:`${HOURS.length * 60}px`, position:"relative" }}>
                {HOURS.map(h => {
                  const tasksAtHour = active.filter(t => getHour(t) === h);
                  const isCurrent  = h === currentHour;
                  const isDragOver = dragOverHour === h;
                  return (
                    <div key={h}
                      data-tl-hour={h}
                      style={{ flex:1, borderRight:`1px solid ${T.border}`, position:"relative", background:isDragOver?`${T.accent}18`:isCurrent?`${T.accent}08`:"transparent", transition:"background 0.1s", minWidth:"60px" }}
                      onDragOver={onTimeChange ? e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; setDragOverHour(h); } : undefined}
                      onDragLeave={onTimeChange ? () => setDragOverHour(null) : undefined}
                      onDrop={onTimeChange ? e => { e.preventDefault(); const id=e.dataTransfer.getData('text/plain'); onTimeChange(id, `${String(h).padStart(2,'0')}:00`); setDragOverHour(null); } : undefined}
                    >
                      <span style={{ position:"absolute", top:0, left:"3px", fontSize:"8px", color:isCurrent?T.accent:T.textMuted, fontFamily:"'JetBrains Mono',monospace", fontWeight:isCurrent?700:400 }}>
                        {String(h).padStart(2,"0")}
                      </span>
                      {tasksAtHour.map((t, i) => (
                        <div key={t.id} style={{ position:"absolute", top:16+i*24, left:"3px", right:"3px" }}>
                          {stripChip(t)}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
              {/* 現在時刻ライン（範囲内のみ） */}
              {currentHour >= TL_START && currentHour < TL_END && (
                <div style={{ position:"absolute", left:`${((currentHour - TL_START) + currentMin/60) / HOURS.length * 100}%`, top:0, bottom:0, width:"2px", background:"#ff3333", boxShadow:"0 0 8px #ff333388", zIndex:10, pointerEvents:"none" }}>
                  <div style={{ position:"absolute", top:"-3px", left:"-3px", width:"8px", height:"8px", background:"#ff3333", borderRadius:"50%" }} />
                </div>
              )}
            </div>

            {/* ── 時間外フィード ── */}
            <div
              ref={outsideRef}
              style={{ width:"152px", flexShrink:0, border:`1px solid ${dragOverOutside?"#ffaa0077":T.border2}`, borderRadius:"3px", background: dragOverOutside?`rgba(255,170,0,0.06)`:T.bg, transition:"border-color 0.1s, background 0.1s", height:`${TL_H}px`, display:"flex", flexDirection:"column" }}
              onDragOver={onTimeChange ? e => { e.preventDefault(); setDragOverOutside(true); } : undefined}
              onDragLeave={onTimeChange ? () => setDragOverOutside(false) : undefined}
              onDrop={onTimeChange ? e => { e.preventDefault(); const id=e.dataTransfer.getData('text/plain'); onTimeChange(id, ''); setDragOverOutside(false); } : undefined}
            >
              <div style={{ padding:"3px 7px", borderBottom:`1px solid ${T.border2}`, fontSize:"8px", color:"#ffaa00", letterSpacing:"0.12em", fontFamily:"'JetBrains Mono',monospace", flexShrink:0 }}>
                時間外 / 未設定
              </div>
              <div style={{ flex:1, overflowY:"auto", padding:"4px", display:"flex", flexDirection:"column", gap:"3px" }}>
                {outsideTasks.length === 0
                  ? <div style={{ fontSize:"8px", color:T.border, textAlign:"center", marginTop:"16px", fontFamily:"'JetBrains Mono',monospace" }}>NO STRIPS</div>
                  : outsideTasks.map(t => stripChip(t, { showTime:true }))
                }
              </div>
            </div>

          </div>

          {/* タッチドラッグ ゴースト */}
          {touchGhost && (
            <div style={{ position:"fixed", left:touchGhost.x+12, top:touchGhost.y-16, pointerEvents:"none", zIndex:9999, background:PRIORITIES[touchGhost.priority]?.bg, border:`2px solid ${PRIORITIES[touchGhost.priority]?.color}`, borderRadius:"3px", padding:"3px 8px", fontSize:"9px", color:"#fff", whiteSpace:"nowrap", maxWidth:"160px", overflow:"hidden", textOverflow:"ellipsis", opacity:0.9, fontFamily:"'JetBrains Mono',monospace", boxShadow:"0 4px 16px rgba(0,0,0,0.5)" }}>
              <span style={{ color:PRIORITIES[touchGhost.priority]?.color, marginRight:"4px" }}>●</span>
              {touchGhost.title}
            </div>
          )}

          {/* ER-031: タスククリックポップアップ */}
          {tlPopup && (
            <>
              <div style={{ position:"fixed", inset:0, zIndex:299 }} onClick={() => setTlPopup(null)} />
              <div style={{ position:"fixed", left:Math.min(tlPopup.x+8, window.innerWidth-200), top:Math.min(tlPopup.y+8, window.innerHeight-180), zIndex:300, background:T.bgModal, border:`1px solid ${T.accent}55`, borderRadius:"5px", padding:"10px 12px", minWidth:"180px", boxShadow:"0 6px 24px rgba(0,0,0,0.5)", fontFamily:"'JetBrains Mono',monospace" }}>
                <div style={{ fontSize:"10px", fontWeight:700, color:T.text, marginBottom:"4px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"170px" }}>{tlPopup.task.title}</div>
                <div style={{ fontSize:"9px", color:T.textDim, marginBottom:"8px" }}>
                  {tlPopup.task.time && <span style={{ marginRight:"8px" }}>🕐 {tlPopup.task.time}</span>}
                  <span style={{ color:PRIORITIES[tlPopup.task.priority]?.color }}>{PRIORITIES[tlPopup.task.priority]?.label}</span>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:"3px" }}>
                  {onStatusChange && (<>
                    <button onClick={() => { onStatusChange(tlPopup.task.id, 'active'); setTlPopup(null); }} style={{ background:"rgba(0,255,136,0.1)", border:"1px solid rgba(0,255,136,0.3)", color:"#00ff88", padding:"3px 8px", borderRadius:"2px", cursor:"pointer", fontSize:"9px", fontFamily:"'JetBrains Mono',monospace", textAlign:"left" }}>▶ ACTIVEに追加</button>
                    <button onClick={() => { onStatusChange(tlPopup.task.id, 'next'); setTlPopup(null); }} style={{ background:"rgba(0,204,255,0.1)", border:"1px solid rgba(0,204,255,0.3)", color:"#00ccff", padding:"3px 8px", borderRadius:"2px", cursor:"pointer", fontSize:"9px", fontFamily:"'JetBrains Mono',monospace", textAlign:"left" }}>→ NEXTに追加</button>
                    <button onClick={() => { onStatusChange(tlPopup.task.id, 'completed'); setTlPopup(null); }} style={{ background:"rgba(100,120,140,0.1)", border:"1px solid rgba(100,120,140,0.3)", color:T.textDim, padding:"3px 8px", borderRadius:"2px", cursor:"pointer", fontSize:"9px", fontFamily:"'JetBrains Mono',monospace", textAlign:"left" }}>✓ 完了</button>
                  </>)}
                  <button onClick={() => setTlPopup(null)} style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.textMuted, padding:"2px 8px", borderRadius:"2px", cursor:"pointer", fontSize:"9px", fontFamily:"'JetBrains Mono',monospace", marginTop:"2px" }}>✕ 閉じる</button>
                </div>
              </div>
            </>
          )}
        </div>
      );
    };

    // ======================================================
    // 新規タスク入力フォーム
    // ======================================================
    const NewStripForm = ({ onAdd, onClose }) => {
      const T = useT();
      const [title,    setTitle]    = useState("");
      const [priority, setPriority] = useState("normal");
      const [category, setCategory] = useState("work");
      const [time,     setTime]     = useState("09:00");
      const [tagInput, setTagInput] = useState("");
      const [assignee, setAssignee] = useState("");
      const [link,     setLink]     = useState("");
      const [recurOn,  setRecurOn]  = useState(false);
      const [recurType,setRecurType]= useState('daily');
      const [recurDays,setRecurDays]= useState([1,2,3,4,5]);
      const [recurMDay,setRecurMDay]= useState(1);
      const [dateInput,setDateInput]= useState(''); // YYYY-MM-DD
      const [showCal,  setShowCal]  = useState(false);
      const [estimatedMinutes, setEstimatedMinutes] = useState("");
      const calRef = useRef(null);
      const titleRef = useRef(null);

      useEffect(() => { titleRef.current?.focus(); }, []);
      useEffect(() => {
        if (!showCal) return;
        const handler = (e) => { if (calRef.current && !calRef.current.contains(e.target)) setShowCal(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [showCal]);

      const toggleDay = (d) => setRecurDays(p => p.includes(d) ? p.filter(x=>x!==d) : [...p,d].sort());

      const handleSubmit = () => {
        if (!title.trim()) return;
        const recurrence = recurOn ? {
          type: recurType,
          ...(recurType === 'weekly'  ? { weekdays: recurDays } : {}),
          ...(recurType === 'monthly' ? { monthDay: recurMDay } : {}),
        } : null;
        const scheduledDate = dateInput || null;
        onAdd({
          stripId: `FS${String(Date.now()).slice(-4)}`,
          title: title.trim(), priority, category, time, status: "next",
          tags: tagInput ? tagInput.split(",").map(s=>s.trim()).filter(Boolean) : [],
          assignee: assignee.trim(),
          link: link.trim(),
          recurrence,
          scheduledDate,
          estimatedMinutes: estimatedMinutes ? parseInt(estimatedMinutes) : null,
          sortOrder: Date.now(),
        });
        onClose();
      };

      const inp = { background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:"6px 10px", borderRadius:"2px", fontSize:"12px", fontFamily:"'JetBrains Mono',monospace", outline:"none", width:"100%", boxSizing:"border-box" };

      return (
        <div style={{ background:T.bgModal, border:`1px solid ${T.accent}44`, borderRadius:"4px", padding:"16px", marginBottom:"12px", boxShadow:`0 0 20px ${T.accent}12` }}>
          <div style={{ color:T.accent, fontSize:"11px", fontWeight:700, letterSpacing:"0.15em", marginBottom:"12px", fontFamily:"'JetBrains Mono',monospace", display:"flex", justifyContent:"space-between" }}>
            <span>◈ NEW STRIP</span>
            <span style={{ color:T.textMuted, fontSize:"9px", fontWeight:400 }}>N キーで開閉 · Esc で閉じる</span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
            <input ref={titleRef} style={inp} placeholder="タスク名..." value={title}
              onChange={e=>setTitle(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.nativeEvent.isComposing) handleSubmit(); if(e.key==="Escape") onClose(); }} />
            <div style={{ display:"flex", gap:"8px" }}>
              <select style={{ ...inp, cursor:"pointer" }} value={priority} onChange={e=>setPriority(e.target.value)}>
                <option value="high">🔴 URG（緊急）</option>
                <option value="normal">🟢 NRM（通常）</option>
                <option value="low">⚫ LOW（低）</option>
              </select>
              <select style={{ ...inp, cursor:"pointer" }} value={category} onChange={e=>setCategory(e.target.value)}>
                {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
              <select style={{ ...inp, width:"100px", cursor:"pointer" }} value={time} onChange={e=>setTime(e.target.value)}>
                {TIME_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              <div ref={calRef} style={{ position:"relative", width:"120px" }}>
                <div onClick={() => setShowCal(p=>!p)}
                  style={{ ...inp, cursor:"pointer", color:dateInput?"#00ccff":T.textMuted, borderColor:dateInput?"#00ccff66":T.border2, display:"flex", alignItems:"center", justifyContent:"space-between", userSelect:"none" }}>
                  <span style={{ fontSize:"11px" }}>{dateInput ? dateInput.replace(/-/g,'') : '日付'}</span>
                  <span style={{ fontSize:"10px", opacity:0.6 }}>📅</span>
                </div>
                {showCal && <MiniCalendar value={dateInput} onChange={setDateInput} onClose={() => setShowCal(false)} />}
              </div>
            </div>
            <input style={inp} placeholder="タグ（カンマ区切り）" value={tagInput} onChange={e=>setTagInput(e.target.value)} />
            <input style={{ ...inp, borderColor:assignee?"#ffaa0066":T.border2 }} placeholder="✈ HANDOFF先（委任者名、空欄＝自分）" value={assignee} onChange={e=>setAssignee(e.target.value)} />
            <input style={{ ...inp, borderColor:link?"#6699ff66":T.border2 }} placeholder="🔗 URL（任意）" value={link} onChange={e=>setLink(e.target.value)} />
            <select style={{ ...inp, cursor:"pointer" }} value={estimatedMinutes} onChange={e=>setEstimatedMinutes(e.target.value)}>
              <option value="">⏱ 予定時間（未設定）</option>
              {[15,30,45,60,90,120].map(m => <option key={m} value={m}>⏱ {m}分</option>)}
            </select>
            {/* ♻ 繰り返し */}
            <div style={{ background:recurOn?`${T.accent}08`:'transparent', border:`1px solid ${recurOn?T.accent+'33':T.border2}`, borderRadius:"4px", padding:"8px 10px" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:recurOn?"8px":"0" }}>
                <span style={{ fontSize:"10px", color:recurOn?T.accent:T.textDim, fontWeight:700 }}>♻ 繰り返し</span>
                <label style={{ display:"flex", alignItems:"center", gap:"5px", cursor:"pointer" }}>
                  <input type="checkbox" checked={recurOn} onChange={e=>setRecurOn(e.target.checked)} style={{ accentColor:T.accent }} />
                  <span style={{ fontSize:"10px", color:T.textDim }}>{recurOn?'ON':'OFF'}</span>
                </label>
              </div>
              {recurOn && (
                <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                  <select value={recurType} onChange={e=>setRecurType(e.target.value)} style={{ ...inp, fontSize:"11px" }}>
                    {RECUR_TYPES.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
                  </select>
                  {recurType === 'weekly' && (
                    <div style={{ display:"flex", gap:"4px" }}>
                      {WEEKDAY_LABELS.map((label,i) => (
                        <button key={i} type="button" onClick={()=>toggleDay(i)}
                          style={{ padding:"2px 7px", borderRadius:"2px", fontSize:"10px", cursor:"pointer", border:`1px solid ${recurDays.includes(i)?T.accent+'88':T.border2}`, background:recurDays.includes(i)?`${T.accent}22`:'transparent', color:recurDays.includes(i)?T.accent:T.textDim, fontFamily:"'JetBrains Mono',monospace" }}>
                          {label}
                        </button>
                      ))}
                    </div>
                  )}
                  {recurType === 'monthly' && (
                    <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                      <span style={{ fontSize:"10px", color:T.textDim }}>毎月</span>
                      <input type="number" min="1" max="31" value={recurMDay} onChange={e=>setRecurMDay(parseInt(e.target.value)||1)}
                        style={{ ...inp, width:"70px" }} />
                      <span style={{ fontSize:"10px", color:T.textDim }}>日</span>
                    </div>
                  )}
                  <div style={{ fontSize:"9px", color:T.textDim }}>
                    次回: {(() => { try { return calcNextOccurrence({type:recurType,weekdays:recurDays,monthDay:recurMDay})?.toLocaleDateString('ja-JP'); } catch(e) { return '—'; } })()}
                  </div>
                </div>
              )}
            </div>
            <div style={{ display:"flex", gap:"8px", justifyContent:"flex-end" }}>
              <button onClick={onClose} style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.textDim, padding:"6px 16px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontFamily:"'JetBrains Mono',monospace" }}>CANCEL</button>
              <button onClick={handleSubmit} style={{ background:`${T.accent}22`, border:`1px solid ${T.accent}66`, color:T.accent, padding:"6px 16px", borderRadius:"2px", cursor:"pointer", fontSize:"11px", fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>FILE STRIP</button>
            </div>
          </div>
        </div>
      );
    };

    // ======================================================
    // フィードバックモーダル
    // ======================================================
    const FeedbackModal = ({ user, onClose, build }) => {
      const T = useT();
      const [subject, setSubject] = useState('');
      const [email,   setEmail]   = useState(user?.email || '');
      const [message, setMessage] = useState('');
      const [sending, setSending] = useState(false);
      const [sent,    setSent]    = useState(false);
      const [error,   setError]   = useState('');

      const handleSubmit = async () => {
        if (!subject.trim()) { setError('件名を入力してください'); return; }
        if (!message.trim()) { setError('メッセージを入力してください'); return; }
        if (message.length > 200) { setError('メッセージは200文字以内です'); return; }
        setSending(true); setError('');
        try {
          // トランザクションで FB_XXXX 連番取得
          const counterRef = db.collection('fst_feedback_meta').doc('counter');
          let fbId;
          await db.runTransaction(async tx => {
            const doc = await tx.get(counterRef);
            const n = (doc.exists ? (doc.data().count || 0) : 0) + 1;
            tx.set(counterRef, { count: n }, { merge: true });
            fbId = `FB_${String(n).padStart(4, '0')}`;
          });
          // Firestore に保存
          await db.collection('fst_feedback').doc(fbId).set({
            fbId, subject: subject.trim(), email: email.trim(),
            message: message.trim(), build,
            uid: user?.uid || null, status: 'new', replySent: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          // EmailJS で自動返信
          if (EMAILJS_CONFIG.publicKey && EMAILJS_CONFIG.serviceId && email.trim()) {
            try {
              await window.emailjs.send(
                EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId,
                { to_email: email.trim(), fb_id: fbId,
                  subject: subject.trim(), message: message.trim() },
                EMAILJS_CONFIG.publicKey
              );
              await db.collection('fst_feedback').doc(fbId).update({ replySent: true });
            } catch(e) { console.warn('Auto-reply failed:', e); }
          }
          setSent(true);
        } catch(e) { setError('送信に失敗しました: ' + e.message); }
        finally { setSending(false); }
      };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"16px" }}>
          <div style={{ background:T.bgModal, border:`1px solid ${T.border}`, borderRadius:"6px", padding:"24px", width:"100%", maxWidth:"480px", boxShadow:"0 8px 40px rgba(0,0,0,0.5)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px", paddingBottom:"12px", borderBottom:`1px solid ${T.border}` }}>
              <div>
                <div style={{ fontSize:"14px", fontWeight:800, color:T.accent, letterSpacing:"0.15em" }}>💬 フィードバック</div>
                <div style={{ fontSize:"8px", color:T.textMuted, letterSpacing:"0.2em", marginTop:"2px" }}>FLIGHT STRIP TODO</div>
              </div>
              <button onClick={onClose} style={{ background:"transparent", border:"none", color:T.textDim, cursor:"pointer", fontSize:"18px", lineHeight:1 }}>✕</button>
            </div>
            {sent ? (
              <div style={{ textAlign:"center", padding:"24px 0" }}>
                <div style={{ fontSize:"36px", marginBottom:"12px" }}>✅</div>
                <div style={{ fontSize:"13px", color:T.accent, fontWeight:700, marginBottom:"8px" }}>送信完了</div>
                <div style={{ fontSize:"11px", color:T.textDim, lineHeight:1.7 }}>フィードバックありがとうございました</div>
                <button onClick={onClose} style={{ marginTop:"20px", background:`${T.accent}18`, border:`1px solid ${T.accent}44`, color:T.accent, padding:"8px 24px", borderRadius:"4px", cursor:"pointer", fontSize:"11px", fontFamily:"inherit" }}>閉じる</button>
              </div>
            ) : (<>
              <div style={{ marginBottom:"14px" }}>
                <label style={{ fontSize:"9px", color:T.textDim, letterSpacing:"0.15em", display:"block", marginBottom:"5px" }}>件名 *</label>
                <input value={subject} onChange={e=>setSubject(e.target.value)} maxLength={100}
                  style={{ width:"100%", background:T.bgCard, border:`1px solid ${T.border2}`, borderRadius:"3px", padding:"8px 10px", color:T.text, fontSize:"12px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }}
                  placeholder="例：タスク追加時の不具合について" />
              </div>
              <div style={{ marginBottom:"14px" }}>
                <label style={{ fontSize:"9px", color:T.textDim, letterSpacing:"0.15em", display:"block", marginBottom:"5px" }}>メールアドレス（返信先）</label>
                <input value={email} onChange={e=>setEmail(e.target.value)} type="email"
                  style={{ width:"100%", background:T.bgCard, border:`1px solid ${T.border2}`, borderRadius:"3px", padding:"8px 10px", color:T.text, fontSize:"12px", fontFamily:"inherit", outline:"none", boxSizing:"border-box" }}
                  placeholder="reply@example.com" />
              </div>
              <div style={{ marginBottom:"16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"5px" }}>
                  <label style={{ fontSize:"9px", color:T.textDim, letterSpacing:"0.15em" }}>メッセージ *</label>
                  <span style={{ fontSize:"9px", color: message.length > 180 ? "#ff6666" : T.textMuted }}>{message.length} / 200</span>
                </div>
                <textarea value={message} onChange={e=>setMessage(e.target.value)} maxLength={200} rows={5}
                  style={{ width:"100%", background:T.bgCard, border:`1px solid ${T.border2}`, borderRadius:"3px", padding:"8px 10px", color:T.text, fontSize:"12px", fontFamily:"inherit", resize:"vertical", outline:"none", boxSizing:"border-box" }}
                  placeholder="ご意見・ご要望・不具合報告など" />
              </div>
              {error && <div style={{ fontSize:"10px", color:"#ff6666", marginBottom:"12px" }}>{error}</div>}
              <div style={{ display:"flex", justifyContent:"flex-end", gap:"8px" }}>
                <button onClick={onClose} style={{ background:"transparent", border:`1px solid ${T.border2}`, color:T.textDim, padding:"8px 16px", borderRadius:"3px", cursor:"pointer", fontSize:"11px", fontFamily:"inherit" }}>キャンセル</button>
                <button onClick={handleSubmit} disabled={sending}
                  style={{ background:`${T.accent}18`, border:`1px solid ${T.accent}55`, color:T.accent, padding:"8px 20px", borderRadius:"3px", cursor:"pointer", fontSize:"11px", fontWeight:700, fontFamily:"inherit", opacity:sending?0.6:1 }}>
                  {sending ? "送信中..." : "送信"}
                </button>
              </div>
            </>)}
          </div>
        </div>
      );
    };

    // ======================================================
    // プロジェクト管理モーダル
    // ======================================================
    const ProjectModal = ({ tasks, tasksRef, projects, projectsRef, onClose, onEditTask }) => {
      const T = useT();
      const ts = () => firebase.firestore.FieldValue.serverTimestamp();
      const [selectedProjId, setSelectedProjId] = useState(projects[0]?.id || null);
      const [newProjName,   setNewProjName]   = useState('');
      const [newProjColor,  setNewProjColor]  = useState('#00aaff');
      const [showNewProj,   setShowNewProj]   = useState(false);
      const [newTaskTitle,  setNewTaskTitle]  = useState('');
      const [newTaskPri,    setNewTaskPri]    = useState('normal');
      const [addingTask,    setAddingTask]    = useState(false);
      const [addMode,       setAddMode]       = useState('new'); // 'new' | 'existing'
      const [existSearch,   setExistSearch]   = useState('');
      // ER-032: 編集中プロジェクト名
      const [editProjId,    setEditProjId]    = useState(null);
      const [editProjName,  setEditProjName]  = useState('');
      const [editProjColor, setEditProjColor] = useState('#00aaff');

      const selectedProj = projects.find(p => p.id === selectedProjId);
      const projTasks = tasks
        .filter(t => t.projectId === selectedProjId)
        .sort((a, b) => (a.projectOrder ?? 0) - (b.projectOrder ?? 0));

      const createProject = async () => {
        if (!newProjName.trim()) return;
        const ref = await projectsRef.add({ name: newProjName.trim(), color: newProjColor, createdAt: ts(), updatedAt: ts() });
        setSelectedProjId(ref.id);
        setNewProjName(''); setShowNewProj(false);
      };

      // ER-032/043: プロジェクト名・カラーインライン編集
      const saveEditProj = async () => {
        if (!editProjName.trim() || !editProjId) return;
        await projectsRef.doc(editProjId).update({ name: editProjName.trim(), color: editProjColor, updatedAt: ts() });
        setEditProjId(null); setEditProjName('');
      };

      const deleteProject = async (projId) => {
        if (!window.confirm('プロジェクトを削除しますか？（タスクは削除されません）')) return;
        await projectsRef.doc(projId).delete();
        const linked = tasks.filter(t => t.projectId === projId);
        for (const t of linked) await tasksRef.doc(t.id).update({ projectId: null, projectOrder: null, updatedAt: ts() });
        setSelectedProjId(projects.find(p => p.id !== projId)?.id || null);
      };

      const addTask = async () => {
        if (!newTaskTitle.trim() || !selectedProjId) return;
        const maxOrder = projTasks.reduce((m, t) => Math.max(m, t.projectOrder ?? 0), -1);
        const isFirst = projTasks.length === 0;
        await tasksRef.add({
          title: newTaskTitle.trim(), priority: newTaskPri,
          status: isFirst ? 'next' : 'pending',
          projectId: selectedProjId, projectOrder: maxOrder + 1,
          category: 'work', tags: [], time: '',
          stripId: `FS${String(Date.now()).slice(-4)}`,
          sortOrder: Date.now(), createdAt: ts(), updatedAt: ts(),
        });
        setNewTaskTitle(''); setAddingTask(false);
      };

      const linkExistingTask = async (taskId) => {
        const maxOrder = projTasks.reduce((m, t) => Math.max(m, t.projectOrder ?? 0), -1);
        const isFirst = projTasks.length === 0;
        await tasksRef.doc(taskId).update({
          projectId: selectedProjId,
          projectOrder: maxOrder + 1,
          // 初タスクなら next、以降は pending
          status: isFirst ? 'next' : 'pending',
          updatedAt: ts(),
        });
      };

      const removeTask = async (taskId) =>
        tasksRef.doc(taskId).update({ projectId: null, projectOrder: null, updatedAt: ts() });

      const moveTask = async (taskId, dir) => {
        const idx = projTasks.findIndex(t => t.id === taskId);
        const tIdx = dir === 'up' ? idx - 1 : idx + 1;
        if (tIdx < 0 || tIdx >= projTasks.length) return;
        const target = projTasks[tIdx];
        const myO = projTasks[idx].projectOrder ?? idx;
        const thO = target.projectOrder ?? tIdx;
        await tasksRef.doc(taskId).update({ projectOrder: thO, updatedAt: ts() });
        await tasksRef.doc(target.id).update({ projectOrder: myO, updatedAt: ts() });
      };

      const inp = { background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'6px 10px', borderRadius:'2px', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace" };
      const STATUS_COLORS = { active:'#00ff88', next:'#00ccff', delegated:'#ffaa00', pending:'#556677', completed:'#00ff88', cleared:'#00ff88', lost:'#ff6600' };

      return (
        <div style={{ position:'fixed', inset:0, zIndex:100, background:'rgba(0,0,0,0.82)', display:'flex', alignItems:'center', justifyContent:'center' }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background:T.bgModal, border:`1px solid ${T.accent}44`, borderRadius:'6px', padding:'24px', maxWidth:'700px', width:'95%', maxHeight:'85vh', display:'flex', flexDirection:'column', gap:'12px', boxShadow:`0 0 40px ${T.accent}18`, fontFamily:"'JetBrains Mono',monospace" }}>

            {/* ヘッダー */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <span style={{ color:T.accent, fontSize:'13px', fontWeight:700, letterSpacing:'0.15em' }}>◈ PROJECTS</span>
              <div style={{ display:'flex', gap:'8px' }}>
                <button onClick={() => setShowNewProj(p=>!p)} style={{ background:`${T.accent}18`, border:`1px solid ${T.accent}55`, color:T.accent, padding:'4px 12px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>+ NEW PROJECT</button>
                <button onClick={onClose} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, padding:'4px 10px', borderRadius:'2px', cursor:'pointer', fontSize:'12px' }}>✕</button>
              </div>
            </div>

            {/* 新規プロジェクト作成フォーム */}
            {showNewProj && (
              <div style={{ background:`${T.accent}08`, border:`1px solid ${T.accent}33`, borderRadius:'3px', padding:'10px', display:'flex', gap:'8px', flexWrap:'wrap', alignItems:'center' }}>
                <input value={newProjName} onChange={e => setNewProjName(e.target.value)}
                  onKeyDown={e => { if(e.key==='Enter' && !e.nativeEvent.isComposing) createProject(); if(e.key==='Escape') setShowNewProj(false); }}
                  placeholder="プロジェクト名..." autoFocus
                  style={{ ...inp, flex:'1 1 160px' }} />
                <div style={{ display:'flex', gap:'4px' }}>
                  {['#00aaff','#ff6600','#00ff88','#ff2299','#ffaa00','#cc44ff','#ff3333','#00ccaa'].map(c => (
                    <button key={c} onClick={() => setNewProjColor(c)}
                      style={{ width:'18px', height:'18px', borderRadius:'50%', background:c, border:`2px solid ${newProjColor===c?'#fff':'transparent'}`, cursor:'pointer', padding:0, flexShrink:0 }} />
                  ))}
                </div>
                <button onClick={createProject} style={{ background:`${T.accent}22`, border:`1px solid ${T.accent}66`, color:T.accent, padding:'6px 14px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>作成</button>
              </div>
            )}

            {/* メインコンテンツ */}
            <div style={{ display:'flex', gap:'16px', flex:1, minHeight:0, overflow:'hidden' }}>

              {/* 左: プロジェクト一覧 */}
              <div style={{ width:'170px', flexShrink:0, display:'flex', flexDirection:'column', gap:'4px', overflowY:'auto' }}>
                <div style={{ fontSize:'8px', color:T.textMuted, letterSpacing:'0.12em', padding:'2px 4px', marginBottom:'2px' }}>PROJECTS ({projects.length})</div>
                {projects.length === 0 && <div style={{ fontSize:'10px', color:T.textMuted, padding:'12px 4px', textAlign:'center' }}>なし</div>}
                {projects.map(proj => {
                  const ptasks = tasks.filter(t => t.projectId === proj.id);
                  const done = ptasks.filter(t => ['completed','cleared','lost'].includes(t.status)).length;
                  const isSel = proj.id === selectedProjId;
                  const pct = ptasks.length > 0 ? Math.round(done / ptasks.length * 100) : 0;
                  const isEditingProj = editProjId === proj.id;
                  return (
                    <div key={proj.id}
                      style={{ padding:'8px 10px', borderRadius:'3px', border:`1px solid ${isSel?proj.color+'66':T.border2}`, background:isSel?`${proj.color}12`:'transparent', transition:'all 0.1s' }}>
                      {isEditingProj ? (
                        <div style={{ display:'flex', flexDirection:'column', gap:'5px' }}>
                          <input value={editProjName} onChange={e => setEditProjName(e.target.value)}
                            onKeyDown={e => { if(e.key==='Enter' && !e.nativeEvent.isComposing) saveEditProj(); if(e.key==='Escape') setEditProjId(null); }}
                            autoFocus style={{ ...inp, width:'100%', boxSizing:'border-box', borderColor:editProjColor+'88' }} />
                          <div style={{ display:'flex', gap:'3px', flexWrap:'wrap' }}>
                            {['#00aaff','#ff6600','#00ff88','#ff2299','#ffaa00','#cc44ff','#ff3333','#00ccaa'].map(c => (
                              <button key={c} onClick={() => setEditProjColor(c)}
                                style={{ width:'16px', height:'16px', borderRadius:'50%', background:c, border:`2px solid ${editProjColor===c?'#fff':'transparent'}`, cursor:'pointer', padding:0, flexShrink:0 }} />
                            ))}
                          </div>
                          <div style={{ display:'flex', gap:'4px' }}>
                            <button onClick={saveEditProj} style={{ flex:1, background:`${editProjColor}22`, border:`1px solid ${editProjColor}66`, color:editProjColor, padding:'3px', borderRadius:'2px', cursor:'pointer', fontSize:'9px', fontFamily:"'JetBrains Mono',monospace", fontWeight:700 }}>保存</button>
                            <button onClick={() => setEditProjId(null)} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, padding:'3px 6px', borderRadius:'2px', cursor:'pointer', fontSize:'9px' }}>✕</button>
                          </div>
                        </div>
                      ) : (
                        <div style={{ display:'flex', alignItems:'center', gap:'6px', cursor:'pointer' }} onClick={() => setSelectedProjId(proj.id)}>
                          <span style={{ width:'8px', height:'8px', borderRadius:'50%', background:proj.color||'#00aaff', flexShrink:0 }} />
                          <span style={{ fontSize:'11px', color:isSel?T.text:T.textDim, fontWeight:isSel?700:400, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{proj.name}</span>
                          {isSel && <span onClick={e => { e.stopPropagation(); setEditProjId(proj.id); setEditProjName(proj.name); setEditProjColor(proj.color||'#00aaff'); }} title="プロジェクトを編集" style={{ fontSize:'9px', color:T.textMuted, cursor:'pointer', padding:'1px 4px', borderRadius:'2px', flexShrink:0 }}>✎</span>}
                        </div>
                      )}
                      <div style={{ marginTop:'4px', paddingLeft:'14px' }}>
                        <div style={{ height:'3px', background:T.border, borderRadius:'2px', overflow:'hidden' }}>
                          <div style={{ width:`${pct}%`, height:'100%', background:proj.color||'#00aaff', transition:'width 0.3s' }} />
                        </div>
                        <div style={{ fontSize:'8px', color:T.textMuted, marginTop:'2px' }}>{done}/{ptasks.length} 完了</div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* 右: タスクシーケンス */}
              <div style={{ flex:1, display:'flex', flexDirection:'column', gap:'8px', overflowY:'auto', minWidth:0 }}>
                {!selectedProj ? (
                  <div style={{ fontSize:'11px', color:T.textMuted, textAlign:'center', marginTop:'32px' }}>
                    プロジェクトを選択または作成してください
                  </div>
                ) : (
                  <>
                    {/* プロジェクトヘッダー */}
                    <div style={{ display:'flex', alignItems:'center', gap:'8px', paddingBottom:'8px', borderBottom:`1px solid ${T.border2}`, flexShrink:0 }}>
                      <span style={{ width:'10px', height:'10px', borderRadius:'50%', background:selectedProj.color||'#00aaff', flexShrink:0 }} />
                      <span style={{ fontSize:'13px', color:T.text, fontWeight:700 }}>{selectedProj.name}</span>
                      <span style={{ fontSize:'9px', color:T.textDim }}>— {projTasks.length}タスク シーケンス</span>
                      <div style={{ flex:1 }} />
                      <button onClick={() => deleteProject(selectedProjId)} style={{ background:'rgba(255,50,50,0.1)', border:'1px solid rgba(255,50,50,0.3)', color:'#ff8888', padding:'2px 8px', borderRadius:'2px', cursor:'pointer', fontSize:'9px', fontFamily:"'JetBrains Mono',monospace" }}>削除</button>
                    </div>

                    {/* シーケンス説明 */}
                    <div style={{ fontSize:'9px', color:T.textMuted, padding:'4px 0' }}>
                      ▶ 現在のタスクが完了すると、次のタスクが自動的に NEXT ACTION に移動します
                    </div>

                    {/* タスクシーケンスリスト */}
                    <div style={{ display:'flex', flexDirection:'column', gap:'4px' }}>
                      {projTasks.map((task, idx) => {
                        const pri = PRIORITIES[task.priority] || PRIORITIES.normal;
                        const isDone = ['completed','cleared','lost'].includes(task.status);
                        const isCurrent = !isDone && projTasks.slice(0, idx).every(t => ['completed','cleared','lost'].includes(t.status));
                        const isFuture = !isDone && !isCurrent;
                        return (
                          <div key={task.id}>
                            {/* シーケンス矢印 */}
                            {idx > 0 && (
                              <div style={{ textAlign:'center', fontSize:'9px', color:T.border, padding:'1px 0' }}>↓</div>
                            )}
                            <div style={{ display:'flex', alignItems:'center', gap:'8px', padding:'6px 8px', borderRadius:'3px', background:isCurrent?`${pri.bg}`:isFuture?'transparent':'transparent', border:`1px solid ${isCurrent?pri.border:isDone?T.border2+'66':T.border2}`, opacity:isDone?0.5:1 }}>
                              <span style={{ fontSize:'10px', color:T.textMuted, minWidth:'18px', textAlign:'right', fontWeight:700 }}>{idx+1}</span>
                              <span style={{ fontSize:'10px', minWidth:'16px' }}>
                                {isCurrent ? '▶' : isDone ? '✓' : '○'}
                              </span>
                              <span style={{ flex:1, fontSize:'11px', color:isDone?T.textDim:T.text, textDecoration:isDone?'line-through':'none', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{task.title}</span>
                              <span style={{ fontSize:'8px', color:pri.color, padding:'1px 4px', border:`1px solid ${pri.color}44`, borderRadius:'2px', flexShrink:0 }}>{pri.label}</span>
                              <span style={{ fontSize:'8px', color:STATUS_COLORS[task.status]||T.textMuted, flexShrink:0 }}>{task.status}</span>
                              <div style={{ display:'flex', gap:'2px', flexShrink:0 }}>
                                {/* ER-029: 編集ボタン */}
                                {onEditTask && <button onClick={() => { onEditTask(task.id); }} title="編集"
                                  style={{ background:'transparent', border:`1px solid ${T.accent}44`, color:T.accent, padding:'1px 5px', borderRadius:'2px', cursor:'pointer', fontSize:'9px' }}>✎</button>}
                                <button onClick={() => moveTask(task.id, 'up')} disabled={idx===0} title="上へ"
                                  style={{ background:'transparent', border:`1px solid ${T.border2}`, color:idx===0?T.textMuted:T.textDim, padding:'1px 5px', borderRadius:'2px', cursor:idx===0?'default':'pointer', fontSize:'9px' }}>↑</button>
                                <button onClick={() => moveTask(task.id, 'down')} disabled={idx===projTasks.length-1} title="下へ"
                                  style={{ background:'transparent', border:`1px solid ${T.border2}`, color:idx===projTasks.length-1?T.textMuted:T.textDim, padding:'1px 5px', borderRadius:'2px', cursor:idx===projTasks.length-1?'default':'pointer', fontSize:'9px' }}>↓</button>
                                <button onClick={() => removeTask(task.id)} title="プロジェクトから外す"
                                  style={{ background:'rgba(255,50,50,0.1)', border:'1px solid rgba(255,50,50,0.25)', color:'#ff8888', padding:'1px 5px', borderRadius:'2px', cursor:'pointer', fontSize:'9px' }}>✕</button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                      {projTasks.length === 0 && (
                        <div style={{ textAlign:'center', padding:'20px', fontSize:'10px', color:T.textMuted, border:`1px dashed ${T.border}`, borderRadius:'3px' }}>
                          タスクを追加してください
                        </div>
                      )}
                    </div>

                    {/* タスク追加パネル */}
                    {addingTask ? (
                      <div style={{ border:`1px solid ${T.accent}33`, borderRadius:'3px', background:`${T.accent}06`, flexShrink:0, overflow:'hidden' }}>
                        {/* モード切替タブ */}
                        <div style={{ display:'flex', borderBottom:`1px solid ${T.accent}22` }}>
                          {[{id:'new',label:'＋ 新規作成'},{id:'existing',label:'📋 既存から選ぶ'}].map(m => (
                            <button key={m.id} onClick={() => setAddMode(m.id)}
                              style={{ flex:1, padding:'6px', background:addMode===m.id?`${T.accent}18`:'transparent', border:'none', borderBottom:addMode===m.id?`2px solid ${T.accent}`:'2px solid transparent', color:addMode===m.id?T.accent:T.textDim, fontSize:'10px', fontWeight:addMode===m.id?700:400, cursor:'pointer', fontFamily:"'JetBrains Mono',monospace", transition:'all 0.1s' }}>
                              {m.label}
                            </button>
                          ))}
                          <button onClick={() => { setAddingTask(false); setExistSearch(''); }}
                            style={{ padding:'6px 10px', background:'transparent', border:'none', color:T.textDim, cursor:'pointer', fontSize:'12px' }}>✕</button>
                        </div>

                        {addMode === 'new' ? (
                          /* 新規作成フォーム */
                          <div style={{ display:'flex', gap:'6px', alignItems:'center', flexWrap:'wrap', padding:'8px' }}>
                            <input value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)}
                              onKeyDown={e => { if(e.key==='Enter' && !e.nativeEvent.isComposing) addTask(); if(e.key==='Escape') setAddingTask(false); }}
                              placeholder="タスク名..." autoFocus
                              style={{ ...inp, flex:'1 1 140px' }} />
                            <select value={newTaskPri} onChange={e => setNewTaskPri(e.target.value)}
                              style={{ ...inp, cursor:'pointer' }}>
                              <option value="high">🔴 URG</option>
                              <option value="normal">🟢 NRM</option>
                              <option value="low">⚫ LOW</option>
                            </select>
                            <button onClick={addTask} style={{ background:`${T.accent}22`, border:`1px solid ${T.accent}66`, color:T.accent, padding:'6px 12px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>追加 ↵</button>
                          </div>
                        ) : (
                          /* 既存タスク選択 */
                          <div style={{ padding:'8px', display:'flex', flexDirection:'column', gap:'6px' }}>
                            <input value={existSearch} onChange={e => setExistSearch(e.target.value)}
                              placeholder="タスク名で絞り込み..." autoFocus
                              style={{ ...inp, width:'100%', boxSizing:'border-box' }} />
                            <div style={{ maxHeight:'160px', overflowY:'auto', display:'flex', flexDirection:'column', gap:'3px' }}>
                              {(() => {
                                const available = tasks.filter(t =>
                                  !t.projectId &&
                                  !['completed','cleared','lost'].includes(t.status) &&
                                  (existSearch === '' || t.title.toLowerCase().includes(existSearch.toLowerCase()))
                                );
                                if (available.length === 0) return (
                                  <div style={{ textAlign:'center', fontSize:'10px', color:T.textMuted, padding:'12px' }}>
                                    {existSearch ? '該当なし' : '追加できる既存タスクがありません'}
                                  </div>
                                );
                                return available.map(t => {
                                  const pri = PRIORITIES[t.priority] || PRIORITIES.normal;
                                  return (
                                    <div key={t.id} onClick={() => { linkExistingTask(t.id); setExistSearch(''); }}
                                      style={{ display:'flex', alignItems:'center', gap:'8px', padding:'5px 8px', borderRadius:'2px', border:`1px solid ${T.border2}`, cursor:'pointer', background:'transparent', transition:'background 0.1s' }}
                                      onMouseEnter={e => e.currentTarget.style.background=`${T.accent}14`}
                                      onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                                      <span style={{ fontSize:'9px', color:pri.color, fontWeight:700, padding:'1px 4px', border:`1px solid ${pri.color}44`, borderRadius:'2px', flexShrink:0 }}>{pri.label}</span>
                                      <span style={{ flex:1, fontSize:'11px', color:T.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.title}</span>
                                      <span style={{ fontSize:'8px', color:T.textMuted, flexShrink:0 }}>{t.status}</span>
                                      <span style={{ fontSize:'9px', color:T.accent, flexShrink:0 }}>＋</span>
                                    </div>
                                  );
                                });
                              })()}
                            </div>
                          </div>
                        )}
                      </div>
                    ) : (
                      <button onClick={() => { setAddingTask(true); setAddMode('new'); }}
                        style={{ background:`${selectedProj?.color||'#00aaff'}12`, border:`1px dashed ${selectedProj?.color||'#00aaff'}66`, color:selectedProj?.color||'#00aaff', padding:'10px', borderRadius:'3px', cursor:'pointer', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace", width:'100%', flexShrink:0, fontWeight:700, letterSpacing:'0.05em', transition:'all 0.15s' }}
                        onMouseEnter={e => e.currentTarget.style.background=`${selectedProj?.color||'#00aaff'}22`}
                        onMouseLeave={e => e.currentTarget.style.background=`${selectedProj?.color||'#00aaff'}12`}>
                        ＋ タスクを追加 / 既存タスクを追加
                      </button>
                    )}
                  </>
                )}
              </div>

            </div>
          </div>
        </div>
      );
    };

    // ======================================================
    // ER-0060: ルーティンモーダル
    // ======================================================
    const RoutineModal = ({ tasks, tasksRef, projectsRef, onClose }) => {
      const T = useT();
      const ts = () => firebase.firestore.FieldValue.serverTimestamp();
      const todayStr = new Date().toISOString().slice(0, 10);

      // ルーティン一覧（projectsRefのtype:'routine'のもの）
      const [routines, setRoutines] = useState([]);
      const [selectedRoutineId, setSelectedRoutineId] = useState(null);
      const [showNewForm, setShowNewForm] = useState(false);
      const [newName, setNewName] = useState('');
      const [newColor, setNewColor] = useState('#ffaa00');
      const [newStepTitle, setNewStepTitle] = useState('');
      const [newStepPri, setNewStepPri] = useState('normal');
      const [addingStep, setAddingStep] = useState(false);
      const [generatingMsg, setGeneratingMsg] = useState('');

      // Firestore からルーティン読み込み
      useEffect(() => {
        const unsub = projectsRef.where('type','==','routine').onSnapshot(snap => {
          const list = snap.docs.map(d => ({ id:d.id, ...d.data() }));
          setRoutines(list);
          if (list.length > 0 && !selectedRoutineId) setSelectedRoutineId(list[0].id);
        });
        return unsub;
      }, [projectsRef]); // eslint-disable-line

      const selectedRoutine = routines.find(r => r.id === selectedRoutineId);
      // ルーティンのステップ（tasks内のroutineId一致）
      const routineSteps = tasks
        .filter(t => t.routineId === selectedRoutineId && t.isRoutineTemplate)
        .sort((a,b) => (a.routineOrder??0)-(b.routineOrder??0));

      const createRoutine = async () => {
        if (!newName.trim()) return;
        const ref = await projectsRef.add({ name:newName.trim(), color:newColor, type:'routine', createdAt:ts(), updatedAt:ts() });
        setSelectedRoutineId(ref.id);
        setNewName(''); setShowNewForm(false);
      };

      const deleteRoutine = async (id) => {
        if (!window.confirm('ルーティンを削除しますか？')) return;
        await projectsRef.doc(id).delete();
        // テンプレートタスクも削除
        const tmpl = tasks.filter(t => t.routineId === id && t.isRoutineTemplate);
        for (const t of tmpl) await tasksRef.doc(t.id).delete();
        setSelectedRoutineId(routines.find(r => r.id !== id)?.id || null);
      };

      const addStep = async () => {
        if (!newStepTitle.trim() || !selectedRoutineId) return;
        const maxOrder = routineSteps.reduce((m,t) => Math.max(m, t.routineOrder??0), -1);
        await tasksRef.add({
          title: newStepTitle.trim(), priority: newStepPri,
          status: 'pending', category: 'work', tags: [], time: '',
          stripId: `RT${String(Date.now()).slice(-4)}`,
          routineId: selectedRoutineId, routineOrder: maxOrder + 1,
          isRoutineTemplate: true,
          sortOrder: Date.now(), createdAt: ts(), updatedAt: ts(),
        });
        setNewStepTitle(''); setAddingStep(false);
      };

      const removeStep = async (taskId) =>
        tasksRef.doc(taskId).update({ routineId: null, isRoutineTemplate: false, updatedAt: ts() });

      const moveStep = async (taskId, dir) => {
        const idx = routineSteps.findIndex(t => t.id === taskId);
        const tIdx = dir === 'up' ? idx - 1 : idx + 1;
        if (tIdx < 0 || tIdx >= routineSteps.length) return;
        const target = routineSteps[tIdx];
        const myO = routineSteps[idx].routineOrder ?? idx;
        const thO = target.routineOrder ?? tIdx;
        await tasksRef.doc(taskId).update({ routineOrder: thO, updatedAt: ts() });
        await tasksRef.doc(target.id).update({ routineOrder: myO, updatedAt: ts() });
      };

      // 今日のルーティンを開始（1枚のルーティンストリップを作成）
      const startToday = async () => {
        if (!selectedRoutineId || routineSteps.length === 0) return;
        const key = `fst_routine_ran_${selectedRoutineId}_${todayStr}`;
        if (localStorage.getItem(key)) {
          setGeneratingMsg('今日はすでに作成済みです');
          setTimeout(() => setGeneratingMsg(''), 2500);
          return;
        }
        const steps = routineSteps.map((step, i) => ({
          id: `step_${i}_${Date.now()}`,
          text: step.title || step.text || String(step),
          checked: false,
        }));
        await tasksRef.add({
          title: selectedRoutine.name,
          status: 'next',
          priority: 'normal',
          category: '',
          tags: [],
          time: '',
          stripId: `RT${String(Date.now()).slice(-4)}`,
          isRoutine: true,
          routineId: selectedRoutineId,
          routineSteps: steps,
          sortOrder: Date.now(),
          createdAt: ts(), updatedAt: ts(),
        });
        localStorage.setItem(key, '1');
        setGeneratingMsg(`✓「${selectedRoutine.name}」のルーティンを開始しました`);
        setTimeout(() => setGeneratingMsg(''), 3000);
      };

      const inp = { background:T.bgInput, border:`1px solid ${T.border2}`, color:T.text, padding:'6px 10px', borderRadius:'2px', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace" };
      const alreadyRan = selectedRoutineId && !!localStorage.getItem(`fst_routine_ran_${selectedRoutineId}_${todayStr}`);

      return (
        <div style={{ position:'fixed', inset:0, zIndex:100, background:'rgba(0,0,0,0.82)', display:'flex', alignItems:'center', justifyContent:'center' }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background:T.bgModal, border:`1px solid ${T.accent}44`, borderRadius:'6px', padding:'24px', maxWidth:'680px', width:'95%', maxHeight:'85vh', display:'flex', flexDirection:'column', gap:'12px', boxShadow:`0 0 40px ${T.accent}18`, fontFamily:"'JetBrains Mono',monospace" }}>

            {/* ヘッダー */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <span style={{ color:'#ffaa00', fontSize:'13px', fontWeight:700, letterSpacing:'0.15em' }}>🔄 ROUTINES</span>
              <div style={{ display:'flex', gap:'8px' }}>
                <button onClick={() => setShowNewForm(p=>!p)} style={{ background:'rgba(255,170,0,0.18)', border:'1px solid rgba(255,170,0,0.5)', color:'#ffaa00', padding:'4px 12px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>+ NEW ROUTINE</button>
                <button onClick={onClose} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, padding:'4px 10px', borderRadius:'2px', cursor:'pointer', fontSize:'12px' }}>✕</button>
              </div>
            </div>

            {/* 新規ルーティン作成フォーム */}
            {showNewForm && (
              <div style={{ background:'rgba(255,170,0,0.06)', border:'1px solid rgba(255,170,0,0.3)', borderRadius:'3px', padding:'10px', display:'flex', gap:'8px', flexWrap:'wrap', alignItems:'center' }}>
                <input value={newName} onChange={e => setNewName(e.target.value)}
                  onKeyDown={e => { if(e.key==='Enter' && !e.nativeEvent.isComposing) createRoutine(); if(e.key==='Escape') setShowNewForm(false); }}
                  placeholder="ルーティン名（例: 朝のルーティン）..." autoFocus
                  style={{ ...inp, flex:'1 1 160px' }} />
                <div style={{ display:'flex', gap:'4px' }}>
                  {['#ffaa00','#ff6600','#00ff88','#ff2299','#00aaff','#cc44ff','#ff3333','#00ccaa'].map(c => (
                    <button key={c} onClick={() => setNewColor(c)}
                      style={{ width:'18px', height:'18px', borderRadius:'50%', background:c, border:`2px solid ${newColor===c?'#fff':'transparent'}`, cursor:'pointer', padding:0, flexShrink:0 }} />
                  ))}
                </div>
                <button onClick={createRoutine} style={{ background:'rgba(255,170,0,0.22)', border:'1px solid rgba(255,170,0,0.6)', color:'#ffaa00', padding:'6px 14px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>作成</button>
              </div>
            )}

            {/* メインコンテンツ */}
            <div style={{ display:'flex', gap:'16px', flex:1, minHeight:0, overflow:'hidden' }}>

              {/* 左: ルーティン一覧 */}
              <div style={{ width:'170px', flexShrink:0, display:'flex', flexDirection:'column', gap:'4px', overflowY:'auto' }}>
                <div style={{ fontSize:'8px', color:T.textMuted, letterSpacing:'0.12em', padding:'2px 4px', marginBottom:'2px' }}>ROUTINES ({routines.length})</div>
                {routines.length === 0 && <div style={{ fontSize:'10px', color:T.textMuted, padding:'12px 4px', textAlign:'center' }}>なし</div>}
                {routines.map(r => {
                  const isSel = r.id === selectedRoutineId;
                  const ranToday = !!localStorage.getItem(`fst_routine_ran_${r.id}_${todayStr}`);
                  return (
                    <div key={r.id} onClick={() => setSelectedRoutineId(r.id)}
                      style={{ padding:'8px 10px', borderRadius:'3px', border:`1px solid ${isSel?r.color+'66':T.border2}`, background:isSel?`${r.color}12`:'transparent', cursor:'pointer', transition:'all 0.1s' }}>
                      <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                        <span style={{ width:'8px', height:'8px', borderRadius:'50%', background:r.color||'#ffaa00', flexShrink:0 }} />
                        <span style={{ fontSize:'11px', color:isSel?T.text:T.textDim, fontWeight:isSel?700:400, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.name}</span>
                      </div>
                      {ranToday && <div style={{ fontSize:'8px', color:'#00ff88', marginTop:'3px', paddingLeft:'14px' }}>✓ 今日実施済み</div>}
                    </div>
                  );
                })}
              </div>

              {/* 右: ステップ管理 */}
              <div style={{ flex:1, display:'flex', flexDirection:'column', gap:'8px', overflowY:'auto', minWidth:0 }}>
                {!selectedRoutine ? (
                  <div style={{ fontSize:'11px', color:T.textMuted, textAlign:'center', marginTop:'32px' }}>ルーティンを選択または作成してください</div>
                ) : (
                  <>
                    {/* ルーティンヘッダー */}
                    <div style={{ display:'flex', alignItems:'center', gap:'8px', paddingBottom:'8px', borderBottom:`1px solid ${T.border2}`, flexShrink:0 }}>
                      <span style={{ width:'10px', height:'10px', borderRadius:'50%', background:selectedRoutine.color||'#ffaa00', flexShrink:0 }} />
                      <span style={{ fontSize:'13px', color:T.text, fontWeight:700 }}>{selectedRoutine.name}</span>
                      <span style={{ fontSize:'9px', color:T.textDim }}>— {routineSteps.length}ステップ</span>
                      <div style={{ flex:1 }} />
                      <button onClick={() => deleteRoutine(selectedRoutineId)} style={{ background:'rgba(255,50,50,0.1)', border:'1px solid rgba(255,50,50,0.3)', color:'#ff8888', padding:'2px 8px', borderRadius:'2px', cursor:'pointer', fontSize:'9px', fontFamily:"'JetBrains Mono',monospace" }}>削除</button>
                    </div>

                    {/* 今日を開始ボタン */}
                    <div style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px', background:alreadyRan?'rgba(0,255,136,0.06)':'rgba(255,170,0,0.08)', border:`1px solid ${alreadyRan?'rgba(0,255,136,0.3)':'rgba(255,170,0,0.3)'}`, borderRadius:'3px', flexShrink:0 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:'11px', color:alreadyRan?'#00ff88':'#ffaa00', fontWeight:700 }}>
                          {alreadyRan ? '✓ 今日はすでに実施済みです' : `🔄 今日のルーティンを開始（${routineSteps.length}ステップ）`}
                        </div>
                        <div style={{ fontSize:'9px', color:T.textMuted, marginTop:'2px' }}>1枚のストリップを NEXT に追加します（クリックでチェックリスト展開）</div>
                      </div>
                      {!alreadyRan && (
                        <button onClick={startToday} style={{ background:'rgba(255,170,0,0.22)', border:'1px solid rgba(255,170,0,0.6)', color:'#ffaa00', padding:'6px 14px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace", whiteSpace:'nowrap' }}>今日を開始 ▶</button>
                      )}
                    </div>
                    {generatingMsg && (
                      <div style={{ fontSize:'11px', color:'#00ff88', textAlign:'center', padding:'4px', background:'rgba(0,255,136,0.08)', borderRadius:'3px' }}>{generatingMsg}</div>
                    )}

                    {/* ステップリスト */}
                    <div style={{ display:'flex', flexDirection:'column', gap:'4px' }}>
                      <div style={{ fontSize:'9px', color:T.textMuted, padding:'2px 0' }}>ステップ（順不同で実施可能）</div>
                      {routineSteps.map((step, idx) => {
                        const pri = PRIORITIES[step.priority] || PRIORITIES.normal;
                        return (
                          <div key={step.id} style={{ display:'flex', alignItems:'center', gap:'8px', padding:'6px 8px', borderRadius:'3px', border:`1px solid ${T.border2}`, background:'transparent' }}>
                            <span style={{ fontSize:'10px', color:T.textMuted, minWidth:'18px', textAlign:'right', fontWeight:700 }}>{idx+1}</span>
                            <span style={{ flex:1, fontSize:'11px', color:T.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{step.title}</span>
                            <span style={{ fontSize:'8px', color:pri.color, padding:'1px 4px', border:`1px solid ${pri.color}44`, borderRadius:'2px', flexShrink:0 }}>{pri.label}</span>
                            <div style={{ display:'flex', gap:'2px', flexShrink:0 }}>
                              <button onClick={() => moveStep(step.id,'up')} disabled={idx===0} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:idx===0?T.textMuted:T.textDim, padding:'1px 5px', borderRadius:'2px', cursor:idx===0?'default':'pointer', fontSize:'9px' }}>↑</button>
                              <button onClick={() => moveStep(step.id,'down')} disabled={idx===routineSteps.length-1} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:idx===routineSteps.length-1?T.textMuted:T.textDim, padding:'1px 5px', borderRadius:'2px', cursor:idx===routineSteps.length-1?'default':'pointer', fontSize:'9px' }}>↓</button>
                              <button onClick={() => removeStep(step.id)} style={{ background:'rgba(255,50,50,0.1)', border:'1px solid rgba(255,50,50,0.25)', color:'#ff8888', padding:'1px 5px', borderRadius:'2px', cursor:'pointer', fontSize:'9px' }}>✕</button>
                            </div>
                          </div>
                        );
                      })}
                      {routineSteps.length === 0 && (
                        <div style={{ textAlign:'center', padding:'20px', fontSize:'10px', color:T.textMuted, border:`1px dashed ${T.border}`, borderRadius:'3px' }}>ステップを追加してください</div>
                      )}
                    </div>

                    {/* ステップ追加 */}
                    {addingStep ? (
                      <div style={{ display:'flex', gap:'6px', alignItems:'center', flexWrap:'wrap', padding:'8px', border:`1px solid rgba(255,170,0,0.3)`, borderRadius:'3px', background:'rgba(255,170,0,0.06)', flexShrink:0 }}>
                        <input value={newStepTitle} onChange={e => setNewStepTitle(e.target.value)}
                          onKeyDown={e => { if(e.key==='Enter' && !e.nativeEvent.isComposing) addStep(); if(e.key==='Escape') setAddingStep(false); }}
                          placeholder="ステップ名..." autoFocus
                          style={{ ...inp, flex:'1 1 140px' }} />
                        <select value={newStepPri} onChange={e => setNewStepPri(e.target.value)} style={{ ...inp, cursor:'pointer' }}>
                          <option value="high">🔴 URG</option>
                          <option value="normal">🟢 NRM</option>
                          <option value="low">⚫ LOW</option>
                        </select>
                        <button onClick={addStep} style={{ background:'rgba(255,170,0,0.22)', border:'1px solid rgba(255,170,0,0.6)', color:'#ffaa00', padding:'6px 12px', borderRadius:'2px', cursor:'pointer', fontSize:'10px', fontWeight:700, fontFamily:"'JetBrains Mono',monospace" }}>追加 ↵</button>
                        <button onClick={() => setAddingStep(false)} style={{ background:'transparent', border:`1px solid ${T.border2}`, color:T.textDim, padding:'6px 8px', borderRadius:'2px', cursor:'pointer', fontSize:'10px' }}>✕</button>
                      </div>
                    ) : (
                      <button onClick={() => setAddingStep(true)}
                        style={{ background:'rgba(255,170,0,0.08)', border:'1px dashed rgba(255,170,0,0.5)', color:'#ffaa00', padding:'10px', borderRadius:'3px', cursor:'pointer', fontSize:'11px', fontFamily:"'JetBrains Mono',monospace", width:'100%', flexShrink:0, fontWeight:700, letterSpacing:'0.05em' }}>
                        ＋ ステップを追加
                      </button>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ======================================================
    // メインアプリ（Firestoreリアルタイム同期）
    // ======================================================
    function FlightStripTodo({ user, themeId, setTheme }) {
      const T = useT();
      const isMobile = useIsMobile();
      const [tasks,          setTasks]          = useState([]);
      const [loading,        setLoading]        = useState(true);
      const [draggedId,      setDraggedId]      = useState(null);
      const [dropState,      setDropState]      = useState(null); // { id, pos }
      const dropStateRef = useRef(null);
      const [showForm,       setShowForm]       = useState(false);
      const [showHelp,       setShowHelp]       = useState(false);
      const [showRelease,    setShowRelease]    = useState(false);
      const [showFeedback,   setShowFeedback]   = useState(false);
      const [viewMode,       setViewMode]       = useState("hybrid");
      const [filterPriority, setFilterPriority] = useState("all");
      const [filterCategory, setFilterCategory] = useState("all");
      const [columnSort, setColumnSort] = useState("manual"); // manual | deadline | priority | time | stripId
      const [columnSortDir, setColumnSortDir] = useState("asc"); // asc | desc
      const [selectedId,     setSelectedId]     = useState(null);
      const [editTaskId,     setEditTaskId]     = useState(null);
      const [syncStatus,     setSyncStatus]     = useState("connecting");
      // activeTimer はタスクの timerRunning / timerStartedAt から導出（Firestore同期）
