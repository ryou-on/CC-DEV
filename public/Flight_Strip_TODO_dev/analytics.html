<script id="jsx-source" type="text/plain">
  const { useState, useEffect, useMemo } = React;
  const auth = window._auth;
  const db   = window._db;

  const ACC    = '#00ff88';
  const STABLE = '#00ff88'; // 安定版カラー（緑）
  const DEV    = '#ffaa44'; // 開発版カラー（アンバー）
  const BG     = '#060a18';
  const BORDER = '#1a2540';
  const TEXT   = '#ddeeff';
  const DIM    = '#556677';
  const BGCARD = 'rgba(10,15,30,0.5)';

  const DOW_LABELS = ['日','月','火','水','木','金','土'];
  const DOW_COLORS = ['#ff6688','#00aaff','#00aaff','#00aaff','#00aaff','#00aaff','#ff6688'];

  // ── ログイン画面 ──────────────────────────────
  const Login = () => {
    const [loading, setLoading] = useState(false);
    const login = async () => {
      setLoading(true);
      try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
      catch(e) { setLoading(false); }
    };
    return (
      <div style={{ minHeight:'100vh', background:'linear-gradient(180deg,#060a18,#0a1020)', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ background:'rgba(10,15,35,0.97)', border:`1px solid ${ACC}33`, borderRadius:'8px', padding:'48px 40px', textAlign:'center', maxWidth:'340px', width:'90%' }}>
          <div style={{ fontSize:'22px', fontWeight:800, color:ACC, letterSpacing:'0.15em', marginBottom:'4px' }}>◈ ANALYTICS</div>
          <div style={{ fontSize:'9px', color:DIM, letterSpacing:'0.3em', marginBottom:'36px' }}>FLIGHT STRIP TODO</div>
          <button onClick={login} disabled={loading} style={{ width:'100%', background:`${ACC}18`, border:`1px solid ${ACC}55`, color:ACC, padding:'12px', borderRadius:'4px', cursor:'pointer', fontSize:'11px', fontWeight:700, letterSpacing:'0.1em', fontFamily:'inherit' }}>
            {loading ? '...' : 'G SIGN IN WITH GOOGLE'}
          </button>
        </div>
      </div>
    );
  };

  // ── カードコンポーネント ──────────────────────
  const Card = ({ children, style={} }) => (
    <div style={{ background:BGCARD, border:`1px solid ${BORDER}`, borderRadius:'6px', padding:'16px', ...style }}>
      {children}
    </div>
  );

  const SectionTitle = ({ children }) => (
    <div style={{ fontSize:'9px', color:ACC, fontWeight:700, letterSpacing:'0.2em', marginBottom:'12px', paddingBottom:'6px', borderBottom:`1px solid ${BORDER}` }}>
      {children}
    </div>
  );

  // ── 単色棒グラフ ──────────────────────────────
  const BarChart = ({ data, labelKey, valueKey, color=ACC, height=120, showValue=true }) => {
    const max = Math.max(1, ...data.map(d => d[valueKey]));
    return (
      <div style={{ display:'flex', alignItems:'flex-end', gap:'3px', height:`${height}px` }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', height:'100%', justifyContent:'flex-end', gap:'2px' }}>
            {showValue && d[valueKey] > 0 && (
              <span style={{ fontSize:'7px', color:DIM }}>{d[valueKey]}</span>
            )}
            <div style={{ width:'100%', background:`${color}33`, borderRadius:'2px 2px 0 0', position:'relative', height:`${Math.max(2, d[valueKey]/max*100)}%`, transition:'height 0.3s' }}>
              <div style={{ position:'absolute', inset:0, background:color, opacity:0.7, borderRadius:'2px 2px 0 0' }} />
            </div>
            <span style={{ fontSize:'7px', color:DIM, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:'100%', textAlign:'center' }}>{d[labelKey]}</span>
          </div>
        ))}
      </div>
    );
  };

  // ── 2色積み上げ棒グラフ（安定版＋開発版）──────
  const BarChartDual = ({ data, labelKey, stableKey, devKey, height=120 }) => {
    const max = Math.max(1, ...data.map(d => (d[stableKey]||0) + (d[devKey]||0)));
    return (
      <div style={{ display:'flex', alignItems:'flex-end', gap:'2px', height:`${height}px` }}>
        {data.map((d, i) => {
          const sv = d[stableKey]||0;
          const dv = d[devKey]||0;
          const total = sv + dv;
          const totalPct = Math.max(total>0?2:0, total/max*100);
          const sPct = total > 0 ? sv/total*100 : 0;
          const dPct = total > 0 ? dv/total*100 : 0;
          return (
            <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', height:'100%', justifyContent:'flex-end', gap:'2px' }}>
              <div title={`安定版:${sv} / 開発版:${dv}`}
                style={{ width:'100%', height:`${totalPct}%`, display:'flex', flexDirection:'column', borderRadius:'2px 2px 0 0', overflow:'hidden' }}>
                {dv > 0 && <div style={{ flex:`${dPct} 0 0`, background:DEV, opacity:0.8 }} />}
                {sv > 0 && <div style={{ flex:`${sPct} 0 0`, background:STABLE, opacity:0.75 }} />}
              </div>
              <span style={{ fontSize:'7px', color:DIM, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:'100%', textAlign:'center' }}>{d[labelKey]}</span>
            </div>
          );
        })}
      </div>
    );
  };

  // ── ヒートマップ ──────────────────────────────
  const Heatmap = ({ data, maxVal, color='0,255,136' }) => {
    const max = maxVal || Math.max(1, ...data.flat());
    return (
      <div>
        <div style={{ display:'flex', marginLeft:'24px', marginBottom:'2px' }}>
          {Array.from({length:24},(_,h)=>(
            <div key={h} style={{ flex:1, fontSize:'6px', color:DIM, textAlign:'center' }}>
              {h%3===0?String(h).padStart(2,'0'):''}
            </div>
          ))}
        </div>
        {data.map((row, dow) => (
          <div key={dow} style={{ display:'flex', alignItems:'center', marginBottom:'2px' }}>
            <span style={{ width:'20px', fontSize:'8px', color:DOW_COLORS[dow], flexShrink:0, textAlign:'right', marginRight:'4px' }}>{DOW_LABELS[dow]}</span>
            {row.map((val, h) => {
              const intensity = val / max;
              const alpha = Math.min(0.95, 0.05 + intensity * 0.9);
              return (
                <div key={h} title={`${DOW_LABELS[dow]} ${h}時: ${val}セッション`}
                  style={{ flex:1, height:'14px', background:`rgba(${color},${alpha})`, borderRadius:'1px', margin:'0 1px', cursor:'default' }}
                />
              );
            })}
          </div>
        ))}
        <div style={{ display:'flex', alignItems:'center', gap:'4px', marginTop:'6px', justifyContent:'flex-end' }}>
          <span style={{ fontSize:'7px', color:DIM }}>少</span>
          {[0.05,0.25,0.5,0.75,0.95].map((a,i) => (
            <div key={i} style={{ width:'12px', height:'8px', background:`rgba(${color},${a})`, borderRadius:'1px' }} />
          ))}
          <span style={{ fontSize:'7px', color:DIM }}>多</span>
        </div>
      </div>
    );
  };

  // ── メトリクスカード ──────────────────────────
  const Metric = ({ label, value, sub, color=ACC }) => (
    <div style={{ background:BGCARD, border:`1px solid ${BORDER}`, borderRadius:'6px', padding:'14px 18px', textAlign:'center' }}>
      <div style={{ fontSize:'28px', fontWeight:800, color, lineHeight:1, letterSpacing:'-0.02em' }}>{value}</div>
      <div style={{ fontSize:'10px', color:TEXT, marginTop:'4px', fontWeight:600 }}>{label}</div>
      {sub && <div style={{ fontSize:'8px', color:DIM, marginTop:'2px' }}>{sub}</div>}
    </div>
  );

  // ── 凡例（両方モード用） ──────────────────────
  const DualLegend = () => (
    <div style={{ display:'flex', gap:'12px', marginBottom:'8px', justifyContent:'flex-end' }}>
      <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
        <div style={{ width:'10px', height:'10px', background:STABLE, borderRadius:'2px', opacity:0.8 }} />
        <span style={{ fontSize:'8px', color:DIM }}>安定版</span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
        <div style={{ width:'10px', height:'10px', background:DEV, borderRadius:'2px', opacity:0.8 }} />
        <span style={{ fontSize:'8px', color:DIM }}>開発版</span>
      </div>
    </div>
  );

  // ── フィードバック受信箱 ──────────────────────
  const Inbox = () => {
    const [feedbacks, setFeedbacks] = useState([]);
    const [loading,   setLoading]   = useState(true);

    useEffect(() => {
      db.collection('fst_feedback')
        .orderBy('createdAt', 'desc')
        .limit(200)
        .get()
        .then(snap => {
          setFeedbacks(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          setLoading(false);
        })
        .catch(() => setLoading(false));
    }, []);

    const markRead = async (fbId) => {
      await db.collection('fst_feedback').doc(fbId).update({ status: 'read' });
      setFeedbacks(prev => prev.map(f => f.fbId === fbId ? { ...f, status: 'read' } : f));
    };

    const unreadCount = feedbacks.filter(f => f.status === 'new').length;

    if (loading) return <div style={{ textAlign:'center', padding:'40px', color:DIM, fontSize:'11px' }}>読み込み中...</div>;

    return (
      <div>
        <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'16px', paddingBottom:'10px', borderBottom:`1px solid ${BORDER}` }}>
          <span style={{ fontSize:'14px', fontWeight:800, color:ACC, letterSpacing:'0.15em' }}>💬 フィードバック受信箱</span>
          {unreadCount > 0 && (
            <span style={{ background:ACC, color:'#000', fontSize:'9px', fontWeight:700, padding:'2px 8px', borderRadius:'10px' }}>{unreadCount} 件未読</span>
          )}
          <span style={{ fontSize:'9px', color:DIM, marginLeft:'auto' }}>全 {feedbacks.length} 件</span>
        </div>

        {feedbacks.length === 0 ? (
          <div style={{ textAlign:'center', padding:'40px', color:DIM, fontSize:'11px' }}>フィードバックはまだありません</div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:'10px' }}>
            {feedbacks.map(f => {
              const isNew = f.status === 'new';
              const buildColor = f.build === 'dev' ? DEV : STABLE;
              const date = f.createdAt?.toDate ? f.createdAt.toDate().toLocaleString('ja-JP') : '---';
              return (
                <div key={f.id}
                  style={{ background: isNew ? 'rgba(255,255,255,0.97)' : 'rgba(255,255,255,0.92)', border:`1px solid ${isNew ? ACC+'88' : '#cccccc'}`, borderRadius:'6px', padding:'14px 16px', cursor: isNew ? 'pointer' : 'default', transition:'border-color 0.15s' }}
                  onClick={() => isNew && markRead(f.fbId)}>
                  {/* ヘッダー行 */}
                  <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'12px', flexWrap:'wrap' }}>
                    <span style={{ fontSize:'12px', fontWeight:800, color: isNew ? '#008855' : '#446688', letterSpacing:'0.1em', fontFamily:"'JetBrains Mono',monospace" }}>{f.fbId}</span>
                    <span style={{ fontSize:'9px', fontWeight:700, color:'#fff', background: buildColor, borderRadius:'3px', padding:'2px 7px', opacity: f.build === 'dev' ? 0.85 : 0.75 }}>
                      {f.build === 'dev' ? '開発版' : '安定版'}
                    </span>
                    {isNew && <span style={{ fontSize:'9px', color:'#fff', background:'#e03030', borderRadius:'3px', padding:'2px 7px', fontWeight:800, letterSpacing:'0.05em' }}>NEW</span>}
                    {f.replySent && <span style={{ fontSize:'9px', color:'#fff', background:'#2277cc', borderRadius:'3px', padding:'2px 7px' }}>✓ 返信済</span>}
                    <span style={{ fontSize:'9px', color:'#889999', marginLeft:'auto' }}>{date}</span>
                  </div>
                  {/* 件名 */}
                  <div style={{ marginBottom:'10px' }}>
                    <div style={{ fontSize:'8px', fontWeight:700, color:'#889999', letterSpacing:'0.15em', marginBottom:'3px' }}>件名</div>
                    <div style={{ fontSize:'13px', fontWeight:700, color:'#1a2a3a' }}>{f.subject}</div>
                  </div>
                  {/* コメント */}
                  <div style={{ marginBottom:'10px' }}>
                    <div style={{ fontSize:'8px', fontWeight:700, color:'#889999', letterSpacing:'0.15em', marginBottom:'3px' }}>コメント</div>
                    <div style={{ fontSize:'12px', color:'#334455', lineHeight:1.7, whiteSpace:'pre-wrap' }}>{f.message}</div>
                  </div>
                  {f.email && (
                    <div style={{ fontSize:'10px', color:'#3377bb', letterSpacing:'0.05em' }}>✉ {f.email}</div>
                  )}
                  {isNew && <div style={{ fontSize:'9px', color:'#aabbcc', marginTop:'8px', textAlign:'right' }}>タップ / クリックで既読にする</div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // ── メインアナリティクス ──────────────────────
  const Analytics = ({ user }) => {
    const [sessions,     setSessions]     = useState([]);
    const [loading,      setLoading]      = useState(true);
    const [error,        setError]        = useState(null);
    const [range,        setRange]        = useState(30);
    const [buildFilter,  setBuildFilter]  = useState('all'); // 'all' | 'stable' | 'dev'
    const [activeTab,    setActiveTab]    = useState('stats'); // 'stats' | 'inbox'

    useEffect(() => {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 90);
      const cutoffStr = cutoff.toISOString().slice(0,10);
      db.collection('fst_analytics')
        .where('date','>=', cutoffStr)
        .orderBy('date','desc')
        .limit(10000)
        .get()
        .then(snap => {
          setSessions(snap.docs.map(d => ({ id:d.id, ...d.data() })));
          setLoading(false);
        })
        .catch(err => { setError(err.message); setLoading(false); });
    }, []);

    const stats = useMemo(() => {
      if (!sessions.length) return null;
      const today     = new Date().toISOString().slice(0,10);
      const thisMonth = new Date().toISOString().slice(0,7);

      // 表示範囲でフィルタ（全ビルド）
      const rangeCutoff = new Date();
      rangeCutoff.setDate(rangeCutoff.getDate() - range);
      const rangeStr = rangeCutoff.toISOString().slice(0,10);
      const ranged = sessions.filter(s => s.date >= rangeStr);

      // ビルド別分離
      const stableRanged = ranged.filter(s => s.build === 'stable' || !s.build);
      const devRanged    = ranged.filter(s => s.build === 'dev');

      // ビルドフィルター適用（グラフ用）
      const filtered = buildFilter === 'stable' ? stableRanged
                     : buildFilter === 'dev'    ? devRanged
                     : ranged;

      // ユニークユーザー（全ビルド・90日）
      const allUsers  = new Set(sessions.map(s=>s.uidHash));
      const weekCut   = new Date(); weekCut.setDate(weekCut.getDate()-7);
      const weekStr   = weekCut.toISOString().slice(0,10);

      // 各種ユーザー数（buildFilter適用）
      const allSess   = buildFilter==='stable' ? sessions.filter(s=>s.build==='stable'||!s.build)
                      : buildFilter==='dev'    ? sessions.filter(s=>s.build==='dev')
                      : sessions;
      const todayU  = new Set(allSess.filter(s=>s.date===today).map(s=>s.uidHash));
      const weekU   = new Set(allSess.filter(s=>s.date>=weekStr).map(s=>s.uidHash));
      const monthU  = new Set(allSess.filter(s=>s.month===thisMonth).map(s=>s.uidHash));
      const totalU  = new Set(allSess.map(s=>s.uidHash));

      // 時間帯・曜日分布（filtered）
      const hourDist = Array(24).fill(0);
      filtered.forEach(s => { if(s.hour>=0&&s.hour<24) hourDist[s.hour]++; });

      const dowDist = Array(7).fill(0);
      filtered.forEach(s => { if(s.dow>=0&&s.dow<7) dowDist[s.dow]++; });

      // ヒートマップ（filtered）
      const heatmap = Array.from({length:7},()=>Array(24).fill(0));
      filtered.forEach(s => {
        if(s.dow>=0&&s.dow<7&&s.hour>=0&&s.hour<24) heatmap[s.dow][s.hour]++;
      });

      // 日別 DAU
      const dailyData = [];
      for(let i=range-1; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate()-i);
        const dateStr = d.toISOString().slice(0,10);
        const dayAll    = filtered.filter(s=>s.date===dateStr);
        const dayStable = stableRanged.filter(s=>s.date===dateStr);
        const dayDev    = devRanged.filter(s=>s.date===dateStr);
        dailyData.push({
          date: dateStr,
          label: i===0?'今日': i===1?'昨日': `${d.getMonth()+1}/${d.getDate()}`,
          users:        new Set(dayAll.map(s=>s.uidHash)).size,
          sessions:     dayAll.length,
          stableUsers:  new Set(dayStable.map(s=>s.uidHash)).size,
          devUsers:     new Set(dayDev.map(s=>s.uidHash)).size,
        });
      }

      // 曜日別 dual
      const dowStable = Array(7).fill(0);
      const dowDev    = Array(7).fill(0);
      stableRanged.forEach(s => { if(s.dow>=0&&s.dow<7) dowStable[s.dow]++; });
      devRanged.forEach(s    => { if(s.dow>=0&&s.dow<7) dowDev[s.dow]++; });

      // バージョン分布（全）
      const verDist = {};
      sessions.forEach(s => {
        const v = s.version||'unknown';
        verDist[v] = (verDist[v]||0)+1;
      });
      const verEntries = Object.entries(verDist).sort((a,b)=>b[1]-a[1]);

      // ピーク
      const peakHour = hourDist.indexOf(Math.max(...hourDist));
      const peakDow  = dowDist.indexOf(Math.max(...dowDist));

      return {
        totalUsers: totalU.size,
        todayUsers: todayU.size,
        weekUsers:  weekU.size,
        monthUsers: monthU.size,
        totalSessions: allSess.length,
        rangeSessions: filtered.length,
        hourDist, dowDist, heatmap,
        dailyData, dowStable, dowDev,
        verEntries, peakHour, peakDow,
      };
    }, [sessions, range, buildFilter]);

    if (loading) return (
      <div style={{ minHeight:'100vh', background:BG, display:'flex', alignItems:'center', justifyContent:'center', color:ACC, fontSize:'11px', letterSpacing:'0.2em' }}>
        <div style={{ textAlign:'center' }}>
          <div style={{ fontSize:'28px', marginBottom:'16px', animation:'pulse 1.5s infinite' }}>◈</div>
          LOADING ANALYTICS...
        </div>
      </div>
    );

    if (error) return (
      <div style={{ minHeight:'100vh', background:BG, display:'flex', alignItems:'center', justifyContent:'center', color:'#ff6666', fontSize:'11px', padding:'24px', textAlign:'center' }}>
        <div>
          <div style={{ fontSize:'20px', marginBottom:'12px' }}>⚠</div>
          <div style={{ marginBottom:'8px' }}>データの読み込みに失敗しました</div>
          <div style={{ fontSize:'9px', color:DIM }}>{error}</div>
          <div style={{ fontSize:'9px', color:DIM, marginTop:'8px' }}>Firestoreルールが未デプロイの可能性があります</div>
        </div>
      </div>
    );

    const hourChartData = (stats?.hourDist||[]).map((v,h) => ({ label:`${h}`, value:v }));
    const dowChartData  = (stats?.dowDist||[]).map((v,i) => ({ label:DOW_LABELS[i], value:v }));
    const dowDualData   = DOW_LABELS.map((label,i) => ({
      label,
      stable: stats?.dowStable[i]||0,
      dev:    stats?.dowDev[i]||0,
    }));

    // ビルドフィルターの色
    const filterColor = buildFilter==='stable' ? STABLE : buildFilter==='dev' ? DEV : ACC;

    return (
      <div style={{ minHeight:'100vh', background:`linear-gradient(180deg,${BG} 0%,#0a1020 100%)`, color:TEXT, fontFamily:'inherit', position:'relative' }}>
        <div style={{ position:'fixed', inset:0, backgroundImage:`linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px)`, backgroundSize:'40px 40px', pointerEvents:'none', zIndex:0 }} />
        <div style={{ position:'fixed', inset:0, background:'repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 6px)', pointerEvents:'none', zIndex:1 }} />

        <div style={{ position:'relative', zIndex:2, maxWidth:'1100px', margin:'0 auto', padding:'20px 16px 40px' }}>

          {/* ヘッダー */}
          <header style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px', paddingBottom:'12px', borderBottom:`1px solid ${BORDER}`, flexWrap:'wrap', gap:'8px' }}>
            <div>
              <div style={{ fontSize:'16px', fontWeight:800, color:ACC, letterSpacing:'0.2em', textShadow:`0 0 20px ${ACC}44` }}>◈ FLIGHT STRIP ANALYTICS</div>
              <div style={{ fontSize:'8px', color:DIM, letterSpacing:'0.25em', marginTop:'3px' }}>
                <a href="./index.html" style={{ color:DIM, textDecoration:'none', borderBottom:`1px solid ${BORDER}` }}
                  onMouseEnter={e=>e.target.style.color=ACC} onMouseLeave={e=>e.target.style.color=DIM}>
                  ← アプリに戻る
                </a>
                &nbsp;·&nbsp;{user.email}
              </div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap' }}>

              {/* 画面切替タブ */}
              <div style={{ display:'flex', gap:'2px', background:`${BORDER}55`, borderRadius:'4px', padding:'2px' }}>
                {[['stats','📊 統計'],['inbox','💬 受信箱']].map(([v,label]) => (
                  <button key={v} onClick={()=>setActiveTab(v)}
                    style={{ background:activeTab===v?`${ACC}22`:'transparent', border:`1px solid ${activeTab===v?ACC+'88':'transparent'}`, color:activeTab===v?ACC:DIM, padding:'4px 12px', borderRadius:'3px', cursor:'pointer', fontSize:'9px', fontWeight:activeTab===v?700:400, fontFamily:'inherit', transition:'all 0.15s' }}>
                    {label}
                  </button>
                ))}
              </div>

              {/* ビルドフィルタータブ（統計画面のみ） */}
              {activeTab === 'stats' && <>
              <div style={{ display:'flex', gap:'2px', background:`${BORDER}55`, borderRadius:'4px', padding:'2px' }}>
                {[
                  { v:'all',    label:'両方',   color:ACC },
                  { v:'stable', label:'安定版',  color:STABLE },
                  { v:'dev',    label:'開発版',  color:DEV },
                ].map(({ v, label, color }) => (
                  <button key={v} onClick={()=>setBuildFilter(v)}
                    style={{
                      background: buildFilter===v ? `${color}22` : 'transparent',
                      border: `1px solid ${buildFilter===v ? color+'88' : 'transparent'}`,
                      color: buildFilter===v ? color : DIM,
                      padding:'4px 12px', borderRadius:'3px', cursor:'pointer',
                      fontSize:'9px', fontWeight:buildFilter===v?700:400,
                      fontFamily:'inherit', transition:'all 0.15s',
                    }}>
                    {label}
                  </button>
                ))}
              </div>

              {/* 表示範囲切替 */}
              <div style={{ display:'flex', gap:'2px' }}>
                {[7,14,30,90].map(d => (
                  <button key={d} onClick={()=>setRange(d)}
                    style={{ background:range===d?`${ACC}18`:'transparent', border:`1px solid ${range===d?ACC+'66':BORDER}`, color:range===d?ACC:DIM, padding:'4px 10px', borderRadius:'2px', cursor:'pointer', fontSize:'9px', fontWeight:range===d?700:400, fontFamily:'inherit' }}>
                    {d}日
                  </button>
                ))}
              </div>
              </>}

              <button onClick={()=>auth.signOut()} style={{ background:'rgba(255,51,51,0.1)', border:'1px solid #ff333344', color:'#ff6666', padding:'4px 10px', borderRadius:'2px', cursor:'pointer', fontSize:'9px', fontFamily:'inherit' }}>
                SIGN OUT
              </button>
            </div>
          </header>

          {activeTab === 'inbox' ? <Inbox /> : !stats || sessions.length === 0 ? (
            <div style={{ textAlign:'center', padding:'60px', color:DIM, fontSize:'11px' }}>
              <div style={{ fontSize:'24px', marginBottom:'12px' }}>📊</div>
              <div>データがまだありません</div>
              <div style={{ fontSize:'9px', marginTop:'8px' }}>アプリを使用するとここに統計が表示されます</div>
            </div>
          ) : (
            <>
              {/* サマリーカード */}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))', gap:'10px', marginBottom:'16px' }}>
                <Metric label="総ユーザー（90日）" value={stats.totalUsers} sub="ユニーク" color={filterColor} />
                <Metric label="TODAY" value={stats.todayUsers} sub="アクティブ" color="#00ccff" />
                <Metric label="週間 (7日)" value={stats.weekUsers} sub="アクティブ" color="#ffaa00" />
                <Metric label="月間 (今月)" value={stats.monthUsers} sub="アクティブ" color="#cc44ff" />
                <Metric label="総セッション" value={stats.totalSessions} sub="90日合計" color={DIM} />
                <Metric label={`セッション (${range}日)`} value={stats.rangeSessions} sub="集計範囲" color={DIM} />
              </div>

              {/* ピーク情報 */}
              <div style={{ display:'flex', gap:'8px', marginBottom:'16px', flexWrap:'wrap' }}>
                <div style={{ background:`${filterColor}08`, border:`1px solid ${filterColor}22`, borderRadius:'4px', padding:'8px 14px', fontSize:'10px', color:TEXT }}>
                  <span style={{ color:filterColor, fontWeight:700 }}>⚡ ピーク時間帯:</span>
                  &nbsp;{stats.peakHour}:00〜{stats.peakHour+1}:00
                </div>
                <div style={{ background:`${filterColor}08`, border:`1px solid ${filterColor}22`, borderRadius:'4px', padding:'8px 14px', fontSize:'10px', color:TEXT }}>
                  <span style={{ color:filterColor, fontWeight:700 }}>⚡ ピーク曜日:</span>
                  &nbsp;{DOW_LABELS[stats.peakDow]}曜日
                </div>
              </div>

              {/* メイン2カラム */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'12px' }}>

                {/* 日別アクティブユーザー */}
                <Card>
                  <SectionTitle>◈ 日別アクティブユーザー（DAU · {range}日）</SectionTitle>
                  {buildFilter === 'all' && <DualLegend />}
                  {buildFilter === 'all' ? (
                    <BarChartDual data={stats.dailyData} labelKey="label" stableKey="stableUsers" devKey="devUsers" height={130} />
                  ) : (
                    <BarChart data={stats.dailyData} labelKey="label" valueKey="users" color={filterColor} height={130} showValue={false} />
                  )}
                  <div style={{ display:'flex', justifyContent:'space-between', marginTop:'8px', fontSize:'8px', color:DIM }}>
                    <span>{stats.dailyData[0]?.date}</span>
                    <span>{stats.dailyData[stats.dailyData.length-1]?.date}</span>
                  </div>
                </Card>

                {/* 曜日別 */}
                <Card>
                  <SectionTitle>◈ 曜日別セッション数</SectionTitle>
                  {buildFilter === 'all' ? (
                    <>
                      <DualLegend />
                      <div style={{ display:'flex', alignItems:'flex-end', gap:'6px', height:'130px' }}>
                        {dowDualData.map((d,i) => {
                          const max = Math.max(1,...dowDualData.map(x=>x.stable+x.dev));
                          const total = d.stable + d.dev;
                          const totalPct = Math.max(total>0?2:0, total/max*100);
                          const sPct = total > 0 ? d.stable/total*100 : 0;
                          const dPct = total > 0 ? d.dev/total*100 : 0;
                          const isWeekend = i===0||i===6;
                          return (
                            <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', height:'100%', justifyContent:'flex-end', gap:'3px' }}>
                              <span style={{ fontSize:'8px', color:DIM }}>{total||''}</span>
                              <div title={`安定版:${d.stable} / 開発版:${d.dev}`}
                                style={{ width:'100%', height:`${totalPct}%`, display:'flex', flexDirection:'column', borderRadius:'2px 2px 0 0', overflow:'hidden', transition:'height 0.3s' }}>
                                {d.dev > 0 && <div style={{ flex:`${dPct} 0 0`, background:DEV, opacity:0.8 }} />}
                                {d.stable > 0 && <div style={{ flex:`${sPct} 0 0`, background:STABLE, opacity:0.75 }} />}
                              </div>
                              <span style={{ fontSize:'10px', fontWeight:700, color:isWeekend?'#ff6688':'#00aaff' }}>{d.label}</span>
                            </div>
                          );
                        })}
                      </div>
                    </>
                  ) : (
                    <div style={{ display:'flex', alignItems:'flex-end', gap:'6px', height:'130px' }}>
                      {dowChartData.map((d,i) => {
                        const max = Math.max(1,...dowChartData.map(x=>x.value));
                        const pct = Math.max(2, d.value/max*100);
                        const isWeekend = i===0||i===6;
                        return (
                          <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', height:'100%', justifyContent:'flex-end', gap:'3px' }}>
                            <span style={{ fontSize:'8px', color:DIM }}>{d.value||''}</span>
                            <div style={{ width:'100%', height:`${pct}%`, background:isWeekend?'rgba(255,102,136,0.3)':'rgba(0,170,255,0.25)', borderRadius:'2px 2px 0 0', position:'relative', transition:'height 0.3s' }}>
                              <div style={{ position:'absolute', inset:0, background:isWeekend?'#ff6688':'#00aaff', opacity:0.65, borderRadius:'2px 2px 0 0' }} />
                            </div>
                            <span style={{ fontSize:'10px', fontWeight:700, color:isWeekend?'#ff6688':'#00aaff' }}>{d.label}</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </Card>
              </div>

              {/* ヒートマップ */}
              <Card style={{ marginBottom:'12px' }}>
                <SectionTitle>◈ 曜日×時間帯ヒートマップ（{range}日間）{buildFilter==='all'?'· 全ビルド合計':buildFilter==='stable'?'· 安定版':'· 開発版'}</SectionTitle>
                <Heatmap
                  data={stats.heatmap}
                  maxVal={Math.max(1,...stats.heatmap.flat())}
                  color={buildFilter==='dev' ? '255,170,68' : '0,255,136'}
                />
              </Card>

              {/* 下段2カラム */}
              <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:'12px' }}>

                {/* 時間帯別 */}
                <Card>
                  <SectionTitle>◈ 時間帯別セッション数（{range}日間）</SectionTitle>
                  <BarChart data={hourChartData} labelKey="label" valueKey="value" color={buildFilter==='dev'?DEV:buildFilter==='stable'?STABLE:'#00ccff'} height={100} showValue={false} />
                  <div style={{ display:'flex', justifyContent:'space-between', marginTop:'4px', fontSize:'7px', color:DIM }}>
                    <span>0時</span><span>6時</span><span>12時</span><span>18時</span><span>23時</span>
                  </div>
                </Card>

                {/* バージョン分布 */}
                <Card>
                  <SectionTitle>◈ バージョン分布</SectionTitle>
                  <div style={{ display:'flex', flexDirection:'column', gap:'6px' }}>
                    {stats.verEntries.map(([ver, cnt]) => {
                      const total = sessions.length;
                      const pct = Math.round(cnt/total*100);
                      const isDev = ver.includes('dev');
                      const barColor = isDev ? DEV : STABLE;
                      return (
                        <div key={ver}>
                          <div style={{ display:'flex', justifyContent:'space-between', fontSize:'9px', marginBottom:'2px' }}>
                            <span style={{ color:isDev?DEV:STABLE, fontWeight:600 }}>{ver}</span>
                            <span style={{ color:DIM }}>{cnt} ({pct}%)</span>
                          </div>
                          <div style={{ height:'6px', background:`${barColor}14`, borderRadius:'3px', overflow:'hidden' }}>
                            <div style={{ width:`${pct}%`, height:'100%', background:barColor, opacity:0.7, borderRadius:'3px', transition:'width 0.3s' }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </Card>

              </div>

              {/* フッター */}
              <div style={{ marginTop:'20px', textAlign:'center', fontSize:'8px', color:DIM, letterSpacing:'0.15em' }}>
                FLIGHT STRIP TODO ANALYTICS · データは fst_analytics コレクションから取得 · 最終90日間
              </div>
            </>
          )}
        </div>
      </div>
    );
  };

  // ── アクセス制限 ──────────────────────────────
  const ALLOWED_EMAILS = [
    'junpei.omote@gmail.com',
    'jumpei.omote@splineglobal.com',
  ];

  const AccessDenied = ({ user }) => (
    <div style={{ minHeight:'100vh', background:BG, display:'flex', alignItems:'center', justifyContent:'center', color:'#ff6666', fontSize:'11px', padding:'24px', textAlign:'center' }}>
      <div>
        <div style={{ fontSize:'28px', marginBottom:'16px' }}>🚫</div>
        <div style={{ fontSize:'13px', fontWeight:700, color:'#ff6666', marginBottom:'8px', letterSpacing:'0.1em' }}>ACCESS DENIED</div>
        <div style={{ fontSize:'9px', color:DIM, marginBottom:'16px' }}>{user.email} はアクセス権限がありません</div>
        <button onClick={()=>auth.signOut()} style={{ background:'rgba(255,51,51,0.1)', border:'1px solid #ff333344', color:'#ff6666', padding:'6px 16px', borderRadius:'2px', cursor:'pointer', fontSize:'9px', fontFamily:'inherit' }}>
          SIGN OUT
        </button>
      </div>
    </div>
  );

  // ── ルート ────────────────────────────────────
  const App = () => {
    const [user, setUser] = useState(undefined);
    useEffect(() => {
      return auth.onAuthStateChanged(u => setUser(u || null));
    }, []);
    if (user === undefined) return (
      <div style={{ minHeight:'100vh', background:BG, display:'flex', alignItems:'center', justifyContent:'center', color:ACC, fontSize:'11px', letterSpacing:'0.2em' }}>
        <div style={{ animation:'pulse 1.5s infinite' }}>◈</div>
      </div>
    );
    if (!user) return <Login />;
    if (!ALLOWED_EMAILS.includes(user.email)) return <AccessDenied user={user} />;
    return <Analytics user={user} />;
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  const src = document.getElementById('jsx-source').textContent;
  const compiled = Babel.transform(src, { presets: ['react'] }).code;
  const script = document.createElement('script');
  script.textContent = compiled;
  document.body.appendChild(script);
</script>
</body>
</html>
