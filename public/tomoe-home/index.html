<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ともえホーム">
  <title>🌸 ともえちゃんのホーム</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Fredoka+One&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; height: 100dvh; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }

    .shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: linear-gradient(150deg, #ffecd2 0%, #fcb69f 35%, #ffd1dc 65%, #c8e6c9 100%);
    }

    /* ナビバー */
    .nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid rgba(214,51,132,0.12);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }

    .nav-logo {
      font-family: 'Fredoka One', cursive;
      font-size: 17px;
      color: #d63384;
      white-space: nowrap;
      margin-right: 4px;
      flex-shrink: 0;
      text-decoration: none;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 16px;
      border-radius: 100px;
      border: 2px solid transparent;
      background: #f3f3f3;
      color: #555;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .15s, color .15s, border-color .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { transform: scale(0.94); }
    .nav-btn.active { background: #d63384; color: #fff; border-color: #d63384; }
    .nav-btn .icon { font-size: 16px; }

    .nav-admin {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 13px;
      color: #bbb;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .nav-admin:hover { color: #d63384; background: rgba(214,51,132,0.08); }

    /* メインエリア */
    .main { flex: 1; position: relative; overflow: hidden; }

    /* ホームビュー */
    .home-view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 16px;
    }

    .home-title { text-align: center; }
    .home-title .icon { font-size: 36px; display: block; }
    .home-title h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(20px, 4.5vw, 34px);
      color: #d63384;
      text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(214,51,132,0.18);
      margin-top: 4px;
    }
    .home-title p { font-size: 13px; color: #aaa; font-weight: 700; margin-top: 3px; }

    /* カードグリッド */
    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

    .app-card {
      background: #fff;
      border-radius: 22px;
      padding: 24px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.09);
      width: min(200px, 42vw);
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s, border-color .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .app-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 10px 32px rgba(0,0,0,0.13); border-color: var(--c,#ccc); }
    .app-card:active { transform: scale(0.96); }

    .app-card .icon { font-size: 50px; }
    .app-card .name { font-size: 15px; font-weight: 900; color: #333; text-align: center; }
    .app-card .desc { font-size: 11px; color: #aaa; text-align: center; line-height: 1.5; }

    .open-btn {
      margin-top: 4px;
      padding: 7px 18px;
      border-radius: 100px;
      border: none;
      background: var(--c, #d63384);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      pointer-events: none;
    }

    /* iframeビュー */
    .app-frame-wrap { position: absolute; inset: 0; }
    .app-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .app-card { width: min(150px, 44vw); padding: 18px 12px 14px; }
      .app-card .icon { font-size: 40px; }
      .app-card .name { font-size: 14px; }
      .app-card .desc { display: none; }
    }
  </style>
</head>
<body>
<div class="shell">

  <nav class="nav" id="nav">
    <span class="nav-logo">🌸 ともえホーム</span>
    <button class="nav-btn active" id="btn-home" onclick="showHome()">
      <span class="icon">🏠</span>ホーム
    </button>
    <!-- アプリボタンは JS が動的生成 -->
    <a class="nav-admin" href="admin.html" title="管理画面">⚙</a>
  </nav>

  <main class="main">
    <div class="home-view" id="view-home">
      <div class="home-title">
        <span class="icon">🌸</span>
        <h1>ともえちゃんのホーム</h1>
        <p>どのアプリであそぶ？</p>
      </div>
      <div class="card-grid" id="card-grid"></div>
    </div>

    <div class="app-frame-wrap hidden" id="view-app">
      <iframe id="app-iframe" src="" allowfullscreen></iframe>
    </div>
  </main>
</div>

<script>
const STORAGE_KEY = 'tomoe_apps';

const DEFAULT_APPS = [
  { id: 'abc-world',       name: 'ワールドABC',  icon: '🌍', url: 'https://cc-dev-ps7.web.app/abc-world/',      desc: 'えいごのアルファベットを\nたのしくおぼえよう！' },
  { id: 'ouchi-hamasushi', name: 'おうち巴寿司', icon: '🍣', url: 'https://cc-dev-ps7.web.app/ouchi-hamasushi/', desc: 'おすしをえらんで\nちゅうもんしてみよう！' },
];

const COLORS = ['#ff7eb3','#e53935','#42a5f5','#66bb6a','#ffa726','#ab47bc','#26c6da','#ef5350'];

// ---- Firebase ----
firebase.initializeApp({
  apiKey: "AIzaSyDPlsAhtxbJBihy-EAHck9P7XbuM",
  authDomain: "cc-dev-ps7.firebaseapp.com",
  projectId: "cc-dev-ps7",
  storageBucket: "cc-dev-ps7.firebasestorage.app",
  messagingSenderId: "1029579090333",
  appId: "1:1029579090333:web:5a2ea499fec97c497f2774"
});
const _db = firebase.firestore();

let apps = (() => {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return DEFAULT_APPS.slice();
})();
let currentApp = null;

function render() {
  document.querySelectorAll('.nav-app-btn').forEach(b => b.remove());
  const adminLink = document.querySelector('.nav-admin');
  apps.forEach(app => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn nav-app-btn';
    btn.id = 'nav-' + app.id;
    btn.innerHTML = `<span class="icon">${app.icon}</span>${app.name}`;
    btn.onclick = () => showApp(app, btn);
    adminLink.before(btn);
  });

  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  apps.forEach((app, i) => {
    const color = COLORS[i % COLORS.length];
    const card = document.createElement('div');
    card.className = 'app-card';
    card.style.setProperty('--c', color);
    card.tabIndex = 0;
    card.innerHTML = `
      <span class="icon">${app.icon}</span>
      <span class="name">${app.name}</span>
      ${app.desc ? `<span class="desc">${app.desc.replace(/\n/g,'<br>')}</span>` : ''}
      <span class="open-btn" style="background:${color}">▶ あそぶ</span>
    `;
    const navBtn = () => document.getElementById('nav-' + app.id);
    card.onclick = () => showApp(app, navBtn());
    card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') card.click(); });
    grid.appendChild(card);
  });

  // 表示中のアプリのナビボタンをアクティブに戻す
  if (currentApp) setActiveBtn(document.getElementById('nav-' + currentApp));
}

function setActiveBtn(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function showHome() {
  document.getElementById('view-home').classList.remove('hidden');
  document.getElementById('view-app').classList.add('hidden');
  setActiveBtn(document.getElementById('btn-home'));
  currentApp = null;
}

function showApp(app, btn) {
  const iframe = document.getElementById('app-iframe');
  if (iframe.getAttribute('src') !== app.url) iframe.src = app.url;
  currentApp = app.id;
  document.getElementById('view-home').classList.add('hidden');
  document.getElementById('view-app').classList.remove('hidden');
  setActiveBtn(btn || document.getElementById('nav-' + app.id));
}

// Firestore リアルタイム同期
_db.collection('tomoe-home').doc('config').onSnapshot(snap => {
  if (snap.exists && snap.data().apps) {
    apps = snap.data().apps;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
  } else {
    apps = DEFAULT_APPS.slice();
  }
  render();
}, err => { console.warn('Firestore:', err); render(); });

render();
</script>
</body>
</html>
