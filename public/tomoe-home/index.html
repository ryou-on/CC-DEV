<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ともえホーム">
  <title>🌸 ともえちゃんのホーム</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Fredoka+One&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* ===== 全画面レイアウト ===== */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: linear-gradient(150deg, #ffecd2 0%, #fcb69f 35%, #ffd1dc 65%, #c8e6c9 100%);
    }

    /* ===== ナビバー ===== */
    .nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid rgba(214, 51, 132, 0.15);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }

    .nav-logo {
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      color: #d63384;
      white-space: nowrap;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 100px;
      border: 2px solid transparent;
      background: #f3f3f3;
      color: #555;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { transform: scale(0.95); }
    .nav-btn.active {
      background: #d63384;
      color: #fff;
      border-color: #d63384;
    }
    .nav-btn .icon { font-size: 18px; }

    /* ===== メインエリア ===== */
    .main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* ===== ホームビュー ===== */
    .home-view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 16px;
    }

    .home-title {
      text-align: center;
    }
    .home-title .icon { font-size: 40px; display: block; }
    .home-title h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(22px, 5vw, 36px);
      color: #d63384;
      text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(214,51,132,0.2);
      margin-top: 4px;
    }
    .home-title p {
      font-size: 14px;
      color: #999;
      font-weight: 700;
      margin-top: 4px;
    }

    /* ===== アプリカードグリッド ===== */
    .card-grid {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .app-card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
      width: min(220px, 42vw);
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s, border-color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .app-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 12px 36px rgba(0,0,0,0.14); }
    .app-card:active { transform: scale(0.96); }
    .app-card:nth-child(1) { --c: #ff7eb3; }
    .app-card:nth-child(2) { --c: #e53935; }
    .app-card:hover, .app-card:focus-visible { border-color: var(--c); outline: none; }

    .app-card .icon { font-size: 56px; }
    .app-card .name {
      font-size: 17px;
      font-weight: 900;
      color: #333;
      text-align: center;
    }
    .app-card .desc {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }

    .open-btn {
      margin-top: 4px;
      padding: 8px 20px;
      border-radius: 100px;
      border: none;
      background: var(--c, #d63384);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
      pointer-events: none; /* カード全体がクリック受付 */
    }
    .app-card:hover .open-btn { opacity: 0.9; }

    /* ===== iframeビュー ===== */
    .app-frame-wrap {
      position: absolute;
      inset: 0;
    }
    .app-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ===== 表示切替 ===== */
    .hidden { display: none !important; }

    /* ===== モバイル調整 ===== */
    @media (max-width: 480px) {
      .nav-logo { font-size: 15px; }
      .nav-btn { font-size: 13px; padding: 7px 14px; }
      .app-card { width: min(160px, 44vw); padding: 20px 14px 16px; }
      .app-card .icon { font-size: 44px; }
      .app-card .name { font-size: 15px; }
      .app-card .desc { display: none; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ナビバー -->
  <nav class="nav">
    <span class="nav-logo">🌸 ともえホーム</span>

    <button class="nav-btn active" id="btn-home" onclick="showHome()">
      <span class="icon">🏠</span>ホーム
    </button>
    <button class="nav-btn" id="btn-abc" onclick="showApp('abc-world', 'btn-abc')">
      <span class="icon">🌍</span>ワールドABC
    </button>
    <button class="nav-btn" id="btn-sushi" onclick="showApp('ouchi-hamasushi', 'btn-sushi')">
      <span class="icon">🍣</span>おうち巴寿司
    </button>
  </nav>

  <!-- メインエリア -->
  <main class="main">

    <!-- ホーム画面 -->
    <div class="home-view" id="view-home">
      <div class="home-title">
        <span class="icon">🌸</span>
        <h1>ともえちゃんのホーム</h1>
        <p>どのアプリであそぶ？</p>
      </div>

      <div class="card-grid">
        <div class="app-card" onclick="showApp('abc-world','btn-abc')" tabindex="0">
          <span class="icon">🌍</span>
          <span class="name">ワールドABC</span>
          <span class="desc">えいごのアルファベットを<br>たのしくおぼえよう！</span>
          <span class="open-btn">▶ あそぶ</span>
        </div>
        <div class="app-card" onclick="showApp('ouchi-hamasushi','btn-sushi')" tabindex="0">
          <span class="icon">🍣</span>
          <span class="name">おうち巴寿司</span>
          <span class="desc">おすしをえらんで<br>ちゅうもんしてみよう！</span>
          <span class="open-btn">▶ あそぶ</span>
        </div>
      </div>
    </div>

    <!-- アプリフレーム -->
    <div class="app-frame-wrap hidden" id="view-app">
      <iframe id="app-iframe" src="" allowfullscreen></iframe>
    </div>

  </main>
</div>

<script>
  const APPS = {
    'abc-world':        'https://cc-dev-ps7.web.app/abc-world/',
    'ouchi-hamasushi':  'https://cc-dev-ps7.web.app/ouchi-hamasushi/',
  };

  let currentApp = null;

  function setActiveBtn(id) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showHome() {
    document.getElementById('view-home').classList.remove('hidden');
    document.getElementById('view-app').classList.add('hidden');
    setActiveBtn('btn-home');
    currentApp = null;
  }

  function showApp(appKey, btnId) {
    const url = APPS[appKey];
    if (!url) return;

    const iframe = document.getElementById('app-iframe');
    // 同じアプリへの再クリックはreloadしない
    if (currentApp !== appKey) {
      iframe.src = url;
      currentApp = appKey;
    }

    document.getElementById('view-home').classList.add('hidden');
    document.getElementById('view-app').classList.remove('hidden');
    setActiveBtn(btnId);
  }

  // キーボード操作
  document.querySelectorAll('.app-card').forEach(card => {
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') card.click();
    });
  });
</script>
</body>
</html>
