<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ともえホーム">
  <title>🌸 ともえちゃんのホーム</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Fredoka+One&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 30%, #ffd1dc 60%, #c8e6c9 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      overflow-x: hidden;
    }

    /* ---- ヘッダー ---- */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }

    .header-icon {
      font-size: 72px;
      display: block;
      margin-bottom: 8px;
      animation: bounce 2s infinite;
    }

    .header h1 {
      font-family: 'Fredoka One', 'Noto Sans JP', cursive;
      font-size: clamp(28px, 6vw, 48px);
      color: #d63384;
      text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(214,51,132,0.25);
      letter-spacing: 0.04em;
    }

    .header .subtitle {
      margin-top: 8px;
      font-size: 16px;
      color: #888;
      font-weight: 700;
    }

    /* ---- アプリグリッド ---- */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 800px;
    }

    /* ---- カード ---- */
    .app-card {
      background: #fff;
      border-radius: 28px;
      padding: 36px 28px 32px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease;
      cursor: pointer;
      border: 3px solid transparent;
      animation: fadeUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 26px;
      background: var(--card-bg, rgba(255,255,255,0));
      transition: background 0.2s;
      pointer-events: none;
    }

    .app-card:hover, .app-card:focus-visible {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 16px 48px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.10);
      border-color: var(--card-color, #ccc);
      outline: none;
    }

    .app-card:active {
      transform: scale(0.97);
    }

    .app-card:nth-child(1) { animation-delay: 0.1s; --card-color: #ff7eb3; }
    .app-card:nth-child(2) { animation-delay: 0.2s; --card-color: #e53935; }
    .app-card:nth-child(3) { animation-delay: 0.3s; --card-color: #42a5f5; }
    .app-card:nth-child(4) { animation-delay: 0.4s; --card-color: #66bb6a; }

    .app-icon {
      font-size: 72px;
      line-height: 1;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1);
    }

    .app-card:hover .app-icon {
      transform: scale(1.15) rotate(-4deg);
    }

    .app-name {
      font-size: 22px;
      font-weight: 900;
      color: #333;
      text-align: center;
      line-height: 1.3;
    }

    .app-desc {
      font-size: 14px;
      color: #888;
      text-align: center;
      line-height: 1.6;
    }

    .app-badge {
      background: var(--badge-bg, #ff7eb3);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      padding: 4px 14px;
      border-radius: 100px;
      letter-spacing: 0.04em;
    }

    .app-card:nth-child(1) .app-badge { background: #ff7eb3; }
    .app-card:nth-child(2) .app-badge { background: #e53935; }
    .app-card:nth-child(3) .app-badge { background: #42a5f5; }
    .app-card:nth-child(4) .app-badge { background: #66bb6a; }

    /* ---- 星の装飾 ---- */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      font-size: 20px;
      animation: twinkle var(--dur, 3s) var(--delay, 0s) infinite;
      opacity: 0;
    }

    /* ---- アニメーション ---- */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    @keyframes twinkle {
      0%   { opacity: 0; transform: scale(0.8); }
      50%  { opacity: 0.6; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    /* ---- レスポンシブ ---- */
    @media (max-width: 480px) {
      .app-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .app-card {
        padding: 24px 16px 20px;
        border-radius: 20px;
        gap: 10px;
      }
      .app-icon { font-size: 52px; }
      .app-name { font-size: 16px; }
      .app-desc { display: none; }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <header class="header">
    <span class="header-icon">🌸</span>
    <h1>ともえちゃんのホーム</h1>
    <p class="subtitle">どのアプリであそぶ？</p>
  </header>

  <main class="app-grid">

    <a class="app-card" href="https://cc-dev-ps7.web.app/abc-world/">
      <span class="app-icon">🌍</span>
      <span class="app-name">ワールドABC</span>
      <span class="app-desc">えいごのアルファベットを<br>たのしくおぼえよう！</span>
      <span class="app-badge">べんきょう</span>
    </a>

    <a class="app-card" href="https://cc-dev-ps7.web.app/ouchi-hamasushi/">
      <span class="app-icon">🍣</span>
      <span class="app-name">おうち巴寿司</span>
      <span class="app-desc">おすしをえらんで<br>ちゅうもんしてみよう！</span>
      <span class="app-badge">ごはん</span>
    </a>

  </main>

  <script>
    // 星をランダム配置
    const container = document.getElementById('stars');
    const EMOJIS = ['⭐', '✨', '💫', '🌟', '⭐'];
    for (let i = 0; i < 18; i++) {
      const s = document.createElement('span');
      s.className = 'star';
      s.textContent = EMOJIS[i % EMOJIS.length];
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top  = Math.random() * 100 + 'vh';
      s.style.setProperty('--dur',   (2 + Math.random() * 3).toFixed(1) + 's');
      s.style.setProperty('--delay', (Math.random() * 3).toFixed(1) + 's');
      s.style.fontSize = (14 + Math.random() * 18).toFixed(0) + 'px';
      container.appendChild(s);
    }
  </script>

</body>
</html>
