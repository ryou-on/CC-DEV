<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タブエディタ — YT → hihaho Tab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#27354a;--border:#41526e;
  --text:#f1f5f9;--text-sub:#aab8cc;--text-faint:#7d8da3;--ph:#5d6b80;
  --accent:#3b82f6;--accent-hover:#2563eb;
  --ok:#34d399;--err:#f87171;--warn:#fbbf24;
}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Hiragino Sans','Yu Gothic UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13.5px;display:flex;flex-direction:column}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.slug-badge{font-size:11px;color:var(--text-faint);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
#status{font-size:12px;color:var(--text-sub);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#status.ok{color:var(--ok)}#status.err{color:var(--err)}#status.busy{color:var(--warn)}
.hdr-btn{padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s;text-decoration:none;display:inline-block}
.hdr-btn:hover{background:#31415c}
.hdr-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.hdr-btn.primary:hover{background:var(--accent-hover)}
.hdr-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Layout ── */
.main{flex:1;display:flex;min-height:0}
.forms{width:430px;flex-shrink:0;overflow-y:auto;padding:14px 16px 40px;border-right:1px solid var(--border);background:var(--bg)}
.previewPane{flex:1;min-width:0;position:relative;background:#0a0f1a}
#previewFrame{position:absolute;inset:0;width:100%;height:100%;border:none}

/* ── Forms ── */
.sect{margin-bottom:20px}
.sect-title{font-size:11.5px;font-weight:700;color:var(--text-sub);letter-spacing:.06em;border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}
.fgrp{margin-bottom:10px}
.flabel{font-size:11px;font-weight:600;color:var(--text-faint);margin-bottom:4px;letter-spacing:.03em}
.input,.selectbox,textarea.input{width:100%;padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.input:focus,.selectbox:focus,textarea.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--ph)}
textarea.input{resize:vertical;min-height:54px;line-height:1.6}
.selectbox{cursor:pointer}
.row2{display:flex;gap:8px}
.row2>*{flex:1;min-width:0}
input[type="color"].input{padding:2px 4px;height:34px;cursor:pointer}
input[type="range"]{width:100%;accent-color:var(--accent)}
.range-row{display:flex;align-items:center;gap:10px}
.range-val{font-size:12px;color:var(--text-sub);min-width:44px;text-align:right;font-variant-numeric:tabular-nums}

/* ── List items ── */
.item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 11px;margin-bottom:9px}
.item-head{display:flex;gap:6px;margin-bottom:7px;align-items:center}
.item-head .input{flex:1}
.item-head .input.emoji{flex:0 0 52px;text-align:center}
.item-head .input.reading{flex:0 0 30%}
.mini-btn{width:26px;height:26px;flex-shrink:0;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text-sub);cursor:pointer;font-size:12px;line-height:1;transition:all .12s;font-family:inherit}
.mini-btn:hover{color:var(--text);background:#31415c}
.mini-btn.del:hover{color:#fff;background:#dc2626;border-color:#dc2626}
.mini-btn:disabled{opacity:.3;cursor:default}
.add-btn{width:100%;padding:8px;border-radius:7px;border:1px dashed var(--border);background:none;color:var(--text-sub);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.count-badge{font-size:10.5px;color:var(--text-faint);font-weight:400}

/* ── no draft ── */
#noDraft{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;align-items:center;justify-content:center;text-align:center;padding:20px}
#noDraft.show{display:flex}
#noDraft .box{max-width:460px;line-height:1.9;color:var(--text-sub)}
#noDraft .emoji{font-size:40px;margin-bottom:12px}
#noDraft h2{font-size:16px;color:var(--text);margin-bottom:8px}
</style>
</head>
<body>

<div class="hdr">
  <h1>✏️ タブエディタ</h1>
  <span class="slug-badge" id="slugBadge">—</span>
  <span id="status"></span>
  <a class="hdr-btn" id="openTabUrl" target="_blank" href="#">↗ 本番URL</a>
  <button class="hdr-btn primary" id="deployBtn">🚀 再デプロイ</button>
</div>

<div class="main">
  <div class="forms">

    <div class="sect">
      <div class="sect-title">📄 基本情報</div>
      <div class="fgrp">
        <div class="flabel">動画タイトル（タブHTMLの&lt;title&gt;）</div>
        <input type="text" class="input" id="titleInput">
      </div>
    </div>

    <div class="sect">
      <div class="sect-title">🎨 デザイン / レイアウト</div>
      <div class="row2 fgrp">
        <div>
          <div class="flabel">テーマ</div>
          <select class="selectbox" id="themeSel">
            <option value="light">ライト</option>
            <option value="dark">ダーク</option>
          </select>
        </div>
        <div>
          <div class="flabel">アクセントカラー</div>
          <input type="color" class="input" id="accentInput">
        </div>
        <div>
          <div class="flabel">タブ位置</div>
          <select class="selectbox" id="tabPosSel">
            <option value="center">中央</option>
            <option value="left">左</option>
            <option value="right">右</option>
          </select>
        </div>
      </div>
      <div class="row2 fgrp">
        <div>
          <div class="flabel">パネル幅（px）</div>
          <input type="number" class="input" id="panelWidthInput" min="480" max="1800" step="20">
        </div>
        <div>
          <div class="flabel">パネル最大高（px）</div>
          <input type="number" class="input" id="panelMaxHInput" min="300" max="1040" step="20">
        </div>
      </div>
      <div class="fgrp">
        <div class="flabel">文字サイズ</div>
        <div class="range-row">
          <input type="range" id="fontScaleInput" min="80" max="150" step="5">
          <span class="range-val" id="fontScaleVal">100%</span>
        </div>
      </div>
      <div class="row2 fgrp">
        <div>
          <div class="flabel">タブ名（要約）</div>
          <input type="text" class="input" id="labelSummaryInput">
        </div>
        <div>
          <div class="flabel">タブ名（用語集）</div>
          <input type="text" class="input" id="labelGlossaryInput">
        </div>
      </div>
    </div>

    <div class="sect">
      <div class="sect-title">📋 要約セクション <span class="count-badge" id="summaryCount"></span></div>
      <div id="summaryList"></div>
      <button class="add-btn" id="addSummaryBtn">＋ セクションを追加</button>
    </div>

    <div class="sect">
      <div class="sect-title">📚 用語集 <span class="count-badge" id="glossaryCount"></span></div>
      <div id="glossaryList"></div>
      <button class="add-btn" id="addGlossaryBtn">＋ 用語を追加</button>
    </div>

  </div>

  <div class="previewPane">
    <iframe id="previewFrame" src="preview.html"></iframe>
  </div>
</div>

<div id="noDraft">
  <div class="box">
    <div class="emoji">🗂️</div>
    <h2>編集データが見つかりません</h2>
    <p>このタブの編集データ（ドラフト）が保存されていません。<br>
    v0.6.0 以降に生成したタブのみ編集できます。<br>
    対象の動画でもう一度「生成 &amp; デプロイ」を実行してください。</p>
  </div>
</div>

<script src="tab-template.js"></script>
<script src="editor.js"></script>
</body>
</html>
