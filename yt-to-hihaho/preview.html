<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タブプレビュー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f1a}
#wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#stage{position:relative;width:1920px;height:1080px;transform-origin:center center;background:#000;box-shadow:0 8px 48px rgba(0,0,0,.6);border-radius:6px;overflow:hidden;flex-shrink:0}
#bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85}
#bg[hidden]{display:none}
#frame{position:absolute;inset:0;width:100%;height:100%;border:none;background:transparent}
#hint{position:absolute;bottom:14px;right:18px;color:rgba(255,255,255,.4);font:12px/1 system-ui;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <img id="bg" alt="" hidden>
    <iframe id="frame"></iframe>
    <div id="hint">1920×1080 プレビュー</div>
  </div>
</div>
<script src="preview.js"></script>
</body>
</html>
